<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UI Spotlight · jccl.me</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #1e1e1e;
  --text: #e8e8e8;
  --dim: #888;
  --accent: #e66465;
  --accent-bg: rgba(230,100,101,0.15);
  --r: 10px;
  --bar: 52px;
}

html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: system-ui,-apple-system,BlinkMacSystemFont,sans-serif; overflow: hidden; }

/* ── Top bar ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--bar);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: rgba(10,10,10,0.9); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}

.site-name { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; color: var(--dim); }

.mode-toggle {
  display: flex; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px;
}
.mode-btn {
  padding: 4px 14px; border-radius: 6px; border: none;
  background: transparent; color: var(--dim); font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all 0.2s;
  text-decoration: none; font-family: inherit; user-select: none;
}
.mode-btn.active { background: var(--accent); color: #fff; box-shadow: 0 1px 8px rgba(230,100,101,.4); }

#tm-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--dim); font-size: 12px; font-family: inherit; cursor: pointer; transition: all 0.2s;
}
#tm-btn:hover { color: var(--text); border-color: #333; }

/* ── App area ── */
#app-wrap {
  position: fixed; top: var(--bar); left: 0; right: 0; bottom: 0;
}
#app-frame { width: 100%; height: 100%; border: none; background: #000; display: none; }
#loading {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  color: var(--dim); font-size: 14px;
}
#loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Time Machine overlay ── */
#tm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 150; }
#tm-overlay.open { display: block; }

/* ── Time Machine drawer ── */
#tm-drawer {
  position: fixed; bottom: -100%; left: 0; right: 0;
  max-height: 60vh; background: var(--surface);
  border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
  z-index: 200; transition: bottom .35s cubic-bezier(.32,.72,0,1);
  overflow: hidden; display: flex; flex-direction: column;
}
#tm-drawer.open { bottom: 0; }

.tm-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tm-hd-title { font-size: 14px; font-weight: 600; }
.tm-hd-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
.tm-close {
  width: 28px; height: 28px; background: #1e1e1e; border: none;
  border-radius: 50%; color: var(--dim); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-family: inherit;
}
.tm-close:hover { color: var(--text); }

.tm-list {
  overflow-y: auto; padding: 12px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;
}

.tm-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px; cursor: pointer;
  transition: all 0.2s; text-decoration: none; color: inherit; display: block;
}
.tm-card:hover { border-color: var(--accent); background: #160e0e; }
.tm-day { font-size: 10px; color: var(--dim); margin-bottom: 4px; letter-spacing: 0.04em; }
.tm-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.tm-desc { font-size: 11px; color: var(--dim); line-height: 1.4; margin-bottom: 8px; }
.tm-drops { display: flex; gap: 3px; flex-wrap: wrap; }
.tm-drop-tag {
  font-size: 9px; font-weight: 600; letter-spacing: 0.05em;
  background: #1a1a1a; border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 4px; color: var(--dim);
}
.tm-palette { display: flex; gap: 3px; margin-top: 6px; }
.tm-swatch { width: 12px; height: 12px; border-radius: 3px; }
.tm-empty {
  grid-column: 1/-1; text-align: center;
  color: var(--dim); font-size: 13px; padding: 28px; line-height: 1.6;
}
</style>
</head>
<body>

<header id="topbar">
  <span class="site-name">jccl.me</span>
  <div class="mode-toggle" role="tablist">
    <a href="../" class="mode-btn" role="tab" aria-selected="false">Playground</a>
    <button class="mode-btn active" role="tab" aria-selected="true">Spotlight</button>
  </div>
  <button id="tm-btn" onclick="toggleTM()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Time Machine
  </button>
</header>

<div id="app-wrap">
  <div id="loading">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-9-9"/></svg>
    Loading spotlight…
  </div>
  <iframe id="app-frame" title="UI Spotlight Gallery"></iframe>
</div>

<div id="tm-overlay" onclick="closeTM()"></div>
<div id="tm-drawer">
  <div class="tm-hd">
    <div>
      <div class="tm-hd-title">⏰ Time Machine</div>
      <div class="tm-hd-sub">Past UI Spotlight days</div>
    </div>
    <button class="tm-close" onclick="closeTM()">✕</button>
  </div>
  <div class="tm-list" id="tm-list"></div>
</div>

<script>
async function init() {
  try {
    const res = await fetch('manifest.json');
    if (!res.ok) throw new Error('manifest not found');
    const data = await res.json();
    const active = data.days.find(d => d.status === 'active');
    if (active) {
      const frame = document.getElementById('app-frame');
      frame.src = `days/${active.folder}/index.html`;
      frame.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      populateTM(data.days, active.folder);
    }
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#666;font-size:13px">Could not load manifest.<br>Check back soon.</p>';
  }
}

function populateTM(days, activeFolder) {
  const list = document.getElementById('tm-list');
  const past = [...days].filter(d => d.folder !== activeFolder).reverse();
  if (!past.length) {
    list.innerHTML = '<div class="tm-empty">No past days yet —<br>check back tomorrow!</div>';
    return;
  }
  list.innerHTML = past.map(d => {
    const drops = d.drops || [];
    const buckets = drops.map(dr => dr.bucket || dr).filter(Boolean);
    return `
    <a class="tm-card" href="days/${d.folder}/index.html" target="_blank">
      <div class="tm-day">Day ${d.day_number} · ${d.date}</div>
      <div class="tm-title">${d.title}</div>
      <div class="tm-desc">${d.description}</div>
      ${buckets.length ? `<div class="tm-drops">${buckets.map(b=>`<span class="tm-drop-tag">${b}</span>`).join('')}</div>` : ''}
      ${d.palette ? `<div class="tm-palette">${d.palette.slice(0,5).map(c=>`<div class="tm-swatch" style="background:${c}"></div>`).join('')}</div>` : ''}
    </a>`;
  }).join('');
}

function toggleTM() {
  document.getElementById('tm-drawer').classList.contains('open') ? closeTM() : openTM();
}
function openTM() {
  document.getElementById('tm-drawer').classList.add('open');
  document.getElementById('tm-overlay').classList.add('open');
}
function closeTM() {
  document.getElementById('tm-drawer').classList.remove('open');
  document.getElementById('tm-overlay').classList.remove('open');
}

init();
</script>
</body>
</html>
