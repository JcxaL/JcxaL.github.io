<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Spotlight · Daily hot UI drops</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-hover: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.08);
      --gold: #f59e0b;
      --gold-dim: rgba(245, 158, 11, 0.2);
      --purple: #7c3aed;
      --cyan: #06b6d4;
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.25);
      --drawer-width: 380px;
      --nav-height: 56px;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-height); z-index: 100;
      display: flex; align-items: center; padding: 0 18px; gap: 14px;
      background: rgba(8, 8, 15, 0.8);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gold);
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.28);
      padding: 4px 10px; border-radius: 99px; flex-shrink: 0;
    }
    .gold-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 6px var(--gold);
      animation: pulse-gold 2s ease-in-out infinite;
    }
    @keyframes pulse-gold { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .nav-day-num { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: var(--gold); background: var(--gold-dim); border: 1px solid rgba(245,158,11,0.3); padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .nav-title { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .nav-date { font-size: 12px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; }

    /* ── iOS liquid-glass mode toggle ── */
    .mode-toggle {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 232px;
      padding: 4px;
      border-radius: 99px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(28px) saturate(2);
      -webkit-backdrop-filter: blur(28px) saturate(2);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        inset 0 -1px 0 rgba(0,0,0,0.22),
        0 6px 22px rgba(0,0,0,0.32);
      flex-shrink: 0;
    }
    .mode-opt {
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 99px;
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-decoration: none; white-space: nowrap;
      transition: color 0.35s ease;
      cursor: pointer;
    }
    .mode-opt:hover { color: rgba(255,255,255,0.85); }
    .mode-opt.active {
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .mode-opt svg { width: 12px; height: 12px; flex-shrink: 0; }

    .toggle-thumb {
      position: absolute;
      top: 4px; left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      border-radius: 99px;
      background:
        linear-gradient(180deg,
          rgba(255,255,255,0.22),
          rgba(255,255,255,0.08) 60%,
          rgba(255,255,255,0.12));
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        inset 0 -1px 0 rgba(0,0,0,0.12),
        0 2px 12px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px) saturate(1.8);
      -webkit-backdrop-filter: blur(14px) saturate(1.8);
      transition: transform 0.55s cubic-bezier(0.34, 1.45, 0.5, 1);
      z-index: 1;
      pointer-events: none;
    }
    .mode-toggle.is-spot .toggle-thumb {
      transform: translateX(100%);
    }

    .nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .nav-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 13px; border: 1px solid var(--glass-border);
      border-radius: 8px; background: var(--glass); color: var(--text-secondary);
      font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: var(--glass-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.14); }
    .nav-btn svg { width: 13px; height: 13px; opacity: 0.7; }

    /* ── Frame ── */
    .frame-wrap { position: fixed; top: var(--nav-height); left: 0; right: 0; bottom: 0; }
    #day-frame { width: 100%; height: 100%; border: none; display: block; opacity: 0; transition: opacity 0.6s ease; }
    #day-frame.ready { opacity: 1; }

    .loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--bg); z-index: 5; transition: opacity 0.5s ease;
    }
    .loading.gone { opacity: 0; pointer-events: none; }
    .spinner {
      width: 30px; height: 30px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 12px; color: var(--text-muted); }

    /* ── Overlay + Drawer ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    .overlay.on { opacity: 1; pointer-events: all; }

    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: var(--drawer-width); max-width: 100vw; z-index: 300; background: rgba(6, 6, 18, 0.98); border-left: 1px solid var(--glass-border); transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
    .drawer.open { transform: translateX(0); }

    .drawer-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .drawer-head h2 { font-size: 14px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .drawer-head h2 svg { color: var(--gold); }
    .x-btn { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: background 0.15s, color 0.15s; }
    .x-btn:hover { background: var(--glass-hover); color: var(--text-primary); }

    .drawer-sub { padding: 10px 22px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); flex-shrink: 0; line-height: 1.5; }
    .drawer-list { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 7px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }

    /* ── Day cards ── */
    .day-card { border: 1px solid var(--glass-border); border-radius: 12px; padding: 13px 15px; cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.2s; background: var(--glass); position: relative; overflow: hidden; }
    .day-card:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.12); transform: translateX(-2px); }
    .day-card.is-active { border-color: rgba(245, 158, 11, 0.38); background: rgba(245, 158, 11, 0.06); }
    .day-card.is-active::after { content: 'TODAY'; position: absolute; top: 11px; right: 11px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--gold); background: rgba(245, 158, 11, 0.13); border: 1px solid rgba(245, 158, 11, 0.3); padding: 2px 6px; border-radius: 20px; }

    .card-meta { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; padding-right: 60px; line-height: 1.3; }
    .card-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-count {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; color: var(--gold);
      background: rgba(245,158,11,0.1);
      padding: 2px 8px; border-radius: 99px;
      border: 1px solid rgba(245,158,11,0.2);
    }

    .card-foot { display: flex; align-items: center; gap: 7px; margin-top: 8px; }
    .palette { display: flex; gap: 3px; }
    .pal-dot { width: 8px; height: 8px; border-radius: 50%; }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px; text-align: center; }
    .empty-state p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

    @media (max-width: 720px) {
      :root { --drawer-width: 100vw; }
      .nav-title, .nav-date { display: none; }
      .mode-opt { padding: 7px 12px; font-size: 11px; }
    }
    @media (max-width: 500px) {
      .nav-day-num { display: none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-badge"><div class="gold-dot"></div>Spotlight</div>
  <span class="nav-day-num" id="nav-badge">Day —</span>
  <span class="nav-title" id="nav-title">Loading…</span>

  <div class="mode-toggle is-spot">
    <a href="../" class="mode-opt" data-mode="play">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="5,3 19,12 5,21"/></svg>
      Playground
    </a>
    <a href="./" class="mode-opt active" data-mode="spot">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      Spotlight
    </a>
    <span class="toggle-thumb"></span>
  </div>

  <div class="nav-right">
    <button class="nav-btn" id="archive-btn" aria-label="Open archive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>
      </svg>
      Archive
    </button>
  </div>
</nav>

<div class="frame-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading today's drops…</p>
  </div>
  <iframe id="day-frame" title="UI Spotlight" allowfullscreen></iframe>
</div>

<div class="overlay" id="overlay"></div>

<aside class="drawer" id="drawer" aria-label="UI Spotlight Archive">
  <div class="drawer-head">
    <h2>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      </svg>
      Archive
    </h2>
    <button class="x-btn" id="close-btn" aria-label="Close">✕</button>
  </div>
  <div class="drawer-sub">
    Each day curates 5 trending UI/UX patterns from across the design web, recreated as live demos.
  </div>
  <div class="drawer-list" id="drawer-list"></div>
</aside>

<script>
  const frame   = document.getElementById('day-frame');
  const loading = document.getElementById('loading');
  const overlay = document.getElementById('overlay');
  const drawer  = document.getElementById('drawer');
  const list    = document.getElementById('drawer-list');

  const open  = () => { drawer.classList.add('open');  overlay.classList.add('on'); };
  const close = () => { drawer.classList.remove('open'); overlay.classList.remove('on'); };

  document.getElementById('archive-btn').addEventListener('click', open);
  document.getElementById('close-btn').addEventListener('click', close);
  overlay.addEventListener('click', close);

  function fmtDate(s) {
    return new Date(s + 'T12:00:00').toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });
  }

  function loadDay(day) {
    loading.classList.remove('gone');
    frame.classList.remove('ready');
    const folder = day.folder || day.date;
    frame.src = `days/${folder}/index.html`;
    frame.onload = () => { frame.classList.add('ready'); loading.classList.add('gone'); };
    document.getElementById('nav-badge').textContent  = `Day ${day.day_number}`;
    document.getElementById('nav-title').textContent  = day.title;
    document.querySelectorAll('.day-card').forEach(c => {
      c.classList.toggle('is-active', c.dataset.folder === folder);
    });
    close();
  }

  function buildCard(day) {
    const card = document.createElement('div');
    const folder = day.folder || day.date;
    card.className = 'day-card';
    card.dataset.folder = folder;

    const dots = (day.palette || []).slice(0, 5)
      .map(c => `<div class="pal-dot" style="background:${c}"></div>`).join('');
    const dropsCount = day.drops_count || 1;
    const isMulti = dropsCount > 1;

    card.innerHTML = `
      <div class="card-meta">Day ${day.day_number} &middot; ${fmtDate(day.date)}</div>
      <div class="card-title">${day.title}</div>
      <div class="card-desc">${day.description}</div>
      <div class="card-foot">
        <div class="palette">${dots}</div>
        ${isMulti ? `<span class="card-count" style="margin-left:auto">${dropsCount} drops</span>` : ''}
      </div>`;

    card.addEventListener('click', () => loadDay(day));
    return card;
  }

  async function boot() {
    try {
      const manifest = await fetch('manifest.json').then(r => r.json());
      const sorted   = [...manifest.days].reverse();

      if (sorted.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No spotlight entries yet.<br>Check back tomorrow.</p></div>';
        loading.querySelector('p').textContent = 'No entries yet — check back soon.';
        return;
      }

      sorted.forEach(d => list.appendChild(buildCard(d)));
      const today = manifest.days.find(d => d.status === 'active')
                 ?? manifest.days[manifest.days.length - 1];
      loadDay(today);
    } catch (e) {
      console.error(e);
      loading.querySelector('p').textContent = 'Could not load — please refresh.';
    }
  }

  boot();
</script>
</body>
</html>
