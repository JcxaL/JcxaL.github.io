<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVG Text Orbits · textPath · UI Spotlight Day 39 Drop 3</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100dvh;
  background: #020008;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: system-ui, -apple-system, sans-serif;
  color: #e0d8f8;
  gap: 16px;
  overflow: hidden;
}
h2 {
  font-size: clamp(.85rem, 2vw, 1rem);
  font-weight: 600;
  letter-spacing: .06em;
  color: #c084fc;
  text-align: center;
  padding-top: 16px;
  z-index: 2;
  position: relative;
}
#svg-wrap {
  width: min(540px, 96vw);
  aspect-ratio: 1;
  position: relative;
}
svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.technique {
  font-size: .68rem;
  color: rgba(192,132,252,.45);
  text-align: center;
  max-width: 420px;
  padding: 0 16px;
  line-height: 1.5;
  z-index: 2;
  position: relative;
}
footer {
  font-size: .65rem;
  color: rgba(255,255,255,.22);
  text-align: center;
  padding-bottom: 14px;
}
</style>
</head>
<body>

<h2>SVG Text Orbits · &lt;textPath&gt; on Animated Circles</h2>

<div id="svg-wrap">
<svg id="svg" viewBox="-260 -260 520 520">
  <defs>
    <!-- 6 orbit paths (circles) -->
    <path id="o1" d="M 0,0 m -60,0 a 60,60 0 1,1 120,0 a 60,60 0 1,1 -120,0"/>
    <path id="o2" d="M 0,0 m -95,0 a 95,95 0 1,1 190,0 a 95,95 0 1,1 -190,0"/>
    <path id="o3" d="M 0,0 m -133,0 a 133,133 0 1,1 266,0 a 133,133 0 1,1 -266,0"/>
    <path id="o4" d="M 0,0 m -170,0 a 170,170 0 1,1 340,0 a 170,170 0 1,1 -340,0"/>
    <path id="o5" d="M 0,0 m -207,0 a 207,207 0 1,1 414,0 a 207,207 0 1,1 -414,0"/>
    <path id="o6" d="M 0,0 m -244,0 a 244,244 0 1,1 488,0 a 244,244 0 1,1 -488,0"/>
  </defs>

  <!-- Guide circles (subtle) -->
  <circle r="60" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
  <circle r="95" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
  <circle r="133" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
  <circle r="170" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
  <circle r="207" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
  <circle r="244" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>

  <!-- Central glow -->
  <circle r="18" fill="rgba(192,132,252,.25)"/>
  <circle r="10" fill="rgba(192,132,252,.6)"/>
  <circle r="5"  fill="#c084fc"/>

  <!-- Orbit 1 — innermost, fast, CW -->
  <text font-size="9" font-family="system-ui,sans-serif" font-weight="700"
        fill="#c084fc" letter-spacing="3.4">
    <textPath href="#o1">
      ✦ ORBIT ✦ DESIGN ✦ MOTION ✦ FLOAT ✦
      <animate attributeName="startOffset" from="0%" to="100%" dur="7s" repeatCount="indefinite"/>
    </textPath>
  </text>

  <!-- Orbit 2 — CCW, medium -->
  <text font-size="8.5" font-family="system-ui,sans-serif" font-weight="600"
        fill="#38bdf8" letter-spacing="2.8">
    <textPath href="#o2">
      ◈ WEB · CSS · SVG · HTML · API · DOM · CANVAS · SHADER ◈
      <animate attributeName="startOffset" from="100%" to="0%" dur="12s" repeatCount="indefinite"/>
    </textPath>
  </text>

  <!-- Orbit 3 — CW, slow -->
  <text font-size="9" font-family="system-ui,sans-serif" font-weight="500"
        fill="#ec4899" letter-spacing="2.2" opacity=".9">
    <textPath href="#o3">
      ★ REACT · VUE · SVELTE · SOLID · ASTRO · NEXT · REMIX · QWIK · ANGULAR ★
      <animate attributeName="startOffset" from="0%" to="100%" dur="18s" repeatCount="indefinite"/>
    </textPath>
  </text>

  <!-- Orbit 4 — CCW, very slow -->
  <text font-size="8" font-family="system-ui,sans-serif" font-weight="400"
        fill="#34d399" letter-spacing="2.0" opacity=".85">
    <textPath href="#o4">
      · ANIMATION · INTERACTION · TRANSITION · TRANSFORM · PERSPECTIVE · GRADIENT · FILTER · BLEND ·
      <animate attributeName="startOffset" from="100%" to="0%" dur="24s" repeatCount="indefinite"/>
    </textPath>
  </text>

  <!-- Orbit 5 — CW, extra slow -->
  <text font-size="7.5" font-family="system-ui,sans-serif" font-weight="400"
        fill="#f59e0b" letter-spacing="1.8" opacity=".8">
    <textPath href="#o5">
      ◇ TYPOGRAPHY · LAYOUT · SPACING · RHYTHM · GRID · FLOW · COLUMN · BASELINE · MEASURE · LEADING ◇
      <animate attributeName="startOffset" from="0%" to="100%" dur="32s" repeatCount="indefinite"/>
    </textPath>
  </text>

  <!-- Orbit 6 — CCW, slowest -->
  <text font-size="7" font-family="system-ui,sans-serif" font-weight="300"
        fill="rgba(255,255,255,.45)" letter-spacing="1.5" opacity=".7">
    <textPath href="#o6">
      ∞ PERFORMANCE · ACCESSIBILITY · SEMANTICS · PROGRESSIVE · RESPONSIVE · ADAPTIVE · FLUID · INTRINSIC ∞
      <animate attributeName="startOffset" from="100%" to="0%" dur="45s" repeatCount="indefinite"/>
    </textPath>
  </text>
</svg>
</div>

<p class="technique">
  SVG <code>&lt;textPath href="#path"&gt;</code> with SMIL <code>&lt;animate attributeName="startOffset"&gt;</code>
  creates text orbiting circular paths — no JavaScript, no CSS, pure SVG declarative animation.
</p>

<footer>SVG textPath + SMIL animation technique · UI Spotlight Day 39 · Drop #3</footer>

<script>
// Add interactive hover to slow/speed orbits
const texts = document.querySelectorAll('text');
const svgEl = document.getElementById('svg');

let scale = 1;
svgEl.addEventListener('wheel', e => {
  e.preventDefault();
  scale = Math.max(0.5, Math.min(2, scale - e.deltaY * 0.001));
  svgEl.style.transform = `scale(${scale})`;
}, {passive: false});

// Click center to pause/resume
const centerCircle = document.querySelector('circle:last-of-type');
let paused = false;
centerCircle.style.cursor = 'pointer';
centerCircle.addEventListener('click', () => {
  paused = !paused;
  texts.forEach(t => {
    const anims = t.querySelectorAll('animate');
    anims.forEach(a => paused ? a.pauseAnimations?.() || (a.setAttribute('dur','9999s')) : null);
  });
  // Simpler: toggle via SVG pauseAnimations/unpauseAnimations
  if (paused) {
    svgEl.pauseAnimations?.() || document.querySelector('svg').pauseAnimations?.();
  } else {
    svgEl.unpauseAnimations?.() || document.querySelector('svg').unpauseAnimations?.();
  }
  centerCircle.setAttribute('fill', paused ? '#ec4899' : '#c084fc');
});
</script>
</body>
</html>
