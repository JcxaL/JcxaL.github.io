<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Cursor Buttons — UI Spotlight #1</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f59e0b;
    --gold-dim: rgba(245, 158, 11, 0.15);
    --bg: #080810;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: rgba(255,255,255,0.88);
    --text-dim: rgba(255,255,255,0.4);
  }

  html, body {
    height: 100%; background: var(--bg); overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text); cursor: none;
  }

  /* ── Custom cursor ── */
  #cursor-blob {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.6) 0%, rgba(245,158,11,0) 70%);
    transform: translate(-50%, -50%);
    transition: width 0.3s, height 0.3s, background 0.3s;
    mix-blend-mode: screen;
  }
  #cursor-dot {
    position: fixed; pointer-events: none; z-index: 10000;
    width: 6px; height: 6px; border-radius: 50%;
    background: #fff; transform: translate(-50%, -50%);
  }

  /* ── Layout ── */
  .stage {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; gap: 0;
    padding: 40px 24px;
    position: relative;
  }

  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 16px;
  }

  .headline {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800; line-height: 1.1;
    text-align: center;
    background: linear-gradient(135deg, #fff 20%, rgba(245,158,11,0.9) 60%, #fff 80%);
    background-size: 200% 200%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease-in-out infinite;
    margin-bottom: 12px;
    max-width: 640px;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%       { background-position: 100% 50%; }
  }

  .sub {
    font-size: 14px; color: var(--text-dim); text-align: center;
    max-width: 420px; line-height: 1.6; margin-bottom: 56px;
  }

  /* ── Magnetic buttons ── */
  .btn-grid {
    display: flex; flex-wrap: wrap; gap: 20px;
    justify-content: center; align-items: center;
  }

  .mag-btn {
    position: relative; cursor: none;
    padding: 16px 36px;
    border-radius: 50px; border: none;
    font-size: 15px; font-weight: 600; letter-spacing: 0.02em;
    white-space: nowrap;
    transition: box-shadow 0.3s;
    will-change: transform;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .mag-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: inherit; filter: blur(20px); opacity: 0;
    transition: opacity 0.3s; z-index: -1; border-radius: inherit;
    transform: scale(1.4);
  }
  .mag-btn:hover::before { opacity: 0.4; }

  .mag-btn--primary {
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    color: #0a0a0f;
    box-shadow: 0 0 0 0 rgba(245,158,11,0);
  }
  .mag-btn--primary.pull {
    box-shadow: 0 20px 60px rgba(245,158,11,0.35), 0 0 0 1px rgba(245,158,11,0.3);
  }

  .mag-btn--ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .mag-btn--ghost.pull {
    border-color: rgba(245,158,11,0.4);
    box-shadow: 0 20px 60px rgba(245,158,11,0.12), 0 0 0 1px rgba(245,158,11,0.2);
  }

  .mag-btn--outline {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.18);
    color: var(--text);
  }
  .mag-btn--outline.pull {
    border-color: rgba(245,158,11,0.5);
    box-shadow: 0 12px 40px rgba(245,158,11,0.15);
  }

  /* ── Ripple ── */
  .ripple {
    position: absolute; border-radius: 50%;
    pointer-events: none; transform: scale(0);
    animation: ripple-out 0.6s ease-out forwards;
    background: rgba(255,255,255,0.25);
  }
  @keyframes ripple-out {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── Footer note ── */
  .footer-note {
    position: fixed; bottom: 24px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: var(--text-dim);
    letter-spacing: 0.04em; pointer-events: none;
  }

  /* ── Grid lines ── */
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 40%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 40%, transparent 100%);
  }

  .stage > * { position: relative; z-index: 1; }

  /* ── Spring debug panel ── */
  .debug {
    position: fixed; top: 20px; right: 20px;
    background: rgba(10,10,20,0.85);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 11px; color: var(--text-dim);
    backdrop-filter: blur(12px);
    z-index: 100;
    line-height: 2;
    min-width: 180px;
  }
  .debug label { display: flex; align-items: center; gap: 8px; }
  .debug input[type=range] {
    -webkit-appearance: none; width: 90px; height: 3px;
    background: rgba(255,255,255,0.15); border-radius: 2px; cursor: pointer;
  }
  .debug input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: var(--gold);
  }
  .debug-title {
    font-weight: 700; color: var(--text); margin-bottom: 6px;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .debug span { margin-left: auto; color: var(--gold); font-variant-numeric: tabular-nums; }

  .back-link {
    position: fixed; top: 18px; left: 18px; z-index: 200; cursor: auto;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: rgba(10,10,20,0.85);
    border: 1px solid var(--border); border-radius: 99px;
    color: var(--text-dim); text-decoration: none;
    font-size: 11px; font-weight: 500; font-family: inherit;
    backdrop-filter: blur(10px);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .back-link:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(245,158,11,0.4); }

  @media (pointer: coarse) {
    #cursor-blob, #cursor-dot { display: none; }
    html, body { cursor: auto; }
    .mag-btn { cursor: pointer; }
    .debug { display: none; }
  }
</style>
</head>
<body>

<a href="../" class="back-link">← All 5 drops</a>
<div class="grid-bg"></div>
<div id="cursor-blob"></div>
<div id="cursor-dot"></div>

<div class="stage">
  <p class="eyebrow">UI Spotlight · Magnetic Interaction</p>
  <h1 class="headline">Buttons that want<br>to be touched.</h1>
  <p class="sub">Move your cursor near any button. Spring physics attract it.<br>The closer you get, the stronger the pull.</p>

  <div class="btn-grid">
    <button class="mag-btn mag-btn--primary" data-mag="1">Get started</button>
    <button class="mag-btn mag-btn--ghost"   data-mag="1">Learn more</button>
    <button class="mag-btn mag-btn--outline" data-mag="1">View source</button>
    <button class="mag-btn mag-btn--ghost"   data-mag="1">Subscribe</button>
    <button class="mag-btn mag-btn--outline" data-mag="1">Contact</button>
  </div>
</div>

<div class="debug">
  <div class="debug-title">Spring Params</div>
  <label>Stiffness
    <input type="range" id="s-stiff" min="0.05" max="0.5" step="0.01" value="0.18">
    <span id="v-stiff">0.18</span>
  </label>
  <label>Damping
    <input type="range" id="s-damp" min="0.1" max="0.9" step="0.01" value="0.72">
    <span id="v-damp">0.72</span>
  </label>
  <label>Radius
    <input type="range" id="s-radius" min="60" max="220" step="5" value="110">
    <span id="v-radius">110</span>
  </label>
  <label>Strength
    <input type="range" id="s-str" min="0.1" max="1.0" step="0.05" value="0.45">
    <span id="v-str">0.45</span>
  </label>
</div>

<p class="footer-note">Inspired by nicholasgasior/magnetic-button · UI Spotlight Day 1 · Drop #1</p>

<script>
// ── Spring physics ────────────────────────────────────────────────────────────
class Spring {
  constructor(stiffness = 0.18, damping = 0.72) {
    this.stiffness = stiffness;
    this.damping   = damping;
    this.value     = 0;
    this.velocity  = 0;
    this.target    = 0;
  }
  update() {
    const force = (this.target - this.value) * this.stiffness;
    this.velocity = this.velocity * this.damping + force;
    this.value += this.velocity;
    return this.value;
  }
  settled(threshold = 0.01) {
    return Math.abs(this.target - this.value) < threshold &&
           Math.abs(this.velocity) < threshold;
  }
}

// ── Global spring params (tunable from UI) ────────────────────────────────────
let STIFFNESS = 0.18;
let DAMPING   = 0.72;
let RADIUS    = 110;
let STRENGTH  = 0.45;

// ── Cursor position (raw) ─────────────────────────────────────────────────────
const cur = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

// ── Cursor blob spring ────────────────────────────────────────────────────────
const blobX = new Spring(0.12, 0.78);
const blobY = new Spring(0.12, 0.78);
blobX.value = blobX.target = cur.x;
blobY.value = blobY.target = cur.y;

const blob    = document.getElementById('cursor-blob');
const dot     = document.getElementById('cursor-dot');

// ── Magnetic buttons ──────────────────────────────────────────────────────────
const buttons = [...document.querySelectorAll('.mag-btn')].map(el => ({
  el,
  sx: new Spring(STIFFNESS, DAMPING),
  sy: new Spring(STIFFNESS, DAMPING),
  active: false,
}));

function resetSprings() {
  buttons.forEach(b => {
    b.sx.stiffness = STIFFNESS; b.sx.damping = DAMPING;
    b.sy.stiffness = STIFFNESS; b.sy.damping = DAMPING;
  });
}

// ── Ripple on click ───────────────────────────────────────────────────────────
document.querySelectorAll('.mag-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const r   = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(btn.offsetWidth, btn.offsetHeight);
    const rect = btn.getBoundingClientRect();
    r.style.cssText = `
      width:${size}px; height:${size}px;
      left:${e.clientX - rect.left - size/2}px;
      top:${e.clientY  - rect.top  - size/2}px;
    `;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 650);
  });
});

// ── Animation loop ────────────────────────────────────────────────────────────
function tick() {
  // Blob cursor
  blobX.target = cur.x; blobY.target = cur.y;
  const bx = blobX.update(), by = blobY.update();
  blob.style.left = bx + 'px';
  blob.style.top  = by + 'px';
  dot.style.left  = cur.x + 'px';
  dot.style.top   = cur.y + 'px';

  // Magnetic buttons
  buttons.forEach(({ el, sx, sy }) => {
    const rect   = el.getBoundingClientRect();
    const centerX = rect.left + rect.width  / 2;
    const centerY = rect.top  + rect.height / 2;
    const dx      = cur.x - centerX;
    const dy      = cur.y - centerY;
    const dist    = Math.sqrt(dx * dx + dy * dy);

    if (dist < RADIUS) {
      const pull = (1 - dist / RADIUS) * STRENGTH;
      sx.target  = dx * pull;
      sy.target  = dy * pull;
      el.classList.add('pull');

      // Enlarge blob when near a button
      blob.style.width  = '80px';
      blob.style.height = '80px';
    } else {
      sx.target = 0;
      sy.target = 0;
      el.classList.remove('pull');
      blob.style.width  = '40px';
      blob.style.height = '40px';
    }

    const tx = sx.update();
    const ty = sy.update();
    el.style.transform = `translate(${tx}px, ${ty}px)`;
  });

  requestAnimationFrame(tick);
}
tick();

// ── Mouse tracking ────────────────────────────────────────────────────────────
window.addEventListener('pointermove', e => {
  cur.x = e.clientX;
  cur.y = e.clientY;
});

// ── Spring param controls ─────────────────────────────────────────────────────
function bind(id, valId, assign) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    vl.textContent = v;
    assign(v);
    resetSprings();
  });
}
bind('s-stiff',  'v-stiff',  v => STIFFNESS = v);
bind('s-damp',   'v-damp',   v => DAMPING   = v);
bind('s-radius', 'v-radius', v => RADIUS    = v);
bind('s-str',    'v-str',    v => STRENGTH  = v);
</script>
</body>
</html>
