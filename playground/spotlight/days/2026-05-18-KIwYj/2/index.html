<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee with Fade — UI Spotlight Day 1 · Drop 2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080f; --text: rgba(255,255,255,0.9); --text-dim: rgba(255,255,255,0.4);
    --accent: #38bdf8; --border: rgba(255,255,255,0.08);
  }
  html, body { background: var(--bg); color: var(--text); height: 100%; overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }

  .stage { min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; gap: 56px; padding: 80px 0 60px; }

  .eyebrow { text-align: center; font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
    margin-bottom: 8px; }
  .headline { text-align: center; font-size: clamp(26px, 5vw, 44px);
    font-weight: 800; line-height: 1.15; margin-bottom: 6px; }
  .sub { text-align: center; font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }

  /* ── Marquee track ── */
  .marquee {
    --gap: 32px; --duration: 30s;
    overflow: hidden;
    mask-image: linear-gradient(90deg, transparent, #000 14%, #000 86%, transparent);
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 14%, #000 86%, transparent);
    user-select: none;
  }
  .marquee:hover .marquee-track { animation-play-state: paused; }

  .marquee-track {
    display: flex; gap: var(--gap);
    width: max-content;
    animation: scroll var(--duration) linear infinite;
  }
  .marquee.reverse .marquee-track { animation-direction: reverse; }

  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(-50% - var(--gap) / 2)); }
  }

  /* ── Chips (logos / words / cards) ── */
  .chip {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 15px; font-weight: 600; white-space: nowrap;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }
  .chip:hover { background: rgba(255,255,255,0.08); border-color: rgba(56,189,248,0.3); transform: translateY(-2px); }
  .chip-icon { width: 18px; height: 18px; opacity: 0.7; }

  .chip.big { padding: 22px 36px; font-size: 26px; font-weight: 800; }
  .chip.gradient {
    background: linear-gradient(135deg, rgba(56,189,248,0.15), rgba(168,85,247,0.15));
    border-color: rgba(56,189,248,0.3);
  }
  .chip.dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 4px; }

  /* ── Controls ── */
  .controls {
    display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    padding: 0 20px;
  }
  .ctl-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 16px; border-radius: 99px;
    cursor: pointer; font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    font-family: inherit; transition: all 0.15s;
  }
  .ctl-btn:hover { color: var(--text); border-color: rgba(56,189,248,0.4); }
  .ctl-btn.on { color: var(--accent); border-color: var(--accent); background: rgba(56,189,248,0.1); }

  .back-link {
    position: fixed; top: 18px; left: 18px; z-index: 200;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: rgba(10,10,20,0.85);
    border: 1px solid var(--border); border-radius: 99px;
    color: var(--text-dim); text-decoration: none;
    font-size: 11px; font-weight: 500;
    backdrop-filter: blur(10px);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .back-link:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(56,189,248,0.4); }

  .footer-note { text-align: center; font-size: 11px; color: var(--text-dim); padding: 40px 20px 20px; }
</style>
</head>
<body>

<a href="../" class="back-link">← All 5 drops</a>

<div class="stage">
  <div>
    <p class="eyebrow">UI Spotlight · Animation</p>
    <h1 class="headline">Infinite Marquee.<br>Hover to pause.</h1>
    <p class="sub">CSS-only horizontal scroll with mask-faded edges — the trick behind every modern logo wall.</p>
  </div>

  <!-- Marquee 1: Big text -->
  <div class="marquee" id="m1" style="--duration: 35s">
    <div class="marquee-track" id="t1"></div>
  </div>

  <!-- Marquee 2: Logo-style chips, reverse direction -->
  <div class="marquee reverse" id="m2" style="--duration: 28s">
    <div class="marquee-track" id="t2"></div>
  </div>

  <!-- Marquee 3: Dot-prefixed announcements, fast -->
  <div class="marquee" id="m3" style="--duration: 22s">
    <div class="marquee-track" id="t3"></div>
  </div>

  <div class="controls">
    <button class="ctl-btn on" data-speed="normal">Normal speed</button>
    <button class="ctl-btn" data-speed="slow">Slow</button>
    <button class="ctl-btn" data-speed="fast">Fast</button>
    <button class="ctl-btn" data-speed="crawl">Crawl</button>
  </div>
</div>

<p class="footer-note">Pattern: CSS `mask-image` + duplicate track · UI Spotlight Day 1 · Drop #2</p>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const BIG_WORDS = [
  'Design.', 'Code.', 'Ship.', 'Iterate.', 'Polish.', 'Repeat.',
  'Build.', 'Test.', 'Refine.'
];

const LOGOS = [
  { name: 'Linear',    icon: '◇' },
  { name: 'Vercel',    icon: '▲' },
  { name: 'Stripe',    icon: '§' },
  { name: 'Figma',     icon: '◐' },
  { name: 'GitHub',    icon: '◉' },
  { name: 'Cloudflare',icon: '☁' },
  { name: 'Notion',    icon: '◼' },
  { name: 'Raycast',   icon: '✦' },
  { name: 'Arc',       icon: '◔' },
];

const ANNOUNCEMENTS = [
  'New: spring physics engine',
  'Now with WebGPU support',
  'View transitions: shipped',
  'Container queries everywhere',
  '60fps on every device',
  'Edge-rendered at 12ms',
  'Open-source forever',
];

// ── Fill tracks (×2 for seamless loop) ──────────────────────────────────────
function fill(elId, items, render) {
  const track = document.getElementById(elId);
  const doubled = [...items, ...items];
  track.innerHTML = doubled.map(render).join('');
}

fill('t1', BIG_WORDS, w => `<span class="chip big gradient">${w}</span>`);
fill('t2', LOGOS, l => `<span class="chip"><span class="chip-icon">${l.icon}</span>${l.name}</span>`);
fill('t3', ANNOUNCEMENTS, a => `<span class="chip dot">${a}</span>`);

// ── Speed controls ──────────────────────────────────────────────────────────
const SPEEDS = {
  normal: { m1: '35s', m2: '28s', m3: '22s' },
  slow:   { m1: '70s', m2: '56s', m3: '44s' },
  fast:   { m1: '18s', m2: '14s', m3: '11s' },
  crawl:  { m1: '120s', m2: '90s', m3: '70s' },
};

document.querySelectorAll('.ctl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctl-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    const s = SPEEDS[btn.dataset.speed];
    document.getElementById('m1').style.setProperty('--duration', s.m1);
    document.getElementById('m2').style.setProperty('--duration', s.m2);
    document.getElementById('m3').style.setProperty('--duration', s.m3);
  });
});
</script>
</body>
</html>
