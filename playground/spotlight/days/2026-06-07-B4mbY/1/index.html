<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Fluid Wave Morph · UI Spotlight</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04040e;--text:#e2e8f0;--muted:#64748b;--border:#ffffff10}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:32px}

.demo-title{font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted)}

.wave-stage{
  position:relative;width:min(640px,90vw);height:280px;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
}

svg{position:absolute;inset:0;width:100%;height:100%}

.wave-path{fill-opacity:.85;transition:fill .6s}

.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);padding:8px 18px;border-radius:100px;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
  letter-spacing:.06em;
}
.ctrl-btn:hover{border-color:#7c3aed;color:#9d5bf7}
.ctrl-btn.active{background:rgba(124,58,237,.15);border-color:#7c3aed;color:#9d5bf7}

.debug-panel{
  position:fixed;top:16px;right:16px;
  background:rgba(4,4,14,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  font-size:11px;color:var(--muted);z-index:100;
}
.debug-title{font-weight:700;color:var(--text);margin-bottom:6px;font-size:12px}
.debug-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:4px;align-items:center}
input[type=range]{width:80px;accent-color:#7c3aed}

footer{position:fixed;bottom:0;left:0;right:0;padding:12px;text-align:center;
  font-size:11px;color:var(--muted);background:linear-gradient(transparent,var(--bg));pointer-events:none}
footer a{color:var(--muted);pointer-events:all}
</style>
</head>
<body>

<div class="demo-title">SVG Fluid Wave Morph — Animating cubic bezier control points</div>

<div class="wave-stage" id="stage">
  <svg id="svg" viewBox="0 0 640 280" preserveAspectRatio="none">
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#7c3aed" stop-opacity=".9"/>
        <stop offset="100%" stop-color="#06b6d4" stop-opacity=".5"/>
      </linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f59e0b" stop-opacity=".85"/>
        <stop offset="100%" stop-color="#ef4444" stop-opacity=".5"/>
      </linearGradient>
      <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#10b981" stop-opacity=".8"/>
        <stop offset="100%" stop-color="#06b6d4" stop-opacity=".4"/>
      </linearGradient>
    </defs>
    <path class="wave-path" id="wave3" fill="url(#g3)"/>
    <path class="wave-path" id="wave2" fill="url(#g2)"/>
    <path class="wave-path" id="wave1" fill="url(#g1)"/>
  </svg>
</div>

<div class="controls">
  <button class="ctrl-btn active" data-preset="calm">Calm</button>
  <button class="ctrl-btn" data-preset="choppy">Choppy</button>
  <button class="ctrl-btn" data-preset="storm">Storm</button>
  <button class="ctrl-btn" data-preset="pulse">Pulse</button>
</div>

<div class="debug-panel">
  <div class="debug-title">Wave Settings</div>
  <div class="debug-row"><label>Amplitude</label>
    <input type="range" id="amp" min="5" max="80" value="30">
  </div>
  <div class="debug-row"><label>Frequency</label>
    <input type="range" id="freq" min="1" max="6" value="2" step=".1">
  </div>
  <div class="debug-row"><label>Speed</label>
    <input type="range" id="spd" min="0.2" max="4" value="1" step=".1">
  </div>
</div>

<footer>
  Inspired by SVG wave morphing techniques · UI Spotlight Day 22 · Drop #1
</footer>

<script>
const PRESETS = {
  calm:   { amp:20, freq:2,   spd:0.6 },
  choppy: { amp:45, freq:4,   spd:1.8 },
  storm:  { amp:70, freq:5,   spd:3.0 },
  pulse:  { amp:50, freq:1.5, spd:0.4 }
};

let settings = { amp:30, freq:2, spd:1 };
let t = 0;

function buildWavePath(W, H, amp, freq, phase, yBase) {
  const points = 80;
  const dx = W / points;
  let d = `M 0 ${H}`;
  for (let i = 0; i <= points; i++) {
    const x = i * dx;
    const y = yBase + Math.sin((i / points) * Math.PI * 2 * freq + phase) * amp
                     + Math.sin((i / points) * Math.PI * 2 * freq * 1.7 + phase * 1.3) * amp * 0.4;
    if (i === 0) d += ` L ${x} ${y}`;
    else d += ` L ${x} ${y}`;
  }
  d += ` L ${W} ${H} Z`;
  return d;
}

function frame() {
  requestAnimationFrame(frame);
  t += 0.016 * settings.spd;
  const W = 640, H = 280;
  const { amp, freq } = settings;
  document.getElementById('wave1').setAttribute('d', buildWavePath(W, H, amp, freq, t * 1.1, H * 0.55));
  document.getElementById('wave2').setAttribute('d', buildWavePath(W, H, amp * 0.8, freq * 0.85, t * 0.8 + 1, H * 0.65));
  document.getElementById('wave3').setAttribute('d', buildWavePath(W, H, amp * 0.65, freq * 1.2, t * 0.6 + 2, H * 0.72));
}

document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = PRESETS[btn.dataset.preset];
    Object.assign(settings, p);
    document.getElementById('amp').value  = p.amp;
    document.getElementById('freq').value = p.freq;
    document.getElementById('spd').value  = p.spd;
    document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
});

document.getElementById('amp').addEventListener('input', e => { settings.amp = +e.target.value; });
document.getElementById('freq').addEventListener('input', e => { settings.freq = +e.target.value; });
document.getElementById('spd').addEventListener('input', e => { settings.spd = +e.target.value; });

frame();
</script>
</body>
</html>
