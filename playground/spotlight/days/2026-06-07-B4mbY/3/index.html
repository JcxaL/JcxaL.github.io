<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Sign Flicker · UI Spotlight</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04040a;--text:#e2e8f0;--muted:#64748b;--border:#ffffff0d}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100vh;gap:40px}

.demo-title{font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.14em;color:var(--muted)}

/* Neon signs */
.neon-stage{display:flex;flex-direction:column;gap:28px;align-items:center}

.neon-sign{
  font-size:clamp(28px,6vw,52px);font-weight:900;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;
  line-height:1;
}

/* Individual letter spans */
.neon-sign .n-letter{
  display:inline-block;
  animation:neonFlicker linear infinite;
  text-shadow:
    0 0 4px currentColor,
    0 0 12px currentColor,
    0 0 28px currentColor,
    0 0 56px currentColor;
}

/* Unique animation timing per letter */
.neon-sign[data-color="magenta"] .n-letter{ color:#f0a; }
.neon-sign[data-color="cyan"]    .n-letter{ color:#0ff; }
.neon-sign[data-color="amber"]   .n-letter{ color:#f90; }
.neon-sign[data-color="green"]   .n-letter{ color:#0f4; }
.neon-sign[data-color="blue"]    .n-letter{ color:#48f; }

@keyframes neonFlicker {
  0%,85%,87%,89%,100% { opacity:1; }
  86%                  { opacity:0.1; }
  88%                  { opacity:0.4; }
}

/* Dark letter variant (simulates dead tube) */
.n-letter.dead{
  color:rgba(255,255,255,.08) !important;
  text-shadow:none !important;
  animation:none !important;
}

/* Letter buzz */
.n-letter.buzz{
  animation:neonBuzz .05s linear infinite;
}
@keyframes neonBuzz{
  0%,100%{opacity:1;transform:translateY(0)}
  50%{opacity:.6;transform:translateY(-1px)}
}

/* Buzzing CRT ambient light */
.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:-1;
  background:radial-gradient(ellipse 60% 40% at 50% 50%, rgba(255,0,180,.04) 0%, transparent 70%);
}

/* Controls */
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--muted);padding:7px 16px;border-radius:100px;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
  letter-spacing:.05em;
}
.ctrl-btn:hover{border-color:#f0a;color:#f0a}

.debug-panel{position:fixed;top:16px;right:16px;
  background:rgba(4,4,10,.92);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  font-size:11px;color:var(--muted);z-index:100}
.debug-title{font-weight:700;color:var(--text);margin-bottom:6px;font-size:12px}
.debug-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:4px}
input[type=range]{width:80px;accent-color:#f0a}

footer{position:fixed;bottom:0;left:0;right:0;padding:12px;text-align:center;
  font-size:11px;color:var(--muted);background:linear-gradient(transparent,var(--bg));pointer-events:none}
footer a{color:var(--muted);pointer-events:all}
</style>
</head>
<body>
<div class="ambient"></div>

<div class="demo-title">Neon Sign Flicker — Click letters to toggle / hover to buzz</div>

<div class="neon-stage" id="stage">
  <div class="neon-sign" data-color="magenta">OPEN</div>
  <div class="neon-sign" data-color="cyan">LIVE MUSIC</div>
  <div class="neon-sign" data-color="amber">HOT DRINKS</div>
  <div class="neon-sign" data-color="green">24/7</div>
  <div class="neon-sign" data-color="blue">VACANCY</div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="btn-random">⚡ Random Fault</button>
  <button class="ctrl-btn" id="btn-reset">↺ Restore All</button>
  <button class="ctrl-btn" id="btn-flicker">🌩 Full Blackout</button>
</div>

<div class="debug-panel">
  <div class="debug-title">Neon Effect</div>
  <div class="debug-row"><label>Flicker Rate</label>
    <input type="range" id="rate" min="2" max="20" value="8">
  </div>
  <div class="debug-row"><label>Glow Intensity</label>
    <input type="range" id="glow" min="1" max="5" value="3">
  </div>
</div>

<footer>
  Inspired by CSS text-shadow neon effects · UI Spotlight Day 22 · Drop #3
</footer>

<script>
// Wrap each letter in a span
document.querySelectorAll('.neon-sign').forEach(sign => {
  const text = sign.textContent;
  sign.innerHTML = text.split('').map((ch, i) => {
    if (ch === ' ') return '<span class="n-space"> </span>';
    const dur = (6 + Math.random() * 10).toFixed(1);
    const delay = (Math.random() * -10).toFixed(2);
    return `<span class="n-letter" style="animation-duration:${dur}s;animation-delay:${delay}s">${ch}</span>`;
  }).join('');
});

// Click to toggle dead
document.querySelectorAll('.neon-sign').forEach(sign => {
  sign.addEventListener('click', e => {
    const letter = e.target.closest('.n-letter');
    if (letter) letter.classList.toggle('dead');
  });

  // Hover to buzz
  sign.querySelectorAll('.n-letter').forEach(l => {
    l.addEventListener('mouseenter', () => { if (!l.classList.contains('dead')) l.classList.add('buzz'); });
    l.addEventListener('mouseleave', () => l.classList.remove('buzz'));
  });
});

// Random fault
document.getElementById('btn-random').addEventListener('click', () => {
  const all = document.querySelectorAll('.n-letter:not(.dead)');
  const n = 1 + Math.floor(Math.random() * 4);
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(Math.random() * all.length);
    all[idx]?.classList.add('dead');
  }
});

// Restore all
document.getElementById('btn-reset').addEventListener('click', () => {
  document.querySelectorAll('.n-letter').forEach(l => l.classList.remove('dead'));
});

// Blackout
let blackoutTimer;
document.getElementById('btn-flicker').addEventListener('click', () => {
  const all = document.querySelectorAll('.n-letter');
  all.forEach(l => l.classList.add('dead'));
  clearTimeout(blackoutTimer);
  blackoutTimer = setTimeout(() => {
    all.forEach(l => l.classList.remove('dead'));
  }, 800 + Math.random() * 600);
});

// Rate slider changes animation duration
document.getElementById('rate').addEventListener('input', e => {
  const base = 22 - parseInt(e.target.value); // inverse: higher rate = shorter duration
  document.querySelectorAll('.n-letter').forEach(l => {
    l.style.animationDuration = (base + Math.random() * 5).toFixed(1) + 's';
  });
});

// Glow slider
document.getElementById('glow').addEventListener('input', e => {
  const g = parseInt(e.target.value);
  const sizes = [4, 12, 28, 56].map(s => s * g * 0.6);
  const shadow = (c) => sizes.map(s => `0 0 ${s}px ${c}`).join(',');
  document.querySelectorAll('.neon-sign').forEach(sign => {
    const col = getComputedStyle(sign.querySelector('.n-letter:not(.dead)')).color;
    sign.querySelectorAll('.n-letter').forEach(l => {
      if (!l.classList.contains('dead')) l.style.textShadow = shadow(col);
    });
  });
});
</script>
</body>
</html>
