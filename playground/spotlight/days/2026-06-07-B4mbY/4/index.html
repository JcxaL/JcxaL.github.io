<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubber Band Elastic Drag · UI Spotlight</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06060f;--text:#e2e8f0;--muted:#64748b;--border:#ffffff10}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;overflow:hidden;cursor:none}
body{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100vh;gap:32px}

.demo-title{font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.14em;color:var(--muted);pointer-events:none}

/* Custom cursor */
#cursor{
  position:fixed;pointer-events:none;z-index:9999;
  width:16px;height:16px;border-radius:50%;
  background:rgba(255,255,255,.8);
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
  transition:width .1s,height .1s;
}

/* Draggable items grid */
.item-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
  padding:0 20px;pointer-events:none;
}

.drag-item{
  width:140px;height:90px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;border:1px solid var(--border);
  cursor:grab;pointer-events:all;
  will-change:transform;
  position:relative;
  user-select:none;
}
.drag-item:active{cursor:grabbing}
.drag-item .icon{font-size:28px;pointer-events:none}
.drag-item .label{font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;pointer-events:none}

/* Color variants */
.drag-item:nth-child(1){background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3)}
.drag-item:nth-child(2){background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.28)}
.drag-item:nth-child(3){background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.28)}
.drag-item:nth-child(4){background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.28)}
.drag-item:nth-child(5){background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.28)}
.drag-item:nth-child(6){background:rgba(236,72,153,.1);border-color:rgba(236,72,153,.28)}

/* Rubber band connection line */
#rubber-line{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:100;
}
#rubber-line line{stroke:rgba(255,255,255,.15);stroke-width:2;stroke-dasharray:4 4}

/* Snap ring */
.snap-ring{
  position:absolute;inset:-4px;border-radius:20px;
  border:2px solid transparent;transition:border-color .2s;
  pointer-events:none;
}
.drag-item.in-snap .snap-ring{border-color:rgba(255,255,255,.3)}

.debug-panel{position:fixed;top:16px;right:16px;
  background:rgba(6,6,15,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;
  font-size:11px;color:var(--muted);z-index:200}
.debug-title{font-weight:700;color:var(--text);margin-bottom:6px;font-size:12px}
.debug-row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px}
input[type=range]{width:80px;accent-color:#7c3aed}

footer{position:fixed;bottom:0;left:0;right:0;padding:12px;text-align:center;
  font-size:11px;color:var(--muted);background:linear-gradient(transparent,var(--bg));pointer-events:none}
footer a{color:var(--muted);pointer-events:all}
</style>
</head>
<body>

<svg id="rubber-line"><line id="rline" x1="0" y1="0" x2="0" y2="0"/></svg>
<div id="cursor"></div>

<div class="demo-title">Rubber Band Elastic Drag — Spring return with overshoot</div>

<div class="item-grid" id="grid">
  <div class="drag-item"><div class="snap-ring"></div><span class="icon">🎈</span><span class="label">Balloon</span></div>
  <div class="drag-item"><div class="snap-ring"></div><span class="icon">🧲</span><span class="label">Magnet</span></div>
  <div class="drag-item"><div class="snap-ring"></div><span class="icon">⚡</span><span class="label">Energy</span></div>
  <div class="drag-item"><div class="snap-ring"></div><span class="icon">🌊</span><span class="label">Wave</span></div>
  <div class="drag-item"><div class="snap-ring"></div><span class="icon">🔮</span><span class="label">Crystal</span></div>
  <div class="drag-item"><div class="snap-ring"></div><span class="icon">🎯</span><span class="label">Target</span></div>
</div>

<div class="debug-panel">
  <div class="debug-title">Elastic Settings</div>
  <div class="debug-row"><label>Stiffness</label>
    <input type="range" id="stiffness" min="0.05" max="0.5" step=".01" value="0.18">
  </div>
  <div class="debug-row"><label>Damping</label>
    <input type="range" id="damping" min="0.5" max="0.98" step=".01" value="0.72">
  </div>
  <div class="debug-row"><label>Max Stretch</label>
    <input type="range" id="maxstretch" min="30" max="200" value="120">
  </div>
</div>

<footer>
  Inspired by rubber band / elastic drag spring physics · UI Spotlight Day 22 · Drop #4
</footer>

<script>
const cursor = document.getElementById('cursor');
let mouse = {x:0,y:0};
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

const items = document.querySelectorAll('.drag-item');
const origins = new Map(); // item → {x,y} resting position

// Store resting origins after layout
function captureOrigins() {
  items.forEach(item => {
    const r = item.getBoundingClientRect();
    origins.set(item, { x: r.left + r.width/2, y: r.top + r.height/2 });
  });
}
window.addEventListener('load', captureOrigins);
window.addEventListener('resize', captureOrigins);

// Per-item spring state
const springs = new Map();
items.forEach(item => {
  springs.set(item, { x: 0, y: 0, vx: 0, vy: 0, dragging: false, dragOx: 0, dragOy: 0 });
});

function getSettings() {
  return {
    stiffness: parseFloat(document.getElementById('stiffness').value),
    damping:   parseFloat(document.getElementById('damping').value),
    maxStr:    parseInt(document.getElementById('maxstretch').value)
  };
}

// Drag logic
let activeItem = null, dragX = 0, dragY = 0;

items.forEach(item => {
  item.addEventListener('mousedown', e => {
    e.preventDefault();
    activeItem = item;
    const s = springs.get(item);
    s.dragging = true;
    const origin = origins.get(item);
    dragX = e.clientX - (origin.x + s.x);
    dragY = e.clientY - (origin.y + s.y);
    cursor.style.width = '26px'; cursor.style.height = '26px';
  });
  item.addEventListener('touchstart', e => {
    e.preventDefault();
    activeItem = item;
    const s = springs.get(item);
    s.dragging = true;
    const origin = origins.get(item);
    dragX = e.touches[0].clientX - (origin.x + s.x);
    dragY = e.touches[0].clientY - (origin.y + s.y);
  }, {passive:false});
});

document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
  if (!activeItem) return;
  mouse.x = e.clientX; mouse.y = e.clientY;
});
document.addEventListener('touchmove', e => {
  if (!activeItem) return;
  mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
}, {passive:true});

document.addEventListener('mouseup', () => {
  if (activeItem) {
    springs.get(activeItem).dragging = false;
    activeItem = null;
    cursor.style.width = '16px'; cursor.style.height = '16px';
  }
});
document.addEventListener('touchend', () => {
  if (activeItem) { springs.get(activeItem).dragging = false; activeItem = null; }
});

// Rubber line
const rline = document.getElementById('rline');

function loop() {
  requestAnimationFrame(loop);
  const { stiffness, damping, maxStr } = getSettings();

  items.forEach(item => {
    const s = springs.get(item);
    const origin = origins.get(item);
    if (!origin) return;

    if (s.dragging && item === activeItem) {
      const tx = mouse.x - dragX - origin.x;
      const ty = mouse.y - dragY - origin.y;
      const dist = Math.sqrt(tx*tx + ty*ty);
      const clamped = dist > maxStr ? maxStr / dist : 1;
      s.x = tx * clamped;
      s.y = ty * clamped;
      s.vx = (s.x - s.x) * 0;
      s.vy = 0;

      // Show rubber line
      rline.setAttribute('x1', origin.x);
      rline.setAttribute('y1', origin.y);
      rline.setAttribute('x2', origin.x + s.x);
      rline.setAttribute('y2', origin.y + s.y);
      item.classList.add('in-snap');
    } else {
      // Spring return
      const fx = -stiffness * s.x;
      const fy = -stiffness * s.y;
      s.vx = (s.vx + fx) * damping;
      s.vy = (s.vy + fy) * damping;
      s.x += s.vx;
      s.y += s.vy;

      if (Math.abs(s.x) < 0.1 && Math.abs(s.y) < 0.1 && Math.abs(s.vx) < 0.1) {
        s.x = 0; s.y = 0; s.vx = 0; s.vy = 0;
        item.classList.remove('in-snap');
      }

      // Clear line if nothing dragging
      if (!activeItem) rline.setAttribute('x1', '-100');
    }

    item.style.transform = `translate(${s.x.toFixed(1)}px,${s.y.toFixed(1)}px)`;
  });
}

loop();
</script>
</body>
</html>
