<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spring Elastic Buttons — UI Spotlight</title>
<style>
/* CSS linear() spring easing — the real deal */
@property --squish-x {
  syntax: '<number>';
  inherits: false;
  initial-value: 1;
}
@property --squish-y {
  syntax: '<number>';
  inherits: false;
  initial-value: 1;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100dvh;background:#08060e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:system-ui,sans-serif;padding:2rem 1rem;gap:2.5rem;
}
h2{color:#fff;font-size:clamp(1rem,3vw,1.3rem);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;opacity:0.5}
p.sub{color:rgba(255,255,255,0.35);font-size:0.8rem;text-align:center}

/* linear() spring function — from CSS WG spec & web.dev spring examples */
/* spring(mass=1, stiffness=180, damping=12, velocity=0) ≈ */
:root{
  --spring: linear(
    0, 0.009 2.3%, 0.036 4.4%, 0.128 8.9%, 0.25 12.6%,
    0.388 16.2%, 0.5 19.3%, 0.607 22.2%, 0.7 25%, 0.781 27.8%,
    0.85 30.8%, 0.907 34%, 0.951 37.6%, 0.982 41.6%, 1.001 45.7%,
    1.009 50%, 1.008 54.5%, 0.999 59.2%, 0.994 63.7%, 0.998 68.5%,
    1.001 75%, 1 100%
  );
  --spring-dur: 0.7s;
}

.buttons{
  display:flex;flex-direction:column;gap:1.25rem;align-items:center;width:100%;max-width:420px;
}

/* Base button styles */
.spr{
  position:relative;font-family:inherit;font-size:1rem;font-weight:600;
  padding:0 2rem;height:52px;border-radius:99px;border:none;cursor:pointer;
  outline:none;user-select:none;
  transition:transform var(--spring-dur) var(--spring);
  will-change:transform;
  width:280px;
  overflow:hidden;
}
.spr::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:rgba(255,255,255,0.15);opacity:0;transition:opacity 0.15s;
}
.spr:active::after{opacity:1}
.spr span{position:relative;z-index:1}

/* Scale down on press, spring back */
.spr:active{ transform: scale(0.88); }
.spr:focus-visible{ outline:2px solid white; outline-offset:3px; }

/* Variant 1: Solid purple */
.spr-1{ background:oklch(0.6 0.25 295); color:white; box-shadow:0 4px 20px oklch(0.6 0.25 295 / 0.5); }
/* Variant 2: Solid teal */
.spr-2{ background:oklch(0.65 0.22 195); color:white; box-shadow:0 4px 20px oklch(0.65 0.22 195 / 0.5); }
/* Variant 3: Ghost */
.spr-3{
  background:transparent;color:white;
  border:2px solid rgba(255,255,255,0.3);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
}
.spr-3:hover{ border-color:rgba(255,255,255,0.6); }
/* Variant 4: Gradient */
.spr-4{
  background:linear-gradient(135deg,oklch(0.6 0.25 295),oklch(0.65 0.25 220));
  color:white;box-shadow:0 4px 30px rgba(140,80,255,0.4);
}
/* Variant 5: Glow ring */
.spr-5{
  background:#0d0d1a;color:white;
  border:2px solid oklch(0.7 0.25 295);
  box-shadow:0 0 0 0 oklch(0.7 0.25 295 / 0.6);
  transition:transform var(--spring-dur) var(--spring), box-shadow 0.15s;
}
.spr-5:active{
  box-shadow:0 0 0 6px oklch(0.7 0.25 295 / 0.15);
}

/* Squish label */
.squish-hint{
  position:absolute;top:-28px;left:50%;transform:translateX(-50%);
  font-size:0.7rem;color:rgba(255,255,255,0.4);white-space:nowrap;
  opacity:0;transition:opacity 0.2s;pointer-events:none;
}
.spr:active .squish-hint{opacity:1}

.easing-label{
  font-size:0.7rem;color:rgba(255,255,255,0.3);
  width:280px;padding:0 4px;margin-top:-0.5rem;
}

footer{font-size:0.7rem;color:rgba(255,255,255,0.25);text-align:center}
</style>
</head>
<body>
<h2>Spring Elastic Buttons</h2>
<p class="sub">Click any button — CSS <code>linear()</code> spring easing, no JS animation</p>

<div class="buttons">
  <div style="position:relative">
    <button class="spr spr-1"><span>✦ Primary Action</span></button>
  </div>
  <div style="position:relative">
    <button class="spr spr-2"><span>◆ Confirm Choice</span></button>
  </div>
  <div style="position:relative">
    <button class="spr spr-3"><span>◇ Secondary Action</span></button>
  </div>
  <div style="position:relative">
    <button class="spr spr-4"><span>⟡ Gradient Spring</span></button>
  </div>
  <div style="position:relative">
    <button class="spr spr-5"><span>⊛ Glow Ring Bounce</span></button>
  </div>
</div>
<p class="easing-label">
  linear(0, 0.009 2.3%, 0.036 4.4%, … 1 100%) — approximates a real spring physics curve
</p>

<footer>CSS linear() spring easing — web.dev/articles/css-linear &amp; css.oddbird.net/springs &nbsp;·&nbsp; UI Spotlight Day 35 · Drop #4</footer>
</body>
</html>
