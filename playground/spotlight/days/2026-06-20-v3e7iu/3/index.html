<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVG Text Draw-On — UI Spotlight</title>
<style>
@property --progress {
  syntax: '<number>';
  inherits: false;
  initial-value: 0;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100dvh;background:#030306;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:system-ui,sans-serif;padding:2rem 1rem;gap:2rem;
}
h2{color:#fff;font-size:clamp(1rem,3vw,1.3rem);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;opacity:0.5}
p.sub{color:rgba(255,255,255,0.35);font-size:0.8rem;text-align:center}

.words{
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  width:min(800px,100%);
}

.word-row{
  position:relative;cursor:pointer;
}

.word-row svg{
  display:block;overflow:visible;
}

/* Each text path: stroke draws in, then fill fades in */
.word-text{
  fill: transparent;
  stroke-width: 2;
  paint-order: stroke fill;
  stroke-dasharray: 2000;
  stroke-dashoffset: 2000;
}

/* Trigger animation on hover or .playing class */
.word-row:hover .word-text,
.word-row.playing .word-text {
  animation:
    draw-stroke 1.4s cubic-bezier(0.4,0,0.2,1) forwards,
    fill-in 0.6s ease 1.0s forwards;
}

@keyframes draw-stroke {
  to { stroke-dashoffset: 0; }
}
@keyframes fill-in {
  to { fill: var(--fill-color, white); }
}

.word-row:nth-child(1) .word-text{ stroke:oklch(0.75 0.25 295); --fill-color: oklch(0.85 0.15 295); animation-delay:0s,1.0s }
.word-row:nth-child(2) .word-text{ stroke:oklch(0.75 0.25 200); --fill-color: oklch(0.85 0.15 200); animation-delay:0s,1.0s }
.word-row:nth-child(3) .word-text{ stroke:oklch(0.75 0.25 340); --fill-color: oklch(0.85 0.15 340); animation-delay:0s,1.0s }
.word-row:nth-child(4) .word-text{ stroke:oklch(0.75 0.25 90); --fill-color: oklch(0.85 0.15 90); animation-delay:0s,1.0s }
.word-row:nth-child(5) .word-text{ stroke:oklch(0.75 0.25 30); --fill-color: oklch(0.85 0.15 30); animation-delay:0s,1.0s }

/* Reset on word-row:not(:hover) */
.word-row:not(:hover):not(.playing) .word-text{
  animation:none;
  fill:transparent;
  stroke-dashoffset:2000;
}

.hint{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:0.5rem}

.controls{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center}
.btn{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  color:#fff;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:0.8rem;
  transition:background 0.2s;font-family:inherit;
}
.btn:hover{background:rgba(255,255,255,0.14)}

footer{font-size:0.7rem;color:rgba(255,255,255,0.25);text-align:center}
</style>
</head>
<body>
<h2>SVG Text Draw-On</h2>
<p class="sub">Hover each word — stroke-dashoffset reveals letter paths, fill fades in after</p>

<div class="words" id="words">
  <div class="word-row">
    <svg viewBox="0 0 700 90" width="min(700px,90vw)" height="90">
      <text class="word-text" x="50%" y="72" text-anchor="middle" font-size="80" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-2">DESIGN</text>
    </svg>
  </div>
  <div class="word-row">
    <svg viewBox="0 0 700 90" width="min(700px,90vw)" height="90">
      <text class="word-text" x="50%" y="72" text-anchor="middle" font-size="80" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-2">PIXELS</text>
    </svg>
  </div>
  <div class="word-row">
    <svg viewBox="0 0 700 90" width="min(700px,90vw)" height="90">
      <text class="word-text" x="50%" y="72" text-anchor="middle" font-size="80" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-2">MOTION</text>
    </svg>
  </div>
  <div class="word-row">
    <svg viewBox="0 0 700 90" width="min(700px,90vw)" height="90">
      <text class="word-text" x="50%" y="72" text-anchor="middle" font-size="80" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-2">RHYTHM</text>
    </svg>
  </div>
  <div class="word-row">
    <svg viewBox="0 0 700 90" width="min(700px,90vw)" height="90">
      <text class="word-text" x="50%" y="72" text-anchor="middle" font-size="80" font-weight="900" font-family="system-ui,sans-serif" letter-spacing="-2">ENERGY</text>
    </svg>
  </div>
</div>

<div class="controls">
  <button class="btn" id="playAll">▶ Play All</button>
  <button class="btn" id="reset">↺ Reset</button>
</div>
<span class="hint">Or hover individual words</span>

<footer>SVG stroke-dashoffset technique + paint-order CSS &nbsp;·&nbsp; UI Spotlight Day 35 · Drop #3</footer>

<script>
document.getElementById('playAll').addEventListener('click',()=>{
  const rows = document.querySelectorAll('.word-row');
  rows.forEach((r,i)=>{
    r.classList.remove('playing');
    void r.offsetWidth;
    setTimeout(()=>r.classList.add('playing'), i*200);
  });
});
document.getElementById('reset').addEventListener('click',()=>{
  document.querySelectorAll('.word-row').forEach(r=>{
    r.classList.remove('playing');
  });
});
</script>
</body>
</html>
