<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSS Trig Spiral Grid — UI Spotlight</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  background: #04040c;
  font-family: system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 32px 20px;
  overflow: hidden;
}

h1 { font-size: 13px; color: #475569; letter-spacing: .14em; text-transform: uppercase; }

/* ── Spiral container ── */
.spiral-wrap {
  position: relative;
  width: min(560px, 90vw);
  aspect-ratio: 1;
}

/* Each card is positioned via CSS custom properties computed from JS */
.spiral-card {
  position: absolute;
  width: var(--w, 80px);
  height: var(--h, 80px);
  left: calc(50% + var(--x, 0px) - var(--w, 80px)/2);
  top:  calc(50% + var(--y, 0px) - var(--h, 80px)/2);
  background: color-mix(in oklch, var(--accent, #7c3aed) 15%, #0d0d20);
  border: 1px solid color-mix(in oklch, var(--accent, #7c3aed) 40%, transparent);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1),
              border-color 0.3s ease,
              box-shadow 0.3s ease,
              z-index 0s;
  transform: scale(var(--s, 0.65)) rotate(var(--rot, 0deg));
  opacity: var(--op, 0.5);
  animation: spiral-in 0.6s cubic-bezier(.34,1.56,.64,1) both;
  animation-delay: var(--delay, 0s);
}

@keyframes spiral-in {
  from { transform: scale(0) rotate(calc(var(--rot, 0deg) + 180deg)); opacity: 0; }
  to   { transform: scale(var(--s, 0.65)) rotate(var(--rot, 0deg)); opacity: var(--op, 0.5); }
}

.spiral-card:hover, .spiral-card.active {
  transform: scale(1) rotate(0deg) !important;
  opacity: 1 !important;
  z-index: 10;
  border-color: var(--accent, #7c3aed);
  box-shadow: 0 0 28px color-mix(in oklch, var(--accent, #7c3aed) 50%, transparent);
}

.spiral-card .icon  { font-size: calc(var(--w, 80px) * 0.35); line-height: 1; }
.spiral-card .label { font-size: calc(var(--w, 80px) * 0.13); color: #94a3b8; font-weight: 600; text-align: center; }

/* Center hub */
.hub {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 70px; height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle, #7c3aed, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  box-shadow: 0 0 40px #7c3aed88;
  z-index: 20;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 40px #7c3aed88; }
  50%      { box-shadow: 0 0 70px #7c3aed; }
}

/* Connection lines via SVG */
svg.lines {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
}

svg.lines line {
  stroke: #ffffff0d;
  stroke-width: 1;
  stroke-dasharray: 4 6;
}

.description {
  max-width: 420px;
  text-align: center;
  color: #64748b;
  font-size: 13px;
  line-height: 1.6;
}

footer {
  position: fixed; bottom: 12px; left: 0; right: 0;
  text-align: center; font-size: 11px; color: #1e293b;
}
</style>
</head>
<body>

<h1>CSS Trig Spiral Grid</h1>

<div class="spiral-wrap" id="wrap">
  <svg class="lines" id="lines"></svg>
  <div class="hub" id="hub">✦</div>
</div>

<p class="description">
  CSS <code style="color:#7c3aed">sin()</code> and <code style="color:#7c3aed">cos()</code> compute Fibonacci-spiral positions as custom properties. Each card enters with a spin animation; hover snaps it to full scale.
</p>

<footer>Inspired by CSS trigonometric functions (Chrome 111+) · UI Spotlight Day 29 · Drop #2</footer>

<script>
const items = [
  {icon:'⚡',label:'Energy',   accent:'#fbbf24'},
  {icon:'🌊',label:'Flow',     accent:'#38bdf8'},
  {icon:'🔥',label:'Spark',    accent:'#f97316'},
  {icon:'🌿',label:'Nature',   accent:'#4ade80'},
  {icon:'💜',label:'Spirit',   accent:'#a855f7'},
  {icon:'🎯',label:'Focus',    accent:'#ef4444'},
  {icon:'🌙',label:'Moon',     accent:'#818cf8'},
  {icon:'❄️',label:'Frost',    accent:'#06b6d4'},
  {icon:'🦋',label:'Transform',accent:'#f472b6'},
  {icon:'⭐',label:'Star',     accent:'#fde68a'},
  {icon:'🔮',label:'Magic',    accent:'#c084fc'},
  {icon:'🎵',label:'Sound',    accent:'#34d399'},
];

const wrap = document.getElementById('wrap');
const svgEl = document.getElementById('lines');
const wSize = wrap.offsetWidth;
const cx = wSize/2, cy = wSize/2;

// Fibonacci spiral params
const goldenAngle = 137.508; // degrees
const cards = [];

items.forEach((item, i) => {
  const n = i + 1;
  const r = 28 * Math.sqrt(n);          // radius grows with sqrt
  const theta = n * goldenAngle * Math.PI / 180;
  const x = r * Math.cos(theta);
  const y = r * Math.sin(theta);
  const scale = 0.55 + (n / items.length) * 0.45;
  const opacity = 0.4 + (n / items.length) * 0.6;
  const sz = 60 + (n / items.length) * 30;

  const card = document.createElement('div');
  card.className = 'spiral-card';
  card.style.cssText = `
    --x: ${x}px; --y: ${y}px; --s: ${scale}; --op: ${opacity};
    --w: ${sz}px; --h: ${sz}px; --accent: ${item.accent};
    --rot: ${(theta * 180/Math.PI % 30 - 15).toFixed(1)}deg;
    --delay: ${i * 0.06}s;
  `;
  card.innerHTML = `<span class="icon">${item.icon}</span><span class="label">${item.label}</span>`;
  card.addEventListener('mouseenter', () => card.classList.add('active'));
  card.addEventListener('mouseleave', () => card.classList.remove('active'));
  wrap.appendChild(card);
  cards.push({card, x, y});

  // SVG line from center
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', cx); line.setAttribute('y1', cy);
  line.setAttribute('x2', cx+x); line.setAttribute('y2', cy+y);
  svgEl.appendChild(line);
});
</script>

</body>
</html>
