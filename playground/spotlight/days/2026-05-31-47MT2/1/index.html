<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Velocity Marquee · UI Spotlight</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--surface:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);--text:#e8e8f4;--dim:#666;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif}

body{display:flex;flex-direction:column;align-items:stretch;justify-content:center;gap:0}

/* ── Marquee ── */
.track-wrap{
  overflow:hidden;padding:12px 0;border-top:1px solid var(--border);
  position:relative;
}
.track-wrap:last-of-type{border-bottom:1px solid var(--border)}

/* Fade edges */
.track-wrap::before,.track-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:120px;z-index:1;pointer-events:none;
}
.track-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent)}
.track-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent)}

.track{
  display:flex;align-items:center;gap:0;
  width:max-content;will-change:transform;
  animation:scroll var(--dur,20s) linear infinite;
}
.track-wrap.rev .track{animation-direction:reverse}
.track-wrap.paused .track{animation-play-state:paused}

@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.item{
  display:inline-flex;align-items:center;gap:16px;
  padding:0 24px;
  font-size:clamp(20px,3vw,32px);
  font-weight:700;letter-spacing:-.01em;
  white-space:nowrap;color:rgba(255,255,255,.18);
  transition:color .3s;
}
.item:hover{color:rgba(255,255,255,.95)}
.sep{color:rgba(255,255,255,.12);font-size:.8em}

/* Highlight one item per row */
.track-wrap:nth-child(1) .item:nth-child(3n){color:rgba(139,92,246,.8)}
.track-wrap:nth-child(2) .item:nth-child(4n){color:rgba(236,72,153,.8)}
.track-wrap:nth-child(3) .item:nth-child(5n){color:rgba(56,189,248,.8)}

/* ── Debug panel ── */
#dbg{
  position:fixed;top:12px;right:12px;z-index:10;
  background:rgba(10,10,18,.85);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  font-size:11px;width:170px;display:flex;flex-direction:column;gap:8px;
}
#dbg label{color:var(--dim);font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;display:block}
input[type=range]{width:100%;accent-color:#8b5cf6;cursor:pointer}

/* ── Footer ── */
#footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:7px 16px;background:rgba(5,5,8,.9);
  border-top:1px solid var(--border);
  font-size:10px;color:var(--dim);text-align:center;
}
#footer a{color:var(--dim);text-decoration:none}
#footer a:hover{color:#888}

/* ── Center label ── */
#center{
  text-align:center;padding:24px 16px;
  pointer-events:none;
}
#center h1{font-size:clamp(14px,2vw,18px);font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.15em;text-transform:uppercase}
#center p{font-size:11px;color:var(--dim);margin-top:6px}
</style>
</head>
<body>

<div class="track-wrap" id="row0">
  <div class="track" id="t0"></div>
</div>

<div id="center">
  <h1>Infinite Velocity Marquee</h1>
  <p>hover row to pause · click row to reverse direction</p>
</div>

<div class="track-wrap rev" id="row1">
  <div class="track" id="t1"></div>
</div>

<div class="track-wrap" id="row2" style="--dur:35s">
  <div class="track" id="t2"></div>
</div>

<div id="dbg">
  <div>
    <label>Speed</label>
    <input type="range" id="speed" min="5" max="60" value="20">
    <span id="speed-val" style="color:#aaa;font-size:10px">20s</span>
  </div>
  <div>
    <label>Pause on hover</label>
    <input type="checkbox" id="pause-hover" checked style="accent-color:#8b5cf6">
  </div>
</div>

<div id="footer">
  Inspired by Joe Ben Taylor · Codrops May 2026 ·
  <a href="https://tympanus.net/codrops/2026/05/28/the-never-ending-story-building-a-seamless-infinite-scroll-experience-with-gsap-lenis/" target="_blank">source</a>
   · UI Spotlight Day 1 · Drop #1
</div>

<script>
const ROWS = [
  {
    items:['VERCEL','FIGMA','STRIPE','LINEAR','NOTION','LOOM','RESEND','CLERK','SUPABASE','TURBO'],
    dur:20, rev:false
  },
  {
    items:['GSAP','THREE.JS','FRAMER','MOTION','REACT','REMIX','ASTRO','SVELTE','SOLID','QWIK'],
    dur:27, rev:true
  },
  {
    items:['ANIMATE','SCROLL','REVEAL','LOOP','TRIGGER','EASE','SPRING','SNAP','DRIFT','FLOAT'],
    dur:35, rev:false
  }
];

function buildRow(trackEl, items) {
  // Duplicate items so the scroll loop works seamlessly (need 2× content)
  const full = [...items, ...items, ...items, ...items]; // 4× for safety
  full.forEach((label, i) => {
    const span = document.createElement('span');
    span.className = 'item';
    span.textContent = label;
    if (i % items.length !== items.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'sep'; sep.textContent = '·';
      trackEl.appendChild(span); trackEl.appendChild(sep);
    } else {
      trackEl.appendChild(span);
    }
  });
}

ROWS.forEach((row, i) => {
  const trackEl = document.getElementById(`t${i}`);
  buildRow(trackEl, row.items);
  const wrap = document.getElementById(`row${i}`);
  wrap.style.setProperty('--dur', row.dur + 's');
});

// Hover to pause
document.querySelectorAll('.track-wrap').forEach(wrap => {
  wrap.addEventListener('mouseenter', () => {
    if (document.getElementById('pause-hover').checked) wrap.classList.add('paused');
  });
  wrap.addEventListener('mouseleave', () => wrap.classList.remove('paused'));
  // Click to toggle reverse
  wrap.addEventListener('click', () => wrap.classList.toggle('rev'));
});

// Speed slider
document.getElementById('speed').addEventListener('input', function() {
  const v = +this.value;
  document.getElementById('speed-val').textContent = v + 's';
  document.querySelectorAll('.track').forEach((t, i) => {
    const base = ROWS[i].dur;
    const ratio = 20 / v; // 20 is default
    t.style.animationDuration = (base / ratio) + 's';
  });
});
</script>
</body>
</html>
