<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UI Spotlight — Day 1 · jccl.me</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070b;--surface:#0e0e14;--card:#11111a;
  --border:rgba(255,255,255,.07);--text:#e8e8f0;--dim:#666;
  --accent:#e66465;--r:14px;--bar:52px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}

/* ── Header ── */
#header{
  position:sticky;top:0;z-index:50;
  background:rgba(7,7,11,.9);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.hd-left h1{font-size:16px;font-weight:700;margin-bottom:3px}
.hd-left p{font-size:11px;color:var(--dim)}
.hd-meta{display:flex;align-items:center;gap:8px}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.07em;
  padding:3px 9px;border-radius:20px;
  background:rgba(230,100,101,.12);color:var(--accent);
  border:1px solid rgba(230,100,101,.2);
}
.day-tag{
  font-size:10px;color:var(--dim);letter-spacing:.06em;
  background:#111;border:1px solid var(--border);border-radius:6px;
  padding:3px 9px;
}

/* ── Grid ── */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(400px,100%),1fr));
  gap:16px;
  padding:20px;
  max-width:1400px;
  margin:0 auto;
}

/* ── Card ── */
.drop-card{
  border-radius:var(--r);border:1px solid var(--border);
  overflow:hidden;background:var(--card);
  display:flex;flex-direction:column;
  transition:border-color .2s,box-shadow .2s;
  cursor:pointer;
}
.drop-card:hover{
  border-color:rgba(255,255,255,.14);
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}

/* Preview iframe */
.preview-wrap{
  position:relative;
  height:260px;
  overflow:hidden;
  background:#000;
  flex-shrink:0;
}
.preview-wrap iframe{
  width:100%;height:100%;border:none;
  pointer-events:none;
  transform-origin:top left;
}
.preview-overlay{
  position:absolute;inset:0;
  background:transparent;
  transition:background .2s;
  display:flex;align-items:center;justify-content:center;
}
.drop-card:hover .preview-overlay{background:rgba(0,0,0,.3)}
.open-btn{
  opacity:0;transform:scale(.85);
  background:rgba(255,255,255,.9);color:#000;
  border:none;border-radius:8px;padding:8px 18px;
  font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:opacity .2s,transform .2s;
}
.drop-card:hover .open-btn{opacity:1;transform:scale(1)}

/* Card info */
.card-body{padding:14px 16px}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bucket-tag{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;border:1px solid;
}
.drop-num{font-size:10px;color:var(--dim)}
.card-title{font-size:15px;font-weight:700;margin-bottom:5px}
.card-desc{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:10px}
.tech-row{display:flex;flex-wrap:wrap;gap:4px}
.tech-tag{
  font-size:10px;background:#111;border:1px solid var(--border);
  border-radius:4px;padding:2px 7px;color:var(--dim);
}

/* Bucket colors */
.animation  {color:#f59e0b;border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
.layout     {color:#6366f1;border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.08)}
.typography {color:#22d3ee;border-color:rgba(34,211,238,.3);background:rgba(34,211,238,.08)}
.micro-interaction{color:#f43f5e;border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.08)}
.component  {color:#a3e635;border-color:rgba(163,230,53,.3);background:rgba(163,230,53,.08)}

/* ── Fullscreen modal ── */
#modal{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  flex-direction:column;
}
#modal.open{display:flex}
#modal-bar{
  flex-shrink:0;height:48px;background:#080810;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
#modal-title{font-size:14px;font-weight:600}
#modal-close{
  background:transparent;border:none;color:var(--dim);
  font-size:18px;cursor:pointer;font-family:inherit;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .2s;
}
#modal-close:hover{background:#1a1a24;color:var(--text)}
#modal-frame{flex:1;border:none}

/* ── Footer ── */
#footer{
  text-align:center;padding:20px;font-size:11px;color:var(--dim);
  border-top:1px solid var(--border);margin-top:8px;
}

/* Mobile */
@media(max-width:500px){
  #grid{padding:12px;gap:12px}
  .preview-wrap{height:200px}
}
</style>
</head>
<body>

<div id="header">
  <div class="hd-left">
    <h1>UI Spotlight — Day 1</h1>
    <p>Marquee · Bento · Flip Text · Gravity Cursor · Toast Stack</p>
  </div>
  <div class="hd-meta">
    <span class="badge">5 Drops</span>
    <span class="day-tag">2026-05-31</span>
  </div>
</div>

<div id="grid"></div>

<div id="footer">
  UI Spotlight Day 1 · jccl.me ·
  <a href="../../" style="color:var(--dim)">← Back to Playground</a>
</div>

<!-- Fullscreen modal -->
<div id="modal">
  <div id="modal-bar">
    <span id="modal-title">—</span>
    <button id="modal-close" onclick="closeModal()">✕</button>
  </div>
  <iframe id="modal-frame" title="Drop demo"></iframe>
</div>

<script>
const DROPS = [
  {
    id:'1', bucket:'animation',
    title:'Infinite Velocity Marquee',
    desc:'Three rows of brand names scroll at different speeds in alternating directions. Hover to pause, click to reverse.',
    tech:['CSS animation','IntersectionObserver','Pointer events'],
    src:'1/index.html',
  },
  {
    id:'2', bucket:'layout',
    title:'Bento Grid Hover-Expand',
    desc:'CSS Grid bento layout where hovering any card pops it forward and dims the rest with smooth spring-like transitions.',
    tech:['CSS Grid','CSS transform','CSS :has()'],
    src:'2/index.html',
  },
  {
    id:'3', bucket:'typography',
    title:'Split-Flap Word Cycler',
    desc:'Airport departure board–style flip animation cycling through phrases. Multiple independent displays with staggered timing.',
    tech:['CSS 3D transforms','CSS backface-visibility','JS timers'],
    src:'3/index.html',
  },
  {
    id:'4', bucket:'micro-interaction',
    title:'Gravity Particle Cursor',
    desc:'Moving the cursor spawns particles that arc, fall under configurable gravity, and bounce off the floor with decreasing energy.',
    tech:['Canvas 2D','requestAnimationFrame','Pointer events'],
    src:'4/index.html',
  },
  {
    id:'5', bucket:'component',
    title:'Sonner-Style Toast Stack',
    desc:'Glassmorphic notifications that stack in 3D depth. Newest toast is front; older ones compress behind. Drag right to dismiss.',
    tech:['CSS backdrop-filter','Pointer events','CSS spring transitions'],
    src:'5/index.html',
  },
];

const grid = document.getElementById('grid');

DROPS.forEach(drop => {
  const card = document.createElement('div');
  card.className = 'drop-card';
  card.innerHTML = `
    <div class="preview-wrap">
      <iframe src="${drop.src}" title="${drop.title}" loading="lazy" scrolling="no"
        sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="preview-overlay">
        <button class="open-btn">Open fullscreen →</button>
      </div>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="bucket-tag ${drop.bucket}">${drop.bucket}</span>
        <span class="drop-num">Drop #${drop.id}</span>
      </div>
      <div class="card-title">${drop.title}</div>
      <div class="card-desc">${drop.desc}</div>
      <div class="tech-row">
        ${drop.tech.map(t=>`<span class="tech-tag">${t}</span>`).join('')}
      </div>
    </div>`;
  card.addEventListener('click', () => openModal(drop));
  grid.appendChild(card);
});

function openModal(drop) {
  document.getElementById('modal-title').textContent = drop.title;
  document.getElementById('modal-frame').src = drop.src;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-frame').src = '';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
