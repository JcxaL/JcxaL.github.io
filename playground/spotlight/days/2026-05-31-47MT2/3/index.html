<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split-Flap Word Cycler · UI Spotlight</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060608;--card:#0e0e14;--border:rgba(255,255,255,.08);
  --text:#e8e8f0;--dim:#555;--accent:#f59e0b;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  padding:60px 20px 50px}

/* ── Intro text ── */
.intro{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}

/* ── Display row ── */
.display-row{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:6px 2px;
  max-width:900px;
}
.label{font-size:clamp(12px,2vw,16px);color:var(--dim);letter-spacing:.04em;margin-right:10px}

/* ── Flip slot ── */
.flip-slot{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  width:auto;min-width:120px;height:76px;
  perspective:600px;
  overflow:hidden;
}

.flip-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
}

.flip-face{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  backface-visibility:hidden;
  padding:0 18px;
}
.flip-face.back{transform:rotateX(-90deg);transform-origin:center top}

.flip-text{
  font-size:clamp(22px,4vw,42px);
  font-weight:800;
  letter-spacing:-.02em;
  color:var(--text);
  white-space:nowrap;
}

/* Active flip animation */
.flip-slot.flipping .flip-face.front{
  animation:flipOut .28s ease-in forwards;
}
.flip-slot.flipping .flip-face.back{
  animation:flipIn .28s ease-out .22s forwards;
  transform:rotateX(-90deg);
}

@keyframes flipOut{
  from{transform:rotateX(0deg)}
  to  {transform:rotateX(90deg);opacity:.3}
}
@keyframes flipIn{
  from{transform:rotateX(-90deg);opacity:.3}
  to  {transform:rotateX(0deg)}
}

/* Glow under active slot */
.flip-slot::after{
  content:'';position:absolute;bottom:-4px;left:10%;right:10%;height:2px;
  background:var(--accent);border-radius:1px;
  opacity:0;transition:opacity .3s;
}
.flip-slot.flipping::after{opacity:.9}

/* Sub-labels */
.slot-label{
  position:absolute;bottom:6px;right:10px;
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
}

/* ── Live counter ── */
#counter{
  font-size:11px;color:var(--dim);letter-spacing:.08em;
}

/* ── Debug panel ── */
#dbg{
  position:fixed;top:12px;right:12px;
  background:rgba(6,6,8,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:11px;width:170px;
  display:flex;flex-direction:column;gap:8px;z-index:10;
}
#dbg label{color:var(--dim);font-size:10px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:2px}
input[type=range]{width:100%;accent-color:var(--accent)}

/* ── Footer ── */
#footer{position:fixed;bottom:0;left:0;right:0;padding:7px 16px;
  background:rgba(6,6,8,.9);border-top:1px solid var(--border);
  font-size:10px;color:var(--dim);text-align:center}
#footer a{color:var(--dim);text-decoration:none}
#footer a:hover{color:#aaa}
</style>
</head>
<body>

<div class="intro">Split-Flap Word Cycler</div>

<!-- Row 1 -->
<div class="display-row">
  <span class="label">WE</span>
  <div class="flip-slot" id="slot0"><div class="flip-inner"><div class="flip-face front"><span class="flip-text">BUILD</span></div><div class="flip-face back"><span class="flip-text"></span></div></div><span class="slot-label">verb</span></div>
  <span class="label" style="margin:0 6px">FOR THE</span>
  <div class="flip-slot" id="slot1"><div class="flip-inner"><div class="flip-face front"><span class="flip-text">WEB</span></div><div class="flip-face back"><span class="flip-text"></span></div></div><span class="slot-label">noun</span></div>
</div>

<!-- Row 2 -->
<div class="display-row">
  <span class="label">EVERY DAY IS</span>
  <div class="flip-slot" id="slot2" style="min-width:160px"><div class="flip-inner"><div class="flip-face front" style="background:#0c0c10"><span class="flip-text" style="color:#f59e0b">DIFFERENT</span></div><div class="flip-face back" style="background:#0c0c10"><span class="flip-text" style="color:#f59e0b"></span></div></div></div>
</div>

<!-- Row 3 -->
<div class="display-row">
  <div class="flip-slot" id="slot3"><div class="flip-inner"><div class="flip-face front"><span class="flip-text">DESIGN</span></div><div class="flip-face back"><span class="flip-text"></span></div></div></div>
  <span class="label" style="margin:0 6px">·</span>
  <div class="flip-slot" id="slot4"><div class="flip-inner"><div class="flip-face front"><span class="flip-text">CODE</span></div><div class="flip-face back"><span class="flip-text"></span></div></div></div>
  <span class="label" style="margin:0 6px">·</span>
  <div class="flip-slot" id="slot5"><div class="flip-inner"><div class="flip-face front"><span class="flip-text">SHIP</span></div><div class="flip-face back"><span class="flip-text"></span></div></div></div>
</div>

<div id="counter">Flip #<span id="flip-count">0</span></div>

<div id="dbg">
  <div>
    <label>Speed (ms)</label>
    <input type="range" id="speed" min="600" max="5000" value="2000" step="100">
    <span id="speed-val" style="color:#aaa;font-size:10px">2.0s</span>
  </div>
  <div>
    <label>Stagger (ms)</label>
    <input type="range" id="stagger" min="0" max="1000" value="300" step="50">
    <span id="stagger-val" style="color:#aaa;font-size:10px">300ms</span>
  </div>
</div>

<div id="footer">
  Inspired by jmarellanes ·
  <a href="https://github.com/jmarellanes/gsap__section--team-reveal" target="_blank">gsap__section--team-reveal</a>
   · UI Spotlight Day 1 · Drop #3
</div>

<script>
const WORDS = [
  ['BUILD','CREATE','SHIP','CRAFT','LAUNCH','MAKE','PUSH'],
  ['WEB','FUTURE','WORLD','PEOPLE','DREAMS','TOMORROW','SPEED'],
  ['DIFFERENT','BETTER','WILDER','BOLDER','FASTER','RICHER','FRESH'],
  ['DESIGN','MOTION','BEAUTY','RHYTHM','FOCUS','CLARITY','CRAFT'],
  ['CODE','SHIP','BUILD','LOOP','HACK','TEST','DEPLOY'],
  ['SHIP','LEARN','GROW','SHIP','REST','SHIP','WIN'],
];

const SLOTS = [0,1,2,3,4,5].map(i => document.getElementById(`slot${i}`));
const indices = [0,0,0,0,0,0];
let flipCount = 0;
let interval = 2000, stagger = 300;
let timers = [];

function flipSlot(slotEl, newText, wordlistIdx) {
  const back = slotEl.querySelector('.flip-face.back .flip-text');
  back.textContent = newText;

  slotEl.classList.remove('flipping');
  void slotEl.offsetWidth; // reflow
  slotEl.classList.add('flipping');

  setTimeout(() => {
    slotEl.querySelector('.flip-face.front .flip-text').textContent = newText;
    slotEl.classList.remove('flipping');
  }, 600);
}

function runCycle() {
  SLOTS.forEach((slot, i) => {
    const t = setTimeout(() => {
      indices[i] = (indices[i] + 1) % WORDS[i].length;
      flipSlot(slot, WORDS[i][indices[i]], i);
      if (i === SLOTS.length - 1) {
        flipCount++;
        document.getElementById('flip-count').textContent = flipCount;
      }
    }, i * stagger);
    timers.push(t);
  });
}

let mainTimer;
function startCycle() {
  timers.forEach(clearTimeout); timers = [];
  clearInterval(mainTimer);
  runCycle();
  mainTimer = setInterval(runCycle, interval);
}

startCycle();

document.getElementById('speed').addEventListener('input', function() {
  interval = +this.value;
  document.getElementById('speed-val').textContent = (interval/1000).toFixed(1) + 's';
  startCycle();
});

document.getElementById('stagger').addEventListener('input', function() {
  stagger = +this.value;
  document.getElementById('stagger-val').textContent = stagger + 'ms';
});

// Click slot to manually flip
SLOTS.forEach((slot, i) => {
  slot.addEventListener('click', () => {
    indices[i] = (indices[i] + 1) % WORDS[i].length;
    flipSlot(slot, WORDS[i][indices[i]], i);
  });
});
</script>
</body>
</html>
