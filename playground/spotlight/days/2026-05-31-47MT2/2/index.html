<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Grid Hover-Expand · UI Spotlight</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--surface:#0e0e14;--card:#12121a;
  --border:rgba(255,255,255,.07);--text:#e8e8f0;--dim:#666;
  --accent1:#6366f1;--accent2:#22d3ee;--accent3:#f43f5e;--accent4:#a3e635;
  --r:16px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:16px}

/* ── Bento grid ── */
.bento{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(3,130px);
  gap:10px;
  width:100%;max-width:900px;
  transition:gap .4s ease;
}

.card{
  border-radius:var(--r);
  background:var(--card);
  border:1px solid var(--border);
  padding:20px;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:
    transform .4s cubic-bezier(.34,1.56,.64,1),
    box-shadow .4s ease,
    opacity .4s ease,
    border-color .4s ease;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 30%,var(--glow,transparent) 0%,transparent 70%);
  opacity:.6;pointer-events:none;
}

/* Grid placement */
.c1{grid-column:1/3;grid-row:1/2}
.c2{grid-column:3/4;grid-row:1/2}
.c3{grid-column:4/5;grid-row:1/3}
.c4{grid-column:1/2;grid-row:2/3}
.c5{grid-column:2/4;grid-row:2/4}
.c6{grid-column:1/2;grid-row:3/4}
.c7{grid-column:4/5;grid-row:3/4}

/* Hover: focused card pops, others dim */
.bento:hover .card:not(:hover){
  transform:scale(.96);
  opacity:.45;
  border-color:transparent;
}
.card:hover{
  transform:scale(1.03) translateZ(0);
  box-shadow:0 24px 60px rgba(0,0,0,.5);
  border-color:rgba(255,255,255,.15) !important;
  opacity:1 !important;
  z-index:2;
}

/* Card content */
.card-icon{
  position:absolute;top:18px;right:18px;
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  background:rgba(255,255,255,.06);
}
.card-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.card-title{font-size:clamp(16px,2.5vw,24px);font-weight:700;line-height:1.2}
.card-sub{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.4}

/* Accent glows */
.c1{--glow:rgba(99,102,241,.4);background:linear-gradient(135deg,#0d0d1a 0%,#12123a 100%)}
.c2{--glow:rgba(34,211,238,.3);background:linear-gradient(135deg,#070e12 0%,#0a2030 100%)}
.c3{--glow:rgba(244,63,94,.3);background:linear-gradient(135deg,#12080a 0%,#2a0c14 100%)}
.c4{--glow:rgba(163,230,53,.3);background:linear-gradient(135deg,#0c1206 0%,#162010 100%)}
.c5{background:linear-gradient(135deg,#0c0c14 0%,#181828 100%)}
.c6{--glow:rgba(251,191,36,.3);background:linear-gradient(135deg,#120d04 0%,#241a06 100%)}
.c7{--glow:rgba(139,92,246,.3);background:linear-gradient(135deg,#0e0a18 0%,#1a1030 100%)}

/* Stat card */
.stat{font-size:clamp(28px,5vw,52px);font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.4) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

/* Chart bar */
.bars{display:flex;align-items:flex-end;gap:4px;height:50px;margin-top:8px}
.bar{flex:1;background:rgba(255,255,255,.15);border-radius:3px 3px 0 0;
  transition:background .3s}
.card:hover .bar{background:rgba(99,102,241,.6)}

/* Activity dots */
.dots{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.dot{aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,.08)}
.dot.on{background:rgba(163,230,53,.7)}

/* Debug panel */
#dbg{
  position:fixed;top:12px;right:12px;z-index:10;
  background:rgba(8,8,12,.9);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.07);border-radius:10px;
  padding:12px 14px;font-size:11px;width:160px;
  display:flex;flex-direction:column;gap:8px;
}
#dbg label{color:var(--dim);font-size:10px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:2px}
select{width:100%;background:#111;border:1px solid rgba(255,255,255,.1);color:var(--text);
  border-radius:5px;padding:3px 6px;font-size:11px;font-family:inherit;cursor:pointer}

/* Footer */
#footer{position:fixed;bottom:0;left:0;right:0;padding:7px 16px;
  background:rgba(8,8,12,.9);border-top:1px solid rgba(255,255,255,.06);
  font-size:10px;color:var(--dim);text-align:center}
#footer a{color:var(--dim);text-decoration:none}
#footer a:hover{color:#aaa}
</style>
</head>
<body>

<div class="bento" id="bento">
  <!-- Card 1: Wide stat -->
  <div class="card c1">
    <div class="card-icon">⚡</div>
    <div class="card-label">Performance</div>
    <div class="card-title">99 <span style="font-size:.55em;opacity:.5">Lighthouse</span></div>
    <div class="bars">
      <div class="bar" style="height:40%"></div><div class="bar" style="height:70%"></div>
      <div class="bar" style="height:55%"></div><div class="bar" style="height:90%"></div>
      <div class="bar" style="height:100%"></div><div class="bar" style="height:85%"></div>
      <div class="bar" style="height:95%"></div>
    </div>
  </div>

  <!-- Card 2 -->
  <div class="card c2">
    <div class="card-icon">🌊</div>
    <div class="card-label">Requests / min</div>
    <div class="stat">2.4M</div>
  </div>

  <!-- Card 3: Tall -->
  <div class="card c3">
    <div class="card-icon">🎯</div>
    <div class="card-label">Uptime</div>
    <div class="stat" style="font-size:3em">99.99<span style="font-size:.4em">%</span></div>
    <div class="card-sub">Last 90 days · zero incidents</div>
  </div>

  <!-- Card 4 -->
  <div class="card c4">
    <div class="card-icon">🌍</div>
    <div class="card-label">Edge Regions</div>
    <div class="stat" style="font-size:2.5em">42</div>
  </div>

  <!-- Card 5: Wide mid -->
  <div class="card c5">
    <div class="card-icon">📊</div>
    <div class="card-label">Daily Active Commits</div>
    <div class="card-title">Code Activity</div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- Card 6 -->
  <div class="card c6">
    <div class="card-icon">☀️</div>
    <div class="card-label">Build Time</div>
    <div class="stat" style="font-size:2em">0.9s</div>
  </div>

  <!-- Card 7 -->
  <div class="card c7">
    <div class="card-icon">🔮</div>
    <div class="card-label">AI Score</div>
    <div class="stat" style="font-size:2.5em">A+</div>
  </div>
</div>

<div id="dbg">
  <div>
    <label>Hover Effect</label>
    <select id="effect">
      <option value="scale">Scale + Dim</option>
      <option value="blur">Blur + Dim</option>
      <option value="glow">Glow Focus</option>
    </select>
  </div>
  <div>
    <label>Gap Size</label>
    <input type="range" id="gap" min="4" max="24" value="10" style="width:100%;accent-color:#6366f1">
    <span id="gap-val" style="color:#aaa;font-size:10px">10px</span>
  </div>
</div>

<div id="footer">
  Inspired by Nathan-coder691 ·
  <a href="https://github.com/Nathan-coder691/Bento-grid" target="_blank">Bento-grid</a>
  · UI Spotlight Day 1 · Drop #2
</div>

<script>
// Build activity dots
const dots = document.getElementById('dots');
for (let i = 0; i < 35; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (Math.random() > 0.45 ? ' on' : '');
  dots.appendChild(d);
}

// Effect selector
document.getElementById('effect').addEventListener('change', function() {
  const bento = document.getElementById('bento');
  bento.dataset.effect = this.value;

  document.querySelectorAll('.card').forEach(card => {
    card.style.filter = '';
    card.style.boxShadow = '';
  });

  // Apply via hover states dynamically
  const styleId = 'effect-style';
  let style = document.getElementById(styleId);
  if (!style) { style = document.createElement('style'); style.id = styleId; document.head.appendChild(style); }

  if (this.value === 'blur') {
    style.textContent = '.bento:hover .card:not(:hover){filter:blur(2px) brightness(.5)!important;transform:scale(.98)!important}';
  } else if (this.value === 'glow') {
    style.textContent = '.card:hover{box-shadow:0 0 0 2px rgba(99,102,241,.6),0 24px 60px rgba(0,0,0,.6)!important}' +
                        '.bento:hover .card:not(:hover){opacity:.3!important;transform:scale(.97)!important}';
  } else {
    style.textContent = '';
  }
});

// Gap slider
document.getElementById('gap').addEventListener('input', function() {
  document.getElementById('bento').style.gap = this.value + 'px';
  document.getElementById('gap-val').textContent = this.value + 'px';
});
</script>
</body>
</html>
