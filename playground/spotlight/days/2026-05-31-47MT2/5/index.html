<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stacked Toast System · UI Spotlight</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--surface:#0d0d14;--border:rgba(255,255,255,.08);
  --text:#e8e8f0;--dim:#666;
  --success:#10b981;--error:#ef4444;--warning:#f59e0b;--info:#6366f1;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  padding:60px 20px 60px}

/* ── Button panel ── */
.btn-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
  width:100%;max-width:320px;
}
.btn{
  padding:11px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:var(--surface);color:var(--text);
  font-size:13px;font-weight:500;font-family:inherit;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;
  justify-content:center;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.btn-s{border-color:var(--success);color:var(--success)}
.btn-s:hover{background:rgba(16,185,129,.1)}
.btn-e{border-color:var(--error);color:var(--error)}
.btn-e:hover{background:rgba(239,68,68,.1)}
.btn-w{border-color:var(--warning);color:var(--warning)}
.btn-w:hover{background:rgba(245,158,11,.1)}
.btn-i{border-color:var(--info);color:var(--info)}
.btn-i:hover{background:rgba(99,102,241,.1)}

.hint-text{font-size:12px;color:var(--dim);letter-spacing:.04em;text-align:center}

/* ── Toast container ── */
#toast-container{
  position:fixed;bottom:60px;right:20px;
  display:flex;flex-direction:column;align-items:flex-end;
  width:min(360px,calc(100vw - 32px));
  pointer-events:none;
}

/* ── Toast ── */
.toast{
  position:absolute;bottom:0;right:0;
  width:100%;
  background:rgba(13,13,20,.92);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  backdrop-filter:blur(16px);
  pointer-events:all;
  cursor:grab;
  user-select:none;
  transition:
    transform .35s cubic-bezier(.34,1.28,.64,1),
    opacity   .35s ease,
    box-shadow .35s ease;
  will-change:transform,opacity;
  touch-action:pan-y;
}
.toast:active{cursor:grabbing}

.toast-inner{display:flex;align-items:flex-start;gap:12px}
.toast-icon{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  margin-top:1px;
}
.toast-body{flex:1;min-width:0}
.toast-title{font-size:13px;font-weight:600;margin-bottom:3px}
.toast-msg{font-size:12px;color:var(--dim);line-height:1.4}
.toast-close{
  width:20px;height:20px;border-radius:50%;border:none;
  background:rgba(255,255,255,.06);color:var(--dim);cursor:pointer;
  font-size:11px;display:flex;align-items:center;justify-content:center;
  font-family:inherit;flex-shrink:0;transition:background .2s;
}
.toast-close:hover{background:rgba(255,255,255,.12);color:var(--text)}

/* Progress bar */
.toast-progress{
  height:2px;border-radius:1px;margin-top:10px;
  background:rgba(255,255,255,.08);overflow:hidden;
}
.toast-bar{height:100%;width:100%;transform-origin:left;background:currentColor;
  border-radius:1px;transition:transform linear}

/* Toast types */
.toast-s .toast-icon{background:rgba(16,185,129,.15);color:var(--success)}
.toast-s .toast-bar{color:var(--success)}
.toast-e .toast-icon{background:rgba(239,68,68,.15);color:var(--error)}
.toast-e .toast-bar{color:var(--error)}
.toast-w .toast-icon{background:rgba(245,158,11,.15);color:var(--warning)}
.toast-w .toast-bar{color:var(--warning)}
.toast-i .toast-icon{background:rgba(99,102,241,.15);color:var(--info)}
.toast-i .toast-bar{color:var(--info)}

/* Entering animation */
.toast.entering{
  animation:toastIn .4s cubic-bezier(.34,1.28,.64,1) forwards;
}
@keyframes toastIn{
  from{opacity:0;transform:translateY(20px) scale(.95)}
  to  {opacity:1;transform:translateY(0) scale(1)}
}

/* Swipe dismiss indicator */
.toast.dismissing{transition:transform .2s ease,opacity .2s ease}

/* ── Debug ── */
#dbg{
  position:fixed;top:12px;right:12px;z-index:20;
  background:rgba(5,5,8,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:11px;width:170px;
  display:flex;flex-direction:column;gap:8px;color:#ccc;
}
#dbg label{color:var(--dim);font-size:10px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:2px}
input[type=range]{width:100%;accent-color:#6366f1;cursor:pointer}
.val{color:#aaa;font-size:10px}

/* ── Footer ── */
#footer{position:fixed;bottom:0;left:0;right:0;padding:7px 16px;
  background:rgba(5,5,8,.9);border-top:1px solid var(--border);
  font-size:10px;color:var(--dim);text-align:center;z-index:10}
#footer a{color:var(--dim);text-decoration:none}
#footer a:hover{color:#aaa}
</style>
</head>
<body>

<div class="hint-text">Sonner-style stacked toast system</div>

<div class="btn-grid">
  <button class="btn btn-s" onclick="addToast('success')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Success
  </button>
  <button class="btn btn-e" onclick="addToast('error')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Error
  </button>
  <button class="btn btn-w" onclick="addToast('warning')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    Warning
  </button>
  <button class="btn btn-i" onclick="addToast('info')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Info
  </button>
</div>

<div class="hint-text" style="font-size:11px">swipe right to dismiss · auto-clears after 5s</div>

<div id="toast-container"></div>

<div id="dbg">
  <div>
    <label>Stack Offset (px)</label>
    <input type="range" id="sl-offset" min="4" max="20" value="10">
    <span class="val" id="v-offset">10px</span>
  </div>
  <div>
    <label>Stack Scale</label>
    <input type="range" id="sl-scale" min="1" max="10" value="4">
    <span class="val" id="v-scale">0.04</span>
  </div>
  <div>
    <label>Auto-dismiss (s)</label>
    <input type="range" id="sl-dur" min="2" max="12" value="5">
    <span class="val" id="v-dur">5s</span>
  </div>
</div>

<div id="footer">
  Inspired by archieamas11 ·
  <a href="https://github.com/archieamas11/stacked-toast" target="_blank">stacked-toast</a>
   · UI Spotlight Day 1 · Drop #5
</div>

<script>
const container = document.getElementById('toast-container');
let toasts = [];
let stackOffset = 10, stackScale = 0.04, dismissDur = 5000;

const TYPES = {
  success:{ cls:'toast-s', icon:'✓', title:'Changes saved', msg:'Your work has been saved successfully.' },
  error:  { cls:'toast-e', icon:'✕', title:'Something went wrong', msg:'Unable to complete the request. Try again.' },
  warning:{ cls:'toast-w', icon:'⚠', title:'Heads up', msg:'This action may have unintended consequences.' },
  info:   { cls:'toast-i', icon:'i', title:'Just so you know', msg:'A new version is available for download.' },
};

function addToast(type) {
  const cfg = TYPES[type];
  const el = document.createElement('div');
  el.className = `toast ${cfg.cls} entering`;

  el.innerHTML = `
    <div class="toast-inner">
      <div class="toast-icon">${cfg.icon}</div>
      <div class="toast-body">
        <div class="toast-title">${cfg.title}</div>
        <div class="toast-msg">${cfg.msg}</div>
      </div>
      <button class="toast-close" onclick="removeToast('${Date.now()}')">✕</button>
    </div>
    <div class="toast-progress"><div class="toast-bar"></div></div>`;

  const id = Date.now() + Math.random();
  el.dataset.id = id;
  el.querySelector('.toast-close').onclick = () => removeById(id);

  toasts.unshift({ id, el, type });
  container.appendChild(el);

  // Start progress bar
  const bar = el.querySelector('.toast-bar');
  requestAnimationFrame(() => {
    bar.style.transition = `transform ${dismissDur}ms linear`;
    bar.style.transform = 'scaleX(0)';
  });

  // Auto dismiss
  const timer = setTimeout(() => removeById(id), dismissDur + 100);
  toasts[0].timer = timer;

  updateStack();
  setupDrag(el, id);

  setTimeout(() => el.classList.remove('entering'), 400);
}

function removeById(id) {
  const idx = toasts.findIndex(t => t.id === id);
  if (idx === -1) return;
  const {el, timer} = toasts[idx];
  clearTimeout(timer);
  el.style.opacity = '0';
  el.style.transform += ' translateY(-10px)';
  el.style.transition = 'opacity .2s ease, transform .2s ease';
  setTimeout(() => { el.remove(); toasts.splice(idx, 1); updateStack(); }, 220);
}

function updateStack() {
  toasts.forEach((t, i) => {
    const scale = 1 - i * stackScale;
    const y = -i * stackOffset;
    const opacity = i >= 4 ? 0 : Math.max(0, 1 - i * 0.25);
    t.el.style.transform = `translateY(${y}px) scale(${scale})`;
    t.el.style.opacity = opacity;
    t.el.style.zIndex = toasts.length - i;
    t.el.style.boxShadow = i === 0 ? '0 8px 40px rgba(0,0,0,.5)' : 'none';
  });
  container.style.height = (toasts.length > 0 ? (toasts[0].el.offsetHeight + stackOffset * Math.min(toasts.length - 1, 3)) : 0) + 'px';
}

// Drag to dismiss
function setupDrag(el, id) {
  let startX = 0, curX = 0, dragging = false;

  el.addEventListener('pointerdown', e => {
    startX = e.clientX; dragging = true;
    el.setPointerCapture(e.pointerId);
    el.style.transition = 'none';
  });
  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    curX = e.clientX - startX;
    if (curX < 0) curX = 0; // only dismiss right
    const idx = toasts.findIndex(t => t.id === id);
    const baseY = -idx * stackOffset;
    el.style.transform = `translateY(${baseY}px) translateX(${curX}px) scale(${1 - idx * stackScale})`;
    el.style.opacity = 1 - curX / (el.offsetWidth * 0.8);
  });
  el.addEventListener('pointerup', () => {
    dragging = false;
    if (curX > el.offsetWidth * 0.35) {
      removeById(id);
    } else {
      el.style.transition = 'transform .3s cubic-bezier(.34,1.28,.64,1), opacity .3s ease';
      updateStack();
    }
    curX = 0;
  });
}

// Sliders
document.getElementById('sl-offset').addEventListener('input', function() {
  stackOffset = +this.value;
  document.getElementById('v-offset').textContent = this.value + 'px';
  updateStack();
});
document.getElementById('sl-scale').addEventListener('input', function() {
  stackScale = +this.value / 100;
  document.getElementById('v-scale').textContent = (stackScale).toFixed(2);
  updateStack();
});
document.getElementById('sl-dur').addEventListener('input', function() {
  dismissDur = +this.value * 1000;
  document.getElementById('v-dur').textContent = this.value + 's';
});

// Demo: show one on load
setTimeout(() => addToast('info'), 300);
</script>
</body>
</html>
