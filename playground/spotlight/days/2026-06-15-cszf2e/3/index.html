<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG feTurbulence Liquid Text</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07060e;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;overflow:hidden;user-select:none;cursor:none}

.stage{
  position:relative;width:min(700px,95vw);
  display:flex;flex-direction:column;
  align-items:center;gap:clamp(24px,4vh,40px);
  padding:20px 0;
}

.svg-wrap{width:100%;overflow:visible}
.svg-wrap svg{overflow:visible;width:100%;height:auto}

text{
  font-family:system-ui,sans-serif;
  font-weight:900;
  text-anchor:middle;
  dominant-baseline:middle;
}

.t1{font-size:72px;fill:url(#g1);filter:url(#warp1)}
.t2{font-size:60px;fill:url(#g2);filter:url(#warp2)}
.t3{font-size:56px;fill:url(#g3);filter:url(#warp3)}

/* Custom cursor */
.cursor{
  position:fixed;pointer-events:none;z-index:999;
  width:20px;height:20px;margin:-10px 0 0 -10px;
  border:2px solid rgba(200,180,255,.6);border-radius:50%;
  transition:transform .1s ease,width .2s,height .2s,margin .2s;
  mix-blend-mode:screen;
}

/* Controls */
.ctrl{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.btn{padding:6px 16px;border:1px solid #1e1840;border-radius:20px;background:#100e20;color:#8060cc;font-size:.78rem;cursor:pointer;transition:all .2s;user-select:none}
.btn:hover,.btn.active{border-color:#7050ff;color:#c0a0ff;background:#1a1630}

.panel{position:fixed;top:14px;right:14px;background:rgba(7,6,16,.9);border:1px solid #1a1640;border-radius:8px;padding:10px 14px;font-size:.72rem;color:#3a3060;backdrop-filter:blur(8px)}
.panel b{color:#8060cc}
footer{position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:.65rem;color:#1e1840}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<div class="stage">
  <div class="svg-wrap">
    <svg viewBox="0 0 700 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#c084fc"/>
          <stop offset="50%" stop-color="#60a5fa"/>
          <stop offset="100%" stop-color="#f472b6"/>
        </linearGradient>
        <filter id="warp1" x="-20%" y="-80%" width="140%" height="260%">
          <feTurbulence type="turbulence" baseFrequency="0.03 0.015" numOctaves="4" seed="1" result="noise">
            <animate attributeName="baseFrequency" values="0.03 0.015;0.055 0.03;0.03 0.015" dur="6s" repeatCount="indefinite"/>
            <animate attributeName="seed" values="1;5;1" dur="11s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" result="displaced">
            <animate attributeName="scale" values="0;28;0" dur="6s" repeatCount="indefinite"/>
          </feDisplacementMap>
        </filter>
      </defs>
      <text class="t1" x="350" y="50">LIQUID</text>
    </svg>
  </div>

  <div class="svg-wrap">
    <svg viewBox="0 0 700 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#22d3ee"/>
          <stop offset="50%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#22d3ee"/>
          <animateTransform attributeName="gradientTransform" type="rotate" values="0 0.5 0.5;360 0.5 0.5" dur="4s" repeatCount="indefinite"/>
        </linearGradient>
        <filter id="warp2" x="-20%" y="-80%" width="140%" height="260%">
          <feTurbulence type="fractalNoise" baseFrequency="0.06 0.02" numOctaves="3" seed="7" result="noise">
            <animate attributeName="baseFrequency" values="0.06 0.02;0.12 0.06;0.06 0.02" dur="4s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="G" yChannelSelector="R">
            <animate attributeName="scale" values="0;22;0" dur="4s" repeatCount="indefinite"/>
          </feDisplacementMap>
        </filter>
      </defs>
      <text class="t2" x="350" y="44">MORPHING</text>
    </svg>
  </div>

  <div class="svg-wrap">
    <svg viewBox="0 0 700 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#fb923c"/>
          <stop offset="40%" stop-color="#fbbf24"/>
          <stop offset="80%" stop-color="#f472b6"/>
          <stop offset="100%" stop-color="#fb923c"/>
        </linearGradient>
        <filter id="warp3" x="-20%" y="-80%" width="140%" height="260%">
          <feTurbulence type="turbulence" baseFrequency="0.025 0.04" numOctaves="5" seed="13" result="noise">
            <animate attributeName="baseFrequency" values="0.025 0.04;0.07 0.09;0.025 0.04" dur="8s" repeatCount="indefinite"/>
            <animate attributeName="seed" values="13;27;13" dur="15s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="B">
            <animate attributeName="scale" values="0;35;0" dur="8s" repeatCount="indefinite"/>
          </feDisplacementMap>
        </filter>
      </defs>
      <text class="t3" x="350" y="44">DISTORTION</text>
    </svg>
  </div>

  <div class="ctrl">
    <button class="btn active" id="bAnim">⏸ Pause</button>
    <button class="btn" id="bMild">🌊 Mild</button>
    <button class="btn" id="bWild">🌪 Wild</button>
    <button class="btn" id="bMouse">🖱 Mouse Warp</button>
  </div>
</div>

<div class="panel">
  <b>SVG feTurbulence</b><br>
  <code style="color:#c084fc">feDisplacementMap</code> reads<br>
  noise channels to warp<br>
  each text pixel's position.<br><br>
  SMIL <code style="color:#60a5fa">&#60;animate&#62;</code> drives<br>
  <code style="color:#f472b6">baseFrequency + scale</code>
</div>

<footer>Inspired by SVG Filter Effects / MDN · Sara Soueidan's filter tutorials · UI Spotlight Day 30 · Drop #3</footer>

<script>
// Custom cursor
const cur=document.getElementById('cursor');
let mx=window.innerWidth/2,my=window.innerHeight/2;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
});

// Mouse-driven warp
let mouseWarp=false;
const filters=document.querySelectorAll('filter feDisplacementMap');
const animScales=document.querySelectorAll('feDisplacementMap animate[attributeName="scale"]');

document.addEventListener('mousemove',e=>{
  if(!mouseWarp) return;
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const dist=Math.hypot(e.clientX-cx,e.clientY-cy);
  const scl=Math.min(60,dist*.15).toFixed(1);
  filters.forEach(f=>f.setAttribute('scale',scl));
});

let paused=false;
document.getElementById('bAnim').addEventListener('click',function(){
  paused=!paused;
  const svgs=document.querySelectorAll('animate');
  svgs.forEach(a=>paused?a.pauseAnimations?.():a.unpauseAnimations?.());
  // animationsPaused via SVG API on elements
  const svgEls=document.querySelectorAll('svg');
  svgEls.forEach(s=>paused?s.pauseAnimations():s.unpauseAnimations());
  this.textContent=paused?'▶ Play':'⏸ Pause';
  this.classList.toggle('active',!paused);
});

document.getElementById('bMild').addEventListener('click',()=>{
  document.querySelectorAll('feDisplacementMap animate[attributeName="scale"]').forEach(a=>{
    a.setAttribute('values','0;12;0');
  });
});
document.getElementById('bWild').addEventListener('click',()=>{
  document.querySelectorAll('feDisplacementMap animate[attributeName="scale"]').forEach(a=>{
    a.setAttribute('values','0;60;0');
  });
});

document.getElementById('bMouse').addEventListener('click',function(){
  mouseWarp=!mouseWarp;
  this.classList.toggle('active',mouseWarp);
  if(!mouseWarp){
    filters.forEach(f=>f.setAttribute('scale',''));
    // re-enable SMIL
    document.querySelectorAll('svg').forEach(s=>s.unpauseAnimations());
    paused=false;
    document.getElementById('bAnim').textContent='⏸ Pause';
    document.getElementById('bAnim').classList.add('active');
  } else {
    document.querySelectorAll('svg').forEach(s=>s.pauseAnimations());
    document.getElementById('bAnim').textContent='▶ Play';
    document.getElementById('bAnim').classList.remove('active');
    paused=true;
  }
});
</script>
</body>
</html>
