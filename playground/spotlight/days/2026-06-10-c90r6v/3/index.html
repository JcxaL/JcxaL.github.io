<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Extrusion Text · Drop 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#090610;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

.section{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;min-height:40vh}
.hint{font-size:.7rem;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px}

/* ── Variant 1: Purple depth stack ── */
.t-purple{
  font-size:clamp(3rem,10vw,8rem);font-weight:900;
  color:#e0d8ff;letter-spacing:-.03em;
  text-shadow:
    1px 1px 0 #6d28d9, 2px 2px 0 #5b21b6, 3px 3px 0 #4c1d95,
    4px 4px 0 #3b1680, 5px 5px 0 #2e0f65, 6px 6px 0 #24094f,
    7px 7px 0 #1c0640, 8px 8px 0 #140333, 9px 9px 0 #0d0122,
    10px 10px 0 #08001a, 14px 14px 18px rgba(0,0,0,.6);
  cursor:default;transition:text-shadow .35s ease,transform .35s ease,color .35s;
  display:inline-block;
}
.t-purple:hover{
  color:#fff;
  transform:translate(-5px,-5px);
  text-shadow:
    1px 1px 0 #7c3aed, 2px 2px 0 #6d28d9, 3px 3px 0 #5b21b6,
    4px 4px 0 #4c1d95, 5px 5px 0 #3b1680, 6px 6px 0 #2e0f65,
    7px 7px 0 #24094f, 8px 8px 0 #1c0640, 9px 9px 0 #140333,
    10px 10px 0 #0d0122, 11px 11px 0 #08001a, 12px 12px 0 #050012,
    18px 18px 22px rgba(124,58,237,.5);
}

/* ── Variant 2: Cyan neon chrome ── */
.section-2{background:#030d12}
.t-cyan{
  font-size:clamp(2.5rem,9vw,7rem);font-weight:900;
  color:#f0fdff;letter-spacing:-.02em;
  text-shadow:
    1px 1px 0 #0891b2, 2px 2px 0 #0e7490, 3px 3px 0 #155e75,
    4px 4px 0 #164e63, 5px 5px 0 #0a3848, 6px 6px 0 #062536,
    7px 7px 0 #031624, 8px 8px 0 #010e18,
    10px 10px 14px rgba(0,0,0,.5);
  cursor:default;transition:text-shadow .4s,transform .4s,color .4s;
  display:inline-block;
}
.t-cyan:hover{
  color:#e0ffff;
  transform:translate(-6px,-6px);
  text-shadow:
    1px 1px 0 #22d3ee, 2px 2px 0 #06b6d4, 3px 3px 0 #0891b2,
    4px 4px 0 #0e7490, 5px 5px 0 #155e75, 6px 6px 0 #164e63,
    7px 7px 0 #0a3848, 8px 8px 0 #062536, 9px 9px 0 #031624,
    10px 10px 0 #010e18, 14px 14px 0 #000a10,
    20px 20px 24px rgba(6,182,212,.4);
}

/* ── Variant 3: Gold on dark — word-by-word ── */
.section-3{background:#0a0700}
.t-gold-wrap{display:flex;flex-wrap:wrap;gap:12px 20px;justify-content:center;max-width:700px}
.t-gold{
  font-size:clamp(2.2rem,7vw,5.5rem);font-weight:900;
  letter-spacing:-.02em;
  display:inline-block;
  color:#fef3c7;
  text-shadow:
    1px 1px 0 #d97706, 2px 2px 0 #b45309, 3px 3px 0 #92400e,
    4px 4px 0 #78350f, 5px 5px 0 #5e2a0d, 6px 6px 0 #451e09,
    7px 7px 12px rgba(0,0,0,.4);
  cursor:default;transition:text-shadow .3s,transform .3s,color .3s;
  animation:gold-pulse 3s ease-in-out infinite;
}
.t-gold:nth-child(2){animation-delay:.4s}
.t-gold:nth-child(3){animation-delay:.8s}
.t-gold:nth-child(4){animation-delay:1.2s}
@keyframes gold-pulse{
  0%,100%{text-shadow:1px 1px 0 #d97706,2px 2px 0 #b45309,3px 3px 0 #92400e,4px 4px 0 #78350f,5px 5px 0 #5e2a0d,6px 6px 12px rgba(0,0,0,.4);}
  50%{text-shadow:1px 1px 0 #fbbf24,2px 2px 0 #f59e0b,3px 3px 0 #d97706,4px 4px 0 #b45309,5px 5px 0 #92400e,6px 6px 0 #78350f,8px 8px 16px rgba(251,191,36,.3);}
}
.t-gold:hover{
  color:#fff7d6;
  transform:translate(-4px,-4px);
  animation:none;
  text-shadow:1px 1px 0 #fbbf24,2px 2px 0 #f59e0b,3px 3px 0 #d97706,4px 4px 0 #b45309,5px 5px 0 #92400e,6px 6px 0 #78350f,7px 7px 0 #5e2a0d,8px 8px 0 #451e09,12px 12px 16px rgba(251,191,36,.3);
}

/* ── Variant 4: White press-in (inset illusion) ── */
.section-4{background:#f5f4ff}
.t-inset{
  font-size:clamp(2rem,7vw,5rem);font-weight:900;
  color:#c9c5ee;letter-spacing:-.02em;
  text-shadow:
    -1px -1px 0 rgba(255,255,255,.9),
    1px 1px 0 rgba(100,80,180,.4),
    2px 2px 0 rgba(100,80,180,.3),
    3px 3px 5px rgba(100,80,180,.2);
  display:inline-block;cursor:default;
  transition:text-shadow .3s,transform .3s,color .3s;
}
.t-inset:hover{
  color:#6d5de8;
  text-shadow:
    -2px -2px 0 rgba(255,255,255,.9),
    2px 2px 0 rgba(80,60,160,.5),
    4px 4px 0 rgba(80,60,160,.3),
    6px 6px 8px rgba(80,60,160,.2);
  transform:translateY(2px);
}

div.sep{height:1px;background:rgba(255,255,255,.06);margin:0 24px}

footer{text-align:center;padding:28px;font-size:.65rem;color:#333}
</style>
</head>
<body>

<div class="section">
  <div class="hint">hover to lift · pure CSS text-shadow layering</div>
  <div class="t-purple">DEPTH</div>
</div>
<div class="sep"></div>

<div class="section section-2">
  <div class="hint" style="color:#1e5560">Chrome extrusion · cyan palette</div>
  <div class="t-cyan">CHROME</div>
</div>
<div class="sep"></div>

<div class="section section-3">
  <div class="hint" style="color:#5a4010">Animated gold · per-word pulse timing</div>
  <div class="t-gold-wrap">
    <span class="t-gold">SOLID</span>
    <span class="t-gold">GOLD</span>
    <span class="t-gold">TYPE</span>
  </div>
</div>
<div class="sep"></div>

<div class="section section-4">
  <div class="hint" style="color:#8b85c0">Inset / press-in illusion · light theme</div>
  <div class="t-inset">PRESSED</div>
</div>

<footer>Inspired by CSS text-shadow 3D stacking technique · UI Spotlight Day 25 · Drop #3</footer>
</body>
</html>
