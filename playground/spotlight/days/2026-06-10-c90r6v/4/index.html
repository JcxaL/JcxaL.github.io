<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Click Ripple Effect · Drop 4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06040f;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;overflow:hidden;cursor:pointer}

#bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}

.center{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;z-index:1;
}
h1{font-size:clamp(1.5rem,4vw,3rem);font-weight:800;letter-spacing:-.03em;color:#c4b5fd;margin-bottom:8px}
p{font-size:.9rem;color:#555;margin-bottom:24px}

.mode-btns{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.mode-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#bbb;padding:6px 14px;border-radius:20px;font-size:.75rem;cursor:pointer;font-family:inherit;transition:background .15s}
.mode-btn:hover{background:rgba(255,255,255,.15)}
.mode-btn.on{background:#6d28d9;border-color:#7c3aed;color:#fff}

#counter{position:fixed;top:16px;right:18px;font-size:.75rem;color:#444;z-index:10}

footer{position:fixed;bottom:8px;width:100%;text-align:center;font-size:.65rem;color:#2a2040;pointer-events:none}

/* Ripple elements */
.ripple{
  position:fixed;border-radius:50%;pointer-events:none;
  transform:translate(-50%,-50%) scale(0);
  animation:ripple-go var(--dur,.9s) cubic-bezier(.2,.8,.4,1) forwards;
}
@keyframes ripple-go{
  0%{transform:translate(-50%,-50%) scale(0);opacity:var(--opa,0.7);}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0;}
}

/* Mode A: classic ring */
.rp-ring{
  border:2px solid var(--col,#7c3aed);
  background:transparent;
}
/* Mode B: filled fade */
.rp-fill{
  background:radial-gradient(circle, var(--col,rgba(124,58,237,.4)) 0%, transparent 70%);
}
/* Mode C: shockwave (multiple rings) — handled in JS */
.rp-shock{
  border:3px solid var(--col,#f472b6);
  background:transparent;
  box-shadow:0 0 0 0 var(--glow,rgba(244,114,182,.3));
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="center">
  <h1>Click anywhere</h1>
  <p id="mode-label">Mode: Rings</p>
</div>

<div class="mode-btns">
  <button class="mode-btn on" data-m="ring">Rings</button>
  <button class="mode-btn" data-m="fill">Ripple Fill</button>
  <button class="mode-btn" data-m="shock">Shockwave</button>
  <button class="mode-btn" data-m="multi">Multicolor</button>
</div>

<div id="counter">0 ripples</div>
<footer>Inspired by CSS click ripple effects · UI Spotlight Day 25 · Drop #4</footer>

<script>
let mode = 'ring';
let count = 0;
const counter = document.getElementById('counter');
const modeLabel = document.getElementById('mode-label');

const COLORS = ['#7c3aed','#06b6d4','#f472b6','#34d399','#f59e0b','#60a5fa','#fb923c'];
let colorIdx = 0;

const modeNames = {ring:'Rings',fill:'Ripple Fill',shock:'Shockwave',multi:'Multicolor'};

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick=()=>{
    mode = b.dataset.m;
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    modeLabel.textContent = 'Mode: ' + modeNames[mode];
  };
});

function makeRipple(x, y, size, color, type, dur, delay=0){
  const el = document.createElement('div');
  el.className = 'ripple ' + type;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = el.style.height = size + 'px';
  el.style.setProperty('--col', color);
  el.style.setProperty('--dur', dur + 's');
  el.style.setProperty('--opa', type==='rp-fill' ? '0.5' : '0.7');
  if(delay) el.style.animationDelay = delay + 's';
  if(type==='rp-shock'){
    el.style.setProperty('--glow', color.replace(')',',0.3)').replace('rgb','rgba'));
  }
  document.body.appendChild(el);
  el.addEventListener('animationend', ()=>el.remove());
}

document.addEventListener('click', e=>{
  if(e.target.classList.contains('mode-btn')) return;
  count++;
  counter.textContent = count + ' ripple' + (count!==1?'s':'');

  const x = e.clientX, y = e.clientY;
  const col = COLORS[colorIdx % COLORS.length];
  if(mode==='multi') colorIdx++;

  if(mode==='ring' || mode==='multi'){
    makeRipple(x,y,320,col,'rp-ring',0.85);
    makeRipple(x,y,320,col.replace(')',',0.35)').replace('#','rgba('),'rp-ring',0.7,0.12);
    // crude fix: just add alpha
    const c2 = hexToRgba(col, 0.35);
    const r2 = document.createElement('div');
    r2.className='ripple rp-ring';
    r2.style.cssText=`left:${x}px;top:${y}px;width:180px;height:180px;border-color:${c2};--dur:.6s;animation-delay:.06s`;
    document.body.appendChild(r2);
    r2.addEventListener('animationend',()=>r2.remove());

  } else if(mode==='fill'){
    makeRipple(x,y,400,col,'rp-fill',1.1);
    makeRipple(x,y,200,col,'rp-fill',0.7,0.1);

  } else if(mode==='shock'){
    for(let i=0;i<4;i++){
      const el=document.createElement('div');
      el.className='ripple rp-shock';
      el.style.left=x+'px'; el.style.top=y+'px';
      const sz=200+i*140;
      el.style.width=el.style.height=sz+'px';
      el.style.setProperty('--col',col);
      el.style.setProperty('--dur',(0.7+i*0.18)+'s');
      el.style.animationDelay=(i*0.08)+'s';
      el.style.borderWidth=Math.max(1,3-i)+'px';
      document.body.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    }
  }

  // Ambient particle burst
  spawnParticles(x, y, col);
});

function hexToRgba(hex, a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

// Background: subtle star field
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let stars=[];
function initStars(){
  bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;
  stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,r:Math.random()*.8+.2,a:Math.random()*.4+.1});
  drawStars();
}
function drawStars(){
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  stars.forEach(s=>{
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${s.a})`;bgCtx.fill();
  });
}
initStars();
window.addEventListener('resize',initStars);

// Particle burst on click
function spawnParticles(cx,cy,col){
  const n=12;
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:4px;height:4px;border-radius:50%;background:${col};pointer-events:none;z-index:5`;
    const angle=(Math.PI*2/n)*i + Math.random()*.5;
    const dist=30+Math.random()*60;
    const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist;
    el.animate([
      {transform:'translate(-50%,-50%) scale(1)',opacity:1},
      {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0)`,opacity:0}
    ],{duration:600+Math.random()*300,easing:'cubic-bezier(.2,.8,.4,1)',fill:'forwards'})
      .onfinish=()=>el.remove();
    document.body.appendChild(el);
  }
}
</script>
</body>
</html>
