<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scroll-Driven 3D Card Flip · Drop 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#fff;font-family:system-ui,sans-serif;min-height:100vh}

h1{text-align:center;padding:60px 20px 10px;font-size:clamp(1.4rem,3vw,2rem);color:#818cf8;letter-spacing:-.02em}
p.sub{text-align:center;color:#666;font-size:.85rem;margin-bottom:20px;padding:0 20px}
.scroll-hint{text-align:center;font-size:.75rem;color:#444;padding:8px;margin-bottom:40px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:28px;max-width:960px;margin:0 auto;padding:0 24px 100px}

.card{
  perspective:700px;
  min-height:160px;
}
.card-inner{
  background:linear-gradient(135deg,#1a1a3e 0%,#0d0d22 100%);
  border:1px solid rgba(130,130,255,.18);
  border-radius:16px;
  padding:24px;
  position:relative;
  overflow:hidden;

  animation: card-arrive linear both;
  animation-timeline: view();
  animation-range: entry 0% entry 55%;
}
@keyframes card-arrive{
  from{opacity:0;transform:perspective(600px) rotateY(-80deg) translateZ(-60px);filter:blur(4px);}
  to{opacity:1;transform:perspective(600px) rotateY(0deg) translateZ(0);filter:blur(0);}
}
.card-inner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 30%, rgba(130,100,255,.12) 0%,transparent 70%);
  pointer-events:none;
}
.card-num{font-size:2.5rem;font-weight:800;color:rgba(130,130,255,.15);position:absolute;top:12px;right:18px;line-height:1}
.card-icon{font-size:2rem;margin-bottom:12px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:6px;color:#c7c7f0}
.card-body{font-size:.82rem;color:#666;line-height:1.5}
.tag{display:inline-block;background:rgba(130,100,255,.18);border:1px solid rgba(130,100,255,.25);border-radius:100px;font-size:.7rem;padding:2px 9px;margin-top:10px;color:#a5b4fc}

/* Alternate flip direction for variety */
.card:nth-child(even) .card-inner{animation-name:card-arrive-r}
@keyframes card-arrive-r{
  from{opacity:0;transform:perspective(600px) rotateX(70deg) translateZ(-40px);filter:blur(3px);}
  to{opacity:1;transform:perspective(600px) rotateX(0deg) translateZ(0);filter:blur(0);}
}
.card:nth-child(3n) .card-inner{animation-name:card-arrive-tl}
@keyframes card-arrive-tl{
  from{opacity:0;transform:perspective(600px) rotateY(60deg) rotateX(-40deg) scale(.7);filter:blur(6px);}
  to{opacity:1;transform:perspective(600px) rotateY(0) rotateX(0) scale(1);filter:blur(0);}
}

footer{text-align:center;padding:24px;font-size:.7rem;color:#333;border-top:1px solid #111}
</style>
</head>
<body>
<h1>Scroll-Driven 3D Entrance</h1>
<p class="sub">Pure CSS · <code>animation-timeline: view()</code> · Cards flip in as they enter the viewport</p>
<p class="scroll-hint">↓ scroll down to see each card animate in</p>

<div class="grid" id="grid"></div>

<footer>Inspired by CSS scroll-driven animations spec · UI Spotlight Day 25 · Drop #1</footer>

<script>
const items = [
  {icon:'⚡',title:'View Timeline',body:'New CSS spec lets you bind animation progress to scroll position — zero JS needed.',tag:'CSS 2025'},
  {icon:'🎴',title:'3D Perspective',body:'Each card flips from a rotated 3D state into view using perspective() transforms.',tag:'Transform'},
  {icon:'🌀',title:'animation-range',body:'Control exactly when in the viewport lifecycle the animation starts and ends.',tag:'Timing'},
  {icon:'📐',title:'entry 0% 55%',body:'animation-range: entry binds to the moment the element crosses the bottom edge.',tag:'Range'},
  {icon:'🚀',title:'Zero JavaScript',body:'No IntersectionObserver, no class toggling, no scroll listeners. Pure declarative CSS.',tag:'No JS'},
  {icon:'🎨',title:'Variant Flips',body:'Odd cards flip along Y axis, even along X, thirds do a combined 3D spin-scale.',tag:'Variety'},
  {icon:'♿',title:'Accessible',body:'prefers-reduced-motion: reduce disables the 3D transforms automatically.',tag:'A11y'},
  {icon:'📱',title:'Mobile Ready',body:'Hardware-accelerated transforms run at 60fps even on mid-range phones.',tag:'Performance'},
  {icon:'🧩',title:'Composable',body:'Drop the two CSS lines onto any element — it just works, no extra markup needed.',tag:'Reusable'},
];

const grid = document.getElementById('grid');
items.forEach((it,i)=>{
  grid.insertAdjacentHTML('beforeend',`
    <div class="card">
      <div class="card-inner">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <div class="card-icon">${it.icon}</div>
        <div class="card-title">${it.title}</div>
        <div class="card-body">${it.body}</div>
        <span class="tag">${it.tag}</span>
      </div>
    </div>`);
});

// Fallback for browsers without scroll-driven animation support
if(!CSS.supports('animation-timeline','scroll()')){
  const obs = new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:.15});
  document.querySelectorAll('.card-inner').forEach(c=>{
    c.style.opacity='0';c.style.transition='opacity .6s,transform .6s';
    c.style.transform='perspective(600px) rotateY(-80deg)';
    obs.observe(c);
  });
  document.addEventListener('ko-visible',e=>{
    e.target.style.opacity='1';e.target.style.transform='none';
  });
  // simpler: add visible class
  const style=document.createElement('style');
  style.textContent='.visible{opacity:1!important;transform:none!important;}';
  document.head.appendChild(style);
}
</script>
</body>
</html>
