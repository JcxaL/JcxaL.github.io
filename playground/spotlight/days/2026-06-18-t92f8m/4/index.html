<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liquid Cursor Blob</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#04030b;
  font-family:system-ui,sans-serif;
  min-height:100vh;overflow:hidden;
  cursor:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:rgba(255,255,255,.8);
}

/* The blob */
#blob{
  position:fixed;
  pointer-events:none;
  z-index:100;
  mix-blend-mode:screen;
  will-change:transform,border-radius,width,height;
}
#blob svg{overflow:visible}

/* Halo ring */
#halo{
  position:fixed;
  pointer-events:none;
  z-index:99;
  border-radius:50%;
  border:1px solid rgba(192,132,252,.25);
  will-change:transform,width,height;
}

/* Interactive elements */
.content{position:relative;z-index:10;text-align:center;max-width:700px;padding:32px 24px}
h1{font-size:clamp(28px,6vw,56px);font-weight:800;color:transparent;
  background:linear-gradient(135deg,#c084fc,#38bdf8,#f472b6);
  -webkit-background-clip:text;background-clip:text;
  margin-bottom:12px;line-height:1.1}
.sub{color:rgba(160,140,220,.6);font-size:14px;margin-bottom:48px}

.btn-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.btn{
  padding:14px 28px;border-radius:100px;font-size:15px;font-weight:600;
  cursor:none;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.9);
  transition:background .2s,border-color .2s,transform .2s;
  user-select:none;
}
.btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:scale(1.04)}

.cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.card{
  width:160px;height:120px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  cursor:none;
  transition:background .2s,border-color .2s,transform .2s;
  font-size:13px;color:rgba(160,140,220,.7);
  user-select:none;
}
.card .icon{font-size:28px}
.card:hover{background:rgba(192,132,252,.1);border-color:rgba(192,132,252,.3);transform:scale(1.04)}

.controls{
  position:fixed;bottom:24px;
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:200;
  padding:0 16px;
}
.ctrl{
  padding:6px 14px;border-radius:20px;font-size:12px;cursor:none;
  background:rgba(255,255,255,.06);
  color:rgba(200,180,255,.8);
  border:1px solid rgba(120,80,200,.25);
  transition:all .15s;
}
.ctrl:hover,.ctrl.active{
  background:rgba(192,132,252,.15);
  border-color:rgba(192,132,252,.4);
  color:#c084fc;
}
footer{position:fixed;bottom:8px;font-size:10px;color:rgba(60,50,100,.6);z-index:200;text-align:center;width:100%}
</style>
</head>
<body>

<div id="blob"><svg width="60" height="60" viewBox="0 0 60 60"><circle id="blobCircle" cx="30" cy="30" r="28" fill="url(#blobGrad)" opacity=".9"/><defs><radialGradient id="blobGrad" cx="35%" cy="35%"><stop offset="0%" stop-color="#e0c0ff"/><stop offset="60%" stop-color="#c084fc"/><stop offset="100%" stop-color="#7c3aed" stop-opacity=".6"/></radialGradient></defs></svg></div>
<div id="halo"></div>

<div class="content">
  <h1>Liquid Cursor Blob</h1>
  <div class="sub">Spring-physics blob · stretches in motion · relaxes at rest</div>

  <div class="btn-row">
    <div class="btn">Hover me</div>
    <div class="btn">Click me</div>
    <div class="btn">Slide over</div>
  </div>

  <div class="cards">
    <div class="card"><div class="icon">✦</div><span>Spring Mass</span></div>
    <div class="card"><div class="icon">◎</div><span>Velocity Stretch</span></div>
    <div class="card"><div class="icon">⬡</div><span>Blend Mode</span></div>
    <div class="card"><div class="icon">◈</div><span>Morph Radius</span></div>
  </div>
</div>

<div class="controls">
  <button class="ctrl active" onclick="setColor('#c084fc','#7c3aed')">Purple</button>
  <button class="ctrl" onclick="setColor('#38bdf8','#0891b2')">Cyan</button>
  <button class="ctrl" onclick="setColor('#f472b6','#be185d')">Pink</button>
  <button class="ctrl" onclick="setColor('#34d399','#059669')">Green</button>
  <button class="ctrl" onclick="setSize(28)">Small</button>
  <button class="ctrl" onclick="setSize(44)">Large</button>
  <button class="ctrl" onclick="setSize(16)">Tiny</button>
</div>

<footer>Inspired by liquid cursor experiments on CodePen · UI Spotlight Day 33 · Drop #4</footer>

<script>
let mx=window.innerWidth/2, my=window.innerHeight/2;
let bx=mx, by=my, vx=0, vy=0;
let hx=mx, hy=my;
let baseR=28;
const blob=document.getElementById('blob');
const halo=document.getElementById('halo');
const circle=document.getElementById('blobCircle');
const grad=document.getElementById('blobGrad');

document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
document.addEventListener('touchmove',e=>{
  e.preventDefault();
  mx=e.touches[0].clientX;my=e.touches[0].clientY;
},{passive:false});
document.addEventListener('touchstart',e=>{
  mx=e.touches[0].clientX;my=e.touches[0].clientY;
},{passive:true});

// Spring params
const STIFFNESS=0.18, DAMPING=0.72;

// Expand blob on hover over interactive elements
let hovering=false;
document.querySelectorAll('.btn,.card,.ctrl').forEach(el=>{
  el.addEventListener('mouseenter',()=>{hovering=true});
  el.addEventListener('mouseleave',()=>{hovering=false});
});

let clickPulse=0;
document.addEventListener('click',()=>{clickPulse=1.8});

function setColor(c1,c2){
  grad.children[0].setAttribute('stop-color','#fff');
  grad.children[1].setAttribute('stop-color',c1);
  grad.children[2].setAttribute('stop-color',c2);
  document.querySelectorAll('.ctrl').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}
function setSize(r){
  baseR=r;
  document.querySelectorAll('.ctrl').forEach(b=>{
    if(['Small','Large','Tiny'].includes(b.textContent)) b.classList.remove('active');
  });
  event.target.classList.add('active');
}

function animate(){
  // Spring physics for blob
  const ax=(mx-bx)*STIFFNESS;
  const ay=(my-by)*STIFFNESS;
  vx=(vx+ax)*DAMPING;
  vy=(vy+ay)*DAMPING;
  bx+=vx; by+=vy;

  // Slower halo
  hx+=(mx-hx)*0.08;
  hy+=(my-hy)*0.08;

  // Velocity magnitude
  const speed=Math.hypot(vx,vy);
  const stretch=Math.min(speed*0.4,18);
  const angle=Math.atan2(vy,vx)*180/Math.PI;

  // Click pulse
  if(clickPulse>1) clickPulse=Math.max(1,clickPulse-0.06);
  const hoverScale=hovering?1.6:1;
  const r=baseR*hoverScale*clickPulse;

  // Stretch blob in direction of motion
  const rx=r+stretch;
  const ry=Math.max(r*0.6, r-stretch*0.5);
  const size=rx*2+20;

  blob.style.left=(bx-size/2)+'px';
  blob.style.top=(by-size/2)+'px';
  blob.style.width=size+'px';
  blob.style.height=size+'px';

  const svgEl=blob.querySelector('svg');
  svgEl.setAttribute('width',size);
  svgEl.setAttribute('height',size);
  svgEl.setAttribute('viewBox',`0 0 ${size} ${size}`);
  circle.setAttribute('cx',size/2);
  circle.setAttribute('cy',size/2);
  circle.setAttribute('rx',rx);
  circle.setAttribute('ry',ry);
  circle.setAttribute('transform',`rotate(${angle},${size/2},${size/2})`);
  // Switch to ellipse
  circle.tagName==='circle' && circle.setAttribute('r',r);

  // Halo
  const hs=(r+20)*2;
  halo.style.left=(hx-hs/2)+'px';
  halo.style.top=(hy-hs/2)+'px';
  halo.style.width=hs+'px';
  halo.style.height=hs+'px';

  requestAnimationFrame(animate);
}
// Use ellipse for stretch effect
const svgEl=blob.querySelector('svg');
const ellipse=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
ellipse.setAttribute('id','blobCircle');
ellipse.setAttribute('cx','30');ellipse.setAttribute('cy','30');
ellipse.setAttribute('rx','28');ellipse.setAttribute('ry','28');
ellipse.setAttribute('fill','url(#blobGrad)');ellipse.setAttribute('opacity','.9');
circle.replaceWith(ellipse);

animate();
</script>
</body>
</html>
