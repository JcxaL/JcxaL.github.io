<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guided Tour — UI Spotlight</title>
<style>
  :root{ --accent:#a78bfa; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0b0a14;color:#fff;font-family:system-ui,-apple-system,sans-serif;height:100%;}

  .back-link{
    position:fixed; top:16px; left:16px; z-index:90;
    background:rgba(20,24,36,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
  }
  #debug{
    position:fixed; top:16px; right:16px; z-index:90; width:180px;
    background:rgba(14,18,30,0.7); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#c9b;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug .stat{color:var(--accent);font-weight:700;}
  #debug button{
    width:100%; margin-top:2px; background:var(--accent); border:none; color:#170b2e; font-weight:700;
    font-size:11.5px; padding:8px; border-radius:8px; cursor:pointer;
  }
  @media (max-width:640px){ #debug{ display:none; } }

  .app{ max-width:900px; margin:0 auto; padding:100px 24px 80px; }
  .nav{
    display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-radius:16px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); margin-bottom:26px; position:relative; z-index:2;
  }
  .brand{ font-weight:800; font-size:15px; display:flex; align-items:center; gap:8px; }
  .brand .dot{ width:9px; height:9px; border-radius:3px; background:var(--accent); }
  .navItems{ display:flex; gap:6px; }
  .navItems button{ background:none; border:none; color:rgba(255,255,255,0.6); font-family:inherit; font-size:13px; font-weight:600; padding:8px 12px; border-radius:8px; cursor:default; }
  .navItems button.settingsItem{ position:relative; }

  .topRow{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; position:relative; z-index:2; }
  .topRow h2{ margin:0; font-size:20px; font-weight:800; }
  #newProjectBtn{
    background:var(--accent); color:#170b2e; border:none; font-weight:700; font-size:13px; padding:11px 18px;
    border-radius:10px; cursor:default;
  }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; position:relative; z-index:2; }
  .card{ background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:20px; }
  #statsCard .big{ font-size:30px; font-weight:800; margin:6px 0; }
  #statsCard .up{ color:#34d399; font-size:12.5px; font-weight:700; }
  #chartCard .bars{ display:flex; align-items:flex-end; gap:6px; height:80px; margin-top:12px; }
  #chartCard .bars div{ flex:1; background:linear-gradient(180deg,var(--accent),rgba(167,139,250,0.2)); border-radius:4px 4px 0 0; }
  .cardLabel{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.4); font-weight:700; }

  .startWrap{ text-align:center; margin-top:34px; position:relative; z-index:2; }
  #startTourBtn{
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.16); color:#fff; font-family:inherit;
    font-size:13.5px; font-weight:700; padding:11px 20px; border-radius:999px; cursor:pointer;
  }
  #startTourBtn:hover{ background:rgba(255,255,255,0.14); }

  #spotlightHole{
    position:fixed; z-index:80; border-radius:14px; pointer-events:none;
    box-shadow:0 0 0 9999px rgba(4,4,10,0.78);
    transition:top 420ms cubic-bezier(.65,0,.35,1), left 420ms cubic-bezier(.65,0,.35,1), width 420ms cubic-bezier(.65,0,.35,1), height 420ms cubic-bezier(.65,0,.35,1);
    outline:2px solid var(--accent); outline-offset:4px;
    opacity:0; visibility:hidden;
  }
  #spotlightHole.show{ opacity:1; visibility:visible; }

  #tooltip{
    position:fixed; z-index:81; width:250px; background:#17162a; border:1px solid rgba(255,255,255,0.14);
    border-radius:14px; padding:16px; opacity:0; visibility:hidden; transform:translateY(6px);
    transition:top 420ms cubic-bezier(.65,0,.35,1), left 420ms cubic-bezier(.65,0,.35,1), opacity 220ms, transform 220ms;
  }
  #tooltip.show{ opacity:1; visibility:visible; transform:translateY(0); }
  #tooltip .step{ font-size:10.5px; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  #tooltip h4{ margin:0 0 6px; font-size:14.5px; }
  #tooltip p{ margin:0 0 14px; font-size:12.5px; color:rgba(255,255,255,0.6); line-height:1.55; }
  #tooltip .actions{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  #tooltip .actions button{ font-family:inherit; font-size:12px; font-weight:700; border-radius:8px; padding:7px 12px; border:none; cursor:pointer; }
  #tooltip .skipBtn{ background:none; color:rgba(255,255,255,0.4); }
  #tooltip .nextBtn{ background:var(--accent); color:#170b2e; }
  #tooltip .dots{ display:flex; gap:5px; }
  #tooltip .dots span{ width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.2); }
  #tooltip .dots span.active{ background:var(--accent); }

  footer{
    position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:90;
    font-size:11px; color:rgba(255,255,255,0.45); background:rgba(10,12,20,0.5); backdrop-filter:blur(8px);
    padding:6px 12px; border-radius:999px; white-space:nowrap; display:none;
  }
  @media (min-width:900px){ footer{ display:block; } }
  @media (max-width:600px){ .grid{ grid-template-columns:1fr; } .navItems{ display:none; } }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Tour Debug</h4>
  <div class="row"><span>Step</span><span class="stat" id="stepLabel">–</span></div>
  <button id="restartTourBtn">Restart tour ↻</button>
</div>

<div class="app">
  <div class="nav">
    <div class="brand" id="brandTarget"><span class="dot"></span>Nimbus</div>
    <div class="navItems">
      <button>Overview</button>
      <button>Projects</button>
      <button class="settingsItem" id="settingsTarget">Settings</button>
    </div>
  </div>

  <div class="topRow">
    <h2>Dashboard</h2>
    <button id="newProjectBtn">＋ New Project</button>
  </div>

  <div class="grid">
    <div class="card" id="statsCard">
      <div class="cardLabel">Active Users</div>
      <div class="big">12,482</div>
      <div class="up">▲ 8.2% this week</div>
    </div>
    <div class="card" id="chartCard">
      <div class="cardLabel">Traffic</div>
      <div class="bars">
        <div style="height:40%"></div><div style="height:65%"></div><div style="height:50%"></div>
        <div style="height:85%"></div><div style="height:60%"></div><div style="height:95%"></div>
        <div style="height:70%"></div>
      </div>
    </div>
  </div>

  <div class="startWrap">
    <button id="startTourBtn">▶ Start Tour</button>
  </div>
</div>

<div id="spotlightHole"></div>
<div id="tooltip">
  <div class="step" id="ttStep">Step 1 / 4</div>
  <h4 id="ttTitle"></h4>
  <p id="ttDesc"></p>
  <div class="actions">
    <button class="skipBtn" id="skipBtn">Skip</button>
    <div class="dots" id="ttDots"></div>
    <button class="nextBtn" id="nextBtn">Next</button>
  </div>
</div>

<footer>Inspired by Plotline — coachmark &amp; spotlight onboarding patterns &middot; UI Spotlight Day 57 &middot; Drop #5</footer>

<script>
(function(){
  "use strict";
  var hole = document.getElementById("spotlightHole");
  var tooltip = document.getElementById("tooltip");
  var ttStep = document.getElementById("ttStep");
  var ttTitle = document.getElementById("ttTitle");
  var ttDesc = document.getElementById("ttDesc");
  var ttDots = document.getElementById("ttDots");
  var nextBtn = document.getElementById("nextBtn");
  var skipBtn = document.getElementById("skipBtn");
  var startBtn = document.getElementById("startTourBtn");
  var restartBtn = document.getElementById("restartTourBtn");
  var stepLabel = document.getElementById("stepLabel");

  var STEPS = [
    { el: document.getElementById("brandTarget"), title: "Welcome to Nimbus", desc: "This is your workspace — everything starts from here." },
    { el: document.getElementById("newProjectBtn"), title: "Create anything", desc: "One click spins up a new project with sensible defaults." },
    { el: document.getElementById("statsCard"), title: "Live metrics", desc: "Active users update in real time, no refresh needed." },
    { el: document.getElementById("chartCard"), title: "Visual trends", desc: "Spot spikes and dips in traffic at a glance." },
    { el: document.getElementById("settingsTarget"), title: "Make it yours", desc: "Themes, notifications and integrations all live here." }
  ];

  STEPS.forEach(function(s, i){
    var d = document.createElement("span");
    d.className = "dot" + (i===0 ? " active" : "");
    ttDots.appendChild(d);
  });
  var dotEls = Array.prototype.slice.call(ttDots.children);

  var current = -1;
  var active = false;

  function place(){
    if(current < 0) return;
    var step = STEPS[current];
    var r = step.el.getBoundingClientRect();
    var pad = 8;
    hole.style.top = (r.top - pad) + "px";
    hole.style.left = (r.left - pad) + "px";
    hole.style.width = (r.width + pad*2) + "px";
    hole.style.height = (r.height + pad*2) + "px";

    var ttTop = r.bottom + 16;
    var ttLeft = Math.min(Math.max(r.left, 12), window.innerWidth - 262);
    if(ttTop + 160 > window.innerHeight){ ttTop = Math.max(r.top - 176, 12); }
    tooltip.style.top = ttTop + "px";
    tooltip.style.left = ttLeft + "px";
  }

  function showStep(i){
    current = i;
    var step = STEPS[i];
    ttStep.textContent = "Step " + (i+1) + " / " + STEPS.length;
    ttTitle.textContent = step.title;
    ttDesc.textContent = step.desc;
    nextBtn.textContent = i === STEPS.length - 1 ? "Done" : "Next";
    dotEls.forEach(function(d, di){ d.classList.toggle("active", di === i); });
    stepLabel.textContent = (i+1) + " / " + STEPS.length;
    hole.classList.add("show");
    tooltip.classList.add("show");
    place();
  }

  function startTour(){
    active = true;
    showStep(0);
  }
  function endTour(){
    active = false;
    current = -1;
    hole.classList.remove("show");
    tooltip.classList.remove("show");
    stepLabel.textContent = "–";
  }

  startBtn.addEventListener("click", startTour);
  restartBtn.addEventListener("click", startTour);
  skipBtn.addEventListener("click", endTour);
  nextBtn.addEventListener("click", function(){
    if(current === STEPS.length - 1){ endTour(); return; }
    showStep(current + 1);
  });
  window.addEventListener("resize", function(){ if(active) place(); });
  window.addEventListener("scroll", function(){ if(active) place(); }, { passive:true });
})();
</script>
</body>
</html>
