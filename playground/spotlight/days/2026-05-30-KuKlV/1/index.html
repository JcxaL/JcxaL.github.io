<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sticky Grid Scroll</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:#08060e;font-family:system-ui,sans-serif;overflow-x:hidden}

/* ── scroll driver ── */
.scroller{height:550vh}

/* ── pinned scene ── */
.scene{
  position:sticky;top:0;height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#08060e
}
.scene::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 70% at 50% 50%,rgba(112,40,200,.14) 0%,transparent 70%);
  pointer-events:none
}

/* ── grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(4,min(170px,22vw));
  grid-template-rows:repeat(3,min(150px,18vh));
  gap:clamp(5px,1vw,10px);
  position:relative;
  animation:gridZoom linear both;
  animation-timeline:scroll(root block);
  animation-range:52% 82%
}
@keyframes gridZoom{
  from{transform:scale(.92)}
  to  {transform:scale(1.06)}
}

/* ── tiles ── */
.tile{
  border-radius:12px;
  position:relative;overflow:hidden;
  animation:tileIn linear both;
  animation-timeline:scroll(root block)
}
/* column stagger */
.ca{animation-range:0% 20%}
.cb{animation-range:9% 29%}
.cc{animation-range:18% 38%}
.cd{animation-range:27% 47%}
/* direction: a,c top; b,d bottom */
.ca,.cc{--dir:-300%}
.cb,.cd{--dir: 300%}
@keyframes tileIn{
  from{transform:translateY(var(--dir));opacity:0}
  to  {transform:translateY(0);opacity:1}
}

.t0 {background:linear-gradient(135deg,#c084fc,#7c3aed)}
.t1 {background:linear-gradient(135deg,#60a5fa,#1d4ed8)}
.t2 {background:linear-gradient(135deg,#f472b6,#be185d)}
.t3 {background:linear-gradient(135deg,#34d399,#065f46)}
.t4 {background:linear-gradient(135deg,#fbbf24,#b45309)}
.t5 {background:linear-gradient(135deg,#fb923c,#c2410c)}
.t6 {background:linear-gradient(135deg,#38bdf8,#0369a1)}
.t7 {background:linear-gradient(135deg,#a78bfa,#6d28d9)}
.t8 {background:linear-gradient(135deg,#f87171,#991b1b)}
.t9 {background:linear-gradient(135deg,#4ade80,#166534)}
.t10{background:linear-gradient(135deg,#facc15,#a16207)}
.t11{background:linear-gradient(135deg,#22d3ee,#0e7490)}

.tile span{
  position:absolute;bottom:9px;left:11px;
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,.65);
  text-transform:uppercase;letter-spacing:.07em
}
/* shimmer overlay */
.tile::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 50%,rgba(0,0,0,.1) 100%);
  border-radius:inherit
}

/* ── headline overlay ── */
.headline{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
  animation:headIn linear both;
  animation-timeline:scroll(root block);
  animation-range:75% 90%
}
.headline h2{
  font-size:clamp(22px,4.5vw,60px);font-weight:900;
  color:#fff;letter-spacing:-.04em;text-align:center;line-height:1.05;
  text-shadow:0 0 80px rgba(160,80,255,.7)
}
.headline p{
  margin-top:12px;font-size:clamp(12px,1.5vw,16px);
  color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase
}
@keyframes headIn{
  from{opacity:0;transform:scale(1.08)}
  to  {opacity:1;transform:scale(1)}
}

/* ── progress pill ── */
.pill{
  position:fixed;top:18px;right:18px;z-index:100;
  background:rgba(255,255,255,.06);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.1);border-radius:20px;
  padding:7px 13px;font-size:10px;font-family:monospace;
  color:rgba(255,255,255,.45);display:flex;align-items:center;gap:8px
}
.pill-bar{width:72px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pill-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#38bdf8);border-radius:2px;width:0%;transition:width .06s}

/* ── scroll hint ── */
.hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.28);font-size:12px;letter-spacing:.1em;text-transform:uppercase;
  animation:hintBounce 2s ease-in-out infinite;pointer-events:none;z-index:100;
  transition:opacity .4s
}
@keyframes hintBounce{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%     {transform:translateX(-50%) translateY(6px)}
}

/* ── credit ── */
.credit{
  position:fixed;bottom:10px;right:14px;z-index:100;
  font-size:9px;color:rgba(255,255,255,.18)
}
</style>
</head>
<body>

<div class="pill">
  <div class="pill-bar"><div class="pill-fill" id="pf"></div></div>
  <span id="pct">0%</span>
</div>
<div class="hint" id="hint">↓ scroll to animate</div>

<div class="scroller">
  <div class="scene">
    <div class="grid" id="grid"></div>
    <div class="headline">
      <h2>Pure CSS<br>Scroll Choreography</h2>
      <p>animation-timeline · scroll(root) · staggered ranges</p>
    </div>
  </div>
</div>

<div class="credit">Inspired by Codrops Sticky Grid Scroll · UI Spotlight Day 14 · Drop #1</div>

<script>
const COLS  = ['ca','cb','cc','cd'];
const NAMES = ['Motion','Scroll','Driven','Sticky','Range','Timeline','Reveal','Offset','Stagger','Columns','Animate','CSS'];
const grid  = document.getElementById('grid');
for (let i = 0; i < 12; i++) {
  const d = document.createElement('div');
  d.className = `tile t${i} ${COLS[i % 4]}`;
  d.innerHTML = `<span>${NAMES[i]}</span>`;
  grid.appendChild(d);
}

const pf   = document.getElementById('pf');
const pct  = document.getElementById('pct');
const hint = document.getElementById('hint');
window.addEventListener('scroll', () => {
  const p = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
  pf.style.width = (p * 100).toFixed(1) + '%';
  pct.textContent = Math.round(p * 100) + '%';
  if (p > 0.04) hint.style.opacity = '0';
}, { passive: true });
</script>
</body>
</html>
