<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Chromatic Aberration Text</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0a0810;font-family:system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 20px;gap:32px;overflow-x:hidden;
  cursor:default
}

/* ── glitch text ── */
.glitch{
  position:relative;
  font-size:clamp(36px,8vw,88px);
  font-weight:900;
  color:#fff;
  letter-spacing:-.04em;
  line-height:1;
  user-select:none;
  text-align:center;
  transition:color .2s
}
.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  top:0;left:0;width:100%;
  overflow:hidden;
  pointer-events:none;
  clip-path:inset(0 100% 0 0);
  transition:clip-path 0s .35s, transform .35s cubic-bezier(.22,1,.36,1), opacity .1s
}
.glitch::before{
  color:#ff2060;
  mix-blend-mode:screen;
  transform:translateX(0);
  opacity:0
}
.glitch::after{
  color:#00e8ff;
  mix-blend-mode:screen;
  transform:translateX(0);
  opacity:0
}

/* hover state */
.glitch:hover::before,
.glitch:hover::after{
  clip-path:inset(0);
  opacity:1;
  transition:clip-path 0s 0s, transform .35s cubic-bezier(.22,1,.36,1), opacity .05s
}
.glitch:hover::before{
  animation:aberR .45s cubic-bezier(.22,1,.36,1) forwards
}
.glitch:hover::after{
  animation:aberC .45s cubic-bezier(.22,1,.36,1) forwards
}

@keyframes aberR{
  0%  {transform:translateX(0)      scaleX(1)}
  20% {transform:translateX(-10px)  scaleX(1.015)}
  60% {transform:translateX(-7px)   scaleX(1)}
  100%{transform:translateX(-6px)   scaleX(1)}
}
@keyframes aberC{
  0%  {transform:translateX(0)      scaleX(1)}
  20% {transform:translateX( 10px)  scaleX(1.015)}
  60% {transform:translateX( 7px)   scaleX(1)}
  100%{transform:translateX( 6px)   scaleX(1)}
}

/* extra: vertical glitch slice on first item */
.glitch.wild:hover::before{
  animation:aberRw .5s cubic-bezier(.22,1,.36,1) forwards
}
.glitch.wild:hover::after{
  animation:aberCw .5s cubic-bezier(.22,1,.36,1) forwards
}
@keyframes aberRw{
  0%  {transform:translate(0,   0)  scaleX(1)}
  15% {transform:translate(-12px,-4px) scaleX(1.02) skewX(-1deg)}
  50% {transform:translate(-8px, 2px) scaleX(1)}
  100%{transform:translate(-6px, 0)}
}
@keyframes aberCw{
  0%  {transform:translate(0,   0)  scaleX(1)}
  15% {transform:translate(12px, 4px) scaleX(1.02) skewX(1deg)}
  50% {transform:translate( 8px,-2px) scaleX(1)}
  100%{transform:translate( 6px, 0)}
}

/* strength CSS variable integration */
.glitch.strong:hover::before{animation-name:aberRS}
.glitch.strong:hover::after {animation-name:aberCS}
@keyframes aberRS{0%{transform:translateX(0)}20%{transform:translateX(calc(var(--str,-14px)*1)}100%{transform:translateX(calc(var(--str,-14px)*.7))}}
@keyframes aberCS{0%{transform:translateX(0)}20%{transform:translateX(calc(var(--str,14px)*-1))}100%{transform:translateX(calc(var(--str,14px)*.7))}}

/* ── palette-tinted variants ── */
.g-purple::before{color:#ff30ff}
.g-purple::after {color:#30ffff}
.g-gold::before  {color:#ff4000}
.g-gold::after   {color:#00ddff}

/* ── divider ── */
.divider{width:80px;height:1px;background:rgba(255,255,255,.1)}

/* ── subtext ── */
.sub{
  font-size:13px;color:rgba(255,255,255,.25);
  text-align:center;line-height:1.5;max-width:400px
}
code{color:rgba(180,150,255,.6);font-size:.95em}

/* ── strength panel ── */
.panel{
  position:fixed;top:14px;right:14px;z-index:100;
  background:rgba(0,0,0,.45);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.09);border-radius:12px;
  padding:10px 14px;display:flex;flex-direction:column;gap:6px;
  font-size:10px;color:rgba(255,255,255,.4)
}
.panel label{display:flex;align-items:center;gap:8px;white-space:nowrap}
.panel input[type=range]{
  width:80px;height:3px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer
}
.panel input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:#c084fc
}

/* ── credit ── */
.credit{
  position:fixed;bottom:10px;right:14px;z-index:100;
  font-size:9px;color:rgba(255,255,255,.18)
}
</style>
</head>
<body>

<div class="panel">
  <label>Shift <input type="range" id="str" min="2" max="20" value="6"> <span id="strV">6</span>px</label>
  <label>Style
    <select id="sel" style="background:#1a1228;border:1px solid rgba(255,255,255,.1);color:#c0b0e0;border-radius:4px;padding:2px 4px;font-size:10px">
      <option value="">Classic</option>
      <option value="g-purple">Purple</option>
      <option value="g-gold">Gold</option>
      <option value="wild">Wild</option>
    </select>
  </label>
</div>

<p class="sub">Hover each word — <code>::before</code> &amp; <code>::after</code> shift channels via <code>mix-blend-mode: screen</code></p>
<div class="divider"></div>

<span class="glitch" data-text="GLITCH" id="g1">GLITCH</span>
<span class="glitch" data-text="ABERRATE" id="g2">ABERRATE</span>
<span class="glitch" data-text="CHROMATIC" id="g3">CHROMATIC</span>
<span class="glitch" data-text="DISTORT" id="g4">DISTORT</span>

<div class="divider"></div>
<p class="sub">CSS only · no canvas · no WebGL · just <code>::before</code>, <code>::after</code>, and <code>mix-blend-mode: screen</code></p>

<div class="credit">Inspired by multiple CodePen authors · UI Spotlight Day 14 · Drop #3</div>

<script>
const glitches = document.querySelectorAll('.glitch');
const strEl    = document.getElementById('str');
const strV     = document.getElementById('strV');
const sel      = document.getElementById('sel');

strEl.addEventListener('input', () => {
  const v = strEl.value;
  strV.textContent = v;
  document.documentElement.style.setProperty('--shift', v + 'px');
  // rewrite keyframes live by updating custom property used in .strong
  glitches.forEach(g => g.style.setProperty('--str', v + 'px'));
});

sel.addEventListener('change', () => {
  glitches.forEach(g => {
    g.className = 'glitch ' + sel.value;
  });
});

// touch support: toggle on tap
glitches.forEach(g => {
  let timer;
  g.addEventListener('touchstart', () => {
    g.classList.add('hover');
    clearTimeout(timer);
    timer = setTimeout(() => g.classList.remove('hover'), 600);
  }, { passive: true });
});
</script>
</body>
</html>
