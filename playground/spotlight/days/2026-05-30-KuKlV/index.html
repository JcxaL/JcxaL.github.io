<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UI Spotlight — Day 14</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080610;font-family:system-ui,-apple-system,sans-serif;color:#e8e0f8}

/* ── header ── */
header{
  padding:22px 28px 0;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap
}
.day-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:#4a3068;padding:4px 10px;border:1px solid rgba(255,255,255,.07);
  border-radius:20px
}
header h1{font-size:clamp(16px,3vw,22px);font-weight:900;letter-spacing:-.03em;color:#c084fc}
header p{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px}

/* ── grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));
  gap:16px;
  padding:20px 28px 28px
}

/* ── drop card ── */
.card{
  border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  cursor:pointer;transition:transform .18s,box-shadow .18s;
  text-decoration:none;color:inherit;display:block
}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.card:active{transform:translateY(-1px)}

.preview{
  width:100%;height:200px;position:relative;overflow:hidden;
  background:var(--bg,#1a1030)
}
.preview iframe{
  width:100%;height:100%;border:none;pointer-events:none;
  transform-origin:top left
}

/* bucket badge */
.bucket-badge{
  position:absolute;top:10px;left:10px;
  padding:3px 9px;border-radius:12px;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7)
}

.card-body{padding:14px 16px 16px}
.drop-num{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#4a3068;margin-bottom:5px}
.card-body h2{font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.card-body p{font-size:12px;color:rgba(255,255,255,.42);line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.tag{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.35)}

/* ── fullscreen overlay ── */
#overlay{
  position:fixed;inset:0;z-index:1000;
  background:#000;display:none;flex-direction:column
}
#overlay.show{display:flex}
#overlay-header{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;background:rgba(0,0,0,.8);
  border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0
}
#overlay-close{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.1);border:none;
  color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
#overlay-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}
#overlay-iframe{flex:1;border:none;width:100%}

/* credit */
.credit{padding:8px 28px;font-size:9px;color:rgba(255,255,255,.18)}
</style>
</head>
<body>

<header>
  <div class="day-badge">Day 14</div>
  <div>
    <h1>Sticky Scroll · timeline-scope · Chromatic · Invert · Radial</h1>
    <p>Five live UI pattern demos — click any card to open fullscreen</p>
  </div>
</header>

<div class="grid" id="grid"></div>
<div class="credit">UI Spotlight · jccl.me · 2026-05-30</div>

<div id="overlay">
  <div id="overlay-header">
    <button id="overlay-close">✕</button>
    <span id="overlay-title"></span>
  </div>
  <iframe id="overlay-iframe" title="Demo"></iframe>
</div>

<script>
const DROPS = [
  {
    n: 1, bucket: 'Animation',
    title: 'Sticky Grid Scroll',
    desc:  'A grid of 12 cards pinned in the viewport — columns animate in from opposite directions as you scroll, using only CSS scroll-driven animations.',
    tags:  ['scroll-driven','position:sticky','animation-range','CSS only'],
    bg:    '#08060e'
  },
  {
    n: 2, bucket: 'Layout',
    title: 'CSS timeline-scope',
    desc:  'Scrolling a text column drives a sticky image panel in a separate DOM branch — via named view-timelines and timeline-scope on the ancestor.',
    tags:  ['timeline-scope','view-timeline','cross-DOM','CSS only'],
    bg:    '#09070f'
  },
  {
    n: 3, bucket: 'Typography',
    title: 'Chromatic Aberration',
    desc:  'Hover to split text into red and cyan channels via ::before/::after with mix-blend-mode: screen — tunable shift strength.',
    tags:  ['mix-blend-mode','::before','::after','hover animation'],
    bg:    '#0a0810'
  },
  {
    n: 4, bucket: 'Micro-interaction',
    title: 'Inverting Cursor',
    desc:  'A white circle follows the cursor and inverts every colour beneath it using mix-blend-mode: difference — zero JS compositing.',
    tags:  ['mix-blend-mode:difference','custom cursor','spring easing'],
    bg:    '#f0ece8'
  },
  {
    n: 5, bucket: 'Component',
    title: 'CSS Radial Menu',
    desc:  'Three radial menus built entirely with CSS calc(cos()) and calc(sin()) to position items in a circle — no JavaScript geometry.',
    tags:  ['CSS trig','calc(cos())','calc(sin())','custom properties'],
    bg:    '#080510'
  }
];

const grid = document.getElementById('grid');

DROPS.forEach(d => {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = `${d.n}/index.html`;
  card.target = '_blank';

  const tagsHtml = d.tags.map(t => `<span class="tag">${t}</span>`).join('');
  card.innerHTML = `
    <div class="preview" style="--bg:${d.bg}">
      <iframe src="${d.n}/index.html" loading="lazy" title="${d.title}" tabindex="-1" aria-hidden="true"></iframe>
      <div class="bucket-badge">${d.bucket}</div>
    </div>
    <div class="card-body">
      <div class="drop-num">Drop ${d.n}</div>
      <h2>${d.title}</h2>
      <p>${d.desc}</p>
      <div class="tags">${tagsHtml}</div>
    </div>`;

  // Click: open fullscreen overlay
  card.addEventListener('click', e => {
    e.preventDefault();
    openOverlay(d.n, d.title);
  });

  grid.appendChild(card);
});

const overlay       = document.getElementById('overlay');
const overlayClose  = document.getElementById('overlay-close');
const overlayTitle  = document.getElementById('overlay-title');
const overlayIframe = document.getElementById('overlay-iframe');

function openOverlay(n, title) {
  overlayTitle.textContent = `Drop ${n} — ${title}`;
  overlayIframe.src = `${n}/index.html`;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}
overlayClose.addEventListener('click', () => {
  overlay.classList.remove('show');
  overlayIframe.src = '';
  document.body.style.overflow = '';
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') overlayClose.click();
});
</script>
</body>
</html>
