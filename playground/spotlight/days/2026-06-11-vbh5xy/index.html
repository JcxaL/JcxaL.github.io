<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UI Spotlight — Day 26</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04040a;--card:#0b0b18;--border:rgba(255,255,255,0.07);--accent:#7c3aed}
html,body{height:100%;background:var(--bg);color:#c0c4e0;font-family:system-ui,sans-serif}

body{display:flex;flex-direction:column;min-height:100vh}

header{
  padding:1.5rem 2rem 1rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;
}
.hdr-left h1{
  font-size:clamp(.9rem,2vw,1.1rem);font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.2);
}
.hdr-left p{font-size:.75rem;color:#30306a;margin-top:.3rem}
.day-badge{
  font-size:.7rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--accent);
  background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);
  padding:.3rem .75rem;border-radius:20px;white-space:nowrap;
}

.grid{
  flex:1;display:grid;
  grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));
  grid-auto-rows:1fr;
  gap:1px;background:var(--border);
  border-top:1px solid var(--border);
}

.drop{
  background:var(--card);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  text-decoration:none;color:inherit;
  min-height:200px;
}
.drop:hover .preview{transform:scale(1.02)}
.drop:hover .overlay{opacity:1}

.preview{
  flex:1;position:relative;
  transition:transform .3s ease;
  overflow:hidden;
}
.preview iframe{
  width:100%;height:100%;border:none;
  pointer-events:none;
  transform-origin:top left;
}

.overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(4,4,10,.95) 100%);
  opacity:0;transition:opacity .2s;
  display:flex;align-items:flex-end;
  padding:1rem;
}
.overlay span{
  font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.8);
}

.meta{
  padding:.75rem 1rem;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.meta-left{flex:1;min-width:0}
.drop-num{
  font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--num-color,#6366f1);margin-bottom:.2rem;
}
.drop-title{font-size:.85rem;font-weight:700;color:#a0a4c0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-bucket{font-size:.65rem;color:#2a2a5a;margin-top:.15rem;
  text-transform:capitalize;letter-spacing:.04em}
.open-btn{
  padding:.35rem .75rem;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:#4040a0;cursor:pointer;font-size:.7rem;
  text-decoration:none;transition:background .15s,color .15s;white-space:nowrap;
  flex-shrink:0;
}
.open-btn:hover{background:rgba(255,255,255,.06);color:#c0c4e0}

footer{
  padding:.75rem 2rem;text-align:center;
  font-size:.65rem;color:#1c1c3a;
  border-top:1px solid var(--border);
}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <h1>UI Spotlight</h1>
    <p>Scroll Stagger · Bento Spotlight · @property Gradient · Glare Tilt · Morphing Text</p>
  </div>
  <div class="day-badge">Day 26</div>
</header>

<div class="grid" id="grid"></div>

<footer>UI Spotlight Day 26 · 2026-06-11 · Five live demos recreating trending UI patterns</footer>

<script>
const DROPS = [
  {num:'01',title:'Staggered Scroll Cascade',bucket:'animation',   color:'#6366f1',path:'1/'},
  {num:'02',title:'Bento Spotlight Grid',    bucket:'layout',      color:'#38bdf8',path:'2/'},
  {num:'03',title:'@property Gradient Text', bucket:'typography',  color:'#a855f7',path:'3/'},
  {num:'04',title:'Glare Tilt Cards',        bucket:'micro-interaction',color:'#10d9a0',path:'4/'},
  {num:'05',title:'Morphing Text',           bucket:'component',   color:'#f59e0b',path:'5/'},
];

const grid = document.getElementById('grid');

DROPS.forEach(d => {
  const a = document.createElement('a');
  a.href   = d.path;
  a.target = '_blank';
  a.className = 'drop';

  a.innerHTML = `
    <div class="preview">
      <iframe src="${d.path}" loading="lazy" scrolling="no"
        title="${d.title}" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="overlay"><span>Open full demo →</span></div>
    </div>
    <div class="meta">
      <div class="meta-left">
        <div class="drop-num" style="--num-color:${d.color}">Drop ${d.num}</div>
        <div class="drop-title">${d.title}</div>
        <div class="drop-bucket">${d.bucket}</div>
      </div>
      <span class="open-btn">Open →</span>
    </div>`;

  grid.appendChild(a);
});

// Fit iframes to preview area
function fitIframes() {
  document.querySelectorAll('.preview iframe').forEach(iframe => {
    const pr = iframe.parentElement.getBoundingClientRect();
    const W  = pr.width  || 300;
    const H  = pr.height || 200;
    const scale = Math.min(W / 1280, H / 800);
    iframe.style.width     = '1280px';
    iframe.style.height    = '800px';
    iframe.style.transform = `scale(${scale})`;
    iframe.style.transformOrigin = 'top left';
  });
}

const ro = new ResizeObserver(fitIframes);
document.querySelectorAll('.preview').forEach(p => ro.observe(p));
fitIframes();
</script>
</body>
</html>
