<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Staggered Scroll Cascade</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050508;--card:#0f0f18;--border:rgba(255,255,255,0.07);--accent:#6366f1}
body{background:var(--bg);color:#d0d4f0;font-family:system-ui,sans-serif;overflow-x:hidden}

#panel{
  position:fixed;top:14px;right:14px;z-index:10;
  background:rgba(10,10,20,.8);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:10px;padding:10px 14px;
  font-size:11px;color:#6060a0;
}
#panel label{display:flex;align-items:center;gap:8px;margin-top:6px}
#panel input[type=range]{width:80px;accent-color:var(--accent)}

.hero{
  height:60vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:2rem;border-bottom:1px solid var(--border);
}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,#a5b4fc,#c084fc,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{font-size:.95rem;color:#50508a;margin-top:.75rem}
.hero .arrow{font-size:1.5rem;margin-top:1.5rem;animation:bob 1.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

.grid-section{padding:3rem 2rem 6rem;max-width:1000px;margin:0 auto}
.grid-section h2{font-size:1.1rem;font-weight:600;color:#4040a0;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:2rem;text-align:center}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1.5rem;
  opacity:0;transform:translateY(40px);
  transition:opacity .55s cubic-bezier(.22,1,.36,1),
             transform .55s cubic-bezier(.22,1,.36,1);
}
.card.visible{opacity:1;transform:none}

.card-icon{font-size:1.8rem;margin-bottom:.75rem}
.card-title{font-size:.9rem;font-weight:700;margin-bottom:.4rem;color:#a0a4c0}
.card-body{font-size:.78rem;color:#404060;line-height:1.5}

.card.large{grid-column:span 2}
.card.tall{grid-row:span 2}

/* Accent stripe on left */
.card::before{
  content:'';position:absolute;left:0;top:20%;height:60%;width:2px;
  border-radius:2px;background:var(--stripe-color,#6366f1);
  transform:scaleY(0);transform-origin:center;
  transition:transform .4s .2s cubic-bezier(.22,1,.36,1);
}
.card{position:relative}
.card.visible::before{transform:scaleY(1)}

/* Hover */
.card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-3px)!important;
  transition-duration:.2s!important}

.divider{height:1px;background:var(--border);margin:4rem 0}

.credit{text-align:center;font-size:10px;color:#2a2a4a;padding:2rem}
</style>
</head>
<body>
<div id="panel">
  Stagger Cascade
  <label>Delay <input type="range" id="delayRange" min="30" max="180" value="70"> <span id="delayVal">70</span>ms</label>
  <label>Distance <input type="range" id="distRange" min="20" max="120" value="40"> <span id="distVal">40</span>px</label>
</div>

<div class="hero">
  <h1>Scroll to Reveal</h1>
  <p>Cards cascade in as they enter the viewport —<br>each with a staggered delay and spring easing.</p>
  <div class="arrow">↓</div>
</div>

<div class="grid-section">
  <h2>Block 1 — Products</h2>
  <div class="grid" id="grid1"></div>

  <div class="divider"></div>

  <h2>Block 2 — Features</h2>
  <div class="grid" id="grid2"></div>

  <div class="divider"></div>

  <h2>Block 3 — Stats</h2>
  <div class="grid" id="grid3"></div>
</div>

<div class="credit">Inspired by scroll-stagger entrance patterns · UI Spotlight Day 26 · Drop #1</div>

<script>
const CARD_DATA = [
  { icon:'🎨', title:'Design System', body:'Tokens, components, and guidelines that scale across every platform.', stripe:'#6366f1' },
  { icon:'⚡', title:'Performance', body:'Sub-50ms interactions, lazy hydration, and zero layout shift.', stripe:'#38bdf8' },
  { icon:'🔐', title:'Security', body:'End-to-end encryption, SOC 2 Type II, and audit logging built in.', stripe:'#10d9a0' },
  { icon:'📊', title:'Analytics', body:'Real-time dashboards with sub-second query latency on billions of rows.', stripe:'#a855f7', cls:'large' },
  { icon:'🌍', title:'Global CDN', body:'200+ edge nodes serving assets in < 10ms.', stripe:'#f59e0b' },
  { icon:'🤝', title:'Collaboration', body:'Live presence, comments, and shared cursors on every view.', stripe:'#ec4899' },
];

const F_DATA = [
  { icon:'🧩', title:'Modular', body:'Drop in only what you need.', stripe:'#6366f1' },
  { icon:'🔄', title:'Real-time sync', body:'Automatic conflict resolution.', stripe:'#38bdf8' },
  { icon:'🎯', title:'Predictive', body:'AI completes your workflow.', stripe:'#10d9a0' },
  { icon:'📦', title:'One bundle', body:'< 10 kB gzipped.', stripe:'#a855f7' },
  { icon:'🚀', title:'Deploy anywhere', body:'Edge, serverless, or traditional.', stripe:'#f59e0b' },
  { icon:'♾️', title:'Infinite scale', body:'Handles 1 req or 1 billion.', stripe:'#ec4899' },
];

const S_DATA = [
  { icon:'', title:'99.99%', body:'uptime SLA across all regions', stripe:'#10d9a0', cls:'large' },
  { icon:'', title:'< 50ms', body:'P99 latency globally', stripe:'#38bdf8' },
  { icon:'', title:'2M+', body:'developers building with us', stripe:'#6366f1' },
  { icon:'', title:'10B+', body:'API calls per day', stripe:'#a855f7', cls:'large' },
  { icon:'', title:'SOC 2', body:'Type II certified', stripe:'#f59e0b' },
];

let delay = 70, dist = 40;

function buildGrid(id, data) {
  const g = document.getElementById(id);
  data.forEach((d, i) => {
    const c = document.createElement('div');
    c.className = 'card' + (d.cls ? ' ' + d.cls : '');
    c.style.setProperty('--stripe-color', d.stripe);
    c.style.setProperty('--i', i);
    c.innerHTML = (d.icon ? `<div class="card-icon">${d.icon}</div>` : '') +
      `<div class="card-title">${d.title}</div>` +
      `<div class="card-body">${d.body}</div>`;
    g.appendChild(c);
  });
}

['grid1','grid2','grid3'].forEach((id, gi) =>
  buildGrid(id, [CARD_DATA, F_DATA, S_DATA][gi])
);

// IntersectionObserver with configurable stagger
let observer;
function setupObserver() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const card = entry.target;
      const siblings = Array.from(card.parentElement.children);
      const idx = siblings.indexOf(card);
      card.style.transitionDelay = (idx * delay) + 'ms';
      card.style.transform = `translateY(${dist}px)`;
      // Force reflow then animate
      requestAnimationFrame(() => {
        card.classList.add('visible');
      });
      observer.unobserve(card);
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('visible');
    c.style.transitionDelay = '';
    c.style.transform = `translateY(${dist}px)`;
    observer.observe(c);
  });
}

setupObserver();

document.getElementById('delayRange').addEventListener('input', function() {
  delay = +this.value;
  document.getElementById('delayVal').textContent = delay;
  setupObserver();
});
document.getElementById('distRange').addEventListener('input', function() {
  dist = +this.value;
  document.getElementById('distVal').textContent = dist;
  setupObserver();
});
</script>
</body>
</html>
