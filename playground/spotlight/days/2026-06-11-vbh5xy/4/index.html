<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glare Tilt Cards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#040408;color:#c0c4e0;font-family:system-ui,sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem;
  perspective:1200px;
}

h1{font-size:.85rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.15);margin-bottom:2rem;text-align:center}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1.25rem;
  width:100%;max-width:880px;
}

.card{
  background:var(--card-bg,#0d0d1e);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;
  padding:1.5rem;
  position:relative;
  overflow:hidden;
  transform-style:preserve-3d;
  transition:transform .12s ease-out, box-shadow .12s ease-out;
  will-change:transform;
  cursor:default;
}

/* Glare overlay */
.card::after{
  content:'';
  position:absolute;inset:0;
  background:conic-gradient(
    from var(--glare-angle, 180deg) at var(--gx,50%) var(--gy,50%),
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,var(--glare-alpha,0)) 8%,
    rgba(255,255,255,0) 15%
  );
  pointer-events:none;
  transition:opacity .2s;
  border-radius:inherit;
  mix-blend-mode:overlay;
}

/* Shimmer border */
.card::before{
  content:'';
  position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(
    calc(var(--tilt-angle, 135deg)),
    rgba(255,255,255,.12) 0%,
    rgba(255,255,255,0) 40%,
    rgba(255,255,255,0) 60%,
    rgba(255,255,255,.06) 100%
  );
  pointer-events:none;
}

.card-icon{font-size:2rem;margin-bottom:1rem}
.card-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:.3rem}
.card-title{font-size:.95rem;font-weight:700;color:#d0d4f0;margin-bottom:.4rem}
.card-body{font-size:.75rem;color:#30304a;line-height:1.5}

/* Colored accent at bottom */
.card-accent{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent);border-radius:0 0 16px 16px;
  opacity:.6;
}

/* Active press */
.card:active{transform:scale(.98) !important}

#panel{
  position:fixed;top:14px;right:14px;
  background:rgba(8,8,16,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  padding:10px 14px;font-size:10px;color:#40408a;
}
#panel label{display:flex;align-items:center;gap:6px;margin-top:5px}
#panel input{accent-color:#7c3aed;width:70px}

.credit{
  font-size:9px;color:#18183a;margin-top:1.5rem;text-align:center
}
</style>
</head>
<body>
<h1>Glare Tilt — Hover to see</h1>
<div class="grid" id="grid"></div>
<div id="panel">
  Glare + Tilt
  <label>Tilt <input type="range" id="tR" min="0" max="25" value="12"> <span id="tV">12</span>°</label>
  <label>Glare<input type="range" id="gR" min="0" max="10" value="5"> <span id="gV">5</span></label>
</div>
<div class="credit">Inspired by Robin Decroon · Magic UI Glare Hover · UI Spotlight Day 26 · Drop #4</div>

<script>
const CARDS = [
  {icon:'🚀',label:'Velocity',title:'Ship faster',body:'Zero-config pipelines, instant previews, and one-click rollbacks.',accent:'#6366f1'},
  {icon:'🎨',label:'Polish',title:'Pixel perfect',body:'Design tokens propagate to every component automatically.',accent:'#a855f7'},
  {icon:'🔐',label:'Trust',title:'Secure by default',body:'End-to-end encryption and audit trails on every action.',accent:'#38bdf8'},
  {icon:'📊',label:'Insights',title:'Real-time metrics',body:'Sub-second dashboards on billions of events.',accent:'#10b981'},
  {icon:'🌍',label:'Global',title:'Edge-first CDN',body:'200+ PoPs serving your assets in under 10ms.',accent:'#f59e0b'},
  {icon:'🤝',label:'Teams',title:'Live collaboration',body:'Shared cursors, comments, and presence on every view.',accent:'#ec4899'},
];

const grid = document.getElementById('grid');
CARDS.forEach(c => {
  const el = document.createElement('div');
  el.className = 'card';
  el.style.setProperty('--accent', c.accent);
  el.innerHTML = `
    <div class="card-icon">${c.icon}</div>
    <div class="card-label">${c.label}</div>
    <div class="card-title">${c.title}</div>
    <div class="card-body">${c.body}</div>
    <div class="card-accent"></div>`;
  grid.appendChild(el);
});

let tiltMax = 12, glareMax = 5;

document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const r  = card.getBoundingClientRect();
    const mx = (e.clientX - r.left) / r.width;   // 0..1
    const my = (e.clientY - r.top)  / r.height;  // 0..1
    const cx = mx - .5, cy = my - .5;

    // 3D tilt
    card.style.transform =
      `perspective(800px) rotateY(${cx * tiltMax * 2}deg) rotateX(${-cy * tiltMax * 2}deg) scale(1.04)`;
    card.style.boxShadow =
      `${-cx * 12}px ${-cy * 12}px 40px rgba(0,0,0,.5)`;

    // Glare
    const gx = mx * 100;
    const gy = my * 100;
    const angle = Math.atan2(cy, cx) * 180 / Math.PI + 180;
    card.style.setProperty('--gx', gx + '%');
    card.style.setProperty('--gy', gy + '%');
    card.style.setProperty('--glare-angle', angle + 'deg');
    card.style.setProperty('--glare-alpha', (glareMax / 10).toFixed(2));
    card.style.setProperty('--tilt-angle', (angle) + 'deg');
  });

  card.addEventListener('mouseleave', () => {
    card.style.transform = '';
    card.style.boxShadow = '';
    card.style.setProperty('--glare-alpha', 0);
  });
});

document.getElementById('tR').addEventListener('input', function() {
  tiltMax = +this.value;
  document.getElementById('tV').textContent = tiltMax;
});
document.getElementById('gR').addEventListener('input', function() {
  glareMax = +this.value;
  document.getElementById('gV').textContent = glareMax;
});
</script>
</body>
</html>
