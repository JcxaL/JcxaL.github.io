<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bento Spotlight Grid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04040a;--card:#0b0b16;--border:rgba(255,255,255,0.07);--accent:#7c3aed}
body{
  background:var(--bg);color:#c8ccf0;font-family:system-ui,sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:2rem 1rem;
}

h1{font-size:1.1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.18);margin-bottom:1.5rem;text-align:center}

.bento{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:130px;
  gap:10px;
  width:100%;max-width:860px;
}

.cell{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.25rem;
  position:relative;
  overflow:hidden;
  cursor:default;
  transition:border-color .2s;
}
.cell:hover{border-color:rgba(255,255,255,.14)}

/* Cursor spotlight */
.cell::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(
    280px circle at var(--mx,50%) var(--my,50%),
    rgba(255,255,255,.055) 0%,
    transparent 70%
  );
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:1;
}
.cell:hover::before{opacity:1}

/* 3D tilt via JS */
.cell-inner{
  position:relative;z-index:2;height:100%;
  display:flex;flex-direction:column;justify-content:space-between;
}

.cell-icon{font-size:1.6rem;line-height:1}
.cell-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:rgba(255,255,255,.25)}
.cell-title{font-size:1rem;font-weight:700;line-height:1.2;color:#d0d4f0}
.cell-body{font-size:.75rem;color:#404068;line-height:1.5;margin-top:.3rem}
.cell-stat{font-size:2.2rem;font-weight:800;
  background:var(--stripe);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;line-height:1}

/* Spans */
.c2{grid-column:span 2} .c3{grid-column:span 3}
.r2{grid-row:span 2}

/* Inline accent gradient decoration */
.cell-glow{
  position:absolute;bottom:-30px;right:-30px;
  width:100px;height:100px;border-radius:50%;
  background:var(--stripe,#7c3aed);
  filter:blur(40px);opacity:.15;pointer-events:none;
}

#panel{
  position:fixed;top:14px;right:14px;
  background:rgba(8,8,16,.85);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:11px;color:#4040a0;
}
#panel label{display:flex;align-items:center;gap:6px;margin-top:5px}
#panel input{accent-color:var(--accent);width:70px}

.credit{
  font-size:9px;color:#20203a;margin-top:1.5rem;text-align:center
}
</style>
</head>
<body>
<h1>Bento · Cursor Spotlight</h1>

<div class="bento" id="bento"></div>

<div id="panel">
  Bento Spotlight
  <label>Intensity <input type="range" id="iRange" min="1" max="10" value="5"> <span id="iVal">5</span></label>
  <label>Tilt <input type="range" id="tRange" min="0" max="15" value="7"> <span id="tVal">7</span>°</label>
</div>

<div class="credit">Inspired by Linear landing page · Magic UI Spotlight · UI Spotlight Day 26 · Drop #2</div>

<script>
const CELLS = [
  {cls:'c2',icon:'🚀',label:'Performance',title:'Sub-50ms everywhere',body:'Edge-cached, compressed, and server-pushed to every user.',stripe:'linear-gradient(135deg,#6366f1,#a855f7)'},
  {cls:'',icon:'🎨',label:'Design',title:'Token-first system',stripe:'linear-gradient(135deg,#38bdf8,#6366f1)'},
  {cls:'r2',icon:'📈',stat:'99.9%',label:'Uptime SLA',stripe:'linear-gradient(135deg,#10b981,#38bdf8)'},
  {cls:'c3',icon:'🌍',label:'Scale',title:'200+ edge nodes',body:'Milliseconds to any user, anywhere on Earth.',stripe:'linear-gradient(135deg,#a855f7,#ec4899)'},
  {cls:'',icon:'🤝',label:'Collaboration',title:'Real-time',stripe:'linear-gradient(135deg,#f59e0b,#ef4444)'},
  {cls:'c2',icon:'🔐',label:'Security',title:'Zero-trust architecture',body:'Every request authenticated, encrypted, and audited.',stripe:'linear-gradient(135deg,#ef4444,#f59e0b)'},
  {cls:'',icon:'🧩',stat:'150+',label:'Components',stripe:'linear-gradient(135deg,#ec4899,#a855f7)'},
  {cls:'',icon:'⚡',stat:'10B+',label:'API calls/day',stripe:'linear-gradient(135deg,#f59e0b,#10b981)'},
];

const bento = document.getElementById('bento');
CELLS.forEach(c => {
  const el = document.createElement('div');
  el.className = 'cell ' + (c.cls||'');
  el.innerHTML = `
    <div class="cell-glow" style="--stripe:${c.stripe.replace('linear-gradient','').replace('(135deg,','').split(',')[0].trim().replace(')','')};background:${c.stripe.split(',')[1]||'#7c3aed'};"></div>
    <div class="cell-inner">
      <div class="cell-icon">${c.icon}</div>
      <div>
        ${c.stat ? `<div class="cell-stat" style="--stripe:${c.stripe}">${c.stat}</div>` : ''}
        <div class="cell-label">${c.label}</div>
        ${c.title ? `<div class="cell-title">${c.title}</div>` : ''}
        ${c.body  ? `<div class="cell-body">${c.body}</div>` : ''}
      </div>
    </div>`;
  bento.appendChild(el);
});

let intensity = 5, tiltMax = 7;

// Per-cell mouse tracking
document.querySelectorAll('.cell').forEach(cell => {
  cell.addEventListener('mousemove', e => {
    const r = cell.getBoundingClientRect();
    const mx = ((e.clientX - r.left) / r.width)  * 100;
    const my = ((e.clientY - r.top)  / r.height) * 100;
    cell.style.setProperty('--mx', mx + '%');
    cell.style.setProperty('--my', my + '%');

    // 3D tilt
    const cx = mx / 100 - .5;
    const cy = my / 100 - .5;
    const t  = tiltMax * (intensity / 5);
    cell.style.transform = `perspective(600px) rotateY(${cx * t}deg) rotateX(${-cy * t}deg) scale(1.02)`;
  });
  cell.addEventListener('mouseleave', () => {
    cell.style.transform = '';
    cell.style.setProperty('--mx','50%');
    cell.style.setProperty('--my','50%');
  });
});

document.getElementById('iRange').addEventListener('input', function() {
  intensity = +this.value;
  document.getElementById('iVal').textContent = intensity;
});
document.getElementById('tRange').addEventListener('input', function() {
  tiltMax = +this.value;
  document.getElementById('tVal').textContent = tiltMax;
});
</script>
</body>
</html>
