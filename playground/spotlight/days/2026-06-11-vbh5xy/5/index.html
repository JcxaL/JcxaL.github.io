<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morphing Text</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#030308;color:#d0d4f0;font-family:system-ui,sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4rem;
  padding:2rem;overflow:hidden;
}

/* ── Morphing word ────────────────────────────────────────── */
.morph-wrap{
  position:relative;height:1.2em;
  font-size:clamp(3rem,10vw,7rem);
  font-weight:900;
  letter-spacing:-.04em;
}
.morph-text{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  white-space:nowrap;
  background:linear-gradient(135deg,#a5b4fc,#c084fc,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  transition:filter .35s ease, opacity .35s ease;
  filter:blur(0px);
  opacity:1;
}
.morph-text.out{
  filter:blur(14px);
  opacity:0;
}
.morph-text.in{
  filter:blur(14px);
  opacity:0;
}

/* ── Typewriter ──────────────────────────────────────────── */
.typewriter{
  font-size:clamp(1.2rem,3.5vw,2rem);
  font-weight:600;
  color:rgba(255,255,255,.7);
  letter-spacing:.04em;
  display:flex;align-items:center;gap:0;
}
.tw-text{border-right:.12em solid #6366f1;padding-right:.12em;
  animation:cursor-blink .75s step-end infinite}
@keyframes cursor-blink{0%,100%{border-color:#6366f1}50%{border-color:transparent}}

/* ── Letter split morphing ───────────────────────────────── */
.letter-morph{
  font-size:clamp(2rem,7vw,4.5rem);
  font-weight:800;
  display:flex;gap:.06em;
  letter-spacing:-.02em;
}
.lm-char{
  display:inline-block;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),
             opacity .3s ease,
             color .5s ease;
  color:#4040a0;
}
.lm-char.active{
  color:#a5b4fc;
  transform:translateY(-6px);
}
.lm-char.prev{
  color:#4040a0;
  transform:translateY(3px);
  opacity:.6;
}

#panel{
  position:fixed;top:14px;right:14px;
  background:rgba(8,8,16,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  padding:10px 14px;font-size:10px;color:#40408a;
}
#panel label{display:flex;align-items:center;gap:6px;margin-top:5px}
#panel input{accent-color:#7c3aed;width:70px}

.credit{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:9px;color:#18183a;white-space:nowrap}
</style>
</head>
<body>

<!-- 1. Blur-morph word swap -->
<div class="morph-wrap">
  <div class="morph-text" id="mA">Design</div>
  <div class="morph-text" id="mB">Build</div>
</div>

<!-- 2. Typewriter -->
<div class="typewriter">
  <span class="tw-text" id="twEl"></span>
</div>

<!-- 3. Letter wave active -->
<div class="letter-morph" id="lmWrap"></div>

<div id="panel">
  Morphing Text
  <label>Morph ms<input type="range" id="mspd" min="800" max="5000" value="2000" step="100"> <span id="mspdV">2s</span></label>
  <label>Type ms<input type="range" id="tspd" min="30"  max="200"  value="80" step="5"> <span id="tspdV">80ms</span></label>
</div>

<div class="credit">Inspired by Magic UI Morphing Text · UI Spotlight Day 26 · Drop #5</div>

<script>
// ── 1. Blur morph ──────────────────────────────────────────
const WORDS = ['Design','Build','Ship','Scale','Grow','Create','Launch','Inspire'];
const mA = document.getElementById('mA');
const mB = document.getElementById('mB');
let morphIdx = 0, morphSpeed = 2000;
let morphTimer;

function startMorph() {
  clearInterval(morphTimer);
  morphTimer = setInterval(doMorph, morphSpeed);
}

function doMorph() {
  morphIdx = (morphIdx + 1) % WORDS.length;
  const from = morphIdx % 2 === 0 ? mB : mA;
  const to   = morphIdx % 2 === 0 ? mA : mB;
  to.textContent = WORDS[morphIdx];

  // Phase 1: both blur out
  from.classList.add('out');
  to.classList.add('in');

  setTimeout(() => {
    from.classList.remove('out');
    from.style.opacity = '0';
    from.style.filter  = 'blur(14px)';
    to.classList.remove('in');
    to.style.opacity = '1';
    to.style.filter  = 'blur(0px)';
  }, 350);

  setTimeout(() => {
    from.style.opacity = '';
    from.style.filter  = '';
  }, 400);
}

mA.textContent = WORDS[0];
mB.textContent = WORDS[1];
mB.style.opacity = '0';
mB.style.filter  = 'blur(14px)';
startMorph();

// ── 2. Typewriter ──────────────────────────────────────────
const TW_PHRASES = [
  'Move fast, build better.',
  'Ship what matters.',
  'Craft every pixel.',
  'Done > perfect.',
  'Make something you love.',
];
const twEl = document.getElementById('twEl');
let twPhrase = 0, twChar = 0, twForward = true, twSpeed = 80;
let twTimer;

function tickTypewriter() {
  const phrase = TW_PHRASES[twPhrase];
  if (twForward) {
    twChar++;
    twEl.textContent = phrase.slice(0, twChar);
    if (twChar >= phrase.length) {
      twForward = false;
      clearInterval(twTimer);
      setTimeout(() => { twTimer = setInterval(tickTypewriter, twSpeed); }, 1400);
    }
  } else {
    twChar--;
    twEl.textContent = phrase.slice(0, twChar);
    if (twChar <= 0) {
      twForward = true;
      twPhrase = (twPhrase + 1) % TW_PHRASES.length;
      clearInterval(twTimer);
      setTimeout(() => { twTimer = setInterval(tickTypewriter, twSpeed * .7); }, 300);
    }
  }
}

function startTypewriter() {
  clearInterval(twTimer);
  twTimer = setInterval(tickTypewriter, twSpeed);
}
startTypewriter();

// ── 3. Letter wave ─────────────────────────────────────────
const LM_TEXT = 'FLOW';
const lmWrap = document.getElementById('lmWrap');
LM_TEXT.split('').forEach((ch, i) => {
  const span = document.createElement('span');
  span.className = 'lm-char';
  span.textContent = ch;
  span.dataset.i = i;
  lmWrap.appendChild(span);
});

let lmActive = 0;
setInterval(() => {
  const chars = lmWrap.querySelectorAll('.lm-char');
  chars.forEach((c, i) => {
    c.classList.remove('active','prev');
    const d = Math.abs(i - lmActive);
    if (d === 0) c.classList.add('active');
    else if (d === 1) c.classList.add('prev');
  });
  lmActive = (lmActive + 1) % chars.length;
}, 350);

// ── Controls ───────────────────────────────────────────────
document.getElementById('mspd').addEventListener('input', function() {
  morphSpeed = +this.value;
  document.getElementById('mspdV').textContent = (morphSpeed/1000).toFixed(1) + 's';
  startMorph();
});
document.getElementById('tspd').addEventListener('input', function() {
  twSpeed = +this.value;
  document.getElementById('tspdV').textContent = twSpeed + 'ms';
  startTypewriter();
});
</script>
</body>
</html>
