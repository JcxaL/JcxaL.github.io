<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>@property Gradient Text Flow</title>
<style>
@property --hue {
  syntax: '<number>';
  initial-value: 0;
  inherits: false;
}
@property --hue2 {
  syntax: '<number>';
  initial-value: 60;
  inherits: false;
}
@property --hue3 {
  syntax: '<number>';
  initial-value: 120;
  inherits: false;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#030308;font-family:system-ui,sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3rem;
  padding:2rem;overflow:hidden;
}

/* Animated gradient via @property */
@keyframes hueRotate  { to { --hue:  360 } }
@keyframes hueRotate2 { to { --hue2: 420 } }
@keyframes hueRotate3 { to { --hue3: 480 } }

.flow1{
  --hue: 0;
  animation: hueRotate 4s linear infinite;
  font-size: clamp(2.5rem, 8vw, 5rem);
  font-weight: 900;
  letter-spacing: -.04em;
  background: linear-gradient(90deg,
    hsl(var(--hue), 80%, 65%) 0%,
    hsl(calc(var(--hue) + 80), 80%, 65%) 50%,
    hsl(calc(var(--hue) + 160), 80%, 65%) 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

.flow2{
  --hue2: 60;
  animation: hueRotate2 8s linear infinite;
  font-size: clamp(1.5rem, 5vw, 3rem);
  font-weight: 700;
  letter-spacing: -.02em;
  background: linear-gradient(135deg,
    hsl(var(--hue2), 70%, 60%) 0%,
    hsl(calc(var(--hue2) + 120), 70%, 60%) 33%,
    hsl(calc(var(--hue2) + 240), 70%, 60%) 66%,
    hsl(var(--hue2), 70%, 60%) 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.flow3{
  --hue3: 200;
  animation: hueRotate3 12s linear infinite;
  font-size: clamp(1rem, 3vw, 1.6rem);
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  background: linear-gradient(90deg,
    hsl(var(--hue3), 60%, 55%) 0%,
    hsl(calc(var(--hue3) + 60), 60%, 55%) 50%,
    hsl(calc(var(--hue3) + 120), 60%, 55%) 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Shimmer variant */
@property --shimmer-pos {
  syntax: '<percentage>';
  initial-value: -30%;
  inherits: false;
}
@keyframes shimmer {
  to { --shimmer-pos: 130% }
}

.shimmer-text {
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 800;
  letter-spacing: -.03em;
  color: rgba(255,255,255,.25);
  position: relative;
  --shimmer-pos: -30%;
  animation: shimmer 2.2s linear infinite;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,.1) 0%,
    rgba(255,255,255,.1) calc(var(--shimmer-pos) - 20%),
    rgba(255,255,255,.85) var(--shimmer-pos),
    rgba(255,255,255,.1) calc(var(--shimmer-pos) + 20%),
    rgba(255,255,255,.1) 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Speed controls */
#panel{
  position:fixed;top:14px;right:14px;
  background:rgba(8,8,16,.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  padding:10px 14px;font-size:10px;color:#40408a;
}
#panel label{display:flex;align-items:center;gap:6px;margin-top:5px}
#panel input{accent-color:#7c3aed;width:70px}

.credit{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#1a1a3a;white-space:nowrap;
}
</style>
</head>
<body>

<div class="flow1">Design Magic</div>
<div class="flow2">Build with intention</div>
<div class="shimmer-text">PREMIUM QUALITY</div>
<div class="flow3">Motion · Colour · Typography</div>

<div id="panel">
  @property Gradient
  <label>Flow 1 <input type="range" id="s1" min=".5" max="20" step=".5" value="4"> <span id="sv1">4s</span></label>
  <label>Flow 2 <input type="range" id="s2" min=".5" max="30" step=".5" value="8"> <span id="sv2">8s</span></label>
  <label>Shimmer<input type="range" id="s3" min=".5" max="8"  step=".1" value="2.2"> <span id="sv3">2.2s</span></label>
</div>

<div class="credit">CSS @property technique · UI Spotlight Day 26 · Drop #3</div>

<script>
function setSpeed(id, valId, selector, prop, unit) {
  const inp = document.getElementById(id);
  const sp  = document.getElementById(valId);
  inp.addEventListener('input', () => {
    sp.textContent = inp.value + unit;
    document.querySelectorAll(selector).forEach(el =>
      el.style.animationDuration = inp.value + 's'
    );
  });
}
setSpeed('s1','sv1','.flow1','', 's');
setSpeed('s2','sv2','.flow2','', 's');
setSpeed('s3','sv3','.shimmer-text','', 's');
</script>
</body>
</html>
