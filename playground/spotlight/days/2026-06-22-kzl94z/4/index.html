<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Magnetic Spring Buttons</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09070f;font-family:system-ui,sans-serif;color:#e2d9f3;
  min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

.hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(9,7,15,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.06);z-index:10}
.hdr h1{font-size:16px;font-weight:700;color:#fbbf24}
.pill{font-size:11px;background:rgba(251,191,36,.1);color:#fbbf24;
  border:1px solid rgba(251,191,36,.3);border-radius:999px;padding:3px 10px}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:64px;padding:40px 24px}

.section{display:flex;flex-direction:column;align-items:center;gap:24px}
.section h2{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:rgba(226,217,243,.4)}

/* ── Magnetic field buttons ── */
.mag-field{position:relative;width:320px;height:120px;display:flex;align-items:center;justify-content:center;gap:20px}

.mag-btn{
  position:relative;
  padding:14px 28px;
  border-radius:12px;
  font-size:14px;font-weight:600;
  border:none;cursor:pointer;
  transition:box-shadow .2s;
  will-change:transform;
  transform:translate(0px,0px);
}

/* Variants */
.mag-btn.gold{background:#fbbf24;color:#09070f}
.mag-btn.gold:hover{box-shadow:0 0 30px rgba(251,191,36,.4)}
.mag-btn.outline{background:transparent;color:#fbbf24;border:1.5px solid #fbbf24}
.mag-btn.outline:hover{box-shadow:0 0 30px rgba(251,191,36,.25)}
.mag-btn.ghost{background:rgba(251,191,36,.08);color:#e2d9f3;border:1px solid rgba(251,191,36,.2)}
.mag-btn.ghost:hover{box-shadow:0 0 30px rgba(251,191,36,.15)}

/* inner text layer — translates opposite direction for parallax */
.mag-btn .inner{
  display:block;
  will-change:transform;
  pointer-events:none;
  transition:transform .05s;
}

/* ── Grid of 9 ── */
.grid-9{display:grid;grid-template-columns:repeat(3,120px);gap:16px}

.g-btn{
  padding:18px;
  border-radius:14px;
  font-size:13px;font-weight:600;
  text-align:center;
  cursor:pointer;
  border:1.5px solid var(--c,#c084fc);
  background:rgba(var(--cr,192,132,252),.08);
  color:var(--c,#c084fc);
  will-change:transform;
  transition:box-shadow .2s;
}

/* ── Debug panel ── */
.debug{position:fixed;top:68px;right:12px;background:rgba(9,7,15,.85);backdrop-filter:blur(10px);
  border:1px solid rgba(251,191,36,.15);border-radius:10px;padding:12px;
  font-size:11px;width:160px;display:flex;flex-direction:column;gap:8px}
.debug label{color:rgba(226,217,243,.5);display:flex;justify-content:space-between;align-items:center}
.debug input[type=range]{width:100%;accent-color:#fbbf24}

.hint{font-size:12px;color:rgba(226,217,243,.3);letter-spacing:.4px;text-align:center}
footer{padding:10px 20px;text-align:right;font-size:10px;color:rgba(226,217,243,.25)}
</style>
</head>
<body>
<div class="hdr">
  <h1>Magnetic Spring Buttons</h1>
  <span class="pill">cursor tracking</span>
</div>

<div class="debug" id="dbg">
  <div style="font-size:11px;font-weight:600;color:#fbbf24;margin-bottom:2px">Tune magnetics</div>
  <label>Range <span id="rv">80px</span></label>
  <input type="range" id="range-sl" min="30" max="200" value="80">
  <label>Strength <span id="sv">0.4</span></label>
  <input type="range" id="strength-sl" min="0" max="100" value="40">
  <label>Spring <span id="spv">0.1</span></label>
  <input type="range" id="spring-sl" min="1" max="30" value="10">
</div>

<main>
  <div class="section">
    <h2>Three styles — one field</h2>
    <div class="mag-field">
      <button class="mag-btn gold"><span class="inner">Attract</span></button>
      <button class="mag-btn outline"><span class="inner">Pull</span></button>
      <button class="mag-btn ghost"><span class="inner">Field</span></button>
    </div>
  </div>

  <div class="section">
    <h2>9-button magnetic grid</h2>
    <div class="grid-9" id="grid9"></div>
  </div>

  <div class="hint">Move cursor near any button — it will spring toward you</div>
</main>

<footer>Inspired by codrops/MagneticButtons · UI Spotlight Day 37 · Drop #4</footer>

<script>
// Settings
let RANGE = 80, STRENGTH = 0.4, SPRING = 0.1;
document.getElementById('range-sl').addEventListener('input',e=>{RANGE=+e.target.value;document.getElementById('rv').textContent=RANGE+'px'});
document.getElementById('strength-sl').addEventListener('input',e=>{STRENGTH=e.target.value/100;document.getElementById('sv').textContent=STRENGTH.toFixed(2)});
document.getElementById('spring-sl').addEventListener('input',e=>{SPRING=e.target.value/100;document.getElementById('spv').textContent=SPRING.toFixed(2)});

// Build 9-button grid
const COLORS = [
  {c:'#c084fc',r:'192,132,252'},{c:'#38bdf8',r:'56,189,248'},{c:'#34d399',r:'52,211,153'},
  {c:'#f472b6',r:'244,114,182'},{c:'#fbbf24',r:'251,191,36'},{c:'#fb923c',r:'251,146,60'},
  {c:'#818cf8',r:'129,140,248'},{c:'#a3e635',r:'163,230,53'},{c:'#22d3ee',r:'34,211,238'},
];
const LABELS = ['Design','Code','Build','Ship','Create','Launch','Hack','Push','Deploy'];
const grid = document.getElementById('grid9');
COLORS.forEach((col,i)=>{
  const b=document.createElement('button');
  b.className='g-btn';
  b.innerHTML=`<span class="inner">${LABELS[i]}</span>`;
  b.style.setProperty('--c',col.c);
  b.style.setProperty('--cr',col.r);
  grid.appendChild(b);
});

// Spring physics per button
const buttons = [...document.querySelectorAll('.mag-btn, .g-btn')];
const states = buttons.map(()=>({x:0,y:0,vx:0,vy:0,tx:0,ty:0,active:false}));

let mx=0,my=0;
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY},{passive:true});

function tick(){
  buttons.forEach((btn,i)=>{
    const s=states[i];
    const rect=btn.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const dx=mx-cx, dy=my-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<RANGE){
      s.active=true;
      const factor=STRENGTH*(1-dist/RANGE);
      s.tx=dx*factor;
      s.ty=dy*factor;
    } else {
      s.active=false;
      s.tx=0; s.ty=0;
    }

    // spring
    s.vx+=(s.tx-s.x)*SPRING; s.vy+=(s.ty-s.y)*SPRING;
    s.vx*=0.78; s.vy*=0.78;
    s.x+=s.vx; s.y+=s.vy;

    btn.style.transform=`translate(${s.x.toFixed(2)}px,${s.y.toFixed(2)}px)`;

    // inner text moves opposite
    const inner=btn.querySelector('.inner');
    if(inner) inner.style.transform=`translate(${(-s.x*.3).toFixed(2)}px,${(-s.y*.3).toFixed(2)}px)`;

    // glow
    if(s.active){
      const intensity=Math.min(1,(RANGE-Math.sqrt(
        (mx-(rect.left+s.x+rect.width/2))**2+
        (my-(rect.top+s.y+rect.height/2))**2
      ))/RANGE);
      btn.style.boxShadow=`0 0 ${24*intensity}px rgba(255,255,255,${0.2*intensity})`;
    } else {
      btn.style.boxShadow='none';
    }
  });
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
