<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sibling-index() Spiral Layout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07050f;font-family:system-ui,sans-serif;color:#e2d9f3;
  min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden}

.hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,5,15,.8);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:10}
.hdr h1{font-size:16px;font-weight:700;color:#f472b6}
.pill{font-size:11px;background:rgba(244,114,182,.12);color:#f472b6;
  border:1px solid rgba(244,114,182,.3);border-radius:999px;padding:3px 10px}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:80px;padding:60px 24px}

/* ── Spiral section ── */
.spiral-wrap{position:relative;width:340px;height:340px;display:flex;align-items:center;justify-content:center}

/* Each letter absolutely positioned at center, then rotated+translated via CSS */
.spiral-wrap span{
  position:absolute;
  font-size:clamp(16px,2.5vw,22px);
  font-weight:700;
  /* Use sibling-index() for position — with JS fallback for unsupported browsers */
  --i: var(--idx, 0);
  --n: var(--total, 20);
  --angle: calc(360deg * 3 / var(--n) * var(--i));
  --radius: calc(10vmin - (7vmin / var(--n)) * var(--i));
  --scale: calc(1.1 - (0.7 / var(--n)) * var(--i));
  transform:
    rotate(var(--angle))
    translateX(var(--radius))
    rotate(calc(-1 * var(--angle)))
    scale(var(--scale));
  color: oklch(from var(--base-color) l c calc(h + var(--i) * 15deg));
  transition: transform .4s ease, opacity .3s ease;
  cursor:default;
}
.spiral-wrap:hover span{
  --angle: calc(360deg * 3 / var(--n) * var(--i) + 45deg);
}

/* Glow center */
.spiral-wrap::before{
  content:'';position:absolute;inset:30%;border-radius:50%;
  background:radial-gradient(circle,rgba(244,114,182,.3) 0%,transparent 70%);
  pointer-events:none;
}

/* ── Multiple word spirals ── */
.words{display:flex;gap:60px;flex-wrap:wrap;justify-content:center}

/* ── Demo controls ── */
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{padding:8px 18px;border:1px solid rgba(244,114,182,.3);background:rgba(244,114,182,.08);
  color:#f472b6;border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s}
.ctrl-btn:hover,.ctrl-btn.active{background:rgba(244,114,182,.22);border-color:#f472b6}

.label{font-size:11px;color:rgba(226,217,243,.4);text-align:center;margin-top:-16px;letter-spacing:.4px}
.section-title{font-size:13px;font-weight:600;color:rgba(244,114,182,.7);text-transform:uppercase;letter-spacing:.8px;text-align:center}

.code-pill{background:#1a0f2e;border:1px solid rgba(244,114,182,.2);border-radius:8px;
  padding:12px 16px;font-family:monospace;font-size:12px;color:#c084fc;
  max-width:480px;width:100%;text-align:center}

footer{padding:12px 20px;text-align:right;font-size:10px;color:rgba(226,217,243,.25)}
</style>
</head>
<body>
<div class="hdr">
  <h1>sibling-index() Spiral</h1>
  <span class="pill">CSS 2026</span>
</div>

<main>
  <div class="section-title">Scroll-triggered word spirals</div>

  <div class="words" id="words-container">
    <!-- JS fills these in -->
  </div>

  <div class="code-pill">--radius: calc(10vmin - (7vmin / sibling-count()) * sibling-index())</div>

  <div class="controls">
    <button class="ctrl-btn active" onclick="setWord('TESSELLATE')">TESSELLATE</button>
    <button class="ctrl-btn" onclick="setWord('GEOMETRY')">GEOMETRY</button>
    <button class="ctrl-btn" onclick="setWord('BEAUTIFUL')">BEAUTIFUL</button>
    <button class="ctrl-btn" onclick="setWord('SIBLING')">SIBLING</button>
    <button class="ctrl-btn" onclick="setWord('SPIRAL')">SPIRAL</button>
  </div>

  <div class="label">Hover any spiral to rotate · click buttons to change word</div>
</main>

<footer>Inspired by css-tricks.com — sibling-index() Spiral Scrollytelling · UI Spotlight Day 37 · Drop #2</footer>

<script>
const COLORS = ['#f472b6','#c084fc','#38bdf8','#34d399','#fbbf24','#fb923c'];
let currentWord = 'TESSELLATE';

function buildSpiral(word, colorBase, idxOffset=0){
  const wrap = document.createElement('div');
  wrap.className = 'spiral-wrap';
  wrap.style.setProperty('--base-color', colorBase);
  const n = word.length;
  [...word].forEach((ch, i)=>{
    const sp = document.createElement('span');
    sp.textContent = ch === ' ' ? ' ' : ch;
    // Set CSS custom props for browsers without sibling-index() support
    sp.style.setProperty('--idx', i + idxOffset);
    sp.style.setProperty('--total', n);
    sp.style.setProperty('--i', i);
    sp.style.setProperty('--n', n);
    // Apply inline so it works everywhere
    const angle = (360 * 3 / n * i) * Math.PI / 180;
    const radius = (10 * window.innerHeight/100) - (7 * window.innerHeight/100 / n) * i;
    const scale = Math.max(0.2, 1.1 - 0.7 / n * i);
    sp.style.transform = `rotate(${360*3/n*i}deg) translateX(${radius}px) rotate(${-360*3/n*i}deg) scale(${scale})`;
    sp.style.color = COLORS[(i + Math.floor(idxOffset/n)) % COLORS.length];
    sp.style.opacity = Math.max(0.4, scale);
    sp.dataset.i = i;
    sp.dataset.n = n;
    wrap.appendChild(sp);
  });

  // Hover: rotate whole spiral
  let hovered = false;
  wrap.addEventListener('mouseenter',()=>{
    hovered=true;
    const n2 = wrap.querySelectorAll('span').length;
    wrap.querySelectorAll('span').forEach((sp,i)=>{
      const angle = (360*3/n2*i + 45) * Math.PI/180;
      const radius = Math.max(20, (10*window.innerHeight/100)-(7*window.innerHeight/100/n2)*i);
      const scale = Math.max(0.2,1.1-0.7/n2*i);
      sp.style.transform = `rotate(${360*3/n2*i+45}deg) translateX(${radius}px) rotate(${-(360*3/n2*i+45)}deg) scale(${scale})`;
    });
  });
  wrap.addEventListener('mouseleave',()=>{
    hovered=false;
    const n2 = wrap.querySelectorAll('span').length;
    wrap.querySelectorAll('span').forEach((sp,i)=>{
      const radius = Math.max(20,(10*window.innerHeight/100)-(7*window.innerHeight/100/n2)*i);
      const scale = Math.max(0.2,1.1-0.7/n2*i);
      sp.style.transform = `rotate(${360*3/n2*i}deg) translateX(${radius}px) rotate(${-(360*3/n2*i)}deg) scale(${scale})`;
    });
  });
  return wrap;
}

function setWord(word){
  currentWord = word;
  document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.toggle('active', b.textContent===word));
  renderWords();
}

function renderWords(){
  const cont = document.getElementById('words-container');
  cont.innerHTML='';
  // Show 3 instances with different color bases
  const colors = ['#f472b6','#38bdf8','#c084fc'];
  const labels = ['forward','reversed','offset +5'];
  colors.forEach((col,k)=>{
    const col2 = document.createElement('div');
    col2.style.display='flex';col2.style.flexDirection='column';col2.style.gap='8px';col2.style.alignItems='center';
    const spiral = buildSpiral(k===1 ? [...currentWord].reverse().join('') : currentWord, col, k*5);
    const lbl = document.createElement('div');
    lbl.className='label'; lbl.textContent=labels[k]; lbl.style.marginTop='8px';
    col2.appendChild(spiral); col2.appendChild(lbl);
    cont.appendChild(col2);
  });
}

renderWords();
window.addEventListener('resize', renderWords);
</script>
</body>
</html>
