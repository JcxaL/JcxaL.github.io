<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG textPath Animation — UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100dvh;background:#06060e;color:#e8e0f8;overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;position:relative}
#stage{width:100%;height:100dvh;display:block}
.label{position:absolute;top:28px;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;z-index:2}
.label h1{font-size:clamp(1rem,3vw,1.6rem);font-weight:900;letter-spacing:-.02em;opacity:.9}
.label p{font-size:.78rem;color:rgba(232,224,248,.4);margin-top:4px;max-width:340px}

.panel{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(10,8,20,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 16px;
  font-size:11px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
  max-width:90vw;z-index:3}
.pc{display:flex;align-items:center;gap:6px}
.pc label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;opacity:.4}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:rgba(255,255,255,.12);outline:none;cursor:pointer;width:70px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#7c3aed;cursor:pointer}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;
  background:#7c3aed;border:none;cursor:pointer}
.pv{font-size:10px;opacity:.35;min-width:20px}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;
  font-size:10px;opacity:.25;letter-spacing:.04em;padding:4px;z-index:3}
</style>
</head>
<body>
<div class="label">
  <h1>SVG <code style="color:#7c3aed">textPath</code> Animation</h1>
  <p>Text following animated sine-wave paths — three layers at different phases and speeds</p>
</div>

<svg id="stage" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="p0"/>
    <path id="p1"/>
    <path id="p2"/>
  </defs>
  <!-- Background glow blobs -->
  <circle cx="50%" cy="50%" r="30%" fill="rgba(124,58,237,.06)"/>
  <circle cx="30%" cy="60%" r="20%" fill="rgba(6,182,212,.04)"/>
  <!-- Path references (invisible strokes for reference) -->
  <text>
    <textPath id="tp0" href="#p0" startOffset="0%"
      style="font:900 clamp(22px,4vw,42px) system-ui;fill:url(#g0);filter:url(#glow0)"
      >KINETIC · TYPE · MOTION · CURVES · WORDS · FLOW · KINETIC · TYPE · MOTION · </textPath>
  </text>
  <text>
    <textPath id="tp1" href="#p1" startOffset="0%"
      style="font:700 clamp(14px,2.5vw,26px) system-ui;fill:url(#g1);opacity:.75;filter:url(#glow1)"
      >WEB · DESIGN · TYPOGRAPHY · TEXT · PATH · SVG · ANIMATION · WEB · DESIGN · </textPath>
  </text>
  <text>
    <textPath id="tp2" href="#p2" startOffset="0%"
      style="font:900 italic clamp(18px,3vw,34px) system-ui;fill:url(#g2);opacity:.6;filter:url(#glow2)"
      >BEAUTIFUL · CODE · CREATIVE · DEV · VISUAL · CRAFT · BEAUTIFUL · CODE · CREATIVE · </textPath>
  </text>
  <defs>
    <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow0" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow1" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<div class="panel">
  <div class="pc">
    <label>Amp</label>
    <input type="range" id="ampR" min="10" max="120" value="60">
    <span class="pv" id="ampV">60</span>
  </div>
  <div class="pc">
    <label>Speed</label>
    <input type="range" id="spdR" min="1" max="10" value="4">
    <span class="pv" id="spdV">4</span>
  </div>
  <div class="pc">
    <label>Freq</label>
    <input type="range" id="frqR" min="1" max="6" value="2">
    <span class="pv" id="frqV">2</span>
  </div>
</div>
<div class="footer">Inspired by developer.mozilla.org/en-US/docs/Web/SVG/Element/textPath · UI Spotlight Day 5 · Drop #3</div>

<script>
const ampR=document.getElementById('ampR'),spdR=document.getElementById('spdR'),frqR=document.getElementById('frqR');
const ampV=document.getElementById('ampV'),spdV=document.getElementById('spdV'),frqV=document.getElementById('frqV');
ampR.addEventListener('input',()=>ampV.textContent=ampR.value);
spdR.addEventListener('input',()=>spdV.textContent=spdR.value);
frqR.addEventListener('input',()=>frqV.textContent=frqR.value);

let t=0,W=0,H=0;
function buildPath(amplitude,frequency,yCenter,phase,pts=120){
  const seg=W/pts;
  let d=`M 0 ${yCenter}`;
  for(let i=1;i<=pts;i++){
    const x=i*seg;
    const y=yCenter+Math.sin((i/pts)*Math.PI*2*frequency+phase)*amplitude;
    d+=` L ${x} ${y}`;
  }
  return d;
}

function frame(){
  W=window.innerWidth;H=window.innerHeight;
  const amp=+ampR.value,spd=+spdR.value/10,frq=+frqR.value;
  t+=spd;
  // Three paths at different vertical positions and phase offsets
  document.getElementById('p0').setAttribute('d',buildPath(amp,frq,H*.38,t*.018));
  document.getElementById('p1').setAttribute('d',buildPath(amp*.75,frq,H*.52,t*.013+1.5));
  document.getElementById('p2').setAttribute('d',buildPath(amp*.9,frq,H*.65,t*.022+3.1));

  // Animate text offset for scrolling effect
  const off0=((t*0.22)%100).toFixed(2);
  const off1=((t*0.16)%100).toFixed(2);
  const off2=((t*0.19)%100).toFixed(2);
  document.getElementById('tp0').setAttribute('startOffset',off0+'%');
  document.getElementById('tp1').setAttribute('startOffset',off1+'%');
  document.getElementById('tp2').setAttribute('startOffset',off2+'%');
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
