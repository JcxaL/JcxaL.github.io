<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 1 — 3D Scroll Reveal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060f;--card-bg:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --accent:#818cf8;--text:#e2e8f0;--muted:#64748b;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overflow-x:hidden}

/* Spacer so there's something to scroll */
.hero{height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:0 24px}
.hero h1{font-size:clamp(28px,6vw,56px);font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:15px;max-width:400px}
.scroll-hint{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:12px;margin-top:24px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
.scroll-hint svg{width:20px;height:20px}

/* Grid of cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;max-width:1100px;margin:0 auto;padding:24px 24px 80px;perspective:1000px}

/* Card — the magic is here */
.card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px;
  position:relative;
  overflow:hidden;
  transition:opacity .7s ease, transform .7s cubic-bezier(0.23,1,0.32,1);
  /* Initial hidden state */
  opacity:0;
  transform:perspective(800px) rotateX(-45deg) translateY(40px) scale(0.95);
  transform-origin:center top;
  will-change:transform,opacity;
}
.card.revealed{
  opacity:1;
  transform:perspective(800px) rotateX(0deg) translateY(0) scale(1);
}
.card:hover{
  border-color:rgba(129,140,248,0.4);
  background:rgba(255,255,255,0.06);
}

/* Stagger delays via CSS custom properties */
.card:nth-child(1){transition-delay:0s}
.card:nth-child(2){transition-delay:.08s}
.card:nth-child(3){transition-delay:.16s}
.card:nth-child(4){transition-delay:0s}
.card:nth-child(5){transition-delay:.08s}
.card:nth-child(6){transition-delay:.16s}
.card:nth-child(7){transition-delay:0s}
.card:nth-child(8){transition-delay:.08s}
.card:nth-child(9){transition-delay:.16s}

/* Card content */
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.card h3{font-size:18px;font-weight:600;margin-bottom:8px;letter-spacing:-0.4px}
.card p{font-size:13px;color:var(--muted);line-height:1.6}
.card-tag{display:inline-block;margin-top:14px;font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}

/* Glow accent line on revealed */
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .5s .3s}
.card.revealed::before{opacity:1}

/* Debug panel */
#panel{position:fixed;top:16px;right:16px;background:rgba(6,6,15,0.9);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:11px;z-index:100;min-width:160px;backdrop-filter:blur(8px)}
#panel h4{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.prow{display:flex;justify-content:space-between;gap:16px;margin-bottom:5px;align-items:center}
.prow label{color:var(--muted)}
.prow span{color:var(--text);font-family:monospace}
input[type=range]{width:80px;height:3px;accent-color:var(--accent)}

/* Footer credit */
footer{text-align:center;padding:12px;font-size:10px;color:var(--muted);border-top:1px solid var(--border)}

@media(max-width:600px){
  #panel{display:none}
  .grid{grid-template-columns:1fr;padding:16px 16px 60px}
}
</style>
</head>
<body>

<section class="hero">
  <h1>Perspective Reveal</h1>
  <p>Cards flip from a 3D tilted plane to face-on as they enter the viewport — scroll to see them land.</p>
  <div class="scroll-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    Scroll down
  </div>
</section>

<div class="grid" id="grid"></div>

<div id="panel">
  <h4>Controls</h4>
  <div class="prow"><label>Tilt °</label><span id="v-tilt">45</span></div>
  <div class="prow"><label></label><input type="range" id="sl-tilt" min="10" max="90" value="45"></div>
  <div class="prow"><label>Duration</label><span id="v-dur">0.7s</span></div>
  <div class="prow"><label></label><input type="range" id="sl-dur" min="3" max="15" value="7"></div>
  <div class="prow"><label>Threshold</label><span id="v-thresh">0.15</span></div>
  <div class="prow"><label></label><input type="range" id="sl-thresh" min="1" max="50" value="15"></div>
  <div style="margin-top:10px">
    <button onclick="resetAll()" style="width:100%;padding:5px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);font-size:11px;cursor:pointer">↺ Reset</button>
  </div>
</div>

<footer>Inspired by scroll-triggered IntersectionObserver reveals · UI Spotlight Day 19 · Drop #1</footer>

<script>
const CARDS = [
  {icon:'✦',color:'#818cf8',title:'Intersection Observer',desc:'Browser-native API that fires when elements cross the viewport threshold — zero scroll math needed.',tag:'Browser API'},
  {icon:'⬡',color:'#c084fc',title:'CSS Perspective',desc:'Transform-origin combined with rotateX creates the incoming tilt. A 3D parent perspective amplifies depth.',tag:'CSS 3D'},
  {icon:'◈',color:'#f472b6',title:'Transition Stagger',desc:'nth-child delays give each card a slightly different entrance time, making the grid feel alive rather than robotic.',tag:'Timing'},
  {icon:'◭',color:'#06b6d4',title:'will-change Hint',desc:'Declaring will-change:transform,opacity lets the browser promote the element to its own compositor layer.',tag:'Performance'},
  {icon:'⊛',color:'#34d399',title:'Cubic-bezier',desc:'cubic-bezier(0.23,1,0.32,1) is an "easeOutQuint" — fast start, long deceleration — giving the card physical weight.',tag:'Easing'},
  {icon:'⬟',color:'#f59e0b',title:'transform-origin',desc:'Setting transform-origin to center top makes the card fold down like a page falling forward, not float in.',tag:'Geometry'},
  {icon:'◉',color:'#818cf8',title:'Threshold Tuning',desc:'A 0.15 threshold means 15% of the card must be visible before the reveal fires — prevents premature pops.',tag:'Observer'},
  {icon:'⬡',color:'#c084fc',title:'Reduced Motion',desc:'Always pair with prefers-reduced-motion: just set opacity transition, skip the 3D transform for accessibility.',tag:'A11y'},
  {icon:'✦',color:'#f472b6',title:'GPU Compositing',desc:'Only transform and opacity animate — both are cheap GPU-composited properties that never trigger layout.',tag:'Perf'},
];

function buildCards() {
  const grid = document.getElementById('grid');
  CARDS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-icon" style="background:${c.color}22">${c.icon}</div>
      <h3>${c.title}</h3>
      <p>${c.desc}</p>
      <span class="card-tag">${c.tag}</span>
    `;
    grid.appendChild(el);
  });
}

let tilt = 45, dur = 0.7, thresh = 0.15;
let io;

function applyParams() {
  document.querySelectorAll('.card').forEach(c => {
    c.style.transition = `opacity ${dur}s ease, transform ${dur}s cubic-bezier(0.23,1,0.32,1)`;
    if (!c.classList.contains('revealed')) {
      c.style.transform = `perspective(800px) rotateX(-${tilt}deg) translateY(40px) scale(0.95)`;
    }
  });
}

function setupObserver() {
  if (io) io.disconnect();
  io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('revealed');
        e.target.style.transform = '';
        io.unobserve(e.target);
      }
    });
  }, {threshold: thresh});
  document.querySelectorAll('.card').forEach(c => io.observe(c));
}

function resetAll() {
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('revealed');
    c.style.transform = `perspective(800px) rotateX(-${tilt}deg) translateY(40px) scale(0.95)`;
    c.style.opacity = '0';
  });
  window.scrollTo({top:0, behavior:'smooth'});
  setTimeout(setupObserver, 400);
}

// Slider wiring
document.getElementById('sl-tilt').oninput = e => {
  tilt = +e.target.value;
  document.getElementById('v-tilt').textContent = tilt;
  applyParams();
};
document.getElementById('sl-dur').oninput = e => {
  dur = +e.target.value / 10;
  document.getElementById('v-dur').textContent = dur.toFixed(1) + 's';
  applyParams();
};
document.getElementById('sl-thresh').oninput = e => {
  thresh = +e.target.value / 100;
  document.getElementById('v-thresh').textContent = thresh.toFixed(2);
  setupObserver();
};

buildCards();
setupObserver();
</script>
</body>
</html>
