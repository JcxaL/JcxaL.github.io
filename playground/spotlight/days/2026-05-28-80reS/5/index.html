<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>View Transitions API Morph</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030810;color:#d8e8ff;font-family:system-ui,sans-serif;overflow-x:hidden}

/* View Transition keyframes */
::view-transition-old(hero-card){animation:vtOldFade .35s cubic-bezier(.4,0,.6,1) both}
::view-transition-new(hero-card){animation:vtNewFade .35s cubic-bezier(.4,0,.6,1) both}
::view-transition-old(hero-title){animation:vtOldSlide .35s ease both}
::view-transition-new(hero-title){animation:vtNewSlide .35s ease both}
::view-transition-old(hero-badge){animation:vtBadge .3s ease both}
::view-transition-new(hero-badge){animation:vtBadge .3s ease reverse both}

@keyframes vtOldFade{to{opacity:0;scale:.94}}
@keyframes vtNewFade{from{opacity:0;scale:1.04}}
@keyframes vtOldSlide{to{opacity:0;transform:translateY(-20px)}}
@keyframes vtNewSlide{from{opacity:0;transform:translateY(20px)}}
@keyframes vtBadge{to{scale:0;opacity:0}}

/* Grid view */
#grid-view{
  padding:40px 20px;max-width:900px;margin:0 auto;
}
h1{text-align:center;font-size:clamp(1.3rem,4vw,2rem);color:#5090ff;font-weight:300;letter-spacing:.06em;margin-bottom:8px;padding-top:30px}
p.sub{text-align:center;color:#3a5080;font-size:.82rem;margin-bottom:36px}

.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;
}

.grid-card{
  border-radius:16px;overflow:hidden;cursor:pointer;
  border:1px solid rgba(255,255,255,.06);
  transition:transform .25s cubic-bezier(.23,1,.32,1),box-shadow .25s;
  position:relative;
}
.grid-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 24px 60px rgba(0,0,0,.6)}

.card-img{height:160px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:3rem}
.card-body{padding:16px;background:rgba(8,14,28,.9)}
.card-body h2{font-size:1rem;font-weight:700;margin-bottom:6px}
.card-body p{font-size:.75rem;color:#405070;line-height:1.6}
.card-tag{
  display:inline-block;margin-top:10px;padding:2px 9px;
  background:rgba(80,140,255,.15);border:1px solid rgba(80,140,255,.25);
  border-radius:12px;font-size:.65rem;color:#6090d0;
}

/* The view-transition-name assigned dynamically */
.is-hero{view-transition-name:hero-card}
.is-hero .card-img{view-transition-name:hero-card}
.is-hero h2{view-transition-name:hero-title}
.is-hero .card-tag{view-transition-name:hero-badge}

/* Detail view */
#detail-view{
  display:none;max-width:700px;margin:0 auto;padding:40px 20px;
}
#detail-view.open{display:block}
#grid-view.hidden{display:none}

.detail-banner{
  height:280px;border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:5rem;margin-bottom:24px;position:relative;
  view-transition-name:hero-card;
}
.detail-title{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;margin-bottom:12px;view-transition-name:hero-title}
.detail-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.75rem;margin-bottom:20px;view-transition-name:hero-badge;background:rgba(80,140,255,.2);border:1px solid rgba(80,140,255,.3);color:#7090d0}
.detail-body{font-size:.9rem;color:#4060a0;line-height:1.8;border-top:1px solid rgba(60,100,180,.12);padding-top:20px}
.detail-body p{margin-bottom:14px}

.back-btn{
  margin-bottom:24px;padding:8px 18px;background:rgba(80,140,255,.1);
  border:1px solid rgba(80,140,255,.2);color:#6090c0;border-radius:50px;
  font-size:.8rem;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;
}
.back-btn:hover{background:rgba(80,140,255,.22)}

/* Fallback animation when View Transitions not supported */
@media (prefers-reduced-motion:reduce){
  ::view-transition-old(*),::view-transition-new(*){animation:none!important}
}

#support-badge{
  position:fixed;top:14px;right:14px;
  padding:6px 12px;border-radius:8px;font-size:11px;z-index:20;
}
.supported{background:rgba(40,180,80,.15);border:1px solid rgba(40,180,80,.3);color:#60d090}
.unsupported{background:rgba(180,60,40,.12);border:1px solid rgba(180,60,40,.25);color:#d08060}

footer{text-align:center;padding:40px 20px;font-size:10px;color:#1a2840;border-top:1px solid rgba(60,100,180,.08)}
</style>
</head>
<body>

<div id="support-badge">checking…</div>

<div id="grid-view">
  <h1>View Transitions API</h1>
  <p class="sub">Click a card — shared-element morph to detail view, no library needed</p>
  <div class="grid" id="card-grid"></div>
</div>

<div id="detail-view">
  <button class="back-btn" onclick="goBack()">← Back to gallery</button>
  <div class="detail-banner" id="det-banner"></div>
  <div class="detail-badge" id="det-badge"></div>
  <div class="detail-title" id="det-title"></div>
  <div class="detail-body" id="det-body"></div>
</div>

<footer>Inspired by Chrome Developers View Transitions API guide (2025/2026) · UI Spotlight Day 12 · Drop #5</footer>

<script>
const items=[
  {emoji:'🌊',bg:'linear-gradient(135deg,#0a2a50,#041228)',title:'Scroll Timeline',tag:'CSS Animation',text:'The scroll-linked animation model lets any CSS animation be driven by scroll position instead of time. Attach animation-timeline: scroll() and the browser handles the rest — no IntersectionObserver, no scroll listener, no JavaScript. The effect is silky smooth because the compositor thread owns it end-to-end, never touching the main thread during scrolling.'},
  {emoji:'✨',bg:'linear-gradient(135deg,#2a0a50,#100428)',title:'View Transitions',tag:'Navigation API',text:'View Transitions API captures a snapshot of the old state, renders the new state, then morphs between them using ::view-transition pseudo-elements. Same-document transitions have been Baseline since 2025. Cross-document transitions are coming in Interop 2026. The result: native-app-quality navigation in a plain HTML page.'},
  {emoji:'📐',bg:'linear-gradient(135deg,#0a4a2a,#021808)',title:'Container Queries',tag:'Layout',text:'@container rules let a component style itself based on its own available space, not the viewport. A card can switch from one-column to two-column layout when the sidebar is hidden — with zero JavaScript and zero media-query changes. Container style queries go further: style based on CSS custom property values inside a container.'},
  {emoji:'🎨',bg:'linear-gradient(135deg,#4a2a08,#1c0c04)',title:'CSS Houdini Paint',tag:'Rendering',text:'CSS Houdini Paint Worklets let you register a paint function and use it anywhere CSS expects an image — backgrounds, borders, masks. The function runs off the main thread in a dedicated worklet. Combined with @property custom properties, you can animate arbitrarily complex graphical effects entirely in CSS.'},
  {emoji:'🔮',bg:'linear-gradient(135deg,#3a0a3a,#180418)',title:'Anchor Positioning',tag:'Layout',text:'CSS anchor positioning lets any element tether its position to any other element on the page — without JavaScript, without libraries. Tooltips, dropdowns, popovers, and floating panels all become trivial. position-anchor: --my-button plus inset-area: block-end and you\'re done. An Interop 2026 focus area.'},
  {emoji:'⚡',bg:'linear-gradient(135deg,#1a3a0a,#081404)',title:'interpolate-size',tag:'CSS Transitions',text:'interpolate-size: allow-keywords finally lets CSS animate to and from intrinsic size keywords like height: auto. The impossible is now a one-liner. Expand/collapse accordions, growing inputs, and auto-height transitions — all in pure CSS with no JavaScript height measurement loops.'},
];

const grid=document.getElementById('card-grid');
let currentCard=null;

function buildGrid(){
  grid.innerHTML='';
  items.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='grid-card'; d.dataset.idx=i;
    d.innerHTML=`<div class="card-img" style="background:${item.bg}">${item.emoji}</div><div class="card-body"><h2>${item.title}</h2><p>${item.text.substring(0,90)}…</p><span class="card-tag">${item.tag}</span></div>`;
    d.addEventListener('click',()=>openCard(i,d));
    grid.appendChild(d);
  });
}
buildGrid();

function openCard(idx,el){
  const item=items[idx];
  currentCard=idx;

  function doTransition(){
    document.getElementById('det-banner').style.background=item.bg;
    document.getElementById('det-banner').textContent=item.emoji;
    document.getElementById('det-title').textContent=item.title;
    document.getElementById('det-badge').textContent=item.tag;
    document.getElementById('det-body').innerHTML=`<p>${item.text}</p><p>This is a live demo of the <strong>View Transitions API</strong>. The card image, title, and badge all carry <code>view-transition-name</code> properties, causing the browser to automatically morph them between views. No GSAP, no FLIP, no JavaScript animation — just <code>document.startViewTransition()</code>.</p>`;
    document.getElementById('grid-view').classList.add('hidden');
    document.getElementById('detail-view').classList.add('open');
  }

  if(document.startViewTransition){
    el.classList.add('is-hero');
    document.startViewTransition(()=>{ doTransition(); el.classList.remove('is-hero'); });
  } else {
    doTransition();
  }
}

function goBack(){
  function doBack(){
    document.getElementById('detail-view').classList.remove('open');
    document.getElementById('grid-view').classList.remove('hidden');
  }
  if(document.startViewTransition){
    document.startViewTransition(doBack);
  } else {
    doBack();
  }
}

// Support badge
const badge=document.getElementById('support-badge');
if(document.startViewTransition){
  badge.className='supported'; badge.textContent='✓ View Transitions supported';
} else {
  badge.className='unsupported'; badge.textContent='⚠ Fallback mode (no View Transitions)';
}
</script>
</body>
</html>
