<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Repulsion Field — UI Spotlight</title>
<style>
  :root {
    --bg: #06060e;
    --accent: #7c6fff;
    --accent2: #4ee6c0;
    --text: #e8e9f0;
    --dim: #4a4b5e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    cursor: none;
  }
  canvas { display:block; position:absolute; inset:0; }

  /* Custom cursor */
  #cursor {
    position:fixed; width:32px; height:32px; pointer-events:none; z-index:10;
    transform:translate(-50%,-50%);
  }
  #cursor-ring {
    position:absolute; inset:0; border:1.5px solid rgba(124,111,255,.6);
    border-radius:50%; animation:pulse 2s ease-in-out infinite;
  }
  #cursor-dot {
    position:absolute; top:50%; left:50%; width:4px; height:4px;
    background:var(--accent); border-radius:50%; transform:translate(-50%,-50%);
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.6;} 50%{transform:scale(1.3);opacity:.3;} }

  /* HUD */
  #hud {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:5; display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center;
  }
  .hud-btn {
    padding:5px 12px; border-radius:6px; border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06); color:var(--text); font-size:11px; cursor:pointer;
    transition:all .15s; backdrop-filter:blur(8px);
  }
  .hud-btn:hover, .hud-btn.active { background:rgba(124,111,255,.25); border-color:var(--accent); }
  .hud-label { font-size:11px; color:var(--dim); }

  #panel {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;
    z-index:5;
  }
  .param-row { display:flex; align-items:center; gap:6px; }
  .param-name { font-size:10px; color:var(--dim); width:52px; }
  .param-slider {
    -webkit-appearance:none; height:3px; border-radius:2px;
    background:rgba(255,255,255,.12); width:70px; cursor:pointer;
  }
  .param-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--accent); }
  .param-val { font-size:10px; color:var(--text); font-family:monospace; width:24px; }

  footer {
    position:fixed; bottom:4px; width:100%; text-align:center;
    font-size:10px; color:var(--dim); z-index:5; pointer-events:none;
  }
  footer a { color:var(--accent); text-decoration:none; pointer-events:auto; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="cursor">
  <div id="cursor-ring"></div>
  <div id="cursor-dot"></div>
</div>

<div id="hud">
  <button class="hud-btn active" id="btn-dots">Dots</button>
  <button class="hud-btn" id="btn-grid">Grid</button>
  <button class="hud-btn" id="btn-rings">Rings</button>
  <button class="hud-btn" id="btn-attract">Attract</button>
</div>

<div id="panel">
  <div class="param-row">
    <span class="param-name">Radius</span>
    <input type="range" class="param-slider" id="s-radius" min="60" max="220" value="120">
    <span class="param-val" id="v-radius">120</span>
  </div>
  <div class="param-row">
    <span class="param-name">Force</span>
    <input type="range" class="param-slider" id="s-force" min="1" max="12" value="6" step=".5">
    <span class="param-val" id="v-force">6</span>
  </div>
  <div class="param-row">
    <span class="param-name">Damping</span>
    <input type="range" class="param-slider" id="s-damp" min="0.7" max="0.98" value="0.88" step=".01">
    <span class="param-val" id="v-damp">.88</span>
  </div>
</div>

<footer>
  Inspired by <a href="https://tympanus.net/codrops/2026/05/20/made-with-gsap-building-a-fun-gravity-based-mouse-trail/" target="_blank">Codrops — Gravity-Based Mouse Trail</a> ·
  UI Spotlight Day 42 · Drop #4
</footer>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let W, H, particles = [];
let mode = 'dots'; // dots | grid | rings
let attract = false;
let mouseX = -1000, mouseY = -1000;
let params = { radius: 120, force: 6, damp: 0.88 };

// Color palette
const COLORS = ['#7c6fff','#4ee6c0','#ff6b8a','#f0b429','#60a5fa','#a78bfa'];

class Particle {
  constructor(x, y) {
    this.ox = x; this.oy = y; // origin
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.size = 3 + Math.random() * 2;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.alpha = 0.6 + Math.random() * 0.4;
    this.phase = Math.random() * Math.PI * 2;
  }

  update(t) {
    const dx = mouseX - this.x;
    const dy = mouseY - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const r = params.radius;

    if (dist < r) {
      const force = (1 - dist/r) * params.force;
      const angle = Math.atan2(dy, dx);
      const dir = attract ? 1 : -1;
      this.vx += Math.cos(angle) * force * dir;
      this.vy += Math.sin(angle) * force * dir;
    }

    // Spring back to origin
    const ox = this.ox + Math.sin(t * 0.5 + this.phase) * (mode === 'rings' ? 8 : 0);
    const oy = this.oy + Math.cos(t * 0.4 + this.phase) * (mode === 'rings' ? 8 : 0);
    this.vx += (ox - this.x) * 0.04;
    this.vy += (oy - this.y) * 0.04;

    this.vx *= params.damp;
    this.vy *= params.damp;
    this.x += this.vx;
    this.y += this.vy;
  }

  draw() {
    const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    const glow = Math.min(speed * 3, 18);
    ctx.save();
    if (glow > 0.5) {
      ctx.shadowBlur = glow;
      ctx.shadowColor = this.color;
    }
    ctx.globalAlpha = this.alpha;

    if (mode === 'grid') {
      const s = this.size * (1 + speed * 0.15);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.rect(this.x - s/2, this.y - s/2, s, s);
      ctx.fill();
    } else if (mode === 'rings') {
      const r = this.size * 1.5 + speed * 0.5;
      ctx.strokeStyle = this.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI*2);
      ctx.stroke();
    } else {
      // dots — elongate in velocity direction
      ctx.translate(this.x, this.y);
      if (speed > 0.5) {
        ctx.rotate(Math.atan2(this.vy, this.vx));
        const elongate = 1 + speed * 0.3;
        ctx.scale(elongate, 1/elongate);
      }
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function buildParticles() {
  particles = [];
  const cols = Math.floor(W / 28);
  const rows = Math.floor(H / 28);
  const ox = (W - cols * 28) / 2;
  const oy = (H - rows * 28) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      particles.push(new Particle(ox + c * 28 + 14, oy + r * 28 + 14));
    }
  }
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildParticles();
}

let raf, start = performance.now();
function loop(ts) {
  raf = requestAnimationFrame(loop);
  const t = (ts - start) / 1000;

  ctx.clearRect(0, 0, W, H);

  // Soft background trail
  ctx.fillStyle = 'rgba(6,6,14,.18)';
  ctx.fillRect(0, 0, W, H);

  // Draw connector lines for nearby particles
  if (particles.length < 1500) {
    ctx.strokeStyle = 'rgba(124,111,255,.04)';
    ctx.lineWidth = .5;
    for (let i = 0; i < particles.length; i += 3) {
      const p = particles[i];
      for (let j = i+1; j < Math.min(i+40, particles.length); j++) {
        const q = particles[j];
        const dx = p.x-q.x, dy = p.y-q.y;
        if (dx*dx+dy*dy < 900) {
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
        }
      }
    }
  }

  particles.forEach(p => { p.update(t); p.draw(); });

  // Cursor glow
  const gr = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, params.radius);
  gr.addColorStop(0, `rgba(124,111,255,${attract?0.08:0.04})`);
  gr.addColorStop(1, 'transparent');
  ctx.fillStyle = gr;
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, params.radius, 0, Math.PI*2);
  ctx.fill();
}

// Input
window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive:false });
window.addEventListener('touchend', () => { mouseX=-1000; mouseY=-1000; });
window.addEventListener('mouseleave', () => { mouseX=-1000; mouseY=-1000; });

// Buttons
document.getElementById('btn-dots').addEventListener('click', () => setMode('dots', 0));
document.getElementById('btn-grid').addEventListener('click', () => setMode('grid', 1));
document.getElementById('btn-rings').addEventListener('click', () => setMode('rings', 2));
document.getElementById('btn-attract').addEventListener('click', function() {
  attract = !attract;
  this.classList.toggle('active', attract);
  this.textContent = attract ? 'Attract ✓' : 'Attract';
});

function setMode(m, idx) {
  mode = m;
  ['btn-dots','btn-grid','btn-rings'].forEach((id,i) =>
    document.getElementById(id).classList.toggle('active', i===idx));
}

// Sliders
function bindSlider(id, valId, key, fmt) {
  const s = document.getElementById(id), v = document.getElementById(valId);
  s.addEventListener('input', () => {
    params[key] = parseFloat(s.value);
    v.textContent = fmt ? fmt(parseFloat(s.value)) : s.value;
  });
}
bindSlider('s-radius', 'v-radius', 'radius');
bindSlider('s-force', 'v-force', 'force');
bindSlider('s-damp', 'v-damp', 'damp', v => v.toFixed(2));

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
