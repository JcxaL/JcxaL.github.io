<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spring Radial Menu · UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#060610;
  color:#e8e4ff;
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3rem;
  padding:2rem;
  overflow:hidden;
}

header{text-align:center}
header h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#f472b6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{margin-top:.6rem;opacity:.5;font-size:.9rem}

.demos{display:flex;flex-wrap:wrap;gap:5rem;justify-content:center;align-items:center}

/* ── Radial Menu ───────────────────── */
.menu-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}

.trigger{
  width:56px;height:56px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#7c3aed,#c084fc);
  color:#fff;
  font-size:1.5rem;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(124,58,237,.5);
  position:relative;z-index:10;
  transition:transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s;
  display:flex;align-items:center;justify-content:center;
}
.trigger:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(124,58,237,.7)}
.trigger.open{transform:rotate(45deg) scale(1.05)}

.item{
  position:absolute;
  width:44px;height:44px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  cursor:pointer;
  border:none;
  color:#fff;
  opacity:0;
  pointer-events:none;
  transition:opacity .1s;
  /* spring position driven by JS */
  transform:translate(0px,0px) scale(0.4);
}
.item.visible{opacity:1;pointer-events:auto}

.item-label{
  position:absolute;
  font-size:.68rem;
  font-weight:600;
  color:rgba(255,255,255,.7);
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity .2s;
  letter-spacing:.05em;
  top:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.item:hover .item-label,.item.visible:hover .item-label{opacity:1}

/* Variant menus */
.menu-wrap.v2 .trigger{background:linear-gradient(135deg,#0891b2,#38bdf8)}
.menu-wrap.v3 .trigger{background:linear-gradient(135deg,#b45309,#fbbf24)}

.tip{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:6px 18px;font-size:.75rem;opacity:.7;pointer-events:none;
  transition:opacity 1s;
}
.credit{font-size:.72rem;opacity:.3;margin-top:1rem;text-align:center}

.debug{
  position:fixed;top:16px;right:16px;
  background:rgba(255,255,255,.05);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.09);border-radius:10px;
  padding:10px 14px;font-size:.72rem;opacity:.8;
  max-width:220px;line-height:1.6;
}
.debug b{color:#c084fc}
</style>
</head>
<body>
<header>
  <h1>Spring Radial Menu</h1>
  <p>Click the "+" to explode items in an arc. Each item springs to position with its own spring simulation.</p>
</header>

<div class="demos">
  <!-- Menu 1: arc 270°, 5 items, violet -->
  <div class="menu-wrap" id="m1">
    <button class="trigger" id="t1">+</button>
  </div>
  <!-- Menu 2: full circle, 6 items, cyan -->
  <div class="menu-wrap v2" id="m2">
    <button class="trigger" id="t2">+</button>
  </div>
  <!-- Menu 3: semicircle up, 4 items, amber -->
  <div class="menu-wrap v3" id="m3">
    <button class="trigger" id="t3">+</button>
  </div>
</div>

<div class="debug">
  <b>Spring physics</b><br>
  stiffness: 320<br>
  damping: 28<br>
  rest threshold: 0.5px
</div>
<div class="tip">Click "+" to open · Click item or outside to close</div>
<p class="credit">Spring Radial Menu · UI Spotlight Day 32 · Drop #5</p>

<script>
// ── Spring simulation ────────────────────────────
class Spring{
  constructor(target,k=320,d=28){this.pos=0;this.vel=0;this.target=target;this.k=k;this.d=d;}
  update(dt){
    const f=(this.target-this.pos)*this.k - this.vel*this.d;
    this.vel+=f*dt; this.pos+=this.vel*dt;
    return Math.abs(this.target-this.pos)<.5&&Math.abs(this.vel)<.5;
  }
}

const MENUS=[
  {id:'m1',trigger:'t1',items:[
    {emoji:'🔍',label:'Search',color:'#7c3aed'},
    {emoji:'❤️',label:'Like',color:'#ec4899'},
    {emoji:'💬',label:'Comment',color:'#0891b2'},
    {emoji:'📤',label:'Share',color:'#16a34a'},
    {emoji:'🔖',label:'Save',color:'#d97706'},
  ],startAngle:-240,sweep:240,radius:80},
  {id:'m2',trigger:'t2',items:[
    {emoji:'✏️',label:'Edit',color:'#0891b2'},
    {emoji:'📋',label:'Copy',color:'#6366f1'},
    {emoji:'🗑️',label:'Delete',color:'#dc2626'},
    {emoji:'📎',label:'Attach',color:'#16a34a'},
    {emoji:'⭐',label:'Star',color:'#d97706'},
    {emoji:'🔔',label:'Notify',color:'#7c3aed'},
  ],startAngle:-270,sweep:360,radius:80},
  {id:'m3',trigger:'t3',items:[
    {emoji:'🏠',label:'Home',color:'#b45309'},
    {emoji:'📂',label:'Files',color:'#0891b2'},
    {emoji:'⚙️',label:'Settings',color:'#6366f1'},
    {emoji:'👤',label:'Profile',color:'#16a34a'},
  ],startAngle:-200,sweep:200,radius:78},
];

MENUS.forEach(cfg=>{
  const wrap=document.getElementById(cfg.id);
  const trig=document.getElementById(cfg.trigger);
  let open=false;
  const items=[];
  const springs=[];

  cfg.items.forEach((def,i)=>{
    const angle_deg=cfg.startAngle+(cfg.sweep/(cfg.items.length-1||1))*i;
    const angle_rad=angle_deg*Math.PI/180;
    const tx=Math.cos(angle_rad)*cfg.radius;
    const ty=Math.sin(angle_rad)*cfg.radius;

    const btn=document.createElement('button');
    btn.className='item';
    btn.style.background=def.color;
    btn.innerHTML=`${def.emoji}<span class="item-label">${def.label}</span>`;
    btn.style.boxShadow=`0 2px 12px ${def.color}88`;
    wrap.appendChild(btn);

    const sx=new Spring(0,300,26);
    const sy=new Spring(0,300,26);
    const ss=new Spring(0.4,250,24);
    items.push({btn,tx,ty,sx,sy,ss,angle_rad});
    springs.push({sx,sy,ss});

    btn.addEventListener('click',e=>{
      e.stopPropagation();
      closeMenu();
    });
  });

  let rafId=null;
  let settled=false;

  function tick(){
    const dt=1/60;
    let allSettled=true;
    items.forEach(({btn,sx,sy,ss})=>{
      const rx=sx.update(dt);
      const ry=sy.update(dt);
      const rs=ss.update(dt);
      if(!rx||!ry||!rs) allSettled=false;
      btn.style.transform=`translate(${sx.pos}px,${sy.pos}px) scale(${ss.pos})`;
    });
    if(!allSettled||!settled){
      rafId=requestAnimationFrame(tick);
    } else {
      rafId=null;
    }
  }

  function openMenu(){
    open=true;
    trig.classList.add('open');
    items.forEach(({btn,tx,ty,sx,sy,ss},i)=>{
      btn.classList.add('visible');
      setTimeout(()=>{
        sx.target=tx; sy.target=ty; ss.target=1;
      },i*30);
    });
    settled=false;
    if(!rafId) rafId=requestAnimationFrame(tick);
  }

  function closeMenu(){
    open=false;
    trig.classList.remove('open');
    items.forEach(({btn,sx,sy,ss})=>{
      sx.target=0; sy.target=0; ss.target=0.4;
      setTimeout(()=>btn.classList.remove('visible'),300);
    });
    settled=false;
    if(!rafId) rafId=requestAnimationFrame(tick);
    setTimeout(()=>settled=true,400);
  }

  trig.addEventListener('click',e=>{
    e.stopPropagation();
    open?closeMenu():openMenu();
  });

  document.addEventListener('click',()=>{ if(open) closeMenu(); });

  // Start springs at closed position
  items.forEach(({sx,sy,ss})=>{
    sx.pos=0;sy.pos=0;ss.pos=0.4;
    sx.target=0;sy.target=0;ss.target=0.4;
  });
  settled=true;
});

setTimeout(()=>{
  document.querySelector('.tip').style.opacity='0';
},5000);
</script>
</body>
</html>
