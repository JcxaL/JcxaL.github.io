<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thermal Proximity Text · UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#030308;
  color:#fff;
  font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  cursor:none;
  user-select:none;
}
#cursor{
  position:fixed;
  width:28px;height:28px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,160,50,.9),rgba(255,80,0,.4) 60%,transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:100;
  mix-blend-mode:screen;
  box-shadow:0 0 18px 8px rgba(255,120,20,.35);
  transition:none;
}

.intro{
  font-size:clamp(.75rem,.8vw,.9rem);
  letter-spacing:.18em;
  text-transform:uppercase;
  opacity:.35;
  margin-bottom:2.5rem;
}

.words{display:flex;flex-direction:column;gap:0;text-align:center;line-height:1}

.word-row{
  font-size:clamp(3.5rem,10vw,10rem);
  font-weight:900;
  letter-spacing:-.05em;
  display:flex;
  justify-content:center;
  overflow:visible;
}

.ch{
  display:inline-block;
  --h:0;
  transition:none;
  /* cold = deep blue, heat shifts through cyan → green → yellow → orange → white */
  color:hsl(calc(220 - var(--h)*220), calc(60 + var(--h)*40)%, calc(35 + var(--h)*55)%);
  text-shadow:
    0 0 calc(var(--h)*30px) hsla(calc(60 - var(--h)*60),90%,70%,.6),
    0 0 calc(var(--h)*80px) hsla(calc(60 - var(--h)*60),100%,60%,.3);
  transform:scale(calc(1 + var(--h)*.08));
}

.sub{
  font-size:clamp(.85rem,1.5vw,1.2rem);
  font-weight:400;
  letter-spacing:.01em;
  opacity:.4;
  margin-top:2.5rem;
  text-align:center;
  line-height:1.6;
  max-width:480px;
}

.debug{
  position:fixed;
  top:16px;right:16px;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  padding:10px 14px;
  font-size:.72rem;
  opacity:.8;
  pointer-events:none;
}
.debug span{color:#f97316;font-weight:700}

.credit{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-size:.72rem;opacity:.3;white-space:nowrap;
}

/* Ambient glow ring at cursor hot zone */
#heatmap{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  background:radial-gradient(circle 200px at var(--mx,50%) var(--my,50%), rgba(255,80,0,.06), transparent);
  transition:none;
}
</style>
</head>
<body>
<div id="heatmap"></div>
<div id="cursor"></div>

<p class="intro">Move cursor over the text</p>

<div class="words" id="words">
  <div class="word-row" id="r1"></div>
  <div class="word-row" id="r2"></div>
  <div class="word-row" id="r3"></div>
</div>

<p class="sub">Each character independently senses cursor proximity.<br>Cold to hot in pure CSS custom properties.</p>

<div class="debug">cursor heat: <span id="dbg">0%</span></div>
<p class="credit">Thermal Proximity Text · UI Spotlight Day 32 · Drop #3</p>

<script>
const lines=['THERMAL','CURSOR','EFFECT'];
const rowIds=['r1','r2','r3'];
const allChars=[];

lines.forEach((word,wi)=>{
  const row=document.getElementById(rowIds[wi]);
  word.split('').forEach(ch=>{
    const span=document.createElement('span');
    span.className='ch';
    span.textContent=ch;
    row.appendChild(span);
    allChars.push(span);
  });
});

const cursor=document.getElementById('cursor');
const heatmap=document.getElementById('heatmap');
const dbg=document.getElementById('dbg');
let mx=innerWidth/2,my=innerHeight/2;
let raf=null;

const RADIUS=260; // px
let maxHeat=0;

function update(){
  raf=null;
  allChars.forEach(span=>{
    const r=span.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const cy=r.top+r.height/2;
    const dist=Math.sqrt((mx-cx)**2+(my-cy)**2);
    const heat=Math.max(0,1-dist/RADIUS);
    // soft-power curve for more dramatic effect
    const h=heat*heat*(3-2*heat); // smoothstep
    span.style.setProperty('--h',h.toFixed(3));
    if(h>maxHeat) maxHeat=h;
  });
  dbg.textContent=Math.round(maxHeat*100)+'%';
  maxHeat=0;
}

document.addEventListener('mousemove',e=>{
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px';
  cursor.style.top=my+'px';
  heatmap.style.setProperty('--mx',mx+'px');
  heatmap.style.setProperty('--my',my+'px');
  if(!raf) raf=requestAnimationFrame(update);
});

// Touch
document.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  mx=t.clientX; my=t.clientY;
  cursor.style.left=mx+'px';
  cursor.style.top=my+'px';
  if(!raf) raf=requestAnimationFrame(update);
},{passive:false});

// Idle drift animation when no mouse
let angle=0,driftRaf;
function drift(){
  driftRaf=requestAnimationFrame(drift);
  angle+=0.008;
  const cx=innerWidth*.5+Math.cos(angle)*innerWidth*.25;
  const cy=innerHeight*.5+Math.sin(angle*1.3)*innerHeight*.2;
  mx=cx; my=cy;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
  heatmap.style.setProperty('--mx',mx+'px');
  heatmap.style.setProperty('--my',my+'px');
  if(!raf) raf=requestAnimationFrame(update);
}
driftRaf=requestAnimationFrame(drift);

document.addEventListener('mousemove',()=>{
  cancelAnimationFrame(driftRaf);
  driftRaf=null;
},{ once:true });
</script>
</body>
</html>
