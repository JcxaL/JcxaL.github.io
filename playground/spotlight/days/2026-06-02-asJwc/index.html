<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UI Spotlight — Day 17</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060e;--card:#0c0c1a;--border:#181830;--text:#d0d8f8;--dim:#4050a0;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;
  min-height:100vh}

header{text-align:center;padding:56px 24px 32px}
.day-badge{display:inline-block;background:#12122a;border:1px solid #282858;
  border-radius:20px;padding:4px 14px;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);margin-bottom:16px}
header h1{font-size:clamp(1.5rem,4vw,2.6rem);font-weight:800;
  background:linear-gradient(135deg,#a78bfa,#38bdf8,#34d399,#f472b6);
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px}
header p{color:var(--dim);font-size:.9rem;max-width:500px;margin:0 auto}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  padding:32px 24px 80px;
  max-width:1100px;
  margin:0 auto;
}

.drop-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  text-decoration:none;
  color:inherit;
  display:block;
  transition:transform .2s, box-shadow .2s, border-color .2s;
  position:relative;
}
.drop-card:hover{
  transform:translateY(-5px) scale(1.015);
  box-shadow:0 16px 48px rgba(0,0,0,.5);
  border-color:var(--accent);
}
.drop-card::after{
  content:'↗';
  position:absolute;top:12px;right:14px;
  font-size:14px;color:var(--accent);
  opacity:0;transition:opacity .2s;
}
.drop-card:hover::after{opacity:1}

.preview{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:3.5rem;
  position:relative;overflow:hidden;
}
.preview::before{
  content:'';position:absolute;inset:0;
  background:var(--grad);
}
.preview-emoji{position:relative;z-index:1;text-shadow:0 4px 20px rgba(0,0,0,.5)}

.drop-body{padding:18px}
.bucket-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.bucket-icon{font-size:12px}
.drop-title{font-size:1rem;font-weight:700;margin-bottom:5px;color:#dde4ff}
.drop-desc{font-size:.82rem;color:var(--dim);line-height:1.6}
.drop-num{position:absolute;bottom:12px;right:14px;font-size:11px;
  color:var(--border);font-weight:600}

footer{text-align:center;padding:24px;font-size:11px;color:var(--dim);
  border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <div class="day-badge">Day 17 · June 2, 2026</div>
  <h1>Scroll, Masonry, Holo, Ripple & Spring</h1>
  <p>Five live UI/UX pattern demos — animation, layout, typography, micro-interaction, and component.</p>
</header>

<div class="grid" id="grid"></div>

<footer>UI Spotlight · jccl.me · Five trending UI/UX patterns, live every day</footer>

<script>
const drops = [
  {
    n:1, href:'1/',
    bucket:'Animation', icon:'🎞',
    title:'Scroll-Driven Stagger',
    desc:'CSS animation-timeline: view() staggered cards — each enters from a unique angle as it scrolls into view. Zero JavaScript.',
    accent:'#a78bfa',
    grad:'linear-gradient(135deg,#120828,#2a1060,#5020b0)',
    emoji:'📜',
  },
  {
    n:2, href:'2/',
    bucket:'Layout', icon:'⬜',
    title:'CSS Native Masonry',
    desc:'grid-template-rows: masonry in a single CSS rule. The Pinterest layout ships natively in Chrome 131 and Firefox.',
    accent:'#38bdf8',
    grad:'linear-gradient(135deg,#041832,#082860,#1060b0)',
    emoji:'🧱',
  },
  {
    n:3, href:'3/',
    bucket:'Typography', icon:'Aa',
    title:'Holographic Letter Tilt',
    desc:'Letters respond to cursor proximity with 3D perspective tilt and rainbow holographic shimmer via CSS custom properties.',
    accent:'#f472b6',
    grad:'linear-gradient(135deg,#140818,#380a38,#800060)',
    emoji:'✨',
  },
  {
    n:4, href:'4/',
    bucket:'Micro-interaction', icon:'💧',
    title:'Water Ripple Canvas',
    desc:'Click or drag to create 2D wave equation ripples that interfere constructively and destructively in real time.',
    accent:'#34d399',
    grad:'linear-gradient(135deg,#021410,#043a28,#088050)',
    emoji:'🌊',
  },
  {
    n:5, href:'5/',
    bucket:'Component', icon:'⬡',
    title:'Spring Island Navigation',
    desc:'Floating bottom nav with a spring-physics indicator that overshoots and settles. No CSS transitions — pure JS spring.',
    accent:'#fbbf24',
    grad:'linear-gradient(135deg,#14100a,#382808,#806010)',
    emoji:'🏝',
  },
];

const grid = document.getElementById('grid');
drops.forEach(d => {
  const a = document.createElement('a');
  a.className = 'drop-card';
  a.href = d.href;
  a.style.setProperty('--accent', d.accent);
  a.innerHTML = `
    <div class="preview" style="--grad:${d.grad}">
      <span class="preview-emoji">${d.emoji}</span>
    </div>
    <div class="drop-body">
      <div class="bucket-tag"><span class="bucket-icon">${d.icon}</span>${d.bucket}</div>
      <div class="drop-title">${d.title}</div>
      <div class="drop-desc">${d.desc}</div>
    </div>
    <div class="drop-num">Drop ${d.n}</div>
  `;
  grid.appendChild(a);
});
</script>
</body>
</html>
