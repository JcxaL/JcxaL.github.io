<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scroll-Driven Stagger — UI Spotlight</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080f;--card:#0d0d1e;--border:#1c1c35;--accent:#a78bfa;--text:#e0e0ff;--dim:#5060a0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;
  overflow-x:hidden}

header{text-align:center;padding:80px 24px 40px;position:sticky;top:0;z-index:10;
  background:linear-gradient(var(--bg) 70%,transparent)}
header h1{font-size:clamp(1.6rem,5vw,3rem);font-weight:800;
  background:linear-gradient(135deg,#a78bfa,#38bdf8,#34d399);
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px}
header p{color:var(--dim);font-size:.9rem}

.scroll-hint{text-align:center;color:var(--dim);font-size:.85rem;
  padding:0 24px 60px;animation:bob 1.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

.feed{max-width:680px;margin:0 auto;padding:0 24px 120px;display:flex;flex-direction:column;gap:28px}

/* The star: each card has its own view-timeline */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px;
  position:relative;
  overflow:hidden;

  /* scroll-driven entrance */
  animation: card-slide linear both;
  animation-timeline: view();
  animation-range: entry 0% cover 22%;
}

/* alt directions */
.card:nth-child(odd) { --slide-x: -60px; }
.card:nth-child(even){ --slide-x:  60px; }
.card:nth-child(3n)  { --slide-x:    0px; --slide-y: 40px; }

@keyframes card-slide{
  from{
    opacity:0;
    transform:translateX(var(--slide-x, -60px)) translateY(var(--slide-y, 16px)) scale(.94) rotate(var(--rot,0deg));
    filter:blur(4px);
  }
  to{
    opacity:1;
    transform:translateX(0) translateY(0) scale(1) rotate(0deg);
    filter:blur(0);
  }
}

/* per-card rotation personality */
.card:nth-child(1){--rot:-1.5deg}
.card:nth-child(2){--rot: 1deg}
.card:nth-child(3){--rot:-0.5deg}
.card:nth-child(4){--rot: 2deg}
.card:nth-child(5){--rot:-1deg}
.card:nth-child(6){--rot: 0.5deg}
.card:nth-child(7){--rot:-2deg}
.card:nth-child(8){--rot: 1.5deg}

/* inner shimmer on hover */
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),
    rgba(167,139,250,.08),transparent 50%);
  opacity:0;transition:opacity .3s;pointer-events:none
}
.card:hover::before{opacity:1}

.card-tag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px}
.card h2{font-size:1.15rem;font-weight:700;margin-bottom:6px;color:#e8e4ff}
.card p{font-size:.88rem;color:var(--dim);line-height:1.65}
.card-bar{height:3px;border-radius:2px;margin-top:18px;width:var(--w,60%);
  background:linear-gradient(90deg,var(--c1,#a78bfa),var(--c2,#38bdf8))}

/* fallback for non-supporting browsers */
@supports not (animation-timeline:view()) {
  .card{opacity:0;transform:translateX(-40px) scale(.96);
    transition:opacity .6s, transform .6s}
  .card.visible{opacity:1;transform:none}
}

footer{text-align:center;padding:24px;font-size:11px;color:var(--dim);
  border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <h1>Scroll-Driven Stagger</h1>
  <p>CSS <code>animation-timeline: view()</code> — no JavaScript for the animations</p>
</header>
<p class="scroll-hint">↓ scroll to see cards enter from different angles</p>

<div class="feed" id="feed"></div>

<footer>Inspired by Chrome for Developers · Scroll-Driven Animations spec · UI Spotlight Day 17 · Drop #1</footer>

<script>
const cards = [
  {tag:'Typography', title:'Variable Font Axes', desc:'Weight, width, slant, optical-size — all animatable as first-class CSS properties with zero font-file overhead.',c1:'#a78bfa',c2:'#ec4899',w:'75%'},
  {tag:'Layout',     title:'CSS Anchor Positioning', desc:'Attach popovers and tooltips to any element without JavaScript — the <dialog> killer that just shipped in Baseline 2025.',c1:'#38bdf8',c2:'#34d399',w:'55%'},
  {tag:'Animation',  title:'View Transitions API', desc:'Morph any element between two pages with a single MPA opt-in attribute. SPA-quality polish for every link click.',c1:'#fbbf24',c2:'#f97316',w:'80%'},
  {tag:'Component',  title:'Styleable <select>', desc:'Native form controls finally accept custom stylesheets. The appearance:base-select proposal just landed in Chrome 130.',c1:'#34d399',c2:'#a78bfa',w:'65%'},
  {tag:'Interaction',title:'Speculation Rules API', desc:'Prefetch and prerender next pages on hover — instant navigation that feels like a local app.',c1:'#f472b6',c2:'#fbbf24',w:'70%'},
  {tag:'CSS',        title:'Relative Color Syntax', desc:'oklch(from var(--brand) l c calc(h + 60deg)) — derive your entire palette from one token.',c1:'#06b6d4',c2:'#818cf8',w:'60%'},
  {tag:'Layout',     title:'CSS Masonry Grid', desc:'grid-template-rows: masonry is shipping without a flag in Firefox 128 and Chrome 131. The Pinterest grid is now one line.',c1:'#f87171',c2:'#fb923c',w:'72%'},
  {tag:'Animation',  title:'interpolate-size', desc:'Animate to height: auto, width: auto, and display: none natively — no more clone-and-measure hacks.',c1:'#a78bfa',c2:'#38bdf8',w:'50%'},
];

const feed = document.getElementById('feed');
cards.forEach(d => {
  const div = document.createElement('div');
  div.className = 'card';
  div.style.setProperty('--c1', d.c1);
  div.style.setProperty('--c2', d.c2);
  div.style.setProperty('--w', d.w);
  div.innerHTML = `<div class="card-tag">${d.tag}</div>
    <h2>${d.title}</h2>
    <p>${d.desc}</p>
    <div class="card-bar"></div>`;
  // mouse shimmer
  div.addEventListener('mousemove', e => {
    const r = div.getBoundingClientRect();
    div.style.setProperty('--mx', (e.clientX-r.left)+'px');
    div.style.setProperty('--my', (e.clientY-r.top)+'px');
  });
  feed.appendChild(div);
});

// IntersectionObserver fallback for non-scroll-timeline browsers
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, {threshold:0.1});
document.querySelectorAll('.card').forEach(c => observer.observe(c));
</script>
</body>
</html>
