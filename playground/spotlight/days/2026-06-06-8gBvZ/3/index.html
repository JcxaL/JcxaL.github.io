<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Odometer Counter — UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#05080f;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui;gap:48px;padding:32px}
h2{color:#fff;font-size:clamp(13px,2vw,16px);font-weight:500;letter-spacing:.15em;text-transform:uppercase;opacity:.4}
.stats{display:flex;gap:40px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center;cursor:pointer}
.stat:hover .odo-wrap{filter:drop-shadow(0 0 12px var(--c))}
.label{font:500 12px system-ui;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-top:10px}
.odo-wrap{display:flex;align-items:center;justify-content:center;height:72px;overflow:hidden;font:700 clamp(36px,6vw,64px)/1 system-ui;color:var(--c,#a78bfa);font-variant-numeric:tabular-nums;letter-spacing:-.02em;transition:filter .3s}
.digit-col{display:flex;flex-direction:column;transition:transform .7s cubic-bezier(.23,1.1,.32,1)}
.digit{display:block;height:72px;line-height:72px}
.suffix{align-self:flex-end;padding-bottom:8px;font-size:.5em;opacity:.6}
.btn-row{display:flex;gap:12px}
.btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:9px 20px;color:rgba(255,255,255,.7);font:13px system-ui;cursor:pointer;transition:background .2s}
.btn:hover{background:rgba(255,255,255,.15)}
.credit{font:11px system-ui;color:rgba(255,255,255,.2);text-align:center}
</style>
</head>
<body>
<h2>Odometer Counters</h2>
<div class="stats" id="stats"></div>
<div class="btn-row">
  <button class="btn" id="roll">Roll counters</button>
  <button class="btn" id="reset">Reset</button>
</div>
<div class="credit">Inspired by Jhey Tompkins / Codepen CSS digit roll experiments · UI Spotlight Day 21 · Drop #3</div>
<script>
const STATS=[
  {val:48293,label:'Stars',suf:'',color:'#a78bfa'},
  {val:12,label:'Years',suf:'yrs',color:'#38bdf8'},
  {val:99.7,label:'Uptime',suf:'%',color:'#34d399'},
  {val:2.4,label:'Speed',suf:'ms',color:'#fb923c'},
  {val:1024,label:'Users',suf:'k',color:'#f472b6'},
];
const container=document.getElementById('stats');

function makeOdo(val,suf,color){
  const str=val.toFixed(val%1?1:0).replace('.','');
  const hasDot=String(val).includes('.');
  const rawStr=String(val);
  const wrap=document.createElement('div');
  wrap.className='odo-wrap';wrap.style.setProperty('--c',color);
  const chars=[...rawStr];
  chars.forEach(ch=>{
    if(ch==='.'){const dot=document.createElement('span');dot.className='digit';dot.textContent='.';dot.style.paddingBottom='8px';dot.style.height='auto';wrap.appendChild(dot);return;}
    const col=document.createElement('div');col.className='digit-col';
    for(let d=9;d>=0;d--){const s=document.createElement('span');s.className='digit';s.textContent=d;col.appendChild(s);}
    col.dataset.target=ch;col.dataset.current='9';
    wrap.appendChild(col);
  });
  if(suf){const s=document.createElement('span');s.className='suffix';s.textContent=suf;wrap.appendChild(s);}
  return wrap;
}

const odos=[];
STATS.forEach(({val,label,suf,color})=>{
  const div=document.createElement('div');div.className='stat';
  const odo=makeOdo(val,suf,color);div.appendChild(odo);
  const lbl=document.createElement('div');lbl.className='label';lbl.textContent=label;div.appendChild(lbl);
  container.appendChild(div);
  odos.push({odo,val,color});
});

function rollTo(odoEl,val){
  const str=String(val);
  const cols=odoEl.querySelectorAll('.digit-col');
  const digits=[...str].filter(c=>c!=='.');
  cols.forEach((col,i)=>{
    const target=parseInt(digits[i]||'0');
    const idx=9-target; // 0 is at index 9, 9 is at index 0
    col.style.transform=`translateY(${idx*72}px)`;
  });
}

function rollAll(){odos.forEach(({odo,val})=>rollTo(odo,val));}
function resetAll(){odos.forEach(({odo})=>{odo.querySelectorAll('.digit-col').forEach(c=>c.style.transform='translateY(0px)');});}

document.getElementById('roll').onclick=rollAll;
document.getElementById('reset').onclick=resetAll;

// auto-roll on click for each stat
odos.forEach(({odo,val})=>{odo.closest('.stat').onclick=()=>rollTo(odo,val);});

// Intersection observer to auto-roll when visible
const io=new IntersectionObserver(entries=>{if(entries[0].isIntersecting)rollAll();},{threshold:.5});
io.observe(container);
</script>
</body>
</html>
