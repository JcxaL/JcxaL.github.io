<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progress Steps — UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#04060d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:56px;font-family:system-ui;padding:32px}
h2{color:#fff;font-size:clamp(13px,2vw,16px);font-weight:500;letter-spacing:.15em;text-transform:uppercase;opacity:.4}
/* stepper */
.stepper{display:flex;align-items:flex-start;gap:0;position:relative;max-width:700px;width:100%}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.step::after{
  content:'';position:absolute;top:20px;left:50%;width:100%;height:2px;
  background:rgba(255,255,255,.12);transform-origin:left;transition:background .4s;
  z-index:0;
}
.step:last-child::after{display:none}
.step.done::after{background:var(--accent,#a78bfa);}
.dot{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(255,255,255,.2);
  background:#04060d;
  display:flex;align-items:center;justify-content:center;
  font:700 14px system-ui;color:rgba(255,255,255,.3);
  position:relative;z-index:1;
  transition:border-color .35s,background .35s,color .35s,box-shadow .35s;
}
.step.active .dot{border-color:var(--accent,#a78bfa);color:var(--accent,#a78bfa);box-shadow:0 0 0 4px rgba(167,139,250,.15);}
.step.done .dot{border-color:var(--accent,#a78bfa);background:var(--accent,#a78bfa);color:#fff;}
.step-label{margin-top:10px;font:500 12px system-ui;color:rgba(255,255,255,.35);text-align:center;transition:color .35s}
.step.active .step-label,.step.done .step-label{color:rgba(255,255,255,.7)}
.step-sub{font:11px system-ui;color:rgba(255,255,255,.25);text-align:center;margin-top:2px}
/* second stepper, different accent */
.stepper2{--accent:#34d399}
.stepper3{--accent:#f472b6}
/* panel */
.panel{width:100%;max-width:700px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;text-align:center}
.panel h3{font:600 16px system-ui;color:#fff;margin-bottom:6px}
.panel p{font:13px system-ui;color:rgba(255,255,255,.45);line-height:1.6}
.panel .actions{display:flex;gap:10px;justify-content:center;margin-top:18px}
.btn{padding:9px 22px;border-radius:8px;font:600 13px system-ui;cursor:pointer;border:none;transition:opacity .2s}
.btn-primary{background:#a78bfa;color:#fff}.btn-primary:hover{opacity:.85}
.btn-secondary{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}.btn-secondary:hover{background:rgba(255,255,255,.14)}
.credit{font:11px system-ui;color:rgba(255,255,255,.2);text-align:center}
</style>
</head>
<body>
<h2>Animated Progress Steps</h2>

<div class="stepper" id="s1"></div>
<div class="stepper stepper2" id="s2"></div>
<div class="stepper stepper3" id="s3"></div>

<div class="panel" id="panel">
  <h3 id="p-title">Step 1: Account Setup</h3>
  <p id="p-desc">Create your account credentials and verify your email address.</p>
  <div class="actions">
    <button class="btn btn-secondary" id="back">← Back</button>
    <button class="btn btn-primary" id="next">Continue →</button>
  </div>
</div>

<div class="credit">Inspired by Stephanie Eckles / moderncss.dev stepper components · UI Spotlight Day 21 · Drop #5</div>
<script>
const STEPS=[
  {label:'Account',sub:'Create',icon:'1'},
  {label:'Profile',sub:'Customize',icon:'2'},
  {label:'Plan',sub:'Choose',icon:'3'},
  {label:'Payment',sub:'Secure',icon:'4'},
  {label:'Done',sub:'Launch!',icon:'✓'},
];
const STEPS2=[
  {label:'Research',sub:'Explore',icon:'1'},
  {label:'Design',sub:'Create',icon:'2'},
  {label:'Review',sub:'Approve',icon:'3'},
  {label:'Deploy',sub:'Ship',icon:'4'},
];
const STEPS3=[
  {label:'Draft',sub:'Write',icon:'1'},
  {label:'Edit',sub:'Refine',icon:'2'},
  {label:'Publish',sub:'Release',icon:'3'},
];

const PANELS=[
  {title:'Step 1: Account Setup',desc:'Create your account credentials and verify your email address.'},
  {title:'Step 2: Profile Details',desc:'Personalize your profile with a photo, bio, and preferences.'},
  {title:'Step 3: Choose Your Plan',desc:'Select the plan that best fits your workflow and team size.'},
  {title:'Step 4: Payment',desc:'Add your payment method. Cancel any time, no commitments.'},
  {title:'All Done! 🎉',desc:'Your account is ready. Welcome aboard — let\'s get started!'},
];

let cur=0;

function buildStepper(id,steps,currentRef){
  const el=document.getElementById(id);
  steps.forEach((s,i)=>{
    const div=document.createElement('div');div.className='step';
    div.innerHTML=`<div class="dot">${s.icon}</div><div class="step-label">${s.label}</div><div class="step-sub">${s.sub}</div>`;
    el.appendChild(div);
  });
}

buildStepper('s1',STEPS,0);
buildStepper('s2',STEPS2,0);
buildStepper('s3',STEPS3,0);

function sync(){
  // Primary stepper
  const steps1=document.querySelectorAll('#s1 .step');
  steps1.forEach((el,i)=>{
    el.className='step'+(i<cur?' done':i===cur?' active':'');
  });
  // secondary (progress = floor(cur/STEPS.length * secondary.length))
  const steps2=document.querySelectorAll('#s2 .step');
  const p2=Math.min(STEPS2.length-1,Math.floor(cur*STEPS2.length/STEPS.length));
  steps2.forEach((el,i)=>el.className='step'+(i<p2?' done':i===p2?' active':''));

  const steps3=document.querySelectorAll('#s3 .step');
  const p3=Math.min(STEPS3.length-1,Math.floor(cur*STEPS3.length/STEPS.length));
  steps3.forEach((el,i)=>el.className='step'+(i<p3?' done':i===p3?' active':''));

  const p=PANELS[Math.min(cur,PANELS.length-1)];
  document.getElementById('p-title').textContent=p.title;
  document.getElementById('p-desc').textContent=p.desc;
  document.getElementById('next').textContent=cur>=STEPS.length-1?'Restart →':'Continue →';
  document.getElementById('back').style.opacity=cur===0?'0.3':'1';
}

document.getElementById('next').onclick=()=>{cur=(cur+1)%STEPS.length;sync();};
document.getElementById('back').onclick=()=>{if(cur>0){cur--;sync();}};

// clickable steps
document.querySelectorAll('#s1 .step').forEach((el,i)=>{el.onclick=()=>{cur=i;sync();};});
sync();
</script>
</body>
</html>
