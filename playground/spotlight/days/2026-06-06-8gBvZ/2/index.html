<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FLIP Filter Gallery — UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#080810;font-family:system-ui;color:#fff;padding:24px}
h2{text-align:center;font-size:clamp(13px,2vw,16px);font-weight:500;letter-spacing:.15em;text-transform:uppercase;opacity:.4;margin-bottom:24px}
.filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.fb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:7px 18px;color:rgba(255,255,255,.7);font:13px system-ui;cursor:pointer;transition:background .2s,border-color .2s,color .2s}
.fb.active,.fb:hover{background:rgba(167,139,250,.25);border-color:#a78bfa;color:#a78bfa}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;max-width:800px;margin:0 auto}
.card{
  border-radius:12px;aspect-ratio:3/4;cursor:pointer;overflow:hidden;position:relative;
  transition:opacity .35s ease;will-change:transform;
}
.card.hidden{opacity:0;pointer-events:none;position:absolute}
.card-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.card-icon{font-size:40px}
.card-label{font:500 12px system-ui;opacity:.7;text-align:center;padding:0 8px}
.card-tag{font:11px system-ui;opacity:.45;text-transform:uppercase;letter-spacing:.1em}
.credit{text-align:center;margin-top:32px;font:11px system-ui;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<h2>FLIP Filter Layout</h2>
<div class="filters" id="filters">
  <button class="fb active" data-cat="all">All</button>
  <button class="fb" data-cat="design">Design</button>
  <button class="fb" data-cat="code">Code</button>
  <button class="fb" data-cat="audio">Audio</button>
  <button class="fb" data-cat="motion">Motion</button>
</div>
<div class="gallery" id="gallery"></div>
<div class="credit">Inspired by Adam Argyle / Google Chrome Labs · UI Spotlight Day 21 · Drop #2</div>
<script>
const items=[
  {icon:'🎨',label:'Brand Identity',cat:'design',bg:'linear-gradient(135deg,#7c3aed,#4f46e5)'},
  {icon:'⚡',label:'Code Review',cat:'code',bg:'linear-gradient(135deg,#06b6d4,#3b82f6)'},
  {icon:'🎵',label:'Mixing Session',cat:'audio',bg:'linear-gradient(135deg,#ec4899,#8b5cf6)'},
  {icon:'🌊',label:'Motion Reel',cat:'motion',bg:'linear-gradient(135deg,#f59e0b,#ef4444)'},
  {icon:'📐',label:'UI Components',cat:'design',bg:'linear-gradient(135deg,#10b981,#06b6d4)'},
  {icon:'🔧',label:'CLI Tool',cat:'code',bg:'linear-gradient(135deg,#6366f1,#8b5cf6)'},
  {icon:'🥁',label:'Drum Kit',cat:'audio',bg:'linear-gradient(135deg,#f97316,#ef4444)'},
  {icon:'✨',label:'After Effects',cat:'motion',bg:'linear-gradient(135deg,#c084fc,#f472b6)'},
  {icon:'🖌',label:'Illustration',cat:'design',bg:'linear-gradient(135deg,#34d399,#10b981)'},
  {icon:'🚀',label:'Deployment',cat:'code',bg:'linear-gradient(135deg,#818cf8,#6366f1)'},
  {icon:'🎤',label:'Podcast',cat:'audio',bg:'linear-gradient(135deg,#fbbf24,#f59e0b)'},
  {icon:'🎬',label:'Film Titles',cat:'motion',bg:'linear-gradient(135deg,#f472b6,#ec4899)'},
];

const gallery=document.getElementById('gallery');
const cards=items.map(item=>{
  const el=document.createElement('div');
  el.className='card';
  el.dataset.cat=item.cat;
  el.innerHTML=`<div class="card-inner" style="background:${item.bg}"><div class="card-icon">${item.icon}</div><div class="card-label">${item.label}</div><div class="card-tag">${item.cat}</div></div>`;
  gallery.appendChild(el);
  return el;
});

let activeCat='all';
document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeCat=btn.dataset.cat;
    document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b===btn));
    flip();
  });
});

function flip(){
  // 1. Read old positions
  const old=cards.map(el=>el.getBoundingClientRect());
  // 2. Apply new filter (instant, no animation yet)
  cards.forEach((el,i)=>{
    const show=activeCat==='all'||items[i].cat===activeCat;
    el.classList.toggle('hidden',!show);
    el.style.transform='';
  });
  // 3. Read new positions
  const nw=cards.map(el=>el.getBoundingClientRect());
  // 4. Invert & play
  cards.forEach((el,i)=>{
    if(el.classList.contains('hidden'))return;
    const dx=old[i].left-nw[i].left,dy=old[i].top-nw[i].top;
    if(Math.abs(dx)<1&&Math.abs(dy)<1)return;
    el.style.transform=`translate(${dx}px,${dy}px)`;
    el.style.transition='none';
    requestAnimationFrame(()=>{
      el.style.transition='transform .45s cubic-bezier(.34,1.56,.64,1)';
      el.style.transform='';
    });
  });
}
</script>
</body>
</html>
