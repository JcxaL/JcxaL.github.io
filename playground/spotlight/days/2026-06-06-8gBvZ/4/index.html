<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVG Displacement Hover — UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#030507;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;font-family:system-ui;overflow:hidden;padding:24px}
h2{color:#fff;font-size:clamp(13px,2vw,16px);font-weight:500;letter-spacing:.15em;text-transform:uppercase;opacity:.4}
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.card{
  width:180px;padding:28px 20px;border-radius:16px;cursor:pointer;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  position:relative;overflow:hidden;user-select:none;
}
.card-svg{width:80px;height:80px;display:block}
.card-title{font:600 14px system-ui;color:#fff;text-align:center}
.card-sub{font:12px system-ui;color:rgba(255,255,255,.45);text-align:center}
.hint{font:11px system-ui;color:rgba(255,255,255,.3);text-align:center}
.credit{font:11px system-ui;color:rgba(255,255,255,.2);text-align:center}
</style>
</head>
<body>
<h2>SVG Displacement Hover</h2>
<div class="hint">Hover the cards — SVG feTurbulence distorts on approach</div>
<div class="cards" id="cards"></div>
<div class="credit">Inspired by Codrops feTurbulence + feDisplacementMap experiments · UI Spotlight Day 21 · Drop #4</div>
<svg style="position:absolute;width:0;height:0">
  <defs>
    <filter id="f0" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="linearRGB">
      <feTurbulence id="t0" type="fractalNoise" baseFrequency="0.001 0.001" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="linearRGB">
      <feTurbulence id="t1" type="turbulence" baseFrequency="0.001 0.001" numOctaves="2" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="f2" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="linearRGB">
      <feTurbulence id="t2" type="fractalNoise" baseFrequency="0.001 0.001" numOctaves="4" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="G" yChannelSelector="R"/>
    </filter>
    <filter id="f3" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="linearRGB">
      <feTurbulence id="t3" type="turbulence" baseFrequency="0.001 0.001" numOctaves="2" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="B"/>
    </filter>
  </defs>
</svg>
<script>
const CARDS=[
  {icon:'🌊',title:'Fluid',sub:'fractalNoise',color:'#38bdf8',filterIdx:0},
  {icon:'🔥',title:'Blaze',sub:'turbulence',color:'#f97316',filterIdx:1},
  {icon:'🌀',title:'Vortex',sub:'deep fractal',color:'#a78bfa',filterIdx:2},
  {icon:'⚡',title:'Static',sub:'turbulence',color:'#fbbf24',filterIdx:3},
];

const container=document.getElementById('cards');
const turbEls=[0,1,2,3].map(i=>document.getElementById(`t${i}`));
const dispEls=turbEls.map((t,i)=>document.querySelector(`#f${i} feDisplacementMap`));
const scales=[0,0,0,0];
const targets=[0,0,0,0];
const FREQ=.018;

CARDS.forEach(({icon,title,sub,color,filterIdx},i)=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <svg class="card-svg" viewBox="0 0 80 80" style="filter:url(#f${filterIdx})">
      <circle cx="40" cy="40" r="36" fill="${color}22"/>
      <text x="40" y="52" text-anchor="middle" font-size="36">${icon}</text>
    </svg>
    <div class="card-title">${title}</div>
    <div class="card-sub">${sub}</div>`;
  container.appendChild(card);

  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    const dx=e.clientX-(r.left+r.width/2),dy=e.clientY-(r.top+r.height/2);
    const dist=Math.hypot(dx,dy),maxDist=Math.max(r.width,r.height);
    targets[i]=Math.min(1,dist/maxDist);
  });
  card.addEventListener('mouseleave',()=>{targets[i]=0;});
  card.addEventListener('mouseenter',()=>{targets[i]=0.3;});
});

function lerp(a,b,t){return a+(b-a)*t}

function tick(){
  for(let i=0;i<4;i++){
    scales[i]=lerp(scales[i],targets[i]*30,.08);
    const bf=lerp(.001,FREQ,targets[i]);
    turbEls[i].setAttribute('baseFrequency',`${bf.toFixed(4)} ${bf.toFixed(4)}`);
    dispEls[i].setAttribute('scale',scales[i].toFixed(1));
  }
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
