<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sine Wave Grid — UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06040e;font-family:system-ui;overflow:hidden}
h2{color:#fff;font-size:clamp(14px,2vw,18px);font-weight:500;letter-spacing:.15em;text-transform:uppercase;opacity:.5;margin-bottom:32px}
.grid{display:grid;grid-template-columns:repeat(var(--cols,20),1fr);gap:4px;width:min(90vw,680px)}
.cell{
  aspect-ratio:1;border-radius:4px;
  background:hsl(var(--h),80%,55%);
  transform:scaleY(1);
  animation:wave 2.4s ease-in-out infinite;
  animation-delay:calc(var(--d) * -1s);
}
@keyframes wave{
  0%,100%{transform:scaleY(.2);opacity:.25;background:hsl(calc(var(--h) + 0),80%,55%)}
  50%{transform:scaleY(1);opacity:1;background:hsl(calc(var(--h) + 40),90%,65%)}
}
.controls{margin-top:32px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
label{color:rgba(255,255,255,.6);font:13px system-ui;display:flex;align-items:center;gap:8px}
input[type=range]{accent-color:#a78bfa;width:100px}
.credit{position:fixed;bottom:12px;left:0;right:0;text-align:center;font:11px system-ui;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<h2>Sine Wave Grid</h2>
<div class="grid" id="grid"></div>
<div class="controls">
  <label>Speed <input type="range" id="spd" min="0.5" max="4" step="0.1" value="2.4"></label>
  <label>Wave <input type="range" id="wave" min="0.01" max="0.5" step="0.01" value="0.15"></label>
  <label>Hue <input type="range" id="hue" min="0" max="360" step="1" value="260"></label>
</div>
<div class="credit">Inspired by Temani Afif's CSS animation experiments · UI Spotlight Day 21 · Drop #1</div>
<script>
const grid=document.getElementById('grid');
const COLS=20,ROWS=12;
grid.style.setProperty('--cols',COLS);
const cells=[];
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
  const el=document.createElement('div');
  el.className='cell';
  el.style.setProperty('--h','260');
  el.style.setProperty('--d',(c*0.15+r*0.08).toFixed(2));
  grid.appendChild(el);cells.push({el,c,r});
}
function update(){
  const spd=parseFloat(document.getElementById('spd').value);
  const wv=parseFloat(document.getElementById('wave').value);
  const hue=parseInt(document.getElementById('hue').value);
  cells.forEach(({el,c,r})=>{
    el.style.setProperty('--h',hue);
    el.style.setProperty('--d',((c*wv+r*wv*0.5)*spd/2.4).toFixed(3));
    el.style.animationDuration=spd+'s';
  });
}
['spd','wave','hue'].forEach(id=>document.getElementById(id).addEventListener('input',update));
</script>
</body>
</html>
