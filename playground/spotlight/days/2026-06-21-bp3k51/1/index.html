<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 1: CSS View Transitions — Morphing Scene Switcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif}
body{background:#070710;color:#e8e0f8;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── View Transition overrides ── */
::view-transition-old(hero-card){
  animation:250ms ease-in both vt-fade-out;
}
::view-transition-new(hero-card){
  animation:350ms cubic-bezier(.34,1.2,.64,1) both vt-scale-in;
}
::view-transition-group(hero-card){
  animation-duration:450ms;
  animation-timing-function:cubic-bezier(.4,0,.2,1);
}
@keyframes vt-fade-out{ to{opacity:0;transform:scale(.94)} }
@keyframes vt-scale-in{ from{opacity:0;transform:scale(.88)} }

::view-transition-old(hero-label){
  animation:200ms ease both vt-fade-out;
}
::view-transition-new(hero-label){
  animation:350ms .1s ease both vt-slide-up;
}
@keyframes vt-slide-up{ from{opacity:0;transform:translateY(16px)} }

/* ── Scenes ── */
#gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  padding:16px;
  max-width:700px;
  width:100%;
}

.card{
  border-radius:16px;
  cursor:pointer;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.08);
  transition:border-color .2s,transform .2s;
  display:flex;flex-direction:column;
  aspect-ratio:.75;
}
.card:hover{border-color:rgba(255,255,255,.28);transform:scale(1.03);}

.card-face{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;padding:20px;
}
.card-glyph{font-size:2.2rem;line-height:1}
.card-title{font-size:.75rem;font-weight:700;text-align:center;opacity:.85;letter-spacing:.04em}
.card-num{
  position:absolute;top:10px;right:12px;
  font-size:.65rem;font-weight:800;opacity:.35;letter-spacing:.1em;
}
.card{position:relative}

/* Unique per card */
.card:nth-child(1) .card-face{background:linear-gradient(135deg,#1a0540,#3b1f8c)}
.card:nth-child(2) .card-face{background:linear-gradient(135deg,#012816,#0a5c30)}
.card:nth-child(3) .card-face{background:linear-gradient(135deg,#3d0012,#8c1a2e)}
.card:nth-child(4) .card-face{background:linear-gradient(135deg,#0d2340,#1c4f8a)}
.card:nth-child(5) .card-face{background:linear-gradient(135deg,#28180a,#7a4010)}
.card:nth-child(6) .card-face{background:linear-gradient(135deg,#1a0a30,#52208a)}

/* ── Hero overlay ── */
#hero{
  position:fixed;inset:0;
  display:none;
  flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  z-index:100;
}
#hero.open{display:flex}
#hero-bg{
  position:absolute;inset:0;
  view-transition-name:hero-card;
  border-radius:0;
}
#hero-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;gap:20px;
  text-align:center;padding:40px;
}
#hero-glyph{font-size:5rem;line-height:1;
  view-transition-name:hero-label;
}
#hero-title{font-size:clamp(1.4rem,5vw,2.4rem);font-weight:800;max-width:500px}
#hero-sub{font-size:1rem;opacity:.6;max-width:400px;line-height:1.6}
#hero-close{
  margin-top:20px;
  padding:10px 28px;
  border-radius:30px;
  border:2px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.1);
  color:#fff;font-size:.9rem;font-weight:600;
  cursor:pointer;backdrop-filter:blur(10px);
  transition:background .15s;
}
#hero-close:hover{background:rgba(255,255,255,.2)}

/* ── Label ── */
#top-label{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.3);
  pointer-events:none;
}
#bottom-credit{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:.65rem;color:rgba(255,255,255,.2);white-space:nowrap;
}

/* ── Ctrl panel ── */
#controls{
  position:fixed;top:14px;right:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:10px 14px;
  font-size:.7rem;color:rgba(255,255,255,.5);
  backdrop-filter:blur(12px);
}
.ctrl-row{display:flex;flex-direction:column;gap:4px}
.ctrl-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);margin-top:6px}

</style>
</head>
<body>
<div id="top-label">Click any scene · CSS View Transitions API</div>

<div id="gallery">
  <div class="card" data-idx="0">
    <div class="card-face">
      <div class="card-glyph">🌌</div>
      <div class="card-title">Cosmos</div>
    </div>
    <span class="card-num">01</span>
  </div>
  <div class="card" data-idx="1">
    <div class="card-face">
      <div class="card-glyph">🌿</div>
      <div class="card-title">Forest</div>
    </div>
    <span class="card-num">02</span>
  </div>
  <div class="card" data-idx="2">
    <div class="card-face">
      <div class="card-glyph">🌋</div>
      <div class="card-title">Volcano</div>
    </div>
    <span class="card-num">03</span>
  </div>
  <div class="card" data-idx="3">
    <div class="card-face">
      <div class="card-glyph">🌊</div>
      <div class="card-title">Ocean</div>
    </div>
    <span class="card-num">04</span>
  </div>
  <div class="card" data-idx="4">
    <div class="card-face">
      <div class="card-glyph">🏜️</div>
      <div class="card-title">Desert</div>
    </div>
    <span class="card-num">05</span>
  </div>
  <div class="card" data-idx="5">
    <div class="card-face">
      <div class="card-glyph">💜</div>
      <div class="card-title">Nebula</div>
    </div>
    <span class="card-num">06</span>
  </div>
</div>

<div id="hero">
  <div id="hero-bg"></div>
  <div id="hero-content">
    <div id="hero-glyph"></div>
    <div id="hero-title"></div>
    <div id="hero-sub"></div>
    <button id="hero-close">← Back to gallery</button>
  </div>
</div>

<div id="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">Transition style</span>
    <select id="anim-style" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#e8e0f8;padding:4px 8px;border-radius:6px;font-size:.7rem;cursor:pointer">
      <option value="morph">Morph (default)</option>
      <option value="zoom">Zoom in</option>
      <option value="slide">Slide up</option>
      <option value="crossfade">Crossfade</option>
    </select>
  </div>
</div>

<div id="bottom-credit">Inspired by Chrome VT demos · UI Spotlight Day 36 · Drop #1</div>

<script>
const SCENES=[
  {bg:'linear-gradient(135deg,#07021a,#1a0a4a,#2d1b7a)',glyph:'🌌',title:'The Cosmos',desc:'Infinite stars, infinite wonder. CSS View Transitions morph this card from its grid position into a full-bleed immersive experience.'},
  {bg:'linear-gradient(135deg,#011208,#042a12,#0a5c2a)',glyph:'🌿',title:'Ancient Forest',desc:'Shared element transitions let the card expand in place — the browser automatically animates between the two DOM states.'},
  {bg:'linear-gradient(135deg,#200008,#5c0a18,#9a1428)',glyph:'🌋',title:'Volcano\'s Heart',desc:'No JavaScript animation code required. Just call document.startViewTransition() and let CSS handle the morphing geometry.'},
  {bg:'linear-gradient(135deg,#010e20,#083060,#1258b0)',glyph:'🌊',title:'Deep Ocean',desc:'The ::view-transition-group pseudo-element handles the position/size interpolation across the two capture snapshots.'},
  {bg:'linear-gradient(135deg,#1a0c02,#4a2508,#8c4a10)',glyph:'🏜️',title:'The Arid Desert',desc:'Old and new captures are overlaid in a flattened compositing layer tree — enabling cross-stacking-context animations.'},
  {bg:'linear-gradient(135deg,#0e0518,#2a0850,#520a90)',glyph:'💜',title:'Purple Nebula',desc:'View Transitions Level 2 extends this to cross-document page navigations — the same technique that powers native apps.'},
];

let activeIdx=-1;
const hero=document.getElementById('hero');
const heroBg=document.getElementById('hero-bg');
const heroGlyph=document.getElementById('hero-glyph');
const heroTitle=document.getElementById('hero-title');
const heroSub=document.getElementById('hero-sub');
const animStyle=document.getElementById('anim-style');

function applyTransitionStyle(s){
  const style=document.getElementById('_vt_style')||Object.assign(document.createElement('style'),{id:'_vt_style'});
  if(!style.parentNode) document.head.appendChild(style);
  const defs={
    morph:`::view-transition-old(hero-card){animation:280ms ease-in both _vto}::view-transition-new(hero-card){animation:380ms cubic-bezier(.34,1.2,.64,1) both _vti}@keyframes _vto{to{opacity:0;transform:scale(.94)}}@keyframes _vti{from{opacity:0;transform:scale(.88)}}`,
    zoom:`::view-transition-old(hero-card){animation:250ms ease both _vto2}::view-transition-new(hero-card){animation:400ms cubic-bezier(.2,0,0,1) both _vti2}@keyframes _vto2{to{opacity:0;transform:scale(1.08)}}@keyframes _vti2{from{opacity:0;transform:scale(.7)}}`,
    slide:`::view-transition-old(hero-card){animation:250ms ease both _vto3}::view-transition-new(hero-card){animation:380ms cubic-bezier(.4,0,.2,1) both _vti3}@keyframes _vto3{to{opacity:0;transform:translateY(-30px)}}@keyframes _vti3{from{opacity:0;transform:translateY(60px)}}`,
    crossfade:`::view-transition-old(hero-card){animation:300ms ease both _vto4}::view-transition-new(hero-card){animation:300ms ease both _vti4}@keyframes _vto4{to{opacity:0}}@keyframes _vti4{from{opacity:0}}`
  };
  style.textContent=defs[s]||defs.morph;
}

function openScene(idx){
  const s=SCENES[idx];
  activeIdx=idx;
  if(document.startViewTransition){
    applyTransitionStyle(animStyle.value);
    document.startViewTransition(()=>{
      heroBg.style.background=s.bg;
      heroGlyph.textContent=s.glyph;
      heroTitle.textContent=s.title;
      heroSub.textContent=s.desc;
      hero.classList.add('open');
    });
  } else {
    heroBg.style.background=s.bg;
    heroGlyph.textContent=s.glyph;
    heroTitle.textContent=s.title;
    heroSub.textContent=s.desc;
    hero.classList.add('open');
  }
}

function closeScene(){
  if(document.startViewTransition){
    applyTransitionStyle(animStyle.value);
    document.startViewTransition(()=>{ hero.classList.remove('open'); activeIdx=-1; });
  } else {
    hero.classList.remove('open'); activeIdx=-1;
  }
}

document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('click',()=>openScene(+card.dataset.idx));
});
document.getElementById('hero-close').addEventListener('click',e=>{ e.stopPropagation(); closeScene(); });
hero.addEventListener('click',closeScene);
document.getElementById('hero-content').addEventListener('click',e=>e.stopPropagation());

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&activeIdx>=0) closeScene();
  if(e.key==='ArrowRight'&&activeIdx>=0) openScene((activeIdx+1)%SCENES.length);
  if(e.key==='ArrowLeft'&&activeIdx>=0) openScene((activeIdx-1+SCENES.length)%SCENES.length);
});

// Check support
if(!document.startViewTransition){
  const warn=document.createElement('div');
  warn.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(200,100,0,.8);padding:6px 16px;border-radius:8px;font-size:.72rem;z-index:999';
  warn.textContent='⚠️ View Transitions not supported in this browser — using fallback';
  document.body.appendChild(warn);
}
</script>
</body>
</html>
