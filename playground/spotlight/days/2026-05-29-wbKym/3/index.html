<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drop 3 — Blur-Stagger Text Reveal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06040e;color:#ddd8f8;font:system-ui;min-height:100vh;overflow-x:hidden}

section{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;gap:24px;max-width:720px;margin:0 auto
}

.eyebrow{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:#7070b0;font-weight:600
}

.headline{font-size:clamp(2rem,7vw,4rem);font-weight:900;line-height:1.08;text-align:center}
.headline .line{overflow:hidden;display:block}
.headline .word{
  display:inline-block;margin-right:0.22em;
  opacity:0;filter:blur(10px);transform:translateY(18px);
  animation:reveal .65s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:var(--d);animation-play-state:paused
}
.line.go .word{animation-play-state:running}

.body-copy{font-size:clamp(.9rem,2vw,1.05rem);color:#9090b8;line-height:1.7;text-align:center;max-width:520px}
.body-copy .word{
  display:inline-block;margin-right:0.2em;
  opacity:0;filter:blur(4px);transform:translateY(10px);
  animation:reveal .5s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:var(--d);animation-play-state:paused
}
.body-copy.go .word{animation-play-state:running}

.tag-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.tag{
  padding:6px 14px;border-radius:20px;font-size:12px;
  border:1px solid rgba(180,120,255,.25);background:rgba(100,60,200,.15);
  color:#c084fc;
  opacity:0;filter:blur(6px);transform:translateY(12px) scale(.95);
  animation:reveal .55s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:var(--d);animation-play-state:paused
}
.tag-row.go .tag{animation-play-state:running}

@keyframes reveal{
  to{opacity:1;filter:blur(0);transform:none}
}

/* panel */
.panel{
  position:fixed;top:14px;right:14px;
  background:rgba(6,4,14,.88);border:1px solid rgba(180,120,255,.18);
  border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px;
  backdrop-filter:blur(8px)
}
.panel label{font-size:11px;color:#6868a8}
.panel input{width:110px;accent-color:#c084fc;cursor:pointer}
.panel .pv{font-size:11px;color:#c084fc;font-weight:700}
.panel button{
  padding:5px 10px;border-radius:6px;border:1px solid rgba(180,120,255,.28);
  background:rgba(90,50,190,.22);color:#c084fc;cursor:pointer;font-size:11px;font-family:inherit
}
.panel button:hover{background:rgba(90,50,190,.44)}

footer{
  position:fixed;bottom:10px;left:0;right:0;text-align:center;
  font-size:11px;color:#5050a0
}
footer a{color:#7070b8;text-decoration:none}

@media(max-width:480px){.panel{display:none}}
</style>
</head>
<body>

<section id="s1">
  <div class="eyebrow">Scroll-triggered reveal</div>

  <h2 class="headline" id="h1">
    <span class="line" data-text="Words blur in">
    </span>
    <span class="line" data-text="one by one">
    </span>
  </h2>

  <p class="body-copy" id="b1" data-text="Each word is wrapped in a span and animated independently using CSS filter blur, opacity, and translateY — triggered by IntersectionObserver.">
  </p>

  <div class="tag-row" id="tr1" data-tags="CSS Animation,filter:blur,IntersectionObserver,Stagger Delay,@keyframes">
  </div>
</section>

<section id="s2" style="border-top:1px solid rgba(140,80,255,.1)">
  <div class="eyebrow">Character-level stagger</div>

  <h2 class="headline" id="h2">
    <span class="line" data-text="Every letter">
    </span>
    <span class="line" data-text="moves alone">
    </span>
  </h2>

  <p class="body-copy" id="b2" data-text="Splitting at character level gives a wave-like cascade. The delay multiplier is tunable — tighten it for a quick sweep or spread it for a cinematic entrance.">
  </p>

  <div class="tag-row" id="tr2" data-tags="Character Split,CSS Custom Props,animation-delay,animation-play-state,cubic-bezier">
  </div>
</section>

<section id="s3" style="border-top:1px solid rgba(140,80,255,.1)">
  <div class="eyebrow">Large display type</div>

  <h2 class="headline" id="h3">
    <span class="line" data-text="Design is">
    </span>
    <span class="line" data-text="how it works">
    </span>
  </h2>

  <p class="body-copy" id="b3" data-text="Combine blur-in with a slight Y-translate for extra depth. A single CSS @keyframes rule handles blur, opacity, and position — browsers hardware-accelerate the compositor properties for 60fps.">
  </p>

  <div class="tag-row" id="tr3" data-tags="Scroll-driven,60fps,CSS-only,Blur Reveal,Modern Typography">
  </div>
</section>

<div class="panel">
  <div>
    <label>Blur amount <span class="pv" id="pvb">10px</span></label>
    <input type="range" id="rb" min="2" max="30" value="10">
  </div>
  <div>
    <label>Stagger <span class="pv" id="pvs">60ms</span></label>
    <input type="range" id="rs" min="10" max="200" value="60">
  </div>
  <div>
    <label>Duration <span class="pv" id="pvd">0.65s</span></label>
    <input type="range" id="rd" min="2" max="20" value="6">
  </div>
  <button onclick="replay()">↺ Replay</button>
</div>

<footer>
  Inspired by <a href="https://github.com/codrops/ScrollBlurTypography" target="_blank">Codrops — ScrollBlurTypography</a> &amp;
  <a href="https://ui.aceternity.com/blocks/text-animations/text-animation-blur-fade-in" target="_blank">Aceternity UI</a>
  &nbsp;·&nbsp; UI Spotlight Day 13 &nbsp;·&nbsp; Drop #3
</footer>

<script>
'use strict';

let blurAmt  = 10;
let staggerMs = 60;
let durSec   = 0.65;

// ── build word/char spans ─────────────────────────────────────────
function buildWords(el, text, type, globalOffset) {
  const words = text.split(' ');
  el.innerHTML = '';
  words.forEach((word, i) => {
    const sp = document.createElement('span');
    sp.className = 'word';
    sp.textContent = word;
    sp.style.setProperty('--d', (globalOffset + i * staggerMs) + 'ms');
    el.appendChild(sp);
  });
}

function buildChars(el, text, type, globalOffset) {
  el.innerHTML = '';
  const words = text.split(' ');
  let ci = 0;
  words.forEach((word, wi) => {
    word.split('').forEach(ch => {
      const sp = document.createElement('span');
      sp.className = 'word';
      sp.textContent = ch;
      sp.style.setProperty('--d', (globalOffset + ci * staggerMs * 0.5) + 'ms');
      el.appendChild(sp);
      ci++;
    });
    if (wi < words.length - 1) {
      const space = document.createElement('span');
      space.textContent = ' ';
      el.appendChild(space);
    }
  });
}

function buildTags(el, tagStr, offset) {
  el.innerHTML = '';
  tagStr.split(',').forEach((tag, i) => {
    const sp = document.createElement('span');
    sp.className = 'tag';
    sp.textContent = tag.trim();
    sp.style.setProperty('--d', (offset + i * staggerMs * 1.2) + 'ms');
    el.appendChild(sp);
  });
}

// ── apply blur CSS variable ───────────────────────────────────────
function applyStyles() {
  const style = document.getElementById('dyn-style') || document.createElement('style');
  style.id = 'dyn-style';
  style.textContent = `
    .headline .word{ filter:blur(${blurAmt}px);animation-duration:${durSec}s }
    .body-copy .word{ filter:blur(${Math.round(blurAmt*0.4)}px);animation-duration:${(durSec*0.8).toFixed(2)}s }
    .tag{ filter:blur(${Math.round(blurAmt*0.6)}px);animation-duration:${(durSec*0.9).toFixed(2)}s }
  `;
  document.head.appendChild(style);
}

// ── build all sections ────────────────────────────────────────────
const sections = [
  { id: 's1', heads: ['h1'], body: 'b1', tags: 'tr1', charMode: false },
  { id: 's2', heads: ['h2'], body: 'b2', tags: 'tr2', charMode: true },
  { id: 's3', heads: ['h3'], body: 'b3', tags: 'tr3', charMode: false },
];

function buildAll() {
  applyStyles();
  sections.forEach(sec => {
    sec.heads.forEach(hid => {
      const hel = document.getElementById(hid);
      hel.querySelectorAll('.line').forEach((line, li) => {
        const text = line.dataset.text || '';
        const off  = li * staggerMs * 3;
        if (sec.charMode) buildChars(line, text, 'char', off);
        else buildWords(line, text, 'word', off);
      });
    });
    const bodyEl = document.getElementById(sec.body);
    buildWords(bodyEl, bodyEl.dataset.text, 'word', staggerMs * 6);

    const tagsEl = document.getElementById(sec.tags);
    buildTags(tagsEl, tagsEl.dataset.tags, staggerMs * 8);
  });
}

// ── intersection observer ─────────────────────────────────────────
function setupIO() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      // trigger all animatable children
      el.querySelectorAll('.headline,.body-copy,.tag-row').forEach(c => c.classList.add('go'));
      obs.unobserve(el);
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('section').forEach(s => obs.observe(s));
}

function replay() {
  document.querySelectorAll('.headline,.body-copy,.tag-row').forEach(el => el.classList.remove('go'));
  buildAll();
  // brief delay so 'go' starts fresh
  setTimeout(() => setupIO(), 50);
  // also trigger visible sections immediately
  setTimeout(() => {
    document.querySelectorAll('section').forEach(s => {
      const rect = s.getBoundingClientRect();
      if (rect.top < window.innerHeight * 0.85) {
        s.querySelectorAll('.headline,.body-copy,.tag-row').forEach(c => c.classList.add('go'));
      }
    });
  }, 80);
}

// ── slider handlers ───────────────────────────────────────────────
document.getElementById('rb').addEventListener('input', function() {
  blurAmt = +this.value;
  document.getElementById('pvb').textContent = blurAmt + 'px';
  replay();
});
document.getElementById('rs').addEventListener('input', function() {
  staggerMs = +this.value;
  document.getElementById('pvs').textContent = staggerMs + 'ms';
  replay();
});
document.getElementById('rd').addEventListener('input', function() {
  durSec = +this.value / 10;
  document.getElementById('pvd').textContent = durSec.toFixed(2) + 's';
  replay();
});

// ── init ──────────────────────────────────────────────────────────
buildAll();
setupIO();
// trigger first visible section immediately
setTimeout(() => {
  const first = document.getElementById('s1');
  first.querySelectorAll('.headline,.body-copy,.tag-row').forEach(c => c.classList.add('go'));
}, 100);
</script>
</body>
</html>
