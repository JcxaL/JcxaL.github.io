<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scramble Set — Character-Cycling Typography</title>
<style>
  :root{
    --accent:#f87171;
    --accent-soft: rgba(248,113,113,.32);
    --bg-0:#0a0708;
    --glass: rgba(255,255,255,.055);
    --glass-b: rgba(255,255,255,.13);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-0);color:#f2e8e8;font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  body{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:100px 20px 90px;
    background:
      radial-gradient(1100px 550px at 10% -10%, rgba(248,113,113,.14), transparent 60%),
      radial-gradient(800px 650px at 100% 90%, rgba(248,113,113,.09), transparent 55%),
      var(--bg-0);
  }

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:999px;
    background:var(--glass); border:1px solid var(--glass-b);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    color:#f6e4e4; text-decoration:none; font-size:13px; font-weight:500;
    transition:background .2s ease, transform .2s ease;
  }
  .back-link:hover{ background:rgba(255,255,255,.12); transform:translateX(-2px); }

  .panel{
    position:fixed; top:16px; right:16px; z-index:50; width:240px;
    background:var(--glass); border:1px solid var(--glass-b);
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border-radius:16px; padding:14px 16px 16px;
    font-size:12px;
  }
  .panel h3{margin:0 0 10px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); font-weight:700;}
  .panel label{display:flex; justify-content:space-between; margin:10px 0 4px; color:#c9a9a9;}
  .panel input[type=range]{width:100%; accent-color:var(--accent);}
  .panel select{
    width:100%; background:rgba(0,0,0,.35); color:#fff; border:1px solid var(--accent-soft);
    border-radius:8px; padding:6px 8px; font-size:12px;
  }
  .panel .val{color:#fff; font-variant-numeric:tabular-nums;}
  @media (max-width: 720px), (pointer:coarse){ .panel{display:none;} }

  .wrap{ max-width:760px; width:100%; text-align:center; }
  .kicker{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#a9797c; margin-bottom:26px; }

  .scramble{
    display:block; margin:34px 0; font-weight:800; letter-spacing:-.01em; cursor:pointer;
    font-variant-numeric:tabular-nums;
  }
  .scramble .ch{ display:inline-block; }
  .scramble .ch.space{ width:.3em; }

  #s1{ font-size:clamp(30px, 6vw, 56px); color:#fff; }
  #s2{ font-size:clamp(20px, 3.4vw, 30px); color:var(--accent); }
  #s3{ font-size:clamp(16px, 2.4vw, 22px); color:#c9b6b6; font-weight:600; }

  .scramble.locked .ch{ color:inherit; }
  .scramble .ch.scrambling{ color:var(--accent); text-shadow:0 0 12px var(--accent-soft); }

  .hint{ margin-top:30px; font-size:12px; color:#7a5f60; }

  footer{
    position:fixed; bottom:10px; left:0; right:0; text-align:center; z-index:6;
    font-size:11px; color:#6a4f50;
  }
</style>
</head>
<body>

<a href="../" class="back-link">← All 5 drops</a>

<div class="panel">
  <h3>Scramble Controls</h3>
  <label>Speed <span class="val" id="vSpeed">40</span>ms</label>
  <input id="rSpeed" type="range" min="15" max="120" step="5" value="40">
  <label>Iterations <span class="val" id="vIter">8</span></label>
  <input id="rIter" type="range" min="2" max="20" step="1" value="8">
  <label style="margin-top:12px;">Character set</label>
  <select id="sCharset">
    <option value="symbols">Symbols + letters</option>
    <option value="upper">Uppercase only</option>
    <option value="original">Original characters only</option>
  </select>
  <label style="margin-top:12px;">Reveal order</label>
  <select id="sOrder">
    <option value="random">Random</option>
    <option value="start">From start</option>
    <option value="center">From center</option>
    <option value="end">From end</option>
  </select>
</div>

<div class="wrap">
  <div class="kicker">hover / tap any line</div>
  <h1 class="scramble" id="s1" data-text="DECODE ON HOVER"></h1>
  <h2 class="scramble" id="s2" data-text="Every character resolves independently"></h2>
  <p class="scramble" id="s3" data-text="Move your cursor away and back to replay the cipher"></p>
  <div class="hint">Tune speed, iteration count, character set and reveal order from the panel →</div>
</div>

<footer>Inspired by fancycomponents.dev · "Scramble Hover" · UI Spotlight Day 63 · Drop #3</footer>

<script>
(function(){
  var CHARSETS = {
    symbols: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*',
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    original: null
  };

  function getSettings(){
    return {
      speed: parseInt(document.getElementById('rSpeed').value, 10),
      iterations: parseInt(document.getElementById('rIter').value, 10),
      charsetKey: document.getElementById('sCharset').value,
      order: document.getElementById('sOrder').value
    };
  }

  ['rSpeed','rIter'].forEach(function(id){
    document.getElementById(id).addEventListener('input', function(){
      document.getElementById(id === 'rSpeed' ? 'vSpeed' : 'vIter').textContent = this.value;
    });
  });

  function Scrambler(el){
    this.el = el;
    this.original = el.getAttribute('data-text');
    this.timers = [];
    this.build();
    var self = this;
    el.addEventListener('mouseenter', function(){ self.run(); });
    el.addEventListener('touchstart', function(){ self.run(); }, { passive: true });
  }

  Scrambler.prototype.build = function(){
    this.el.innerHTML = '';
    this.chars = [];
    var self = this;
    this.original.split('').forEach(function(ch){
      var span = document.createElement('span');
      if (ch === ' '){
        span.className = 'ch space';
      } else {
        span.className = 'ch';
        span.textContent = ch;
      }
      self.el.appendChild(span);
      self.chars.push(span);
    });
  };

  Scrambler.prototype.clearTimers = function(){
    this.timers.forEach(clearTimeout);
    this.timers = [];
  };

  Scrambler.prototype.orderIndices = function(order, n){
    var idx = [];
    for (var i = 0; i < n; i++) idx.push(i);
    if (order === 'random'){
      for (var i = idx.length - 1; i > 0; i--){
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = idx[i]; idx[i] = idx[j]; idx[j] = tmp;
      }
      return idx;
    }
    if (order === 'end'){ idx.reverse(); return idx; }
    if (order === 'center'){
      var mid = Math.floor(n / 2);
      idx.sort(function(a, b){ return Math.abs(a - mid) - Math.abs(b - mid); });
      return idx;
    }
    return idx; // 'start'
  };

  Scrambler.prototype.run = function(){
    this.clearTimers();
    var settings = getSettings();
    var pool = CHARSETS[settings.charsetKey];
    var order = this.orderIndices(settings.order, this.chars.length);
    var self = this;

    order.forEach(function(charIdx, orderPos){
      var span = self.chars[charIdx];
      if (span.classList.contains('space')) return;
      var target = self.original[charIdx];
      var startDelay = orderPos * (settings.speed * 0.6);
      var iter = 0;

      var tick = function(){
        if (iter < settings.iterations){
          var sourceChars = pool || self.original.replace(/\s/g, '');
          var randCh = sourceChars.charAt(Math.floor(Math.random() * sourceChars.length));
          span.textContent = randCh;
          span.classList.add('scrambling');
          iter++;
          self.timers.push(setTimeout(tick, settings.speed));
        } else {
          span.textContent = target;
          span.classList.remove('scrambling');
        }
      };
      self.timers.push(setTimeout(tick, startDelay));
    });
  };

  var scramblers = Array.prototype.map.call(document.querySelectorAll('.scramble'), function(el){
    return new Scrambler(el);
  });

  setTimeout(function(){ scramblers[0].run(); }, 500);
})();
</script>
</body>
</html>
