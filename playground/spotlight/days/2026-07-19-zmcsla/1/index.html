<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sine Corridor — Scroll-Driven Dual-Wave Text</title>
<style>
  :root{
    --accent:#38bdf8;
    --accent-soft: rgba(56,189,248,.35);
    --bg-0:#060910;
    --bg-1:#0c121d;
    --glass: rgba(255,255,255,.06);
    --glass-b: rgba(255,255,255,.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-0);color:#e8edf4;font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;overflow-x:hidden;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(56,189,248,.14), transparent 60%),
      radial-gradient(900px 700px at 110% 20%, rgba(56,189,248,.08), transparent 55%),
      var(--bg-0);
  }

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:999px;
    background:var(--glass); border:1px solid var(--glass-b);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    color:#dce6f5; text-decoration:none; font-size:13px; font-weight:500;
    transition:background .2s ease, transform .2s ease;
  }
  .back-link:hover{ background:rgba(255,255,255,.12); transform:translateX(-2px); }

  .panel{
    position:fixed; top:16px; right:16px; z-index:50; width:230px;
    background:var(--glass); border:1px solid var(--glass-b);
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    border-radius:16px; padding:14px 16px 16px;
    font-size:12px;
  }
  .panel h3{margin:0 0 10px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); font-weight:700;}
  .panel label{display:flex; justify-content:space-between; margin:10px 0 4px; color:#aeb9c9;}
  .panel input[type=range]{width:100%; accent-color:var(--accent);}
  .panel .val{color:#fff; font-variant-numeric:tabular-nums;}
  @media (max-width: 720px), (pointer:coarse){ .panel{display:none;} }

  .stage{
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    perspective:800px;
  }
  .stage-inner{ position:relative; width:min(900px, 92vw); height:64vh; overflow:hidden; }
  .stage-inner::before, .stage-inner::after{
    content:""; position:absolute; left:0; right:0; height:26%; z-index:5; pointer-events:none;
  }
  .stage-inner::before{ top:0; background:linear-gradient(var(--bg-0), transparent); }
  .stage-inner::after{ bottom:0; background:linear-gradient(transparent, var(--bg-0)); }

  .focus-line{
    position:absolute; left:0; right:0; top:50%; height:1px; transform:translateY(-50%);
    background:linear-gradient(90deg, transparent, var(--accent-soft) 20%, var(--accent) 50%, var(--accent-soft) 80%, transparent);
    box-shadow:0 0 24px 2px var(--accent-soft);
    z-index:4;
  }

  .track{ position:absolute; left:0; right:0; top:0; will-change:transform; }
  .row{
    position:relative; height:64px; display:flex; align-items:center; justify-content:space-between;
    padding:0 4%;
  }
  .row .word{
    display:inline-block; will-change:transform, opacity;
    font-size:15px; letter-spacing:.06em; text-transform:uppercase; font-weight:600;
    color:#5c6b83; transition:color .25s ease;
  }
  .row .word.right{ text-align:right; }
  .row.is-focused .word{ color:#fff; }
  .row.is-focused .word.left{ color:var(--accent); text-shadow:0 0 18px var(--accent-soft); }
  .row.is-focused .word.right{ color:#f0f4fa; }
  .row .dot{
    position:absolute; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%;
    background:#2a3345; transition:background .25s ease, box-shadow .25s ease, transform .25s ease;
  }
  .row.is-focused .dot{ background:var(--accent); box-shadow:0 0 14px 3px var(--accent-soft); transform:scale(1.8); }

  .readout{
    position:absolute; bottom:22px; left:0; right:0; text-align:center; z-index:6;
    font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#5c6b83;
  }
  .readout b{ color:var(--accent); font-weight:700; }

  .hero{ position:absolute; top:8vh; left:0; right:0; text-align:center; z-index:3; pointer-events:none;}
  .hero h1{ margin:0; font-size:clamp(22px,4vw,34px); font-weight:800; letter-spacing:-.01em; }
  .hero p{ margin:8px 0 0; color:#8a97ab; font-size:13px; }
  .scroll-cue{ position:absolute; bottom:6vh; left:50%; transform:translateX(-50%); font-size:11px; color:#6a7688; letter-spacing:.1em; text-transform:uppercase; z-index:3;}
  .scroll-cue span{ display:inline-block; animation:bob 1.6s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(5px);} }

  .spacer{ height:420vh; }

  footer{
    position:fixed; bottom:10px; left:0; right:0; text-align:center; z-index:6;
    font-size:11px; color:#5a6577;
  }
  footer a{ color:#8fb8d6; text-decoration:none; }
</style>
</head>
<body>

<a href="../" class="back-link">← All 5 drops</a>

<div class="panel">
  <h3>Wave Controls</h3>
  <label>Wave count <span class="val" id="vWaves">1.6</span></label>
  <input id="rWaves" type="range" min="0.4" max="4" step="0.1" value="1.6">
  <label>Wave speed <span class="val" id="vSpeed">2.2</span></label>
  <input id="rSpeed" type="range" min="0.5" max="6" step="0.1" value="2.2">
  <label>Amplitude <span class="val" id="vAmp">120</span></label>
  <input id="rAmp" type="range" min="20" max="220" step="5" value="120">
  <label>Mirror columns <span class="val" id="vMirror">on</span></label>
  <input id="rMirror" type="range" min="0" max="1" step="1" value="1">
</div>

<div class="hero">
  <h1>Sine Corridor</h1>
  <p>Scroll to sweep the wave — the row nearest the centerline lights up</p>
</div>

<div class="stage">
  <div class="stage-inner">
    <div class="focus-line"></div>
    <div class="track" id="track"></div>
    <div class="readout" id="readout">— scroll to begin —</div>
  </div>
</div>

<div class="scroll-cue"><span>scroll ↓</span></div>

<div class="spacer"></div>

<footer>Inspired by tympanus.net/codrops · "Building a Scroll-Driven Dual-Wave Text Animation with GSAP" · UI Spotlight Day 63 · Drop #1</footer>

<script>
(function(){
  var PAIRS = [
    ["SIGNAL","ARC"], ["ORBIT","ECHO"], ["PRISM","NODE"], ["VAPOR","FLUX"],
    ["QUARTZ","BEAM"], ["CIPHER","WAVE"], ["LUMEN","DRIFT"], ["HALCYON","RELAY"],
    ["MERIDIAN","PULSE"], ["AURORA","SPAN"]
  ];
  var ROW_H = 64;
  var track = document.getElementById('track');
  var readout = document.getElementById('readout');
  var stageInner = document.querySelector('.stage-inner');

  PAIRS.forEach(function(pair, i){
    var row = document.createElement('div');
    row.className = 'row';
    row.dataset.i = i;
    row.innerHTML =
      '<span class="word left">'+pair[0]+'</span>' +
      '<span class="dot"></span>' +
      '<span class="word right">'+pair[1]+'</span>';
    track.appendChild(row);
  });
  track.style.height = (PAIRS.length * ROW_H) + 'px';

  var rows = Array.prototype.slice.call(track.querySelectorAll('.row'));
  var leftWords = rows.map(function(r){ return r.querySelector('.word.left'); });
  var rightWords = rows.map(function(r){ return r.querySelector('.word.right'); });

  var els = {
    waves: document.getElementById('rWaves'),
    speed: document.getElementById('rSpeed'),
    amp: document.getElementById('rAmp'),
    mirror: document.getElementById('rMirror')
  };
  var vals = {
    waves: document.getElementById('vWaves'),
    speed: document.getElementById('vSpeed'),
    amp: document.getElementById('vAmp'),
    mirror: document.getElementById('vMirror')
  };
  function syncLabels(){
    vals.waves.textContent = parseFloat(els.waves.value).toFixed(1);
    vals.speed.textContent = parseFloat(els.speed.value).toFixed(1);
    vals.amp.textContent = els.amp.value;
    vals.mirror.textContent = els.mirror.value === '1' ? 'on' : 'off';
  }
  Object.keys(els).forEach(function(k){ els[k].addEventListener('input', syncLabels); });
  syncLabels();

  var ticking = false;
  var progress = 0;

  function getProgress(){
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) return 0;
    return Math.min(1, Math.max(0, window.scrollY / max));
  }

  function frame(){
    ticking = false;
    progress = getProgress();

    var waveNumber = parseFloat(els.waves.value);
    var waveSpeed = parseFloat(els.speed.value);
    var amp = parseFloat(els.amp.value);
    var mirror = els.mirror.value === '1';

    var stageRect = stageInner.getBoundingClientRect();
    var stageCenter = stageRect.top + stageRect.height / 2;

    var trackHeight = rows.length * ROW_H;
    var travel = trackHeight - stageRect.height + ROW_H;
    var ty = -progress * Math.max(0, travel);
    track.style.transform = 'translateY(' + ty + 'px)';

    var bestIdx = 0, bestDist = Infinity;

    rows.forEach(function(row, i){
      var phase = waveNumber * i + waveSpeed * progress * Math.PI * 2 - Math.PI / 2;
      var s = Math.sin(phase);
      var offset = s * amp;
      leftWords[i].style.transform = 'translateX(' + offset + 'px)';
      rightWords[i].style.transform = 'translateX(' + (mirror ? -offset : offset) + 'px)';

      var rowRect = row.getBoundingClientRect();
      var rowCenter = rowRect.top + rowRect.height / 2;
      var dist = Math.abs(rowCenter - stageCenter);
      if (dist < bestDist){ bestDist = dist; bestIdx = i; }
    });

    rows.forEach(function(row, i){ row.classList.toggle('is-focused', i === bestIdx); });
    var pair = PAIRS[bestIdx];
    readout.innerHTML = '<b>' + pair[0] + '</b> &nbsp;·&nbsp; ' + pair[1] + ' &nbsp;—&nbsp; ' + Math.round(progress*100) + '%';
  }

  function onScrollOrResize(){
    if (!ticking){
      ticking = true;
      requestAnimationFrame(frame);
    }
  }

  window.addEventListener('scroll', onScrollOrResize, { passive: true });
  window.addEventListener('resize', onScrollOrResize);
  Object.keys(els).forEach(function(k){ els[k].addEventListener('input', onScrollOrResize); });

  frame();
})();
</script>
</body>
</html>
