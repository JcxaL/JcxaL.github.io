<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop 3 — SVG feTurbulence Text Warp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07040f;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;overflow-x:hidden}

h1{font-size:13px;color:#40405a;letter-spacing:.15em;text-transform:uppercase;margin-bottom:40px;text-align:center}

.words{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%}

.word-wrap{
  position:relative;cursor:pointer;padding:8px 24px;
  display:inline-flex;align-items:center;justify-content:center;
}

.word-wrap svg{
  overflow:visible;
  display:block;
}

.glyph-text{
  font-size:clamp(42px,7vw,80px);
  font-weight:900;
  letter-spacing:-.04em;
  fill:var(--col);
  filter:url(#warp);
  transition:filter .1s;
  user-select:none;
}

/* SVG filter IDs are per-element since each needs its own turbulence seed */
.word-wrap:nth-child(1) .glyph-text{--col:#c084fc}
.word-wrap:nth-child(2) .glyph-text{--col:#38bdf8}
.word-wrap:nth-child(3) .glyph-text{--col:#34d399}
.word-wrap:nth-child(4) .glyph-text{--col:#f472b6}
.word-wrap:nth-child(5) .glyph-text{--col:#fbbf24}

/* Panel */
#panel{
  position:fixed;bottom:24px;right:24px;
  background:rgba(10,8,20,.85);border:1px solid #2a2a4a;
  border-radius:12px;padding:16px;font-size:12px;
  backdrop-filter:blur(10px);width:200px;
}
#panel label{color:#6870a0;display:block;margin-bottom:4px}
#panel input[type=range]{width:100%;margin-bottom:12px;accent-color:#6366f1}
#panel .val{color:#a0a8c0;font-size:11px;float:right}

footer{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:#25254a;white-space:nowrap}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- Each word will reference its own filter with unique seed + freq -->
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="t1" type="turbulence" baseFrequency="0.01 0.008" numOctaves="3" seed="1" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="d1"/>
    </filter>
    <filter id="f2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="t2" type="fractalNoise" baseFrequency="0.015 0.01" numOctaves="4" seed="42" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="B" id="d2"/>
    </filter>
    <filter id="f3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="t3" type="turbulence" baseFrequency="0.008 0.02" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="G" yChannelSelector="R" id="d3"/>
    </filter>
    <filter id="f4" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="t4" type="fractalNoise" baseFrequency="0.02 0.005" numOctaves="5" seed="99" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="B" yChannelSelector="G" id="d4"/>
    </filter>
    <filter id="f5" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence id="t5" type="turbulence" baseFrequency="0.012 0.018" numOctaves="3" seed="23" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="R" id="d5"/>
    </filter>
  </defs>
</svg>

<h1>Hover to distort · feTurbulence displacement</h1>

<div class="words">
  <div class="word-wrap" data-filter="f1" data-disp="d1" data-turb="t1">
    <svg viewBox="0 0 400 100" width="400" height="100">
      <text x="200" y="80" text-anchor="middle" class="glyph-text" filter="url(#f1)">DISSOLVE</text>
    </svg>
  </div>

  <div class="word-wrap" data-filter="f2" data-disp="d2" data-turb="t2">
    <svg viewBox="0 0 400 100" width="400" height="100">
      <text x="200" y="80" text-anchor="middle" class="glyph-text" filter="url(#f2)">FRACTURE</text>
    </svg>
  </div>

  <div class="word-wrap" data-filter="f3" data-disp="d3" data-turb="t3">
    <svg viewBox="0 0 500 100" width="500" height="100">
      <text x="250" y="80" text-anchor="middle" class="glyph-text" filter="url(#f3)">OSCILLATE</text>
    </svg>
  </div>

  <div class="word-wrap" data-filter="f4" data-disp="d4" data-turb="t4">
    <svg viewBox="0 0 360 100" width="360" height="100">
      <text x="180" y="80" text-anchor="middle" class="glyph-text" filter="url(#f4)">TURBINE</text>
    </svg>
  </div>

  <div class="word-wrap" data-filter="f5" data-disp="d5" data-turb="t5">
    <svg viewBox="0 0 400 100" width="400" height="100">
      <text x="200" y="80" text-anchor="middle" class="glyph-text" filter="url(#f5)">ENTROPY</text>
    </svg>
  </div>
</div>

<div id="panel">
  <label>Displacement <span class="val" id="vScale">0</span></label>
  <input type="range" id="rScale" min="0" max="120" value="60">
  <label>Frequency <span class="val" id="vFreq">0.01</span></label>
  <input type="range" id="rFreq" min="1" max="50" value="10">
  <label>Octaves <span class="val" id="vOct">3</span></label>
  <input type="range" id="rOct" min="1" max="6" value="3">
</div>

<footer>Inspired by SVG feTurbulence displacement techniques · UI Spotlight Day 44 · Drop #3</footer>

<script>
const words = document.querySelectorAll('.word-wrap');
const rScale = document.getElementById('rScale');
const rFreq = document.getElementById('rFreq');
const rOct = document.getElementById('rOct');

let globalScale = 60, globalFreq = 0.01, globalOct = 3;
let currentHover = null;
let rafId = null;
let animPhase = 0;

// Per-word state
const states = Array.from(words).map(w => ({
  scale: 0,
  targetScale: 0,
  freqOffset: Math.random() * 0.005,
  el: w,
  dispEl: document.getElementById(w.dataset.disp),
  turbEl: document.getElementById(w.dataset.turb),
}));

words.forEach((w, i) => {
  w.addEventListener('mouseenter', () => {
    states[i].targetScale = globalScale;
    currentHover = i;
  });
  w.addEventListener('mouseleave', () => {
    states[i].targetScale = 0;
    if (currentHover === i) currentHover = null;
  });
  w.addEventListener('click', () => {
    // Burst effect
    states[i].scale = Math.min(globalScale * 2, 200);
  });
});

function animate() {
  animPhase += 0.015;
  for (let i = 0; i < states.length; i++) {
    const s = states[i];
    s.scale += (s.targetScale - s.scale) * 0.12;
    if (s.dispEl) {
      s.dispEl.setAttribute('scale', s.scale.toFixed(1));
    }
    // Animate turbulence frequency for hover words
    if (s.scale > 1 && s.turbEl) {
      const wobble = Math.sin(animPhase * (1 + i * 0.3)) * 0.003;
      const f = globalFreq + s.freqOffset + wobble;
      s.turbEl.setAttribute('baseFrequency', `${f.toFixed(4)} ${(f * 0.7).toFixed(4)}`);
      s.turbEl.setAttribute('numOctaves', globalOct);
    }
  }
  rafId = requestAnimationFrame(animate);
}
animate();

// Controls
function updateControls() {
  globalScale = +rScale.value;
  globalFreq = +rFreq.value / 1000;
  globalOct = +rOct.value;
  document.getElementById('vScale').textContent = globalScale;
  document.getElementById('vFreq').textContent = globalFreq.toFixed(3);
  document.getElementById('vOct').textContent = globalOct;
  states.forEach(s => { if (s.targetScale > 0) s.targetScale = globalScale; });
}
rScale.addEventListener('input', updateControls);
rFreq.addEventListener('input', updateControls);
rOct.addEventListener('input', updateControls);
updateControls();

// Resize SVGs responsively
function resizeSVGs() {
  const vw = window.innerWidth;
  words.forEach(w => {
    const svg = w.querySelector('svg');
    if (!svg) return;
    const vb = svg.getAttribute('viewBox').split(' ');
    const vbW = +vb[2];
    const maxW = Math.min(vbW, vw - 48);
    svg.style.width = maxW + 'px';
    svg.style.height = (maxW / vbW * 100) + 'px';
  });
}
window.addEventListener('resize', resizeSVGs);
resizeSVGs();
</script>
</body>
</html>
