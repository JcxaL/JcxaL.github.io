<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop 5 — Floating Action Button Radial Spring Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080610;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;overflow:hidden}

h1{font-size:13px;color:#40405a;letter-spacing:.15em;text-transform:uppercase;text-align:center}

/* Demo canvas area */
.demo-area{
  position:relative;
  width:min(500px,90vw);
  height:min(500px,90vw);
  border:1px solid #1a1a3a;
  border-radius:20px;
  background:#0a0818;
  overflow:hidden;
}

.demo-content{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;text-align:center;padding:60px;
  pointer-events:none;
}
.demo-content h2{font-size:18px;font-weight:300;color:#30305a;letter-spacing:-.01em}
.demo-content p{font-size:12px;color:#202040}

/* FAB */
.fab-root{
  position:absolute;bottom:24px;right:24px;
}

.fab-main{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  box-shadow:0 4px 24px rgba(99,102,241,.5);
  position:relative;z-index:10;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
  outline:none;
  color:#fff;
}
.fab-main:hover{transform:scale(1.08)}
.fab-root.open .fab-main{transform:rotate(45deg) scale(1.05)}

/* Radial items */
.fab-items{
  position:absolute;bottom:0;right:0;
  width:56px;height:56px;
  pointer-events:none;
}

.fab-item{
  position:absolute;
  bottom:0;right:0;
  width:44px;height:44px;
  border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  pointer-events:none;
  opacity:0;
  transform:translate(6px,6px) scale(0.4);
  transition:
    transform 0.35s cubic-bezier(.34,1.56,.64,1),
    opacity 0.25s ease;
  box-shadow:0 3px 12px rgba(0,0,0,.4);
  color:#fff;
  -webkit-tap-highlight-color:transparent;
  outline:none;
}

.fab-item .label{
  position:absolute;right:52px;
  background:rgba(15,12,30,.9);
  border:1px solid #2a2a4a;
  border-radius:6px;
  padding:3px 10px;
  font-size:11px;
  white-space:nowrap;
  color:#c0c8e0;
  pointer-events:none;
  opacity:0;
  transform:translateX(8px);
  transition:opacity .2s, transform .2s;
  font-family:system-ui,sans-serif;
}

.fab-root.open .fab-item{
  pointer-events:auto;
  opacity:1;
}
.fab-root.open .fab-item:hover .label,
.fab-root.open .fab-item:focus .label{
  opacity:1;transform:translateX(0);
}

/* Each item springs out to a different position */
.fab-root.open .fab-item:nth-child(1){transform:translate(6px,-76px) scale(1)}
.fab-root.open .fab-item:nth-child(2){transform:translate(-46px,-56px) scale(1)}
.fab-root.open .fab-item:nth-child(3){transform:translate(-72px,6px) scale(1)}
.fab-root.open .fab-item:nth-child(4){transform:translate(-46px,60px) scale(1)}
.fab-root.open .fab-item:nth-child(5){transform:translate(6px,76px) scale(1)}

/* Stagger delays */
.fab-item:nth-child(1){transition-delay:.0s}
.fab-item:nth-child(2){transition-delay:.04s}
.fab-item:nth-child(3){transition-delay:.08s}
.fab-item:nth-child(4){transition-delay:.12s}
.fab-item:nth-child(5){transition-delay:.16s}

.fab-root.open .fab-item:nth-child(1){transition-delay:.05s}
.fab-root.open .fab-item:nth-child(2){transition-delay:.08s}
.fab-root.open .fab-item:nth-child(3){transition-delay:.11s}
.fab-root.open .fab-item:nth-child(4){transition-delay:.14s}
.fab-root.open .fab-item:nth-child(5){transition-delay:.17s}

.i1{background:#4f46e5}
.i2{background:#0891b2}
.i3{background:#059669}
.i4{background:#d97706}
.i5{background:#dc2626}

/* Overlay backdrop when open */
.fab-overlay{
  position:absolute;inset:0;background:rgba(4,3,12,.6);
  opacity:0;pointer-events:none;transition:opacity .3s;border-radius:20px;
  backdrop-filter:blur(2px);
}
.fab-root.open ~ .fab-overlay,
.demo-area.fab-open .fab-overlay{opacity:1;pointer-events:auto}

/* Notification badge */
.notification{
  position:absolute;top:16px;right:16px;
  background:#1a1a3a;border:1px solid #2a2a4a;
  border-radius:12px;padding:10px 16px;font-size:13px;
  color:#8890b0;
  animation:fadeIn .3s ease;
  max-width:220px;
  line-height:1.4;
}
.notification strong{color:#c084fc}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* Variant showcase */
.variants{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:center}
.variant-label{font-size:11px;color:#30305a;text-align:center;margin-top:6px}

footer{font-size:11px;color:#15153a;text-align:center}
</style>
</head>
<body>

<h1>Radial Spring FAB Menu</h1>

<div class="demo-area" id="demoArea">
  <div class="fab-overlay" id="overlay"></div>
  <div class="demo-content">
    <h2>Floating Action Button</h2>
    <p>Click + to expand the radial menu<br>Each item springs out with staggered delay</p>
  </div>

  <div class="fab-root" id="fab">
    <div class="fab-items">
      <button class="fab-item i1" onclick="fabAction('Share','🔗')">
        🔗
        <span class="label">Share</span>
      </button>
      <button class="fab-item i2" onclick="fabAction('Download','↓')">
        ↓
        <span class="label">Download</span>
      </button>
      <button class="fab-item i3" onclick="fabAction('Save','💾')">
        💾
        <span class="label">Save</span>
      </button>
      <button class="fab-item i4" onclick="fabAction('Edit','✏️')">
        ✏️
        <span class="label">Edit</span>
      </button>
      <button class="fab-item i5" onclick="fabAction('Delete','🗑')">
        🗑
        <span class="label">Delete</span>
      </button>
    </div>
    <button class="fab-main" id="fabMain" onclick="toggleFab()">+</button>
  </div>
</div>

<footer>Inspired by Material Design FAB radial expansion · UI Spotlight Day 44 · Drop #5</footer>

<script>
const fab = document.getElementById('fab');
const overlay = document.getElementById('overlay');
const demoArea = document.getElementById('demoArea');
let open = false;
let notifTimer = null;

function toggleFab() {
  open = !open;
  fab.classList.toggle('open', open);
  demoArea.classList.toggle('fab-open', open);
}

overlay.addEventListener('click', () => {
  if (open) toggleFab();
});

function fabAction(name, icon) {
  toggleFab();
  showNotif(`${icon} <strong>${name}</strong> selected`);
}

function showNotif(html) {
  let n = document.querySelector('.notification');
  if (n) n.remove();
  n = document.createElement('div');
  n.className = 'notification';
  n.innerHTML = html;
  demoArea.appendChild(n);
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { if(n.parentNode) n.remove(); }, 2400);
}

// Auto-demo
setTimeout(() => { toggleFab(); }, 600);
setTimeout(() => { toggleFab(); }, 2200);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && open) toggleFab();
  if (e.key === ' ') { e.preventDefault(); toggleFab(); }
});
</script>
</body>
</html>
