<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop 4 — Spring Particle Burst</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06040e;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;overflow:hidden}

h1{font-size:13px;color:#40405a;letter-spacing:.15em;text-transform:uppercase;text-align:center}
p{font-size:12px;color:#30305a;text-align:center}

.buttons{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:center}

.burst-btn{
  position:relative;
  border:none;cursor:pointer;
  border-radius:50%;
  width:88px;height:88px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  background:var(--bg);
  box-shadow:0 0 0 0 var(--glow);
  transition:transform .12s, box-shadow .12s;
  -webkit-tap-highlight-color:transparent;
  outline:none;
}
.burst-btn:hover{transform:scale(1.1);box-shadow:0 0 20px 4px var(--glow)}
.burst-btn:active{transform:scale(0.94)}

.burst-btn.b1{--bg:#3b1d7a;--glow:rgba(139,92,246,.4);--particle:#a78bfa}
.burst-btn.b2{--bg:#0c3060;--glow:rgba(59,130,246,.4);--particle:#60a5fa}
.burst-btn.b3{--bg:#062a1a;--glow:rgba(16,185,129,.4);--particle:#34d399}
.burst-btn.b4{--bg:#6a0a2a;--glow:rgba(239,68,68,.4);--particle:#f87171}
.burst-btn.b5{--bg:#5a3a04;--glow:rgba(245,158,11,.4);--particle:#fbbf24}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}

.click-hint{font-size:11px;color:#252540;margin-top:-16px}
</style>
</head>
<body>

<canvas id="c"></canvas>

<h1>Spring Particle Burst</h1>
<p>Each element fires unique particles with physics-based trajectories</p>

<div class="buttons">
  <button class="burst-btn b1" data-idx="0">🔮</button>
  <button class="burst-btn b2" data-idx="1">💧</button>
  <button class="burst-btn b3" data-idx="2">🌿</button>
  <button class="burst-btn b4" data-idx="3">🔥</button>
  <button class="burst-btn b5" data-idx="4">⚡</button>
</div>
<div class="click-hint">click or tap to burst</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particle colors per button index
const COLORS = [
  ['#a78bfa','#c084fc','#818cf8','#7c3aed'],
  ['#60a5fa','#38bdf8','#93c5fd','#3b82f6'],
  ['#34d399','#6ee7b7','#10b981','#059669'],
  ['#f87171','#fca5a5','#ef4444','#f472b6'],
  ['#fbbf24','#fcd34d','#f59e0b','#fb923c'],
];

const SHAPES = ['circle','square','star','triangle','ring'];
const PARTICLE_COUNTS = [40,30,35,45,38];
const GRAVITY_VALS = [0.12,0.08,0.18,0.22,0.15];

class Particle {
  constructor(x, y, idx) {
    this.x = x; this.y = y;
    const cols = COLORS[idx];
    this.color = cols[Math.floor(Math.random() * cols.length)];
    // Spring-like eject: initial burst speed with random direction
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 4; // upward bias
    this.gravity = GRAVITY_VALS[idx];
    this.drag = 0.97 + Math.random() * 0.02;
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.02;
    this.size = 3 + Math.random() * 8;
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.3;
    this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
    // Spring oscillation
    this.springY = 0;
    this.springK = 0.04 + Math.random() * 0.04;
    this.springV = -2 - Math.random() * 3;
  }

  update() {
    this.vx *= this.drag;
    this.vy += this.gravity;
    this.vy *= this.drag;
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rotV;
    this.life -= this.decay;
    // Spring vertical oscillation that dampens
    this.springV -= this.springK * this.springY;
    this.springV *= 0.96;
    this.springY += this.springV;
  }

  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y + this.springY * this.life * 0.5);
    ctx.rotate(this.rot);
    ctx.fillStyle = this.color;
    ctx.strokeStyle = this.color;
    const s = this.size;
    switch(this.shape) {
      case 'circle':
        ctx.beginPath();ctx.arc(0,0,s/2,0,Math.PI*2);ctx.fill();
        break;
      case 'square':
        ctx.fillRect(-s/2,-s/2,s,s);
        break;
      case 'star':
        ctx.beginPath();
        for(let i=0;i<5;i++){
          const a=i*Math.PI*2/5-Math.PI/2;
          const ia=(i+.5)*Math.PI*2/5-Math.PI/2;
          ctx.lineTo(Math.cos(a)*s/2,Math.sin(a)*s/2);
          ctx.lineTo(Math.cos(ia)*s*0.2,Math.sin(ia)*s*0.2);
        }
        ctx.closePath();ctx.fill();
        break;
      case 'triangle':
        ctx.beginPath();
        ctx.moveTo(0,-s/2);ctx.lineTo(s/2,s/2);ctx.lineTo(-s/2,s/2);
        ctx.closePath();ctx.fill();
        break;
      case 'ring':
        ctx.lineWidth=2;ctx.globalAlpha*=0.8;
        ctx.beginPath();ctx.arc(0,0,s/2,0,Math.PI*2);ctx.stroke();
        break;
    }
    ctx.restore();
  }
}

let particles = [];

function burst(x, y, idx) {
  const count = PARTICLE_COUNTS[idx];
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, idx));
  }
  // Add a shockwave ring
  shockwaves.push({ x, y, r: 0, maxR: 80, color: COLORS[idx][0], life: 1 });
}

let shockwaves = [];

function animate() {
  ctx.clearRect(0, 0, W, H);

  // Shockwaves
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const sw = shockwaves[i];
    sw.r += (sw.maxR - sw.r) * 0.15;
    sw.life -= 0.06;
    if (sw.life <= 0) { shockwaves.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
    ctx.strokeStyle = sw.color;
    ctx.lineWidth = 2 * sw.life;
    ctx.globalAlpha = sw.life * 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i,1);
  }

  requestAnimationFrame(animate);
}
animate();

// Burst on click
document.querySelectorAll('.burst-btn').forEach(btn => {
  const fire = (e) => {
    e.preventDefault();
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    burst(cx, cy, +btn.dataset.idx);
  };
  btn.addEventListener('click', fire);
  btn.addEventListener('touchend', fire);
});

// Auto-demo burst on load after short delay
setTimeout(() => {
  const btns = document.querySelectorAll('.burst-btn');
  let i = 0;
  const autoBurst = () => {
    if (i >= btns.length) return;
    const btn = btns[i++];
    const rect = btn.getBoundingClientRect();
    burst(rect.left + rect.width/2, rect.top + rect.height/2, +btn.dataset.idx);
    setTimeout(autoBurst, 180);
  };
  autoBurst();
}, 400);
</script>
<footer style="position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;color:#15153a;white-space:nowrap">
Inspired by particle burst micro-interaction patterns · UI Spotlight Day 44 · Drop #4
</footer>
</body>
</html>
