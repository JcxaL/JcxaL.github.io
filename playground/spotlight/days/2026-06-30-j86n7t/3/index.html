<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slot Machine Text Roll · UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080a0d;overflow:hidden;font-family:'Courier New',monospace;color:#e0e8f0}

#scene{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:20px}

h2{font-size:11px;letter-spacing:.2em;color:#4a5568;text-transform:uppercase;text-align:center}

/* Slot machine display */
.slot-machine{display:flex;gap:4px;align-items:stretch;justify-content:center;flex-wrap:wrap}

.slot{
  width:clamp(40px,8vw,72px);height:clamp(56px,11vw,100px);
  background:#0d1117;
  border:1px solid #1e2837;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 0 1px #0a0c10,inset 0 2px 4px rgba(0,0,0,.6);
}

/* Glare lines at top/bottom of slot window */
.slot::before,.slot::after{content:'';position:absolute;left:0;right:0;height:30%;z-index:2;pointer-events:none}
.slot::before{top:0;background:linear-gradient(to bottom,#0d111788 0%,transparent 100%)}
.slot::after{bottom:0;background:linear-gradient(to top,#0d111788 0%,transparent 100%)}

/* Center highlight line */
.slot-line{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:1px;background:#22d3ee33;z-index:3}

.reel{
  display:flex;flex-direction:column;
  transition:transform .6s cubic-bezier(.25,.1,.25,1.4);
  will-change:transform;
}

.char{
  height:clamp(56px,11vw,100px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(24px,5vw,52px);
  font-weight:700;letter-spacing:-.02em;
  color:#e8f0ff;
  line-height:1;
  flex-shrink:0;
}

/* Input area */
.controls{display:flex;flex-direction:column;align-items:center;gap:10px}

.text-input{
  background:#0d1117;border:1px solid #1e2837;border-radius:8px;
  color:#e8f0ff;font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.05em;
  padding:10px 18px;text-align:center;text-transform:uppercase;
  width:min(300px,80vw);outline:none;
  transition:border-color .2s;
}
.text-input:focus{border-color:#22d3ee55}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn{
  padding:8px 18px;border-radius:8px;border:1px solid;
  font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.05em;cursor:pointer;
  transition:all .15s;
}
.btn-roll{background:#22d3ee11;border-color:#22d3ee55;color:#22d3ee}
.btn-roll:hover{background:#22d3ee22;border-color:#22d3ee}
.btn-rand{background:#a78bfa11;border-color:#a78bfa55;color:#a78bfa}
.btn-rand:hover{background:#a78bfa22;border-color:#a78bfa}
.btn-num{background:#f4724011;border-color:#f4724055;color:#f47240}
.btn-num:hover{background:#f4724022;border-color:#f47240}

/* Multiple demo displays */
#demos{display:flex;flex-direction:column;gap:20px;align-items:center}

.demo-row{display:flex;flex-direction:column;align-items:center;gap:6px}
.demo-label{font-size:9px;letter-spacing:.15em;color:#2a3545;text-transform:uppercase}

.counter-sm .slot{width:clamp(28px,5vw,44px);height:clamp(40px,8vw,64px)}
.counter-sm .char{height:clamp(40px,8vw,64px);font-size:clamp(18px,3.5vw,36px)}

#credits{position:fixed;bottom:8px;right:12px;font-size:10px;color:#1a2535}
</style>
</head>
<body>
<div id="scene">
  <h2>Slot Machine Roll · Mechanical digit animation</h2>

  <div id="demos">
    <!-- Main word display -->
    <div class="demo-row">
      <div class="demo-label">Type to roll →</div>
      <div class="slot-machine" id="word-slots"></div>
    </div>

    <!-- Counter display -->
    <div class="demo-row">
      <div class="demo-label">Counting up →</div>
      <div class="slot-machine counter-sm" id="counter-slots"></div>
    </div>
  </div>

  <div class="controls">
    <input class="text-input" id="text-input" maxlength="8" value="HELLO" placeholder="TYPE SOMETHING">
    <div class="btn-row">
      <button class="btn btn-roll" id="roll-btn">⟳ Roll</button>
      <button class="btn btn-rand" id="rand-btn">⚄ Random</button>
      <button class="btn btn-num" id="num-btn"># Numbers</button>
    </div>
  </div>
</div>
<div id="credits">Inspired by slot-machine text · UI Spotlight Day 45 · Drop #3</div>

<script>
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%';
const DIGITS = '0123456789';
const REEL_SIZE = 20; // chars in reel (loops)

function buildReel(chars) {
  // Build a long reel of characters to scroll through
  let out = [];
  for(let i = 0; i < REEL_SIZE; i++) out.push(chars[i % chars.length]);
  return out;
}

function createSlot(charH, chars) {
  const slot = document.createElement('div');
  slot.className = 'slot';
  const line = document.createElement('div');
  line.className = 'slot-line';
  const reel = document.createElement('div');
  reel.className = 'reel';

  const reelChars = buildReel(chars);
  reelChars.forEach(c => {
    const ch = document.createElement('div');
    ch.className = 'char';
    ch.textContent = c;
    reel.appendChild(ch);
  });

  slot.appendChild(line);
  slot.appendChild(reel);
  return { slot, reel, chars, reelChars };
}

function rollTo(slotObj, targetChar, delay) {
  const { reel, chars, reelChars } = slotObj;
  const idx = reelChars.indexOf(targetChar);
  if(idx < 0) return;
  const charH = slotObj.slot.clientHeight;
  // Quick scramble: go past by 2 full loops then settle
  const overshoot = REEL_SIZE * charH * 2 + idx * charH;
  setTimeout(() => {
    // Fast spin first
    reel.style.transition = `transform ${0.3 + Math.random()*0.2}s cubic-bezier(.2,0,.4,1)`;
    reel.style.transform = `translateY(-${overshoot - charH}px)`;
    setTimeout(() => {
      // Settle with overshoot
      reel.style.transition = `transform 0.5s cubic-bezier(.34,1.4,.64,1)`;
      reel.style.transform = `translateY(-${overshoot}px)`;
    }, 350 + Math.random()*100);
  }, delay);
}

// Word display
let wordSlots = [];
const wordContainer = document.getElementById('word-slots');

function buildWordSlots(word) {
  wordContainer.innerHTML = '';
  wordSlots = [];
  word = word.toUpperCase().padEnd(Math.max(word.length, 5));
  for(let i = 0; i < word.length; i++){
    const ch = word[i] === ' ' ? ' ' : word[i];
    const chars = CHARS.includes(ch) ? CHARS : ' ';
    const s = createSlot(80, chars);
    wordContainer.appendChild(s.slot);
    wordSlots.push(s);
  }
  rollWord(word);
}

function rollWord(word) {
  word = word.toUpperCase();
  wordSlots.forEach((s, i) => {
    const ch = word[i] || ' ';
    rollTo(s, ch, i * 80);
  });
}

// Counter display
let counterSlots = [];
let counterVal = 0;
const counterContainer = document.getElementById('counter-slots');

function buildCounter() {
  counterContainer.innerHTML = '';
  counterSlots = [];
  for(let i = 0; i < 6; i++){
    const s = createSlot(56, DIGITS);
    counterContainer.appendChild(s.slot);
    counterSlots.push(s);
  }
}

function rollCounter(n) {
  const str = String(n).padStart(6, '0');
  counterSlots.forEach((s, i) => rollTo(s, str[i], i * 60));
}

// Controls
document.getElementById('roll-btn').addEventListener('click', () => {
  const w = document.getElementById('text-input').value;
  buildWordSlots(w);
});
document.getElementById('rand-btn').addEventListener('click', () => {
  let r = '';
  for(let i = 0; i < 6; i++) r += CHARS[Math.floor(Math.random()*26)];
  document.getElementById('text-input').value = r;
  buildWordSlots(r);
});
document.getElementById('num-btn').addEventListener('click', () => {
  let r = '';
  for(let i = 0; i < 6; i++) r += DIGITS[Math.floor(Math.random()*10)];
  document.getElementById('text-input').value = r;
  buildWordSlots(r);
});
document.getElementById('text-input').addEventListener('keyup', e => {
  if(e.key === 'Enter') document.getElementById('roll-btn').click();
});

// Counter auto-increment
buildCounter();
rollCounter(0);
setInterval(() => {
  counterVal = (counterVal + 1) % 1000000;
  rollCounter(counterVal);
}, 1200);

// Init
buildWordSlots('HELLO');
</script>
</body>
</html>
