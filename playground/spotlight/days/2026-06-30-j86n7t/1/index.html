<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lenticular Cursor Reveal · UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#080810;overflow:hidden;font-family:system-ui,sans-serif;color:#fff;cursor:none}

#scene{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}

/* Strip container */
#lens{width:min(700px,92vw);height:min(420px,70vh);position:relative;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px #0008}

.strip{position:absolute;top:0;height:100%;overflow:hidden;transition:none}
.strip-a,.strip-b{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}

/* Face A: dark with purple gradient text */
.face-a{background:linear-gradient(135deg,#0f0a1e 0%,#1a0a30 50%,#0a0f20 100%)}
.face-a .txt{font-size:clamp(32px,6vw,72px);font-weight:900;letter-spacing:-.03em;
  background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.1;padding:20px;user-select:none}

/* Face B: light with bold typographic layout */
.face-b{background:linear-gradient(135deg,#f0f4ff 0%,#e8f0ff 50%,#f4f0ff 100%)}
.face-b .txt{font-size:clamp(32px,6vw,72px);font-weight:900;letter-spacing:-.03em;
  background:linear-gradient(135deg,#4f00cc,#0050cc,#00aacc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.1;padding:20px;user-select:none}

/* Custom cursor */
#cur{position:fixed;pointer-events:none;z-index:999;width:20px;height:20px;
  border-radius:50%;border:2px solid #c084fc;transform:translate(-50%,-50%);
  mix-blend-mode:exclusion;transition:width .15s,height .15s}
#cur.big{width:40px;height:40px}

/* Label */
#label{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:#ffffff18;backdrop-filter:blur(12px);border:1px solid #ffffff22;
  border-radius:24px;padding:8px 20px;font-size:12px;color:#ffffffaa;white-space:nowrap;z-index:10}

/* Panel selector */
#selector{position:absolute;top:20px;right:20px;display:flex;gap:8px;z-index:10}
.sel-btn{padding:6px 14px;border-radius:20px;border:1px solid #ffffff22;background:#ffffff0a;
  color:#ffffffaa;font-size:11px;cursor:pointer;transition:all .15s}
.sel-btn.active,.sel-btn:hover{background:#c084fc22;border-color:#c084fc;color:#fff}

#credits{position:absolute;bottom:8px;right:12px;font-size:10px;color:#ffffff33;z-index:10}
</style>
</head>
<body>
<div id="cur"></div>
<div id="scene">
  <div id="lens"></div>
  <div id="label">Move cursor across the image · lenticular print effect</div>
  <div id="selector">
    <button class="sel-btn active" data-pair="0">Design</button>
    <button class="sel-btn" data-pair="1">Code</button>
    <button class="sel-btn" data-pair="2">Create</button>
  </div>
  <div id="credits">Inspired by subhadeeproy3902/lenticular · UI Spotlight Day 45 · Drop #1</div>
</div>

<script>
const lens = document.getElementById('lens');
const cur = document.getElementById('cur');
const N = 22; // number of strips

const PAIRS = [
  {
    a: { bg:'linear-gradient(135deg,#0f0a1e,#1a0a30,#0a0f20)', color:'#c084fc', text:'DESIGN\nFUTURE' },
    b: { bg:'linear-gradient(135deg,#f0f4ff,#e8f0ff,#f4f0ff)', color:'#4f00cc', text:'DESIGN\nFUTURE' }
  },
  {
    a: { bg:'linear-gradient(135deg,#001a0a,#002a10,#001510)', color:'#34d399', text:'WRITE\nCODE' },
    b: { bg:'linear-gradient(135deg,#f0fff8,#e8fff2,#f4fff6)', color:'#059669', text:'WRITE\nCODE' }
  },
  {
    a: { bg:'linear-gradient(135deg,#1a0010,#2a0018,#0f0010)', color:'#f472b6', text:'CREATE\nART' },
    b: { bg:'linear-gradient(135deg,#fff0f8,#ffe8f4,#fff4fb)', color:'#be185d', text:'CREATE\nART' }
  }
];

let activePair = 0;
let cw = 0, strips = [];

function buildStrips(){
  lens.innerHTML = '';
  strips = [];
  cw = lens.clientWidth;
  const sw = cw / N;
  const pair = PAIRS[activePair];

  for(let i = 0; i < N; i++){
    const wrap = document.createElement('div');
    wrap.className = 'strip';
    wrap.style.left = (i * sw) + 'px';
    wrap.style.width = sw + 'px';

    const faceA = document.createElement('div');
    faceA.className = 'strip-a';
    faceA.style.cssText = `background:${pair.a.bg}`;
    const ta = document.createElement('div');
    ta.className = 'txt face-a';
    ta.style.cssText = `background:linear-gradient(135deg,${pair.a.color},${shiftHue(pair.a.color,40)});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:absolute;left:${-i*sw}px;width:${cw}px;height:100%;display:flex;align-items:center;justify-content:center;font-size:clamp(32px,6vw,72px);font-weight:900;letter-spacing:-.03em;text-align:center;white-space:pre-line`;
    ta.textContent = pair.a.text;
    faceA.appendChild(ta);

    const faceB = document.createElement('div');
    faceB.className = 'strip-b';
    faceB.style.cssText = `background:${pair.b.bg};transform:translateX(100%)`;
    const tb = document.createElement('div');
    tb.className = 'txt face-b';
    tb.style.cssText = `background:linear-gradient(135deg,${pair.b.color},${shiftHue(pair.b.color,40)});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:absolute;left:${-i*sw}px;width:${cw}px;height:100%;display:flex;align-items:center;justify-content:center;font-size:clamp(32px,6vw,72px);font-weight:900;letter-spacing:-.03em;text-align:center;white-space:pre-line`;
    tb.textContent = pair.b.text;
    faceB.appendChild(tb);

    wrap.appendChild(faceA);
    wrap.appendChild(faceB);
    lens.appendChild(wrap);
    strips.push({ wrap, faceA, faceB });
  }
}

function shiftHue(hex, amt) {
  // naive: just return a complementary color
  const map = { '#c084fc':'#38bdf8','#4f00cc':'#0050ff','#34d399':'#06b6d4','#059669':'#0284c7','#f472b6':'#c084fc','#be185d':'#7c3aed' };
  return map[hex] || '#ffffff';
}

function update(ratio) {
  // ratio: 0 (left) → 1 (right)
  const sw = cw / N;
  strips.forEach((s, i) => {
    const stripCenter = (i + 0.5) / N;
    // Determine if this strip shows A or B based on cursor position
    // Progressive reveal from left: strips to the left of cursor show B, right show A
    const show_b = ratio > stripCenter;

    // Slide effect: strip transitions with a slight wave
    const wave = Math.sin((ratio - stripCenter) * Math.PI * 6) * 0.08;
    const tx = show_b ? (0 + wave * 100) : (100 + wave * 100);
    s.faceB.style.transform = `translateX(${show_b ? 0 : 100}%)`;
    s.faceA.style.transform = `translateX(${show_b ? -100 : 0}%)`;
  });
}

// Mouse tracking
let mouseX = 0;
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
  const r = lens.getBoundingClientRect();
  if(e.clientX >= r.left && e.clientX <= r.right){
    const ratio = (e.clientX - r.left) / r.width;
    update(ratio);
  }
});

lens.addEventListener('mouseenter', () => cur.classList.add('big'));
lens.addEventListener('mouseleave', () => cur.classList.remove('big'));

// Pair selector
document.querySelectorAll('.sel-btn').forEach(b => b.addEventListener('click', () => {
  activePair = parseInt(b.dataset.pair);
  document.querySelectorAll('.sel-btn').forEach(x => x.classList.toggle('active', x===b));
  buildStrips();
  update(0.3);
}));

window.addEventListener('resize', buildStrips);
buildStrips();
update(0.3);

// Auto-animate on touch devices
let autoT = 0, autoDir = 1;
function autoAnimate(ts) {
  autoT += autoDir * 0.004;
  if(autoT > 0.9 || autoT < 0.1) autoDir *= -1;
  const match = window.matchMedia('(pointer:coarse)').matches;
  if(match) update(autoT);
  requestAnimationFrame(autoAnimate);
}
requestAnimationFrame(autoAnimate);
</script>
</body>
</html>
