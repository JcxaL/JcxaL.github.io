<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Histogram Range Slider — UI Spotlight</title>
<style>
  :root{ --bg:#0a0b10; --panel:#12151d; --panel2:#171b25; --line:#242a37; --accent:#a78bfa; --text:#e8ecf2; --muted:#8a93a6; }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0; background:var(--bg);}
  body{font-family:system-ui,-apple-system,sans-serif; color:var(--text); display:flex; flex-direction:column; min-height:100%; align-items:center; justify-content:center; padding:20px; gap:22px;}
  .wrap{ width:100%; max-width:420px; display:flex; flex-direction:column; gap:26px; }
  header{text-align:center;}
  h1{font-size:14px; margin:0 0 3px;}
  p.sub{margin:0; font-size:11.5px; color:var(--muted);}

  .field{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 18px 20px; }
  .field .top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  .field .top b{font-size:12.5px;}
  .field .top span{font-size:12px; color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums;}

  .slider{ position:relative; height:56px; }
  .hist{ position:absolute; left:0; right:0; bottom:20px; height:34px; display:flex; align-items:flex-end; gap:2px; pointer-events:none; }
  .hist div{ flex:1; background:var(--line); border-radius:2px 2px 0 0; transition:background .15s; }
  .hist div.inrange{ background:var(--accent); opacity:.55; }

  .track{ position:absolute; left:0; right:0; bottom:8px; height:4px; border-radius:999px; background:var(--line); }
  .range{ position:absolute; bottom:8px; height:4px; border-radius:999px; background:var(--accent); }

  .handle{
    position:absolute; bottom:0; width:18px; height:18px; border-radius:50%; background:#fff; border:3px solid var(--accent);
    transform:translate(-50%, 0); cursor:grab; touch-action:none; box-shadow:0 2px 6px rgba(0,0,0,.4);
  }
  .handle:active{ cursor:grabbing; }
  .handle .tip{
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%); background:var(--panel2); border:1px solid var(--line);
    padding:3px 7px; border-radius:6px; font-size:10.5px; white-space:nowrap; opacity:0; transition:opacity .15s; pointer-events:none;
  }
  .handle:hover .tip, .handle.dragging .tip{ opacity:1; }

  footer{ text-align:center; font-size:10px; color:#5b6478; }
  footer a{ color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Histogram Range Sliders</h1>
    <p class="sub">Drag either handle · Arrow keys nudge when focused · Distribution shown as background bars</p>
  </header>

  <div class="field" data-min="0" data-max="500" data-step="5" data-fmt="price">
    <div class="top"><b>Price</b><span class="valLabel">$120 – $340</span></div>
    <div class="slider">
      <div class="hist"></div>
      <div class="track"></div>
      <div class="range"></div>
      <div class="handle lo" tabindex="0"><div class="tip">120</div></div>
      <div class="handle hi" tabindex="0"><div class="tip">340</div></div>
    </div>
  </div>

  <div class="field" data-min="0" data-max="100" data-step="1" data-fmt="pct">
    <div class="top"><b>Opacity</b><span class="valLabel">20% – 80%</span></div>
    <div class="slider">
      <div class="hist"></div>
      <div class="track"></div>
      <div class="range"></div>
      <div class="handle lo" tabindex="0"><div class="tip">20</div></div>
      <div class="handle hi" tabindex="0"><div class="tip">80</div></div>
    </div>
  </div>
</div>
<footer>Drop 5 of 5 · Component · Inspired by noUiSlider's dual-handle sliders · UI Spotlight Day 50</footer>

<script>
(function(){
  'use strict';

  function mulberry32(seed){
    return function(){
      seed |= 0; seed = (seed+0x6D2B79F5)|0;
      var t = Math.imul(seed ^ seed>>>15, 1|seed);
      t = (t + Math.imul(t ^ t>>>7, 61|t)) ^ t;
      return ((t ^ t>>>14)>>>0) / 4294967296;
    };
  }

  function fmtVal(v, fmt){
    if(fmt==='price') return '$'+Math.round(v);
    if(fmt==='pct') return Math.round(v)+'%';
    return Math.round(v);
  }

  function initField(field, seed){
    var min = +field.dataset.min, max = +field.dataset.max, step = +field.dataset.step, fmt = field.dataset.fmt;
    var slider = field.querySelector('.slider');
    var hist = field.querySelector('.hist');
    var range = field.querySelector('.range');
    var handleLo = field.querySelector('.handle.lo');
    var handleHi = field.querySelector('.handle.hi');
    var valLabel = field.querySelector('.valLabel');

    // synthetic bell-ish distribution
    var rand = mulberry32(seed);
    var BARS = 28;
    var bars = [];
    for(var i=0;i<BARS;i++){
      var x = i/(BARS-1);
      var bell = Math.exp(-Math.pow((x-0.5)*3.2,2));
      var h = 0.08 + bell*0.8 + rand()*0.14;
      bars.push(h);
      var d = document.createElement('div');
      d.style.height = (h*100)+'%';
      hist.appendChild(d);
    }

    var span = max-min;
    var loVal = min + span * (fmt==='pct' ? 0.2 : 0.24);
    var hiVal = min + span * (fmt==='pct' ? 0.8 : 0.68);

    function snap(v){
      v = Math.round(v/step)*step;
      return Math.max(min, Math.min(max, v));
    }

    function pctOf(v){ return (v-min)/span*100; }

    function render(){
      loVal = Math.min(loVal, hiVal);
      var loP = pctOf(loVal), hiP = pctOf(hiVal);
      handleLo.style.left = loP+'%';
      handleHi.style.left = hiP+'%';
      range.style.left = loP+'%';
      range.style.width = (hiP-loP)+'%';
      valLabel.textContent = fmtVal(loVal,fmt)+' – '+fmtVal(hiVal,fmt);
      handleLo.querySelector('.tip').textContent = fmtVal(loVal,fmt);
      handleHi.querySelector('.tip').textContent = fmtVal(hiVal,fmt);
      handleLo.setAttribute('aria-valuenow', Math.round(loVal));
      handleHi.setAttribute('aria-valuenow', Math.round(hiVal));

      var barEls = hist.children;
      for(var bi=0; bi<barEls.length; bi++){
        var barCenterPct = (bi+0.5)/BARS*100;
        barEls[bi].classList.toggle('inrange', barCenterPct>=loP && barCenterPct<=hiP);
      }
    }
    render();

    function dragHandle(handle, isLo){
      var dragging = false;
      function toValue(clientX){
        var rect = slider.getBoundingClientRect();
        var p = (clientX-rect.left)/rect.width;
        p = Math.max(0, Math.min(1, p));
        return snap(min + p*span);
      }
      function onMove(e){
        if(!dragging) return;
        var x = e.touches ? e.touches[0].clientX : e.clientX;
        var v = toValue(x);
        if(isLo){ loVal = Math.min(v, hiVal); } else { hiVal = Math.max(v, loVal); }
        render();
      }
      function onUp(){
        dragging = false;
        handle.classList.remove('dragging');
      }
      handle.addEventListener('pointerdown', function(e){
        dragging = true;
        handle.classList.add('dragging');
        handle.focus();
        e.preventDefault();
      });
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
      handle.addEventListener('keydown', function(e){
        var d = 0;
        if(e.key==='ArrowRight' || e.key==='ArrowUp') d = step;
        else if(e.key==='ArrowLeft' || e.key==='ArrowDown') d = -step;
        else return;
        e.preventDefault();
        if(isLo){ loVal = snap(Math.min(loVal+d, hiVal)); }
        else { hiVal = snap(Math.max(hiVal+d, loVal)); }
        render();
      });
    }
    handleLo.setAttribute('role','slider');
    handleHi.setAttribute('role','slider');
    handleLo.setAttribute('aria-valuemin', min);
    handleLo.setAttribute('aria-valuemax', max);
    handleHi.setAttribute('aria-valuemin', min);
    handleHi.setAttribute('aria-valuemax', max);
    dragHandle(handleLo, true);
    dragHandle(handleHi, false);
  }

  document.querySelectorAll('.field').forEach(function(f, i){ initField(f, i*77+11); });
})();
</script>
</body>
</html>
