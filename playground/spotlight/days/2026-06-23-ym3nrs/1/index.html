<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop 1 – CSS Motion Path Orbits</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
:root {
  --speed: 4s;
  --trail: 1;
}
body {
  min-height: 100dvh;
  background: #050510;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;
  color: #e2e8f0;
}

.stage {
  position: relative;
  width: min(90vw, 540px);
  height: min(90vw, 540px);
  display: grid;
  place-items: center;
}

.path-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  opacity: 0.12;
}

/* ── Orbs flowing along SVG paths ─────────────────────── */
.orb {
  position: absolute;
  top: 0; left: 0;
  width: 18px; height: 18px;
  border-radius: 50%;
  margin: -9px 0 0 -9px;
  animation: orbit calc(var(--speed) * var(--mult)) linear infinite;
  offset-rotate: 0deg;
  filter: blur(0);
  will-change: offset-distance;
}

.orb::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  opacity: 0.35;
  filter: blur(8px);
  background: inherit;
}

@keyframes orbit {
  from { offset-distance: 0% }
  to   { offset-distance: 100% }
}

/* ── Individual paths ─────────────────────────────────── */
.o1 {
  offset-path: path("M 270 270 m -160 0 a 160 160 0 1 1 320 0 a 160 160 0 1 1 -320 0");
  background: radial-gradient(circle at 40% 35%, #60a5fa, #3b82f6);
  --mult: 1;
  box-shadow: 0 0 20px 4px rgba(59,130,246,0.6);
}
.o2 {
  offset-path: path("M 270 270 m 0 -120 a 120 80 0 1 1 0 240 a 120 80 -30 1 1 0 -240");
  background: radial-gradient(circle at 40% 35%, #c084fc, #8b5cf6);
  --mult: 1.4;
  box-shadow: 0 0 20px 4px rgba(139,92,246,0.6);
}
.o3 {
  offset-path: path("M 270 270 m -200 0 c 0 -80 80 -130 200 -130 c 120 0 200 50 200 130 c 0 80 -80 130 -200 130 c -120 0 -200 -50 -200 -130");
  background: radial-gradient(circle at 40% 35%, #f472b6, #ec4899);
  --mult: 1.7;
  box-shadow: 0 0 20px 4px rgba(236,72,153,0.6);
}
.o4 {
  offset-path: path("M 270 270 m 0 -200 c 100 0 200 200 0 200 c -200 0 -100 -200 0 -200");
  background: radial-gradient(circle at 40% 35%, #34d399, #10b981);
  --mult: 2.1;
  box-shadow: 0 0 20px 4px rgba(52,211,153,0.6);
}
.o5 {
  offset-path: path("M 270 270 m -90 0 a 90 130 45 1 1 180 0 a 90 130 45 1 1 -180 0");
  background: radial-gradient(circle at 40% 35%, #fbbf24, #f59e0b);
  --mult: 2.6;
  box-shadow: 0 0 20px 4px rgba(251,191,36,0.6);
}
.o6 {
  offset-path: path("M 270 150 c 80 0 150 50 150 120 s -70 120 -150 120 s -150 -50 -150 -120 s 70 -120 150 -120");
  background: radial-gradient(circle at 40% 35%, #f87171, #ef4444);
  --mult: 0.75;
  box-shadow: 0 0 20px 4px rgba(239,68,68,0.6);
}

/* ── Center core ──────────────────────────────────────── */
.core {
  width: 32px; height: 32px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #fff, rgba(200,200,255,0.3));
  box-shadow: 0 0 40px 12px rgba(160,160,255,0.25), 0 0 0 1px rgba(255,255,255,0.3);
  position: relative; z-index: 1;
}

/* ── Debug panel ──────────────────────────────────────── */
.debug {
  position: fixed; top: 16px; right: 16px;
  background: rgba(10,10,24,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  display: flex; flex-direction: column; gap: 8px;
  min-width: 160px;
}
.debug label { color: rgba(255,255,255,0.4); font-size: 10px; display: block; margin-bottom: 3px; }
.debug input[type=range] {
  width: 100%; -webkit-appearance: none; height: 3px;
  background: rgba(255,255,255,0.15); border-radius: 2px; cursor: pointer;
}
.debug input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #8b5cf6; cursor: pointer;
}

.footer {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: rgba(255,255,255,0.2); white-space: nowrap;
}

@media (max-width: 480px) {
  .debug { display: none; }
}
</style>
</head>
<body>

<div class="stage">
  <!-- Faint path outlines via SVG -->
  <svg class="path-svg" viewBox="0 0 540 540">
    <circle cx="270" cy="270" r="160" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <ellipse cx="270" cy="270" rx="120" ry="80" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <circle cx="270" cy="270" r="200" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <circle cx="270" cy="270" r="90" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1" stroke-dasharray="4 4"/>
  </svg>

  <!-- Orbs following different paths -->
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="orb o5"></div>
  <div class="orb o6"></div>

  <div class="core"></div>
</div>

<!-- Debug panel -->
<div class="debug">
  <div>
    <label>Speed (×)</label>
    <input type="range" id="spd" min="0.25" max="4" step="0.25" value="1">
  </div>
  <div>
    <label>Orb size (px)</label>
    <input type="range" id="sz" min="6" max="30" step="2" value="18">
  </div>
  <div>
    <label>Glow intensity</label>
    <input type="range" id="glow" min="0" max="1" step="0.1" value="0.35">
  </div>
</div>

<div class="footer">
  CSS Motion Path (<code>offset-path</code>) · UI Spotlight Day 38 · Drop #1
</div>

<script>
const root = document.documentElement;
const orbs = document.querySelectorAll('.orb');
const baseSpeed = 4;

document.getElementById('spd').addEventListener('input', e => {
  const mult = +e.target.value;
  root.style.setProperty('--speed', (baseSpeed / mult).toFixed(2) + 's');
});

document.getElementById('sz').addEventListener('input', e => {
  const sz = +e.target.value;
  orbs.forEach(o => {
    o.style.width = sz + 'px';
    o.style.height = sz + 'px';
    o.style.margin = `-${sz/2}px 0 0 -${sz/2}px`;
  });
});

document.getElementById('glow').addEventListener('input', e => {
  const g = +e.target.value;
  orbs.forEach(o => {
    const after = o.querySelector('::after');
    o.style.setProperty('--glow', g);
  });
  document.querySelectorAll('.orb::after').forEach(a => { a.style.opacity = e.target.value; });
  orbs.forEach(o => { o.style.cssText += `--after-opacity:${g}`; });
});
</script>
</body>
</html>
