<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop 2 – CSS Native Masonry Grid</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
body {
  min-height: 100dvh;
  background: #09090f;
  font-family: system-ui, sans-serif;
  color: #e2e8f0;
  padding: 20px 16px 60px;
}

h1 {
  text-align: center;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  font-weight: 600;
  margin-bottom: 20px;
  color: rgba(255,255,255,0.8);
  letter-spacing: -0.02em;
}

/* ── Native Masonry grid ──────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 220px), 1fr));
  gap: 12px;
  /* Native CSS masonry — Chrome 133+, Firefox with flag */
  grid-template-rows: masonry;
  /* Fallback: JS-powered columns below for older browsers */
}

/* Feature-detect: if masonry is not supported, use a column-based fallback */
@supports not (grid-template-rows: masonry) {
  .grid {
    grid-template-rows: auto;
    columns: auto;
  }
}

/* ── Cards ────────────────────────────────────────────── */
.card {
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
              box-shadow 0.25s ease;
  break-inside: avoid; /* fallback for columns */
}

.card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  z-index: 2;
}

.card-inner {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.card-visual {
  width: 100%;
  border-radius: 12px 12px 0 0;
  display: block;
}

.card-body {
  padding: 12px 14px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-top: none;
  border-radius: 0 0 12px 12px;
}

.card-body h3 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  color: rgba(255,255,255,0.9);
}

.card-body p {
  font-size: 11px;
  line-height: 1.5;
  color: rgba(255,255,255,0.4);
}

.badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

/* ── Debug panel ──────────────────────────────────────── */
.debug {
  position: fixed; top: 16px; right: 16px;
  background: rgba(9,9,15,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  display: flex; flex-direction: column; gap: 10px;
  min-width: 160px;
  z-index: 100;
}
.debug label { color: rgba(255,255,255,0.4); font-size: 10px; display: block; margin-bottom: 3px; }
.debug input[type=range] {
  width: 100%; -webkit-appearance: none; height: 3px;
  background: rgba(255,255,255,0.15); border-radius: 2px; cursor: pointer;
}
.debug input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #8b5cf6; cursor: pointer;
}
.support-badge {
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 5px;
  text-align: center;
  font-weight: 600;
}

.footer {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: rgba(255,255,255,0.2); white-space: nowrap;
}

@media (max-width: 480px) { .debug { display: none; } }
</style>
</head>
<body>

<h1>CSS Native Masonry Grid</h1>

<div class="grid" id="grid"></div>

<div class="debug">
  <div id="support-badge" class="support-badge"></div>
  <div>
    <label>Min column width (px)</label>
    <input type="range" id="col-w" min="140" max="320" value="220" step="10">
  </div>
  <div>
    <label>Gap (px)</label>
    <input type="range" id="gap" min="4" max="24" value="12" step="2">
  </div>
</div>

<div class="footer">
  CSS <code>grid-template-rows: masonry</code> · UI Spotlight Day 38 · Drop #2
</div>

<script>
// ── Card data ─────────────────────────────────────────────
const PALETTES = [
  ['#7c3aed','#4c1d95'],['#2563eb','#1e3a8a'],
  ['#059669','#064e3b'],['#dc2626','#7f1d1d'],
  ['#d97706','#78350f'],['#7c3aed','#2e1065'],
  ['#0891b2','#164e63'],['#db2777','#831843'],
  ['#65a30d','#1a2e05'],['#9333ea','#3b0764'],
  ['#0d9488','#134e4a'],['#ea580c','#431407'],
  ['#4338ca','#1e1b4b'],['#be185d','#500724'],
];

const TAGS = ['Animation','Layout','Type','Component','Motion','Design','CSS','UI/UX','WebGL','Color'];
const HEIGHTS = [80,100,120,140,160,80,110,130,90,150,95,115,135,85];
const TITLES = [
  'Scroll-driven reveals','Bento grid layout','Kinetic typography',
  'Spring physics UI','Liquid glass cards','Variable font mesh',
  'Motion path orbits','Anchor positioning','Custom highlights',
  'Animation composition','Field-sizing inputs','3D scroll cube',
  'Masonry auto-flow','Magnetic clusters',
];
const DESCS = [
  'Elements entering the viewport trigger a cascade of 3D transforms and blur resolves.',
  'A responsive grid that reflows based on container queries and :has() sibling state.',
  'Per-character physics drives each letter on an independent spring trajectory.',
  'Buttons rebound elastically using CSS linear() easing with no JavaScript.',
  'Frosted-glass cards with real refraction and dynamic specular highlights.',
  'A font with 14 variable axes shifts weight, contrast, and slant as you scroll.',
  'Six colored orbs race along custom SVG paths defined entirely in CSS offset-path.',
  'Tooltips snap to any element edge and flip automatically to avoid the viewport edge.',
  'Multiple highlight overlays mark keywords, dates, and code spans independently.',
  'Three animations compose additively — the hover lift stacks on the idle breathe.',
  'Textareas grow to fit content without JavaScript using a single CSS property.',
  'Cards rotate in true 3D as you scroll a horizontal list — hardware accelerated.',
  'Items pack naturally into variable-height columns with no JavaScript needed.',
  'Buttons cluster toward the cursor and repel each other using spring forces.',
];

function makeCard(i) {
  const [c1,c2] = PALETTES[i % PALETTES.length];
  const h = HEIGHTS[i % HEIGHTS.length];
  const tag = TAGS[i % TAGS.length];
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-inner">
      <svg class="card-visual" width="220" height="${h}" viewBox="0 0 220 ${h}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g${i}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="${c1}"/>
            <stop offset="100%" stop-color="${c2}"/>
          </linearGradient>
        </defs>
        <rect width="220" height="${h}" fill="url(#g${i})" rx="12" ry="0"/>
        <circle cx="${30+i*37%160}" cy="${h*0.5}" r="${20+i%20}" fill="rgba(255,255,255,0.07)"/>
        <circle cx="${80+i*53%100}" cy="${h*0.3}" r="${10+i%15}" fill="rgba(255,255,255,0.05)"/>
        <text x="14" y="${h-14}" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.35)" font-weight="600">${tag}</text>
      </svg>
      <div class="card-body">
        <div class="badge" style="background:${c1}22;color:${c1}">${tag}</div>
        <h3>${TITLES[i % TITLES.length]}</h3>
        <p>${DESCS[i % DESCS.length]}</p>
      </div>
    </div>
  `;
  return card;
}

const grid = document.getElementById('grid');
for (let i = 0; i < 14; i++) grid.appendChild(makeCard(i));

// ── Feature detection ─────────────────────────────────────
const badge = document.getElementById('support-badge');
const supported = CSS.supports('grid-template-rows', 'masonry');
badge.textContent = supported ? '✓ Native Masonry' : 'JS Fallback';
badge.style.background = supported ? 'rgba(16,185,129,0.15)' : 'rgba(245,158,11,0.15)';
badge.style.color = supported ? '#34d399' : '#fbbf24';
badge.style.border = `1px solid ${supported ? 'rgba(52,211,153,0.3)' : 'rgba(251,191,36,0.3)'}`;

// ── JS fallback for non-supporting browsers ───────────────
if (!supported) {
  const fallback = () => {
    const W = grid.clientWidth;
    const gap = parseInt(getComputedStyle(grid).gap) || 12;
    const minW = parseInt(grid.style.getPropertyValue('--min-col') || 220);
    const cols = Math.max(1, Math.floor((W + gap) / (minW + gap)));
    const colW = (W - gap * (cols - 1)) / cols;
    const heights = Array(cols).fill(0);

    grid.style.position = 'relative';
    grid.style.gridTemplateColumns = '';
    grid.style.gridTemplateRows = '';

    [...grid.children].forEach(card => {
      card.style.position = 'absolute';
      card.style.width = colW + 'px';
      const shortest = heights.indexOf(Math.min(...heights));
      card.style.left = (shortest * (colW + gap)) + 'px';
      card.style.top = heights[shortest] + 'px';
      const h = card.offsetHeight;
      heights[shortest] += h + gap;
    });
    grid.style.height = Math.max(...heights) + 'px';
  };
  setTimeout(fallback, 50);
  window.addEventListener('resize', fallback);
  document.getElementById('col-w').addEventListener('input', e => {
    grid.style.setProperty('--min-col', e.target.value);
    fallback();
  });
}

// ── Controls ──────────────────────────────────────────────
document.getElementById('col-w').addEventListener('input', e => {
  grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(min(100%, ${e.target.value}px), 1fr))`;
});
document.getElementById('gap').addEventListener('input', e => {
  grid.style.gap = e.target.value + 'px';
});
</script>
</body>
</html>
