<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proximity Variable Font · UI Spotlight</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100dvh;background:#07070d;color:#e2e8f0;
  font-family:system-ui,-apple-system,sans-serif;
  display:flex;flex-direction:column;overflow:hidden;
}
header{padding:1.5rem 2rem .5rem;text-align:center;flex-shrink:0}
header h1{font-size:clamp(1rem,3vw,1.5rem);font-weight:700;color:#a78bfa;margin-bottom:.25rem}
header p{font-size:.8rem;color:#475569}
#grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:.5rem 1rem;overflow:hidden}
#grid{
  display:grid;line-height:1;user-select:none;
  /* cols/rows set by JS */
}
.ch{
  display:flex;align-items:center;justify-content:center;
  font-weight:200;color:#1e2a4a;
  transition:none;/* JS drives this */
  cursor:default;
}
.panel{
  position:fixed;top:12px;right:12px;z-index:10;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 14px;font-size:11px;color:#64748b;
  display:flex;flex-direction:column;gap:6px;
}
.panel label{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b}
.panel input[type=range]{width:90px;accent-color:#7c3aed}
footer{text-align:center;font-size:.65rem;color:#334155;padding:.4rem;flex-shrink:0}
</style>
</head>
<body>
<header>
  <h1>Proximity Variable-Font Glyph Grid</h1>
  <p>Move your cursor · each character's weight and color respond to proximity</p>
</header>
<div id="grid-wrap"><div id="grid"></div></div>
<div class="panel">
  <label>Radius <input type="range" id="r-radius" min="60" max="250" value="130"><span id="v-radius">130</span>px</label>
  <label>Max wt <input type="range" id="r-wt" min="400" max="900" value="900"><span id="v-wt">900</span></label>
</div>
<footer>Inspired by Codrops / Exat Microsite + fancycomponents.dev · UI Spotlight Day 6 · Drop #3</footer>
<script>
const gridEl = document.getElementById('grid');
const wrap = document.getElementById('grid-wrap');
const rRadius = document.getElementById('r-radius');
const vRadius = document.getElementById('v-radius');
const rWt = document.getElementById('r-wt');
const vWt = document.getElementById('v-wt');

rRadius.addEventListener('input', () => { vRadius.textContent = rRadius.value; });
rWt.addEventListener('input', () => { vWt.textContent = rWt.value; });

const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*+-=/\\|?<>';
let spans = [], cols = 0, rows = 0;
let mx = -999, my = -999;
let raf;

function buildGrid() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const size = Math.max(14, Math.min(30, Math.floor(Math.min(w, h) / 22)));
  cols = Math.floor(w / (size * 0.62));
  rows = Math.floor(h / (size * 1.1));

  gridEl.style.gridTemplateColumns = `repeat(${cols}, ${size * 0.62}px)`;
  gridEl.style.gridTemplateRows = `repeat(${rows}, ${size * 1.1}px)`;
  gridEl.style.fontSize = size + 'px';
  gridEl.innerHTML = '';
  spans = [];

  const total = cols * rows;
  for (let i = 0; i < total; i++) {
    const sp = document.createElement('span');
    sp.className = 'ch';
    sp.style.width = (size * 0.62) + 'px';
    sp.style.height = (size * 1.1) + 'px';
    sp.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
    gridEl.appendChild(sp);
    spans.push(sp);
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }

function colorAt(t) {
  // t=0: dark blue-gray, t=1: bright purple-pink
  const r = Math.round(lerp(15, 192, t));
  const g = Math.round(lerp(20, 80, t));
  const b = Math.round(lerp(60, 252, t));
  return `rgb(${r},${g},${b})`;
}

function tick() {
  raf = requestAnimationFrame(tick);
  if (mx < 0 || spans.length === 0) return;

  const rect = gridEl.getBoundingClientRect();
  const radius = +rRadius.value;
  const maxWt = +rWt.value;

  for (const sp of spans) {
    const r = sp.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dist = Math.hypot(cx - mx, cy - my);
    const t = Math.max(0, 1 - dist / radius);
    const wt = Math.round(lerp(200, maxWt, t));
    sp.style.fontWeight = wt;
    sp.style.color = colorAt(t);
  }
}

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
// Mobile: touch
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
}, { passive: true });

// Rebuild on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildGrid, 120);
});

buildGrid();
tick();

// Animate idle cursor on mobile/no-mouse
let idleX = window.innerWidth / 2, idleY = window.innerHeight / 2;
let idleAngle = 0;
function idleLoop() {
  if (mx < 0) {
    idleAngle += 0.012;
    idleX = window.innerWidth / 2 + Math.cos(idleAngle) * window.innerWidth * 0.25;
    idleY = window.innerHeight / 2 + Math.sin(idleAngle * 1.3) * window.innerHeight * 0.2;
    mx = idleX; my = idleY;
  }
  requestAnimationFrame(idleLoop);
}
// Start idle only if no mouse detected in 1s
let hasMouse = false;
document.addEventListener('mousemove', () => { hasMouse = true; }, { once: true });
setTimeout(() => { if (!hasMouse) { mx = idleX; my = idleY; idleLoop(); } }, 1000);
</script>
</body>
</html>
