<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tumbler Digit Input</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 system-ui,-apple-system,sans-serif;background:#06060e;color:#e0dcff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;padding:32px 20px}

h1{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3)}

/* Tumbler component */
.tumbler-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.tumbler-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.35)}

.tumbler{
  display:flex;
  gap:6px;
  align-items:center;
  user-select:none;
}
.tumbler-sep{
  color:rgba(255,255,255,.3);
  font-size:1.8rem;
  font-weight:300;
  line-height:1;
  padding:0 2px;
  align-self:center;
}

.digit{
  position:relative;
  width:52px;
  height:72px;
  overflow:hidden;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  cursor:ns-resize;
  touch-action:none;
}
.digit-track{
  display:flex;
  flex-direction:column;
  transition:transform .35s cubic-bezier(.34,1.3,.64,1);
  will-change:transform;
}
.digit-cell{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:800;
  font-variant-numeric:tabular-nums;
  line-height:1;
  flex-shrink:0;
}
/* Top and bottom fades */
.digit::before,.digit::after{
  content:'';
  position:absolute;left:0;right:0;height:24px;z-index:2;pointer-events:none;
}
.digit::before{top:0;background:linear-gradient(to bottom,rgba(6,6,14,1),transparent)}
.digit::after{bottom:0;background:linear-gradient(to top,rgba(6,6,14,1),transparent)}
/* Active line */
.digit-line{
  position:absolute;top:50%;left:6px;right:6px;height:1px;transform:translateY(-50%);
  background:rgba(255,255,255,.15);z-index:3;pointer-events:none;
}

.digit:focus{outline:2px solid rgba(192,132,252,.5);outline-offset:2px}
.digit.active{border-color:rgba(192,132,252,.5)}

/* Spinners ↑↓ */
.spin-btn{
  position:absolute;z-index:4;left:0;right:0;height:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:rgba(255,255,255,.0);cursor:pointer;
  transition:color .15s,background .15s;
}
.spin-btn:hover{color:rgba(255,255,255,.5)}
.spin-btn.up{top:0;border-radius:10px 10px 0 0}
.spin-btn.dn{bottom:0;border-radius:0 0 10px 10px}
.digit:hover .spin-btn{color:rgba(255,255,255,.2)}

/* Output display */
.output{
  font-size:1rem;font-weight:600;
  color:rgba(255,255,255,.45);
  letter-spacing:.04em;
  min-height:24px;
  text-align:center;
}

/* Examples row */
.examples{display:flex;flex-direction:column;gap:24px;width:100%;max-width:480px}
.example-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:22px 24px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.example-card h3{font-size:.82rem;font-weight:700;color:rgba(255,255,255,.55);align-self:flex-start}

/* Confirm button */
.confirm-btn{
  background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.4);
  color:#c084fc;border-radius:8px;padding:10px 28px;
  font-size:.82rem;font-weight:700;cursor:pointer;
  transition:all .2s;
}
.confirm-btn:hover{background:rgba(124,58,237,.32);transform:scale(1.03)}
.confirm-btn:active{transform:scale(.97)}

.panel{
  position:fixed;top:14px;right:14px;
  background:rgba(6,6,14,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:10px 14px;font-size:11px;color:rgba(255,255,255,.45);
  line-height:1.6;
}
.param{color:#fbbf24;font-weight:700}

footer{font-size:.72rem;opacity:.3;text-align:center}
</style>
</head>
<body>

<div class="panel">
  <div class="param">Tumbler Input</div>
  <div>Scroll · Drag · Click<br>Spring transitions</div>
</div>

<h1>Tumbler Digit Input</h1>

<div class="examples">

  <!-- PIN entry -->
  <div class="example-card">
    <h3>PIN Entry</h3>
    <div class="tumbler" id="pin" data-format="pin" data-digits="4"></div>
    <div class="output" id="pin-out">PIN: ----</div>
    <button class="confirm-btn" onclick="confirmPin()">Confirm PIN</button>
  </div>

  <!-- Time picker -->
  <div class="example-card">
    <h3>Time Picker</h3>
    <div class="tumbler" id="time" data-format="time" data-digits="4"></div>
    <div class="output" id="time-out">Time: --:--</div>
  </div>

  <!-- Numeric input -->
  <div class="example-card">
    <h3>Quantity</h3>
    <div class="tumbler" id="qty" data-format="num" data-digits="3" data-min="0" data-max="999"></div>
    <div class="output" id="qty-out">Quantity: ---</div>
  </div>

</div>

<footer>Original concept inspired by Stripe/Apple tumbler inputs · UI Spotlight Day 34 · Drop #5</footer>

<script>
function buildTumbler(el){
  const fmt=el.dataset.format||'pin';
  const nDigits=+el.dataset.digits||4;
  const values=Array.from({length:nDigits},()=>0);
  const ranges=Array.from({length:nDigits},(_,i)=>{
    if(fmt==='time'){return i<2?[0,9]:[0,5]; /* simplified */}
    return [0,9];
  });
  const digitEls=[];

  for(let i=0;i<nDigits;i++){
    if(fmt==='time' && i===2){
      const sep=document.createElement('span'); sep.className='tumbler-sep'; sep.textContent=':';
      el.appendChild(sep);
    }
    const d=document.createElement('div'); d.className='digit'; d.tabIndex=0;
    const line=document.createElement('div'); line.className='digit-line';
    const track=document.createElement('div'); track.className='digit-track';
    const up=document.createElement('div'); up.className='spin-btn up'; up.textContent='▲';
    const dn=document.createElement('div'); dn.className='spin-btn dn'; dn.textContent='▼';

    // Build cells: wrap-around (prev 1, 0-9, next 1)
    function rebuildCells(v,range){
      track.innerHTML='';
      const [mn,mx]=range;
      const count=mx-mn+1;
      for(let c=0;c<count+2;c++){
        const cell=document.createElement('div'); cell.className='digit-cell';
        cell.textContent=((mn+(c-1+count)%count));
        track.appendChild(cell);
      }
      // Position to show current value
      setTrackPos(v,range,false);
    }

    function setTrackPos(v,range,animate=true){
      const [mn,mx]=range;
      const idx=v-mn+1; // +1 for the leading clone
      if(!animate) track.style.transition='none';
      track.style.transform=`translateY(${-idx*72}px)`;
      if(!animate) requestAnimationFrame(()=>{track.style.transition='';});
    }

    function spinUp(){
      const [mn,mx]=ranges[i];
      values[i]=(values[i]>mn?values[i]-1:mx);
      setTrackPos(values[i],ranges[i]);
      updateOutput();
    }
    function spinDn(){
      const [mn,mx]=ranges[i];
      values[i]=(values[i]<mx?values[i]+1:mn);
      setTrackPos(values[i],ranges[i]);
      updateOutput();
    }

    up.addEventListener('click',e=>{e.stopPropagation();spinUp();});
    dn.addEventListener('click',e=>{e.stopPropagation();spinDn();});

    // Scroll wheel
    d.addEventListener('wheel',e=>{
      e.preventDefault();
      e.deltaY<0?spinUp():spinDn();
    },{passive:false});

    // Drag
    let dragY=0, dragging=false;
    d.addEventListener('pointerdown',e=>{
      dragging=true; dragY=e.clientY; d.setPointerCapture(e.pointerId);
    });
    d.addEventListener('pointermove',e=>{
      if(!dragging)return;
      const dy=e.clientY-dragY;
      if(Math.abs(dy)>18){
        dy<0?spinUp():spinDn();
        dragY=e.clientY;
      }
    });
    d.addEventListener('pointerup',()=>{dragging=false;});

    // Keyboard
    d.addEventListener('keydown',e=>{
      if(e.key==='ArrowUp'){e.preventDefault();spinUp();}
      if(e.key==='ArrowDown'){e.preventDefault();spinDn();}
      const n=parseInt(e.key);
      if(!isNaN(n)){
        const [mn,mx]=ranges[i];
        if(n>=mn&&n<=mx){values[i]=n; setTrackPos(n,ranges[i]); updateOutput();}
      }
    });

    d.append(line,track,up,dn);
    el.appendChild(d);
    digitEls.push({d,track,rebuildCells});
    rebuildCells(values[i],ranges[i]);
  }

  function updateOutput(){
    const id=el.id;
    const out=document.getElementById(id+'-out');
    if(!out)return;
    if(fmt==='pin') out.textContent='PIN: '+values.map(v=>v).join('');
    else if(fmt==='time'){
      const h=values[0]*10+values[1];
      const m=values[2]*10+values[3];
      out.textContent=`Time: ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    } else {
      const n=values.reduce((a,v,i)=>a+v*Math.pow(10,nDigits-1-i),0);
      out.textContent=`Quantity: ${n}`;
    }
  }
  updateOutput();

  el._getValues=()=>values;
}

document.querySelectorAll('.tumbler').forEach(buildTumbler);

function confirmPin(){
  const vals=document.getElementById('pin')._getValues();
  const pin=vals.join('');
  const out=document.getElementById('pin-out');
  out.style.transition='all .3s';
  out.textContent='✓ PIN accepted: '+pin;
  out.style.color='#34d399';
  setTimeout(()=>{out.textContent='PIN: ----'; out.style.color='';},2000);
}
</script>
</body>
</html>
