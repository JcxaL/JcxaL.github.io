<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid-Lanes Masonry</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 system-ui,-apple-system,sans-serif;background:#080810;color:#e8e0ff;min-height:100vh;padding:20px}

h1{text-align:center;font-size:1.1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
.sub{text-align:center;font-size:.75rem;color:rgba(255,255,255,.25);margin-bottom:24px}

/* CSS Grid-Lanes (new 2026 masonry) with fallback */
.gallery{
  /* Fallback: columns CSS */
  columns:3 200px;
  column-gap:14px;
  gap:14px;
}
/* Progressive enhancement: native masonry if supported */
@supports (grid-template-rows: masonry) or (display: grid-lanes) {
  .gallery{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    grid-template-rows: masonry;
    gap: 14px;
    columns: unset;
  }
}
/* Newest spec: grid-lanes */
@supports (display: grid-lanes) {
  .gallery{
    display: grid-lanes;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
}

.card{
  break-inside: avoid;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  overflow:hidden;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
  cursor:pointer;
  margin-bottom:14px; /* fallback spacing */
}
@supports (grid-template-rows: masonry) or (display: grid-lanes) {
  .card{margin-bottom:0}
}
.card:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 12px 36px rgba(0,0,0,.5)}

.card-img{
  width:100%;
  display:block;
  position:relative;
  overflow:hidden;
}
.color-block{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
}
.card-body{padding:12px 14px 14px}
.card-tag{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.5;margin-bottom:4px}
.card-title{font-size:.9rem;font-weight:600;margin-bottom:4px}
.card-desc{font-size:.78rem;opacity:.55;line-height:1.5}

.panel{
  position:fixed;top:14px;right:14px;
  background:rgba(8,8,16,.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:10px 14px;font-size:11px;color:rgba(255,255,255,.5);
  max-width:200px;line-height:1.5;
}
.badge{
  display:inline-block;
  background:rgba(56,189,248,.15);
  border:1px solid rgba(56,189,248,.3);
  color:#38bdf8;
  font-size:.7rem;
  font-weight:700;
  border-radius:4px;
  padding:2px 6px;
  margin-top:6px;
}

footer{text-align:center;padding:32px 20px 20px;font-size:.72rem;opacity:.3}
</style>
</head>
<body>
<h1>CSS Grid-Lanes Masonry</h1>
<div class="sub">Native masonry layout — no JS, no library — new in 2026</div>

<div class="panel">
  grid-template-rows: masonry<br>
  display: grid-lanes<br>
  <span class="badge">NEW 2026</span>
</div>

<div class="gallery" id="gallery"></div>

<footer>Inspired by CSS-Tricks / css-grid-3 spec · UI Spotlight Day 34 · Drop #2</footer>

<script>
const items = [
  {h:180,color:'#7c3aed',emoji:'⚡',tag:'Animation',title:'Scroll-Driven Reveals',desc:'Pure CSS scroll animations firing on the compositor thread.'},
  {h:140,color:'#0e7490',emoji:'🎨',tag:'Design',title:'Color Mix Functions',desc:'color-mix() makes dynamic palettes trivial.'},
  {h:220,color:'#065f46',emoji:'🌿',tag:'Layout',title:'Grid Lanes',desc:'Native masonry arrives in 2026 via the new grid-lanes display mode, ending the era of JS-powered columns.'},
  {h:160,color:'#92400e',emoji:'✨',tag:'Typography',title:'initial-letter Drop Caps',desc:'Editorial drop caps in 4 lines of CSS.'},
  {h:200,color:'#1e3a5f',emoji:'🚀',tag:'Performance',title:'View Transitions Level 2',desc:'Cross-document morphs without SPA framework overhead.'},
  {h:130,color:'#4c1d95',emoji:'🔮',tag:'Component',title:'Popover API',desc:'Native popover with no JS library needed.'},
  {h:190,color:'#831843',emoji:'🎭',tag:'Motion',title:'@starting-style',desc:'Enter animations for elements toggling display:none — finally native.'},
  {h:155,color:'#14532d',emoji:'🧩',tag:'CSS',title:'Relative Colors',desc:'oklch(from var(--c) calc(l+.1) c h) is magic.'},
  {h:175,color:'#312e81',emoji:'🌐',tag:'Web',title:'CSS Anchor Positioning',desc:'Tooltip positioning without JS calculations.'},
  {h:120,color:'#7c2d12',emoji:'🔥',tag:'Hot',title:'interpolate-size',desc:'height:auto transitions are finally possible.'},
  {h:210,color:'#164e63',emoji:'🏄',tag:'Layout',title:'Subgrid Everywhere',desc:'True nested grid alignment across components — baseline 2024, finally used everywhere in 2026.'},
  {h:145,color:'#581c87',emoji:'💫',tag:'Effects',title:'CSS text-box-trim',desc:'Precise typographic leading control in CSS.'},
];

const gallery = document.getElementById('gallery');
items.forEach(item=>{
  const card = document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="card-img color-block" style="height:${item.h}px;background:linear-gradient(135deg,${item.color}aa,${item.color}44)">${item.emoji}</div>
    <div class="card-body">
      <div class="card-tag">${item.tag}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-desc">${item.desc}</div>
    </div>
  `;
  gallery.appendChild(card);
});
</script>
</body>
</html>
