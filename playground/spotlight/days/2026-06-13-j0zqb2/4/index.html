<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gravity Particle Trail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#03020a;overflow:hidden;height:100vh;
  font-family:system-ui,-apple-system,sans-serif;
  cursor:crosshair;
  user-select:none;
}
canvas{position:fixed;inset:0;width:100%;height:100%;}

/* UI */
#ui{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:none;z-index:10;
  animation:fadein 1s ease 0.3s both;
}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%)}}

h2{
  font-size:clamp(1.2rem,3.5vw,2rem);font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(135deg,#f472b6,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hint{font-size:12px;color:#334155;text-align:center;}

/* Controls */
#ctrl{
  position:fixed;top:16px;right:16px;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);border-radius:14px;
  padding:12px 14px;display:flex;flex-direction:column;gap:8px;
  font-size:11px;color:#475569;z-index:20;min-width:150px;
}
.ctrl-row{display:flex;flex-direction:column;gap:3px}
.ctrl-lbl{display:flex;justify-content:space-between;color:#64748b}
input[type=range]{
  -webkit-appearance:none;width:100%;height:3px;border-radius:2px;
  background:#1e1e38;accent-color:#a855f7;cursor:pointer;
}
.mode-row{display:flex;gap:5px;flex-wrap:wrap}
.mb{
  padding:3px 9px;border-radius:8px;border:1px solid #1e1e38;
  background:#0d0d20;color:#6060a0;font-size:10px;cursor:pointer;
  transition:all .12s;pointer-events:all;
}
.mb:hover{background:#1a1a38;color:#aaa}
.mb.on{background:#2a1464;border-color:#5420b8;color:#d4b8ff}

footer{
  position:fixed;bottom:10px;left:0;right:0;text-align:center;
  font-size:10px;color:#1a1a28;pointer-events:none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <h2>Gravity Particle Trail</h2>
  <div class="hint">Move mouse · Click for burst · Touch supported</div>
</div>

<div id="ctrl">
  <div class="ctrl-row">
    <div class="ctrl-lbl"><span>Gravity</span><span id="gv">0.35</span></div>
    <input type="range" id="gsl" min="0.05" max="1.2" step="0.05" value="0.35">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-lbl"><span>Spawn rate</span><span id="srv">8</span></div>
    <input type="range" id="srsl" min="1" max="20" step="1" value="8">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-lbl"><span>Bounce</span><span id="bv">0.55</span></div>
    <input type="range" id="bsl" min="0.1" max="0.9" step="0.05" value="0.55">
  </div>
  <div>
    <div style="color:#64748b;margin-bottom:5px">Color mode</div>
    <div class="mode-row">
      <div class="mb on" onclick="setMode('fire',this)">Fire</div>
      <div class="mb" onclick="setMode('ocean',this)">Ocean</div>
      <div class="mb" onclick="setMode('galaxy',this)">Galaxy</div>
      <div class="mb" onclick="setMode('neon',this)">Neon</div>
    </div>
  </div>
</div>

<footer>Inspired by Codrops "Gravity-Based Mouse Trail" (May 2026) · UI Spotlight Day 28 · Drop #4</footer>

<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W=innerWidth,H=innerHeight;
cv.width=W; cv.height=H;

window.addEventListener('resize',()=>{
  W=innerWidth; H=innerHeight;
  cv.width=W; cv.height=H;
});

// ── Params ──
let gravity=0.35, spawnRate=8, bounce=0.55;
let colorMode='fire';
let mx=W/2,my=H/2,active=false;

// ── Particle pool ──
const MAX=2000;
const ppx=new Float32Array(MAX),ppy=new Float32Array(MAX);
const pvx=new Float32Array(MAX),pvy=new Float32Array(MAX);
const life=new Float32Array(MAX);
const maxLife=new Float32Array(MAX);
const hue=new Float32Array(MAX);
const radius=new Float32Array(MAX);
let head=0,used=0;

function spawn(x,y,vx,vy,r,h,l){
  ppx[head]=x; ppy[head]=y;
  pvx[head]=vx; pvy[head]=vy;
  life[head]=l; maxLife[head]=l;
  hue[head]=h; radius[head]=r;
  head=(head+1)%MAX;
  if(used<MAX) used++;
}

function getColor(m,h,alpha){
  switch(m){
    case 'fire': return `hsla(${h*40},100%,${40+h*50}%,${alpha})`;
    case 'ocean': return `hsla(${180+h*60},80%,${30+h*40}%,${alpha})`;
    case 'galaxy': return `hsla(${260+h*120},80%,${50+h*30}%,${alpha})`;
    case 'neon': return `hsla(${h*360},100%,60%,${alpha})`;
    default: return `hsla(0,0%,80%,${alpha})`;
  }
}

// ── Burst ──
function burst(x,y){
  const n=60+Math.random()*40|0;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=2+Math.random()*8;
    const h=Math.random();
    spawn(x,y,Math.cos(a)*sp,Math.sin(a)*sp-2,1.5+Math.random()*3,h,40+Math.random()*30);
  }
}

// ── Mouse trail spawner ──
let spawnAcc=0;
function spawnTrail(){
  if(!active) return;
  spawnAcc+=spawnRate;
  while(spawnAcc>=1){
    spawnAcc--;
    const a=(Math.random()-.5)*.6;
    const sp=1.5+Math.random()*3;
    const h=Math.random();
    spawn(mx,my,Math.cos(a)*sp-sp*.3,Math.sin(a)*sp-sp*.5-1,1+Math.random()*2.5,h,30+Math.random()*25);
  }
}

// ── Update & draw ──
function frame(){
  // Fade background
  ctx.fillStyle='rgba(3,2,10,0.18)';
  ctx.fillRect(0,0,W,H);

  spawnTrail();

  const start=(head-used+MAX)%MAX;
  for(let k=0;k<used;k++){
    const i=(start+k)%MAX;
    if(life[i]<=0) continue;

    // Physics
    pvy[i]+=gravity;
    ppx[i]+=pvx[i];
    ppy[i]+=pvy[i];

    // Floor bounce
    if(ppy[i]>H-radius[i]){
      ppy[i]=H-radius[i];
      pvy[i]*=-bounce;
      pvx[i]*=0.9;
    }
    // Walls
    if(ppx[i]<radius[i]){ppx[i]=radius[i];pvx[i]*=-bounce*0.8;}
    if(ppx[i]>W-radius[i]){ppx[i]=W-radius[i];pvx[i]*=-bounce*0.8;}

    life[i]-=1;
    const t=life[i]/maxLife[i];
    const alpha=t*0.85;
    const r=radius[i]*(0.3+t*0.7);

    ctx.beginPath();
    ctx.fillStyle=getColor(colorMode,hue[i],alpha);
    ctx.arc(ppx[i],ppy[i],r,0,6.2832);
    ctx.fill();
  }

  requestAnimationFrame(frame);
}

// ── Input ──
function onMove(e){
  const r=e.touches?e.touches[0]:e;
  const rect=cv.getBoundingClientRect();
  mx=r.clientX-rect.left; my=r.clientY-rect.top;
  active=true;
}
function onLeave(){active=false;}

cv.addEventListener('mousemove',onMove);
cv.addEventListener('mouseleave',onLeave);
cv.addEventListener('touchmove',e=>{onMove(e);e.preventDefault();},{passive:false});
cv.addEventListener('touchstart',e=>{onMove(e);e.preventDefault();},{passive:false});
cv.addEventListener('touchend',onLeave);
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  burst(e.clientX-rect.left,e.clientY-rect.top);
});

// ── Controls ──
document.getElementById('gsl').addEventListener('input',e=>{
  gravity=+e.target.value;
  document.getElementById('gv').textContent=(+e.target.value).toFixed(2);
});
document.getElementById('srsl').addEventListener('input',e=>{
  spawnRate=+e.target.value;
  document.getElementById('srv').textContent=e.target.value;
});
document.getElementById('bsl').addEventListener('input',e=>{
  bounce=+e.target.value;
  document.getElementById('bv').textContent=(+e.target.value).toFixed(2);
});
function setMode(m,btn){
  colorMode=m;
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

frame();
</script>
</body>
</html>
