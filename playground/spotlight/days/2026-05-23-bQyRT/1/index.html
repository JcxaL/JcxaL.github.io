<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 1 — CSS Offset-Path Orbits</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#03030c;font-family:system-ui,sans-serif;overflow:hidden;color:#fff}

/* ── SCENE ── */
.scene{
  position:relative;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}

/* ── SUN ── */
.sun{
  position:absolute;width:54px;height:54px;
  border-radius:50%;
  background:radial-gradient(circle at 38% 38%, #fffde7 0%, #ffd740 30%, #ff8f00 70%, #e65100 100%);
  box-shadow:0 0 40px 12px rgba(255,200,0,.45),0 0 90px 30px rgba(255,150,0,.2);
  z-index:10;
}

/* ── ORBIT RINGS ── */
.orbit-ring{
  position:absolute;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:50%;
  transform:rotate(var(--tilt,0deg));
}

/* ── BODIES ── */
.body{
  position:absolute;
  width:var(--size,18px);height:var(--size,18px);
  border-radius:50%;
  background:var(--color,#888);
  box-shadow:0 0 12px 3px var(--glow,rgba(128,128,128,.4));
  offset-path:var(--path);
  offset-distance:0%;
  offset-rotate:0deg;
  animation: orbit var(--dur,6s) linear infinite;
  z-index:5;
}
.body::after{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.45) 0%,transparent 60%);
}

@keyframes orbit {
  to { offset-distance: 100%; }
}

/* Trailing glow  */
.body::before{
  content:'';
  position:absolute;
  width:200%;height:200%;
  top:-50%;left:-50%;
  border-radius:50%;
  background:radial-gradient(circle,var(--glow) 0%,transparent 70%);
  animation:pulse var(--dur,6s) linear infinite;
  opacity:.5;
}

/* Orbital trails using ::after on ring */
.trail{
  position:absolute;
  width:var(--tw,10px);height:var(--tw,10px);
  border-radius:50%;
  background:var(--color,#fff);
  offset-path:var(--path);
  offset-distance:0%;
  offset-rotate:0deg;
  animation: orbit var(--dur,6s) linear infinite;
  opacity:.2;
  filter:blur(3px);
  --delay:-1s;
  animation-delay:var(--delay);
  z-index:4;
}
.trail2{ --delay:-0.5s; opacity:.1; filter:blur(5px); }
.trail3{ --delay:-1.5s; opacity:.05; filter:blur(8px); }

/* ── PLANET LABELS ── */
.label{
  position:absolute;
  font-size:9px;letter-spacing:.5px;
  color:rgba(255,255,255,.5);
  white-space:nowrap;
  offset-path:var(--path);
  offset-distance:0%;
  offset-rotate:0deg;
  animation: orbit var(--dur,6s) linear infinite;
  margin-top:22px;
  pointer-events:none;
  z-index:6;
}

/* ── MOON ── */
.moon{
  position:absolute;
  width:7px;height:7px;border-radius:50%;
  background:#b0b0b0;
  offset-path:path('M 0,0 m -14,0 a 14,14 0 1,1 28,0 a 14,14 0 1,1 -28,0');
  offset-distance:0%;
  animation:orbit 2s linear infinite;
  box-shadow:0 0 6px rgba(180,180,180,.4);
}

/* ── COMET ── */
.comet-group{
  position:absolute;
  offset-path:path('M -340,120 C -150,-200 150,-200 340,120 S 340,360 0,0 S -340,-200 -340,120');
  offset-distance:0%;
  offset-rotate:auto;
  animation:orbit 18s linear infinite;
}
.comet{
  width:6px;height:6px;border-radius:50%;
  background:#e8f4ff;
  box-shadow:0 0 8px 2px #a0d4ff;
}
.comet-tail{
  position:absolute;
  top:50%;left:100%;
  width:40px;height:2px;
  margin-top:-1px;
  background:linear-gradient(to right,rgba(160,212,255,.8),transparent);
  transform-origin:left center;
}

/* ── ASTEROID BELT ── */
.belt{
  position:absolute;
  width:340px;height:340px;
  border:1px dashed rgba(255,255,255,0.04);
  border-radius:50%;
}

/* ── STARS ── */
.stars{position:absolute;inset:0;overflow:hidden;z-index:0}
.star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:twinkle var(--td,3s) ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:var(--o,0.5)}50%{opacity:0.1}}

/* ── CONTROLS ── */
.ctrl{
  position:fixed;top:14px;right:14px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:12px 14px;font-size:11px;color:#c0c0e0;
  z-index:100;min-width:160px;
}
.ctrl h3{font-size:12px;color:#fff;margin-bottom:8px;letter-spacing:.5px}
.ctrl label{display:flex;justify-content:space-between;margin-bottom:5px}
.ctrl input[type=range]{width:100%;height:3px;margin-top:3px;cursor:pointer;
  -webkit-appearance:none;background:rgba(255,255,255,.15);border-radius:2px;outline:none}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#7c6fff;cursor:pointer}
.ctrl input[type=checkbox]{margin-right:5px;cursor:pointer}

/* ── CREDIT ── */
.credit{
  position:fixed;bottom:10px;left:0;right:0;text-align:center;
  font-size:9px;color:rgba(255,255,255,.2);z-index:100;pointer-events:none;
}

/* ── TOOLTIP ── */
.tip{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:8px 14px;font-size:11px;color:#aac;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:200;
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="stars" id="stars"></div>

  <!-- Asteroid belt -->
  <div class="belt"></div>

  <!-- Sun -->
  <div class="sun"></div>

  <!-- Mercury -->
  <div class="body" id="mercury" style="
    --path:path('M 0,0 m -78,0 a 78,50 0 1,1 156,0 a 78,50 0 1,1 -156,0');
    --dur:4s;--size:8px;--color:#b0a090;--glow:rgba(176,160,144,.5)"></div>
  <div class="trail" style="
    --path:path('M 0,0 m -78,0 a 78,50 0 1,1 156,0 a 78,50 0 1,1 -156,0');
    --dur:4s;--tw:8px;--color:#b0a090"></div>

  <!-- Venus -->
  <div class="body" style="
    --path:path('M 0,0 m -118,0 a 118,80 0 1,1 236,0 a 118,80 0 1,1 -236,0');
    --dur:6.5s;--size:13px;--color:#e8c870;--glow:rgba(232,200,112,.5)"></div>
  <div class="trail" style="
    --path:path('M 0,0 m -118,0 a 118,80 0 1,1 236,0 a 118,80 0 1,1 -236,0');
    --dur:6.5s;--tw:13px;--color:#e8c870"></div>

  <!-- Earth -->
  <div class="body" id="earth" style="
    --path:path('M 0,0 m -168,0 a 168,114 0 1,1 336,0 a 168,114 0 1,1 -336,0');
    --dur:9s;--size:16px;--color:#3a9fd4;--glow:rgba(58,159,212,.5)"></div>
  <div class="trail" style="
    --path:path('M 0,0 m -168,0 a 168,114 0 1,1 336,0 a 168,114 0 1,1 -336,0');
    --dur:9s;--tw:16px;--color:#3a9fd4"></div>

  <!-- Mars -->
  <div class="body" style="
    --path:path('M 0,0 m -228,0 a 228,148 0 1,1 456,0 a 228,148 0 1,1 -456,0');
    --dur:14s;--size:11px;--color:#c05530;--glow:rgba(192,85,48,.5)"></div>
  <div class="trail" style="
    --path:path('M 0,0 m -228,0 a 228,148 0 1,1 456,0 a 228,148 0 1,1 -456,0');
    --dur:14s;--tw:11px;--color:#c05530"></div>

  <!-- Jupiter (only if wide enough) -->
  <div class="body" id="jupiter" style="
    --path:path('M 0,0 m -320,0 a 320,190 0 1,1 640,0 a 320,190 0 1,1 -640,0');
    --dur:23s;--size:26px;--color:#c8a868;--glow:rgba(200,168,104,.4)"></div>
  <div class="trail" style="
    --path:path('M 0,0 m -320,0 a 320,190 0 1,1 640,0 a 320,190 0 1,1 -640,0');
    --dur:23s;--tw:26px;--color:#c8a868"></div>

  <!-- Comet -->
  <div class="comet-group">
    <div class="comet">
      <div class="comet-tail"></div>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="ctrl">
  <h3>⊹ Offset-Path Orbits</h3>
  <label>Speed <span id="spd-val">1.0×</span></label>
  <input type="range" id="spd" min="0.2" max="4" step="0.1" value="1">
  <br><br>
  <label><input type="checkbox" id="show-paths" checked> Show paths</label>
  <br>
  <label><input type="checkbox" id="show-trails" checked> Trails</label>
</div>

<div class="credit">Inspired by CSS offset-path spec · MDN Web Docs · UI Spotlight Day 7 · Drop #1</div>
<div class="tip" id="tip">hover planets</div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 0.5;
  s.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    --o:${0.2+Math.random()*0.6};
    --td:${2+Math.random()*4}s;
    animation-delay:${Math.random()*4}s;
  `;
  starsEl.appendChild(s);
}

// Speed control
const spdSlider = document.getElementById('spd');
const spdVal    = document.getElementById('spd-val');
spdSlider.addEventListener('input', () => {
  const v = +spdSlider.value;
  spdVal.textContent = v.toFixed(1) + '×';
  document.querySelectorAll('.body,.trail,.trail2,.trail3,.comet-group').forEach(el => {
    const base = parseFloat(el.style.getPropertyValue('--dur') || el.style.getPropertyValue('animation-duration') || '6');
    // We'll use animation-play-rate via playback rate approach
  });
  // Use CSS custom property on :root
  document.documentElement.style.setProperty('--global-speed', v);
  updateSpeeds(v);
});

const baseDurs = {
  mercury: 4, venus: 6.5, earth: 9, mars: 14, jupiter: 23, comet: 18
};

function updateSpeeds(mult) {
  document.querySelectorAll('.body,.trail,.comet-group').forEach(el => {
    const dur = parseFloat(el.style.getPropertyValue('--dur') || 6);
    el.style.animationDuration = (dur / mult) + 's';
  });
}

// Path visibility
const pathRings = document.querySelectorAll('.orbit-ring,.belt');
document.getElementById('show-paths').addEventListener('change', e => {
  document.querySelectorAll('.orbit-ring,.belt').forEach(r => {
    r.style.display = e.target.checked ? '' : 'none';
  });
});

// Trail visibility
document.getElementById('show-trails').addEventListener('change', e => {
  document.querySelectorAll('.trail,.trail2,.trail3').forEach(t => {
    t.style.display = e.target.checked ? '' : 'none';
  });
});

// Add orbit rings dynamically
const scene = document.getElementById('scene');
const orbits = [
  {rx:78,ry:50}, {rx:118,ry:80}, {rx:168,ry:114},
  {rx:228,ry:148}, {rx:320,ry:190}
];
const cx = window.innerWidth/2, cy = window.innerHeight/2;
orbits.forEach(o => {
  const div = document.createElement('div');
  div.className = 'orbit-ring';
  div.style.cssText = `width:${o.rx*2}px;height:${o.ry*2}px;left:${cx-o.rx}px;top:${cy-o.ry}px`;
  scene.insertBefore(div, scene.firstChild);
});

// Responsive: hide jupiter on small screens
function checkSize() {
  const jup = document.getElementById('jupiter');
  if (jup) jup.style.display = window.innerWidth < 700 ? 'none' : '';
}
checkSize();
window.addEventListener('resize', checkSize);

// Planet data tooltips
const planetData = {
  mercury: 'Mercury — 88 Earth days',
  earth:   'Earth — 365 Earth days',
  jupiter: 'Jupiter — 12 Earth years'
};
</script>
</body>
</html>
