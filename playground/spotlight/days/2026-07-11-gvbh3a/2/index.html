<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Active Bento Grid — UI Spotlight</title>
<style>
  :root{ --accent:#34d399; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;background:#070c0a;color:#fff;font-family:system-ui,-apple-system,sans-serif;}
  body{ padding:90px 20px 60px; }

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    background:rgba(16,26,22,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
  }
  #debug{
    position:fixed; top:16px; right:16px; z-index:50; width:210px;
    background:rgba(14,22,18,0.68); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9db;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug input[type=range]{flex:1;accent-color:var(--accent);}
  @media (max-width:640px){ #debug{ display:none; } }

  header{ max-width:900px; margin:0 auto 30px; text-align:center; }
  header h1{ font-size:clamp(1.6rem,4.5vw,2.4rem); margin:0 0 10px; font-weight:800; }
  header p{ margin:0; color:rgba(255,255,255,0.55); font-size:14px; }

  #grid{
    max-width:1000px; margin:0 auto;
    display:grid; grid-template-columns:repeat(4, 1fr); grid-auto-rows:120px; gap:14px;
  }
  .tile{
    position:relative; border-radius:20px; overflow:hidden; cursor:pointer;
    background:rgba(255,255,255,0.045); border:1px solid rgba(255,255,255,0.09);
    transition:grid-column 320ms cubic-bezier(.2,.9,.3,1), grid-row 320ms cubic-bezier(.2,.9,.3,1),
               transform 320ms cubic-bezier(.2,.9,.3,1), background 320ms ease, box-shadow 320ms ease;
    display:flex; align-items:flex-end; padding:16px;
  }
  .tile.large{ grid-column:span 2; grid-row:span 2; }
  .tile.wide{ grid-column:span 2; }
  .tile.tall{ grid-row:span 2; }

  .tile.active{
    z-index:5; box-shadow:0 20px 60px rgba(0,0,0,0.5);
    background:rgba(255,255,255,0.09);
  }
  .tile .glow{
    position:absolute; inset:-30%; opacity:0.5; filter:blur(40px);
    transition:transform 500ms ease, opacity 400ms ease;
    background:radial-gradient(circle at 30% 30%, var(--tile-color, #34d399), transparent 60%);
  }
  .tile.active .glow{ transform:scale(1.3) rotate(20deg); opacity:0.85; }

  .tile .content{ position:relative; z-index:2; }
  .tile .kicker{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:rgba(255,255,255,0.55); margin-bottom:4px; }
  .tile h3{ margin:0; font-size:16px; font-weight:800; }
  .tile .secondary{
    position:absolute; inset:0; z-index:3; padding:16px; display:flex; flex-direction:column; justify-content:center;
    background:rgba(6,10,8,0.86); opacity:0; transform:translateY(8px);
    transition:opacity 260ms ease, transform 260ms ease; pointer-events:none;
  }
  .tile.active .secondary{ opacity:1; transform:translateY(0); }
  .tile .secondary .metric{ font-size:26px; font-weight:800; margin-bottom:4px; }
  .tile .secondary .metric-label{ font-size:11px; color:rgba(255,255,255,0.5); }

  .pulse-dot{
    position:absolute; top:14px; right:14px; width:8px; height:8px; border-radius:50%;
    background:var(--tile-color,#34d399); box-shadow:0 0 0 0 var(--tile-color,#34d399);
    animation:pulse 2.4s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(52,211,153,0.5); }
    70%{ box-shadow:0 0 0 10px rgba(52,211,153,0); }
    100%{ box-shadow:0 0 0 0 rgba(52,211,153,0); }
  }

  @media (max-width:720px){
    #grid{ grid-template-columns:repeat(2,1fr); }
    .tile.large{ grid-column:span 2; grid-row:span 2; }
  }

  footer{
    max-width:1000px; margin:26px auto 0; text-align:center;
    font-size:11px; color:rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Active Grid Debug</h4>
  <div class="row"><span>Expand scale</span><input type="range" id="expandAmt" min="0" max="100" value="60"></div>
  <div class="row"><span>Reveal delay (ms)</span><input type="range" id="revealDelay" min="0" max="400" value="80"></div>
</div>

<header>
  <h1>Active Bento Grid</h1>
  <p>Hover or tap a tile — it expands, reveals a secondary data layer, and its ambient glow intensifies. No more static boxes.</p>
</header>

<div id="grid"></div>
<footer>Inspired by 2026 "Active Grid" UI trend coverage &middot; UI Spotlight Day 56 &middot; Drop #2</footer>

<script>
(function(){
  "use strict";
  var grid = document.getElementById('grid');
  var expandAmt = document.getElementById('expandAmt');
  var revealDelay = document.getElementById('revealDelay');

  var TILES = [
    { cls:'large', color:'#34d399', kicker:'Revenue', title:'MRR Growth', metric:'$48.2k', label:'up 12% week over week' },
    { cls:'wide',  color:'#38bdf8', kicker:'Traffic', title:'Live Sessions', metric:'1,204', label:'active right now' },
    { cls:'',      color:'#f472b6', kicker:'Signals', title:'Alerts', metric:'3', label:'need attention' },
    { cls:'tall',  color:'#fbbf24', kicker:'Team', title:'Deploys Today', metric:'17', label:'across 4 services' },
    { cls:'',      color:'#a78bfa', kicker:'Users', title:'New Signups', metric:'86', label:'in the last hour' },
    { cls:'wide',  color:'#34d399', kicker:'Retention', title:'7-day Retention', metric:'64%', label:'up 3pts this month' },
    { cls:'',      color:'#38bdf8', kicker:'Support', title:'Open Tickets', metric:'9', label:'2 high priority' },
    { cls:'',      color:'#f472b6', kicker:'Infra', title:'Uptime', metric:'99.98%', label:'last 30 days' }
  ];

  var activeTimer = null;

  TILES.forEach(function(t){
    var el = document.createElement('div');
    el.className = 'tile ' + t.cls;
    el.style.setProperty('--tile-color', t.color);
    el.innerHTML =
      '<div class="glow"></div>' +
      '<div class="pulse-dot"></div>' +
      '<div class="content"><div class="kicker">' + t.kicker + '</div><h3>' + t.title + '</h3></div>' +
      '<div class="secondary"><div class="metric">' + t.metric + '</div><div class="metric-label">' + t.label + '</div></div>';

    function activate(){
      clearTimeout(activeTimer);
      var delay = parseInt(revealDelay.value, 10);
      var scale = 1 + parseInt(expandAmt.value, 10)/400;
      el.style.transform = 'scale(' + scale.toFixed(3) + ')';
      activeTimer = setTimeout(function(){ el.classList.add('active'); }, delay);
    }
    function deactivate(){
      clearTimeout(activeTimer);
      el.classList.remove('active');
      el.style.transform = 'scale(1)';
    }

    el.addEventListener('mouseenter', activate);
    el.addEventListener('mouseleave', deactivate);
    el.addEventListener('touchstart', function(e){
      e.preventDefault();
      var wasActive = el.classList.contains('active');
      Array.prototype.forEach.call(grid.querySelectorAll('.tile'), deactivate);
      if(!wasActive) activate();
    }, { passive:false });

    grid.appendChild(el);
  });

  document.addEventListener('touchstart', function(e){
    if(!e.target.closest('.tile')){
      Array.prototype.forEach.call(grid.querySelectorAll('.tile'), function(el){
        el.classList.remove('active');
        el.style.transform = 'scale(1)';
      });
    }
  }, { passive:true });
})();
</script>
</body>
</html>
