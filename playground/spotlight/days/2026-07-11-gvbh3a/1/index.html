<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wave Propagation Grid — UI Spotlight</title>
<style>
  :root{ --accent:#38bdf8; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#05070d;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;}

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    background:rgba(20,24,36,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
  }

  #debug{
    position:fixed; top:16px; right:16px; z-index:50; width:210px;
    background:rgba(14,18,30,0.68); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9ab;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug input[type=range]{flex:1;accent-color:var(--accent);}
  #debug .stat{color:var(--accent);font-weight:700;}
  @media (max-width:640px){ #debug{ display:none; } }

  canvas{ display:block; width:100%; height:100%; touch-action:none; }

  .hint{
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    font-size:12px; color:rgba(255,255,255,0.55); background:rgba(10,12,20,0.5); backdrop-filter:blur(8px);
    padding:7px 14px; border-radius:999px; pointer-events:none; z-index:10; transition:opacity 500ms;
  }

  footer{
    position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:50;
    font-size:11px; color:rgba(255,255,255,0.45); background:rgba(10,12,20,0.5); backdrop-filter:blur(8px);
    padding:6px 12px; border-radius:999px; white-space:nowrap; display:none;
  }
  @media (min-width:900px){ footer{ display:block; } }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Wave Debug</h4>
  <div class="row"><span>Amplitude</span><input type="range" id="amp" min="10" max="100" value="45"></div>
  <div class="row"><span>Damping</span><input type="range" id="damp" min="80" max="99" value="93"></div>
  <div class="row"><span>Grid density</span><input type="range" id="density" min="10" max="28" value="18"></div>
  <div class="row"><span>Active ripples</span><span class="stat" id="rippleCount">0</span></div>
</div>

<canvas id="stage"></canvas>
<div class="hint" id="hint">click / tap anywhere to send a ripple through the grid</div>
<footer>Inspired by Codrops (Wave Propagation Cube Grid) &middot; UI Spotlight Day 56 &middot; Drop #1</footer>

<script>
(function(){
  "use strict";
  var canvas = document.getElementById('stage');
  var ctx = canvas.getContext('2d');
  var ampEl = document.getElementById('amp');
  var dampEl = document.getElementById('damp');
  var densityEl = document.getElementById('density');
  var rippleCountEl = document.getElementById('rippleCount');
  var hint = document.getElementById('hint');

  var cols, rows, cellW, cellH;
  var height, velocity;
  var ripples = 0;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  function buildGrid(){
    var density = parseInt(densityEl.value, 10);
    cols = density;
    rows = Math.round(density * (canvas.clientHeight / canvas.clientWidth));
    rows = Math.max(rows, 6);
    cellW = canvas.clientWidth / cols;
    cellH = canvas.clientHeight / rows;
    height = new Float32Array(cols * rows);
    velocity = new Float32Array(cols * rows);
  }

  function resize(){
    canvas.width = Math.round(canvas.clientWidth * dpr);
    canvas.height = Math.round(canvas.clientHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildGrid();
  }

  function idx(x, y){ return y * cols + x; }

  function disturb(px, py, strength){
    var cx = Math.floor(px / cellW);
    var cy = Math.floor(py / cellH);
    if(cx < 0 || cx >= cols || cy < 0 || cy >= rows) return;
    velocity[idx(cx, cy)] += strength;
    ripples++;
  }

  function step(){
    var damping = parseInt(dampEl.value, 10) / 100;
    var next = new Float32Array(height.length);
    for(var y = 0; y < rows; y++){
      for(var x = 0; x < cols; x++){
        var i = idx(x, y);
        var left = x > 0 ? height[idx(x-1, y)] : height[i];
        var right = x < cols-1 ? height[idx(x+1, y)] : height[i];
        var up = y > 0 ? height[idx(x, y-1)] : height[i];
        var down = y < rows-1 ? height[idx(x, y+1)] : height[i];
        var laplacian = (left + right + up + down) / 2 - height[i];
        velocity[i] = (velocity[i] + laplacian * 0.5) * damping;
        next[i] = height[i] + velocity[i];
      }
    }
    height = next;
  }

  function draw(){
    var W = canvas.clientWidth, H = canvas.clientHeight;
    ctx.clearRect(0, 0, W, H);
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#070b16');
    grad.addColorStop(1, '#0a1424');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    var amp = parseInt(ampEl.value, 10);

    for(var y = 0; y < rows; y++){
      for(var x = 0; x < cols; x++){
        var h = height[idx(x, y)];
        var lift = h * amp;
        var scale = 1 + Math.max(-0.4, Math.min(0.5, h * 0.6));
        var w = cellW * 0.82 * scale;
        var ht = cellH * 0.82 * scale;
        var cx = (x + 0.5) * cellW;
        var cy = (y + 0.5) * cellH - lift * 0.5;

        var t = Math.max(-1, Math.min(1, h * 2));
        var hue = 200 + t * 60;
        var light = 40 + t * 30;
        ctx.fillStyle = 'hsl(' + hue + ', 85%, ' + Math.max(12, light) + '%)';
        ctx.shadowColor = 'hsla(' + hue + ',90%,60%,' + Math.min(0.6, Math.abs(t)*0.7) + ')';
        ctx.shadowBlur = Math.abs(lift) * 0.8 + 4;

        ctx.beginPath();
        var rx = w/2, ry = ht/2;
        var rad = Math.min(rx, ry) * 0.28;
        if(ctx.roundRect){
          ctx.roundRect(cx - rx, cy - ry, w, ht, rad);
        } else {
          ctx.rect(cx - rx, cy - ry, w, ht);
        }
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
    rippleCountEl.textContent = ripples;
  }

  function loop(){
    step();
    draw();
    requestAnimationFrame(loop);
  }

  function pointerToLocal(e){
    var rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  canvas.addEventListener('pointerdown', function(e){
    var p = pointerToLocal(e);
    disturb(p.x, p.y, 3.2);
    hint.style.opacity = '0';
  });

  var lastMove = 0;
  canvas.addEventListener('pointermove', function(e){
    if(e.buttons !== 1) return;
    var now = performance.now();
    if(now - lastMove < 40) return;
    lastMove = now;
    var p = pointerToLocal(e);
    disturb(p.x, p.y, 1.4);
  });

  densityEl.addEventListener('input', buildGrid);

  window.addEventListener('resize', resize);
  resize();

  // seed an initial ripple so the grid feels alive immediately
  setTimeout(function(){
    disturb(canvas.clientWidth/2, canvas.clientHeight/2, 3.5);
  }, 300);

  loop();
})();
</script>
</body>
</html>
