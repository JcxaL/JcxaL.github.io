<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Optical Size Machine — UI Spotlight</title>
<style>
  :root{ --accent:#f87171; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#0d0808;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;}

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    background:rgba(28,18,18,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
  }
  #debug{
    position:fixed; top:16px; right:16px; z-index:50; width:220px;
    background:rgba(24,16,16,0.7); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#e9a;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug input[type=range]{flex:1;accent-color:var(--accent);}
  #debug .stat{color:var(--accent);font-weight:700;}
  @media (max-width:640px){ #debug{ display:none; } }

  main{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 20px; text-align:center; gap:26px;
  }
  #word{
    font-weight:800; line-height:1; letter-spacing:0; white-space:nowrap;
    transition:font-weight 120ms linear, letter-spacing 120ms linear;
    will-change:font-size, letter-spacing, font-weight, -webkit-text-stroke;
  }
  #scaleLabel{ font-size:13px; color:rgba(255,255,255,0.5); letter-spacing:0.05em; }
  #scaleLabel b{ color:var(--accent); }

  #sizeSlider{
    width:min(70vw, 420px); accent-color:var(--accent);
  }

  footer{
    position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:50;
    font-size:11px; color:rgba(255,255,255,0.45); background:rgba(10,12,20,0.5); backdrop-filter:blur(8px);
    padding:6px 12px; border-radius:999px; white-space:nowrap;
  }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Optical Axis Debug</h4>
  <div class="row"><span>Contrast strength</span><input type="range" id="contrastAmt" min="0" max="100" value="55"></div>
  <div class="row"><span>Auto animate</span><input type="checkbox" id="autoAnim" checked style="accent-color:#f87171;"></div>
  <div class="row"><span>Weight (wght)</span><span class="stat" id="wghtStat">520</span></div>
  <div class="row"><span>Tracking</span><span class="stat" id="trackStat">0.00em</span></div>
</div>

<main>
  <div id="word">Aa</div>
  <div id="scaleLabel">Display size: <b id="sizePx">180px</b> &mdash; optical size adapts automatically</div>
  <input type="range" id="sizeSlider" min="14" max="220" value="180">
</main>

<footer>Inspired by Google Fonts &amp; MDN "opsz" optical-size axis docs &middot; UI Spotlight Day 56 &middot; Drop #3</footer>

<script>
(function(){
  "use strict";
  var word = document.getElementById('word');
  var sizeSlider = document.getElementById('sizeSlider');
  var sizePx = document.getElementById('sizePx');
  var contrastAmt = document.getElementById('contrastAmt');
  var autoAnim = document.getElementById('autoAnim');
  var wghtStat = document.getElementById('wghtStat');
  var trackStat = document.getElementById('trackStat');

  var WORDS = ['Aa', 'Optical', 'Weight', 'Sizing', 'Typeface', 'Gg7&Rk'];
  var wordIndex = 0;

  function render(){
    var size = parseInt(sizeSlider.value, 10);
    var contrast = parseInt(contrastAmt.value, 10) / 100;

    // small optical sizes: heavier weight, wider tracking, lower stroke contrast (thicker fake stroke)
    // large optical sizes: lighter weight, tighter tracking, higher stroke contrast (thinner fake stroke)
    var t = (size - 14) / (220 - 14); // 0 (small) .. 1 (large)
    var weight = Math.round(620 - t * 260); // 620 down to 360
    var tracking = (0.045 - t * 0.05).toFixed(3); // wide at small, tight/negative at large
    var strokeWidth = (1.6 - t * 1.5) * contrast; // thicker stroke at small sizes

    word.style.fontSize = size + 'px';
    word.style.fontWeight = weight;
    word.style.fontVariationSettings = "'wght' " + weight + ", 'opsz' " + Math.round(6 + t*138);
    word.style.letterSpacing = tracking + 'em';
    word.style.webkitTextStroke = strokeWidth.toFixed(2) + 'px currentColor';
    word.style.color = 'hsl(' + (10 + t*20) + ', 90%, ' + (68 + t*15) + '%)';

    sizePx.textContent = size + 'px';
    wghtStat.textContent = weight;
    trackStat.textContent = tracking + 'em';
  }

  sizeSlider.addEventListener('input', render);
  contrastAmt.addEventListener('input', render);

  word.addEventListener('click', function(){
    wordIndex = (wordIndex + 1) % WORDS.length;
    word.textContent = WORDS[wordIndex];
  });

  var animDir = 1;
  function autoStep(){
    if(autoAnim.checked){
      var v = parseInt(sizeSlider.value, 10) + animDir * 0.9;
      if(v >= 220){ v = 220; animDir = -1; }
      if(v <= 14){ v = 14; animDir = 1; }
      sizeSlider.value = v;
      render();
    }
    requestAnimationFrame(autoStep);
  }

  word.textContent = WORDS[0];
  render();
  requestAnimationFrame(autoStep);
})();
</script>
</body>
</html>
