<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jelly Buttons — UI Spotlight</title>
<style>
  :root{ --accent:#fbbf24; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#0d0a05;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;}

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    background:rgba(28,22,12,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
  }
  #debug{
    position:fixed; top:16px; right:16px; z-index:50; width:210px;
    background:rgba(24,18,10,0.7); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#edb;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug input[type=range]{flex:1;accent-color:var(--accent);}
  @media (max-width:640px){ #debug{ display:none; } }

  main{
    position:absolute; inset:0; display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
    gap:34px; padding:40px 24px;
  }

  .jelly{
    position:relative; border:none; cursor:pointer; user-select:none; -webkit-user-select:none;
    padding:26px 40px; font-size:16px; font-weight:800; color:#241705;
    border-radius:26px; overflow:hidden;
    transform-origin:center;
    box-shadow:
      0 10px 0 var(--shade,#b9861a),
      0 18px 30px rgba(0,0,0,0.45);
    transition:box-shadow 90ms ease;
  }
  .jelly::before{
    content:''; position:absolute; inset:0; border-radius:inherit;
    background:linear-gradient(160deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 45%);
    mix-blend-mode:overlay; pointer-events:none;
  }
  .jelly .label{ position:relative; z-index:2; }

  .c1{ background:linear-gradient(160deg,#ffe08a,#f5b83a); --shade:#b9861a; }
  .c2{ background:linear-gradient(160deg,#9be8c9,#34d399); --shade:#1c8f66; color:#052018; }
  .c3{ background:linear-gradient(160deg,#a6c8ff,#38bdf8); --shade:#1c74a8; color:#04202e; }
  .c4{ background:linear-gradient(160deg,#ffb0d0,#f472b6); --shade:#b23b78; color:#2e0517; }

  .jelly.pressed{
    box-shadow:
      0 2px 0 var(--shade,#b9861a),
      0 6px 14px rgba(0,0,0,0.35);
  }

  footer{
    position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:50;
    font-size:11px; color:rgba(255,255,255,0.45); background:rgba(10,12,20,0.5); backdrop-filter:blur(8px);
    padding:6px 12px; border-radius:999px; white-space:nowrap;
  }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Jelly Debug</h4>
  <div class="row"><span>Squish amount</span><input type="range" id="squishAmt" min="0" max="100" value="55"></div>
  <div class="row"><span>Spring wobble</span><input type="range" id="wobbleAmt" min="0" max="100" value="60"></div>
</div>

<main id="stage">
  <button class="jelly c1"><span class="label">Add to cart</span></button>
  <button class="jelly c2"><span class="label">Confirm</span></button>
  <button class="jelly c3"><span class="label">Send</span></button>
  <button class="jelly c4"><span class="label">Like ♥</span></button>
</main>

<footer>Inspired by 2026 "Tactile Maximalism" UI trend coverage &middot; UI Spotlight Day 56 &middot; Drop #4</footer>

<script>
(function(){
  "use strict";
  var buttons = Array.prototype.slice.call(document.querySelectorAll('.jelly'));
  var squishAmt = document.getElementById('squishAmt');
  var wobbleAmt = document.getElementById('wobbleAmt');

  // simple spring model per button: displacement + velocity toward 0
  var springs = new Map();
  buttons.forEach(function(btn){
    springs.set(btn, { sx:1, sy:1, vx:0, vy:0, active:false, borderR:26 });
  });

  function press(btn){
    var s = springs.get(btn);
    var squish = parseInt(squishAmt.value, 10) / 100;
    s.sx = 1 + squish * 0.22;
    s.sy = 1 - squish * 0.30;
    s.vx = 0; s.vy = 0;
    s.active = true;
    btn.classList.add('pressed');
  }

  function release(btn){
    var s = springs.get(btn);
    btn.classList.remove('pressed');
    s.active = true;
  }

  function animate(){
    var wobble = parseInt(wobbleAmt.value, 10) / 100;
    var stiffness = 0.28 + wobble * 0.18;
    var damping = 0.72 - wobble * 0.22;

    buttons.forEach(function(btn){
      var s = springs.get(btn);
      if(!s.active) return;
      var fx = (1 - s.sx) * stiffness;
      var fy = (1 - s.sy) * stiffness;
      s.vx = (s.vx + fx) * damping;
      s.vy = (s.vy + fy) * damping;
      s.sx += s.vx;
      s.sy += s.vy;

      var settled = Math.abs(s.sx-1) < 0.002 && Math.abs(s.sy-1) < 0.002 && Math.abs(s.vx) < 0.001 && Math.abs(s.vy) < 0.001;
      if(settled && !btn.classList.contains('pressed')){
        s.sx = 1; s.sy = 1; s.active = false;
      }
      btn.style.transform = 'scale(' + s.sx.toFixed(4) + ', ' + s.sy.toFixed(4) + ')';
    });
    requestAnimationFrame(animate);
  }

  buttons.forEach(function(btn){
    btn.addEventListener('pointerdown', function(e){ e.preventDefault(); press(btn); });
    btn.addEventListener('pointerup', function(){ release(btn); });
    btn.addEventListener('pointerleave', function(){ release(btn); });
    btn.addEventListener('pointercancel', function(){ release(btn); });
  });

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
