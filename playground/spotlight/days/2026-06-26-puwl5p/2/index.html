<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSS Native Masonry</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090f;--surface:#0e0f1e;--border:#1a1c30;--accent:#38bdf8}
body{background:var(--bg);font-family:system-ui,sans-serif;color:#e2e8f0;min-height:100vh;padding:20px}
h1{text-align:center;font-size:clamp(1.4rem,4vw,2.4rem);font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:#6b7280;font-size:13px;margin-bottom:24px}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.ctrl-btn{padding:6px 14px;background:#0e0f1e;border:1px solid #1a1c30;color:#e2e8f0;border-radius:20px;font-size:12px;cursor:pointer;transition:.15s}
.ctrl-btn:hover,.ctrl-btn.active{background:#38bdf825;border-color:#38bdf8;color:#38bdf8}

/* Native CSS Masonry — Chrome 132+, Firefox with flag */
.masonry{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  grid-template-rows:masonry;
  align-tracks:start; /* legacy */
  align-items:start;
  gap:14px;
  max-width:1100px;
  margin:0 auto;
}
/* Fallback: multi-column masonry for older browsers */
@supports not (grid-template-rows: masonry) {
  .masonry {
    display:block;
    column-count:4;
    column-gap:14px;
  }
  .card { break-inside:avoid; margin-bottom:14px; display:block; }
}

.card{
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
  transition:transform .2s, box-shadow .2s, border-color .2s;
  background:var(--surface);
  cursor:pointer;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 40px rgba(0,0,0,.5);
  border-color:#38bdf840;
}
.card-img{width:100%;display:block;object-fit:cover;background:var(--bg)}
.card-body{padding:14px 14px 16px}
.card-body h3{font-size:13px;font-weight:700;margin-bottom:5px;color:#e2e8f0}
.card-body p{font-size:11px;line-height:1.6;color:#6b7280}
.card-tag{display:inline-block;margin-top:8px;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600}

.col-badge{display:inline-block;margin-bottom:16px;padding:4px 12px;border-radius:20px;font-size:11px;background:#38bdf820;color:#38bdf8;border:1px solid #38bdf840;text-align:center;width:100%;max-width:300px;display:block;margin:0 auto 20px}

.debug-panel{position:fixed;top:12px;right:12px;background:rgba(8,9,15,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;font-size:11px;color:#9ca3af;backdrop-filter:blur(8px);z-index:10}
.debug-panel label{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#e2e8f0}
.debug-panel input[type=range]{width:80px;accent-color:var(--accent)}
.debug-val{color:var(--accent);min-width:24px;display:inline-block}
footer{text-align:center;padding:20px;font-size:11px;color:#374151;margin-top:20px}

@media(max-width:600px){.debug-panel{display:none}.masonry{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<h1>Native CSS Masonry</h1>
<div class="subtitle">grid-template-rows: masonry — finally in Chrome 132+ (no JS required)</div>

<div class="controls">
  <button class="ctrl-btn active" onclick="setStyle('masonry')">Masonry</button>
  <button class="ctrl-btn" onclick="setStyle('grid')">Regular Grid</button>
  <button class="ctrl-btn" onclick="shuffle()">Shuffle Heights</button>
  <button class="ctrl-btn" onclick="addCard()">Add Card</button>
</div>

<div id="support-badge" class="col-badge">Checking masonry support...</div>

<div class="masonry" id="grid"></div>

<div class="debug-panel">
  <label>Columns <input type="range" id="cols" min="2" max="6" value="4"> <span class="debug-val" id="cols-val">4</span></label>
  <label>Gap <input type="range" id="gap" min="4" max="32" value="14"> <span class="debug-val" id="gap-val">14</span></label>
  <label>Min Width <input type="range" id="minw" min="120" max="320" value="220"> <span class="debug-val" id="minw-val">220</span>px</label>
</div>

<footer>Inspired by CSS Grid Level 3 native masonry · UI Spotlight Day 41 · Drop #2</footer>

<script>
const TOPICS = [
  {title:'Aurora Borealis',desc:'Solar winds collide with Earth\'s magnetic field, producing curtains of light that dance across polar skies.',tag:'Nature',color:'#34d399'},
  {title:'CSS Container Queries',desc:'Style components based on their own size, not the viewport. Game-changer for design systems.',tag:'CSS',color:'#38bdf8'},
  {title:'Quantum Entanglement',desc:'Two particles share state instantaneously across any distance — Einstein called it "spooky action at a distance."',tag:'Physics',color:'#a78bfa'},
  {title:'Scroll-Driven Animations',desc:'Tie animation progress directly to scroll position with zero JavaScript using animation-timeline.',tag:'CSS',color:'#38bdf8'},
  {title:'Deep Ocean Bioluminescence',desc:'Over 76% of deep-sea creatures produce their own light, turning the abyss into a living constellation.',tag:'Science',color:'#34d399'},
  {title:'View Transitions API',desc:'Smooth cross-document morphing animations, natively in the browser. No libraries needed.',tag:'JS',color:'#fbbf24'},
  {title:'Fibonacci & Golden Ratio',desc:'Nature\'s favourite number sequence, hidden in sunflower seeds, shell spirals, galaxy arms, and more.',tag:'Math',color:'#f472b6'},
  {title:'CSS @property',desc:'Register typed custom properties with animation support — gradients can finally interpolate.',tag:'CSS',color:'#38bdf8'},
  {title:'Dark Matter Mystery',desc:'Invisible, undetectable — yet it makes up 27% of the universe and holds galaxies together.',tag:'Space',color:'#a78bfa'},
  {title:'WebGPU API',desc:'Direct GPU compute access in the browser. Machine learning, physics sims, ray tracing — all client-side.',tag:'JS',color:'#fbbf24'},
  {title:'Tardigrades',desc:'Water bears can survive radiation, vacuum, and temperatures near absolute zero. The toughest animal alive.',tag:'Biology',color:'#34d399'},
  {title:'CSS Anchor Positioning',desc:'Position any element relative to any other element in the DOM — no JS layout needed.',tag:'CSS',color:'#38bdf8'},
];

const HEIGHTS = [80, 110, 140, 170, 200, 60];
let cards = [...TOPICS];

function colorBlock(h, color) {
  const cvs = document.createElement('canvas');
  cvs.width = 300; cvs.height = h;
  const ctx = cvs.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,300,h);
  grad.addColorStop(0, color+'40');
  grad.addColorStop(1, '#05060e');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,300,h);
  // dots
  ctx.fillStyle = color+'30';
  for(let i=0;i<12;i++){
    const x=Math.random()*300,y=Math.random()*h,r=Math.random()*20+4;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  return cvs.toDataURL();
}

function makeCard(t, heightIdx) {
  const h = HEIGHTS[heightIdx % HEIGHTS.length];
  const el = document.createElement('div');
  el.className = 'card';
  const img = document.createElement('img');
  img.src = colorBlock(h, t.color);
  img.style.height = h+'px';
  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `<h3>${t.title}</h3><p>${t.desc}</p><span class="card-tag" style="background:${t.color}20;color:${t.color}">${t.tag}</span>`;
  el.appendChild(img);
  el.appendChild(body);
  return el;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((t,i) => grid.appendChild(makeCard(t, i)));
}

function setStyle(mode) {
  const grid = document.getElementById('grid');
  document.querySelectorAll('.ctrl-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.toLowerCase().includes(mode));
  });
  if(mode==='masonry'){
    grid.style.gridTemplateRows='masonry';
    grid.style.alignItems='start';
  } else {
    grid.style.gridTemplateRows='';
    grid.style.alignItems='';
  }
}

function shuffle() {
  cards = cards.map((t,i)=>({...t,_h:Math.floor(Math.random()*HEIGHTS.length)}));
  render();
}

function addCard() {
  const t = TOPICS[Math.floor(Math.random()*TOPICS.length)];
  cards.push({...t,title:t.title+' II'});
  render();
}

// Check support
const supported = CSS.supports('grid-template-rows','masonry');
const badge = document.getElementById('support-badge');
badge.textContent = supported
  ? '✓ Native Masonry supported in this browser (no JS!)'
  : '⚠ Falling back to CSS columns (enable in chrome://flags → Experimental Web Platform features)';
badge.style.background = supported ? '#34d39920' : '#f4724820';
badge.style.color = supported ? '#34d399' : '#f47248';
badge.style.borderColor = supported ? '#34d39940' : '#f4724840';

// Debug
document.getElementById('cols').addEventListener('input',function(){
  document.getElementById('cols-val').textContent=this.value;
  const g=document.getElementById('grid');
  g.style.gridTemplateColumns=`repeat(${this.value},1fr)`;
});
document.getElementById('gap').addEventListener('input',function(){
  document.getElementById('gap-val').textContent=this.value;
  document.getElementById('grid').style.gap=this.value+'px';
});
document.getElementById('minw').addEventListener('input',function(){
  document.getElementById('minw-val').textContent=this.value;
  document.getElementById('grid').style.gridTemplateColumns=`repeat(auto-fill,minmax(${this.value}px,1fr))`;
});

render();
</script>
</body>
</html>
