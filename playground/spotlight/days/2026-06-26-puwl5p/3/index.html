<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVG Text Inflation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#080912;font-family:system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:50px;
  padding:30px 20px;overflow-x:hidden;
}
h1{color:#e2e8f0;font-size:clamp(.9rem,2.5vw,1.2rem);font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:#4b5563;text-align:center;margin-bottom:-30px}

.word-wrap{cursor:pointer;display:block;position:relative}
.word-wrap:focus{outline:none}

/* SVG text base */
.inflate-text{
  font-family:system-ui,sans-serif;font-weight:900;
  fill:none;stroke-width:0;
  transition:filter .05s;
}

.label{font-size:11px;color:#374151;text-align:center;margin-top:-6px;letter-spacing:.05em}

.demo-row{display:flex;flex-wrap:wrap;gap:30px;justify-content:center;align-items:flex-end}

/* Inflation via filter animate */
.inflate-svg text{
  font-weight:900;font-family:system-ui,sans-serif;
  fill:currentColor;
  transition:all .15s;
}

/* Method: feMorphology erode/dilate animated via JS */
.bubble-text{
  font-weight:900;font-family:system-ui,sans-serif;
  fill:white;letter-spacing:.01em;
}

/* Outline style */
.outline-text{
  fill:none;stroke:currentColor;stroke-width:2;
  font-weight:900;font-family:system-ui,sans-serif;
  transition:stroke-width .2s;
}

.debug-panel{position:fixed;top:12px;right:12px;background:rgba(8,9,18,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;font-size:11px;color:#9ca3af;backdrop-filter:blur(8px);z-index:10}
.debug-panel label{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#e2e8f0}
.debug-panel input[type=range]{width:80px;accent-color:#a78bfa}
.debug-val{color:#a78bfa;min-width:28px;display:inline-block}

footer{position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:#374151}
@media(max-width:600px){.debug-panel{display:none}}
</style>
</head>
<body>

<h1>SVG feMorphology — Text Inflation</h1>

<!-- Hidden SVG filters -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="inflate0" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceGraphic" operator="dilate" radius="0" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="0.5" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="inflate1" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceGraphic" operator="dilate" radius="2" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="1" result="blur"/>
      <feComposite in="blur" in2="expanded" operator="over"/>
    </filter>
    <filter id="inflate2" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceGraphic" operator="dilate" radius="5" result="expanded"/>
      <feGaussianBlur in="expanded" stdDeviation="2" result="blur"/>
      <feComposite in="blur" in2="expanded" operator="over"/>
    </filter>
    <filter id="inflate-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feMorphology in="SourceGraphic" operator="dilate" radius="3" result="exp"/>
      <feGaussianBlur in="exp" stdDeviation="8" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" mode="screen"/>
    </filter>
    <filter id="erode-peel" x="-10%" y="-10%" width="120%" height="120%">
      <feMorphology in="SourceGraphic" operator="erode" radius="2" result="eroded"/>
      <feGaussianBlur in="eroded" stdDeviation=".5"/>
    </filter>
  </defs>
</svg>

<!-- Demo 1: Hover inflate word by word -->
<div class="demo-row">
  <div>
    <svg id="svg1" width="420" height="100" viewBox="0 0 420 100">
      <text class="bubble-text" x="210" y="75" text-anchor="middle" font-size="72" fill="#a78bfa" id="t1" style="filter:url(#inflate0);transition:filter .0s">INFLATE</text>
    </svg>
    <div class="label">Hover → feMorphology dilate radius</div>
  </div>
</div>

<!-- Demo 2: Per-character inflation -->
<div class="demo-row">
  <div id="perchar-wrap">
    <svg id="svg2" width="500" height="90" viewBox="0 0 500 90" style="overflow:visible">
      <!-- Built by JS -->
    </svg>
    <div class="label">Hover each letter — individual inflation</div>
  </div>
</div>

<!-- Demo 3: Outline inflate -->
<div class="demo-row">
  <div>
    <svg width="360" height="90" viewBox="0 0 360 90" style="overflow:visible">
      <text id="outline-t" class="outline-text" x="180" y="72" text-anchor="middle" font-size="64" fill="#38bdf8" stroke="#38bdf8" stroke-width="2" style="paint-order:stroke fill;letter-spacing:2px">EXPAND</text>
    </svg>
    <div class="label">Outline stroke inflates outward</div>
  </div>
</div>

<!-- Demo 4: Glow swell -->
<div class="demo-row">
  <div>
    <svg width="380" height="90" viewBox="0 0 380 90" style="overflow:visible">
      <text id="glow-t" class="bubble-text" x="190" y="70" text-anchor="middle" font-size="64" fill="#f472b6" style="filter:url(#inflate0);transition:filter .05s;letter-spacing:1px">GLOW</text>
    </svg>
    <div class="label">Glow inflate via feGaussianBlur</div>
  </div>
</div>

<div class="debug-panel">
  <label>Max Radius <input type="range" id="max-radius" min="2" max="20" value="6"> <span class="debug-val" id="r-val">6</span></label>
  <label>Blur <input type="range" id="blur-amt" min="0" max="10" value="1" step=".5"> <span class="debug-val" id="b-val">1</span></label>
  <label>Speed <input type="range" id="anim-speed" min="1" max="30" value="8"> <span class="debug-val" id="s-val">8</span></label>
</div>

<footer>Inspired by SVG feMorphology text effects · UI Spotlight Day 41 · Drop #3</footer>

<script>
let maxRadius = 6, blurAmt = 1, step = 8;

// Build dynamic filters
function buildFilter(id, r, blur) {
  let f = document.getElementById(id);
  if(!f){
    f = document.createElementNS('http://www.w3.org/2000/svg','filter');
    f.id = id;
    f.setAttribute('x','-25%');f.setAttribute('y','-25%');
    f.setAttribute('width','150%');f.setAttribute('height','150%');
    document.querySelector('#inflate0').parentNode.appendChild(f);
  }
  f.innerHTML = `
    <feMorphology in="SourceGraphic" operator="dilate" radius="${r}" result="exp"/>
    <feGaussianBlur in="exp" stdDeviation="${blur}" result="blr"/>
    <feComposite in="blr" in2="exp" operator="over"/>`;
}

// Demo 1: whole word inflate
const t1 = document.getElementById('t1');
let r1 = 0, target1 = 0;
function updateFilter1() {
  buildFilter('dyn-inflate1', Math.max(0,r1.toFixed(1)), Math.max(0,blurAmt));
  t1.style.filter = 'url(#dyn-inflate1)';
}
t1.parentElement.addEventListener('mouseenter',()=>{target1=maxRadius});
t1.parentElement.addEventListener('mouseleave',()=>{target1=0});
(function loop1(){
  r1 += (target1-r1)*0.18;
  updateFilter1();
  requestAnimationFrame(loop1);
})();

// Demo 2: per-character
const WORD = 'VIBRATE';
const COLORS = ['#a78bfa','#818cf8','#6366f1','#38bdf8','#22d3ee','#06b6d4','#a78bfa'];
const svg2 = document.getElementById('svg2');
const charEls = [];
const charTargets = [];
const charR = [];
const spacing = 56;
const startX = 250 - (WORD.length*spacing)/2 + spacing/2;

WORD.split('').forEach((ch,i)=>{
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x', startX+i*spacing);
  t.setAttribute('y','70');
  t.setAttribute('text-anchor','middle');
  t.setAttribute('font-size','64');
  t.setAttribute('font-weight','900');
  t.setAttribute('font-family','system-ui,sans-serif');
  t.setAttribute('fill',COLORS[i%COLORS.length]);
  t.textContent = ch;
  svg2.appendChild(t);
  charEls.push(t);
  charTargets.push(0);
  charR.push(0);
  buildFilter('ch-f-'+i, 0, 0);
  t.style.filter = `url(#ch-f-${i})`;

  const hitbox = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hitbox.setAttribute('x', startX+i*spacing-28);
  hitbox.setAttribute('y','10');
  hitbox.setAttribute('width','56');
  hitbox.setAttribute('height','70');
  hitbox.setAttribute('fill','transparent');
  hitbox.style.cursor='pointer';
  hitbox.addEventListener('mouseenter',()=>{charTargets[i]=maxRadius});
  hitbox.addEventListener('mouseleave',()=>{charTargets[i]=0});
  svg2.appendChild(hitbox);
});

(function loopChars(){
  charEls.forEach((_,i)=>{
    charR[i]+=(charTargets[i]-charR[i])*0.16;
    buildFilter('ch-f-'+i, Math.max(0,charR[i].toFixed(2)), blurAmt*0.6);
  });
  requestAnimationFrame(loopChars);
})();

// Demo 3: outline inflate
const ot = document.getElementById('outline-t');
let sw = 2, swTarget = 2;
ot.parentElement.addEventListener('mouseenter',()=>{swTarget=maxRadius*2});
ot.parentElement.addEventListener('mouseleave',()=>{swTarget=2});
(function loopOutline(){
  sw += (swTarget-sw)*0.14;
  ot.setAttribute('stroke-width',sw.toFixed(2));
  requestAnimationFrame(loopOutline);
})();

// Demo 4: glow inflate
const gt = document.getElementById('glow-t');
let gr = 0, grTarget = 0;
gt.parentElement.addEventListener('mouseenter',()=>{grTarget=maxRadius+4});
gt.parentElement.addEventListener('mouseleave',()=>{grTarget=0});
(function loopGlow(){
  gr+=(grTarget-gr)*0.14;
  buildFilter('dyn-glow', Math.max(0,gr.toFixed(2)), Math.max(gr*1.5,0));
  gt.style.filter=`url(#dyn-glow)`;
  requestAnimationFrame(loopGlow);
})();

// Debug
document.getElementById('max-radius').addEventListener('input',function(){
  maxRadius=+this.value;
  document.getElementById('r-val').textContent=this.value;
});
document.getElementById('blur-amt').addEventListener('input',function(){
  blurAmt=+this.value;
  document.getElementById('b-val').textContent=this.value;
});
document.getElementById('anim-speed').addEventListener('input',function(){
  step=+this.value;
  document.getElementById('s-val').textContent=this.value;
});
</script>
</body>
</html>
