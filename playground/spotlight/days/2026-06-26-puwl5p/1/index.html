<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Depth Scroll Parallax</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#a78bfa;--bg:#05060e;--card:#0e0f1e}
body{background:var(--bg);font-family:system-ui,sans-serif;color:#e2e8f0;overflow-x:hidden}
.spacer{height:100vh;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:10}
.hero{text-align:center;padding:40px}
.hero h1{font-size:clamp(2rem,6vw,4.5rem);font-weight:900;background:linear-gradient(135deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.hero p{font-size:clamp(.9rem,2vw,1.15rem);color:#9ca3af;max-width:500px;margin:0 auto}
.scroll-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:.6;font-size:12px;color:#9ca3af;animation:bob 1.5s ease-in-out infinite}
.scroll-hint svg{animation:bob 1.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
.scene{height:500vh;position:relative}
.layer-wrap{position:sticky;top:0;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
.layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

.cards-container{position:sticky;top:0;height:100vh;display:grid;place-items:center;overflow:hidden}
.card-scene{width:min(90vw,700px);height:min(80vh,520px);position:relative;perspective:1200px}
.depth-card{
  position:absolute;width:260px;height:200px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  padding:20px;text-align:center;
  background:rgba(14,15,30,.8);border:1px solid rgba(167,139,250,.2);
  backdrop-filter:blur(12px);
  will-change:transform,opacity;
  transition:box-shadow .3s;
}
.depth-card:hover{box-shadow:0 0 40px rgba(167,139,250,.3)}
.depth-card .icon{font-size:36px;line-height:1}
.depth-card h3{font-size:14px;font-weight:700;color:#e2e8f0}
.depth-card p{font-size:11px;color:#6b7280;line-height:1.5}
.tag-row{font-size:10px;padding:3px 8px;border-radius:20px;background:rgba(167,139,250,.15);color:var(--accent)}

.debug-panel{position:fixed;top:12px;right:12px;background:rgba(14,15,30,.85);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;font-size:11px;color:#9ca3af;backdrop-filter:blur(8px)}
.debug-panel label{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#e2e8f0}
.debug-panel input[type=range]{width:90px;accent-color:var(--accent)}
.debug-val{color:var(--accent);font-variant-numeric:tabular-nums;min-width:28px;display:inline-block}

footer{text-align:center;padding:20px;font-size:11px;color:#374151;margin-top:40px}

@media(max-width:600px){.debug-panel{display:none}}
</style>
</head>
<body>

<div class="spacer">
  <div class="hero">
    <h1>Depth Parallax</h1>
    <p>Scroll to watch layered cards emerge from different depths — each layer moves at its own parallax rate creating a sense of 3D space.</p>
  </div>
</div>

<div class="scene" id="scene">
  <div class="cards-container">
    <div class="card-scene" id="cardScene"></div>
  </div>
</div>

<div style="height:40vh"></div>

<div class="scroll-hint">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
  Scroll
</div>

<div class="debug-panel" id="dbg">
  <label>Depth <input type="range" id="depth-range" min="200" max="1200" value="600"> <span class="debug-val" id="depth-val">600</span></label>
  <label>Spread <input type="range" id="spread-range" min="50" max="400" value="200"> <span class="debug-val" id="spread-val">200</span></label>
  <label>Speed <input type="range" id="speed-range" min="20" max="120" value="60"> <span class="debug-val" id="speed-val">60</span></label>
</div>

<footer>Inspired by scroll-driven depth parallax · UI Spotlight Day 41 · Drop #1</footer>

<script>
const cards = [
  {icon:'🌌',title:'Background Layer',desc:'Slowest parallax, deepest Z — anchors the scene',depth:3,x:-220,y:-60,color:'#7c3aed'},
  {icon:'🪐',title:'Mid Layer A',desc:'Moderate speed, medium depth, gentle drift',depth:2,x:60,y:-120,color:'#6366f1'},
  {icon:'⭐',title:'Mid Layer B',desc:'Pairs with Mid A for spatial richness',depth:2,x:-100,y:80,color:'#4f46e5'},
  {icon:'🚀',title:'Foreground',desc:'Fastest parallax, nearest Z — the hero element',depth:1,x:140,y:60,color:'#818cf8'},
  {icon:'✨',title:'Overlay',desc:'Floats above all — lightest touch',depth:0.5,x:-30,y:-160,color:'#a78bfa'},
  {icon:'🎯',title:'Fixed Anchor',desc:'No parallax — provides visual stability',depth:0,x:200,y:140,color:'#c084fc'},
];

let depthScale = 600, spread = 200, scrollSpeed = 60;

const scene = document.getElementById('scene');
const cardScene = document.getElementById('cardScene');

function buildCards() {
  cardScene.innerHTML = '';
  cards.forEach((c,i) => {
    const el = document.createElement('div');
    el.className = 'depth-card';
    el.innerHTML = `<div class="icon">${c.icon}</div><div class="tag-row">depth ${c.depth}</div><h3>${c.title}</h3><p>${c.desc}</p>`;
    el.style.left = '50%';
    el.style.top = '50%';
    el.style.setProperty('--x', c.x+'px');
    el.style.setProperty('--y', c.y+'px');
    el.style.transform = `translate(calc(-50% + ${c.x}px), calc(-50% + ${c.y}px))`;
    el.style.borderColor = c.color+'40';
    el.style.boxShadow = `inset 0 0 30px ${c.color}15`;
    scene._cards = scene._cards || [];
    scene._cards[i] = el;
    cardScene.appendChild(el);
  });
}

function updateCards() {
  const sceneRect = scene.getBoundingClientRect();
  const sceneH = scene.offsetHeight;
  const progress = Math.max(0, Math.min(1, -sceneRect.top / (sceneH - window.innerHeight)));

  cards.forEach((c, i) => {
    const el = (scene._cards||[])[i];
    if(!el) return;
    const shift = progress * scrollSpeed * c.depth;
    const baseX = c.x, baseY = c.y;
    const tz = c.depth * (depthScale / 3);
    const scale = 1 + c.depth * 0.04;
    const opacity = 0.4 + (1 - c.depth * 0.08) * 0.6;
    el.style.transform = `translate(calc(-50% + ${baseX}px), calc(-50% + ${baseY - shift}px)) translateZ(${tz}px) scale(${scale})`;
    el.style.opacity = opacity;
    el.style.zIndex = Math.round((1 / (c.depth + 0.1)) * 10);
  });
}

buildCards();

let ticking = false;
window.addEventListener('scroll', () => {
  if(!ticking){requestAnimationFrame(()=>{updateCards();ticking=false;});ticking=true;}
}, {passive:true});

updateCards();

// Debug panel
document.getElementById('depth-range').addEventListener('input', function(){
  depthScale = +this.value;
  document.getElementById('depth-val').textContent = this.value;
  updateCards();
});
document.getElementById('spread-range').addEventListener('input', function(){
  spread = +this.value;
  document.getElementById('spread-val').textContent = this.value;
});
document.getElementById('speed-range').addEventListener('input', function(){
  scrollSpeed = +this.value;
  document.getElementById('speed-val').textContent = this.value;
  updateCards();
});
</script>
</body>
</html>
