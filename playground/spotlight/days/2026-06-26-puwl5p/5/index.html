<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spring Pill Tag Input</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080f;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:30px 20px;color:#e2e8f0}
h1{font-size:clamp(.9rem,2.5vw,1.1rem);font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:#374151}

.field-wrap{width:min(560px,100%)}
.field-label{font-size:12px;color:#6b7280;letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}

/* Tag input box */
.tag-input-box{
  min-height:52px;border-radius:14px;
  border:1.5px solid #1e2040;background:#0d0e1e;
  padding:8px 10px;display:flex;flex-wrap:wrap;
  gap:6px;align-items:center;cursor:text;
  transition:border-color .2s,box-shadow .2s;
  position:relative;
}
.tag-input-box:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px #6366f120}

/* Individual tag pill */
.tag-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:12px;font-weight:600;
  cursor:default;user-select:none;
  animation:tag-in .2s cubic-bezier(0.34,1.56,0.64,1);
  will-change:transform;
}
@keyframes tag-in{
  from{transform:scale(.5);opacity:0}
  to{transform:scale(1);opacity:1}
}
.tag-pill .remove{
  cursor:pointer;width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;line-height:1;opacity:.7;
  transition:background .15s,opacity .15s;
  flex-shrink:0;
}
.tag-pill .remove:hover{opacity:1;background:rgba(0,0,0,.2)}

/* Text input inside box */
.tag-input-text{
  border:none;background:transparent;outline:none;
  color:#e2e8f0;font-size:13px;font-family:inherit;
  min-width:80px;flex:1;padding:2px 0;caret-color:#6366f1;
}
.tag-input-text::placeholder{color:#374151}

/* Dropdown suggestions */
.suggestions{
  position:absolute;left:0;right:0;top:calc(100% + 6px);
  background:#0d0e1e;border:1.5px solid #1e2040;border-radius:12px;
  overflow:hidden;z-index:50;max-height:200px;overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,.6);
  animation:drop-in .15s ease-out;
}
@keyframes drop-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.suggestion-item{
  padding:9px 14px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:background .1s;
}
.suggestion-item:hover,.suggestion-item.highlighted{background:#1a1c30}
.suggestion-item .s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.suggestion-item .s-text{flex:1}
.suggestion-item .s-check{font-size:12px;color:#4ade80;opacity:0}
.suggestion-item.selected .s-check{opacity:1}
.empty-msg{padding:14px;font-size:12px;color:#374151;text-align:center}

/* Different input flavors */
.flavor-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.flavor-btn{padding:5px 12px;border:1px solid #1e2040;background:transparent;color:#6b7280;border-radius:20px;font-size:11px;cursor:pointer;transition:.15s}
.flavor-btn:hover{border-color:#6366f140;color:#e2e8f0}
.flavor-btn.active{border-color:#6366f1;color:#a78bfa;background:#6366f110}

.demo-section{width:min(560px,100%)}
.demo-section h2{font-size:12px;color:#4b5563;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}

.tag-colors=[
  {label:'violet',bg:'#4f46e540',text:'#a78bfa',dot:'#6366f1'},
  {label:'cyan',bg:'#0891b240',text:'#22d3ee',dot:'#06b6d4'},
  {label:'pink',bg:'#be185d40',text:'#f472b6',dot:'#ec4899'},
  {label:'green',bg:'#15803d40',text:'#4ade80',dot:'#22c55e'},
  {label:'amber',bg:'#b4530040',text:'#fbbf24',dot:'#f59e0b'},
  {label:'red',bg:'#b91c1c40',text:'#f87171',dot:'#ef4444'},
];

footer{position:fixed;bottom:12px;text-align:center;font-size:11px;color:#374151}
</style>
</head>
<body>
<h1>Spring Pill Tag Input</h1>

<div class="field-wrap">
  <div class="field-label">Favorite Technologies</div>
  <div class="tag-input-box" id="box1">
    <input type="text" class="tag-input-text" id="inp1" placeholder="Type to add tags..." autocomplete="off">
    <div class="suggestions" id="sug1" style="display:none"></div>
  </div>
  <div class="flavor-row">
    <button class="flavor-btn active" onclick="setLayout('wrap',this)">Wrap</button>
    <button class="flavor-btn" onclick="setLayout('scroll',this)">Scroll Row</button>
    <button class="flavor-btn" onclick="setLayout('stack',this)">Stack</button>
    <button class="flavor-btn" onclick="clearAll()">Clear All</button>
  </div>
</div>

<div class="demo-section">
  <h2>Quick presets</h2>
  <div id="presets" style="display:flex;flex-wrap:wrap;gap:6px"></div>
</div>

<div class="demo-section">
  <h2>Selected (JSON output)</h2>
  <pre id="json-out" style="background:#0d0e1e;border:1px solid #1e2040;border-radius:10px;padding:12px;font-size:11px;color:#a78bfa;overflow:auto;max-height:80px;white-space:pre-wrap"></pre>
</div>

<footer>Inspired by animated tag/pill input pattern · UI Spotlight Day 41 · Drop #5</footer>

<script>
const SUGGESTIONS_DATA = [
  {name:'JavaScript',color:'#f59e0b'},{name:'TypeScript',color:'#3b82f6'},
  {name:'React',color:'#38bdf8'},{name:'Vue',color:'#4ade80'},
  {name:'Svelte',color:'#f97316'},{name:'Next.js',color:'#e2e8f0'},
  {name:'CSS',color:'#a78bfa'},{name:'WebGL',color:'#f472b6'},
  {name:'Rust',color:'#f97316'},{name:'Go',color:'#22d3ee'},
  {name:'Python',color:'#fbbf24'},{name:'Bun',color:'#f5d261'},
  {name:'WebAssembly',color:'#6366f1'},{name:'Deno',color:'#6b7280'},
  {name:'Tailwind',color:'#38bdf8'},{name:'Web Audio',color:'#c084fc'},
  {name:'Three.js',color:'#e2e8f0'},{name:'Canvas API',color:'#34d399'},
];

let selected = [];
let highlighted = -1;

const box = document.getElementById('box1');
const inp = document.getElementById('inp1');
const sug = document.getElementById('sug1');

function getColor(name){
  const d = SUGGESTIONS_DATA.find(s=>s.name.toLowerCase()===name.toLowerCase());
  return d ? d.color : '#6366f1';
}

function renderTags(){
  // Remove old pills
  box.querySelectorAll('.tag-pill').forEach(el=>el.remove());
  selected.forEach(tag=>{
    const pill = document.createElement('div');
    pill.className='tag-pill';
    const c = getColor(tag);
    pill.style.background = c+'25';
    pill.style.color = c;
    pill.style.border = `1px solid ${c}40`;
    pill.innerHTML=`${tag}<span class="remove" data-tag="${tag}" title="Remove">✕</span>`;
    pill.querySelector('.remove').addEventListener('click',e=>{
      e.stopPropagation();
      const el = e.currentTarget;
      el.closest('.tag-pill').style.animation='tag-out .15s forwards';
      setTimeout(()=>{
        selected=selected.filter(t=>t!==el.dataset.tag);
        renderTags();updateJSON();
      },140);
    });
    // Insert before input
    box.insertBefore(pill, inp);
  });
  updateJSON();
}

function addTag(name){
  const trimmed=name.trim();
  if(!trimmed||selected.includes(trimmed)) return;
  selected.push(trimmed);
  renderTags();
  inp.value='';
  renderSuggestions('');
  sug.style.display='none';
  inp.focus();
}

function renderSuggestions(q){
  const lower=q.toLowerCase();
  const matches = SUGGESTIONS_DATA
    .filter(s=>s.name.toLowerCase().includes(lower))
    .slice(0,8);
  if(!matches.length){
    sug.innerHTML=q?`<div class="empty-msg">Press Enter to add "<b>${q}</b>"</div>`:'<div class="empty-msg">Start typing...</div>';
    highlighted=-1;
    return;
  }
  sug.innerHTML=matches.map((s,i)=>`
    <div class="suggestion-item${selected.includes(s.name)?' selected':''}" data-name="${s.name}" data-idx="${i}">
      <div class="s-dot" style="background:${s.color}"></div>
      <div class="s-text">${highlight(s.name,q)}</div>
      <div class="s-check">✓</div>
    </div>`).join('');
  sug.querySelectorAll('.suggestion-item').forEach(el=>{
    el.addEventListener('mousedown',e=>{e.preventDefault();addTag(el.dataset.name);});
    el.addEventListener('mouseenter',()=>{
      sug.querySelectorAll('.suggestion-item').forEach((e,i)=>{
        e.classList.toggle('highlighted',i===+el.dataset.idx);
      });
      highlighted=+el.dataset.idx;
    });
  });
  highlighted=-1;
}

function highlight(text,q){
  if(!q)return text;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return text;
  return text.slice(0,i)+`<b style="color:#e2e8f0">${text.slice(i,i+q.length)}</b>`+text.slice(i+q.length);
}

inp.addEventListener('input',()=>{
  const v=inp.value;
  sug.style.display='block';
  renderSuggestions(v);
});
inp.addEventListener('focus',()=>{
  sug.style.display='block';
  renderSuggestions(inp.value);
});
inp.addEventListener('blur',()=>{
  setTimeout(()=>{sug.style.display='none';},120);
});
inp.addEventListener('keydown',e=>{
  const items=[...sug.querySelectorAll('.suggestion-item')];
  if(e.key==='ArrowDown'){highlighted=Math.min(highlighted+1,items.length-1);updateHighlight(items);e.preventDefault();}
  if(e.key==='ArrowUp'){highlighted=Math.max(highlighted-1,-1);updateHighlight(items);e.preventDefault();}
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    if(highlighted>=0&&items[highlighted]) addTag(items[highlighted].dataset.name);
    else if(inp.value.trim()) addTag(inp.value);
  }
  if(e.key==='Backspace'&&!inp.value&&selected.length){
    const last=selected[selected.length-1];
    selected.pop();renderTags();
  }
  if(e.key==='Escape'){sug.style.display='none';}
});
box.addEventListener('click',()=>inp.focus());

function updateHighlight(items){
  items.forEach((el,i)=>el.classList.toggle('highlighted',i===highlighted));
}
function updateJSON(){
  document.getElementById('json-out').textContent=JSON.stringify(selected,null,2);
}

function setLayout(mode,btn){
  document.querySelectorAll('.flavor-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(mode==='scroll'){
    box.style.flexWrap='nowrap';box.style.overflowX='auto';
  } else if(mode==='stack'){
    box.style.flexWrap='wrap';box.style.flexDirection='column';box.style.overflowX='';
  } else {
    box.style.flexWrap='wrap';box.style.flexDirection='';box.style.overflowX='';
  }
}
function clearAll(){
  selected=[];renderTags();
}

// Presets
const PRESETS=[
  {label:'Frontend Stack',tags:['React','TypeScript','CSS']},
  {label:'Systems',tags:['Rust','WebAssembly','Go']},
  {label:'Graphics',tags:['WebGL','Canvas API','Three.js']},
];
const presetsEl=document.getElementById('presets');
PRESETS.forEach(p=>{
  const btn=document.createElement('button');
  btn.className='flavor-btn';
  btn.textContent=p.label;
  btn.onclick=()=>{
    selected=[...p.tags];renderTags();
  };
  presetsEl.appendChild(btn);
});

// Add spring pop animation for removal
const style=document.createElement('style');
style.textContent=`@keyframes tag-out{to{transform:scale(.5);opacity:0}}`;
document.head.appendChild(style);

updateJSON();
</script>
</body>
</html>
