<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Magnetic Buttons &amp; Cursor Follower — UI Spotlight</title>
<style>
  :root{ --accent:#fbbf24; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#0d0a05;color:#fff8e8;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;cursor:none;}

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    background:rgba(30,24,10,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
    cursor:none;
  }
  #debug{
    position:fixed; top:16px; right:16px; z-index:50; width:210px;
    background:rgba(30,24,10,0.7); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px; cursor:none;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#fd9;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug input[type=range]{flex:1;accent-color:var(--accent);}
  @media (max-width:640px){ #debug{ display:none; } html,body{cursor:auto;} .back-link{cursor:pointer;} }

  main{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px;
  }
  h1{ font-size:clamp(1.6rem,4vw,2.4rem); margin:0; font-weight:800; }
  p.hint{ color:rgba(255,255,255,0.4); font-size:13px; margin:0 0 10px; }

  .row-buttons{ display:flex; gap:22px; flex-wrap:wrap; justify-content:center; max-width:640px; }
  .magnetic{
    position:relative; border:none; border-radius:16px; padding:20px 32px; font-size:15px; font-weight:700;
    color:#1a1406; background:linear-gradient(135deg,#fbbf24,#f59e0b); cursor:none;
    transition:transform 220ms cubic-bezier(.34,1.56,.64,1);
    will-change:transform;
  }
  .magnetic.outline{ background:transparent; color:#fff8e8; border:2px solid rgba(251,191,36,0.6); }
  .magnetic .txt{ position:relative; z-index:1; }

  #follower{
    position:fixed; top:0; left:0; width:16px; height:16px; border-radius:50%;
    background:rgba(251,191,36,0.85); pointer-events:none; z-index:100;
    transform:translate(-50%,-50%); transition:width 180ms ease, height 180ms ease, background 180ms ease;
  }

  footer{
    position:fixed; bottom:10px; left:50%; transform:translateX(-50%); z-index:50;
    font-size:11px; color:rgba(255,255,255,0.4); background:rgba(20,16,8,0.5); backdrop-filter:blur(8px);
    padding:6px 12px; border-radius:999px; white-space:nowrap; cursor:none;
  }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Magnetic Debug</h4>
  <div class="row"><span>Pull strength</span><input type="range" id="strength" min="10" max="60" value="32"></div>
  <div class="row"><span>Follower lag</span><input type="range" id="lag" min="5" max="40" value="18"></div>
</div>

<main>
  <h1>Magnetic Pull Buttons</h1>
  <p class="hint">Hover any button &mdash; it drags toward your cursor, then springs back on release</p>
  <div class="row-buttons">
    <button class="magnetic" data-magnetic><span class="txt">Get Started</span></button>
    <button class="magnetic outline" data-magnetic><span class="txt">Learn More</span></button>
    <button class="magnetic" data-magnetic><span class="txt">Contact</span></button>
  </div>
</main>

<div id="follower"></div>

<footer>Inspired by Cuberto &middot; UI Spotlight Day 55 &middot; Drop #4</footer>

<script>
(function(){
  "use strict";
  const strengthEl = document.getElementById('strength');
  const lagEl = document.getElementById('lag');
  const follower = document.getElementById('follower');
  const magnets = Array.from(document.querySelectorAll('[data-magnetic]'));
  const isTouch = matchMedia('(pointer:coarse)').matches;

  if(isTouch){
    follower.style.display = 'none';
    document.body.style.cursor = 'auto';
  }

  // --- Magnetic pull ---
  magnets.forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const strength = parseInt(strengthEl.value, 10) / 100;
      const dx = e.clientX - (rect.left + rect.width/2);
      const dy = e.clientY - (rect.top + rect.height/2);
      btn.style.transition = 'transform 60ms linear';
      btn.style.transform = `translate(${dx*strength}px, ${dy*strength}px)`;
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transition = 'transform 500ms cubic-bezier(.34,1.56,.64,1)';
      btn.style.transform = 'translate(0px,0px)';
    });
  });

  // --- Cursor follower with lag ---
  let target = { x: innerWidth/2, y: innerHeight/2 };
  let current = { x: target.x, y: target.y };

  window.addEventListener('mousemove', (e) => { target.x = e.clientX; target.y = e.clientY; });

  magnets.forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      follower.style.width = '54px'; follower.style.height = '54px';
      follower.style.background = 'rgba(251,191,36,0.28)';
    });
    btn.addEventListener('mouseleave', () => {
      follower.style.width = '16px'; follower.style.height = '16px';
      follower.style.background = 'rgba(251,191,36,0.85)';
    });
  });

  function raf(){
    const lag = parseInt(lagEl.value, 10) / 100;
    current.x += (target.x - current.x) * lag;
    current.y += (target.y - current.y) * lag;
    follower.style.transform = `translate(${current.x}px, ${current.y}px) translate(-50%,-50%)`;
    requestAnimationFrame(raf);
  }
  if(!isTouch) requestAnimationFrame(raf);
})();
</script>
</body>
</html>
