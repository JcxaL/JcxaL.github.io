<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>True Masonry, No JS — UI Spotlight</title>
<style>
  :root{ --accent:#34d399; }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#070c0a;color:#eafff5;font-family:system-ui,-apple-system,sans-serif;min-height:100%;}

  .back-link{
    position:fixed; top:16px; left:16px; z-index:50;
    background:rgba(14,26,20,0.6); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.12);
    color:#fff; text-decoration:none; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
  }
  #debug{
    position:fixed; top:16px; right:16px; z-index:50; width:210px;
    background:rgba(14,26,20,0.7); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:14px; font-size:12px;
  }
  #debug h4{margin:0 0 10px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9dd;}
  #debug .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
  #debug input[type=range]{flex:1;accent-color:var(--accent);}
  #debug button{width:100%;border:none;border-radius:8px;padding:8px;background:rgba(52,211,153,0.2);color:#eafff5;font-weight:600;cursor:pointer;margin-top:4px;}
  #debug .stat{color:var(--accent);font-weight:700;}
  @media (max-width:640px){ #debug{ display:none; } }

  header{ padding:90px 24px 20px; text-align:center; }
  header h1{ font-size:clamp(1.8rem,5vw,3rem); margin:0 0 8px; font-weight:800; }
  header p{ color:rgba(255,255,255,0.55); margin:0; font-size:14px; }

  #grid{
    max-width:1100px; margin:0 auto; padding:24px; padding-bottom:60px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    grid-auto-rows: 6px;
    gap: 14px;
  }
  /* Progressive enhancement: real masonry where the browser supports it */
  @supports (display:masonry) {
    #grid{ display:masonry; masonry-direction:column; grid-auto-rows:unset; }
    #grid .card{ grid-row-end:auto !important; }
  }
  .card{
    border-radius:16px; padding:18px; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
  }
  .card h3{ margin:0 0 8px; font-size:15px; }
  .card p{ margin:0; font-size:12.5px; color:rgba(255,255,255,0.6); line-height:1.5; }
  .card .swatch{ width:100%; border-radius:10px; margin-bottom:10px; }

  footer{
    text-align:center; font-size:11px; color:rgba(255,255,255,0.4); padding:0 0 30px;
  }
</style>
</head>
<body>
<a href="../" class="back-link">&larr; All 5 drops</a>

<div id="debug">
  <h4>Masonry Debug</h4>
  <div class="row"><span>Native masonry</span><span class="stat" id="nativeSupport">checking&hellip;</span></div>
  <div class="row"><span>Gap (px)</span><input type="range" id="gap" min="6" max="30" value="14"></div>
  <div class="row"><span>Min column</span><input type="range" id="minCol" min="120" max="260" value="180"></div>
  <button id="shuffleBtn">Shuffle heights</button>
</div>

<header>
  <h1>True Masonry, No JS</h1>
  <p>CSS Grid's native <code>display:masonry</code>, with a same-pixel JS fallback for every other browser</p>
</header>

<div id="grid"></div>

<footer>Inspired by Chrome for Developers &middot; UI Spotlight Day 55 &middot; Drop #2</footer>

<script>
(function(){
  "use strict";
  const grid = document.getElementById('grid');
  const gapEl = document.getElementById('gap');
  const minColEl = document.getElementById('minCol');
  const nativeSupportEl = document.getElementById('nativeSupport');
  const shuffleBtn = document.getElementById('shuffleBtn');

  const swatches = ['#38bdf8','#34d399','#f87171','#fbbf24','#a78bfa','#22d3ee'];
  const titles = ['Bento Card','Field Notes','Study 01','Fragment','Signal','Layer','Motif','Sketch','Index','Trace','Loop','Study 02'];

  const nativeMasonry = CSS.supports('display', 'masonry');
  nativeSupportEl.textContent = nativeMasonry ? 'yes' : 'no (fallback)';

  function randomText(){
    const n = 1 + Math.floor(Math.random()*3);
    return Array.from({length:n}, () => 'The pattern reflows so every gap fills without empty holes.').join(' ');
  }

  function buildCards(count){
    grid.innerHTML = '';
    for(let i=0;i<count;i++){
      const card = document.createElement('div');
      card.className = 'card';
      const h = 40 + Math.floor(Math.random()*90);
      card.innerHTML = `<div class="swatch" style="height:${h}px;background:${swatches[i%swatches.length]};opacity:0.85"></div>
        <h3>${titles[i%titles.length]}</h3><p>${randomText()}</p>`;
      grid.appendChild(card);
    }
  }

  // JS fallback: give every card a grid-row-end span so it packs into the
  // 6px auto-row track like real masonry (used when display:masonry isn't supported).
  function layoutFallback(){
    if(nativeMasonry) return;
    const rowHeight = 6;
    const gap = parseInt(gapEl.value, 10);
    grid.style.gap = gap + 'px';
    Array.from(grid.children).forEach(card => {
      card.style.gridRowEnd = 'span 1';
      const contentHeight = card.scrollHeight;
      const span = Math.ceil((contentHeight + gap) / (rowHeight + gap));
      card.style.gridRowEnd = `span ${span}`;
    });
  }

  function applyGridSettings(){
    grid.style.gridTemplateColumns = `repeat(auto-fit, minmax(${minColEl.value}px, 1fr))`;
    grid.style.gap = gapEl.value + 'px';
    requestAnimationFrame(layoutFallback);
  }

  buildCards(14);
  applyGridSettings();
  new ResizeObserver(layoutFallback).observe(grid);

  gapEl.addEventListener('input', applyGridSettings);
  minColEl.addEventListener('input', applyGridSettings);
  shuffleBtn.addEventListener('click', () => { buildCards(14); applyGridSettings(); });
  window.addEventListener('resize', layoutFallback);
})();
</script>
</body>
</html>
