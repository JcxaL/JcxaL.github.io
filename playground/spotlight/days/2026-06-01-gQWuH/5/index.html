<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 5 — Swipe Card Stack</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;font-family:system-ui,sans-serif;color:#e0e0f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;overflow:hidden;user-select:none}
.stage{position:relative;width:min(340px,88vw);height:460px;}
.card{
  position:absolute;inset:0;border-radius:20px;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;
  padding:28px;overflow:hidden;
  cursor:grab;touch-action:none;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  transition:transform 0.05s linear;
  will-change:transform;
}
.card:active{cursor:grabbing}
.card .bg{position:absolute;inset:0;z-index:0}
.card-content{position:relative;z-index:1}
.card-tag{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;opacity:0.7;margin-bottom:8px}
.card-title{font-size:28px;font-weight:800;line-height:1.15;margin-bottom:10px}
.card-sub{font-size:13px;opacity:0.65;line-height:1.5}
.like-badge,.nope-badge{
  position:absolute;top:28px;right:28px;
  font-size:13px;font-weight:800;letter-spacing:0.1em;
  padding:6px 14px;border-radius:8px;border:2.5px solid;
  opacity:0;transition:opacity 0.1s;pointer-events:none;z-index:2;
}
.like-badge{color:#34d399;border-color:#34d399;transform:rotate(15deg)}
.nope-badge{color:#f87171;border-color:#f87171;transform:rotate(-15deg);right:auto;left:28px}
.hint{font-size:12px;color:#444;margin-top:20px;text-align:center}
#restoreBtn{
  margin-top:16px;padding:10px 24px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:#ccc;font-size:13px;cursor:pointer;
  transition:background 0.2s;display:none;
}
#restoreBtn:hover{background:rgba(255,255,255,0.12)}
.action-row{display:flex;gap:16px;margin-top:16px}
.act-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;transition:transform 0.15s,box-shadow 0.15s}
.act-btn:hover{transform:scale(1.1)}
#nopeBtn{background:rgba(248,113,113,0.15);border:2px solid rgba(248,113,113,0.5);color:#f87171}
#likeBtn{background:rgba(52,211,153,0.15);border:2px solid rgba(52,211,153,0.5);color:#34d399}
#superBtn{background:rgba(96,165,250,0.15);border:2px solid rgba(96,165,250,0.5);color:#60a5fa;font-size:16px}
footer{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;white-space:nowrap}
</style>
</head>
<body>
<div class="stage" id="stage"></div>
<div class="hint" id="hint">← Drag or swipe · Release to decide →</div>
<div class="action-row">
  <button class="act-btn" id="nopeBtn">✕</button>
  <button class="act-btn" id="superBtn">★</button>
  <button class="act-btn" id="likeBtn">♥</button>
</div>
<button id="restoreBtn">↩ Restore Cards</button>
<footer>Inspired by swipeable card stack · UI Spotlight Day 16 · Drop #5</footer>

<script>
const CARDS = [
  {tag:'Design System',title:'Components\nDone Right',sub:'Shared tokens, variant props, auto-documented in Storybook.',
    grad:'linear-gradient(145deg,#1a0533 0%,#3b0f6f 50%,#5b2dba 100%)'},
  {tag:'Motion',title:'Spring\nPhysics',sub:'Natural easing that reacts to interrupt and velocity, not duration.',
    grad:'linear-gradient(145deg,#0a1a10 0%,#0a3020 50%,#0a5030 100%)'},
  {tag:'Typography',title:'Variable\nFonts',sub:'One file. Infinite weight, width, and optical size variations.',
    grad:'linear-gradient(145deg,#1a0a08 0%,#3a1008 50%,#7a2010 100%)'},
  {tag:'Layout',title:'Container\nQueries',sub:'Components that respond to their parent, not the viewport.',
    grad:'linear-gradient(145deg,#0a1020 0%,#0a2040 50%,#0a3070 100%)'},
  {tag:'Interaction',title:'Pointer\nEvents',sub:'Mouse, touch, and stylus unified under a single event model.',
    grad:'linear-gradient(145deg,#10100a 0%,#202000 50%,#504000 100%)'},
];

const stage = document.getElementById('stage');
let stack = [];
let dragging = null, startX, startY, startCardX, startCardY;

function buildCard(data, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.idx = idx;
  card.style.zIndex = CARDS.length - idx;
  card.style.transform = `translateY(${idx * -6}px) scale(${1 - idx * 0.04})`;
  card.style.opacity = idx > 2 ? 0 : 1 - idx * 0.08;
  card.innerHTML = `
    <div class="bg" style="background:${data.grad}"></div>
    <span class="like-badge" id="like-${idx}">LIKE</span>
    <span class="nope-badge" id="nope-${idx}">NOPE</span>
    <div class="card-content">
      <div class="card-tag">${data.tag}</div>
      <div class="card-title">${data.title.replace('\n','<br>')}</div>
      <div class="card-sub">${data.sub}</div>
    </div>`;
  return card;
}

function buildStack() {
  stage.innerHTML = '';
  stack = [];
  CARDS.forEach((d, i) => {
    const c = buildCard(d, i);
    stage.appendChild(c);
    stack.push(c);
  });
  attachEvents(stack[0]);
  document.getElementById('restoreBtn').style.display = 'none';
  document.getElementById('hint').textContent = '← Drag or swipe · Release to decide →';
}

function attachEvents(card) {
  if (!card) return;
  card.addEventListener('pointerdown', onDown);
}

function updateStack() {
  stack.forEach((c, i) => {
    c.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s';
    c.style.transform = `translateY(${i * -6}px) scale(${1 - i * 0.04})`;
    c.style.opacity = i > 2 ? 0 : (1 - i * 0.08).toString();
    c.style.zIndex = (stack.length - i).toString();
  });
  setTimeout(() => stack.forEach(c => c.style.transition = ''), 350);
  if (stack.length > 0) attachEvents(stack[0]);
  if (stack.length === 0) {
    document.getElementById('restoreBtn').style.display = 'block';
    document.getElementById('hint').textContent = 'All cards gone!';
  }
}

function flyOut(card, dir) {
  const x = dir === 'right' ? window.innerWidth : -window.innerWidth;
  const rot = dir === 'right' ? 30 : -30;
  card.style.transition = 'transform 0.4s cubic-bezier(0.25,1,0.5,1), opacity 0.3s';
  card.style.transform = `translateX(${x}px) rotate(${rot}deg)`;
  card.style.opacity = '0';
  setTimeout(() => card.remove(), 420);
  stack.shift();
  updateStack();
}

function onDown(e) {
  e.preventDefault();
  dragging = e.currentTarget;
  startX = e.clientX; startY = e.clientY;
  startCardX = 0; startCardY = 0;
  dragging.style.transition = 'none';
  dragging.setPointerCapture(e.pointerId);
  dragging.addEventListener('pointermove', onMove);
  dragging.addEventListener('pointerup', onUp);
}

function onMove(e) {
  if (!dragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  const rot = dx * 0.06;
  dragging.style.transform = `translate(${dx}px,${dy}px) rotate(${rot}deg)`;

  const thresh = 60;
  const like = dragging.querySelector('[id^=like]');
  const nope = dragging.querySelector('[id^=nope]');
  like.style.opacity = Math.max(0, Math.min(1, (dx - thresh/2) / thresh));
  nope.style.opacity = Math.max(0, Math.min(1, (-dx - thresh/2) / thresh));
}

function onUp(e) {
  if (!dragging) return;
  const dx = e.clientX - startX;
  dragging.removeEventListener('pointermove', onMove);
  dragging.removeEventListener('pointerup', onUp);

  if (Math.abs(dx) > 80) {
    flyOut(dragging, dx > 0 ? 'right' : 'left');
  } else {
    dragging.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
    dragging.style.transform = `translateY(0px) scale(1)`;
    const like = dragging.querySelector('[id^=like]');
    const nope = dragging.querySelector('[id^=nope]');
    like.style.opacity = nope.style.opacity = '0';
  }
  dragging = null;
}

document.getElementById('likeBtn').addEventListener('click', () => {
  if (stack.length) flyOut(stack[0], 'right');
});
document.getElementById('nopeBtn').addEventListener('click', () => {
  if (stack.length) flyOut(stack[0], 'left');
});
document.getElementById('superBtn').addEventListener('click', () => {
  if (!stack.length) return;
  const c = stack[0];
  c.style.transition = 'transform 0.4s ease, opacity 0.3s';
  c.style.transform = 'translateY(-150%) scale(0.8)';
  c.style.opacity = '0';
  setTimeout(() => c.remove(), 420);
  stack.shift();
  updateStack();
});
document.getElementById('restoreBtn').addEventListener('click', buildStack);

buildStack();
</script>
</body>
</html>
