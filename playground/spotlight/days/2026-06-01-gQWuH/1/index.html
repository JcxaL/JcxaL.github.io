<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 1 — CSS Cover Flow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;font-family:system-ui,sans-serif;color:#e0e0f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:24px;overflow:hidden}
h2{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#555}
.hint{font-size:12px;color:#444;margin-top:-12px}

/* Cover Flow container */
.cf-wrap{
  --sz: clamp(120px, 22vw, 180px);
  width: 100vw;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  perspective: 40em;
  padding: calc(var(--sz)*0.2) 0;
  scrollbar-width: none;
}
.cf-wrap::-webkit-scrollbar{display:none}
.cf-list{
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 calc(50vw - var(--sz)/2);
  list-style: none;
}
.cf-item{
  flex-shrink: 0;
  width: var(--sz);
  aspect-ratio: 1;
  scroll-snap-align: center;
  cursor: pointer;

  /* named view timeline on the inline axis */
  view-timeline-name: --cover;
  view-timeline-axis: inline;

  /* z-index animation: peak at center */
  animation: adjust-z linear both;
  animation-timeline: --cover;
}
.cf-cover{
  width: 100%;
  height: 100%;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);

  /* rotation animation driven by the parent's view timeline */
  animation: rotate-cover linear both;
  animation-timeline: --cover;
}
.cf-cover-bg{
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
}
.cf-title{
  font-size: 13px; font-weight: 700; text-align: center;
  color: rgba(255,255,255,0.9); z-index: 1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  padding: 0 8px;
}
.cf-sub{
  font-size: 10px; color: rgba(255,255,255,0.6); text-align: center;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.reflect{
  width: 100%; height: calc(var(--sz)*0.35);
  margin-top: 4px;
  transform: scaleY(-1);
  opacity: 0.3;
  mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
  border-radius: 0 0 10px 10px;
  overflow: hidden;
}
.reflect .cf-cover{
  /* cancel the cover animation on the reflection */
  animation: none;
  transform: none;
}

@keyframes rotate-cover {
  0%   { transform: translateX(-80%) rotateY(-45deg) scale(0.8); }
  35%  { transform: translateX(0)    rotateY(-45deg) scale(0.9); }
  50%  { transform: rotateY(0deg)    scale(1.15); box-shadow: 0 24px 60px rgba(0,0,0,0.9); }
  65%  { transform: translateX(0)    rotateY(45deg)  scale(0.9); }
  100% { transform: translateX(80%)  rotateY(45deg)  scale(0.8); }
}

@keyframes adjust-z {
  0%   { z-index: 1; }
  49%  { z-index: 1; }
  50%  { z-index: 100; }
  51%  { z-index: 100; }
  100% { z-index: 1; }
}

footer{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#333;white-space:nowrap;z-index:10}
</style>
</head>
<body>
<h2>CSS Scroll-Driven Cover Flow</h2>
<div class="cf-wrap" id="cfw">
  <ul class="cf-list" id="cfl"></ul>
</div>
<p class="hint">← scroll the carousel →</p>
<footer>Inspired by Bramus Van Damme · scroll-driven-animations.style · UI Spotlight Day 16 · Drop #1</footer>

<script>
const ALBUMS = [
  {title:'Neon Dreams',sub:'Synthwave',grad:'linear-gradient(135deg,#4f0080 0%,#cc00ff 100%)',icon:'◈'},
  {title:'Ocean Deep',sub:'Ambient',grad:'linear-gradient(135deg,#001a4f 0%,#0066ff 100%)',icon:'◉'},
  {title:'Solar Flare',sub:'Electronic',grad:'linear-gradient(135deg,#7f2000 0%,#ff6600 100%)',icon:'✦'},
  {title:'Verdant',sub:'Jazz Fusion',grad:'linear-gradient(135deg,#003a20 0%,#00cc66 100%)',icon:'❋'},
  {title:'Eclipse',sub:'Post-Rock',grad:'linear-gradient(135deg,#1a1a1a 0%,#666 100%)',icon:'◐'},
  {title:'Crimson',sub:'Indie Rock',grad:'linear-gradient(135deg,#4f0000 0%,#ff0033 100%)',icon:'♦'},
  {title:'Aureate',sub:'Neo-Soul',grad:'linear-gradient(135deg,#4f3a00 0%,#ffcc00 100%)',icon:'★'},
  {title:'Abyssal',sub:'Dark Ambient',grad:'linear-gradient(135deg,#0a0030 0%,#3300cc 100%)',icon:'⬟'},
  {title:'Borealis',sub:'Chillwave',grad:'linear-gradient(135deg,#003040 0%,#00ffcc 100%)',icon:'⬡'},
];

const list = document.getElementById('cfl');
const wrap = document.getElementById('cfw');

ALBUMS.forEach(a => {
  const li = document.createElement('li');
  li.className = 'cf-item';

  const cover = document.createElement('div');
  cover.className = 'cf-cover';
  cover.innerHTML = `<div class="cf-cover-bg" style="background:${a.grad}">
    <span style="font-size:40px;line-height:1">${a.icon}</span>
    <div class="cf-title">${a.title}</div>
    <div class="cf-sub">${a.sub}</div>
  </div>`;

  // Reflection
  const ref = document.createElement('div');
  ref.className = 'reflect';
  const refCover = cover.cloneNode(true);
  refCover.className = 'cf-cover';
  refCover.style.transform = 'none';
  ref.appendChild(refCover);

  li.appendChild(cover);
  li.appendChild(ref);
  list.appendChild(li);
});

// Scroll to center (4th item) on load
requestAnimationFrame(() => {
  const items = list.querySelectorAll('.cf-item');
  if (items[3]) {
    const r = items[3].getBoundingClientRect();
    const wr = wrap.getBoundingClientRect();
    wrap.scrollLeft = items[3].offsetLeft - (wrap.clientWidth / 2) + (items[3].offsetWidth / 2);
  }
});
</script>
</body>
</html>
