<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 3 — Scroll-Driven Font Weight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060e;font-family:system-ui,sans-serif;color:#e0e0f0;overflow-x:hidden}

/* Register the animated property so interpolation works */
@property --fw {
  syntax: '<number>';
  inherits: true;
  initial-value: 100;
}
@property --alpha {
  syntax: '<number>';
  inherits: false;
  initial-value: 0;
}

.section{
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;gap:24px;position:relative;
}

/* Scroll-driven animation: font-weight tracks scroll position within each section */
.word{
  --fw: 100;
  font-weight: var(--fw);
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,0.15);
  line-height: 1;
  text-align: center;
  cursor: default;
  user-select: none;

  animation: weight-wave linear both;
  animation-timeline: view();
  animation-range: entry 0% cover 60%;
}

@keyframes weight-wave {
  from { --fw: 100; -webkit-text-stroke: 1px rgba(255,255,255,0.1); color: transparent; }
  to   { --fw: 900; -webkit-text-stroke: 0px transparent; color: #fff; }
}

/* Section 1 — huge single word */
.s1 .word{font-size:clamp(72px,18vw,180px);letter-spacing:-0.04em;}
/* Section 2 — stacked words */
.s2 .word{font-size:clamp(48px,11vw,120px);letter-spacing:-0.03em;}
/* Section 3 — descriptor words */
.s3 .word{font-size:clamp(36px,8vw,80px);letter-spacing:-0.02em;}
/* Section 4 — fine text */
.s4 .word{font-size:clamp(28px,6vw,64px);letter-spacing:-0.01em;}
/* Section 5 — tagline */
.s5 .word{font-size:clamp(24px,5vw,56px);letter-spacing:0.02em;}

/* Each word in a row gets staggered range offset */
.row{display:flex;flex-wrap:wrap;justify-content:center;gap:0.2em;align-items:baseline}
.row .word:nth-child(2){animation-range:entry 10% cover 70%;}
.row .word:nth-child(3){animation-range:entry 20% cover 80%;}
.row .word:nth-child(4){animation-range:entry 30% cover 90%;}

/* Accent colors per section */
.s1 .word{animation-name:weight-wave-purple}
.s2 .word{animation-name:weight-wave-blue}
.s3 .word{animation-name:weight-wave-green}
.s4 .word{animation-name:weight-wave-rose}
.s5 .word{animation-name:weight-wave-gold}

@keyframes weight-wave-purple {
  from { --fw:100; color:transparent; -webkit-text-stroke:1px rgba(167,139,250,0.2);}
  to   { --fw:900; color:#a78bfa; -webkit-text-stroke:0px transparent;}
}
@keyframes weight-wave-blue {
  from { --fw:100; color:transparent; -webkit-text-stroke:1px rgba(96,165,250,0.2);}
  to   { --fw:900; color:#60a5fa; -webkit-text-stroke:0px transparent;}
}
@keyframes weight-wave-green {
  from { --fw:100; color:transparent; -webkit-text-stroke:1px rgba(52,211,153,0.2);}
  to   { --fw:900; color:#34d399; -webkit-text-stroke:0px transparent;}
}
@keyframes weight-wave-rose {
  from { --fw:100; color:transparent; -webkit-text-stroke:1px rgba(244,114,182,0.2);}
  to   { --fw:900; color:#f472b6; -webkit-text-stroke:0px transparent;}
}
@keyframes weight-wave-gold {
  from { --fw:100; color:transparent; -webkit-text-stroke:1px rgba(251,191,36,0.2);}
  to   { --fw:900; color:#fbbf24; -webkit-text-stroke:0px transparent;}
}

.label{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#333;position:absolute;top:28px;left:50%;transform:translateX(-50%);white-space:nowrap}
.scroll-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#444;display:flex;align-items:center;gap:6px;
  animation:fade-hint 3s ease 1s forwards;}
@keyframes fade-hint{0%{opacity:1}80%{opacity:1}100%{opacity:0;pointer-events:none}}
.progress{position:fixed;top:0;left:0;height:2px;background:#a78bfa;z-index:100;transition:width 0.1s}
footer{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#222;white-space:nowrap;z-index:100}
</style>
</head>
<body>
<div class="progress" id="prog"></div>
<div class="scroll-hint">↓ Scroll to animate font weight</div>

<div class="section s1">
  <span class="label">01 — Weight</span>
  <div class="row">
    <span class="word">BOLD</span>
  </div>
</div>

<div class="section s2">
  <span class="label">02 — Identity</span>
  <div class="row">
    <span class="word">YOUR</span>
    <span class="word">BRAND</span>
  </div>
</div>

<div class="section s3">
  <span class="label">03 — Motion</span>
  <div class="row">
    <span class="word">TYPE</span>
    <span class="word">IN</span>
    <span class="word">MOTION</span>
  </div>
</div>

<div class="section s4">
  <span class="label">04 — Contrast</span>
  <div class="row">
    <span class="word">LIGHT</span>
    <span class="word">TO</span>
    <span class="word">HEAVY</span>
  </div>
</div>

<div class="section s5">
  <span class="label">05 — Statement</span>
  <div class="row">
    <span class="word">SCROLL</span>
    <span class="word">DRIVES</span>
    <span class="word">EVERYTHING</span>
  </div>
</div>

<footer>Inspired by CSS Scroll-Driven Animations + @property · view() timeline · UI Spotlight Day 16 · Drop #3</footer>

<script>
window.addEventListener('scroll', () => {
  const prog = document.getElementById('prog');
  const t = document.documentElement.scrollTop / (document.documentElement.scrollHeight - window.innerHeight);
  prog.style.width = (t * 100) + '%';
}, {passive: true});
</script>
</body>
</html>
