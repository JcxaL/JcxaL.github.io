<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drop 3 — Variable Font Wave</title>
<style>
@supports not (font-variation-settings: normal) {
  .warn{display:block!important}
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;font-family:system-ui,sans-serif;color:#e0e0f0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:48px;padding:32px;overflow:hidden}
.warn{display:none;color:#f87171;font-size:12px;text-align:center}
.vf-row{display:flex;flex-wrap:wrap;justify-content:center;gap:0;line-height:1.1;cursor:default;user-select:none}
.vf-row span{
  display:inline-block;
  font-size:clamp(36px,7vw,80px);
  font-weight:100;
  color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,0.15);
  letter-spacing:-0.01em;
  transition:
    font-weight 0.08s linear,
    -webkit-text-stroke 0.15s ease,
    color 0.15s ease;
  will-change:font-weight;
}
.vf-row span.space{width:0.3em;display:inline-block}
.vf-row span.lit{
  font-weight:900;
  color:#fff;
  -webkit-text-stroke:0px transparent;
}

.words-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2px;width:100%;max-width:900px}
.word-container{
  display:flex;justify-content:center;align-items:center;padding:24px 16px;
  border:1px solid rgba(255,255,255,0.06);border-radius:8px;
  background:rgba(255,255,255,0.02);
  cursor:default;overflow:hidden;
}

#panel{position:fixed;top:12px;right:12px;background:rgba(10,10,20,0.85);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:12px 14px;font-size:11px;color:#888;display:flex;flex-direction:column;gap:8px;min-width:160px;}
#panel label{display:flex;justify-content:space-between;align-items:center;color:#bbb;font-size:10px;gap:8px}
#panel input[type=range]{width:80px;accent-color:#7c3aed}
#panel select{background:#1a1a2e;color:#ccc;border:1px solid #333;border-radius:4px;padding:2px 4px;font-size:10px}
footer{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;white-space:nowrap}
</style>
</head>
<body>
<span class="warn">Your browser may not support variable fonts</span>

<div class="words-grid" id="wordsGrid"></div>

<div id="panel">
  <label>Wave speed <input type="range" id="speedSlider" min="1" max="20" value="8"></label>
  <label>Wave width <input type="range" id="widthSlider" min="1" max="12" value="4"></label>
  <label>Min weight <input type="range" id="minW" min="100" max="400" value="100" step="100"></label>
  <label>Max weight <input type="range" id="maxW" min="400" max="900" value="900" step="100"></label>
  <label>Color
    <select id="colorMode">
      <option value="white">White</option>
      <option value="gradient">Gradient</option>
      <option value="rainbow">Rainbow</option>
    </select>
  </label>
</div>
<footer>Inspired by variable font weight animation · UI Spotlight Day 16 · Drop #3</footer>

<script>
const WORDS = [
  'DESIGN', 'MOTION', 'TYPOGRAPHY', 'LAYOUT',
  'WEIGHT', 'CONTRAST', 'RHYTHM', 'SPACE',
  'FORM', 'FUNCTION', 'CLARITY', 'IMPACT'
];
const COLORS = ['#a78bfa','#60a5fa','#34d399','#f472b6','#fbbf24','#f87171','#38bdf8','#a3e635'];

let speed = 8, waveWidth = 4, minW = 100, maxW = 900, colorMode = 'white';
const rows = [];
let t = 0;

const grid = document.getElementById('wordsGrid');
WORDS.forEach((word, wi) => {
  const container = document.createElement('div');
  container.className = 'word-container';
  const row = document.createElement('div');
  row.className = 'vf-row';
  const spans = [];
  for (let i = 0; i < word.length; i++) {
    const s = document.createElement('span');
    s.textContent = word[i];
    if (colorMode === 'gradient') {
      s.style.color = COLORS[wi % COLORS.length];
    }
    row.appendChild(s);
    spans.push(s);
  }
  rows.push({ spans, word, wi });
  container.appendChild(row);
  grid.appendChild(container);
});

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function animate(ts) {
  t = ts * 0.001;
  rows.forEach(({ spans, wi }) => {
    spans.forEach((s, ci) => {
      const phase = (t * speed * 0.5 + wi * 0.7 + ci / waveWidth) % (Math.PI * 2);
      const sinVal = (Math.sin(phase) + 1) / 2;
      const fw = Math.round(minW + sinVal * (maxW - minW));
      s.style.fontWeight = fw;

      if (colorMode === 'white') {
        const bright = 100 + Math.round(sinVal * 155);
        s.style.color = `rgb(${bright},${bright},${bright})`;
        s.style.webkitTextStroke = '0px transparent';
      } else if (colorMode === 'gradient') {
        const col = COLORS[wi % COLORS.length];
        s.style.color = col;
        s.style.opacity = 0.3 + sinVal * 0.7;
        s.style.webkitTextStroke = '0px transparent';
      } else {
        // rainbow
        const hue = (t * 30 + wi * 40 + ci * 15) % 360;
        s.style.color = `hsl(${hue},80%,${50+sinVal*30}%)`;
        s.style.webkitTextStroke = '0px transparent';
      }
    });
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

document.getElementById('speedSlider').addEventListener('input', e => speed = +e.target.value);
document.getElementById('widthSlider').addEventListener('input', e => waveWidth = +e.target.value);
document.getElementById('minW').addEventListener('input', e => minW = +e.target.value);
document.getElementById('maxW').addEventListener('input', e => maxW = +e.target.value);
document.getElementById('colorMode').addEventListener('change', e => colorMode = e.target.value);
</script>
</body>
</html>
