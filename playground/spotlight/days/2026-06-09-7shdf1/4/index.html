<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Spring Buttons · UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#07080e;min-height:100dvh;overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;cursor:none;
}

/* Custom blob cursor */
#blob{
  position:fixed;pointer-events:none;z-index:0;
  border-radius:50%;mix-blend-mode:screen;
  transform:translate(-50%,-50%);
  transition:width .3s,height .3s;
}

/* Each button is absolutely positioned */
.mbtn{
  position:absolute;
  padding:clamp(10px,1.5vw,16px) clamp(20px,3vw,36px);
  border-radius:60px;border:none;cursor:none;
  font-size:clamp(12px,1.4vw,15px);font-weight:600;
  letter-spacing:.06em;
  transition:filter .2s, box-shadow .2s;
  will-change:transform;user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.mbtn:hover{
  box-shadow:0 8px 32px rgba(0,0,0,.6), 0 0 0 2px rgba(255,255,255,.25);
  filter:brightness(1.2);
}

/* Button themes */
.t0{background:linear-gradient(135deg,#7ca0ff,#5080ee);color:#fff}
.t1{background:linear-gradient(135deg,#5de0aa,#30b880);color:#fff}
.t2{background:linear-gradient(135deg,#ff7eb0,#e04090);color:#fff}
.t3{background:linear-gradient(135deg,#ffb84d,#e08030);color:#fff}
.t4{background:linear-gradient(135deg,#b87cff,#8040e0);color:#fff}
.t5{background:linear-gradient(135deg,#40d8ff,#20a0d0);color:#fff}
.t6{background:linear-gradient(135deg,#ff6060,#cc3030);color:#fff}
.t7{background:linear-gradient(135deg,#90e060,#60b040);color:#fff}
.t8{background:linear-gradient(135deg,#f0e060,#c0b020);color:#333}

/* Particles emitted on click */
.spark{
  position:fixed;border-radius:50%;pointer-events:none;z-index:5;
  animation:spark-fly .6s ease-out forwards;
}
@keyframes spark-fly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
}

#topline{position:fixed;top:14px;left:16px;font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.07em;z-index:10}
.footer{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.12);white-space:nowrap}

/* Radius indicator */
#debug{
  position:fixed;top:14px;right:16px;z-index:10;
  display:flex;align-items:center;gap:8px;
}
#debug label{font-size:10px;color:rgba(255,255,255,.3)}
#debug input{width:70px;accent-color:#7ca0ff}
</style>
</head>
<body>

<div id="blob"></div>
<div id="topline">MAGNETIC SPRING BUTTONS · MOVE CURSOR NEAR BUTTONS</div>

<div id="debug">
  <label>RADIUS</label>
  <input type="range" id="radSlider" min="50" max="250" value="140">
</div>

<div class="footer">Inspired by inithtml.com magnetic hover effect · UI Spotlight Day 24 · Drop #4</div>

<script>
const LABELS = ['Attract','Explore','Connect','Create','Inspire','Design','Build','Launch','Ship'];
const COLORS = ['t0','t1','t2','t3','t4','t5','t6','t7','t8'];

// Spring parameters
let RADIUS = 140;
const SPRING_K = 0.10;
const DAMP = 0.72;

let mx = window.innerWidth/2, my = window.innerHeight/2;
let blobX = mx, blobY = my;
let blobW = 28, blobH = 28;

const blob = document.getElementById('blob');

// Place buttons in a loose organic grid
const buttons = [];
function placeButtons(){
  document.querySelectorAll('.mbtn').forEach(el => el.remove());
  const positions = getPositions();
  positions.forEach((pos, i) => {
    const btn = document.createElement('button');
    btn.className = 'mbtn ' + COLORS[i % COLORS.length];
    btn.textContent = LABELS[i % LABELS.length];
    btn.style.left = pos.x + 'px';
    btn.style.top = pos.y + 'px';
    document.body.appendChild(btn);
    buttons.push({ el: btn, ox: pos.x, oy: pos.y, cx: pos.x, cy: pos.y, vx: 0, vy: 0 });

    btn.addEventListener('click', (e) => emitSparks(e.clientX, e.clientY, COLORS[i % COLORS.length]));
  });
}

function getPositions(){
  const W = window.innerWidth, H = window.innerHeight;
  const cols = Math.min(3, Math.floor(W / 220));
  const rows = Math.ceil(9 / cols);
  const gx = (W - cols * 180) / (cols + 1);
  const gy = (H - rows * 70) / (rows + 1);
  const pos = [];
  for(let r=0; r<rows; r++) for(let c=0; c<cols; c++) if(pos.length<9){
    pos.push({
      x: gx + c*(180+gx) + (Math.random()-.5)*20,
      y: gy + r*(70+gy) + (Math.random()-.5)*15
    });
  }
  return pos;
}

placeButtons();
window.addEventListener('resize', () => { buttons.length=0; placeButtons(); });

// Blob color set
const blobColors = ['rgba(124,160,255,0.6)','rgba(93,224,170,0.5)','rgba(255,126,176,0.55)','rgba(255,184,77,0.5)','rgba(184,124,255,0.55)'];
let blobColorIdx = 0;
blob.style.background = blobColors[0];
blob.style.width = '28px';
blob.style.height = '28px';

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

// Update radius from slider
document.getElementById('radSlider').addEventListener('input', e => {
  RADIUS = +e.target.value;
});

function emitSparks(x, y, colorClass){
  const colorMap = {t0:'#7ca0ff',t1:'#5de0aa',t2:'#ff7eb0',t3:'#ffb84d',t4:'#b87cff',t5:'#40d8ff',t6:'#ff6060',t7:'#90e060',t8:'#f0e060'};
  const col = colorMap[colorClass] || '#fff';
  for(let i=0;i<12;i++){
    const sp = document.createElement('div');
    sp.className='spark';
    const angle = Math.random()*Math.PI*2;
    const dist = 40+Math.random()*60;
    sp.style.cssText=`
      left:${x}px;top:${y}px;
      width:${4+Math.random()*5}px;height:${4+Math.random()*5}px;
      background:${col};
      --dx:${Math.cos(angle)*dist}px;
      --dy:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*.1}s;
    `;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),700);
  }
}

function tick(){
  // Blob trails cursor
  blobX += (mx - blobX) * 0.14;
  blobY += (my - blobY) * 0.14;
  blob.style.left = blobX + 'px';
  blob.style.top = blobY + 'px';

  // Detect which button cursor is nearest
  let nearestDist = Infinity, nearestIdx = -1;
  buttons.forEach((b, i) => {
    const dx = mx - (b.ox + 80), dy = my - (b.oy + 24);
    const d = Math.sqrt(dx*dx + dy*dy);
    if(d < nearestDist){ nearestDist = d; nearestIdx = i; }
  });

  // Blob grows near a button
  if(nearestDist < RADIUS && nearestIdx >= 0){
    blobW += (60 - blobW) * 0.15;
    blobH += (60 - blobH) * 0.15;
    const newColor = blobColors[nearestIdx % blobColors.length];
    blob.style.background = newColor;
  } else {
    blobW += (28 - blobW) * 0.1;
    blobH += (28 - blobH) * 0.1;
  }
  blob.style.width = blobW + 'px';
  blob.style.height = blobH + 'px';

  buttons.forEach(b => {
    const btnCx = b.ox + (b.el.offsetWidth/2);
    const btnCy = b.oy + (b.el.offsetHeight/2);
    const dx = mx - btnCx, dy = my - btnCy;
    const dist = Math.sqrt(dx*dx + dy*dy);

    let tx = b.ox, ty = b.oy;

    if(dist < RADIUS && dist > 0.5){
      const pull = (1 - dist/RADIUS);
      tx = b.ox + dx * pull * 0.55;
      ty = b.oy + dy * pull * 0.55;
    }

    b.vx += (tx - b.cx) * SPRING_K;
    b.vy += (ty - b.cy) * SPRING_K;
    b.vx *= DAMP; b.vy *= DAMP;
    b.cx += b.vx; b.cy += b.vy;

    b.el.style.transform = `translate(${(b.cx-b.ox).toFixed(1)}px,${(b.cy-b.oy).toFixed(1)}px)`;
  });

  requestAnimationFrame(tick);
}
tick();

// Touch
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, { passive: true });
</script>
</body>
</html>
