<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Blob Chorus · UI Spotlight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#06080e;min-height:100dvh;
  display:grid;place-items:center;overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
}

.scene{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,130px));
  gap:clamp(12px,2.5vw,28px);
  padding:20px;
}

.blob{
  aspect-ratio:1;
  border-radius:60% 40% 30% 70% / 60% 30% 70% 40%;
  animation:morph 8s ease-in-out infinite;
  cursor:pointer;position:relative;overflow:hidden;
  transition:filter .3s,outline .2s;
}
.blob:hover{ filter:brightness(1.25) saturate(1.5); outline:2px solid rgba(255,255,255,.2); }

/* Inner shine */
.blob::before{
  content:'';position:absolute;
  inset:12% 15% 50% 20%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
  filter:blur(8px);
  animation:shine 8s ease-in-out infinite;
}

/* Individual blob colors + stagger */
.blob:nth-child(1){background:linear-gradient(135deg,#7ca0ff,#5de0aa);animation-delay:0s;animation-duration:8s}
.blob:nth-child(2){background:linear-gradient(135deg,#ff7eb0,#ffb84d);animation-delay:-1.1s;animation-duration:7.3s}
.blob:nth-child(3){background:linear-gradient(135deg,#b87cff,#7ca0ff);animation-delay:-2.2s;animation-duration:9.1s}
.blob:nth-child(4){background:linear-gradient(135deg,#5de0aa,#ffb84d);animation-delay:-3.3s;animation-duration:6.7s}
.blob:nth-child(5){background:linear-gradient(135deg,#ff7eb0,#b87cff);animation-delay:-4.4s;animation-duration:8.8s}
.blob:nth-child(6){background:linear-gradient(135deg,#7ca0ff,#ff7eb0);animation-delay:-5.5s;animation-duration:7.5s}
.blob:nth-child(7){background:linear-gradient(135deg,#ffb84d,#5de0aa);animation-delay:-0.7s;animation-duration:10.2s}
.blob:nth-child(8){background:linear-gradient(135deg,#b87cff,#ff7eb0);animation-delay:-2s;animation-duration:6.1s}
.blob:nth-child(9){background:linear-gradient(135deg,#5de0aa,#7ca0ff);animation-delay:-3.7s;animation-duration:8.4s}

@keyframes morph{
  0%  {border-radius:60% 40% 30% 70% / 60% 30% 70% 40%}
  14% {border-radius:40% 60% 70% 30% / 40% 70% 30% 60%}
  28% {border-radius:70% 30% 50% 50% / 30% 60% 40% 70%}
  43% {border-radius:30% 70% 40% 60% / 70% 40% 60% 30%}
  57% {border-radius:50% 50% 60% 40% / 50% 40% 60% 50%}
  71% {border-radius:40% 60% 30% 70% / 60% 50% 40% 50%}
  85% {border-radius:70% 30% 60% 40% / 30% 60% 40% 70%}
  100%{border-radius:60% 40% 30% 70% / 60% 30% 70% 40%}
}

@keyframes shine{
  0%,100%{opacity:.5;transform:translateY(0) scale(1)}
  50%{opacity:.85;transform:translateY(4px) scale(1.1)}
}

/* Floating bg orbs */
.orb{
  position:fixed;pointer-events:none;border-radius:50%;
  animation:drift linear infinite;opacity:.05;
}
@keyframes drift{
  from{transform:translate(0,110vh) rotate(0deg)}
  to{transform:translate(var(--dx),−110vh) rotate(360deg)}
}

/* Speed control */
#ctrl{
  position:fixed;top:16px;right:16px;z-index:10;
  background:rgba(255,255,255,.06);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;
}
#ctrl label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em}
#ctrl input{width:70px;accent-color:#7ca0ff}

#topline{
  position:fixed;top:16px;left:16px;
  font-size:11px;color:rgba(255,255,255,.28);letter-spacing:.08em;
}
.footer{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,.15);white-space:nowrap;text-align:center;
}
</style>
</head>
<body>

<div id="topline">CSS BORDER-RADIUS BLOB CHORUS · HOVER TO ENERGISE</div>

<div id="ctrl">
  <label>SPEED</label>
  <input type="range" id="spd" min="30" max="200" value="100">
</div>

<div class="scene" id="scene">
  <div class="blob"></div><div class="blob"></div><div class="blob"></div>
  <div class="blob"></div><div class="blob"></div><div class="blob"></div>
  <div class="blob"></div><div class="blob"></div><div class="blob"></div>
</div>

<div class="footer">Inspired by CSS organic shape trends · UI Spotlight Day 24 · Drop #1</div>

<script>
// Speed control changes animation-duration
const spd = document.getElementById('spd');
const blobs = document.querySelectorAll('.blob');
const baseDurations = Array.from(blobs).map(b => parseFloat(getComputedStyle(b).animationDuration)*1000);
spd.addEventListener('input', () => {
  const factor = 100 / spd.value;
  blobs.forEach((b, i) => {
    b.style.animationDuration = (baseDurations[i] * factor / 1000).toFixed(2) + 's';
  });
});

// Click a blob to trigger a pulse
blobs.forEach(b => {
  b.addEventListener('click', () => {
    b.style.transition = 'transform .15s, filter .15s';
    b.style.transform = 'scale(1.3)';
    setTimeout(() => { b.style.transform = ''; }, 150);
  });
});

// Background floating orbs
const cols = ['#7ca0ff','#5de0aa','#ff7eb0','#ffb84d','#b87cff'];
for (let i = 0; i < 18; i++) {
  const o = document.createElement('div');
  o.className = 'orb';
  const s = 30 + Math.random() * 120;
  const dur = 8 + Math.random() * 14;
  o.style.cssText = `
    width:${s}px;height:${s}px;
    left:${Math.random()*100}vw;
    background:${cols[i % cols.length]};
    --dx:${(Math.random()-.5)*80}px;
    animation-duration:${dur}s;
    animation-delay:${-Math.random()*dur}s;
  `;
  document.body.appendChild(o);
}
</script>
</body>
</html>
