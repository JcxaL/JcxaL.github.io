name = "summerpoll-api"
main = "src/worker.js"
compatibility_date = "2025-09-01"

# First deploy was done via the Cloudflare dashboard (not wrangler).
# To redeploy from CLI later:
#   1. `wrangler login` (or set CLOUDFLARE_API_TOKEN)
#   2. Find your POLLS KV namespace ID:
#        wrangler kv namespace list
#      …or in the dashboard: Workers & Pages → KV → POLLS → copy the ID.
#   3. Paste it below, replacing the placeholder.
#   4. `wrangler deploy`
[[kv_namespaces]]
binding = "POLLS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
