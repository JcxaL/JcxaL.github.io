<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fdf4ff" />
<title>Summer Poll · When are you free?</title>
<meta name="description" content="Create a beautiful, drag-to-select availability poll. Share a link. See everyone's free dates at a glance." />

<!-- Configure your Cloudflare Worker URL here. Leave blank to disable cloud sync. -->
<meta name="summerpoll:api" content="" />

<style>
:root {
  --bg-1: #fef3f8;
  --bg-2: #f0f4ff;
  --bg-3: #f7f2ff;
  --ink: #1e1b30;
  --ink-2: #4b4569;
  --muted: #8580a6;
  --line: #ece8f5;
  --line-2: #dcd6ed;
  --card: rgba(255,255,255,0.74);
  --card-edge: rgba(255,255,255,0.9);
  --shadow: 0 24px 60px -28px rgba(99,79,168,0.35), 0 2px 10px -2px rgba(99,79,168,0.08);
  --primary: #7c3aed;
  --primary-2: #ec4899;
  --primary-grad: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
  --yes: #10b981;
  --yes-soft: #d1fae5;
  --maybe: #f59e0b;
  --maybe-soft: #fef3c7;
  --no: #e2e8f0;
  --danger: #ef4444;
  --radius: 16px;
  --radius-lg: 22px;
  --t: 200ms cubic-bezier(.4,.0,.2,1);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  background:
    radial-gradient(1100px 700px at 8% -10%, #ffe2ee 0%, transparent 55%),
    radial-gradient(900px 700px at 100% 0%, #e3ecff 0%, transparent 55%),
    radial-gradient(900px 700px at 50% 110%, #f1e6ff 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
  background-attachment: fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
::selection { background: #f9b8d0; color: var(--ink); }

a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

button {
  font: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}
input, textarea {
  font: inherit;
  color: inherit;
}

.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 28px 20px 80px;
}

/* Header */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 4px 18px;
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  letter-spacing: -0.01em;
  font-size: 16px;
}
.brand .dot {
  width: 26px; height: 26px; border-radius: 9px;
  background: var(--primary-grad);
  display: inline-block;
  box-shadow: 0 6px 16px -4px rgba(124,58,237,0.5);
  position: relative;
}
.brand .dot::after {
  content: ''; position: absolute; inset: 4px;
  background: radial-gradient(circle at 30% 28%, rgba(255,255,255,0.85), transparent 55%);
  border-radius: 6px;
}
.brand a { color: var(--ink); }
.brand a:hover { text-decoration: none; }
.top-actions { display: flex; gap: 8px; align-items: center; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
  transition: transform var(--t), box-shadow var(--t), background var(--t), color var(--t);
  white-space: nowrap;
  user-select: none;
}
.btn-primary {
  background: var(--primary-grad);
  color: white;
  box-shadow: 0 10px 24px -10px rgba(124,58,237,0.55);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 30px -10px rgba(124,58,237,0.65); }
.btn-primary:active { transform: translateY(0); }
.btn-ghost {
  background: rgba(255,255,255,0.6);
  color: var(--ink);
  border: 1px solid var(--line-2);
}
.btn-ghost:hover { background: white; }
.btn-soft {
  background: white;
  color: var(--ink);
  border: 1px solid var(--line);
}
.btn-soft:hover { border-color: var(--line-2); }
.btn-danger {
  background: #fff;
  color: var(--danger);
  border: 1px solid #fecaca;
}
.btn-danger:hover { background: #fef2f2; }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Card */
.card {
  background: var(--card);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid var(--card-edge);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 28px;
}
.card + .card { margin-top: 18px; }
.card-pad-lg { padding: 36px; }

/* Landing */
.hero {
  text-align: center;
  padding: 60px 28px 52px;
}
.hero .eyebrow {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--line);
  color: var(--ink-2);
  margin-bottom: 18px;
}
.hero h1 {
  font-size: clamp(36px, 6vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.025em;
  font-weight: 800;
  margin: 0 0 18px;
}
.hero h1 .grad {
  background: var(--primary-grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero p {
  font-size: 17px;
  color: var(--ink-2);
  max-width: 540px;
  margin: 0 auto 28px;
}
.hero-cta {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.demo-strip {
  margin: 40px auto 0;
  max-width: 720px;
}
.demo-strip .pills {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.demo-strip .pill {
  aspect-ratio: 1 / 1.05;
  border-radius: 12px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: var(--ink-2);
}
.demo-strip .pill[data-level="1"] { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
.demo-strip .pill[data-level="2"] { background: #d1fae5; color: #047857; border-color: #6ee7b7; }
.demo-strip .pill[data-level="3"] { background: #6ee7b7; color: #064e3b; border-color: #34d399; }
.demo-strip .pill[data-level="4"] { background: #34d399; color: #022c22; border-color: #10b981; }
.demo-strip .pill[data-level="5"] { background: #059669; color: #ecfdf5; border-color: #047857; }
.demo-strip .pill.peak { box-shadow: 0 0 0 2px var(--primary), 0 0 0 5px rgba(124,58,237,0.18); }
.demo-strip .caption {
  text-align: center;
  margin-top: 12px;
  font-size: 13px;
  color: var(--muted);
}

/* Section heading */
.h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.012em;
  margin: 0 0 4px;
}
.subtle {
  color: var(--ink-2);
  font-size: 14px;
  margin: 0 0 22px;
}

/* Form */
.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-row label {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
}
.input, .textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--line-2);
  background: rgba(255,255,255,0.7);
  transition: border-color var(--t), box-shadow var(--t), background var(--t);
  outline: none;
}
.input:focus, .textarea:focus {
  border-color: var(--primary);
  background: white;
  box-shadow: 0 0 0 4px rgba(124,58,237,0.12);
}
.textarea { min-height: 76px; resize: vertical; font-family: inherit; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 520px) { .row-2 { grid-template-columns: 1fr; } }

/* Calendar */
.cal-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}
.brushes {
  display: inline-flex;
  background: rgba(255,255,255,0.8);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px;
  gap: 2px;
}
.brush {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  transition: all var(--t);
  white-space: nowrap;
}
.brush .sw {
  width: 12px; height: 12px; border-radius: 4px;
  display: inline-block;
}
.brush[data-state="yes"] .sw { background: var(--yes); }
.brush[data-state="maybe"] .sw { background: var(--maybe); }
.brush[data-state="clear"] .sw { background: var(--no); border: 1px solid var(--line-2); }
.brush.active {
  background: var(--ink);
  color: white;
  box-shadow: 0 4px 12px -4px rgba(30,27,48,0.4);
}
.brush.active .sw { box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }

.cal-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}
@media (min-width: 760px) {
  .cal-grid.cols-2 { grid-template-columns: 1fr 1fr; }
}
.month {
  background: rgba(255,255,255,0.55);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 14px 14px;
}
.month-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0 4px 10px;
}
.month-title .name { font-weight: 700; letter-spacing: -0.01em; font-size: 15px; }
.month-title .count {
  font-size: 12px; color: var(--muted);
}
.dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 6px;
}
.dow div {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 0;
}
.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  touch-action: none;
}
.day {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 6px 7px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink-2);
  background: white;
  border: 1px solid var(--line);
  transition: background var(--t), border-color var(--t), transform 120ms;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.day.out {
  background: transparent;
  border-color: transparent;
  color: transparent;
  pointer-events: none;
}
.day.disabled {
  background: rgba(245,243,255,0.5);
  color: #c8c4d7;
  border: 1px dashed var(--line);
  pointer-events: none;
}
.day.in {
  cursor: pointer;
}
.day.in:hover { transform: translateY(-1px); border-color: var(--line-2); }
.day.today {
  outline: 2px solid var(--primary);
  outline-offset: -2px;
}
.day.s-yes {
  background: var(--yes);
  color: white;
  border-color: #059669;
}
.day.s-maybe {
  background: var(--maybe);
  color: white;
  border-color: #d97706;
}
.day .corner {
  position: absolute;
  bottom: 5px;
  left: 6px;
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
}
.day .badge-mine {
  position: absolute;
  top: 4px; left: 4px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 0 2px white;
}

/* Heatmap mode (results) */
.day.heat {
  background: white;
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.day.heat[data-l="1"] { background: #ecfdf5; border-color: #d1fae5; color: #047857; }
.day.heat[data-l="2"] { background: #d1fae5; border-color: #a7f3d0; color: #047857; }
.day.heat[data-l="3"] { background: #a7f3d0; border-color: #6ee7b7; color: #064e3b; }
.day.heat[data-l="4"] { background: #6ee7b7; border-color: #34d399; color: #064e3b; }
.day.heat[data-l="5"] { background: #34d399; border-color: #10b981; color: #022c22; }
.day.heat[data-l="6"] { background: #10b981; border-color: #059669; color: white; }
.day.heat[data-l="7"] { background: #059669; border-color: #047857; color: white; }
.day.heat[data-l="peak"] {
  box-shadow: 0 0 0 2px var(--primary-2), 0 0 0 4px rgba(236,72,153,0.2);
  z-index: 1;
}
.day.heat .heatlabel {
  position: absolute;
  bottom: 4px; left: 6px;
  font-size: 10px; font-weight: 700;
  opacity: 0.9;
}

/* Tooltip */
.tt {
  position: fixed;
  background: var(--ink);
  color: white;
  font-size: 12px;
  font-weight: 500;
  padding: 8px 11px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 160ms;
  z-index: 100;
  max-width: 240px;
  line-height: 1.4;
  box-shadow: 0 10px 30px -8px rgba(0,0,0,0.4);
}
.tt.show { opacity: 1; }
.tt .tt-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 2px;
}
.tt .tt-row .swatch {
  width: 8px; height: 8px; border-radius: 2px;
  display: inline-block;
}
.tt .tt-row .who { color: white; }
.tt .tt-row .when { color: #c4b5fd; font-size: 11px; margin-left: auto; }

/* People */
.people {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.person {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px 6px 6px;
  border-radius: 999px;
  background: rgba(255,255,255,0.75);
  border: 1px solid var(--line);
  font-size: 13px;
  font-weight: 600;
}
.person .av {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: white;
  font-size: 11px; font-weight: 700;
}
.person .stat {
  color: var(--muted);
  font-weight: 500;
  font-size: 12px;
}
.person .remove {
  margin-left: 4px;
  color: var(--muted);
  width: 16px; height: 16px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.person .remove:hover { background: #fee2e2; color: var(--danger); }

/* Best dates */
.best {
  margin-top: 18px;
  padding: 16px 18px;
  background: linear-gradient(135deg, rgba(236,72,153,0.08), rgba(124,58,237,0.08));
  border: 1px solid rgba(124,58,237,0.18);
  border-radius: var(--radius);
}
.best h3 {
  margin: 0 0 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.005em;
}
.best .dates {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.best .datechip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-radius: 999px;
  background: white;
  border: 1px solid rgba(124,58,237,0.25);
  font-size: 13px;
  font-weight: 600;
}
.best .datechip .who {
  color: var(--primary);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* Share box */
.share-row {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.share-input {
  flex: 1 1 280px;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1px solid var(--line-2);
  background: white;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: var(--ink-2);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: white;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 18px 40px -10px rgba(0,0,0,0.35);
  opacity: 0;
  transition: opacity var(--t), transform var(--t);
  z-index: 200;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Status pill */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.75);
  border: 1px solid var(--line);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}
.status-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
}
.status-pill.ok .dot { background: var(--yes); box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
.status-pill.local .dot { background: var(--maybe); }
.status-pill.bad .dot { background: var(--danger); }

/* Meta header on poll page */
.poll-head {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: start;
  margin-bottom: 6px;
}
@media (max-width: 600px) { .poll-head { grid-template-columns: 1fr; } }
.poll-head h1 {
  font-size: clamp(24px, 4.4vw, 32px);
  letter-spacing: -0.02em;
  margin: 0 0 4px;
  line-height: 1.15;
}
.poll-meta {
  display: flex; flex-wrap: wrap; gap: 12px;
  color: var(--ink-2); font-size: 14px;
}
.poll-meta .sep { color: var(--line-2); }
.poll-head-actions {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}

/* Color picker */
.colors {
  display: inline-flex; gap: 4px; flex-wrap: wrap;
}
.color-pick {
  width: 24px; height: 24px; border-radius: 8px;
  border: 2px solid transparent;
  transition: transform var(--t), border-color var(--t);
}
.color-pick:hover { transform: scale(1.08); }
.color-pick.active { border-color: var(--ink); transform: scale(1.08); }

.name-row {
  display: flex; gap: 10px; align-items: end; flex-wrap: wrap;
  margin-bottom: 14px;
}
.name-row .form-row { margin: 0; flex: 1 1 220px; }

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
  margin: 24px 0;
}

.legend {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}
.legend .scale {
  display: inline-flex;
  align-items: center;
  height: 12px;
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.legend .scale span {
  width: 14px; height: 100%; display: inline-block;
}

/* Empty state for create poll button on landing card */
.section-title-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
  margin-bottom: 14px;
}

/* Loading */
.loading {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 14px;
}
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--line-2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 700ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error banner */
.banner {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 13px;
  margin-bottom: 14px;
}
.banner.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
.banner.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.banner.info { background: #eff6ff; color: #1e3a8a; border: 1px solid #bfdbfe; }

footer.foot {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: var(--muted);
}
footer.foot a { color: var(--ink-2); }

/* Helpers */
.sr {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
.hide { display: none !important; }
</style>
</head>
<body>

<div class="wrap">

  <header class="top">
    <div class="brand">
      <a href="#/" data-link>
        <span class="dot" aria-hidden="true"></span>
        <span>Summer Poll</span>
      </a>
    </div>
    <div class="top-actions">
      <span class="status-pill" id="status">
        <span class="dot"></span>
        <span class="label">checking…</span>
      </span>
    </div>
  </header>

  <main id="app"></main>

  <footer class="foot">
    <p>
      Built as an isolated sub-route of
      <a href="/">jccl.me</a>.
      Made with calendars and coffee.
    </p>
  </footer>
</div>

<div class="toast" id="toast"></div>
<div class="tt" id="tt" role="tooltip"></div>

<script>
//----------------------------------------------------------------------------
// Config
//----------------------------------------------------------------------------
const API_BASE = (() => {
  const tag = document.querySelector('meta[name="summerpoll:api"]');
  const fromTag = (tag && tag.getAttribute('content') || '').trim();
  const fromLs = (localStorage.getItem('summerpoll:api') || '').trim();
  return (fromLs || fromTag).replace(/\/$/, '');
})();

const COLORS = ['#7c3aed', '#ec4899', '#f59e0b', '#10b981', '#06b6d4', '#ef4444', '#84cc16', '#8b5cf6'];

//----------------------------------------------------------------------------
// Utilities
//----------------------------------------------------------------------------
const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (v !== null && v !== undefined && v !== false) e.setAttribute(k, v === true ? '' : v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return e;
};

const toast = (msg) => {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
};

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('Link copied'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    toast('Link copied');
  }
}

// Date helpers — work entirely in calendar-day strings (YYYY-MM-DD) to avoid TZ bugs
function pad(n) { return String(n).padStart(2, '0'); }
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function ymdToObj(s) { const [y,m,d] = s.split('-').map(Number); return { y, m, d }; }
function addDays(ymd, n) {
  const d = new Date(ymd + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
}
function dayOfWeek(ymd) {
  const d = new Date(ymd + 'T12:00:00Z');
  return d.getUTCDay(); // 0=Sun..6=Sat
}
function monthsBetween(start, end) {
  const a = ymdToObj(start), b = ymdToObj(end);
  const out = [];
  let y = a.y, m = a.m;
  while (y < b.y || (y === b.y && m <= b.m)) {
    out.push({ y, m });
    m++; if (m > 12) { m = 1; y++; }
  }
  return out;
}
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function monthName(m) {
  return ['January','February','March','April','May','June',
          'July','August','September','October','November','December'][m-1];
}
function shortDate(ymd) {
  const { y, m, d } = ymdToObj(ymd);
  const wd = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dayOfWeek(ymd)];
  return `${wd}, ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${d}`;
}
function fmtRange(start, end) {
  const a = ymdToObj(start), b = ymdToObj(end);
  const sameYear = a.y === b.y;
  const sameMonth = sameYear && a.m === b.m;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (sameMonth) return `${months[a.m-1]} ${a.d}–${b.d}, ${a.y}`;
  if (sameYear) return `${months[a.m-1]} ${a.d} – ${months[b.m-1]} ${b.d}, ${a.y}`;
  return `${months[a.m-1]} ${a.d}, ${a.y} – ${months[b.m-1]} ${b.d}, ${b.y}`;
}
function timeAgo(iso) {
  const t = new Date(iso).getTime();
  const s = Math.max(0, (Date.now() - t) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/\s+/);
  return ((p[0] || '')[0] + (p[1]?.[0] || '')).toUpperCase() || name[0].toUpperCase();
}

//----------------------------------------------------------------------------
// API
//----------------------------------------------------------------------------
async function api(path, opts = {}) {
  if (!API_BASE) throw new Error('NO_API');
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
  let data;
  try { data = await res.json(); } catch { data = null; }
  if (!res.ok) {
    const msg = (data && data.error) || `HTTP ${res.status}`;
    const e = new Error(msg);
    e.status = res.status;
    throw e;
  }
  return data;
}

//----------------------------------------------------------------------------
// Status pill
//----------------------------------------------------------------------------
async function updateStatus() {
  const pill = $('#status');
  const label = pill.querySelector('.label');
  if (!API_BASE) {
    pill.className = 'status-pill local';
    label.textContent = 'Backend not configured';
    return;
  }
  pill.className = 'status-pill';
  label.textContent = 'connecting…';
  try {
    const r = await fetch(API_BASE + '/api', { method: 'GET' });
    if (r.ok) {
      pill.className = 'status-pill ok';
      label.textContent = 'Live · cloud sync on';
    } else {
      pill.className = 'status-pill bad';
      label.textContent = 'API error';
    }
  } catch {
    pill.className = 'status-pill bad';
    label.textContent = 'API unreachable';
  }
}

//----------------------------------------------------------------------------
// Router
//----------------------------------------------------------------------------
function parseHash() {
  const raw = location.hash.replace(/^#/, '') || '/';
  const [pathStr, qs] = raw.split('?');
  const parts = pathStr.split('/').filter(Boolean);
  const params = new URLSearchParams(qs || '');
  return { parts, params };
}

function navigate(hash) {
  if (location.hash === hash) render();
  else location.hash = hash;
}

document.addEventListener('click', (e) => {
  const a = e.target.closest('a[data-link]');
  if (a) {
    e.preventDefault();
    navigate(a.getAttribute('href'));
  }
});

window.addEventListener('hashchange', render);

//----------------------------------------------------------------------------
// Views
//----------------------------------------------------------------------------
function render() {
  const app = $('#app');
  const { parts, params } = parseHash();
  app.innerHTML = '';
  stopPolling();
  if (parts[0] === 'p' && parts[1]) {
    renderPoll(app, parts[1], params);
  } else if (parts[0] === 'new') {
    renderCreate(app);
  } else if (parts[0] === 'settings') {
    renderSettings(app);
  } else {
    renderHome(app);
  }
  window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
}

function renderHome(app) {
  const hero = el('section', { class: 'card card-pad-lg hero' },
    el('span', { class: 'eyebrow' }, 'Availability poll · zero login'),
    el('h1', {}, 'When are ',
      el('span', { class: 'grad' }, 'you free'),
      '?'),
    el('p', {}, 'Pick a date range, share one link, watch the green tiles light up. ' +
                'Drag to mark dozens of days at once. Three states: yes, maybe, nope.'),
    el('div', { class: 'hero-cta' },
      el('a', { href: '#/new', 'data-link': '', class: 'btn btn-primary' }, 'Create a poll'),
      el('a', { href: '#/settings', 'data-link': '', class: 'btn btn-ghost' }, 'Backend settings'),
    ),
    buildDemoStrip(),
  );
  app.appendChild(hero);

  // Recently visited polls (from localStorage)
  const recents = listRecentPolls();
  if (recents.length) {
    const card = el('section', { class: 'card' });
    card.appendChild(el('div', { class: 'section-title-row' },
      el('h2', { class: 'h2' }, 'Recently opened'),
      el('p', { class: 'subtle', style: { margin: 0 } }, 'Polls you visited on this device'),
    ));
    const list = el('div', { class: 'people' });
    for (const r of recents.slice(0, 12)) {
      list.appendChild(
        el('a', {
          href: '#/p/' + r.id, 'data-link': '',
          class: 'person',
          title: r.range || ''
        },
          el('span', { class: 'av', style: { background: r.color || '#7c3aed' } }, initials(r.title || r.id)),
          el('span', {}, r.title || ('Poll ' + r.id)),
          r.range ? el('span', { class: 'stat' }, '· ' + r.range) : null,
        )
      );
    }
    card.appendChild(list);
    app.appendChild(card);
  }

  // Paste link
  const paste = el('section', { class: 'card' },
    el('h2', { class: 'h2' }, 'Have a link?'),
    el('p', { class: 'subtle' }, 'Paste a poll URL and jump straight in.'),
    el('div', { class: 'share-row' },
      el('input', {
        class: 'share-input',
        id: 'paste-input',
        placeholder: 'https://jccl.me/summerpoll/#/p/abc123…',
      }),
      el('button', {
        class: 'btn btn-soft',
        onclick: () => {
          const v = $('#paste-input').value.trim();
          if (!v) return;
          const m = v.match(/#\/p\/([a-z0-9]+)/i);
          if (m) navigate('#/p/' + m[1]);
          else if (/^[a-z0-9]{4,}$/i.test(v)) navigate('#/p/' + v);
          else toast('That doesn’t look like a poll link');
        }
      }, 'Open'),
    ),
  );
  app.appendChild(paste);
}

function buildDemoStrip() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const levels = [1,2,3,2,5,4,2];
  const peak = 4;
  const wrap = el('div', { class: 'demo-strip' });
  const pills = el('div', { class: 'pills' });
  for (let i = 0; i < 7; i++) {
    const cls = 'pill' + (i === peak ? ' peak' : '');
    pills.appendChild(el('div', { class: cls, 'data-level': levels[i] }, days[i]));
  }
  wrap.appendChild(pills);
  wrap.appendChild(el('p', { class: 'caption' }, 'Friday wins: 4 of 5 people can make it'));
  return wrap;
}

function renderCreate(app) {
  const card = el('section', { class: 'card card-pad-lg' });
  card.appendChild(el('h2', { class: 'h2' }, 'Create a new poll'));
  card.appendChild(el('p', { class: 'subtle' }, 'Pick a date range your friends should choose from. Share the link after creating.'));

  if (!API_BASE) {
    card.appendChild(el('div', { class: 'banner warn' },
      'Cloud sync is OFF. Set up the Cloudflare Worker first — see ',
      el('a', { href: '#/settings', 'data-link': '' }, 'Backend settings'),
      '. (Without it, responses won’t consolidate across devices.)'
    ));
  }

  const today = todayStr();
  const inDays = (n) => addDays(today, n);

  const form = el('div', {});
  form.appendChild(el('div', { class: 'form-row' },
    el('label', { for: 'fld-title' }, 'Title'),
    el('input', { id: 'fld-title', class: 'input', placeholder: 'Summer trip planning', maxlength: 200 }),
  ));
  form.appendChild(el('div', { class: 'form-row' },
    el('label', { for: 'fld-desc' }, 'Description (optional)'),
    el('textarea', { id: 'fld-desc', class: 'textarea', placeholder: 'Mark every day you could potentially make it', maxlength: 1000 }),
  ));
  form.appendChild(el('div', { class: 'row-2' },
    el('div', { class: 'form-row' },
      el('label', { for: 'fld-start' }, 'Start date'),
      el('input', { id: 'fld-start', class: 'input', type: 'date', value: inDays(2) }),
    ),
    el('div', { class: 'form-row' },
      el('label', { for: 'fld-end' }, 'End date'),
      el('input', { id: 'fld-end', class: 'input', type: 'date', value: inDays(16) }),
    ),
  ));
  const submitWrap = el('div', { style: { display: 'flex', gap: '10px', alignItems: 'center', flexWrap: 'wrap', marginTop: '8px' } });
  const btn = el('button', { class: 'btn btn-primary' }, 'Create poll');
  const status = el('span', { class: 'loading', style: { display: 'none' } },
    el('span', { class: 'spinner' }), el('span', {}, 'Saving…'));
  const back = el('a', { class: 'btn btn-ghost', href: '#/', 'data-link': '' }, 'Cancel');
  submitWrap.appendChild(btn);
  submitWrap.appendChild(back);
  submitWrap.appendChild(status);
  form.appendChild(submitWrap);
  card.appendChild(form);

  btn.addEventListener('click', async () => {
    const title = $('#fld-title').value.trim();
    const desc = $('#fld-desc').value.trim();
    const start = $('#fld-start').value;
    const end = $('#fld-end').value;
    if (!title) { toast('Add a title'); $('#fld-title').focus(); return; }
    if (!start || !end) { toast('Pick a date range'); return; }
    if (start > end) { toast('End must be after start'); return; }
    const days = (new Date(end) - new Date(start)) / 86400000;
    if (days > 365) { toast('Range too long (max 365 days)'); return; }

    if (!API_BASE) {
      toast('Configure backend first');
      return;
    }
    btn.disabled = true; status.style.display = 'inline-flex';
    try {
      const poll = await api('/api/polls', {
        method: 'POST',
        body: JSON.stringify({ title, description: desc, start, end }),
      });
      saveAdmin(poll.id, poll.adminToken);
      rememberPoll(poll);
      navigate('#/p/' + poll.id);
    } catch (e) {
      toast('Could not create poll: ' + e.message);
      btn.disabled = false; status.style.display = 'none';
    }
  });

  app.appendChild(card);
}

function renderSettings(app) {
  const card = el('section', { class: 'card card-pad-lg' });
  card.appendChild(el('h2', { class: 'h2' }, 'Backend settings'));
  card.appendChild(el('p', { class: 'subtle' },
    'Point the app at your Cloudflare Worker URL. You only need to do this once per device.'));

  const cur = (localStorage.getItem('summerpoll:api') || '').trim();
  const meta = (document.querySelector('meta[name="summerpoll:api"]').getAttribute('content') || '').trim();

  if (meta && !cur) {
    card.appendChild(el('div', { class: 'banner info' },
      'Default backend (from page meta): ', el('code', {}, meta || '(none)')));
  }
  if (cur) {
    card.appendChild(el('div', { class: 'banner info' },
      'Currently using: ', el('code', {}, cur)));
  }

  const row = el('div', { class: 'form-row' },
    el('label', {}, 'Worker URL'),
    el('input', { id: 'api-url', class: 'input', placeholder: 'https://summerpoll-api.your-name.workers.dev', value: cur }),
  );
  card.appendChild(row);

  const actions = el('div', { style: { display: 'flex', gap: '8px', flexWrap: 'wrap' } });
  actions.appendChild(el('button', {
    class: 'btn btn-primary',
    onclick: () => {
      const v = $('#api-url').value.trim().replace(/\/$/, '');
      if (!v) {
        localStorage.removeItem('summerpoll:api');
        toast('Cleared.');
      } else {
        localStorage.setItem('summerpoll:api', v);
        toast('Saved. Reloading…');
      }
      setTimeout(() => location.reload(), 600);
    }
  }, 'Save'));
  actions.appendChild(el('a', { class: 'btn btn-ghost', href: '#/', 'data-link': '' }, 'Back'));
  card.appendChild(actions);

  card.appendChild(el('div', { class: 'divider' }));

  card.appendChild(el('h2', { class: 'h2' }, 'How to deploy the backend'));
  const steps = el('ol', { style: { color: 'var(--ink-2)', lineHeight: '1.7', paddingLeft: '20px', margin: '0' } });
  [
    el('li', {}, 'Install ', el('code', {}, 'wrangler'), ': ', el('code', {}, 'npm i -g wrangler')),
    el('li', {}, 'Sign in: ', el('code', {}, 'wrangler login')),
    el('li', {}, 'From the repo: ', el('code', {}, 'cd playground/summerpoll/worker')),
    el('li', {}, 'Create KV namespace: ', el('code', {}, 'wrangler kv namespace create POLLS')),
    el('li', {}, 'Paste the printed ', el('code', {}, 'id'), ' into ', el('code', {}, 'wrangler.toml'),
                  ' (replacing the placeholder)'),
    el('li', {}, 'Deploy: ', el('code', {}, 'wrangler deploy')),
    el('li', {}, 'Copy the printed URL into the field above, then save.'),
  ].forEach(s => steps.appendChild(s));
  card.appendChild(steps);

  card.appendChild(el('div', { class: 'banner warn', style: { marginTop: '16px' } },
    el('strong', {}, 'Important: '),
    'After deploying, also paste the worker URL into the ',
    el('code', {}, '<meta name="summerpoll:api" content="…">'),
    ' tag at the top of ',
    el('code', {}, 'playground/summerpoll/index.html'),
    ', then commit. That way every visitor (not just you) automatically uses it — otherwise each device would need to set it manually here.'
  ));

  app.appendChild(card);
}

//----------------------------------------------------------------------------
// Poll page — state, rendering, interaction
//----------------------------------------------------------------------------
let pollState = null; // current poll + responses + my response data

function renderPoll(app, id, params) {
  if (!API_BASE) {
    app.appendChild(el('div', { class: 'card' },
      el('div', { class: 'banner warn' },
        'Cloud sync is OFF. Configure the backend at ',
        el('a', { href: '#/settings', 'data-link': '' }, 'Backend settings'),
        ' to load this poll.'
      )
    ));
    return;
  }
  const card = el('section', { class: 'card', id: 'poll-card' },
    el('div', { class: 'loading' }, el('span', { class: 'spinner' }), el('span', {}, 'Loading poll…'))
  );
  app.appendChild(card);

  pollState = {
    id,
    poll: null,
    responses: [],
    myRespId: localStorage.getItem('summerpoll:resp:' + id) || null,
    myDraft: {
      name: localStorage.getItem('summerpoll:name') || '',
      color: localStorage.getItem('summerpoll:color') || COLORS[0],
      availability: {}, // ymd -> 1 (maybe) | 2 (yes)
    },
    brush: 'yes',
    dirty: false,
    autosaveTimer: null,
  };

  loadPoll(id, true);
  startPolling();
}

async function loadPoll(id, initial = false) {
  try {
    const data = await api('/api/polls/' + id);
    pollState.poll = { id: data.id, title: data.title, description: data.description, start: data.start, end: data.end, created: data.created };
    pollState.responses = data.responses || [];

    if (initial) {
      const mine = pollState.myRespId ? pollState.responses.find(r => r.id === pollState.myRespId) : null;
      if (mine) {
        pollState.myDraft.name = mine.name;
        pollState.myDraft.color = mine.color;
        pollState.myDraft.availability = { ...mine.availability };
      }
      rememberPoll(pollState.poll);
    }
    paintPoll();
  } catch (e) {
    const card = $('#poll-card');
    if (card) {
      card.innerHTML = '';
      card.appendChild(el('div', { class: 'banner err' },
        e.status === 404 ? 'Poll not found. The link may be incorrect or expired.' : 'Couldn’t load poll: ' + e.message));
      card.appendChild(el('a', { href: '#/', 'data-link': '', class: 'btn btn-ghost' }, '← Back home'));
    }
  }
}

function paintPoll() {
  const root = $('#poll-card');
  if (!root || !pollState.poll) return;
  const { poll, responses } = pollState;
  const isAdmin = !!loadAdmin(poll.id);

  root.innerHTML = '';

  // Header
  const head = el('div', { class: 'poll-head' });
  const left = el('div', {});
  left.appendChild(el('h1', {}, poll.title));
  if (poll.description) left.appendChild(el('p', { class: 'subtle', style: { marginBottom: '6px' } }, poll.description));
  left.appendChild(el('div', { class: 'poll-meta' },
    el('span', {}, fmtRange(poll.start, poll.end)),
    el('span', { class: 'sep' }, '·'),
    el('span', {}, responses.length + (responses.length === 1 ? ' person responded' : ' people responded')),
    isAdmin ? el('span', { class: 'sep' }, '·') : null,
    isAdmin ? el('span', { style: { color: 'var(--primary)', fontWeight: 600 } }, '✦ You created this poll') : null,
  ));
  head.appendChild(left);

  const actions = el('div', { class: 'poll-head-actions' });
  actions.appendChild(el('button', {
    class: 'btn btn-soft',
    onclick: () => copyToClipboard(location.origin + location.pathname + '#/p/' + poll.id),
  }, 'Copy share link'));
  if (isAdmin) {
    actions.appendChild(el('button', {
      class: 'btn btn-danger',
      onclick: async () => {
        if (!confirm('Delete this poll forever? This removes everyone’s responses.')) return;
        try {
          await api('/api/polls/' + poll.id, {
            method: 'DELETE',
            headers: { 'X-Admin-Token': loadAdmin(poll.id) },
          });
          localStorage.removeItem('summerpoll:admin:' + poll.id);
          forgetPoll(poll.id);
          toast('Poll deleted');
          navigate('#/');
        } catch (e) { toast('Could not delete: ' + e.message); }
      }
    }, 'Delete poll'));
  }
  head.appendChild(actions);
  root.appendChild(head);

  // Share box
  const shareUrl = location.origin + location.pathname + '#/p/' + poll.id;
  root.appendChild(el('div', { class: 'share-row', style: { marginTop: '14px' } },
    el('input', { class: 'share-input', value: shareUrl, readonly: '' }),
    el('button', { class: 'btn btn-soft', onclick: () => copyToClipboard(shareUrl) }, 'Copy'),
  ));

  root.appendChild(el('div', { class: 'divider' }));

  // Your availability section
  const yours = el('div', { id: 'yours-section' });
  yours.appendChild(el('div', { class: 'section-title-row' },
    el('div', {},
      el('h2', { class: 'h2' }, 'Your availability'),
      el('p', { class: 'subtle', style: { marginBottom: 0 } },
        'Pick a brush, then click — or click-and-drag — across the days.'),
    ),
    el('div', { id: 'save-status', class: 'loading', style: { display: 'none' } },
      el('span', { class: 'spinner' }), el('span', { class: 'msg' }, 'Saving…')),
  ));

  // Name + color row
  const nameRow = el('div', { class: 'name-row' });
  nameRow.appendChild(el('div', { class: 'form-row' },
    el('label', { for: 'your-name' }, 'Your name'),
    el('input', {
      id: 'your-name', class: 'input', placeholder: 'e.g. Alex',
      value: pollState.myDraft.name, maxlength: 60,
      oninput: (e) => {
        pollState.myDraft.name = e.target.value;
        localStorage.setItem('summerpoll:name', e.target.value);
        markDirty();
      },
    }),
  ));
  const colorWrap = el('div', { class: 'form-row' });
  colorWrap.appendChild(el('label', {}, 'Color'));
  const colors = el('div', { class: 'colors' });
  for (const c of COLORS) {
    colors.appendChild(el('button', {
      class: 'color-pick' + (c === pollState.myDraft.color ? ' active' : ''),
      style: { background: c },
      'aria-label': 'Pick ' + c,
      onclick: () => {
        pollState.myDraft.color = c;
        localStorage.setItem('summerpoll:color', c);
        colors.querySelectorAll('.color-pick').forEach(b => b.classList.remove('active'));
        colors.querySelectorAll('.color-pick').forEach((b,i) => { if (COLORS[i] === c) b.classList.add('active'); });
        markDirty();
      },
    }));
  }
  colorWrap.appendChild(colors);
  nameRow.appendChild(colorWrap);
  yours.appendChild(nameRow);

  // Brush toolbar
  const tools = el('div', { class: 'cal-toolbar' });
  const brushes = el('div', { class: 'brushes', role: 'tablist' });
  const brushButtons = {};
  for (const [state, label] of [['yes','Available'],['maybe','Maybe'],['clear','Clear']]) {
    const b = el('button', {
      class: 'brush' + (pollState.brush === state ? ' active' : ''),
      'data-state': state,
      role: 'tab',
      onclick: () => {
        pollState.brush = state;
        Object.values(brushButtons).forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      },
    }, el('span', { class: 'sw' }), label);
    brushButtons[state] = b;
    brushes.appendChild(b);
  }
  tools.appendChild(brushes);
  tools.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: () => {
      if (!confirm('Clear all your selected days?')) return;
      pollState.myDraft.availability = {};
      paintPoll();
      markDirty();
    },
  }, 'Clear all'));
  yours.appendChild(tools);

  // Personal calendar (editable)
  yours.appendChild(buildCalendar(poll.start, poll.end, {
    mode: 'edit',
    getState: (d) => pollState.myDraft.availability[d] || 0,
    onCellChange: (d, newState) => {
      if (newState === 0) delete pollState.myDraft.availability[d];
      else pollState.myDraft.availability[d] = newState;
      markDirty();
    },
  }));

  // Save button (always visible at bottom of edit section)
  const saveRow = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '14px', flexWrap: 'wrap', gap: '10px' } });
  const counts = countMine();
  saveRow.appendChild(el('div', { class: 'subtle', style: { margin: 0 } },
    counts.yes + ' yes · ' + counts.maybe + ' maybe'));
  saveRow.appendChild(el('button', {
    id: 'save-btn',
    class: 'btn btn-primary',
    onclick: saveMyResponse,
  }, pollState.myRespId ? 'Update my response' : 'Submit my response'));
  yours.appendChild(saveRow);

  root.appendChild(yours);

  root.appendChild(el('div', { class: 'divider' }));

  // Results section
  const results = el('div', {});
  results.appendChild(el('div', { class: 'section-title-row' },
    el('div', {},
      el('h2', { class: 'h2' }, 'Everyone’s availability'),
      el('p', { class: 'subtle', style: { marginBottom: 0 } },
        'Brighter = more people available. Hover a day to see who.')
    ),
    buildLegend(),
  ));

  if (responses.length === 0) {
    results.appendChild(el('div', { class: 'banner info' },
      'No responses yet. Share the link above to get started.'));
  } else {
    results.appendChild(buildCalendar(poll.start, poll.end, {
      mode: 'heat',
      responses,
    }));

    // Best dates
    const best = computeBest(responses, poll.start, poll.end);
    if (best.peakScore > 0) {
      const bestBox = el('div', { class: 'best' });
      bestBox.appendChild(el('h3', {}, '✨ Best dates'));
      const dates = el('div', { class: 'dates' });
      for (const d of best.dates) {
        dates.appendChild(el('span', { class: 'datechip' },
          el('span', {}, shortDate(d.date)),
          el('span', { class: 'who' }, d.yes + (d.maybe ? '+' + d.maybe + '?' : '') + '/' + responses.length),
        ));
      }
      bestBox.appendChild(dates);
      results.appendChild(bestBox);
    }

    // People list
    results.appendChild(el('h3', { style: { margin: '22px 0 10px', fontSize: '15px', fontWeight: 700 } }, 'Respondents'));
    const ppl = el('div', { class: 'people' });
    for (const r of [...responses].sort((a,b) => (b.updated || '').localeCompare(a.updated || ''))) {
      const c = countResp(r);
      const isMine = r.id === pollState.myRespId;
      ppl.appendChild(el('div', { class: 'person', title: 'Updated ' + timeAgo(r.updated || r.created) },
        el('span', { class: 'av', style: { background: r.color || '#7c3aed' } }, initials(r.name)),
        el('span', {}, r.name),
        el('span', { class: 'stat' }, '· ' + c.yes + ' yes' + (c.maybe ? ' · ' + c.maybe + ' maybe' : '')),
        isMine ? el('span', { class: 'stat', style: { color: 'var(--primary)' } }, ' · you') : null,
        isAdmin ? el('button', {
          class: 'remove',
          title: 'Remove this response',
          onclick: async (e) => {
            e.stopPropagation();
            if (!confirm('Remove ' + r.name + '?')) return;
            try {
              await api('/api/polls/' + poll.id + '/responses/' + r.id, {
                method: 'DELETE',
                headers: { 'X-Admin-Token': loadAdmin(poll.id) },
              });
              toast('Removed');
              loadPoll(poll.id);
            } catch (er) { toast('Could not remove: ' + er.message); }
          }
        }, '×') : null,
      ));
    }
    results.appendChild(ppl);
  }

  root.appendChild(results);
}

function buildLegend() {
  const wrap = el('div', { class: 'legend' });
  wrap.appendChild(el('span', {}, 'few'));
  const scale = el('div', { class: 'scale' });
  for (const l of ['1','2','3','4','5','6','7']) {
    scale.appendChild(el('span', { 'data-l': l, class: 'heat', style: { background: heatColor(l) } }));
  }
  wrap.appendChild(scale);
  wrap.appendChild(el('span', {}, 'all'));
  return wrap;
}

function heatColor(l) {
  return { '1':'#ecfdf5','2':'#d1fae5','3':'#a7f3d0','4':'#6ee7b7','5':'#34d399','6':'#10b981','7':'#059669' }[l] || 'white';
}

function countMine() {
  let yes = 0, maybe = 0;
  for (const v of Object.values(pollState.myDraft.availability)) {
    if (v === 2) yes++; else if (v === 1) maybe++;
  }
  return { yes, maybe };
}
function countResp(r) {
  let yes = 0, maybe = 0;
  for (const v of Object.values(r.availability || {})) {
    if (v === 2) yes++; else if (v === 1) maybe++;
  }
  return { yes, maybe };
}

function computeBest(responses, start, end) {
  const scores = {}; // ymd -> { yes, maybe, score }
  let d = start;
  while (d <= end) { scores[d] = { yes: 0, maybe: 0, score: 0 }; d = addDays(d, 1); }
  for (const r of responses) {
    for (const [k, v] of Object.entries(r.availability || {})) {
      if (!(k in scores)) continue;
      if (v === 2) { scores[k].yes++; scores[k].score += 2; }
      else if (v === 1) { scores[k].maybe++; scores[k].score += 1; }
    }
  }
  const all = Object.entries(scores).map(([date, s]) => ({ date, ...s }));
  const peak = Math.max(0, ...all.map(x => x.score));
  const winners = all.filter(x => x.score === peak && peak > 0).slice(0, 5);
  return { peakScore: peak, dates: winners };
}

function markDirty() {
  pollState.dirty = true;
  if (pollState.autosaveTimer) clearTimeout(pollState.autosaveTimer);
  // Update counts label
  const c = countMine();
  const saveBtn = $('#save-btn');
  if (saveBtn) saveBtn.textContent = pollState.myRespId ? 'Update my response' : 'Submit my response';
  // Autosave after 2.5s of no changes (only if already submitted at least once)
  if (pollState.myRespId) {
    pollState.autosaveTimer = setTimeout(() => saveMyResponse(true), 2500);
  }
}

async function saveMyResponse(silent = false) {
  const name = (pollState.myDraft.name || '').trim();
  if (!name) {
    toast('Add your name first');
    const n = $('#your-name'); if (n) n.focus();
    return;
  }
  const ss = $('#save-status');
  if (ss) { ss.style.display = 'inline-flex'; ss.querySelector('.msg').textContent = silent ? 'Auto-saving…' : 'Saving…'; }
  try {
    const body = {
      name,
      color: pollState.myDraft.color,
      availability: pollState.myDraft.availability,
    };
    if (pollState.myRespId) body.id = pollState.myRespId;
    const resp = await api('/api/polls/' + pollState.poll.id + '/responses', {
      method: 'POST', body: JSON.stringify(body),
    });
    if (!pollState.myRespId) {
      pollState.myRespId = resp.id;
      localStorage.setItem('summerpoll:resp:' + pollState.poll.id, resp.id);
    }
    pollState.dirty = false;
    if (!silent) toast('Saved!');
    await loadPoll(pollState.poll.id);
  } catch (e) {
    toast('Save failed: ' + e.message);
  } finally {
    if (ss) ss.style.display = 'none';
  }
}

//----------------------------------------------------------------------------
// Calendar grid renderer
//----------------------------------------------------------------------------
function buildCalendar(start, end, opts) {
  const wrap = el('div', { class: 'cal-grid' });
  const months = monthsBetween(start, end);
  if (months.length >= 2) wrap.classList.add('cols-2');

  // Precompute heatmap stats if needed
  let stats = null, peak = 0;
  if (opts.mode === 'heat') {
    stats = {};
    for (const r of opts.responses) {
      for (const [k, v] of Object.entries(r.availability || {})) {
        if (!stats[k]) stats[k] = { yes: 0, maybe: 0, score: 0, people: [] };
        if (v === 2) { stats[k].yes++; stats[k].score += 2; stats[k].people.push({ ...r, kind: 'yes' }); }
        else if (v === 1) { stats[k].maybe++; stats[k].score += 1; stats[k].people.push({ ...r, kind: 'maybe' }); }
      }
    }
    peak = Math.max(0, ...Object.values(stats).map(x => x.score));
  }

  for (const { y, m } of months) {
    const monthEl = el('div', { class: 'month' });
    monthEl.appendChild(el('div', { class: 'month-title' },
      el('div', { class: 'name' }, monthName(m) + ' ' + y),
      el('div', { class: 'count' }, ''),
    ));
    const dow = el('div', { class: 'dow' });
    for (const d of ['S','M','T','W','T','F','S']) dow.appendChild(el('div', {}, d));
    monthEl.appendChild(dow);

    const grid = el('div', { class: 'days' });
    const dim = daysInMonth(y, m);
    const firstYmd = `${y}-${pad(m)}-01`;
    const startDow = dayOfWeek(firstYmd);
    // Leading blanks
    for (let i = 0; i < startDow; i++) grid.appendChild(el('div', { class: 'day out' }));
    for (let d = 1; d <= dim; d++) {
      const ymd = `${y}-${pad(m)}-${pad(d)}`;
      const inRange = ymd >= start && ymd <= end;
      const cell = el('div', { class: 'day ' + (inRange ? 'in' : 'disabled'), 'data-d': ymd },
        el('span', {}, d));
      if (ymd === todayStr()) cell.classList.add('today');

      if (opts.mode === 'edit' && inRange) {
        const s = opts.getState(ymd);
        if (s === 2) cell.classList.add('s-yes');
        else if (s === 1) cell.classList.add('s-maybe');
      } else if (opts.mode === 'heat' && inRange) {
        cell.classList.add('heat');
        const stat = stats[ymd];
        if (stat && stat.score > 0) {
          // Map score → level 1..7
          const ratio = stat.score / Math.max(1, peak);
          const level = Math.min(7, Math.max(1, Math.ceil(ratio * 7)));
          cell.setAttribute('data-l', String(level));
          if (stat.score === peak) cell.setAttribute('data-l', 'peak'), cell.dataset.peakLevel = String(level);
          // Re-apply the highest color when peak (since data-l=peak overrides via CSS)
          if (stat.score === peak) {
            cell.style.background = heatColor(String(level));
            cell.style.color = level >= 6 ? 'white' : '#064e3b';
          }
          // Show count
          cell.appendChild(el('span', { class: 'heatlabel' }, String(stat.yes + (stat.maybe ? '+' + stat.maybe : ''))));
        }
        cell.addEventListener('mouseenter', (e) => showTooltip(e, ymd, stat));
        cell.addEventListener('mousemove', moveTooltip);
        cell.addEventListener('mouseleave', hideTooltip);
        cell.addEventListener('touchstart', (e) => showTooltip(e.touches[0], ymd, stat), { passive: true });
        cell.addEventListener('touchend', hideTooltip);
      }
      grid.appendChild(cell);
    }
    monthEl.appendChild(grid);
    wrap.appendChild(monthEl);
  }

  if (opts.mode === 'edit') wireDrag(wrap, opts);
  return wrap;
}

function wireDrag(root, opts) {
  let isDragging = false;
  let appliedTarget = null;

  function brushToValue() {
    if (pollState.brush === 'yes') return 2;
    if (pollState.brush === 'maybe') return 1;
    return 0;
  }

  function paint(cell, value) {
    const d = cell.getAttribute('data-d');
    if (!d) return;
    if (cell.classList.contains('disabled')) return;
    cell.classList.remove('s-yes', 's-maybe');
    if (value === 2) cell.classList.add('s-yes');
    else if (value === 1) cell.classList.add('s-maybe');
    opts.onCellChange(d, value);
  }

  function cellFromPoint(x, y) {
    const elFromPt = document.elementFromPoint(x, y);
    if (!elFromPt) return null;
    return elFromPt.closest('.day.in');
  }

  function onDown(e) {
    const targetCell = e.target.closest('.day.in');
    if (!targetCell) return;
    e.preventDefault();
    isDragging = true;
    appliedTarget = brushToValue();
    paint(targetCell, appliedTarget);
  }
  function onMove(e) {
    if (!isDragging) return;
    const pt = e.touches ? e.touches[0] : e;
    const cell = cellFromPoint(pt.clientX, pt.clientY);
    if (cell) paint(cell, appliedTarget);
  }
  function onUp() {
    isDragging = false;
    appliedTarget = null;
  }

  root.addEventListener('mousedown', onDown);
  root.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  root.addEventListener('touchstart', onDown, { passive: false });
  root.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);
  window.addEventListener('touchcancel', onUp);
}

//----------------------------------------------------------------------------
// Tooltip (used on heatmap cells)
//----------------------------------------------------------------------------
function showTooltip(e, ymd, stat) {
  const tt = $('#tt');
  tt.innerHTML = '';
  tt.appendChild(el('div', { style: { fontWeight: 700 } }, shortDate(ymd)));
  if (!stat || !stat.people || stat.people.length === 0) {
    tt.appendChild(el('div', { style: { color: '#c4b5fd', fontSize: '11px', marginTop: '4px' } },
      'No one yet'));
  } else {
    // Sort: yes first, then maybe
    const sorted = [...stat.people].sort((a,b) => (a.kind === 'yes' ? -1 : 1) - (b.kind === 'yes' ? -1 : 1));
    for (const p of sorted.slice(0, 10)) {
      tt.appendChild(el('div', { class: 'tt-row' },
        el('span', { class: 'swatch', style: { background: p.color || '#7c3aed' } }),
        el('span', { class: 'who' }, p.name),
        el('span', { class: 'when' }, p.kind === 'yes' ? 'yes' : 'maybe'),
      ));
    }
    if (stat.people.length > 10) {
      tt.appendChild(el('div', { style: { color: '#c4b5fd', fontSize: '11px', marginTop: '4px' } },
        '+ ' + (stat.people.length - 10) + ' more'));
    }
  }
  moveTooltip(e);
  tt.classList.add('show');
}
function moveTooltip(e) {
  const tt = $('#tt');
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  const y = (e.touches ? e.touches[0].clientY : e.clientY);
  const w = tt.offsetWidth, h = tt.offsetHeight;
  let nx = x + 14, ny = y - h - 12;
  if (nx + w > window.innerWidth - 8) nx = window.innerWidth - w - 8;
  if (ny < 8) ny = y + 18;
  tt.style.left = nx + 'px';
  tt.style.top = ny + 'px';
}
function hideTooltip() {
  $('#tt').classList.remove('show');
}

//----------------------------------------------------------------------------
// Live polling
//----------------------------------------------------------------------------
let pollingHandle = null;
function startPolling() {
  stopPolling();
  pollingHandle = setInterval(() => {
    if (document.hidden || !pollState || !pollState.poll) return;
    // Don't clobber user's in-progress edits — refresh responses + others only
    refreshSilently(pollState.poll.id);
  }, 15000);
}
function stopPolling() {
  if (pollingHandle) { clearInterval(pollingHandle); pollingHandle = null; }
}
async function refreshSilently(id) {
  try {
    const data = await api('/api/polls/' + id);
    if (!pollState || pollState.id !== id) return;
    const before = pollState.responses.length;
    pollState.responses = data.responses || [];
    if (data.responses.length !== before) {
      // Re-render results without touching edit section
      paintPoll();
    }
  } catch { /* silent */ }
}

//----------------------------------------------------------------------------
// localStorage helpers
//----------------------------------------------------------------------------
function saveAdmin(id, token) { localStorage.setItem('summerpoll:admin:' + id, token); }
function loadAdmin(id) { return localStorage.getItem('summerpoll:admin:' + id); }

function rememberPoll(poll) {
  const key = 'summerpoll:recent';
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  const filtered = list.filter(x => x.id !== poll.id);
  filtered.unshift({
    id: poll.id,
    title: poll.title,
    range: fmtRange(poll.start, poll.end),
    color: COLORS[Math.abs(hashStr(poll.id)) % COLORS.length],
    seen: Date.now(),
  });
  localStorage.setItem(key, JSON.stringify(filtered.slice(0, 20)));
}
function forgetPoll(id) {
  const key = 'summerpoll:recent';
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  localStorage.setItem(key, JSON.stringify(list.filter(x => x.id !== id)));
}
function listRecentPolls() {
  return JSON.parse(localStorage.getItem('summerpoll:recent') || '[]');
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return h;
}

//----------------------------------------------------------------------------
// Boot
//----------------------------------------------------------------------------
window.addEventListener('beforeunload', (e) => {
  if (pollState && pollState.dirty && pollState.myDraft.name) {
    e.preventDefault();
    e.returnValue = '';
  }
});

updateStatus();
render();
</script>
