<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Playground · Interactive Experiences</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05050f;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-hover: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-purple: #7c3aed;
      --accent-cyan: #06b6d4;
      --accent-pink: #f472b6;
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.25);
      --drawer-width: 380px;
      --nav-height: 52px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Nav ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      background: rgba(5, 5, 15, 0.75);
      backdrop-filter: blur(24px) saturate(1.5);
      -webkit-backdrop-filter: blur(24px) saturate(1.5);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-live {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #22c55e;
      flex-shrink: 0;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-live 2s ease-in-out infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .nav-sep {
      width: 1px;
      height: 18px;
      background: var(--glass-border);
      flex-shrink: 0;
    }

    .nav-day-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent-purple);
      background: rgba(124, 58, 237, 0.14);
      border: 1px solid rgba(124, 58, 237, 0.28);
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .nav-date {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .archive-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      background: var(--glass);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .archive-btn:hover {
      background: var(--glass-hover);
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .archive-btn svg { width: 13px; height: 13px; opacity: 0.7; }

    /* ── Frame ── */
    .frame-wrap {
      position: fixed;
      top: var(--nav-height);
      left: 0; right: 0; bottom: 0;
    }

    #day-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #day-frame.ready { opacity: 1; }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--bg);
      z-index: 5;
      transition: opacity 0.5s ease;
    }

    .loading.gone { opacity: 0; pointer-events: none; }

    .spinner {
      width: 30px; height: 30px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 12px; color: var(--text-muted); }

    /* ── Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .overlay.on { opacity: 1; pointer-events: all; }

    /* ── Drawer ── */
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: var(--drawer-width);
      max-width: 100vw;
      z-index: 300;
      background: rgba(6, 6, 18, 0.98);
      border-left: 1px solid var(--glass-border);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .drawer-head h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-head h2 svg { color: var(--accent-cyan); }

    .x-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }

    .x-btn:hover { background: var(--glass-hover); color: var(--text-primary); }

    .drawer-sub {
      padding: 10px 22px;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
      line-height: 1.5;
    }

    .drawer-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    /* ── Day cards ── */
    .day-card {
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 13px 15px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      background: var(--glass);
      position: relative;
      overflow: hidden;
    }

    .day-card:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.12);
      transform: translateX(-2px);
    }

    .day-card.is-active {
      border-color: rgba(124, 58, 237, 0.38);
      background: rgba(124, 58, 237, 0.07);
    }

    .day-card.is-active::after {
      content: 'LIVE';
      position: absolute;
      top: 11px; right: 11px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #22c55e;
      background: rgba(34, 197, 94, 0.13);
      border: 1px solid rgba(34, 197, 94, 0.28);
      padding: 2px 6px;
      border-radius: 20px;
    }

    .card-meta {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      padding-right: 52px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-foot {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .palette { display: flex; gap: 3px; }
    .pal-dot { width: 8px; height: 8px; border-radius: 50%; }

    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
    .tag {
      font-size: 10px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 20px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      :root { --drawer-width: 100vw; }
      .nav-title, .nav-date { display: none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-live"><div class="live-dot"></div>Live</div>
  <div class="nav-sep"></div>
  <span class="nav-day-badge" id="nav-badge">Day —</span>
  <span class="nav-title"  id="nav-title">Loading…</span>
  <span class="nav-date"   id="nav-date"></span>
  <button class="archive-btn" id="archive-btn" aria-label="Open archive">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12,6 12,12 16,14"/>
    </svg>
    Archive
  </button>
</nav>

<div class="frame-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading today's experience…</p>
  </div>
  <iframe id="day-frame" title="Daily Interactive Experience" allowfullscreen></iframe>
</div>

<div class="overlay" id="overlay"></div>

<aside class="drawer" id="drawer" aria-label="Time Machine Archive">
  <div class="drawer-head">
    <h2>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12,6 12,12 16,14"/>
      </svg>
      Time Machine
    </h2>
    <button class="x-btn" id="close-btn" aria-label="Close">✕</button>
  </div>
  <div class="drawer-sub">
    Every past experience is preserved — nothing is ever deleted. Select any day to relaunch it.
  </div>
  <div class="drawer-list" id="drawer-list"></div>
</aside>

<script>
  const frame    = document.getElementById('day-frame');
  const loading  = document.getElementById('loading');
  const overlay  = document.getElementById('overlay');
  const drawer   = document.getElementById('drawer');
  const list     = document.getElementById('drawer-list');

  const open  = () => { drawer.classList.add('open');  overlay.classList.add('on'); };
  const close = () => { drawer.classList.remove('open'); overlay.classList.remove('on'); };

  document.getElementById('archive-btn').addEventListener('click', open);
  document.getElementById('close-btn').addEventListener('click', close);
  overlay.addEventListener('click', close);

  function fmtDate(s) {
    return new Date(s + 'T12:00:00').toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });
  }

  let activeDate = null;

  function loadDay(day) {
    loading.classList.remove('gone');
    frame.classList.remove('ready');
    frame.src = `days/${day.date}/index.html`;
    frame.onload = () => { frame.classList.add('ready'); loading.classList.add('gone'); };
    document.getElementById('nav-badge').textContent = `Day ${day.day_number}`;
    document.getElementById('nav-title').textContent  = day.title;
    document.getElementById('nav-date').textContent   = fmtDate(day.date);
    activeDate = day.date;

    /* highlight active card */
    document.querySelectorAll('.day-card').forEach(c => {
      c.classList.toggle('is-active', c.dataset.date === day.date);
    });
    close();
  }

  function buildCard(day) {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.dataset.date = day.date;

    const dots = day.palette
      .map(c => `<div class="pal-dot" style="background:${c}"></div>`)
      .join('');
    const tags = day.tags.slice(0, 2)
      .map(t => `<span class="tag">${t}</span>`)
      .join('');

    card.innerHTML = `
      <div class="card-meta">Day ${day.day_number} &middot; ${fmtDate(day.date)}</div>
      <div class="card-title">${day.title}</div>
      <div class="card-desc">${day.description}</div>
      <div class="card-foot">
        <div class="palette">${dots}</div>
        <div class="card-tags">${tags}</div>
      </div>`;

    card.addEventListener('click', () => loadDay(day));
    return card;
  }

  async function boot() {
    try {
      const manifest = await fetch('days/manifest.json').then(r => r.json());
      const sorted   = [...manifest.days].reverse();
      sorted.forEach(d => list.appendChild(buildCard(d)));

      const today = manifest.days.find(d => d.status === 'active')
                 ?? manifest.days[manifest.days.length - 1];
      loadDay(today);
    } catch {
      loading.querySelector('p').textContent = 'Could not load experience — please refresh.';
    }
  }

  boot();
</script>
</body>
</html>
