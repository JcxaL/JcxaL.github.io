<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Shader Playground</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--panel:#0f0f1a;--panel2:#161625;--border:#22223a;
  --text:#e2e2f0;--muted:#7070a0;--accent:#7c3aed;--accent2:#06b6d4;
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;overflow:hidden;font-size:14px}

/* ─── LAYOUT ─── */
.app{display:grid;grid-template-rows:50px 1fr;grid-template-columns:210px 1fr 360px;width:100%;height:100%}

/* toolbar */
.toolbar{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:var(--panel);border-bottom:1px solid var(--border);overflow:hidden}
.logo{font-size:15px;font-weight:800;color:var(--accent);letter-spacing:-.5px;flex:0 0 auto}
.logo span{color:var(--accent2)}
.scene-tabs{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.scene-tabs::-webkit-scrollbar{display:none}
.stab{padding:5px 11px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;
  white-space:nowrap;transition:all .15s;font-family:inherit}
.stab:hover{color:var(--text);border-color:var(--accent)}
.stab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tbtn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);
  background:var(--panel2);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;
  transition:all .15s;white-space:nowrap;font-family:inherit}
.tbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn.go{background:var(--green);border-color:var(--green);color:#fff}
.tbtn.go:hover{opacity:.85}

/* left panel */
.lpanel{background:var(--panel);border-right:1px solid var(--border);
  padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.sinfo h2{font-size:13px;color:var(--accent2);margin-bottom:6px;font-weight:700}
.sinfo p{font-size:11px;color:var(--muted);line-height:1.6}
.csec h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  margin-bottom:10px;font-weight:700}
.crow{margin-bottom:11px}
.crow label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);
  margin-bottom:4px}
.crow label span.v{color:var(--accent2);font-weight:700}
.crow input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer}
.hints{font-size:11px;color:var(--muted);line-height:1.8}

/* canvas */
.carea{position:relative;overflow:hidden;background:#000;cursor:crosshair}
canvas#gl{display:block;width:100%;height:100%}
.fps{position:absolute;top:8px;left:8px;font-size:10px;padding:2px 7px;border-radius:4px;
  background:rgba(0,0,0,.7);color:#0f0;font-family:monospace;pointer-events:none}
.errov{position:absolute;bottom:0;left:0;right:0;background:rgba(239,68,68,.92);
  color:#fff;padding:10px 14px;font-size:11px;font-family:monospace;
  white-space:pre-wrap;max-height:35%;overflow-y:auto;display:none}
.errov.show{display:block}

/* right panel */
.rpanel{background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.cheader{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-bottom:1px solid var(--border);background:var(--panel2)}
.cheader code{font-size:11px;color:var(--muted);font-family:monospace}
.fmtog{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer}
.cbox{flex:1;overflow:hidden;position:relative}
#ed{width:100%;height:100%;background:#0a0a16;color:#ccd6f6;border:none;outline:none;
  resize:none;font-family:'Courier New',monospace;font-size:11px;line-height:1.55;
  padding:12px;tab-size:2;-webkit-text-size-adjust:none}
.cfooter{padding:8px 10px;border-top:1px solid var(--border);background:var(--panel2);
  display:flex;gap:7px;align-items:center}
#btn-apply{flex:1;padding:7px;border-radius:6px;background:var(--accent);border:none;
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit}
#btn-apply:hover{opacity:.82}
.slbtns{display:flex;gap:5px}
.slbtn{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--panel);
  color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s}
.slbtn:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.key-hint{position:absolute;bottom:6px;right:10px;font-size:9px;color:var(--muted);pointer-events:none}

/* Mobile */
@media(max-width:860px){
  .app{grid-template-rows:50px 1fr 240px;grid-template-columns:1fr}
  .toolbar{gap:6px}
  .lpanel{display:none}
  .carea{grid-row:2;grid-column:1}
  .rpanel{grid-row:3;grid-column:1;border-left:none;border-top:1px solid var(--border)}
  .cheader code{display:none}
  #ed{font-size:10px}
}
</style>
</head>
<body>
<div class="app">

<!-- Toolbar -->
<div class="toolbar">
  <div class="logo">⬡ Shader<span>Lab</span></div>
  <div class="scene-tabs" id="stabs">
    <button class="stab on" data-s="0">Mandelbrot</button>
    <button class="stab" data-s="1">Julia</button>
    <button class="stab" data-s="2">Ray World</button>
    <button class="stab" data-s="3">Domain Warp</button>
    <button class="stab" data-s="4">Voronoi</button>
    <button class="stab" data-s="5">Plasma</button>
  </div>
  <button class="tbtn" id="btn-play">⏸ Pause</button>
  <button class="tbtn go" id="btn-export">↓ PNG</button>
</div>

<!-- Left panel -->
<div class="lpanel">
  <div class="sinfo">
    <h2 id="sname">Mandelbrot Explorer</h2>
    <p id="sdesc"></p>
  </div>
  <div class="csec" id="scontrols"></div>
  <div class="csec">
    <h3>Controls</h3>
    <div class="hints" id="shints"></div>
  </div>
</div>

<!-- Canvas -->
<div class="carea" id="carea">
  <canvas id="gl"></canvas>
  <div class="fps" id="fps">-- fps</div>
  <div class="errov" id="errov"></div>
</div>

<!-- Code editor -->
<div class="rpanel">
  <div class="cheader">
    <code id="shaderlbl">fragment_shader.glsl</code>
    <label class="fmtog" title="Toggle full GLSL or main-body only">
      <input type="checkbox" id="fullmode"> full source
    </label>
  </div>
  <div class="cbox">
    <textarea id="ed" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    <div class="key-hint">Ctrl+Enter to apply</div>
  </div>
  <div class="cfooter">
    <button id="btn-apply">⚡ Apply Shader</button>
    <div class="slbtns">
      <button class="slbtn" id="btn-save" title="Save to localStorage">💾</button>
      <button class="slbtn" id="btn-load" title="Load saved">📂</button>
      <button class="slbtn" id="btn-reset" title="Reset preset">↺</button>
    </div>
  </div>
</div>

</div>
<script>
// ─────────────────────────────────────────────
//  SHADER PRESETS
// ─────────────────────────────────────────────
const VERT = `attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.0,1.0);}`;

const PRESETS = [
// 0 ── MANDELBROT
{
 name:"Mandelbrot Explorer",
 desc:"The classical Mandelbrot set rendered with smooth iteration coloring. Drag to pan, scroll/pinch to zoom.",
 hints:"Drag: pan · Scroll: zoom · Space: pause · Ctrl+Enter: apply shader · ↓PNG: export",
 uniforms:{
   u_iter:{label:"Max iterations",min:20,max:300,step:1,def:90},
   u_palette:{label:"Color palette (0–2)",min:0,max:2,step:0.01,def:0},
   u_speed:{label:"Color cycle speed",min:0,max:2,step:0.01,def:0.4}
 },
 frag:`precision highp float;
uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;
uniform float u_zoom;uniform vec2 u_center;
uniform float u_iter;uniform float u_palette;uniform float u_speed;

vec3 pal(float t,float p){
  vec3 a=vec3(.5),b=vec3(.5),c,d;
  if(p<1.){c=vec3(1.);d=vec3(0.,.33,.67);}
  else if(p<2.){c=vec3(1.,.7,.4);d=vec3(0.,.15,.20);a=vec3(.5,.4,.3);b=vec3(.5,.4,.3);}
  else{c=vec3(.5,.5,.5);d=vec3(.1,.2,.3);}
  return a+b*cos(6.28318*(c*t+d));
}
void main(){
  vec2 uv=(gl_FragCoord.xy-u_res*.5)/min(u_res.x,u_res.y);
  uv=uv/exp(u_zoom*.35)+u_center;
  vec2 c=uv,z=vec2(0.);float n=0.,mx=u_iter;
  for(float i=0.;i<300.;i++){
    if(i>=mx)break;
    z=vec2(z.x*z.x-z.y*z.y+c.x,2.*z.x*z.y+c.y);
    if(dot(z,z)>4.){n=i-log2(log2(dot(z,z)))+4.;break;}
  }
  if(n==0.&&dot(z,z)<=4.){gl_FragColor=vec4(0.,0.,0.,1.);return;}
  vec3 col=pal(n/mx*2.5+u_time*u_speed*.15,u_palette);
  gl_FragColor=vec4(col,1.);
}`
},

// 1 ── JULIA
{
 name:"Julia Navigator",
 desc:"Mouse position drives the Julia set parameter c in real time. Watch the set morph and breathe.",
 hints:"Move mouse: morph c · Scroll: zoom · Drag: pan · Try moving slowly along the cardioid edge",
 uniforms:{
   u_iter:{label:"Max iterations",min:20,max:200,step:1,def:80},
   u_speed:{label:"Hue cycle speed",min:0,max:2,step:0.01,def:0.3}
 },
 frag:`precision highp float;
uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;
uniform float u_zoom;uniform vec2 u_center;
uniform float u_iter;uniform float u_speed;

vec3 pal(float t){
  return .5+.5*cos(6.28318*(vec3(.3,.5,.7)*t+vec3(0.,.1,.2)));
}
void main(){
  vec2 uv=(gl_FragCoord.xy-u_res*.5)/min(u_res.x,u_res.y)*exp(-u_zoom*.3);
  uv+=u_center;
  vec2 c=(u_mouse-.5)*2.4;
  vec2 z=uv;float n=0.,mx=u_iter;
  for(float i=0.;i<200.;i++){
    if(i>=mx)break;
    z=vec2(z.x*z.x-z.y*z.y+c.x,2.*z.x*z.y+c.y);
    if(dot(z,z)>4.){n=i-log2(log2(dot(z,z)))+4.;break;}
  }
  if(n==0.&&dot(z,z)<=4.){gl_FragColor=vec4(0.,0.,0.,1.);return;}
  vec3 col=pal(n/mx*3.+u_time*u_speed*.1);
  gl_FragColor=vec4(col,1.);
}`
},

// 2 ── RAYMARCHING
{
 name:"Raymarched World",
 desc:"SDF raymarching: orbiting spheres, a torus, and a box with soft shadows and ambient occlusion.",
 hints:"Mouse: orbit camera · Scroll: zoom FOV · AO: shadow depth · Fog: depth haze",
 uniforms:{
   u_fov:{label:"Field of view",min:0.5,max:2.5,step:0.01,def:1.3},
   u_ao:{label:"Ambient occlusion",min:0,max:1,step:0.01,def:0.6},
   u_fog:{label:"Fog density",min:0,max:1,step:0.01,def:0.25}
 },
 frag:`precision highp float;
uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;
uniform float u_fov;uniform float u_ao;uniform float u_fog;

float sdSphere(vec3 p,float r){return length(p)-r;}
float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sdTorus(vec3 p,vec2 t){return length(vec2(length(p.xz)-t.x,p.y))-t.y;}
float sdPlane(vec3 p){return p.y+1.8;}
float sdCapsule(vec3 p,vec3 a,vec3 b,float r){
  vec3 ab=b-a,ap=p-a;float t=clamp(dot(ap,ab)/dot(ab,ab),0.,1.);
  return length(ap-ab*t)-r;
}

float scene(vec3 p){
  float t=u_time*.5,d=1e9;
  d=min(d,sdSphere(p-vec3(sin(t)*1.5,.3,cos(t)*1.5),.55));
  d=min(d,sdSphere(p-vec3(sin(t+2.09)*1.5,.0+sin(t*.8)*.5,cos(t+2.09)*1.5),.45));
  d=min(d,sdSphere(p-vec3(sin(t+4.19)*1.5,.1+cos(t*.6)*.4,cos(t+4.19)*1.5),.4));
  d=min(d,sdTorus(p-vec3(0.,.4,0.),vec2(1.0,.22)));
  d=min(d,sdBox(p-vec3(-2.,.0,0.),vec3(.28,.6,.28)));
  d=min(d,sdPlane(p));
  return d;
}

vec3 nor(vec3 p){
  float e=.001;
  return normalize(vec3(scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),
                        scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),
                        scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))));
}

float shadow(vec3 ro,vec3 rd){
  float res=1.,t=.02;
  for(int i=0;i<32;i++){float h=scene(ro+rd*t);if(h<.001)return 0.;res=min(res,12.*h/t);t+=h;if(t>8.)break;}
  return res;
}

float ao(vec3 p,vec3 n){
  float o=0.,s=1.;
  for(int i=0;i<5;i++){float h=.02+.11*float(i)/4.;o+=(h-scene(p+n*h))*s;s*=.95;}
  return clamp(1.-3.*o*u_ao,0.,1.);
}

void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.-1.;uv.x*=u_res.x/u_res.y;
  float az=(u_mouse.x-.5)*6.28318,el=(u_mouse.y-.1)*.9+.1;
  vec3 ro=vec3(cos(az)*cos(el)*4.,sin(el)*3.,sin(az)*cos(el)*4.);
  vec3 fw=normalize(-ro),rg=normalize(cross(vec3(0,1,0),fw)),up=cross(fw,rg);
  vec3 rd=normalize(uv.x*rg*u_fov+uv.y*up*u_fov+fw);
  vec3 ld=normalize(vec3(.5,1.2,.7));

  float t=.0;vec3 col=vec3(0.);bool hit=false;
  for(int i=0;i<96;i++){
    float d=scene(ro+rd*t);
    if(d<.001){hit=true;break;}
    t+=d;if(t>25.)break;
  }
  if(hit){
    vec3 p=ro+rd*t,n=nor(p);
    float diff=max(dot(n,ld),0.),sh=shadow(p,ld),occ=ao(p,n);
    float checker=mod(floor(p.x)+floor(p.z),2.);
    vec3 bc=p.y>-1.75?vec3(.5,.55,.7):mix(vec3(.3,.3,.35),vec3(.2,.25,.3),checker);
    col=bc*(diff*sh*.9+occ*.2+.07);
    col+=pow(max(dot(reflect(-ld,n),-rd),0.),40.)*.5;
    col=mix(col,vec3(.08,.1,.16),1.-exp(-t*.05*u_fog*5.));
  }else{
    col=mix(vec3(.05,.07,.14),vec3(.18,.28,.48),max(rd.y,0.));
  }
  col=pow(max(col,0.),vec3(.4545));
  gl_FragColor=vec4(col,1.);
}`
},

// 3 ── DOMAIN WARP FBM
{
 name:"Domain Warp FBM",
 desc:"Iq-style warped fractional Brownian motion. Two layers of noise warp a third for organic, flowing forms.",
 hints:"Mouse: pan view · Octaves: detail/performance tradeoff · Warp: fold strength · Speed: flow rate",
 uniforms:{
   u_octaves:{label:"FBM octaves (2–8)",min:2,max:8,step:1,def:5},
   u_warp:{label:"Warp strength",min:0,max:3,step:0.01,def:1.3},
   u_speed:{label:"Flow speed",min:0,max:2,step:0.01,def:0.4}
 },
 frag:`precision highp float;
uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;
uniform float u_octaves;uniform float u_warp;uniform float u_speed;

float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}

float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

float fbm(vec2 p){
  float v=0.,a=.5;float angle=.5;float ca=cos(angle),sa=sin(angle);
  mat2 m=mat2(ca,-sa,sa,ca);
  for(int i=0;i<8;i++){if(float(i)>=u_octaves)break;v+=a*noise(p);p=m*p*2.1;a*=.5;}
  return v;
}

void main(){
  vec2 uv=(gl_FragCoord.xy/u_res-.5)*3.;uv.x*=u_res.x/u_res.y;
  uv+=(u_mouse-.5)*1.5;
  float t=u_time*u_speed*.3;
  vec2 q=vec2(fbm(uv+t),fbm(uv+vec2(5.2,1.3)+t));
  vec2 r=vec2(fbm(uv+u_warp*q+vec2(1.7,9.2)+t*.5),
              fbm(uv+u_warp*q+vec2(8.3,2.8)+t*.5));
  float f=fbm(uv+u_warp*r+t*.25);
  vec3 col=mix(vec3(.08,.04,.12),vec3(.45,.18,.08),clamp(f*2.,0.,1.));
  col=mix(col,vec3(.9,.55,.05),clamp(f*f*4.,0.,1.));
  col=mix(col,vec3(1.,.92,.7),clamp(pow(f,8.)*18.,0.,1.));
  col*=f*1.6;
  gl_FragColor=vec4(col,1.);
}`
},

// 4 ── VORONOI
{
 name:"Voronoi Mosaic",
 desc:"Animated Voronoi diagram with smooth borders and per-cell color gradients.",
 hints:"Mouse: distort cell positions · Scale: cell density · Speed: drift rate · Smooth: border width",
 uniforms:{
   u_scale:{label:"Cell scale",min:2,max:22,step:0.1,def:8},
   u_speed:{label:"Animation speed",min:0,max:3,step:0.01,def:1.0},
   u_smooth:{label:"Border softness",min:0,max:0.5,step:0.001,def:0.06}
 },
 frag:`precision highp float;
uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;
uniform float u_scale;uniform float u_speed;uniform float u_smooth;

vec2 hash2(vec2 p){
  p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));
  return fract(sin(p)*43758.5453);
}

void main(){
  vec2 uv=gl_FragCoord.xy/min(u_res.x,u_res.y)*u_scale;
  uv+=(u_mouse-.5)*4.;
  vec2 id=floor(uv),fr=fract(uv);
  float t=u_time*u_speed*.5;
  float d1=9.,d2=9.;vec2 mp=vec2(0.);
  for(int j=-2;j<=2;j++)for(int i=-2;i<=2;i++){
    vec2 cell=vec2(float(i),float(j));
    vec2 h=hash2(id+cell);
    vec2 o=.5+.45*sin(t+6.28318*h);
    vec2 r=cell+o-fr;float d=dot(r,r);
    if(d<d1){d2=d1;d1=d;mp=h;}else if(d<d2){d2=d;}
  }
  float border=1.-smoothstep(0.,u_smooth,sqrt(d2)-sqrt(d1));
  vec3 col=.5+.45*cos(6.28318*(mp.xyy+vec3(0.,.33,.67)+t*.1));
  col=mix(col,vec3(1.),border*.9);
  col*=mix(.6,1.1,sqrt(d1));
  gl_FragColor=vec4(clamp(col,0.,1.),1.);
}`
},

// 5 ── PLASMA
{
 name:"Plasma Waves",
 desc:"Classic demoscene plasma — layered sine and radial waves create mesmerising organic color fields.",
 hints:"Mouse: adds an interactive wave source · Freq: wave density · Speed: cycle rate · Twist: rotational warp",
 uniforms:{
   u_freq:{label:"Wave frequency",min:1,max:12,step:0.1,def:5},
   u_speed:{label:"Animation speed",min:0,max:4,step:0.01,def:1.5},
   u_twist:{label:"Twist amount",min:0,max:4,step:0.01,def:1.2}
 },
 frag:`precision highp float;
uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;
uniform float u_freq;uniform float u_speed;uniform float u_twist;

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;float ar=u_res.x/u_res.y;
  vec2 p=(uv-.5)*2.;p.x*=ar;
  float t=u_time*u_speed*.5,f=u_freq;
  float v=sin(p.x*f+t)+sin(p.y*f+t*1.1)+sin((p.x+p.y)*f*.7+t*.9)+sin(length(p)*f+t);
  float angle=atan(p.y,p.x)+t*.3*u_twist;float r=length(p);
  v+=sin(r*f*1.2-t+angle*u_twist)*1.6+sin(r*f*.5+angle*2.+t*.7)*.5;
  vec2 mp=(u_mouse-.5)*2.;mp.x*=ar;float md=length(p-mp);
  v+=sin(md*f*2.-t*2.)*.8;
  v=(v+7.)/14.;
  vec3 col=vec3(sin(v*6.28318+t*.2)*.5+.5,
                sin(v*6.28318*1.3+t*.15+2.094)*.5+.5,
                sin(v*6.28318*1.7+t*.1+4.189)*.5+.5);
  gl_FragColor=vec4(col,1.);
}`
}
];

// ─────────────────────────────────────────────
//  WEBGL INIT
// ─────────────────────────────────────────────
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl',{preserveDrawingBuffer:true,antialias:false});
if(!gl){document.body.innerHTML='<p style="color:#ef4444;padding:40px;font-size:18px">WebGL not supported.</p>';throw 0;}

let prog=null,quadBuf=null;
let curScene=0,paused=false;
let startT=performance.now(),pauseT=0;
let fcnt=0,lastFpsT=0;
let mx=0.5,my=0.5;
let zoom=0,cx=-0.5,cy=0;
let dragging=false,drgX=0,drgY=0;
const ust={};// uniform state per scene

function compile(type,src){
  const sh=gl.createShader(type);
  gl.shaderSource(sh,src);gl.compileShader(sh);
  if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){
    const e=gl.getShaderInfoLog(sh);gl.deleteShader(sh);throw e;
  }
  return sh;
}
function link(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,vs);gl.attachShader(p,fs);gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){const e=gl.getProgramInfoLog(p);gl.deleteProgram(p);throw e;}
  return p;
}
function applyFrag(src){
  try{
    const np=link(compile(gl.VERTEX_SHADER,VERT),compile(gl.FRAGMENT_SHADER,src));
    if(prog)gl.deleteProgram(prog);
    prog=np;
    document.getElementById('errov').className='errov';
  }catch(e){
    const el=document.getElementById('errov');
    el.textContent=String(e);el.className='errov show';
  }
}
function initQuad(){
  quadBuf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
}

// ─────────────────────────────────────────────
//  SCENE LOADING
// ─────────────────────────────────────────────
function loadScene(idx){
  curScene=idx;
  const p=PRESETS[idx];
  if(idx<2){zoom=0;cx=idx===0?-0.5:0;cy=0;}
  document.getElementById('sname').textContent=p.name;
  document.getElementById('sdesc').textContent=p.desc;
  document.getElementById('shints').innerHTML=p.hints.replace(/·/g,'<br>');
  document.querySelectorAll('.stab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  document.getElementById('shaderlbl').textContent=p.name.toLowerCase().replace(/\s+/g,'_')+'.glsl';

  // Build controls
  const sec=document.getElementById('scontrols');
  sec.innerHTML='<h3>Parameters</h3>';
  if(!ust[idx])ust[idx]={};
  for(const[name,cfg]of Object.entries(p.uniforms)){
    if(ust[idx][name]===undefined)ust[idx][name]=cfg.def;
    const row=document.createElement('div');row.className='crow';
    const lbl=document.createElement('label');
    const vspan=document.createElement('span');vspan.className='v';vspan.id='v_'+name;
    vspan.textContent=Number(ust[idx][name]).toFixed(2);
    lbl.innerHTML=`<span>${cfg.label}</span>`;lbl.appendChild(vspan);
    const inp=document.createElement('input');inp.type='range';
    inp.min=cfg.min;inp.max=cfg.max;inp.step=cfg.step;inp.value=ust[idx][name];
    inp.addEventListener('input',()=>{
      ust[idx][name]=parseFloat(inp.value);
      vspan.textContent=Number(inp.value).toFixed(2);
    });
    row.appendChild(lbl);row.appendChild(inp);sec.appendChild(row);
  }

  document.getElementById('ed').value=p.frag;
  applyFrag(p.frag);
}

// ─────────────────────────────────────────────
//  RENDER LOOP
// ─────────────────────────────────────────────
function resize(){
  const el=canvas.parentElement;
  const w=el.clientWidth,h=el.clientHeight;
  const dpr=Math.min(devicePixelRatio,2);
  if(canvas.width!==Math.round(w*dpr)||canvas.height!==Math.round(h*dpr)){
    canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);
    canvas.style.width=w+'px';canvas.style.height=h+'px';
    gl.viewport(0,0,canvas.width,canvas.height);
  }
}
function getT(){
  return paused?(pauseT-startT)/1000:(performance.now()-startT)/1000;
}
function setU1(name,v){const l=gl.getUniformLocation(prog,name);if(l)gl.uniform1f(l,v);}
function setU2(name,a,b){const l=gl.getUniformLocation(prog,name);if(l)gl.uniform2f(l,a,b);}

function render(){
  if(!prog){requestAnimationFrame(render);return;}
  resize();
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(prog);
  const pos=gl.getAttribLocation(prog,'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

  setU2('u_res',canvas.width,canvas.height);
  setU1('u_time',getT());
  setU2('u_mouse',mx,my);
  setU1('u_zoom',zoom);
  setU2('u_center',cx,cy);

  const su=ust[curScene]||{};
  for(const[n,v]of Object.entries(su))setU1(n,v);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  fcnt++;const now=performance.now();
  if(now-lastFpsT>600){
    document.getElementById('fps').textContent=Math.round(fcnt*1000/(now-lastFpsT))+' fps';
    fcnt=0;lastFpsT=now;
  }
  if(!paused)requestAnimationFrame(render);
}

// ─────────────────────────────────────────────
//  UI EVENTS
// ─────────────────────────────────────────────
document.getElementById('stabs').addEventListener('click',e=>{
  const t=e.target.closest('.stab');if(t)loadScene(parseInt(t.dataset.s));
});

document.getElementById('btn-play').addEventListener('click',()=>{
  paused=!paused;
  document.getElementById('btn-play').textContent=paused?'▶ Play':'⏸ Pause';
  if(paused)pauseT=performance.now();
  else{startT+=performance.now()-pauseT;requestAnimationFrame(render);}
});

document.getElementById('btn-export').addEventListener('click',()=>{
  if(paused){// render one frame first
    const tmp=paused;paused=false;render();paused=tmp;
  }
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=`shaderlab-${PRESETS[curScene].name.toLowerCase().replace(/\s+/g,'-')}-${Date.now()}.png`;
  a.click();
});

document.getElementById('btn-apply').addEventListener('click',()=>{
  applyFrag(document.getElementById('ed').value);
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  const src=PRESETS[curScene].frag;
  document.getElementById('ed').value=src;applyFrag(src);
});
document.getElementById('btn-save').addEventListener('click',()=>{
  const saves=JSON.parse(localStorage.getItem('shaderlab_saves')||'{}');
  saves[curScene]=document.getElementById('ed').value;
  localStorage.setItem('shaderlab_saves',JSON.stringify(saves));
  const b=document.getElementById('btn-save');b.textContent='✓';
  setTimeout(()=>b.textContent='💾',1400);
});
document.getElementById('btn-load').addEventListener('click',()=>{
  const saves=JSON.parse(localStorage.getItem('shaderlab_saves')||'{}');
  if(saves[curScene]){document.getElementById('ed').value=saves[curScene];applyFrag(saves[curScene]);}
  else alert('No saved shader for this scene.');
});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key===' '&&e.target.tagName!=='TEXTAREA'){e.preventDefault();document.getElementById('btn-play').click();}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();document.getElementById('btn-apply').click();}
  if(e.key>='1'&&e.key<='6'&&e.target.tagName!=='TEXTAREA')loadScene(parseInt(e.key)-1);
});

// ─────────────────────────────────────────────
//  MOUSE / TOUCH
// ─────────────────────────────────────────────
const ca=document.getElementById('carea');

ca.addEventListener('mousemove',e=>{
  const r=ca.getBoundingClientRect();
  mx=(e.clientX-r.left)/r.width;my=1-(e.clientY-r.top)/r.height;
  if(dragging){
    const sc=Math.exp(-zoom*.35)/Math.min(canvas.width,canvas.height)*canvas.width;
    cx-=(e.clientX-drgX)/r.width*sc*2.5;
    cy+=(e.clientY-drgY)/r.height*sc*2.5;
    drgX=e.clientX;drgY=e.clientY;
  }
});
ca.addEventListener('mousedown',e=>{dragging=true;drgX=e.clientX;drgY=e.clientY;});
ca.addEventListener('mouseup',()=>dragging=false);
ca.addEventListener('mouseleave',()=>dragging=false);
ca.addEventListener('wheel',e=>{
  e.preventDefault();
  zoom=Math.max(-2,Math.min(18,zoom-e.deltaY*.005));
},{passive:false});

let ltd=0;
ca.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;drgX=e.touches[0].clientX;drgY=e.touches[0].clientY;}
  else if(e.touches.length===2){dragging=false;ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  e.preventDefault();},{passive:false});
ca.addEventListener('touchmove',e=>{
  const r=ca.getBoundingClientRect();
  if(e.touches.length===1&&dragging){
    const sc=Math.exp(-zoom*.35)/Math.min(canvas.width,canvas.height)*canvas.width;
    cx-=(e.touches[0].clientX-drgX)/r.width*sc*2.5;
    cy+=(e.touches[0].clientY-drgY)/r.height*sc*2.5;
    drgX=e.touches[0].clientX;drgY=e.touches[0].clientY;
    mx=(e.touches[0].clientX-r.left)/r.width;my=1-(e.touches[0].clientY-r.top)/r.height;
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoom=Math.max(-2,Math.min(18,zoom+(d-ltd)*.02));ltd=d;
  }
  e.preventDefault();},{passive:false});
ca.addEventListener('touchend',()=>dragging=false);

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
initQuad();
loadScene(0);
requestAnimationFrame(render);
</script>
</body>
</html>
