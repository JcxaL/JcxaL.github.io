<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iso World Builder</title>
<style>
:root{
  --bg:#0c0918;--panel:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);
  --accent:#a78bfa;--text:#e2d9f3;--dim:#7c6fad;--shadow:rgba(0,0,0,0.6)
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column}

#hd{display:flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(0,0,0,0.4);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#hd h1{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:-.02em;margin-right:4px;white-space:nowrap}
.hb{padding:4px 11px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:11px;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap;line-height:1.4}
.hb:hover{background:rgba(167,139,250,.22);border-color:var(--accent)}
#hd-tip{margin-left:auto;font-size:9.5px;color:var(--dim);white-space:nowrap}

#main{flex:1;display:flex;overflow:hidden}
#cw{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;top:0;left:0;touch-action:none}

#sb{width:188px;background:rgba(0,0,0,0.25);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:9px;gap:9px;overflow-y:auto;flex-shrink:0;scrollbar-width:thin;scrollbar-color:rgba(167,139,250,.3) transparent}
.sec{display:flex;flex-direction:column;gap:5px}
.sl{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--dim)}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tb{padding:6px 4px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:10px;cursor:pointer;text-align:center;transition:all .13s;line-height:1.3}
.tb:hover,.tb.on{background:rgba(167,139,250,.28);border-color:var(--accent);color:var(--accent)}
#tp{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.tile-btn{border-radius:6px;border:2px solid rgba(255,255,255,.06);cursor:pointer;padding:3px 2px;background:rgba(255,255,255,.04);transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tile-btn:hover{transform:scale(1.07);border-color:rgba(255,255,255,.2)}
.tile-btn.on{border-color:rgba(255,255,255,.85);background:rgba(255,255,255,.1)}
.tile-sw{width:100%;aspect-ratio:1;border-radius:4px}
.tile-lbl{font-size:7px;color:var(--dim);white-space:nowrap;overflow:hidden;width:100%;text-align:center}
.hc{display:flex;align-items:center;gap:7px}
.hcb{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;flex-shrink:0}
.hcb:hover{background:rgba(167,139,250,.25);border-color:var(--accent)}
#hv{font-size:20px;font-weight:800;color:var(--accent);flex:1;text-align:center}
.hc-track{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;position:relative}
.hc-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .15s}
#pbtns{display:flex;flex-direction:column;gap:4px}
.pb{padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:10px;cursor:pointer;text-align:left;transition:all .13s}
.pb:hover{background:rgba(167,139,250,.2);border-color:var(--accent)}
.sep{height:1px;background:var(--border);margin:2px 0}

#ib{padding:3px 12px;font-size:9.5px;color:var(--dim);background:rgba(0,0,0,.45);border-top:1px solid var(--border);flex-shrink:0}

@media(max-width:580px){
  #sb{width:100%;height:140px;border-left:none;border-top:1px solid var(--border);flex-direction:row;overflow-x:auto;overflow-y:hidden;padding:7px;gap:8px}
  #sb .sec{flex-shrink:0;min-width:110px}
  #hd-tip{display:none}
}
</style>
</head>
<body>
<div id="hd">
  <h1>⬡ Iso World Builder</h1>
  <button class="hb" id="bundo">↩ Undo</button>
  <button class="hb" id="bredo">↪ Redo</button>
  <button class="hb" id="bclr">🗑 Clear</button>
  <button class="hb" id="bsave">💾 Save</button>
  <button class="hb" id="bload">📂 Load</button>
  <button class="hb" id="bexp">⬇ PNG</button>
  <span id="hd-tip">Drag = pan · Scroll = zoom · Alt+drag = pan</span>
</div>

<div id="main">
  <div id="cw"><canvas id="c"></canvas></div>

  <div id="sb">
    <div class="sec">
      <div class="sl">Tool</div>
      <div class="tg">
        <button class="tb on" data-t="paint">✏️ Paint</button>
        <button class="tb" data-t="erase">⬜ Erase</button>
        <button class="tb" data-t="fill">🪣 Fill</button>
        <button class="tb" data-t="pick">💉 Pick</button>
      </div>
    </div>

    <div class="sep"></div>

    <div class="sec">
      <div class="sl">Tile  <span id="tile-name" style="color:var(--accent);text-transform:none;font-weight:400;letter-spacing:0">Grass</span></div>
      <div id="tp"></div>
    </div>

    <div class="sep"></div>

    <div class="sec">
      <div class="sl">Height</div>
      <div class="hc">
        <button class="hcb" id="hdec">−</button>
        <span id="hv">0</span>
        <button class="hcb" id="hinc">+</button>
      </div>
    </div>

    <div class="sep"></div>

    <div class="sec">
      <div class="sl">Generate</div>
      <div id="pbtns">
        <button class="pb" data-p="plains">🌿 Plains</button>
        <button class="pb" data-p="ocean">🌊 Ocean Isle</button>
        <button class="pb" data-p="winter">❄️ Winter Ridge</button>
        <button class="pb" data-p="volcano">🌋 Volcano Crater</button>
        <button class="pb" data-p="desert">🏜 Arid Desert</button>
        <button class="pb" data-p="crystal">💎 Crystal Caves</button>
      </div>
    </div>
  </div>
</div>

<div id="ib">Ready — Z=undo · X=redo · P=paint · E=erase · F=fill · I=pick · [/]=height · 1–9=tile</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const cwEl = document.getElementById('cw');

// ── Config ──────────────────────────────────────────────
const G  = 22;   // grid size
const TW = 64;   // tile width
const TH = 32;   // tile height
const TD = 14;   // depth per height step
const MH = 5;    // max height
const UNDO_MAX = 60;

// ── Tile definitions ────────────────────────────────────
const TILES = [
  {n:'Grass',   top:'#4ade80',lf:'#15803d',rt:'#22c55e'},
  {n:'Water',   top:'#38bdf8',lf:'#0369a1',rt:'#0ea5e9',anim:1},
  {n:'Sand',    top:'#fcd34d',lf:'#b45309',rt:'#d97706'},
  {n:'Stone',   top:'#94a3b8',lf:'#334155',rt:'#475569'},
  {n:'Snow',    top:'#dbeafe',lf:'#93c5fd',rt:'#bfdbfe'},
  {n:'Dirt',    top:'#a16207',lf:'#451a03',rt:'#78350f'},
  {n:'Lava',    top:'#f97316',lf:'#7c2d12',rt:'#c2410c',anim:2},
  {n:'Ice',     top:'#bfdbfe',lf:'#1e40af',rt:'#3b82f6'},
  {n:'Gold',    top:'#fde047',lf:'#854d0e',rt:'#ca8a04',shine:1},
  {n:'Crystal', top:'#c084fc',lf:'#4c1d95',rt:'#7c3aed',shine:1},
  {n:'Obsidian',top:'#312e81',lf:'#1e1b4b',rt:'#23235e'},
  {n:'Forest',  top:'#166534',lf:'#052e16',rt:'#14532d'},
];

// ── State ───────────────────────────────────────────────
let grid = [];
let undos = [], redos = [];
let tile = 0, height = 0, tool = 'paint';
let painting = false, lastCell = -1;
let panX = 0, panY = 0, zoom = 1;
let hovered = null, tick = 0;
let panDrag = null;
let ptouches = [];
let cvW = 0, cvH = 0;

function mkGrid(){
  grid = Array.from({length:G}, () =>
    Array.from({length:G}, () => ({t:-1, h:0})));
}
function snapGrid(){ return grid.map(r => r.map(c => ({...c}))); }
function pushUndo(){ undos.push(snapGrid()); if(undos.length>UNDO_MAX)undos.shift(); redos=[]; }

// ── Coordinate math ─────────────────────────────────────
function w2s(r,c,h=0){
  return {
    x: (c-r)*(TW/2)*zoom + panX,
    y: ((c+r)*(TH/2) - h*TD)*zoom + panY
  };
}
function s2w(sx,sy){
  const cx=(sx-panX)/zoom, cy=(sy-panY)/zoom;
  const col=(cx/(TW/2)+cy/(TH/2))/2;
  const row=(cy/(TH/2)-cx/(TW/2))/2;
  return {r:Math.floor(row), c:Math.floor(col)};
}

// ── Color utils ──────────────────────────────────────────
function lgt(hex, a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const f=v=>Math.min(255,Math.round(v+(255-v)*a)).toString(16).padStart(2,'0');
  return '#'+f(r)+f(g)+f(b);
}
function drk(hex, a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const f=v=>Math.max(0,Math.round(v*(1-a))).toString(16).padStart(2,'0');
  return '#'+f(r)+f(g)+f(b);
}

// ── Draw one tile ────────────────────────────────────────
function drawTile(r, c, t, h, hov){
  if(t < 0) return;
  const {x,y} = w2s(r,c,h);
  const hw = TW*zoom/2, hh = TH*zoom/2, dp = h*TD*zoom;
  const T = TILES[t];
  let top=T.top, lf=T.lf, rt=T.rt;

  // Animated tiles
  if(T.anim){
    const p=(Math.sin(tick*.038+r*.72+c*.53)+1)/2;
    if(T.anim===1){
      const ri=Math.round(48+p*35);
      top=`rgb(${ri},${155+Math.round(p*50)},${235+Math.round(p*15)})`;
      lf=`rgb(3,${95+Math.round(p*20)},${155+Math.round(p*10)})`;
    } else {
      const ri=Math.round(200+p*55);
      top=`rgb(${ri},${55+Math.round(p*90)},15)`;
      lf=`rgb(120,40,15)`;
      rt=`rgb(${Math.round(170+p*40)},${40+Math.round(p*40)},10)`;
    }
  }
  if(hov){ top=lgt(top,.38); lf=lgt(lf,.22); rt=lgt(rt,.22); }

  // Walls (only when height > 0)
  if(h > 0){
    ctx.beginPath();
    ctx.moveTo(x-hw, y+hh);
    ctx.lineTo(x,    y+hh*2);
    ctx.lineTo(x,    y+hh*2+dp);
    ctx.lineTo(x-hw, y+hh+dp);
    ctx.closePath();
    ctx.fillStyle=lf;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x+hw, y+hh);
    ctx.lineTo(x,    y+hh*2);
    ctx.lineTo(x,    y+hh*2+dp);
    ctx.lineTo(x+hw, y+hh+dp);
    ctx.closePath();
    ctx.fillStyle=rt;
    ctx.fill();
  }

  // Top face
  ctx.beginPath();
  ctx.moveTo(x,    y);
  ctx.lineTo(x+hw, y+hh);
  ctx.lineTo(x,    y+hh*2);
  ctx.lineTo(x-hw, y+hh);
  ctx.closePath();

  if(T.shine){
    const g2=ctx.createLinearGradient(x-hw,y,x+hw,y+hh*2);
    g2.addColorStop(0, lgt(top,.55));
    g2.addColorStop(.45, top);
    g2.addColorStop(1, drk(top,.25));
    ctx.fillStyle=g2;
  } else {
    ctx.fillStyle=top;
  }
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.22)';
  ctx.lineWidth=.7;
  ctx.stroke();

  // Small height indicator dot on top face
  if(h>0){
    ctx.fillStyle=`rgba(255,255,255,${.08*h})`;
    ctx.beginPath();
    ctx.ellipse(x, y+hh, hw*.35, hh*.35, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

// ── Draw preview ghost ───────────────────────────────────
function drawPreview(r,c){
  const {x,y}=w2s(r,c,height);
  const hw=TW*zoom/2, hh=TH*zoom/2;
  ctx.save();
  ctx.globalAlpha=.42;
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(x+hw,y+hh); ctx.lineTo(x,y+hh*2); ctx.lineTo(x-hw,y+hh);
  ctx.closePath();
  ctx.fillStyle=TILES[tile].top;
  ctx.fill();
  ctx.globalAlpha=.9;
  ctx.strokeStyle='rgba(255,255,255,.6)';
  ctx.lineWidth=1.2;
  ctx.stroke();
  ctx.restore();
}

// ── Stars background (static, deterministic) ────────────
const STARS=[];
for(let i=0;i<110;i++) STARS.push({x:(i*3407+211)%1920, y:(i*2791+537)%1080, a:.15+((i*1213)%100)/400});

// ── Render ───────────────────────────────────────────────
function render(){
  const w=cwEl.clientWidth, h=cwEl.clientHeight;
  if(cv.width!==w||cv.height!==h){ cv.width=w; cv.height=h; cvW=w; cvH=h; }

  ctx.fillStyle='#0c0918';
  ctx.fillRect(0,0,w,h);

  // Subtle star field
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(const s of STARS){
    const px=s.x%w, py=s.y%h;
    ctx.globalAlpha=s.a;
    ctx.fillRect(px,py,1,1);
  }
  ctx.globalAlpha=1;

  // Painter's order: increasing d = r+c
  for(let d=0;d<G*2-1;d++){
    for(let r=0;r<G;r++){
      const c=d-r;
      if(c<0||c>=G) continue;
      const cell=grid[r][c];
      const hov=hovered&&hovered.r===r&&hovered.c===c;
      drawTile(r,c,cell.t,cell.h, hov&&(tool==='paint'||tool==='erase'));
    }
  }

  // Preview ghost when painting
  if(hovered&&tool==='paint'){
    const {r,c}=hovered;
    if(r>=0&&r<G&&c>=0&&c<G&&grid[r][c].t<0){
      drawPreview(r,c);
    }
  }
  // Erase highlight
  if(hovered&&tool==='erase'){
    const {r,c}=hovered;
    if(r>=0&&r<G&&c>=0&&c<G&&grid[r][c].t>=0){
      const {x,y}=w2s(r,c,grid[r][c].h);
      const hw=TW*zoom/2, hh=TH*zoom/2;
      ctx.save();
      ctx.globalAlpha=.35;
      ctx.beginPath();
      ctx.moveTo(x,y); ctx.lineTo(x+hw,y+hh); ctx.lineTo(x,y+hh*2); ctx.lineTo(x-hw,y+hh);
      ctx.closePath();
      ctx.fillStyle='#ef4444';
      ctx.fill();
      ctx.restore();
    }
  }

  tick++;
}

// ── Input helpers ────────────────────────────────────────
function evXY(e){
  const rect=cv.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {mx:src.clientX-rect.left, my:src.clientY-rect.top};
}

function paintAt(r,c){
  if(r<0||r>=G||c<0||c>=G) return;
  const k=r*G+c;
  if(k===lastCell) return;
  lastCell=k;
  if(tool==='paint') grid[r][c]={t:tile,h:height};
  else if(tool==='erase') grid[r][c]={t:-1,h:0};
}

function floodFill(sr,sc){
  if(sr<0||sr>=G||sc<0||sc>=G) return;
  const ot=grid[sr][sc].t, oh=grid[sr][sc].h;
  if(ot===tile&&oh===height) return;
  const q=[{r:sr,c:sc}], vis=new Set();
  while(q.length){
    const {r,c}=q.shift();
    if(r<0||r>=G||c<0||c>=G) continue;
    const k=r*G+c;
    if(vis.has(k)) continue;
    vis.add(k);
    if(grid[r][c].t!==ot||grid[r][c].h!==oh) continue;
    grid[r][c]={t:tile,h:height};
    q.push({r:r-1,c},{r:r+1,c},{r,c:c-1},{r,c:c+1});
  }
}

// ── Pointer events ───────────────────────────────────────
cv.addEventListener('pointerdown',e=>{
  if(e.button===1||(e.button===0&&e.altKey)){
    panDrag={x:e.clientX,y:e.clientY,px:panX,py:panY};
    cv.style.cursor='grabbing';
    e.preventDefault(); return;
  }
  if(e.button!==0) return;
  const {mx,my}=evXY(e);
  const {r,c}=s2w(mx,my);
  if(tool==='fill'){ pushUndo(); floodFill(r,c); }
  else if(tool==='pick'){
    if(r>=0&&r<G&&c>=0&&c<G&&grid[r][c].t>=0){
      tile=grid[r][c].t; height=grid[r][c].h; updateUI();
    }
  } else {
    pushUndo(); painting=true; lastCell=-1; paintAt(r,c);
  }
  e.preventDefault();
});

cv.addEventListener('pointermove',e=>{
  if(panDrag){
    panX=panDrag.px+(e.clientX-panDrag.x);
    panY=panDrag.py+(e.clientY-panDrag.y);
    return;
  }
  const {mx,my}=evXY(e);
  const wc=s2w(mx,my);
  hovered=wc;
  if(painting) paintAt(wc.r,wc.c);
  updateInfoBar(wc.r,wc.c);
});

cv.addEventListener('pointerup',()=>{painting=false;panDrag=null;cv.style.cursor='crosshair';});
cv.addEventListener('pointerleave',()=>{hovered=null;painting=false;});

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const f=e.deltaY<0?1.12:.89;
  const nz=Math.max(.25,Math.min(3.5,zoom*f));
  panX=mx-(mx-panX)*nz/zoom;
  panY=my-(my-panY)*nz/zoom;
  zoom=nz;
},{passive:false});

// Touch
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  ptouches=Array.from(e.touches);
  if(ptouches.length===1){
    const {mx,my}=evXY(e);
    const {r,c}=s2w(mx,my);
    hovered={r,c};
    if(tool==='fill'){ pushUndo(); floodFill(r,c); }
    else if(tool==='pick'){
      if(r>=0&&r<G&&c>=0&&c<G&&grid[r][c].t>=0){tile=grid[r][c].t;height=grid[r][c].h;updateUI();}
    } else {pushUndo();painting=true;lastCell=-1;paintAt(r,c);}
  }
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const ct=Array.from(e.touches);
  if(ct.length===1&&ptouches.length===1){
    const {mx,my}=evXY(e);
    const {r,c}=s2w(mx,my);
    hovered={r,c};
    if(painting) paintAt(r,c);
  } else if(ct.length===2&&ptouches.length>=2){
    painting=false;
    const d0=Math.hypot(ptouches[0].clientX-ptouches[1].clientX,ptouches[0].clientY-ptouches[1].clientY);
    const d1=Math.hypot(ct[0].clientX-ct[1].clientX,ct[0].clientY-ct[1].clientY);
    if(d0>0){
      const rect=cv.getBoundingClientRect();
      const cx=(ct[0].clientX+ct[1].clientX)/2-rect.left;
      const cy=(ct[0].clientY+ct[1].clientY)/2-rect.top;
      const nz=Math.max(.25,Math.min(3.5,zoom*d1/d0));
      panX=cx-(cx-panX)*nz/zoom;
      panY=cy-(cy-panY)*nz/zoom;
      zoom=nz;
    }
  }
  ptouches=ct;
},{passive:false});

cv.addEventListener('touchend',e=>{if(e.touches.length===0){painting=false;ptouches=[];}},{passive:false});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const k=e.key.toLowerCase();
  if(k==='z'&&!e.shiftKey) doUndo();
  else if((k==='z'&&e.shiftKey)||k==='x'||k==='y') doRedo();
  else if(k==='p'){tool='paint';updateUI();}
  else if(k==='e'){tool='erase';updateUI();}
  else if(k==='f'){tool='fill';updateUI();}
  else if(k==='i'){tool='pick';updateUI();}
  else if(k===']'||k==='='){ height=Math.min(MH,height+1); updateHeightUI(); }
  else if(k==='['||k==='-'){ height=Math.max(0,height-1); updateHeightUI(); }
  else if(/^[1-9]$/.test(k)){
    const i=parseInt(k)-1;
    if(i<TILES.length){ tile=i; updateUI(); }
  }
});

function doUndo(){ if(!undos.length)return; redos.push(snapGrid()); grid=undos.pop(); toast('Undo'); }
function doRedo(){ if(!redos.length)return; undos.push(snapGrid()); grid=redos.pop(); toast('Redo'); }

// ── Noise helpers ─────────────────────────────────────────
function n1(r,c,s=1){ return Math.sin(r*s*.71+c*.43)*Math.cos(c*s*.62-r*.31); }
function n2(r,c){ return n1(r,c)+n1(r*2.1,c*2.1)*.5+n1(r*4.3,c*4.3)*.25; }

// ── Presets ───────────────────────────────────────────────
const PRESETS={
  plains(){
    pushUndo(); mkGrid();
    for(let r=0;r<G;r++) for(let c=0;c<G;c++){
      const v=n2(r,c);
      const t=v>.7?11:(v>.2?0:(v>-.25?5:2));
      const h=v>.75?2:(v>.4?1:0);
      grid[r][c]={t,h};
    }
    toast('🌿 Plains');
  },
  ocean(){
    pushUndo(); mkGrid();
    for(let r=0;r<G;r++) for(let c=0;c<G;c++){
      const dr=r-G/2, dc=c-G/2;
      const d=Math.sqrt(dr*dr+dc*dc)/(G*.44);
      const v=d+n1(r,c)*.22;
      const t=v<.32?1:(v<.44?2:(v<.72?0:3));
      const h=v>.7?2:(v>.52?1:0);
      grid[r][c]={t,h};
    }
    toast('🌊 Ocean Isle');
  },
  winter(){
    pushUndo(); mkGrid();
    for(let r=0;r<G;r++) for(let c=0;c<G;c++){
      const v=n2(r*.9,c*.9);
      const t=v>.45?4:(v>0?7:3);
      const h=v>.6?3:(v>.3?2:(v>.05?1:0));
      grid[r][c]={t,h};
    }
    toast('❄️ Winter Ridge');
  },
  volcano(){
    pushUndo(); mkGrid();
    for(let r=0;r<G;r++) for(let c=0;c<G;c++){
      const dr=r-G/2, dc=c-G/2;
      const d=Math.sqrt(dr*dr+dc*dc)/(G*.44);
      const v=1-d+n1(r,c)*.18;
      const h=Math.max(0,Math.min(MH,Math.round(v*4.5)));
      const t=d<.18?6:(d<.32?10:(d<.58?3:5));
      grid[r][c]={t,h};
    }
    toast('🌋 Volcano');
  },
  desert(){
    pushUndo(); mkGrid();
    for(let r=0;r<G;r++) for(let c=0;c<G;c++){
      const v=n2(r*.8,c*.8);
      const t=v>.55?3:(v>.1?2:(v>-.3?5:2));
      const h=v>.65?2:(v>.35?1:0);
      grid[r][c]={t,h};
    }
    toast('🏜 Desert');
  },
  crystal(){
    pushUndo(); mkGrid();
    for(let r=0;r<G;r++) for(let c=0;c<G;c++){
      const v=n2(r*1.1,c*1.1);
      const t=v>.6?9:(v>.2?10:(v>-.2?8:3));
      const h=v>.65?MH:(v>.3?3:(v>0?2:0));
      grid[r][c]={t,h};
    }
    toast('💎 Crystal Caves');
  }
};

// ── Save / Load / Export ──────────────────────────────────
function saveGrid(){
  localStorage.setItem('isoworld_v2', JSON.stringify(grid));
  toast('💾 Saved!');
}
function loadGrid(){
  const s=localStorage.getItem('isoworld_v2');
  if(s){ try{ pushUndo(); grid=JSON.parse(s); toast('📂 Loaded!'); }catch(e){toast('Load error');} }
  else toast('No save found');
}
function exportPNG(){
  const a=document.createElement('a');
  a.href=cv.toDataURL('image/png');
  a.download='iso-world.png';
  a.click();
  toast('⬇ Exported!');
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg){
  let el=document.getElementById('_toast');
  if(!el){
    el=document.createElement('div');
    el.id='_toast';
    Object.assign(el.style,{
      position:'fixed',bottom:'48px',right:'16px',
      background:'rgba(109,40,217,0.92)',backdropFilter:'blur(8px)',
      color:'#fff',padding:'7px 16px',borderRadius:'9px',
      fontSize:'12px',zIndex:'9999',
      transition:'opacity .3s,transform .3s',
      pointerEvents:'none',fontWeight:'600',
      boxShadow:'0 4px 20px rgba(0,0,0,.5)'
    });
    document.body.appendChild(el);
  }
  el.textContent=msg; el.style.opacity='1'; el.style.transform='translateY(0)';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(4px)'; },2300);
}

// ── UI ────────────────────────────────────────────────────
function buildPalette(){
  const tp=document.getElementById('tp');
  tp.innerHTML='';
  TILES.forEach((t,i)=>{
    const b=document.createElement('button');
    b.className='tile-btn'+(i===tile?' on':'');
    b.title=t.n;
    b.dataset.i=i;
    b.innerHTML=`<div class="tile-sw" style="background:${t.top}"></div><div class="tile-lbl">${t.n}</div>`;
    b.onclick=()=>{ tile=i; updateUI(); };
    tp.appendChild(b);
  });
}

function updateUI(){
  document.querySelectorAll('.tile-btn').forEach((b,i)=>b.classList.toggle('on',i===tile));
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.t===tool));
  document.getElementById('tile-name').textContent=TILES[tile].n;
  updateHeightUI();
}

function updateHeightUI(){
  document.getElementById('hv').textContent=height;
}

function updateInfoBar(r,c){
  const ib=document.getElementById('ib');
  if(r>=0&&r<G&&c>=0&&c<G){
    const cell=grid[r][c];
    const tn=cell.t>=0?TILES[cell.t].n:'Empty';
    ib.textContent=`(${r},${c}) · ${tn} · H:${cell.h} | ${tool} | Z=undo · X=redo · 1–9=tile · [/]=height`;
  }
}

function centerView(){
  const r=cwEl.getBoundingClientRect();
  // Center the isometric grid
  panX=r.width/2;
  panY=r.height*.22;
  zoom=1;
}

// ── Wire up buttons ───────────────────────────────────────
document.getElementById('bundo').onclick=doUndo;
document.getElementById('bredo').onclick=doRedo;
document.getElementById('bclr').onclick=()=>{ pushUndo(); mkGrid(); toast('🗑 Cleared'); };
document.getElementById('bsave').onclick=saveGrid;
document.getElementById('bload').onclick=loadGrid;
document.getElementById('bexp').onclick=exportPNG;
document.getElementById('hdec').onclick=()=>{ height=Math.max(0,height-1); updateHeightUI(); };
document.getElementById('hinc').onclick=()=>{ height=Math.min(MH,height+1); updateHeightUI(); };
document.querySelectorAll('.tb').forEach(b=>b.onclick=()=>{ tool=b.dataset.t; updateUI(); });
document.querySelectorAll('.pb').forEach(b=>b.onclick=()=>PRESETS[b.dataset.p]());

// ── Init ──────────────────────────────────────────────────
mkGrid();
buildPalette();
updateUI();

// Load saved world or apply preset
const saved=localStorage.getItem('isoworld_v2');
if(saved){ try{ grid=JSON.parse(saved); }catch(e){ PRESETS.plains(); } }
else { PRESETS.plains(); }

// Center after a small delay (layout must be settled)
requestAnimationFrame(()=>{ centerView(); });

// Render loop
function loop(){ render(); requestAnimationFrame(loop); }
loop();
</script>
