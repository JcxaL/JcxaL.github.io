<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fluid Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#000}
#c{position:fixed;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
#fps{position:fixed;top:12px;left:12px;font:11px/1 monospace;color:rgba(255,255,255,.25);z-index:10;pointer-events:none}
#panel{
  position:fixed;top:12px;right:12px;width:214px;
  background:rgba(5,5,14,.92);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);border-radius:16px;
  padding:14px;z-index:10;font:12px/1.4 system-ui,sans-serif;color:#ccc;
  user-select:none;
}
#panel h2{font-size:13px;font-weight:700;color:#fff;margin-bottom:12px;letter-spacing:.5px}
.row{margin-bottom:10px}
.row>.lbl{display:flex;justify-content:space-between;margin-bottom:4px;color:#888;font-size:10px;text-transform:uppercase;letter-spacing:.6px}
input[type=range]{width:100%;accent-color:#7c3aed;height:3px;cursor:pointer}
.btns{display:flex;gap:4px;flex-wrap:wrap}
.btn{
  padding:5px 0;flex:1;border:1px solid rgba(255,255,255,.1);
  border-radius:8px;background:rgba(255,255,255,.05);
  color:#aaa;font-size:11px;cursor:pointer;text-align:center;
  transition:background .12s,color .12s;
}
.btn:hover{background:rgba(255,255,255,.12);color:#fff}
.btn.on{background:rgba(124,58,237,.45);border-color:#7c3aed;color:#fff}
.colors{display:flex;gap:5px;align-items:center}
input[type=color]{width:30px;height:26px;border:1px solid rgba(255,255,255,.12);border-radius:6px;cursor:pointer;padding:2px;background:none}
select{width:100%;padding:5px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#ccc;font-size:12px;cursor:pointer}
@media(max-width:600px){
  #panel{width:calc(100vw - 24px);top:auto;bottom:12px;right:12px;left:12px;max-height:52vh;overflow-y:auto}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fps">60 fps</div>
<div id="panel">
  <h2>⬡ Fluid Lab</h2>
  <div class="row">
    <div class="lbl"><span>Mode</span></div>
    <div class="btns">
      <button class="btn on" id="m-dye"   onclick="setMode('dye')">Dye</button>
      <button class="btn"    id="m-force" onclick="setMode('force')">Force</button>
      <button class="btn"    id="m-wall"  onclick="setMode('wall')">Wall</button>
      <button class="btn"    id="m-erase" onclick="setMode('erase')">Erase</button>
    </div>
  </div>
  <div class="row">
    <div class="lbl"><span>Colors</span></div>
    <div class="colors">
      <input type="color" id="col1" value="#7c3aed">
      <input type="color" id="col2" value="#06b6d4">
      <input type="color" id="col3" value="#f472b6">
      <button class="btn" style="flex:0 0 28px;padding:4px 0" onclick="randomColors()">🎲</button>
    </div>
  </div>
  <div class="row">
    <div class="lbl"><span>Brush</span><span id="bv">20</span></div>
    <input type="range" id="brush" min="3" max="120" value="20" oninput="bv.textContent=this.value">
  </div>
  <div class="row">
    <div class="lbl"><span>Force</span><span id="fv">40</span></div>
    <input type="range" id="force" min="1" max="100" value="40" oninput="fv.textContent=this.value">
  </div>
  <div class="row">
    <div class="lbl"><span>Dye Fade</span><span id="dv">0.990</span></div>
    <input type="range" id="decay" min="900" max="1000" value="990" oninput="dv.textContent=(this.value/1000).toFixed(3)">
  </div>
  <div class="row">
    <div class="lbl"><span>Vorticity</span><span id="vv">15</span></div>
    <input type="range" id="vort" min="0" max="60" value="15" oninput="vv.textContent=this.value">
  </div>
  <div class="row">
    <div class="lbl"><span>Display</span></div>
    <select id="disp">
      <option value="0">Dye</option>
      <option value="1">Velocity Field</option>
      <option value="2">Pressure</option>
      <option value="3">Vorticity</option>
    </select>
  </div>
  <div class="row">
    <div class="lbl"><span>Preset</span></div>
    <div class="btns">
      <button class="btn" onclick="preset('vortex')">Vortex</button>
      <button class="btn" onclick="preset('tunnel')">Tunnel</button>
      <button class="btn" onclick="preset('fountain')">Rain</button>
    </div>
  </div>
  <div class="row">
    <div class="btns">
      <button class="btn" id="pbtn" onclick="togglePause()">⏸</button>
      <button class="btn" onclick="resetSim()">↺ Reset</button>
      <button class="btn" onclick="exportPNG()">↓ PNG</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ─── WebGL2 Fluid Simulation ─────────────────────────────────────────────────
// Navier-Stokes with semi-Lagrangian advection, Jacobi pressure solver,
// vorticity confinement, and multi-display modes.

const SIM = 256; // velocity/pressure resolution
const DYE = 512; // dye resolution
const JACOBI = 35; // pressure solver iterations

const canvas = document.getElementById('c');
const fpsEl  = document.getElementById('fps');
const gl = canvas.getContext('webgl2', {antialias:false,alpha:false,depth:false,stencil:false,preserveDrawingBuffer:true});
if (!gl) { document.body.innerHTML='<p style="color:#fff;padding:40px;font-family:system-ui">WebGL 2 required (Chrome/Firefox/Safari 15+)</p>'; throw 0; }
gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');
gl.getExtension('EXT_float_blend');

// ─── Shader sources ───────────────────────────────────────────────────────────
const VS = `#version 300 es
in vec2 a;
out vec2 uv;
void main(){ uv=a*.5+.5; gl_Position=vec4(a,0,1); }`;

const ADVECT = `#version 300 es
precision highp float;
uniform sampler2D u_vel, u_src;
uniform float u_dt, u_dis;
in vec2 uv; out vec4 o;
void main(){
  vec2 ts=1./vec2(textureSize(u_vel,0));
  vec2 v=texture(u_vel,uv).xy;
  vec2 p=uv - u_dt*v;
  p=clamp(p,ts,1.-ts);
  o=u_dis*texture(u_src,p);
}`;

const DIVERGENCE = `#version 300 es
precision highp float;
uniform sampler2D u_vel;
in vec2 uv; out vec4 o;
void main(){
  vec2 ts=1./vec2(textureSize(u_vel,0));
  float L=texture(u_vel,uv-vec2(ts.x,0)).x;
  float R=texture(u_vel,uv+vec2(ts.x,0)).x;
  float B=texture(u_vel,uv-vec2(0,ts.y)).y;
  float T=texture(u_vel,uv+vec2(0,ts.y)).y;
  o=vec4(.5*(R-L+T-B),0,0,1);
}`;

const PRESSURE = `#version 300 es
precision highp float;
uniform sampler2D u_p, u_div;
in vec2 uv; out vec4 o;
void main(){
  vec2 ts=1./vec2(textureSize(u_p,0));
  float L=texture(u_p,uv-vec2(ts.x,0)).x;
  float R=texture(u_p,uv+vec2(ts.x,0)).x;
  float B=texture(u_p,uv-vec2(0,ts.y)).x;
  float T=texture(u_p,uv+vec2(0,ts.y)).x;
  float d=texture(u_div,uv).x;
  o=vec4((L+R+B+T-d)*.25,0,0,1);
}`;

const GRAD_SUB = `#version 300 es
precision highp float;
uniform sampler2D u_p, u_vel;
in vec2 uv; out vec4 o;
void main(){
  vec2 ts=1./vec2(textureSize(u_p,0));
  float L=texture(u_p,uv-vec2(ts.x,0)).x;
  float R=texture(u_p,uv+vec2(ts.x,0)).x;
  float B=texture(u_p,uv-vec2(0,ts.y)).x;
  float T=texture(u_p,uv+vec2(0,ts.y)).x;
  vec2 vel=texture(u_vel,uv).xy - .5*vec2(R-L,T-B);
  o=vec4(vel,0,1);
}`;

const CURL = `#version 300 es
precision highp float;
uniform sampler2D u_vel;
in vec2 uv; out vec4 o;
void main(){
  vec2 ts=1./vec2(textureSize(u_vel,0));
  float L=texture(u_vel,uv-vec2(ts.x,0)).y;
  float R=texture(u_vel,uv+vec2(ts.x,0)).y;
  float B=texture(u_vel,uv-vec2(0,ts.y)).x;
  float T=texture(u_vel,uv+vec2(0,ts.y)).x;
  o=vec4(.5*(R-L-(T-B)),0,0,1);
}`;

const VORT_CONF = `#version 300 es
precision highp float;
uniform sampler2D u_vel, u_curl;
uniform float u_scale, u_dt;
in vec2 uv; out vec4 o;
void main(){
  vec2 ts=1./vec2(textureSize(u_curl,0));
  float L=abs(texture(u_curl,uv-vec2(ts.x,0)).x);
  float R=abs(texture(u_curl,uv+vec2(ts.x,0)).x);
  float B=abs(texture(u_curl,uv-vec2(0,ts.y)).x);
  float T=abs(texture(u_curl,uv+vec2(0,ts.y)).x);
  float c=texture(u_curl,uv).x;
  vec2 f=.5*vec2(T-B,R-L);
  float m=length(f); if(m>1e-4) f/=m;
  f*=u_scale*c;
  vec2 vel=texture(u_vel,uv).xy + u_dt*f;
  o=vec4(vel,0,1);
}`;

const SPLAT_VEL = `#version 300 es
precision highp float;
uniform sampler2D u_src;
uniform vec2 u_pos, u_delta;
uniform float u_r, u_ar;
in vec2 uv; out vec4 o;
void main(){
  vec2 d=uv-u_pos; d.x*=u_ar;
  float g=exp(-dot(d,d)/u_r);
  vec2 v=texture(u_src,uv).xy + u_delta*g;
  o=vec4(v,0,1);
}`;

const SPLAT_DYE = `#version 300 es
precision highp float;
uniform sampler2D u_src;
uniform vec2 u_pos;
uniform vec3 u_col;
uniform float u_r, u_ar;
in vec2 uv; out vec4 o;
void main(){
  vec2 d=uv-u_pos; d.x*=u_ar;
  float g=exp(-dot(d,d)/u_r);
  o=texture(u_src,uv)+vec4(u_col*g,g);
}`;

const BOUND = `#version 300 es
precision highp float;
uniform sampler2D u_src, u_obs;
in vec2 uv; out vec4 o;
void main(){
  float obs=texture(u_obs,uv).x;
  vec4 s=texture(u_src,uv);
  o= obs>.5 ? vec4(0) : s;
}`;

const SPLAT_OBS = `#version 300 es
precision highp float;
uniform sampler2D u_src;
uniform vec2 u_pos;
uniform float u_r, u_ar, u_val;
in vec2 uv; out vec4 o;
void main(){
  vec2 d=uv-u_pos; d.x*=u_ar;
  float g=step(u_r, dot(d,d)); // inside radius = 0, outside = 1
  float cur=texture(u_src,uv).x;
  o=vec4(u_val>.5 ? mix(cur,1.,1.-g) : mix(cur,0.,1.-g),0,0,1);
}`;

const DISPLAY = `#version 300 es
precision highp float;
uniform sampler2D u_dye, u_vel, u_p, u_curl, u_obs;
uniform int u_mode;
in vec2 uv; out vec4 o;
vec3 hue(float h){
  h=mod(h,1.);
  return clamp(vec3(abs(h*6.-3.)-1., 2.-abs(h*6.-2.), 2.-abs(h*6.-4.)),0.,1.);
}
void main(){
  float obs=texture(u_obs,uv).x;
  if(obs>.5){ o=vec4(.15,.15,.18,1); return; }
  if(u_mode==0){
    vec4 d=texture(u_dye,uv);
    vec3 c=pow(max(d.rgb,vec3(0)),vec3(.45));
    o=vec4(c,1);
  } else if(u_mode==1){
    vec2 v=texture(u_vel,uv).xy;
    float m=length(v);
    float angle=atan(v.y,v.x)/(2.*3.14159)+.5;
    o=vec4(hue(angle)*clamp(m*4.,0.,1.),1);
  } else if(u_mode==2){
    float p=texture(u_p,uv).x;
    float pos=clamp(p*.5,0.,1.);
    float neg=clamp(-p*.5,0.,1.);
    o=vec4(pos,0,neg,1);
  } else {
    float c=texture(u_curl,uv).x;
    float pos=clamp(c*3.,0.,1.);
    float neg=clamp(-c*3.,0.,1.);
    o=vec4(neg,.3*neg,pos,1);
  }
}`;

// ─── GL helpers ───────────────────────────────────────────────────────────────
function makeProgram(vsrc, fsrc) {
  function shader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  const p = gl.createProgram();
  gl.attachShader(p, shader(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(p, shader(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(p));
  return p;
}

function makeFBO(w, h, ifmt, fmt, type, linear=true) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, ifmt, w, h, 0, fmt, type, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, linear ? gl.LINEAR : gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, linear ? gl.LINEAR : gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { tex, fb, w, h };
}

function makeDoubleFBO(w, h, ifmt, fmt, type) {
  let a = makeFBO(w, h, ifmt, fmt, type);
  let b = makeFBO(w, h, ifmt, fmt, type);
  return { read: a, write: b, swap() { [this.read, this.write] = [this.write, this.read]; } };
}

// Fullscreen quad
const quadVAO = gl.createVertexArray();
gl.bindVertexArray(quadVAO);
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
gl.bindVertexArray(null);

function blit(fbo) {
  if (fbo) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo.fb);
    gl.viewport(0, 0, fbo.w, fbo.h);
  } else {
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  gl.bindVertexArray(quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindVertexArray(null);
}

function bind(prog, uniforms, textures) {
  gl.useProgram(prog);
  const a = gl.getAttribLocation(prog, 'a');
  if (a >= 0) gl.bindAttribLocation(prog, a, 'a');
  for (const [name, val] of Object.entries(uniforms)) {
    const loc = gl.getUniformLocation(prog, name);
    if (loc === null) continue;
    if (typeof val === 'number') gl.uniform1f(loc, val);
    else if (Number.isInteger(val) && name.startsWith('u_m')) gl.uniform1i(loc, val);
    else if (Array.isArray(val) && val.length === 2) gl.uniform2f(loc, val[0], val[1]);
    else if (Array.isArray(val) && val.length === 3) gl.uniform3f(loc, val[0], val[1], val[2]);
  }
  let unit = 0;
  for (const [name, tex] of Object.entries(textures)) {
    const loc = gl.getUniformLocation(prog, name);
    if (loc === null) { unit++; continue; }
    gl.uniform1i(loc, unit);
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex.tex || tex);
    unit++;
  }
}

// ─── Programs ─────────────────────────────────────────────────────────────────
let progs;
try {
  progs = {
    advect:   makeProgram(VS, ADVECT),
    div:      makeProgram(VS, DIVERGENCE),
    pressure: makeProgram(VS, PRESSURE),
    gradSub:  makeProgram(VS, GRAD_SUB),
    curl:     makeProgram(VS, CURL),
    vortConf: makeProgram(VS, VORT_CONF),
    splatV:   makeProgram(VS, SPLAT_VEL),
    splatD:   makeProgram(VS, SPLAT_DYE),
    bound:    makeProgram(VS, BOUND),
    splatObs: makeProgram(VS, SPLAT_OBS),
    display:  makeProgram(VS, DISPLAY),
  };
} catch(e) {
  document.body.innerHTML=`<p style="color:#f88;padding:40px;font-family:monospace">Shader error: ${e.message}</p>`;
  throw e;
}

// ─── Sim state ─────────────────────────────────────────────────────────────────
let vel, pressure, div, curlFBO, dye, obstacles;

function initBuffers() {
  vel      = makeDoubleFBO(SIM, SIM, gl.RG16F,   gl.RG,   gl.HALF_FLOAT);
  pressure = makeDoubleFBO(SIM, SIM, gl.R16F,    gl.RED,  gl.HALF_FLOAT);
  div      = makeFBO(SIM, SIM, gl.R16F,    gl.RED,  gl.HALF_FLOAT);
  curlFBO  = makeFBO(SIM, SIM, gl.R16F,    gl.RED,  gl.HALF_FLOAT);
  dye      = makeDoubleFBO(DYE, DYE, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT);
  obstacles= makeFBO(SIM, SIM, gl.R16F,    gl.RED,  gl.HALF_FLOAT, false);
  // Clear obstacles
  gl.bindFramebuffer(gl.FRAMEBUFFER, obstacles.fb);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
}

initBuffers();

// ─── Simulation steps ─────────────────────────────────────────────────────────
function step(dt) {
  const ar = canvas.width / canvas.height;

  // Curl
  bind(progs.curl, {}, { u_vel: vel.read });
  blit(curlFBO);

  // Vorticity confinement
  const vs = parseFloat(document.getElementById('vort').value) * 0.001;
  bind(progs.vortConf, { u_scale: vs, u_dt: dt }, { u_vel: vel.read, u_curl: curlFBO });
  blit(vel.write);
  vel.swap();

  // Boundary: zero velocity in obstacles
  bind(progs.bound, {}, { u_src: vel.read, u_obs: obstacles });
  blit(vel.write);
  vel.swap();

  // Divergence
  bind(progs.div, {}, { u_vel: vel.read });
  blit(div);

  // Clear pressure
  gl.bindFramebuffer(gl.FRAMEBUFFER, pressure.read.fb);
  gl.viewport(0, 0, SIM, SIM);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  // Jacobi pressure solve
  for (let i = 0; i < JACOBI; i++) {
    bind(progs.pressure, {}, { u_p: pressure.read, u_div: div });
    blit(pressure.write);
    pressure.swap();
  }

  // Gradient subtract
  bind(progs.gradSub, {}, { u_p: pressure.read, u_vel: vel.read });
  blit(vel.write);
  vel.swap();

  // Boundary again
  bind(progs.bound, {}, { u_src: vel.read, u_obs: obstacles });
  blit(vel.write);
  vel.swap();

  // Advect velocity
  const velDis = 0.9998;
  bind(progs.advect, { u_dt: dt, u_dis: velDis }, { u_vel: vel.read, u_src: vel.read });
  blit(vel.write);
  vel.swap();

  // Advect dye
  const dyeDis = parseFloat(document.getElementById('decay').value) / 1000;
  bind(progs.advect, { u_dt: dt * (DYE / SIM), u_dis: dyeDis }, { u_vel: vel.read, u_src: dye.read });
  blit(dye.write);
  dye.swap();
}

function renderFrame() {
  const mode = parseInt(document.getElementById('disp').value);
  const uniforms = {};
  uniforms['u_mode'] = mode;
  bind(progs.display, uniforms, {
    u_dye: dye.read, u_vel: vel.read, u_p: pressure.read, u_curl: curlFBO, u_obs: obstacles
  });
  gl.useProgram(progs.display);
  gl.uniform1i(gl.getUniformLocation(progs.display, 'u_mode'), mode);
  blit(null);
}

// ─── Splat helpers ────────────────────────────────────────────────────────────
let colorIndex = 0;
function getColor() {
  const ids = ['col1','col2','col3'];
  const hex = document.getElementById(ids[colorIndex % 3]).value;
  colorIndex++;
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return [r, g, b];
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
}

function splatAt(x, y, dx, dy, color, radiusPx) {
  const ar = canvas.width / canvas.height;
  const px = x / canvas.width;
  const py = 1 - y / canvas.height;

  // Velocity splat at SIM resolution
  const rf = document.getElementById('force').value / 100;
  const velR = (radiusPx / canvas.width) * (radiusPx / canvas.width) * 4;
  bind(progs.splatV, { u_pos: [px, py], u_delta: [dx * rf * 200, -dy * rf * 200], u_r: velR * (SIM/canvas.width*ar), u_ar: ar }, { u_src: vel.read });
  blit(vel.write);
  vel.swap();

  // Dye splat at DYE resolution
  const dyeR = (radiusPx / canvas.width) * (radiusPx / canvas.width) * 4;
  bind(progs.splatD, { u_pos: [px, py], u_col: color, u_r: dyeR, u_ar: ar }, { u_src: dye.read });
  blit(dye.write);
  dye.swap();
}

function splatObs(x, y, radiusPx, add) {
  const ar = canvas.width / canvas.height;
  const px = x / canvas.width;
  const py = 1 - y / canvas.height;
  const r = (radiusPx / canvas.width) * (radiusPx / canvas.width);
  bind(progs.splatObs, { u_pos: [px, py], u_r: r * (ar), u_ar: ar, u_val: add ? 1.0 : 0.0 }, { u_src: obstacles });
  blit(obstacles);
}

// ─── Input ────────────────────────────────────────────────────────────────────
let mode = 'dye';
function setMode(m) {
  mode = m;
  ['dye','force','wall','erase'].forEach(id => {
    document.getElementById('m-'+id).classList.toggle('on', id===m);
  });
}

let ptrs = {};
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  ptrs[e.pointerId] = { x: e.clientX, y: e.clientY, color: getColor() };
  handlePtr(e, true);
});
canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  handlePtr(e, false);
});
canvas.addEventListener('pointerup', e => { e.preventDefault(); delete ptrs[e.pointerId]; });
canvas.addEventListener('pointercancel', e => { delete ptrs[e.pointerId]; });

function handlePtr(e, isDown) {
  const p = ptrs[e.pointerId];
  if (!p && !isDown) return;
  if (isDown) ptrs[e.pointerId] = { x: e.clientX, y: e.clientY, color: p ? p.color : getColor() };
  const cur = ptrs[e.pointerId];
  if (!cur) return;
  const dx = e.clientX - cur.x;
  const dy = e.clientY - cur.y;
  const r  = parseFloat(document.getElementById('brush').value);

  if (mode === 'dye') {
    splatAt(e.clientX, e.clientY, dx, dy, cur.color, r);
  } else if (mode === 'force') {
    // Velocity only, white dye
    splatAt(e.clientX, e.clientY, dx, dy, [0.5,0.5,0.5], r);
  } else if (mode === 'wall') {
    splatObs(e.clientX, e.clientY, r, true);
  } else if (mode === 'erase') {
    splatObs(e.clientX, e.clientY, r * 1.5, false);
    // Also clear dye
    bind(progs.splatD, {
      u_pos: [e.clientX/canvas.width, 1-e.clientY/canvas.height],
      u_col: [-2,-2,-2], u_r: (r/canvas.width)*(r/canvas.width)*4,
      u_ar: canvas.width/canvas.height
    }, { u_src: dye.read });
    blit(dye.write); dye.swap();
  }
  cur.x = e.clientX; cur.y = e.clientY;
}

// ─── Presets ─────────────────────────────────────────────────────────────────
function preset(name) {
  resetSim();
  const cx = canvas.width * .5, cy = canvas.height * .5;
  if (name === 'vortex') {
    const cols = [hexToRgb('#7c3aed'), hexToRgb('#06b6d4'), hexToRgb('#f472b6'), hexToRgb('#f59e0b')];
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
      const r2 = Math.min(canvas.width, canvas.height) * 0.3;
      const x = cx + Math.cos(a) * r2;
      const y = cy + Math.sin(a) * r2;
      const col = cols[Math.floor(a / (Math.PI/3)) % 4];
      const dx = -Math.sin(a) * 3;
      const dy =  Math.cos(a) * 3;
      splatAt(x, y, dx, dy, col, 30);
    }
  } else if (name === 'tunnel') {
    for (let i = 0; i < 5; i++) {
      const y = canvas.height * (i+1)/6;
      splatAt(0, y, 5, 0, hexToRgb(['#7c3aed','#06b6d4','#f472b6','#f59e0b','#34d399'][i]), 25);
    }
  } else if (name === 'fountain') {
    const cols = [hexToRgb('#60a5fa'), hexToRgb('#a78bfa'), hexToRgb('#f472b6'), hexToRgb('#34d399'), hexToRgb('#fbbf24')];
    for (let i = 0; i < 5; i++) {
      const x = canvas.width * (i+1) / 6;
      splatAt(x, canvas.height, 0, -6, cols[i], 20);
    }
  }
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Controls ────────────────────────────────────────────────────────────────
let paused = false;
function togglePause() {
  paused = !paused;
  document.getElementById('pbtn').textContent = paused ? '▶' : '⏸';
}
function resetSim() {
  // Clear all FBOs
  [vel.read, vel.write, pressure.read, pressure.write, dye.read, dye.write, div, curlFBO].forEach(fbo => {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo.fb);
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
  });
  gl.bindFramebuffer(gl.FRAMEBUFFER, obstacles.fb);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
}
function randomColors() {
  ['col1','col2','col3'].forEach(id => {
    const h = Math.floor(Math.random() * 0xffffff).toString(16).padStart(6,'0');
    document.getElementById(id).value = '#' + h;
  });
}
function exportPNG() {
  renderFrame();
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `fluid-lab-${Date.now()}.png`;
  a.click();
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let last = 0, frames = 0, fpsT = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - last) / 1000, 0.033);
  last = ts;

  // FPS
  frames++;
  if (ts - fpsT > 1000) {
    fpsEl.textContent = frames + ' fps';
    frames = 0; fpsT = ts;
  }

  if (!paused) step(dt);
  renderFrame();
}
requestAnimationFrame(loop);

// ─── Restore localStorage ────────────────────────────────────────────────────
try {
  const saved = localStorage.getItem('fluidlab_v1');
  if (saved) {
    const s = JSON.parse(saved);
    if (s.col1) document.getElementById('col1').value = s.col1;
    if (s.col2) document.getElementById('col2').value = s.col2;
    if (s.col3) document.getElementById('col3').value = s.col3;
  }
} catch(e) {}
window.addEventListener('beforeunload', () => {
  try {
    localStorage.setItem('fluidlab_v1', JSON.stringify({
      col1: document.getElementById('col1').value,
      col2: document.getElementById('col2').value,
      col3: document.getElementById('col3').value,
    }));
  } catch(e) {}
});
</script>
