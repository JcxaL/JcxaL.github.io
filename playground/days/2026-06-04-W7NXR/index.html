<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>L-System Fractal Designer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050510;--panel:#0c0c20;--border:rgba(255,255,255,0.08);
  --accent:#8b5cf6;--green:#34d399;--pink:#f472b6;--cyan:#06b6d4;
  --text:#e2e8f0;--muted:#64748b;--input-bg:rgba(255,255,255,0.05);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;overflow:hidden}

/* Layout */
#app{display:flex;height:100vh;position:relative}
#sidebar{width:320px;min-width:320px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;z-index:10}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* Sidebar */
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-track{background:transparent}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.s-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.s-header h1{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.s-header span{font-size:18px}

.section{padding:12px 14px;border-bottom:1px solid var(--border)}
.section h2{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}

/* Presets */
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.preset-btn{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 4px 6px;cursor:pointer;font-size:10px;color:var(--text);transition:.15s;text-align:center;line-height:1.3}
.preset-btn:hover{border-color:var(--accent);background:rgba(139,92,246,0.12)}
.preset-btn.active{border-color:var(--accent);background:rgba(139,92,246,0.18)}
.preset-icon{font-size:20px;display:block;margin-bottom:3px}

/* Rule editor */
.rule-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.rule-row label{font-size:11px;color:var(--muted);min-width:22px;font-family:monospace;font-weight:600}
input[type=text],textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:monospace;font-size:12px;padding:5px 8px;width:100%;outline:none;transition:.15s}
input[type=text]:focus,textarea:focus{border-color:var(--accent)}
#rules-area{resize:none;height:70px;font-size:11px;line-height:1.6}
.add-rule-btn{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 8px;cursor:pointer;white-space:nowrap;transition:.15s}
.add-rule-btn:hover{color:var(--text);border-color:var(--accent)}

/* Sliders */
.param-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.param-row label{font-size:11px;color:var(--muted);min-width:70px;flex-shrink:0}
.param-row input[type=range]{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
.param-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;transition:.1s}
.param-row input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
.param-val{font-size:11px;font-family:monospace;min-width:34px;text-align:right;color:var(--text)}

/* Color modes */
.color-modes{display:flex;gap:5px;flex-wrap:wrap}
.cm-btn{padding:4px 9px;border-radius:20px;font-size:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);cursor:pointer;transition:.15s}
.cm-btn.active{background:rgba(139,92,246,0.25);border-color:var(--accent);color:var(--text)}
.cm-btn:hover{border-color:var(--accent)}

.color-pick-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.color-pick-row label{font-size:11px;color:var(--muted)}
input[type=color]{width:30px;height:24px;border:1px solid var(--border);border-radius:5px;padding:1px;background:var(--input-bg);cursor:pointer}

/* Buttons */
.btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7c3aed}
.btn-ghost{background:var(--input-bg);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);background:rgba(139,92,246,0.1)}
.btn-sm{padding:5px 10px;font-size:11px}

.btn-row{display:flex;gap:6px;flex-wrap:wrap}

/* Save slots */
.slots{display:flex;gap:6px}
.slot-btn{flex:1;padding:5px;border-radius:7px;font-size:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);cursor:pointer;text-align:center;transition:.15s;line-height:1.4}
.slot-btn.filled{color:var(--text);border-color:rgba(52,211,153,0.4)}
.slot-btn:hover{border-color:var(--green)}

/* Info bar at top of canvas */
#info-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(5,5,16,0.7);backdrop-filter:blur(8px);font-size:11px;color:var(--muted);z-index:5}
#info-bar .sep{color:var(--border)}
#info-segs{color:var(--text)}
#info-iter{color:var(--accent)}

/* Animate button overlay */
#anim-btn{position:absolute;bottom:16px;right:16px;z-index:5;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--accent);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(139,92,246,0.5);transition:.15s}
#anim-btn:hover{transform:scale(1.1)}

/* Help tooltip on canvas */
#canvas-hint{position:absolute;bottom:16px;left:16px;font-size:10px;color:var(--muted);background:rgba(5,5,16,0.7);padding:4px 8px;border-radius:6px;backdrop-filter:blur(4px);pointer-events:none;z-index:5}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,40,0.95);border:1px solid var(--border);padding:8px 16px;border-radius:20px;font-size:12px;transition:.3s;z-index:100;pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Progress */
#progress{position:absolute;top:0;left:0;height:2px;background:var(--accent);transition:width .1s;z-index:6;opacity:0;pointer-events:none}

/* Mobile */
@media(max-width:720px){
  #app{flex-direction:column}
  #sidebar{width:100%;min-width:0;max-height:55vh;border-right:none;border-top:1px solid var(--border);order:2;overflow-y:auto}
  #canvas-wrap{order:1;flex:1;min-height:0}
  #anim-btn{bottom:12px;right:12px;width:42px;height:42px;font-size:17px}
}
@media(max-width:400px){
  .preset-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="s-header">
      <span>🌿</span>
      <div>
        <h1>L-System Fractal Designer</h1>
      </div>
    </div>

    <div class="section">
      <h2>Presets</h2>
      <div class="preset-grid" id="preset-grid"></div>
    </div>

    <div class="section">
      <h2>Grammar</h2>
      <div class="rule-row">
        <label>Axiom</label>
        <input type="text" id="axiom" maxlength="200" spellcheck="false">
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Rules (one per line, format: X→XYX or X=XYX)</div>
      <textarea id="rules-area" spellcheck="false" placeholder="F=F+F--F+F&#10;X=F[+X][-X]FX"></textarea>
    </div>

    <div class="section">
      <h2>Parameters</h2>
      <div class="param-row">
        <label>Iterations</label>
        <input type="range" id="sl-iter" min="1" max="10" value="4">
        <span class="param-val" id="v-iter">4</span>
      </div>
      <div class="param-row">
        <label>Angle °</label>
        <input type="range" id="sl-angle" min="1" max="180" value="25">
        <span class="param-val" id="v-angle">25</span>
      </div>
      <div class="param-row">
        <label>Step px</label>
        <input type="range" id="sl-step" min="1" max="60" value="8">
        <span class="param-val" id="v-step">8</span>
      </div>
      <div class="param-row">
        <label>Width px</label>
        <input type="range" id="sl-width" min="1" max="8" step="0.5" value="1">
        <span class="param-val" id="v-width">1</span>
      </div>
      <div class="param-row">
        <label>Speed</label>
        <input type="range" id="sl-speed" min="10" max="500" value="80">
        <span class="param-val" id="v-speed">80</span>
      </div>
    </div>

    <div class="section">
      <h2>Color Mode</h2>
      <div class="color-modes" id="color-modes">
        <button class="cm-btn active" data-mode="depth">Depth</button>
        <button class="cm-btn" data-mode="rainbow">Rainbow</button>
        <button class="cm-btn" data-mode="solid">Solid</button>
        <button class="cm-btn" data-mode="fire">Fire</button>
        <button class="cm-btn" data-mode="forest">Forest</button>
      </div>
      <div class="color-pick-row">
        <label>Base color</label>
        <input type="color" id="base-color" value="#8b5cf6">
      </div>
    </div>

    <div class="section">
      <h2>Export &amp; Share</h2>
      <div class="btn-row">
        <button class="btn btn-primary btn-sm" id="btn-draw">▶ Draw</button>
        <button class="btn btn-ghost btn-sm" id="btn-png">PNG</button>
        <button class="btn btn-ghost btn-sm" id="btn-svg">SVG</button>
        <button class="btn btn-ghost btn-sm" id="btn-share">🔗 Share</button>
      </div>
    </div>

    <div class="section">
      <h2>Saved Fractals</h2>
      <div class="slots" id="slots"></div>
      <div style="font-size:9px;color:var(--muted);margin-top:6px">Right-click a slot to save · click to load</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <div id="progress"></div>
    <div id="info-bar">
      <span>Segments: <b id="info-segs">0</b></span>
      <span class="sep">|</span>
      <span>String: <b id="info-str">0</b></span>
      <span class="sep">|</span>
      <span>Depth: <b id="info-iter">0</b></span>
    </div>
    <canvas id="cv"></canvas>
    <button id="anim-btn" title="Toggle animation">▶</button>
    <div id="canvas-hint">Scroll: zoom · Drag: pan · Dbl-click: reset</div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ─── PRESETS ────────────────────────────────────────────────────────────────
const PRESETS = [
  { name:'Koch Snow', icon:'❄️', axiom:'F--F--F', rules:{F:'F+F--F+F'}, angle:60, iter:4, step:6, width:1.5 },
  { name:'Sierpinski', icon:'△', axiom:'A--B--B', rules:{A:'A--B+A+B--A', B:'BB'}, angle:60, iter:6, step:5, width:1 },
  { name:'Dragon Crv', icon:'🐉', axiom:'FX', rules:{X:'X+YF+', Y:'-FX-Y'}, angle:90, iter:10, step:6, width:1 },
  { name:'Fern', icon:'🌿', axiom:'X', rules:{X:'F+[[X]-X]-F[-FX]+X', F:'FF'}, angle:25, iter:6, step:4, width:1 },
  { name:'Bush', icon:'🌳', axiom:'F', rules:{F:'F[+F]F[-F]F'}, angle:25.7, iter:4, step:5, width:1.5 },
  { name:'Binary Tree', icon:'🌲', axiom:'X', rules:{X:'F[+X][-X]FX', F:'FF'}, angle:20, iter:7, step:3, width:1 },
  { name:'Hilbert', icon:'⬜', axiom:'A', rules:{A:'+BF-AFA-FB+', B:'-AF+BFB+FA-'}, angle:90, iter:6, step:5, width:1.5 },
  { name:'Gosper', icon:'🔷', axiom:'F', rules:{F:'F+G++G-F--FF-G+', G:'-F+GG++G+F--F-G'}, angle:60, iter:4, step:5, width:1 },
  { name:'Crystal', icon:'💎', axiom:'F+F+F+F', rules:{F:'FF+F++F+F'}, angle:90, iter:4, step:5, width:1.5 },
];

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  axiom: PRESETS[4].axiom,
  rules: {...PRESETS[4].rules},
  angle: PRESETS[4].angle,
  iter: PRESETS[4].iter,
  step: PRESETS[4].step,
  width: PRESETS[4].width,
  colorMode: 'depth',
  baseColor: '#8b5cf6',
  activePreset: 4,
};

let segments = []; // {x1,y1,x2,y2,depth,t}
let animRunning = false;
let animFrame = null;
let animIdx = 0;

// Canvas transform state
let viewX = 0, viewY = 0, viewScale = 1;
let dragging = false, lastMX = 0, lastMY = 0;
let pinchDist0 = 0, pinchScale0 = 1;

// ─── DOM ────────────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const progressEl = document.getElementById('progress');
const infoSegs = document.getElementById('info-segs');
const infoStr = document.getElementById('info-str');
const infoIter = document.getElementById('info-iter');
const animBtn = document.getElementById('anim-btn');
const toastEl = document.getElementById('toast');

function toast(msg, dur=2000) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.classList.remove('show'), dur);
}

// ─── CANVAS RESIZE ──────────────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  cv.width = wrap.clientWidth;
  cv.height = wrap.clientHeight;
  redrawImmediate();
}

// ─── L-SYSTEM ENGINE ────────────────────────────────────────────────────────
function generate(axiom, rules, iterations) {
  const MAX = 400000;
  let current = axiom;
  for (let i = 0; i < iterations; i++) {
    let next = '';
    for (const ch of current) {
      const r = rules[ch];
      next += r !== undefined ? r : ch;
    }
    current = next;
    if (current.length > MAX) { current = current.slice(0, MAX); break; }
  }
  return current;
}

function buildSegments(str, angleDeg, step) {
  const segs = [];
  const stack = [];
  let x = 0, y = 0, a = -Math.PI/2; // start pointing up
  const rad = angleDeg * Math.PI / 180;
  let depth = 0, maxDepth = 0, t = 0;

  for (const ch of str) {
    switch(ch) {
      case 'F': case 'A': case 'B': case 'C': case 'G': {
        const nx = x + step * Math.cos(a);
        const ny = y + step * Math.sin(a);
        segs.push({x1:x, y1:y, x2:nx, y2:ny, depth, t});
        x = nx; y = ny; t++;
        break;
      }
      case 'f':
        x += step * Math.cos(a);
        y += step * Math.sin(a);
        break;
      case '+': a += rad; break;
      case '-': a -= rad; break;
      case '[': stack.push({x,y,a,depth}); depth++; maxDepth = Math.max(maxDepth, depth); break;
      case ']': { const s = stack.pop(); x=s.x; y=s.y; a=s.a; depth=s.depth; break; }
      case '|': a += Math.PI; break;
    }
  }
  return { segs, maxDepth, total: t };
}

function getBounds(segs) {
  if (!segs.length) return {minX:0,minY:0,maxX:100,maxY:100};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const s of segs) {
    minX=Math.min(minX,s.x1,s.x2); minY=Math.min(minY,s.y1,s.y2);
    maxX=Math.max(maxX,s.x1,s.x2); maxY=Math.max(maxY,s.y1,s.y2);
  }
  return {minX,minY,maxX,maxY};
}

// ─── COLOR MODES ────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function hsl(h,s,l,a=1){ return `hsla(${h},${s}%,${l}%,${a})`; }

function getColor(seg, maxDepth, total, colorMode, baseColor) {
  switch(colorMode) {
    case 'depth': {
      if (maxDepth === 0) return hsl(260,70,65);
      const t = seg.depth / maxDepth;
      const h = 260 + t * 100; // purple→green
      const l = 55 + t * 20;
      return hsl(h,70,l);
    }
    case 'rainbow': {
      const h = (seg.t / Math.max(total,1)) * 360;
      return hsl(h,80,60);
    }
    case 'solid': {
      const [r,g,b] = hexToRgb(baseColor);
      return `rgb(${r},${g},${b})`;
    }
    case 'fire': {
      const t = seg.t / Math.max(total,1);
      if (t < 0.33) return hsl(20,90,55);
      if (t < 0.66) return hsl(40,95,60);
      return hsl(55,100,65);
    }
    case 'forest': {
      const t = seg.depth / Math.max(maxDepth,1);
      const h = 100 + t*40;
      const l = 35 + t*25;
      return hsl(h, 60, l);
    }
  }
  return '#8b5cf6';
}

// ─── RENDERING ──────────────────────────────────────────────────────────────
let lastSegs = [], lastMaxDepth = 0, lastTotal = 0;

function applyView() {
  ctx.setTransform(viewScale, 0, 0, viewScale, viewX, viewY);
}

function clearCanvas() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = '#050510';
  ctx.fillRect(0,0,cv.width,cv.height);
}

function redrawImmediate() {
  stopAnim();
  clearCanvas();
  if (!lastSegs.length) return;
  applyView();
  ctx.lineWidth = state.width / viewScale;
  ctx.lineCap = 'round';
  let prevColor = null;
  ctx.beginPath();
  for (const seg of lastSegs) {
    const col = getColor(seg, lastMaxDepth, lastTotal, state.colorMode, state.baseColor);
    if (col !== prevColor) {
      if (prevColor) ctx.stroke();
      ctx.beginPath();
      ctx.strokeStyle = col;
      prevColor = col;
    }
    ctx.moveTo(seg.x1, seg.y1);
    ctx.lineTo(seg.x2, seg.y2);
  }
  if (prevColor) ctx.stroke();
  ctx.setTransform(1,0,0,1,0,0);
}

function computeAndDraw(animate) {
  stopAnim();
  const str = generate(state.axiom, state.rules, state.iter);
  const {segs, maxDepth, total} = buildSegments(str, state.angle, state.step);
  infoStr.textContent = str.length.toLocaleString();
  infoSegs.textContent = segs.length.toLocaleString();
  infoIter.textContent = maxDepth;

  lastSegs = segs;
  lastMaxDepth = maxDepth;
  lastTotal = total;

  // Auto-fit view
  const b = getBounds(segs);
  const pad = 40;
  const fw = cv.width - pad*2, fh = cv.height - pad*2;
  const sw = b.maxX - b.minX || 1, sh = b.maxY - b.minY || 1;
  viewScale = Math.min(fw/sw, fh/sh);
  const cx = (b.minX + b.maxX)/2, cy = (b.minY + b.maxY)/2;
  viewX = cv.width/2 - cx*viewScale;
  viewY = cv.height/2 - cy*viewScale;

  if (animate) {
    startAnim();
  } else {
    redrawImmediate();
  }
}

function startAnim() {
  animRunning = true;
  animIdx = 0;
  animBtn.textContent = '⏸';
  clearCanvas();
  applyView();
  ctx.lineCap = 'round';
  animFrame = requestAnimationFrame(animTick);
}

function stopAnim() {
  animRunning = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  animBtn.textContent = '▶';
  progressEl.style.opacity = '0';
}

function animTick() {
  const speed = parseInt(document.getElementById('sl-speed').value);
  const end = Math.min(animIdx + speed, lastSegs.length);
  ctx.lineWidth = state.width / viewScale;
  applyView();

  let prevColor = null;
  ctx.beginPath();
  for (let i = animIdx; i < end; i++) {
    const seg = lastSegs[i];
    const col = getColor(seg, lastMaxDepth, lastTotal, state.colorMode, state.baseColor);
    if (col !== prevColor) {
      if (prevColor) ctx.stroke();
      ctx.beginPath();
      ctx.strokeStyle = col;
      prevColor = col;
    }
    ctx.moveTo(seg.x1, seg.y1);
    ctx.lineTo(seg.x2, seg.y2);
  }
  if (prevColor) ctx.stroke();

  animIdx = end;
  const pct = lastSegs.length ? (animIdx/lastSegs.length*100) : 100;
  progressEl.style.width = pct + '%';
  progressEl.style.opacity = '1';

  if (animIdx < lastSegs.length) {
    animFrame = requestAnimationFrame(animTick);
  } else {
    stopAnim();
    progressEl.style.opacity = '0';
    ctx.setTransform(1,0,0,1,0,0);
  }
}

// ─── UI HELPERS ─────────────────────────────────────────────────────────────
function readRulesFromTextarea() {
  const txt = document.getElementById('rules-area').value;
  const rules = {};
  for (const line of txt.split('\n')) {
    const m = line.match(/^([A-Za-z])\s*[=→>]\s*(.+)$/);
    if (m) rules[m[1]] = m[2].trim();
  }
  return rules;
}

function rulesToText(rules) {
  return Object.entries(rules).map(([k,v])=>`${k}=${v}`).join('\n');
}

function syncFromInputs() {
  state.axiom = document.getElementById('axiom').value || 'F';
  state.rules = readRulesFromTextarea();
  state.angle = parseFloat(document.getElementById('sl-angle').value);
  state.iter = parseInt(document.getElementById('sl-iter').value);
  state.step = parseFloat(document.getElementById('sl-step').value);
  state.width = parseFloat(document.getElementById('sl-width').value);
  state.baseColor = document.getElementById('base-color').value;
}

function syncToInputs() {
  document.getElementById('axiom').value = state.axiom;
  document.getElementById('rules-area').value = rulesToText(state.rules);
  document.getElementById('sl-angle').value = state.angle;
  document.getElementById('sl-iter').value = state.iter;
  document.getElementById('sl-step').value = state.step;
  document.getElementById('sl-width').value = state.width;
  document.getElementById('base-color').value = state.baseColor;
  document.getElementById('v-angle').textContent = Math.round(state.angle);
  document.getElementById('v-iter').textContent = state.iter;
  document.getElementById('v-step').textContent = state.step;
  document.getElementById('v-width').textContent = state.width;
}

// ─── PRESETS UI ─────────────────────────────────────────────────────────────
function buildPresetGrid() {
  const grid = document.getElementById('preset-grid');
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (i === state.activePreset ? ' active' : '');
    btn.innerHTML = `<span class="preset-icon">${p.icon}</span>${p.name}`;
    btn.onclick = () => loadPreset(i);
    grid.appendChild(btn);
  });
}

function loadPreset(idx) {
  const p = PRESETS[idx];
  state.axiom = p.axiom;
  state.rules = {...p.rules};
  state.angle = p.angle;
  state.iter = p.iter;
  state.step = p.step;
  state.width = p.width;
  state.activePreset = idx;
  syncToInputs();
  document.querySelectorAll('.preset-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  computeAndDraw(true);
}

// ─── SAVE SLOTS ─────────────────────────────────────────────────────────────
const SLOT_COUNT = 3;
let savedSlots = Array(SLOT_COUNT).fill(null);

function loadSlotsFromStorage() {
  try {
    const raw = localStorage.getItem('lsys_slots');
    if (raw) savedSlots = JSON.parse(raw);
  } catch(e) {}
}

function saveSlotsToStorage() {
  try { localStorage.setItem('lsys_slots', JSON.stringify(savedSlots)); } catch(e) {}
}

function buildSlots() {
  const container = document.getElementById('slots');
  container.innerHTML = '';
  savedSlots.forEach((slot, i) => {
    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (slot ? ' filled' : '');
    btn.textContent = slot ? slot.axiom.slice(0,8) + (slot.axiom.length>8?'…':'') : `Slot ${i+1}`;
    btn.title = slot ? `${slot.axiom} iter=${slot.iter}` : 'Right-click to save';
    btn.onclick = () => { if(slot) loadSlot(i); };
    btn.oncontextmenu = (e) => { e.preventDefault(); saveSlot(i); };
    container.appendChild(btn);
  });
}

function saveSlot(i) {
  syncFromInputs();
  savedSlots[i] = { axiom:state.axiom, rules:state.rules, angle:state.angle, iter:state.iter, step:state.step, width:state.width, colorMode:state.colorMode, baseColor:state.baseColor };
  saveSlotsToStorage();
  buildSlots();
  toast(`Saved to Slot ${i+1}`);
}

function loadSlot(i) {
  const s = savedSlots[i]; if (!s) return;
  Object.assign(state, s);
  syncToInputs();
  setColorMode(state.colorMode);
  computeAndDraw(false);
  toast(`Loaded Slot ${i+1}`);
}

// ─── COLOR MODES UI ─────────────────────────────────────────────────────────
function setColorMode(mode) {
  state.colorMode = mode;
  document.querySelectorAll('.cm-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===mode));
  redrawImmediate();
}

// ─── CANVAS INTERACTION ─────────────────────────────────────────────────────
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  viewX = mx - factor*(mx - viewX);
  viewY = my - factor*(my - viewY);
  viewScale *= factor;
  viewScale = Math.max(0.05, Math.min(200, viewScale));
  redrawImmediate();
}, {passive:false});

cv.addEventListener('mousedown', e => { dragging=true; lastMX=e.clientX; lastMY=e.clientY; cv.style.cursor='grabbing'; });
window.addEventListener('mouseup', () => { dragging=false; cv.style.cursor='default'; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  viewX += e.clientX - lastMX; viewY += e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  redrawImmediate();
});

cv.addEventListener('dblclick', () => { computeAndDraw(false); });

cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinchScale0 = viewScale;
  } else if (e.touches.length === 1) {
    dragging=true; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  }
}, {passive:true});

cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    viewScale = Math.max(0.05, Math.min(200, pinchScale0 * d / pinchDist0));
    redrawImmediate();
  } else if (e.touches.length === 1 && dragging) {
    viewX += e.touches[0].clientX - lastMX; viewY += e.touches[0].clientY - lastMY;
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
    redrawImmediate();
  }
}, {passive:false});

cv.addEventListener('touchend', () => { dragging=false; });

// ─── ANIMATE BUTTON ─────────────────────────────────────────────────────────
animBtn.onclick = () => {
  if (animRunning) { stopAnim(); redrawImmediate(); }
  else if (lastSegs.length) { startAnim(); }
  else computeAndDraw(true);
};

// ─── EXPORT ─────────────────────────────────────────────────────────────────
document.getElementById('btn-draw').onclick = () => {
  syncFromInputs();
  computeAndDraw(true);
};

document.getElementById('btn-png').onclick = () => {
  redrawImmediate();
  const url = cv.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'fractal.png'; a.click();
  toast('PNG downloaded!');
};

document.getElementById('btn-svg').onclick = () => {
  if (!lastSegs.length) { toast('Draw first!'); return; }
  const b = getBounds(lastSegs);
  const w = b.maxX-b.minX||100, h = b.maxY-b.minY||100;
  const pad = 10;
  let paths = {};
  for (const seg of lastSegs) {
    const col = getColor(seg, lastMaxDepth, lastTotal, state.colorMode, state.baseColor);
    if (!paths[col]) paths[col] = [];
    paths[col].push(`M${(seg.x1-b.minX+pad).toFixed(2)},${(seg.y1-b.minY+pad).toFixed(2)}L${(seg.x2-b.minX+pad).toFixed(2)},${(seg.y2-b.minY+pad).toFixed(2)}`);
  }
  let svgPaths = Object.entries(paths).map(([col,segs])=>`<path d="${segs.join('')}" stroke="${col}" stroke-width="${state.width}" fill="none" stroke-linecap="round"/>`).join('');
  const svg = `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${(w+pad*2).toFixed(0)}" height="${(h+pad*2).toFixed(0)}" viewBox="0 0 ${(w+pad*2).toFixed(0)} ${(h+pad*2).toFixed(0)}" style="background:#050510">${svgPaths}</svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'fractal.svg'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('SVG downloaded!');
};

document.getElementById('btn-share').onclick = () => {
  syncFromInputs();
  const data = { axiom:state.axiom, rules:state.rules, angle:state.angle, iter:state.iter, step:state.step, width:state.width, colorMode:state.colorMode, baseColor:state.baseColor };
  const hash = btoa(JSON.stringify(data));
  const url = location.href.split('#')[0] + '#' + hash;
  navigator.clipboard.writeText(url).then(() => toast('Share link copied!')).catch(() => {
    prompt('Share URL:', url);
  });
};

// ─── SLIDER LISTENERS ───────────────────────────────────────────────────────
function bindSlider(id, valId, key, isFloat) {
  const sl = document.getElementById(id);
  const val = document.getElementById(valId);
  sl.oninput = () => {
    const v = isFloat ? parseFloat(sl.value) : parseInt(sl.value);
    val.textContent = isFloat ? v : v;
    state[key] = v;
    syncFromInputs();
    computeAndDraw(false);
  };
}
bindSlider('sl-iter','v-iter','iter',false);
bindSlider('sl-angle','v-angle','angle',true);
bindSlider('sl-step','v-step','step',false);
bindSlider('sl-width','v-width','width',true);

document.getElementById('axiom').addEventListener('input', () => {
  syncFromInputs();
  state.activePreset = -1;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
});

document.getElementById('rules-area').addEventListener('input', () => {
  syncFromInputs();
  state.activePreset = -1;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
});

document.querySelectorAll('.cm-btn').forEach(b => {
  b.onclick = () => setColorMode(b.dataset.mode);
});

document.getElementById('base-color').oninput = (e) => {
  state.baseColor = e.target.value;
  redrawImmediate();
};

// ─── URL HASH ───────────────────────────────────────────────────────────────
function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return false;
  try {
    const data = JSON.parse(atob(hash));
    Object.assign(state, data);
    syncToInputs();
    setColorMode(state.colorMode);
    return true;
  } catch(e) { return false; }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
function init() {
  loadSlotsFromStorage();
  buildPresetGrid();
  buildSlots();
  syncToInputs();
  setColorMode(state.colorMode);

  if (!loadFromHash()) {
    loadPreset(state.activePreset);
    return;
  }

  const resizeObs = new ResizeObserver(resize);
  resizeObs.observe(document.getElementById('canvas-wrap'));
  resize();
  computeAndDraw(true);
}

init();

// Draw immediately when window sizes
window.addEventListener('resize', resize);
</script>
</body>
