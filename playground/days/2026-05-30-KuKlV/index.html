<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spirograph Machine</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#060412;font-family:system-ui,-apple-system,sans-serif;color:#ddd0f0}
body{display:flex;flex-direction:row}

#wrap{flex:1;min-width:0;overflow:hidden;position:relative}
canvas{display:block}

#panel{
  width:252px;flex-shrink:0;
  background:rgba(7,4,16,.97);
  border-left:1px solid rgba(255,255,255,.06);
  overflow-y:auto;overflow-x:hidden;
  padding:11px 9px;
  display:flex;flex-direction:column;gap:11px;
  scrollbar-width:thin;scrollbar-color:#281448 transparent
}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:#281448;border-radius:2px}

@media(max-width:600px){
  body{flex-direction:column}
  #panel{width:100%;height:210px;border-left:none;border-top:1px solid rgba(255,255,255,.06);
    flex-direction:row;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;
    gap:10px;padding:8px;flex-shrink:0;align-items:flex-start}
  .sec{flex:0 0 155px}
}

.sec-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#3d2560;margin-bottom:7px}

.tabs{display:flex;gap:3px}
.tab{flex:1;padding:5px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:6px;color:#7a68a8;font-size:10px;font-weight:600;text-align:center;
  cursor:pointer;transition:all .15s}
.tab.on,.tab:hover{background:rgba(96,40,192,.38);border-color:#6020c0;color:#cdb8ff}

.presets{display:flex;flex-wrap:wrap;gap:4px}
.pre{padding:3px 8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:16px;color:#8878b8;font-size:10px;cursor:pointer;transition:all .15s}
.pre:hover{background:rgba(70,30,150,.32);color:#baaef0;border-color:#5020a0}

.srow{display:flex;justify-content:space-between;font-size:10px;color:#5a4890;margin-bottom:3px}
.srow b{color:#baa8e8;font-weight:700}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.1);border-radius:2px;outline:none;cursor:pointer;margin-bottom:8px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#7030d8;cursor:pointer;box-shadow:0 0 8px rgba(112,48,216,.55)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;background:#7030d8;cursor:pointer}

.cms{display:flex;gap:3px;margin-bottom:8px}
.cm{flex:1;padding:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:5px;font-size:10px;color:#7a68a8;text-align:center;cursor:pointer;transition:all .15s}
.cm.on,.cm:hover{background:rgba(30,90,190,.32);border-color:#1860b8;color:#90c0ff}

.swatches{display:flex;gap:5px;flex-wrap:wrap}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.sw.on{border-color:#e0d0ff;transform:scale(1.2)}
.sw:hover{transform:scale(1.1)}

.ll{display:flex;flex-direction:column;gap:3px}
.lr{display:flex;align-items:center;gap:4px;padding:4px 5px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  border-radius:5px;cursor:pointer;transition:all .12s}
.lr.sel{border-color:rgba(112,48,216,.45);background:rgba(72,24,152,.18)}
.lr:hover{background:rgba(255,255,255,.05)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lname{flex:1;font-size:10px;color:#9080b8;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.lbtn{width:17px;height:17px;border:none;border-radius:3px;cursor:pointer;font-size:9px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
  background:rgba(255,255,255,.05);color:#7868a0;flex-shrink:0}
.lbtn:hover{background:rgba(255,255,255,.11)}
.lbtn.del{background:rgba(160,30,30,.12);color:#d86868}
.lbtn.del:hover{background:rgba(160,30,30,.26)}

.acts{display:flex;gap:4px;flex-wrap:wrap}
.act{flex:1;min-width:66px;padding:7px 7px;border-radius:7px;font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.act-p{background:linear-gradient(135deg,#7828e8,#2858d8);color:#fff;border:none}
.act-p:hover{filter:brightness(1.12)}
.act-p:active{filter:brightness(.95)}
.act-s{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#a090c8}
.act-s:hover{background:rgba(255,255,255,.1)}
.act-d{background:rgba(160,30,30,.14);border:1px solid rgba(160,30,30,.22);color:#d87070}
.act-d:hover{background:rgba(160,30,30,.26)}

#prgBar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:2px}
#prgFill{height:100%;background:linear-gradient(90deg,#7828e8,#2858d8);border-radius:2px;width:0;transition:width .08s linear}
#stt{font-size:10px;color:#40306a;text-align:center;margin-top:4px}

#pgS,#pgR,#pgL{display:none}
#pgS.v,#pgR.v,#pgL.v{display:block}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="panel">

<div class="sec">
  <div class="sec-h">Curve Type</div>
  <div class="tabs">
    <div class="tab on" data-t="hypo">Hypo</div>
    <div class="tab" data-t="epi">Epi</div>
    <div class="tab" data-t="rose">Rose</div>
    <div class="tab" data-t="liss">Lissajous</div>
  </div>
</div>

<div class="sec">
  <div class="sec-h">Presets</div>
  <div class="presets" id="presetList"></div>
</div>

<div class="sec">
  <div class="sec-h">Parameters</div>
  <div id="pgS" class="v">
    <div class="srow">Outer R <b id="valR">100</b></div>
    <input type="range" id="slR" min="30" max="200" value="100">
    <div class="srow">Inner r <b id="valr">37</b></div>
    <input type="range" id="slr" min="3" max="150" value="37">
    <div class="srow">Offset d <b id="vald">60</b></div>
    <input type="range" id="sld" min="0" max="200" value="60">
  </div>
  <div id="pgR">
    <div class="srow">Petals k <b id="valk">5</b></div>
    <input type="range" id="slk" min="1" max="12" value="5" step="0.5">
    <div class="srow">Scale <b id="valSc">180</b></div>
    <input type="range" id="slSc" min="50" max="240" value="180">
  </div>
  <div id="pgL">
    <div class="srow">Freq a <b id="valLa">3</b></div>
    <input type="range" id="slLa" min="1" max="8" value="3" step="1">
    <div class="srow">Freq b <b id="valLb">2</b></div>
    <input type="range" id="slLb" min="1" max="8" value="2" step="1">
    <div class="srow">Phase δ° <b id="valLd">90</b></div>
    <input type="range" id="slLd" min="0" max="360" value="90">
    <div class="srow">Amplitude <b id="valLm">180</b></div>
    <input type="range" id="slLm" min="50" max="240" value="180">
  </div>
</div>

<div class="sec">
  <div class="sec-h">Speed / Stroke</div>
  <div class="srow">Speed <b id="valSpd">5</b></div>
  <input type="range" id="slSpd" min="1" max="10" value="5">
  <div class="srow">Stroke <b id="valStk">1.5</b></div>
  <input type="range" id="slStk" min="0.5" max="6" value="1.5" step="0.5">
</div>

<div class="sec">
  <div class="sec-h">Color</div>
  <div class="cms">
    <div class="cm on" data-m="solid">Solid</div>
    <div class="cm" data-m="fade">Fade</div>
    <div class="cm" data-m="rainbow">Rainbow</div>
  </div>
  <div class="swatches" id="swatchList"></div>
</div>

<div class="sec">
  <div class="sec-h">Layers (<span id="layerCnt">0</span>/5)</div>
  <div class="ll" id="layersList"></div>
</div>

<div class="sec">
  <div id="prgBar"><div id="prgFill"></div></div>
  <div id="stt">Ready — click Draw</div>
</div>

<div class="sec">
  <div class="acts">
    <button class="act act-p" id="btnDraw">▶ Draw</button>
    <button class="act act-s" id="btnAdd">+ Layer</button>
  </div>
  <div class="acts" style="margin-top:4px">
    <button class="act act-s" id="btnExp">↓ PNG</button>
    <button class="act act-s" id="btnShr">⌗ Share</button>
    <button class="act act-d" id="btnClr">✕ Clear</button>
  </div>
</div>

</div>
<script>
/* ── setup ─────────────────────────────────────────────────── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');
const dpr    = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0, inited = false;

function resize() {
  const rect = wrap.getBoundingClientRect();
  const nW = Math.round(rect.width), nH = Math.round(rect.height);
  if (nW === W && nH === H && inited) return;
  if (inited && layers.length) {
    layers.length = 0; selIdx = -1;
    updateLayerUI();
    setStatus('Canvas resized — cleared');
  }
  W = nW; H = nH;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  composite();
  inited = true;
}

/* ── state ─────────────────────────────────────────────────── */
const CLRS = ['#c084fc','#60a5fa','#f472b6','#34d399','#fbbf24','#fb923c','#38bdf8','#a3e635'];
let acol   = '#c084fc';
let cmode  = 'solid';   // solid | fade | rainbow
let ctype  = 'hypo';    // hypo | epi | rose | liss
let selIdx = -1;
const layers = [];
let raf = null, drawing = false;

/* ── composite ─────────────────────────────────────────────── */
function composite() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#060412';
  ctx.fillRect(0, 0, W, H);
  for (const l of layers) if (l.vis) ctx.drawImage(l.lc, 0, 0, W, H);
}

/* ── layers ─────────────────────────────────────────────────── */
function mkLayerCanvas() {
  const lc   = document.createElement('canvas');
  lc.width   = W * dpr; lc.height = H * dpr;
  const lctx = lc.getContext('2d');
  lctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { lc, lctx };
}

function addLayer(col, name) {
  if (layers.length >= 5) return null;
  const { lc, lctx } = mkLayerCanvas();
  const l = { lc, lctx, vis: true, col: col || acol, name: name || `Layer ${layers.length + 1}` };
  layers.push(l);
  selIdx = layers.length - 1;
  updateLayerUI();
  return l;
}

function updateLayerUI() {
  document.getElementById('layerCnt').textContent = layers.length;
  const ul = document.getElementById('layersList');
  ul.innerHTML = '';
  layers.forEach((l, i) => {
    const d = document.createElement('div');
    d.className = 'lr' + (i === selIdx ? ' sel' : '');
    d.innerHTML =
      `<div class="ldot" style="background:${l.col}"></div>` +
      `<span class="lname">${l.name}</span>` +
      `<button class="lbtn" data-i="${i}" data-a="vis">${l.vis ? '👁' : '○'}</button>` +
      `<button class="lbtn del" data-i="${i}" data-a="del">✕</button>`;
    d.addEventListener('click', e => {
      if (!e.target.closest('.lbtn')) { selIdx = i; updateLayerUI(); }
    });
    ul.appendChild(d);
  });
  ul.querySelectorAll('.lbtn').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const i = +b.dataset.i;
    if (b.dataset.a === 'vis') {
      layers[i].vis = !layers[i].vis; updateLayerUI(); composite();
    } else {
      if (drawing && i === selIdx) stopDraw();
      layers.splice(i, 1);
      if (selIdx >= layers.length) selIdx = layers.length - 1;
      updateLayerUI(); composite();
    }
  }));
}

/* ── math ───────────────────────────────────────────────────── */
function igcd(a, b) {
  a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
  while (b) { const t = b; b = a % b; a = t; }
  return a || 1;
}

function getPeriod(p) {
  if (p.type === 'rose') return (Math.abs(p.k % 1) > 0.01 ? 4 : 2) * Math.PI;
  if (p.type === 'liss') return 2 * Math.PI / igcd(p.la, p.lb);
  const R = Math.round(p.R), r = Math.round(p.r);
  return Math.min(2 * Math.PI * r / igcd(R, r), 160 * Math.PI);
}

function curvePt(t, p) {
  const cx = W / 2, cy = H / 2;
  const { R, r, d, k, sc, la, lb, ld, lm } = p;
  const rSafe = Math.max(1, r);
  if (p.type === 'hypo') {
    const rr = Math.max(0.1, R - r);
    return { x: cx + rr * Math.cos(t) + d * Math.cos(rr * t / rSafe),
             y: cy + rr * Math.sin(t) - d * Math.sin(rr * t / rSafe) };
  }
  if (p.type === 'epi') {
    const rr = R + r;
    return { x: cx + rr * Math.cos(t) - d * Math.cos(rr * t / rSafe),
             y: cy + rr * Math.sin(t) - d * Math.sin(rr * t / rSafe) };
  }
  if (p.type === 'rose') {
    const rho = sc * Math.cos(k * t);
    return { x: cx + rho * Math.cos(t), y: cy + rho * Math.sin(t) };
  }
  // lissajous
  return { x: cx + lm * Math.sin(la * t + ld * Math.PI / 180),
           y: cy + lm * Math.sin(lb * t) };
}

function strokeColor(i, total, base) {
  if (cmode === 'rainbow') return `hsl(${(i / total * 360) % 360},90%,65%)`;
  if (cmode === 'fade') {
    const f = i / total;
    const r = parseInt(base.slice(1, 3), 16);
    const g = parseInt(base.slice(3, 5), 16);
    const b = parseInt(base.slice(5, 7), 16);
    return `rgb(${~~(r + (215 - r) * f)},${~~(g + (185 - g) * f)},${~~(b + (255 - b) * f)})`;
  }
  return base;
}

/* ── drawing ────────────────────────────────────────────────── */
function getParams() {
  const gv = id => { const e = document.getElementById(id); return e ? +e.value : 0; };
  return { type: ctype, R: gv('slR'), r: gv('slr'), d: gv('sld'), k: gv('slk'), sc: gv('slSc'),
           la: gv('slLa'), lb: gv('slLb'), ld: gv('slLd'), lm: gv('slLm'),
           spd: gv('slSpd'), stk: gv('slStk'), col: acol };
}

function stopDraw() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  drawing = false;
  document.getElementById('btnDraw').textContent = '▶ Draw';
}

function startDraw() {
  // use selected layer; create new if none
  let layer;
  if (selIdx >= 0 && selIdx < layers.length) {
    layer = layers[selIdx];
    layer.col = acol;
    updateLayerUI();
  } else {
    layer = addLayer(acol);
    if (!layer) { setStatus('Max 5 layers — clear some'); return; }
  }

  const p     = getParams();
  const T     = getPeriod(p);
  const dt    = (p.type === 'hypo' || p.type === 'epi') ? 0.003 : 0.001;
  const total = Math.ceil(T / dt);
  // steps per frame: normalised so default speed=5 ≈ 8s for hypo-classic
  const spf   = Math.max(20, Math.floor(total * p.spd / 2400));
  const base  = p.col;
  let   step  = 0;
  let   prev  = curvePt(0, p);
  const lctx  = layer.lctx;

  drawing = true;
  document.getElementById('btnDraw').textContent = '⏹ Stop';
  document.getElementById('prgFill').style.width = '0%';

  (function frame() {
    const end = Math.min(step + spf, total);
    lctx.lineWidth = p.stk;
    lctx.lineCap   = 'round';
    for (let i = step; i < end; i++) {
      const cur = curvePt(i * dt, p);
      lctx.beginPath();
      lctx.moveTo(prev.x, prev.y);
      lctx.lineTo(cur.x,  cur.y);
      lctx.strokeStyle = strokeColor(i, total, base);
      lctx.stroke();
      prev = cur;
    }
    step = end;
    composite();
    document.getElementById('prgFill').style.width = (step / total * 100) + '%';
    setStatus(`Drawing… ${~~(step / total * 100)}%`);
    if (step < total) {
      raf = requestAnimationFrame(frame);
    } else {
      drawing = false; raf = null;
      document.getElementById('btnDraw').textContent = '▶ Draw';
      setStatus('Done ✓');
    }
  })();
}

function setStatus(msg) { document.getElementById('stt').textContent = msg; }

/* ── presets ────────────────────────────────────────────────── */
const PRESETS = {
  hypo: [{n:'Classic',R:100,r:37,d:60},{n:'Flower',R:100,r:36,d:36},
         {n:'Star',   R:100,r:20,d:80},{n:'Oval',  R:100,r:50,d:40},
         {n:'Gear',   R:120,r:15,d:10}],
  epi:  [{n:'Corona', R:80, r:30,d:60},{n:'Sunflower',R:80,r:10,d:80},
         {n:'Loops',  R:60, r:20,d:90},{n:'Ring',  R:100,r:50,d:30},
         {n:'Twirl',  R:90, r:35,d:70}],
  rose: [{n:'5-Petal',k:5 },{n:'7-Petal',k:7 },{n:'4-Petal',k:4},
         {n:'3/2 Wave',k:1.5},{n:'3-Petal',k:3}],
  liss: [{n:'Figure 8',la:2,lb:1,ld:90},{n:'Pretzel',la:3,lb:2,ld:90},
         {n:'Web',     la:4,lb:3,ld:90},{n:'Bow',    la:1,lb:2,ld:90},
         {n:'Star',    la:5,lb:4,ld:45}],
};

function setSl(id, v) {
  const e = document.getElementById(id);
  if (e) { e.value = v; e.dispatchEvent(new Event('input')); }
}

function applyPreset(p) {
  const map = {R:'slR',r:'slr',d:'sld',k:'slk',sc:'slSc',la:'slLa',lb:'slLb',ld:'slLd',lm:'slLm'};
  Object.keys(map).forEach(k => { if (p[k] !== undefined) setSl(map[k], p[k]); });
}

function renderPresets() {
  const c = document.getElementById('presetList');
  c.innerHTML = '';
  (PRESETS[ctype] || []).forEach(p => {
    const b = document.createElement('button');
    b.className = 'pre'; b.textContent = p.n;
    b.addEventListener('click', () => applyPreset(p));
    c.appendChild(b);
  });
}

/* ── slider labels ──────────────────────────────────────────── */
[['slR','valR'],['slr','valr'],['sld','vald'],['slk','valk'],['slSc','valSc'],
 ['slLa','valLa'],['slLb','valLb'],['slLd','valLd'],['slLm','valLm'],
 ['slSpd','valSpd'],['slStk','valStk']
].forEach(([sid, vid]) => {
  const e = document.getElementById(sid), v = document.getElementById(vid);
  if (e && v) e.addEventListener('input', () => v.textContent = e.value);
});

/* ── curve type tabs ────────────────────────────────────────── */
function setCurveType(t) {
  ctype = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.t === t));
  document.getElementById('pgS').classList.toggle('v', t === 'hypo' || t === 'epi');
  document.getElementById('pgR').classList.toggle('v', t === 'rose');
  document.getElementById('pgL').classList.toggle('v', t === 'liss');
  renderPresets();
}
document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => setCurveType(b.dataset.t)));

/* ── color mode ─────────────────────────────────────────────── */
document.querySelectorAll('.cm').forEach(b => b.addEventListener('click', () => {
  cmode = b.dataset.m;
  document.querySelectorAll('.cm').forEach(x => x.classList.toggle('on', x === b));
}));

/* ── swatches ───────────────────────────────────────────────── */
function renderSwatches() {
  const c = document.getElementById('swatchList');
  c.innerHTML = '';
  CLRS.forEach(col => {
    const d = document.createElement('div');
    d.className = 'sw' + (col === acol ? ' on' : '');
    d.style.background = col;
    d.addEventListener('click', () => { acol = col; renderSwatches(); });
    c.appendChild(d);
  });
}

/* ── action buttons ─────────────────────────────────────────── */
document.getElementById('btnDraw').addEventListener('click', () => {
  if (drawing) { stopDraw(); setStatus('Stopped'); } else startDraw();
});

document.getElementById('btnAdd').addEventListener('click', () => {
  if (addLayer(acol)) setStatus(`Layer ${layers.length} added`);
  else setStatus('Max 5 layers');
});

document.getElementById('btnClr').addEventListener('click', () => {
  stopDraw();
  layers.length = 0; selIdx = -1;
  updateLayerUI(); composite();
  document.getElementById('prgFill').style.width = '0%';
  setStatus('Cleared');
});

document.getElementById('btnExp').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'spirograph.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  setStatus('Exported!');
});

document.getElementById('btnShr').addEventListener('click', () => {
  const p = getParams();
  const obj = { tp:ctype, R:p.R, r:p.r, d:p.d, k:p.k, sc:p.sc,
                la:p.la, lb:p.lb, ld:p.ld, lm:p.lm, c:acol, cm:cmode };
  const hash = btoa(JSON.stringify(obj));
  const url  = location.href.split('#')[0] + '#' + hash;
  navigator.clipboard.writeText(url).catch(() => {});
  history.replaceState(null, '', '#' + hash);
  setStatus('URL copied!');
});

/* ── URL hash load ──────────────────────────────────────────── */
function loadHash() {
  if (!location.hash) return;
  try {
    const o = JSON.parse(atob(location.hash.slice(1)));
    if (o.tp) setCurveType(o.tp);
    const m = {R:'slR',r:'slr',d:'sld',k:'slk',sc:'slSc',la:'slLa',lb:'slLb',ld:'slLd',lm:'slLm'};
    Object.keys(m).forEach(k => { if (o[k] !== undefined) setSl(m[k], o[k]); });
    if (o.c)  { acol = o.c; renderSwatches(); }
    if (o.cm) { cmode = o.cm; document.querySelectorAll('.cm').forEach(b => b.classList.toggle('on', b.dataset.m === cmode)); }
  } catch (e) { /* invalid hash */ }
}

/* ── localStorage prefs ─────────────────────────────────────── */
function savePrefs() {
  try {
    const p = getParams();
    localStorage.setItem('spiro_v1', JSON.stringify({ tp:ctype, c:acol, cm:cmode, sp:p.spd, st:p.stk }));
  } catch (e) {}
}
function loadPrefs() {
  try {
    const o = JSON.parse(localStorage.getItem('spiro_v1') || '{}');
    if (o.tp) setCurveType(o.tp);
    if (o.c)  { acol = o.c; renderSwatches(); }
    if (o.cm) { cmode = o.cm; document.querySelectorAll('.cm').forEach(b => b.classList.toggle('on', b.dataset.m === cmode)); }
    if (o.sp) setSl('slSpd', o.sp);
    if (o.st) setSl('slStk', o.st);
  } catch (e) {}
}
window.addEventListener('beforeunload', savePrefs);

/* ── init ───────────────────────────────────────────────────── */
renderSwatches();
renderPresets();
setCurveType('hypo');
window.addEventListener('resize', resize);
resize();
loadPrefs();
loadHash();
</script>
</body>
</html>
