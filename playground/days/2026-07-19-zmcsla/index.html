<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Truss Lab — Bridge Architect</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#12161f; --panel2:#171c28; --line:#232a3a;
    --ink:#e9edf7; --dim:#8b93a7; --accent:#e8a33d; --accent2:#4fb0a5;
    --bad:#d9534f; --good:#7bd88f; --steel:#8ecae6; --wood:#c48a4d; --cable:#c9a6ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

  header{padding:8px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:linear-gradient(180deg,#141824,#10131c);border-bottom:1px solid var(--line);}
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px;white-space:nowrap;}
  header h1 span{color:var(--accent);}
  #status{font-size:12px;color:var(--dim);margin-left:auto;text-align:right;line-height:1.3;}
  #status b{color:var(--ink);}
  #status.win b{color:var(--good);}
  #status.fail b{color:var(--bad);}

  #toolbar{display:flex;gap:6px;padding:8px 10px;flex-wrap:wrap;align-items:center;
    background:var(--panel);border-bottom:1px solid var(--line);}
  .grp{display:flex;gap:4px;align-items:center;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:4px;}
  .grp label{font-size:10px;color:var(--dim);padding:0 4px;text-transform:uppercase;letter-spacing:.5px;}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:#1b2130;color:var(--ink);
    border-radius:8px;padding:7px 11px;font-size:12.5px;transition:.12s;white-space:nowrap;}
  button:hover{background:#232a3c;}
  button:active{transform:scale(.96);}
  button.active{background:var(--accent);color:#1a1206;border-color:var(--accent);font-weight:700;}
  button.mat{font-weight:700;}
  button.mat[data-m="wood"]{color:var(--wood);}
  button.mat[data-m="steel"]{color:var(--steel);}
  button.mat[data-m="cable"]{color:var(--cable);}
  button.mat.active[data-m="wood"]{background:var(--wood);color:#1a0f04;}
  button.mat.active[data-m="steel"]{background:var(--steel);color:#04141c;}
  button.mat.active[data-m="cable"]{background:var(--cable);color:#1a0c2e;}
  button.primary{background:var(--accent2);color:#04211d;border-color:var(--accent2);font-weight:700;}
  button.danger{background:var(--bad);color:#2a0a08;border-color:var(--bad);font-weight:700;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  select{font:inherit;background:#1b2130;color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:7px 9px;font-size:12.5px;}
  #budget{font-size:12px;color:var(--dim);padding:0 6px;}
  #budget b{color:var(--accent);font-size:14px;}

  #stage{flex:1;position:relative;min-height:0;background:
    radial-gradient(ellipse at 50% 0%, #182236 0%, #0b0e14 60%);}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}

  #hint{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);font-size:11.5px;
    color:var(--dim);background:rgba(10,12,18,.7);backdrop-filter:blur(6px);padding:6px 12px;
    border-radius:20px;border:1px solid var(--line);pointer-events:none;max-width:92vw;text-align:center;}

  #footbar{display:flex;gap:6px;padding:8px 10px;flex-wrap:wrap;align-items:center;
    background:var(--panel);border-top:1px solid var(--line);}
  #best{font-size:11px;color:var(--dim);margin-left:auto;}
  #best b{color:var(--good);}

  dialog{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:14px;
    padding:0;max-width:420px;width:92vw;}
  dialog::backdrop{background:rgba(0,0,0,.6);}
  #resultBody{padding:20px;}
  #resultBody h2{margin:0 0 8px;font-size:20px;}
  #resultBody p{color:var(--dim);font-size:13.5px;line-height:1.5;margin:0 0 16px;}
  #resultBody .row{display:flex;gap:8px;flex-wrap:wrap;}

  input[type=file]{display:none;}

  @media (max-width:640px){
    header h1{font-size:13px;}
    #status{font-size:10.5px;}
    button{padding:6px 8px;font-size:11.5px;}
    .grp label{display:none;}
    #hint{font-size:10px;bottom:6px;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Truss <span>Lab</span></h1>
    <select id="levelSel"></select>
    <div id="budget">Budget <b id="budgetVal">$0</b></div>
    <div id="status">Build your bridge</div>
  </header>

  <div id="toolbar">
    <div class="grp">
      <label>Tool</label>
      <button id="toolNode" class="active">+ Joint</button>
      <button id="toolBeam">+ Beam</button>
      <button id="toolDelete">Erase</button>
    </div>
    <div class="grp">
      <label>Material</label>
      <button class="mat active" data-m="wood">Wood</button>
      <button class="mat" data-m="steel">Steel</button>
      <button class="mat" data-m="cable">Cable</button>
    </div>
    <div class="grp">
      <button id="btnClear">New</button>
    </div>
    <div class="grp">
      <button id="btnTest" class="primary">▶ Test Drive</button>
      <button id="btnStop" disabled>■ Stop</button>
    </div>
  </div>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hint">Tap empty space to place a joint · switch to Beam, tap two joints to connect</div>
  </div>

  <div id="footbar">
    <div class="grp">
      <button id="btnExport">⬇ Export JSON</button>
      <button id="btnImport">⬆ Import</button>
      <button id="btnShare">🔗 Share Link</button>
      <button id="btnPNG">📷 PNG</button>
    </div>
    <input type="file" id="fileInput" accept=".json,application/json">
    <div id="best">No crossing recorded yet</div>
  </div>
</div>

<dialog id="resultDlg">
  <div id="resultBody">
    <h2 id="resultTitle">Result</h2>
    <p id="resultMsg"></p>
    <div class="row">
      <button id="resultClose" class="primary">Back to building</button>
    </div>
  </div>
</dialog>

<script>
(function(){
  "use strict";

  // ---------- constants ----------
  var G = 16; // px/s^2 — abstracted, tuned so a well-triangulated truss (not a single flat span) can hold the truck's weight
  var DAMP = 0.986;
  var SUBSTEPS = 6;
  var NODE_R = 9;
  var SNAP_DIST = 26;
  var TRUCK_SPEED = 95; // px/s
  var BASE_NODE_MASS = 3;

  var MATERIALS = {
    wood:  { key:"wood",  cost:2.4, k:70,  maxForce:650,  massPerPx:0.015, tensionOnly:false, color:"#c48a4d" },
    steel: { key:"steel", cost:5.2, k:180, maxForce:1900, massPerPx:0.03,  tensionOnly:false, color:"#8ecae6" },
    cable: { key:"cable", cost:1.3, k:45,  maxForce:480,  massPerPx:0.008, tensionOnly:true,  color:"#c9a6ff" }
  };

  var LEVELS = [
    { name:"Creek Crossing", leftX:90,  rightX:560, bankY:400, span:80, budget:3200, truckMass:42 },
    { name:"River Gorge",    leftX:90,  rightX:760, bankY:400, span:80, budget:4400, truckMass:55 },
    { name:"Canyon Leap",    leftX:90,  rightX:880, bankY:380, span:80, budget:5200, truckMass:70 }
  ];

  // ---------- state ----------
  var canvas = document.getElementById('cv');
  var ctx = canvas.getContext('2d');
  var LOGICAL_W = 1000, LOGICAL_H = 560;
  var dpr = 1;

  var levelIdx = 0;
  var nodes = [];   // {x,y,vx,vy,fx,fy,fixed,mass,buildX,buildY}
  var beams = [];   // {a,b,material,restLength,broken,strain}
  var anchorIds = [];
  var spent = 0;
  var tool = 'node';
  var material = 'wood';
  var pendingBeamNode = null;
  var mode = 'build'; // 'build' | 'test' | 'done'
  var truck = null;
  var raf = null;
  var lastT = null;
  var groundY = 0;

  function el(id){ return document.getElementById(id); }

  // ---------- level setup ----------
  function buildLevel(i, importedDesign){
    levelIdx = i;
    var lv = LEVELS[i];
    nodes = [];
    beams = [];
    spent = 0;
    pendingBeamNode = null;
    mode = 'build';
    truck = null;
    groundY = lv.bankY + lv.span;

    // fixed anchors: left-top, left-bottom, right-top, right-bottom
    anchorIds = [];
    anchorIds.push(addNode(lv.leftX, lv.bankY, true));
    anchorIds.push(addNode(lv.leftX, lv.bankY + lv.span, true));
    anchorIds.push(addNode(lv.rightX, lv.bankY, true));
    anchorIds.push(addNode(lv.rightX, lv.bankY + lv.span, true));

    if (importedDesign){
      (importedDesign.nodes||[]).forEach(function(n){ addNode(n.x, n.y, false); });
      (importedDesign.beams||[]).forEach(function(b){
        if (nodes[b.a] && nodes[b.b] && MATERIALS[b.m]) addBeam(b.a, b.b, b.m, true);
      });
    }

    updateLevelUI();
    render();
  }

  function addNode(x, y, fixed){
    nodes.push({ x:x, y:y, vx:0, vy:0, fx:0, fy:0, fixed:!!fixed, mass:BASE_NODE_MASS,
      buildX:x, buildY:y, id:nodes.length });
    return nodes.length - 1;
  }

  function nodeMassRecalc(){
    nodes.forEach(function(n){ n.mass = BASE_NODE_MASS; });
    beams.forEach(function(b){
      if (b.broken) return;
      var m = MATERIALS[b.material];
      var add = b.restLength * m.massPerPx * 0.5;
      nodes[b.a].mass += add;
      nodes[b.b].mass += add;
    });
  }

  function beamCost(ai, bi, matKey){
    var a = nodes[ai], b = nodes[bi];
    var len = Math.hypot(b.x-a.x, b.y-a.y);
    return len * MATERIALS[matKey].cost;
  }

  function beamExists(ai,bi){
    return beams.some(function(bm){ return !bm.broken && ((bm.a===ai&&bm.b===bi)||(bm.a===bi&&bm.b===ai)); });
  }

  function addBeam(ai, bi, matKey, skipBudget){
    if (ai===bi) return 'same';
    if (beamExists(ai,bi)) return 'dup';
    if (nodes[ai].fixed && nodes[bi].fixed) return 'anchor';
    var cost = beamCost(ai,bi,matKey);
    if (!skipBudget){
      var lv = LEVELS[levelIdx];
      if (spent + cost > lv.budget) return 'budget';
    }
    var len = Math.hypot(nodes[bi].x-nodes[ai].x, nodes[bi].y-nodes[ai].y);
    beams.push({ a:ai, b:bi, material:matKey, restLength:len, broken:false, strain:0 });
    spent += cost;
    nodeMassRecalc();
    updateLevelUI();
    return 'ok';
  }

  function deleteBeamAt(idx){
    if (idx<0) return;
    var b = beams[idx];
    var cost = b.restLength * MATERIALS[b.material].cost;
    spent = Math.max(0, spent - cost);
    beams.splice(idx,1);
    nodeMassRecalc();
    updateLevelUI();
  }

  function deleteNodeAt(idx){
    if (idx<0 || nodes[idx].fixed) return;
    // remove connected beams (refund)
    for (var i=beams.length-1;i>=0;i--){
      if (beams[i].a===idx || beams[i].b===idx) deleteBeamAt(i);
    }
    nodes.splice(idx,1);
    // reindex beams referencing shifted nodes
    beams.forEach(function(b){
      if (b.a>idx) b.a--;
      if (b.b>idx) b.b--;
    });
    anchorIds = anchorIds.map(function(a){ return a>idx? a-1 : a; });
    nodeMassRecalc();
    updateLevelUI();
  }

  // ---------- UI wiring ----------
  function updateLevelUI(){
    var lv = LEVELS[levelIdx];
    el('budgetVal').textContent = '$' + Math.max(0, Math.round(lv.budget - spent));
    var best = getBest(levelIdx);
    el('best').innerHTML = best ? ('Best crossing: <b>$' + best.cost + '</b> spent') : 'No crossing recorded yet';
  }

  function setStatus(msg, cls){
    var s = el('status');
    s.textContent = msg;
    s.className = cls || '';
  }

  var flashTimer = null;
  function flashBeamResult(res){
    if (res==='ok') return;
    var msgs = {
      anchor: "Anchors need a joint between them — can't span bank to bank directly",
      budget: "Not enough budget left for that beam",
      dup: "Those joints are already connected"
    };
    if (!msgs[res]) return;
    setStatus(msgs[res]);
    if (flashTimer) clearTimeout(flashTimer);
    flashTimer = setTimeout(function(){
      if (mode==='build') setStatus('Build your bridge');
    }, 1800);
  }

  function bestKey(){ return 'trusslab_best_v1'; }
  function getBestAll(){
    try { return JSON.parse(localStorage.getItem(bestKey())) || {}; } catch(e){ return {}; }
  }
  function getBest(idx){
    var all = getBestAll();
    return all[idx] || null;
  }
  function saveBest(idx, cost){
    var all = getBestAll();
    if (!all[idx] || cost < all[idx].cost){
      all[idx] = { cost: cost, date: new Date().toISOString().slice(0,10) };
      localStorage.setItem(bestKey(), JSON.stringify(all));
    }
  }

  // level select
  var levelSel = el('levelSel');
  LEVELS.forEach(function(lv,i){
    var o = document.createElement('option');
    o.value = i; o.textContent = lv.name + ' — $' + lv.budget;
    levelSel.appendChild(o);
  });
  levelSel.addEventListener('change', function(){
    buildLevel(parseInt(levelSel.value,10));
  });

  // tool buttons
  function setTool(t){
    tool = t;
    pendingBeamNode = null;
    ['toolNode','toolBeam','toolDelete'].forEach(function(id){ el(id).classList.remove('active'); });
    if (t==='node') el('toolNode').classList.add('active');
    if (t==='beam') el('toolBeam').classList.add('active');
    if (t==='delete') el('toolDelete').classList.add('active');
    var hints = {
      node: 'Tap empty space to place a joint',
      beam: 'Tap a joint, then a second joint, to connect them with ' + material,
      delete: 'Tap a beam or joint to remove it'
    };
    el('hint').textContent = hints[t];
  }
  el('toolNode').addEventListener('click', function(){ setTool('node'); });
  el('toolBeam').addEventListener('click', function(){ setTool('beam'); });
  el('toolDelete').addEventListener('click', function(){ setTool('delete'); });

  document.querySelectorAll('button.mat').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('button.mat').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      material = btn.getAttribute('data-m');
      if (tool==='beam') el('hint').textContent = 'Tap a joint, then a second joint, to connect them with ' + material;
    });
  });

  el('btnClear').addEventListener('click', function(){
    if (mode!=='build') stopTest(null);
    buildLevel(levelIdx);
    setStatus('Build your bridge');
  });

  el('btnTest').addEventListener('click', startTest);
  el('btnStop').addEventListener('click', function(){ stopTest(null); });

  // ---------- canvas sizing ----------
  function resize(){
    var rect = canvas.parentElement.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio||1, 2);
    canvas.width = Math.round(rect.width*dpr);
    canvas.height = Math.round(rect.height*dpr);
    render();
  }
  window.addEventListener('resize', resize);

  function toLogical(clientX, clientY){
    var rect = canvas.getBoundingClientRect();
    var sx = (clientX - rect.left) / rect.width * LOGICAL_W;
    var sy = (clientY - rect.top) / rect.height * LOGICAL_H;
    return { x: sx, y: sy };
  }

  function findNodeNear(x,y){
    var best = -1, bestD = SNAP_DIST;
    nodes.forEach(function(n,i){
      var d = Math.hypot(n.x-x, n.y-y);
      if (d < bestD){ bestD = d; best = i; }
    });
    return best;
  }

  function findBeamNear(x,y){
    var best=-1, bestD=12;
    beams.forEach(function(b,i){
      if (b.broken) return;
      var a=nodes[b.a], c=nodes[b.b];
      var d = pointSegDist(x,y,a.x,a.y,c.x,c.y);
      if (d<bestD){ bestD=d; best=i; }
    });
    return best;
  }

  function pointSegDist(px,py,ax,ay,bx,by){
    var dx=bx-ax, dy=by-ay;
    var len2 = dx*dx+dy*dy;
    var t = len2===0 ? 0 : ((px-ax)*dx+(py-ay)*dy)/len2;
    t = Math.max(0,Math.min(1,t));
    var cx = ax+t*dx, cy = ay+t*dy;
    return Math.hypot(px-cx, py-cy);
  }

  canvas.addEventListener('pointerdown', function(e){
    if (mode!=='build') return;
    var p = toLogical(e.clientX, e.clientY);
    var lv = LEVELS[levelIdx];
    if (tool==='node'){
      var near = findNodeNear(p.x,p.y);
      if (near>=0) return; // don't stack nodes
      if (p.x < lv.leftX+20 || p.x > lv.rightX-20) return; // keep inside span
      if (p.y < 40 || p.y > groundY+20) return;
      addNode(p.x, p.y, false);
      render();
    } else if (tool==='beam'){
      var idx = findNodeNear(p.x,p.y);
      if (idx<0) return;
      if (pendingBeamNode===null){
        pendingBeamNode = idx;
      } else {
        if (pendingBeamNode!==idx){
          var res = addBeam(pendingBeamNode, idx, material, false);
          flashBeamResult(res);
        }
        pendingBeamNode = null;
      }
      render();
    } else if (tool==='delete'){
      var ni = findNodeNear(p.x,p.y);
      if (ni>=0 && !nodes[ni].fixed){ deleteNodeAt(ni); render(); return; }
      var bi = findBeamNear(p.x,p.y);
      if (bi>=0){ deleteBeamAt(bi); render(); }
    }
  });

  // ---------- physics ----------
  function resetToBuild(){
    nodes.forEach(function(n){ n.x=n.buildX; n.y=n.buildY; n.vx=0; n.vy=0; });
    beams.forEach(function(b){ b.broken=false; b.strain=0; });
  }

  function startTest(){
    if (mode!=='build') return;
    resetToBuild();
    mode = 'test';
    el('btnTest').disabled = true;
    el('btnStop').disabled = false;
    el('toolNode').disabled = el('toolBeam').disabled = el('toolDelete').disabled = true;
    el('btnClear').disabled = true;
    levelSel.disabled = true;
    var lv = LEVELS[levelIdx];
    truck = { x: lv.leftX - 30, y: lv.bankY, vy: 0, falling:false, mass: lv.truckMass, done:false };
    setStatus('Testing…');
    lastT = null;
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function stopTest(result){
    mode = 'build';
    el('btnTest').disabled = false;
    el('btnStop').disabled = true;
    el('toolNode').disabled = el('toolBeam').disabled = el('toolDelete').disabled = false;
    el('btnClear').disabled = false;
    levelSel.disabled = false;
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    resetToBuild();
    truck = null;
    if (result==='win'){
      var lv = LEVELS[levelIdx];
      saveBest(levelIdx, Math.round(spent));
      updateLevelUI();
      setStatus('Bridge held! Truck crossed.', 'win');
      showResult('Crossing successful!', 'Your bridge held under load. Spent $' + Math.round(spent) + ' of $' + lv.budget + ' budget.');
    } else if (result==='fail'){
      setStatus('Bridge collapsed.', 'fail');
      showResult('Bridge collapsed', 'The structure failed under the truck’s weight. Reinforce the weak span and try again.');
    } else {
      setStatus('Build your bridge');
    }
    render();
  }

  function showResult(title, msg){
    el('resultTitle').textContent = title;
    el('resultMsg').textContent = msg;
    var dlg = el('resultDlg');
    if (typeof dlg.showModal === 'function') dlg.showModal();
  }
  el('resultClose').addEventListener('click', function(){ el('resultDlg').close(); });

  var truckLoad = null; // {aIdx,bIdx,wA,wB} applied into physicsStep each substep this frame

  function loop(t){
    if (mode!=='test'){ return; }
    if (lastT===null) lastT = t;
    var dt = Math.min(0.033, (t-lastT)/1000);
    lastT = t;
    computeTruckAndLoad(dt);
    if (mode!=='test') return; // win/fail may have stopped the test inside computeTruckAndLoad
    var sub = dt/SUBSTEPS;
    for (var s=0;s<SUBSTEPS;s++) physicsStep(sub);
    render();
    if (mode==='test') raf = requestAnimationFrame(loop);
  }

  function physicsStep(dt){
    nodes.forEach(function(n){ n.fx=0; n.fy=0; });
    // gravity
    nodes.forEach(function(n){ if(!n.fixed) n.fy += G*n.mass; });

    // truck load, computed once per frame in computeTruckAndLoad(), applied every substep
    if (truckLoad){
      var la = nodes[truckLoad.aIdx], lb = nodes[truckLoad.bIdx];
      if (la && !la.fixed) la.fy += truckLoad.wA;
      if (lb && !lb.fixed) lb.fy += truckLoad.wB;
    }

    // spring forces
    beams.forEach(function(b){
      if (b.broken) return;
      var a = nodes[b.a], c = nodes[b.b];
      var dx = c.x-a.x, dy = c.y-a.y;
      var len = Math.hypot(dx,dy) || 0.0001;
      var strainRaw = (len - b.restLength);
      var mat = MATERIALS[b.material];
      if (mat.tensionOnly && strainRaw < 0){
        b.strain = 0;
        return; // slack cable, no force
      }
      var force = mat.k * strainRaw; // >0 tension pulling together, <0 compression pushing apart
      var nx = dx/len, ny = dy/len;
      // damping along the spring axis
      var rvx = c.vx-a.vx, rvy = c.vy-a.vy;
      var relVel = rvx*nx + rvy*ny;
      var damp = mat.k*0.02*relVel;
      var f = force + damp;
      a.fx += nx*f; a.fy += ny*f;
      c.fx -= nx*f; c.fy -= ny*f;
      var mag = Math.abs(force);
      b.strain = mag / mat.maxForce;
      if (mag > mat.maxForce) b.broken = true;
    });

    nodes.forEach(function(n){
      if (n.fixed) return;
      n.vx = (n.vx + (n.fx/n.mass)*dt) * DAMP;
      n.vy = (n.vy + (n.fy/n.mass)*dt) * DAMP;
      n.x += n.vx*dt;
      n.y += n.vy*dt;
    });
  }

  function deckBeamAt(x){
    var best = null, bestY = Infinity;
    beams.forEach(function(b){
      if (b.broken) return;
      var a = nodes[b.a], c = nodes[b.b];
      var lo = Math.min(a.x,c.x), hi = Math.max(a.x,c.x);
      if (x < lo-4 || x > hi+4) return;
      var t = (x-a.x)/((c.x-a.x)||0.0001);
      var y = a.y + t*(c.y-a.y);
      if (y < bestY){ bestY = y; best = { a:a, c:c, t:t, y:y, beam:b }; }
    });
    return best;
  }

  function computeTruckAndLoad(dt){
    truckLoad = null;
    if (!truck || truck.done) return;
    var lv = LEVELS[levelIdx];
    if (!truck.falling){
      truck.x += TRUCK_SPEED*dt;
      if (truck.x <= lv.leftX){
        // still on solid left bank — no bridge beam needed under it
        truck.y = lv.bankY - 14;
      } else if (truck.x >= lv.rightX - 10){
        truck.done = true;
        stopTest('win');
        return;
      } else {
        var d = deckBeamAt(truck.x);
        if (d){
          truck.y = d.y - 14;
          var w = truck.mass*G;
          // split weight between the two endpoint nodes proportional to lever position,
          // stored for physicsStep() to apply every substep this frame
          truckLoad = {
            aIdx: d.beam.a, bIdx: d.beam.b,
            wA: w*(1-d.t), wB: w*d.t
          };
        } else {
          truck.falling = true;
          truck.vy = 0;
        }
      }
    } else {
      truck.vy += G*dt;
      truck.y += truck.vy*dt;
      if (truck.y > LOGICAL_H + 80){
        truck.done = true;
        stopTest('fail');
        return;
      }
    }
  }

  // ---------- render ----------
  function render(){
    var w = canvas.width, h = canvas.height;
    ctx.setTransform(dpr * (canvas.width/dpr/LOGICAL_W), 0, 0, dpr * (canvas.height/dpr/LOGICAL_H), 0, 0);
    ctx.clearRect(0,0,LOGICAL_W,LOGICAL_H);

    var lv = LEVELS[levelIdx];

    // sky gradient handled by CSS bg; draw water/gorge
    ctx.fillStyle = 'rgba(30,60,90,0.55)';
    ctx.fillRect(lv.leftX+8, groundY, (lv.rightX-lv.leftX)-16, LOGICAL_H-groundY);
    // ripples
    ctx.strokeStyle='rgba(140,190,220,0.25)';
    ctx.lineWidth=1;
    for (var ry=groundY+14; ry<LOGICAL_H; ry+=16){
      ctx.beginPath();
      for (var rx=lv.leftX; rx<=lv.rightX; rx+=6){
        var yy = ry + Math.sin((rx+ry)/22)*2;
        if (rx===lv.leftX) ctx.moveTo(rx,yy); else ctx.lineTo(rx,yy);
      }
      ctx.stroke();
    }

    // banks
    ctx.fillStyle = '#3a3226';
    ctx.fillRect(0, lv.bankY, lv.leftX+10, LOGICAL_H-lv.bankY);
    ctx.fillRect(lv.rightX-10, lv.bankY, LOGICAL_W-(lv.rightX-10), LOGICAL_H-lv.bankY);
    ctx.fillStyle = '#4a4030';
    ctx.fillRect(0, lv.bankY, lv.leftX+10, 6);
    ctx.fillRect(lv.rightX-10, lv.bankY, LOGICAL_W-(lv.rightX-10), 6);

    // finish flag
    ctx.fillStyle = '#7bd88f';
    ctx.fillRect(lv.rightX-10, lv.bankY-34, 3, 34);
    ctx.beginPath();
    ctx.moveTo(lv.rightX-7, lv.bankY-34);
    ctx.lineTo(lv.rightX+12, lv.bankY-28);
    ctx.lineTo(lv.rightX-7, lv.bankY-22);
    ctx.closePath();
    ctx.fill();

    // beams
    beams.forEach(function(b){
      var a = nodes[b.a], c = nodes[b.b];
      var mat = MATERIALS[b.material];
      if (b.broken){
        ctx.strokeStyle = 'rgba(217,83,79,0.35)';
        ctx.setLineDash([4,4]);
      } else {
        var s = Math.min(1, b.strain);
        ctx.setLineDash([]);
        ctx.strokeStyle = strainColor(mat.color, s);
      }
      ctx.lineWidth = b.material==='cable' ? 2.5 : (b.material==='steel'?5:4.5);
      ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(c.x,c.y);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    // nodes
    nodes.forEach(function(n){
      ctx.beginPath();
      ctx.arc(n.x,n.y, n.fixed?10:6, 0, Math.PI*2);
      ctx.fillStyle = n.fixed ? '#6b7280' : (n===nodes[pendingBeamNode] ? '#e8a33d' : '#e9edf7');
      ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle='#0b0e14'; ctx.stroke();
    });
    if (pendingBeamNode!==null && nodes[pendingBeamNode]){
      var pn = nodes[pendingBeamNode];
      ctx.beginPath();
      ctx.arc(pn.x,pn.y,13,0,Math.PI*2);
      ctx.strokeStyle='#e8a33d'; ctx.lineWidth=2; ctx.stroke();
    }

    // truck
    if (truck){
      ctx.save();
      ctx.translate(truck.x, truck.y);
      ctx.fillStyle = '#e8a33d';
      ctx.fillRect(-18,-12,36,14);
      ctx.fillStyle = '#c48730';
      ctx.fillRect(6,-20,14,10);
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(-10,2,5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(12,2,5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function strainColor(baseHex, s){
    // interpolate base -> yellow -> red as strain approaches 1
    var r,g,b;
    if (s < 0.6){
      var t = s/0.6;
      var base = hexToRgb(baseHex);
      var yellow = {r:245,g:200,b:60};
      r = lerp(base.r,yellow.r,t); g=lerp(base.g,yellow.g,t); b=lerp(base.b,yellow.b,t);
    } else {
      var t2 = (s-0.6)/0.4;
      var yellow2 = {r:245,g:200,b:60};
      var red = {r:224,g:60,b:50};
      r = lerp(yellow2.r,red.r,t2); g=lerp(yellow2.g,red.g,t2); b=lerp(yellow2.b,red.b,t2);
    }
    return 'rgb('+(r|0)+','+(g|0)+','+(b|0)+')';
  }
  function lerp(a,b,t){ return a+(b-a)*t; }
  function hexToRgb(hex){
    var v = parseInt(hex.slice(1),16);
    return { r:(v>>16)&255, g:(v>>8)&255, b:v&255 };
  }

  // ---------- export / import / share ----------
  function serializeDesign(){
    var extraNodes = [];
    var nodeMap = {}; // old idx -> new idx (anchors excluded, offset by 0..3 fixed then extras)
    var out = { level: levelIdx, nodes: [], beams: [] };
    nodes.forEach(function(n,i){
      if (n.fixed) return;
      out.nodes.push({ x: Math.round(n.buildX), y: Math.round(n.buildY) });
    });
    // build full index map: fixed anchors are 0..3 always, extras follow in original order
    var idx = 4;
    var map = {0:0,1:1,2:2,3:3};
    nodes.forEach(function(n,i){
      if (n.fixed) return;
      map[i] = idx++;
    });
    beams.forEach(function(b){
      out.beams.push({ a: map[b.a], b: map[b.b], m: b.material });
    });
    return out;
  }

  function loadDesign(design){
    if (!design || typeof design.level !== 'number' || !LEVELS[design.level]) return false;
    levelSel.value = design.level;
    buildLevel(design.level, design);
    return true;
  }

  el('btnExport').addEventListener('click', function(){
    var data = serializeDesign();
    var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'truss-bridge-' + LEVELS[levelIdx].name.replace(/\s+/g,'-').toLowerCase() + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  });

  el('btnImport').addEventListener('click', function(){ el('fileInput').click(); });
  el('fileInput').addEventListener('change', function(e){
    var f = e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function(){
      try {
        var data = JSON.parse(reader.result);
        if (mode!=='build') stopTest(null);
        loadDesign(data);
        setStatus('Design imported');
      } catch(err){ setStatus('Import failed: bad file'); }
    };
    reader.readAsText(f);
    el('fileInput').value = '';
  });

  el('btnShare').addEventListener('click', function(){
    var data = serializeDesign();
    var encoded = btoa(encodeURIComponent(JSON.stringify(data)));
    var url = location.origin + location.pathname + '#d=' + encoded;
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){
        setStatus('Share link copied to clipboard');
      }).catch(function(){ prompt('Copy your share link:', url); });
    } else {
      prompt('Copy your share link:', url);
    }
  });

  el('btnPNG').addEventListener('click', function(){
    canvas.toBlob(function(blob){
      if (!blob) return;
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'truss-bridge.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    }, 'image/png');
  });

  function loadFromHash(){
    var h = location.hash;
    if (h && h.indexOf('#d=')===0){
      try {
        var json = decodeURIComponent(atob(h.slice(3)));
        var data = JSON.parse(json);
        return loadDesign(data);
      } catch(e){ return false; }
    }
    return false;
  }

  // ---------- init ----------
  resize();
  if (!loadFromHash()) buildLevel(0);
  setTool('node');
  render();
})();
</script>
</body>
</html>
