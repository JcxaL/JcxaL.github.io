<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Type Effects Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--panel:#111118;--border:#22223a;
  --accent:#c084fc;--txt:#e4deff;--muted:#64647e;
}
body{background:var(--bg);color:var(--txt);font:13px/1.4 system-ui,-apple-system,sans-serif;display:flex;height:100dvh;overflow:hidden;user-select:none}
#wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-width:0;position:relative}
canvas{border-radius:10px;cursor:crosshair;display:block;max-width:100%;max-height:100%}
#panel{width:232px;min-width:232px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
h1{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:8px;font-size:26px;font-weight:900;font-family:system-ui,-apple-system,sans-serif;text-align:center;resize:none;outline:none;height:60px;line-height:1.1}
textarea:focus{border-color:var(--accent)}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.eb{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:7px 4px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.eb.on{border-color:var(--accent);color:var(--accent);background:rgba(192,132,252,.1)}
.eb:hover:not(.on){color:var(--txt);border-color:var(--muted)}
.sr{display:flex;flex-direction:column;gap:3px}
.sl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
input[type=range]{width:100%;accent-color:var(--accent)}
.cr{display:flex;gap:8px}
.cs{display:flex;flex-direction:column;gap:3px;flex:1}
.cs label{font-size:10px;color:var(--muted)}
input[type=color]{width:100%;height:30px;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;padding:2px}
.pg{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.pb{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s}
.pb:hover{transform:scale(1.15)}
.pb.on{border-color:#fff}
.btn{width:100%;background:rgba(192,132,252,.12);border:1px solid rgba(192,132,252,.35);color:var(--accent);border-radius:6px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(192,132,252,.22)}
.btn.sec{background:transparent;border-color:var(--border);color:var(--muted)}
.btn.sec:hover{color:var(--txt);border-color:var(--muted)}
#ep{display:flex;flex-direction:column;gap:10px}
#hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.25);pointer-events:none;white-space:nowrap}
@media(max-width:600px){body{flex-direction:column}#panel{width:100%;min-width:unset;border-left:none;border-top:1px solid var(--border);height:250px;min-height:250px}#wrap{padding:8px}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hint">Move cursor · Click canvas to interact</div>
</div>
<div id="panel">
  <div>
    <h1>Type Effects Studio</h1>
    <div style="color:var(--muted);font-size:11px;margin-top:3px">6 live canvas effects</div>
  </div>
  <div>
    <div class="lbl">Text</div>
    <textarea id="ti" maxlength="20">TYPE</textarea>
  </div>
  <div>
    <div class="lbl">Effect</div>
    <div class="eg">
      <button class="eb" data-e="neon">⚡ Neon</button>
      <button class="eb" data-e="extrude">📦 Extrude</button>
      <button class="eb" data-e="glitch">📡 Glitch</button>
      <button class="eb" data-e="sketch">✏️ Sketch</button>
      <button class="eb" data-e="prism">🌈 Prism</button>
      <button class="eb" data-e="mask">⬡ Mask</button>
    </div>
  </div>
  <div>
    <div class="lbl">Font Size</div>
    <div class="sr">
      <div class="sl"><span>Size</span><span id="fsv">120</span></div>
      <input type="range" id="fs" min="24" max="220" value="120">
    </div>
  </div>
  <div>
    <div class="lbl">Colors</div>
    <div class="cr">
      <div class="cs"><label>Text</label><input type="color" id="tc" value="#ffffff"></div>
      <div class="cs"><label>Background</label><input type="color" id="bc" value="#09090f"></div>
    </div>
    <div class="pg" id="pg"></div>
  </div>
  <div id="ep"></div>
  <div style="display:flex;flex-direction:column;gap:7px">
    <button class="btn" id="expBtn">↓ Export PNG</button>
    <button class="btn sec" id="rndBtn">✦ Randomize</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let LW = 640, LH = 360;

const PALS = [
  {t:'#ffffff',b:'#09090f',n:'Void'},
  {t:'#c084fc',b:'#060310',n:'Purple'},
  {t:'#06b6d4',b:'#020c10',n:'Cyan'},
  {t:'#f472b6',b:'#0f0208',n:'Rose'},
  {t:'#fbbf24',b:'#0c0700',n:'Gold'},
  {t:'#34d399',b:'#020c07',n:'Emerald'},
  {t:'#ff6b35',b:'#0f0500',n:'Fire'},
  {t:'#a5b4fc',b:'#0c0c22',n:'Indigo'},
];
const PHRASES = ['NOVA','PULSE','WAVE','FLUX','ECHO','BLOOM','VOID','FORGE','NEON','PRISM','APEX','ORBIT','GLOW','ZONE'];

const EFFECTS = ['neon','extrude','glitch','sketch','prism','mask'];
const PDEFS = {
  neon:[{id:'glow',l:'Glow Radius',mn:5,mx:60,def:32},{id:'spd',l:'Pulse Speed',mn:0,mx:100,def:55}],
  extrude:[{id:'dep',l:'Depth',mn:2,mx:32,def:10},{id:'angle',l:'Angle',mn:0,mx:360,def:45}],
  glitch:[{id:'shf',l:'Shift Amount',mn:1,mx:40,def:10},{id:'spd',l:'Glitch Rate',mn:0,mx:100,def:65}],
  sketch:[{id:'sw',l:'Stroke Weight',mn:1,mx:8,def:2},{id:'spd',l:'Draw Speed',mn:10,mx:100,def:50}],
  prism:[{id:'shf',l:'Prism Split',mn:1,mx:50,def:10},{id:'spd',l:'Wave Speed',mn:0,mx:100,def:40}],
  mask:[{id:'shp',l:'Shape',mn:0,mx:3,step:1,def:0},{id:'spd',l:'Spin Speed',mn:0,mx:100,def:35}],
};
const SHAPE_NAMES = ['Circle','Star','Hexagon','Diamond'];

let S = JSON.parse(localStorage.getItem('tes_v1') || 'null') || {
  text:'TYPE', effect:'neon', fontSize:120,
  textColor:'#ffffff', bgColor:'#09090f',
  p:{glow:32,spd:55,dep:10,angle:45,shf:10,sw:2,shp:0}
};

let t=0, mx=0.5, my=0.5, glitchBurst=0, clickFlash=false;

// --- Canvas sizing ---
function resize(){
  const wrap = document.getElementById('wrap');
  const pw = wrap.clientWidth-32, ph = wrap.clientHeight-32;
  if(pw/ph > 16/9){LH=ph; LW=Math.round(ph*16/9);}
  else{LW=pw; LH=Math.round(pw*9/16);}
  const dpr = window.devicePixelRatio||1;
  canvas.style.width=LW+'px'; canvas.style.height=LH+'px';
  canvas.width=Math.round(LW*dpr); canvas.height=Math.round(LH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

// --- Mouse ---
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  mx=(e.clientX-r.left)/r.width; my=(e.clientY-r.top)/r.height;
});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  mx=(e.touches[0].clientX-r.left)/r.width; my=(e.touches[0].clientY-r.top)/r.height;
},{passive:false});
canvas.addEventListener('click', ()=>{
  if(S.effect==='glitch') glitchBurst=1.0;
  else if(S.effect==='mask'){
    S.p.shp=(Math.round(S.p.shp)+1)%4;
    saveS(); buildEP();
  } else if(S.effect==='sketch'){
    dashProgress=0;
  }
  clickFlash=true; setTimeout(()=>clickFlash=false,200);
});

// --- Font ---
function setFont(sz){ ctx.font=`900 ${sz}px system-ui,-apple-system,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; }

// --- Color utils ---
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}

// --- Effects ---
function renderNeon(){
  const txt=S.text||'TYPE', sz=+S.fontSize, col=S.textColor;
  const glow=S.p.glow||32, spd=(S.p.spd||55)/100;
  const pulse=0.55+0.45*Math.sin(t*spd*3.2);
  const hueShift=Math.round((mx-0.5)*60); // mouse shifts hue

  ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,LW,LH);
  setFont(sz);

  // Color shift based on mouse X
  const [r,g,b]=hexToRgb(col);
  const glowCol=`hsl(${(280+hueShift+360)%360},100%,75%)`;

  [[glow*3.5,.25*pulse],[glow*2,.45*pulse],[glow,.7*pulse],[glow*.35,1]].forEach(([bl,al])=>{
    ctx.save(); ctx.shadowColor=glowCol; ctx.shadowBlur=bl; ctx.globalAlpha=al;
    ctx.fillStyle=col; ctx.fillText(txt,LW/2,LH/2); ctx.restore();
  });
  // Scanlines
  ctx.save(); ctx.globalAlpha=.045;
  for(let y=0;y<LH;y+=3){ctx.fillStyle='#000';ctx.fillRect(0,y,LW,1);}
  ctx.restore();
  // Vignette
  const vg=ctx.createRadialGradient(LW/2,LH/2,LH*.15,LW/2,LH/2,LH*.75);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,LW,LH);
}

function renderExtrude(){
  const txt=S.text||'TYPE', sz=+S.fontSize, col=S.textColor;
  const dep=S.p.dep||10, layers=14;
  // Angle follows mouse
  const angle=(mx*Math.PI*.8+Math.PI*.1);
  const [r,g,b]=hexToRgb(col);

  ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,LW,LH);
  setFont(sz);

  for(let i=layers;i>=0;i--){
    const progress=i/layers;
    const dim=0.08+progress*0.75;
    ctx.fillStyle=`rgb(${Math.round(r*dim)},${Math.round(g*dim)},${Math.round(b*dim)})`;
    ctx.fillText(txt, LW/2+Math.cos(angle)*i*(dep/layers*1.5), LH/2+Math.sin(angle)*i*(dep/layers*1.5));
  }
  // Specular highlight on top face
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=6; ctx.fillStyle=col;
  ctx.fillText(txt,LW/2,LH/2); ctx.restore();
}

function renderGlitch(){
  const txt=S.text||'TYPE', sz=+S.fontSize;
  const shf=S.p.shf||10, spd=(S.p.spd||65)/100;
  const noise=Math.sin(t*spd*12.7);
  const burst = glitchBurst>0;
  glitchBurst=Math.max(0,glitchBurst-0.05);

  ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,LW,LH);
  setFont(sz);

  const active = burst || noise>0.6;
  const intensity = burst ? 3 : 1;

  // R channel
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle='#ff2040'; ctx.globalAlpha=.9;
  ctx.fillText(txt, LW/2+(active?(Math.random()-.5)*shf*intensity:-shf), LH/2+(active?(Math.random()-.5)*4:0));
  ctx.restore();

  // G channel (center)
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle='#20ff40'; ctx.globalAlpha=.9;
  ctx.fillText(txt, LW/2+(active?(Math.random()-.5)*shf*.4:0), LH/2);
  ctx.restore();

  // B channel
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle='#2040ff'; ctx.globalAlpha=.9;
  ctx.fillText(txt, LW/2+(active?(Math.random()-.5)*shf*intensity:shf), LH/2+(active?(Math.random()-.5)*4:0));
  ctx.restore();

  // Glitch bars
  if(active){
    ctx.save(); ctx.globalAlpha=burst?.25:.1;
    for(let i=0;i<(burst?6:2);i++){
      const y=Math.random()*LH, h=2+Math.random()*(burst?16:8);
      ctx.fillStyle=Math.random()>.5?'#ff2040':'#ffffff';
      ctx.fillRect(Math.random()*LW*.3, y, LW*(0.5+Math.random()*.5), h);
    }
    ctx.restore();
  }
  // Scanlines
  ctx.save(); ctx.globalAlpha=.035;
  for(let y=0;y<LH;y+=2){ctx.fillStyle='#000';ctx.fillRect(0,y,LW,1);}
  ctx.restore();
}

let dashProgress=0;
function renderSketch(){
  const txt=S.text||'TYPE', sz=+S.fontSize, col=S.textColor;
  const sw=S.p.sw||2, spd=(S.p.spd||50)/1000;

  ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,LW,LH);
  setFont(sz);

  // Animated dash draw
  dashProgress=Math.min(1, dashProgress+spd);
  const totalLen=2000, drawn=totalLen*dashProgress;

  // Faint fill
  ctx.save(); ctx.globalAlpha=.06; ctx.fillStyle=col; ctx.fillText(txt,LW/2,LH/2); ctx.restore();

  // Animated stroke
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=sw;
  ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.setLineDash([drawn, totalLen]); ctx.lineDashOffset=0;
  ctx.strokeText(txt,LW/2,LH/2);
  ctx.restore();

  // Ruler lines (decorative)
  ctx.save(); ctx.globalAlpha=.12; ctx.strokeStyle=col; ctx.lineWidth=.5; ctx.setLineDash([4,8]);
  const margin=LH*.12;
  ctx.beginPath(); ctx.moveTo(LW*.05, LH/2+sz*.55+margin); ctx.lineTo(LW*.95, LH/2+sz*.55+margin); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(LW*.05, LH/2-sz*.55-margin); ctx.lineTo(LW*.95, LH/2-sz*.55-margin); ctx.stroke();
  ctx.restore();

  // Crosshair corner marks
  ctx.save(); ctx.strokeStyle=col; ctx.globalAlpha=.25; ctx.lineWidth=1; ctx.setLineDash([]);
  const p=18, cl=14;
  [[p,p],[LW-p,p],[LW-p,LH-p],[p,LH-p]].forEach(([cx,cy],i)=>{
    const sx=i<2?1:-1, sy=i===0||i===3?1:-1;
    ctx.beginPath(); ctx.moveTo(cx,cy+sy*cl); ctx.lineTo(cx,cy); ctx.lineTo(cx+sx*cl,cy); ctx.stroke();
  });
  ctx.restore();
}

function renderPrism(){
  const txt=S.text||'TYPE', sz=+S.fontSize;
  const shf=S.p.shf||10, spd=(S.p.spd||40)/100;
  const wave=Math.sin(t*spd*1.8);
  // Shift direction from mouse
  const dx=(mx-0.5)*shf*2, dy=(my-0.5)*shf;

  ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,LW,LH);
  setFont(sz);

  // R
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle='#ff2244';
  ctx.fillText(txt, LW/2-shf+dx*0.3+wave*shf*.4, LH/2-shf*.3+dy*.3); ctx.restore();
  // G
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle='#22ff66';
  ctx.fillText(txt, LW/2, LH/2); ctx.restore();
  // B
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle='#2266ff';
  ctx.fillText(txt, LW/2+shf-dx*0.3-wave*shf*.4, LH/2+shf*.3-dy*.3); ctx.restore();

  // Vignette
  const vg=ctx.createRadialGradient(LW/2,LH/2,LH*.2,LW/2,LH/2,LH*.8);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,.65)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,LW,LH);
}

function shapePath(cx,cy,R,shpIdx){
  ctx.beginPath();
  if(shpIdx===0){ ctx.arc(cx,cy,R,0,Math.PI*2); }
  else if(shpIdx===1){
    for(let i=0;i<10;i++){const a=(i*Math.PI/5)-Math.PI/2,r=i%2===0?R:R*.42;
      i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
    ctx.closePath();
  } else if(shpIdx===2){
    for(let i=0;i<6;i++){const a=(i*Math.PI/3)-Math.PI/6;
      i===0?ctx.moveTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R):ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);}
    ctx.closePath();
  } else {
    ctx.moveTo(cx,cy-R); ctx.lineTo(cx+R*.72,cy); ctx.lineTo(cx,cy+R); ctx.lineTo(cx-R*.72,cy); ctx.closePath();
  }
}

function renderMask(){
  const txt=S.text||'TYPE', sz=+S.fontSize, col=S.textColor;
  const shpIdx=Math.round(S.p.shp||0), spd=(S.p.spd||35)/100;
  const R=Math.min(LW,LH)*.40;
  const spin=t*spd*.4;

  ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,LW,LH);

  // Clip & draw
  ctx.save();
  ctx.translate(LW/2,LH/2); ctx.rotate(spin);
  shapePath(0,0,R,shpIdx); ctx.clip();
  ctx.rotate(-spin);
  setFont(sz); ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=24;
  ctx.fillText(txt,0,0);
  ctx.restore();

  // Outline (rotates)
  ctx.save(); ctx.translate(LW/2,LH/2); ctx.rotate(spin);
  shapePath(0,0,R,shpIdx);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.globalAlpha=.35;
  ctx.shadowColor=col; ctx.shadowBlur=12; ctx.stroke();
  ctx.restore();

  // Label
  ctx.save(); ctx.globalAlpha=.3; ctx.font='600 11px system-ui'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillStyle=col; ctx.fillText('CLICK TO CHANGE SHAPE', LW/2, LH-16); ctx.restore();
}

const RENDERERS = {neon:renderNeon, extrude:renderExtrude, glitch:renderGlitch, sketch:renderSketch, prism:renderPrism, mask:renderMask};

function frame(ts){
  t=ts/1000;
  (RENDERERS[S.effect]||renderNeon)();
  requestAnimationFrame(frame);
}

// --- UI wiring ---
function saveS(){ localStorage.setItem('tes_v1',JSON.stringify(S)); }

function buildEP(){
  const defs=PDEFS[S.effect]||[];
  const ep=document.getElementById('ep');
  ep.innerHTML='';
  defs.forEach(d=>{
    const div=document.createElement('div'); div.className='sr';
    const lrow=document.createElement('div'); lrow.className='sl';
    const ns=document.createElement('span'); ns.textContent=d.l;
    const vs=document.createElement('span');
    const cur=S.p[d.id]??d.def;
    vs.textContent=d.id==='shp'?SHAPE_NAMES[Math.round(cur)]:Math.round(cur);
    lrow.append(ns,vs);
    const inp=document.createElement('input'); inp.type='range';
    inp.min=d.mn; inp.max=d.mx; inp.step=d.step||1; inp.value=cur;
    inp.oninput=()=>{
      S.p[d.id]=parseFloat(inp.value);
      vs.textContent=d.id==='shp'?SHAPE_NAMES[Math.round(S.p[d.id])]:Math.round(S.p[d.id]);
      saveS();
    };
    div.append(lrow,inp); ep.appendChild(div);
  });
}

function applyS(){
  document.getElementById('ti').value=S.text;
  document.getElementById('fs').value=S.fontSize;
  document.getElementById('fsv').textContent=S.fontSize;
  document.getElementById('tc').value=S.textColor;
  document.getElementById('bc').value=S.bgColor;
  document.querySelectorAll('.eb').forEach(b=>b.classList.toggle('on',b.dataset.e===S.effect));
  buildEP();
}

// Palette swatches
const pg=document.getElementById('pg');
PALS.forEach((p,i)=>{
  const btn=document.createElement('div'); btn.className='pb';
  btn.style.background=p.t; btn.style.outline=`2px solid ${p.b}`; btn.title=p.n;
  btn.onclick=()=>{
    S.textColor=p.t; S.bgColor=p.b;
    document.getElementById('tc').value=p.t; document.getElementById('bc').value=p.b;
    document.querySelectorAll('.pb').forEach((b,j)=>b.classList.toggle('on',j===i));
    saveS();
  };
  pg.appendChild(btn);
});

document.getElementById('ti').addEventListener('input',e=>{S.text=e.target.value;saveS();});
document.getElementById('fs').addEventListener('input',e=>{
  S.fontSize=+e.target.value; document.getElementById('fsv').textContent=S.fontSize; saveS();
});
document.getElementById('tc').addEventListener('input',e=>{S.textColor=e.target.value;saveS();});
document.getElementById('bc').addEventListener('input',e=>{S.bgColor=e.target.value;saveS();});
document.querySelectorAll('.eb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    S.effect=btn.dataset.e;
    document.querySelectorAll('.eb').forEach(b=>b.classList.toggle('on',b===btn));
    if(S.effect==='sketch') dashProgress=0;
    buildEP(); saveS();
  });
});

document.getElementById('expBtn').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.download=`type-${S.effect}.png`; a.href=canvas.toDataURL('image/png'); a.click();
});
document.getElementById('rndBtn').addEventListener('click',()=>{
  S.text=PHRASES[Math.floor(Math.random()*PHRASES.length)];
  S.effect=EFFECTS[Math.floor(Math.random()*EFFECTS.length)];
  const pal=PALS[Math.floor(Math.random()*PALS.length)];
  S.textColor=pal.t; S.bgColor=pal.b;
  S.fontSize=80+Math.round(Math.random()*80);
  if(S.effect==='sketch') dashProgress=0;
  applyS(); saveS();
});

window.addEventListener('resize',resize);
resize(); applyS(); requestAnimationFrame(frame);
</script>
</body>
</html>
