<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Type Machine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07050f;color:#e8e0f8;font-family:system-ui,-apple-system,sans-serif;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
canvas{flex:1;width:100%;display:block}
#ctrl{background:rgba(7,5,15,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.08);padding:10px 14px 12px;
  display:flex;flex-direction:column;gap:9px;flex-shrink:0}
.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  opacity:.4;min-width:40px;flex-shrink:0}
.mbtn{padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(232,224,248,.65);font:700 11px/1 system-ui;
  letter-spacing:.05em;cursor:pointer;transition:background .12s,color .12s,border-color .12s;
  touch-action:manipulation}
.mbtn:hover{background:rgba(255,255,255,.1);color:#e8e0f8}
.mbtn.on{background:var(--ac,#7c3aed);border-color:var(--ac,#7c3aed);color:#fff}
.sw{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;
  transition:transform .13s,border-color .13s;flex-shrink:0;touch-action:manipulation}
.sw:hover{transform:scale(1.2)}.sw.on{border-color:#fff;transform:scale(1.15)}
#tin{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:#e8e0f8;padding:4px 9px;font:700 13px/1 system-ui;letter-spacing:.1em;
  min-width:90px;max-width:170px;text-transform:uppercase;touch-action:auto}
#tin:focus{outline:none;border-color:var(--ac,#7c3aed)}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;
  background:rgba(255,255,255,.12);outline:none;cursor:pointer;width:68px;flex-shrink:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
  border-radius:50%;background:var(--ac,#7c3aed);cursor:pointer}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
  background:var(--ac,#7c3aed);border:none;cursor:pointer}
.val{font-size:10px;opacity:.38;min-width:16px;text-align:right}
.act{padding:5px 12px;border-radius:7px;border:none;cursor:pointer;
  font:700 11px/1 system-ui;letter-spacing:.05em;transition:filter .12s,background .12s;
  touch-action:manipulation}
#pBtn{background:rgba(255,255,255,.08);color:#e8e0f8;border:1px solid rgba(255,255,255,.14);min-width:72px}
#pBtn:hover{background:rgba(255,255,255,.14)}
#eBtn{background:var(--ac,#7c3aed);color:#fff}
#eBtn:hover{filter:brightness(1.18)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ctrl">
  <div class="row">
    <span class="lbl">Text</span>
    <input id="tin" type="text" value="JCCL" maxlength="10" autocomplete="off" spellcheck="false">
    <button class="act" id="pBtn">⏸ Pause</button>
    <button class="act" id="eBtn">⬇ Save PNG</button>
  </div>
  <div class="row">
    <span class="lbl">Mode</span>
    <div id="modes">
      <button class="mbtn on" data-m="wave">Wave</button>
      <button class="mbtn" data-m="bounce">Bounce</button>
      <button class="mbtn" data-m="spiral">Spiral</button>
      <button class="mbtn" data-m="gravity">Gravity</button>
      <button class="mbtn" data-m="glitch">Glitch</button>
      <button class="mbtn" data-m="orbit">Orbit</button>
    </div>
  </div>
  <div class="row">
    <span class="lbl">Color</span>
    <button class="sw on" data-p="neon"   title="Neon"   style="background:linear-gradient(135deg,#7c3aed,#06b6d4)"></button>
    <button class="sw"    data-p="fire"   title="Fire"   style="background:linear-gradient(135deg,#f97316,#fbbf24)"></button>
    <button class="sw"    data-p="ocean"  title="Ocean"  style="background:linear-gradient(135deg,#0ea5e9,#34d399)"></button>
    <button class="sw"    data-p="pastel" title="Pastel" style="background:linear-gradient(135deg,#f472b6,#a78bfa)"></button>
    <button class="sw"    data-p="mono"   title="Mono"   style="background:linear-gradient(135deg,#9ca3af,#fff)"></button>
    <span class="lbl" style="min-width:26px;margin-left:8px">Spd</span>
    <input type="range" id="sR" min="1" max="10" value="5"><span class="val" id="sV">5</span>
    <span class="lbl" style="min-width:26px">Amp</span>
    <input type="range" id="aR" min="1" max="10" value="5"><span class="val" id="aV">5</span>
    <span class="lbl" style="min-width:22px">Sz</span>
    <input type="range" id="zR" min="2" max="12" value="6"><span class="val" id="zV">6</span>
  </div>
</div>
<script>
'use strict';
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const PALS={
  neon:  ['#c084fc','#818cf8','#38bdf8','#34d399','#f472b6','#7c3aed'],
  fire:  ['#f97316','#fbbf24','#ef4444','#fb923c','#f59e0b','#dc2626'],
  ocean: ['#38bdf8','#34d399','#0ea5e9','#06b6d4','#10b981','#67e8f9'],
  pastel:['#f472b6','#a78bfa','#fb7185','#c4b5fd','#fda4af','#fbcfe8'],
  mono:  ['#f3f4f6','#d1d5db','#9ca3af','#e5e7eb','#6b7280','#f9fafb'],
};
const ACS={neon:'#7c3aed',fire:'#f97316',ocean:'#0ea5e9',pastel:'#f472b6',mono:'#9ca3af'};
const BGS={neon:'#07050f',fire:'#0f0500',ocean:'#030f1c',pastel:'#0d0512',mono:'#080808'};
let mode='wave',pal='neon',playing=true,T=0,gL=[];

const tin=document.getElementById('tin');
const txt=()=>(tin.value||'TYPE').toUpperCase().slice(0,10);
const spd=()=>+document.getElementById('sR').value/10;
const amp=()=>+document.getElementById('aR').value/10;
const szv=()=>+document.getElementById('zR').value;

function fSize(){
  const n=txt().length||1,W=cv.width,H=cv.height;
  const base=Math.min(H*.44,W/(n*.72+.3)*.85);
  return Math.max(22,Math.min(220,base*(szv()/7)));
}

function initGrav(){
  const t=txt(),fs=fSize(),n=t.length,W=cv.width,H=cv.height;
  const sp=fs*.92,tot=(n-1)*sp;
  const sx=W/2-tot/2,by=H/2+fs*.2;
  gL=t.split('').map((c,i)=>({
    c,x:sx+i*sp,y:-fs*2-i*fs*.6,
    vx:(Math.random()-.5)*1.5,vy:1+Math.random(),
    bx:sx+i*sp,by,landed:false,
    col:PALS[pal][i%PALS[pal].length]
  }));
}

function resize(){
  const ctrl=document.getElementById('ctrl');
  cv.width=window.innerWidth;
  cv.height=window.innerHeight-(ctrl.offsetHeight||130);
  initGrav();
}

function draw(){
  const W=cv.width,H=cv.height;
  if(W<=0||H<=0)return;
  const t=txt(),n=t.length,p=PALS[pal],s=spd(),a=amp(),fs=fSize();
  const sp=fs*.9,tot=(n-1)*sp,bx=W/2-tot/2,by=H/2;

  cx.fillStyle=BGS[pal];cx.fillRect(0,0,W,H);
  cx.save();cx.textAlign='center';cx.textBaseline='middle';
  cx.font=`900 ${fs}px system-ui,-apple-system,sans-serif`;

  if(mode==='wave'){
    for(let i=0;i<n;i++){
      const ph=(i/n)*Math.PI*2,y=by+Math.sin(T*s*3+ph)*a*80;
      const sc=.88+.12*Math.sin(T*s*2+ph),col=p[i%p.length];
      cx.save();cx.translate(bx+i*sp,y);cx.scale(sc,sc);
      cx.shadowColor=col;cx.shadowBlur=24;cx.fillStyle=col;cx.fillText(t[i],0,0);cx.restore();
    }
  } else if(mode==='bounce'){
    for(let i=0;i<n;i++){
      const ph=i*.7,raw=Math.abs(Math.sin(T*s*2.5+ph));
      const y=by+(1-raw)*a*100,sy=.65+.35*raw,sx_=1.28-.28*raw,col=p[i%p.length];
      cx.save();cx.translate(bx+i*sp,y);cx.scale(sx_,sy);
      cx.shadowColor=col;cx.shadowBlur=18;cx.fillStyle=col;cx.fillText(t[i],0,0);cx.restore();
    }
  } else if(mode==='spiral'){
    const R=Math.min(W,H)*.3*a;
    for(let i=0;i<n;i++){
      const ang=(i/n)*Math.PI*2+T*s*1.2;
      const r=R*(.8+.2*Math.sin(T*s*2+i));
      const x=W/2+Math.cos(ang)*r,y=H/2+Math.sin(ang)*r*.68,col=p[i%p.length];
      cx.save();cx.translate(x,y);cx.rotate(ang+Math.PI/2);
      cx.shadowColor=col;cx.shadowBlur=28;cx.fillStyle=col;cx.fillText(t[i],0,0);cx.restore();
    }
  } else if(mode==='gravity'){
    const g=.35*s,fl=by+fs*.25;
    for(let i=0;i<gL.length&&i<n;i++){
      const l=gL[i];
      if(!l.landed){
        l.vy+=g;l.x+=l.vx;l.y+=l.vy;
        if(l.y>=fl){
          l.y=fl;l.vy*=-.52;l.vx*=.84;
          if(Math.abs(l.vy)<1.1){l.vy=0;l.vx=0;l.landed=true;l.y=fl;}
        }
        if(l.x<fs/2){l.x=fs/2;l.vx*=-.65;}
        if(l.x>W-fs/2){l.x=W-fs/2;l.vx*=-.65;}
      }
      cx.save();cx.translate(l.x,l.y);
      cx.shadowColor=l.col;cx.shadowBlur=22;cx.fillStyle=l.col;cx.fillText(t[i],0,0);cx.restore();
    }
  } else if(mode==='glitch'){
    for(let i=0;i<n;i++){
      const x=bx+i*sp,col=p[i%p.length],trig=Math.random()<.07*s;
      if(trig){
        const dx=(Math.random()-.5)*a*28,dy=(Math.random()-.5)*a*8;
        cx.save();cx.globalAlpha=.6;
        cx.fillStyle='#ff3060';cx.fillText(t[i],x+dx,by+dy);
        cx.fillStyle='#00ffaa';cx.fillText(t[i],x-dx*.5,by-dy*.4);
        cx.fillStyle='#3366ff';cx.fillText(t[i],x+dx*.3,by+dy*.6);
        cx.globalAlpha=1;cx.restore();
      } else {
        const sx_=Math.random()<.04*s?(Math.random()-.5)*a*18:0;
        cx.save();cx.shadowColor=col;cx.shadowBlur=14;
        cx.fillStyle=col;cx.fillText(t[i],x+sx_,by);cx.restore();
      }
    }
    if(Math.random()<.05*s){
      cx.save();cx.globalAlpha=.08;cx.fillStyle='#fff';
      cx.fillRect(0,Math.random()*H,W,1+Math.random()*3);cx.restore();
    }
  } else if(mode==='orbit'){
    const maxR=Math.min(W,H)*.36*a;
    for(let i=0;i<n;i++){
      const r=n===1?0:maxR*(.25+.75*(i/Math.max(n-1,1)));
      const dir=i%2===0?1:-1;
      const ang=T*s*(1+i*.13)*dir+(i/n)*Math.PI*2;
      const x=W/2+Math.cos(ang)*r,y=H/2+Math.sin(ang)*r*.62,col=p[i%p.length];
      cx.save();cx.translate(x,y);cx.rotate(ang+Math.PI/2);
      cx.shadowColor=col;cx.shadowBlur=32;cx.fillStyle=col;cx.fillText(t[i],0,0);cx.restore();
    }
  }
  cx.restore();
}

function loop(){if(playing)T+=.016;draw();requestAnimationFrame(loop);}

// Controls
document.getElementById('modes').addEventListener('click',e=>{
  const b=e.target.closest('[data-m]');if(!b)return;
  mode=b.dataset.m;
  document.querySelectorAll('[data-m]').forEach(x=>x.classList.toggle('on',x===b));
  if(mode==='gravity')initGrav();save();
});
document.querySelectorAll('[data-p]').forEach(b=>b.addEventListener('click',()=>{
  pal=b.dataset.p;
  document.querySelectorAll('[data-p]').forEach(x=>x.classList.toggle('on',x===b));
  document.documentElement.style.setProperty('--ac',ACS[pal]);
  if(mode==='gravity')gL.forEach((l,i)=>{l.col=PALS[pal][i%PALS[pal].length];});
  save();
}));
document.getElementById('pBtn').addEventListener('click',function(){
  playing=!playing;this.textContent=playing?'⏸ Pause':'▶ Play';
});
document.getElementById('eBtn').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.download=`kinetic-type-${Date.now()}.png`;a.href=cv.toDataURL('image/png');a.click();
});
tin.addEventListener('input',()=>{if(mode==='gravity')initGrav();save();});
[['sR','sV'],['aR','aV'],['zR','zV']].forEach(([rid,vid])=>{
  document.getElementById(rid).addEventListener('input',()=>{
    document.getElementById(vid).textContent=document.getElementById(rid).value;save();
  });
});

function save(){
  try{localStorage.setItem('ktype_v1',JSON.stringify({
    text:tin.value,mode,pal,
    spd:document.getElementById('sR').value,
    amp:document.getElementById('aR').value,
    sz:document.getElementById('zR').value
  }));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('ktype_v1')||'null');if(!d)return;
    if(d.text)tin.value=d.text;
    if(d.mode){mode=d.mode;document.querySelectorAll('[data-m]').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));}
    if(d.pal){pal=d.pal;document.querySelectorAll('[data-p]').forEach(b=>b.classList.toggle('on',b.dataset.p===pal));document.documentElement.style.setProperty('--ac',ACS[pal]);}
    if(d.spd){document.getElementById('sR').value=d.spd;document.getElementById('sV').textContent=d.spd;}
    if(d.amp){document.getElementById('aR').value=d.amp;document.getElementById('aV').textContent=d.amp;}
    if(d.sz) {document.getElementById('zR').value=d.sz; document.getElementById('zV').textContent=d.sz;}
  }catch(e){}
}
window.addEventListener('resize',resize);
load();resize();loop();
</script>
</body>
</html>
