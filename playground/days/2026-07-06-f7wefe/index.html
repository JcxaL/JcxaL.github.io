<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Particle Forge</title>
<style>
  :root{
    --bg:#05050a; --panel:#12121c; --panel2:#191926; --line:#2a2a3d;
    --accent:#ff6b35; --accent2:#7c3aed; --cyan:#22d3ee; --yellow:#f4e04d;
    --text:#eceaf6; --muted:#8a8aa3; --good:#22d3ee; --bad:#f4536b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    overflow:hidden; touch-action:none; user-select:none; position:fixed; inset:0;
  }
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}

  header{
    position:absolute; top:0; left:0; right:0; z-index:5;
    padding:10px 12px; display:flex; align-items:center; justify-content:space-between; gap:8px;
    pointer-events:none;
  }
  header > *{pointer-events:auto;}
  h1{font-size:14px; margin:0; font-weight:700; letter-spacing:.3px; display:flex; align-items:center; gap:7px;
     background:rgba(18,18,28,.7); backdrop-filter:blur(8px); padding:7px 12px; border-radius:999px; border:1px solid var(--line);}
  h1 .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .hbtns{display:flex; gap:6px;}
  .iconbtn{
    width:34px; height:34px; border-radius:999px; border:1px solid var(--line); background:rgba(18,18,28,.7);
    backdrop-filter:blur(8px); color:var(--text); font-size:15px; display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .iconbtn.on{background:var(--accent); color:#1a0800; border-color:var(--accent);}

  #stats{
    position:absolute; bottom:10px; left:10px; z-index:5; font-size:10px; color:var(--muted);
    background:rgba(18,18,28,.6); padding:5px 9px; border-radius:8px; font-variant-numeric:tabular-nums;
    border:1px solid var(--line); line-height:1.5;
  }

  #presetbar{
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%); z-index:5;
    display:flex; gap:5px; background:rgba(18,18,28,.75); backdrop-filter:blur(8px);
    padding:5px; border-radius:999px; border:1px solid var(--line); max-width:calc(100vw - 20px); overflow-x:auto;
  }
  #presetbar button{
    border:none; background:transparent; color:var(--muted); font-size:11px; font-weight:600; padding:7px 11px;
    border-radius:999px; cursor:pointer; white-space:nowrap; flex:none;
  }
  #presetbar button.active{background:var(--accent2); color:#fff;}

  #panel{
    position:absolute; top:56px; right:10px; z-index:6; width:250px; max-height:calc(100vh - 130px);
    background:rgba(15,15,24,.85); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:14px;
    padding:10px; overflow-y:auto; font-size:11px; transition:transform .2s, opacity .2s;
  }
  #panel.hidden{transform:translateX(280px); opacity:0; pointer-events:none;}
  #panel h2{font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:10px 0 5px; font-weight:700;}
  #panel h2:first-child{margin-top:0;}
  .row{display:flex; align-items:center; justify-content:space-between; gap:6px; margin:4px 0;}
  .row label{color:var(--muted); flex:none; font-size:10.5px;}
  .row input[type=range]{flex:1; accent-color:var(--accent);}
  .row input[type=color]{width:26px; height:20px; border:none; border-radius:4px; background:none; padding:0;}
  .row select{background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:6px; font-size:10.5px; padding:3px 4px;}
  .val{color:var(--text); font-size:10px; min-width:26px; text-align:right;}
  .chk{display:flex; align-items:center; gap:6px; margin:5px 0;}
  .chk input{accent-color:var(--accent);}
  .chips{display:flex; flex-wrap:wrap; gap:5px; margin:4px 0;}
  .chip{
    display:flex; align-items:center; gap:5px; background:var(--panel2); border:1px solid var(--line);
    border-radius:999px; padding:4px 9px; font-size:10px; cursor:pointer;
  }
  .chip.sel{border-color:var(--accent);}
  .chip .cdot{width:8px; height:8px; border-radius:50%;}
  .btnrow{display:flex; gap:5px; flex-wrap:wrap; margin:5px 0;}
  button.mini{
    border:1px solid var(--line); background:var(--panel2); color:var(--text); border-radius:8px;
    padding:6px 8px; font-size:10.5px; cursor:pointer; flex:1;
  }
  button.mini:active{background:var(--accent); color:#fff;}
  button.mini.rec.recording{background:var(--bad); border-color:var(--bad); color:#fff;}
  button.mini:disabled{opacity:.35; cursor:not-allowed;}
  hr{border:none; border-top:1px solid var(--line); margin:8px 0;}
  #customList{display:flex; flex-direction:column; gap:4px; margin:4px 0;}
  .cprow{display:flex; align-items:center; gap:5px;}
  .cprow button.load{flex:1; text-align:left;}
  .cprow button.del{width:24px; flex:none; color:var(--bad);}
  #toast{
    position:absolute; top:60px; left:50%; transform:translateX(-50%); z-index:20; background:var(--panel2);
    border:1px solid var(--line); padding:8px 14px; border-radius:8px; font-size:11px; opacity:0; transition:opacity .25s;
    pointer-events:none;
  }
  #toast.show{opacity:1;}
  #welcomeHint{
    position:absolute; bottom:56px; left:50%; transform:translateX(-50%); z-index:5; font-size:10px; color:var(--muted);
    background:rgba(18,18,28,.6); padding:4px 10px; border-radius:8px; white-space:nowrap;
  }
  input[type=file]{display:none;}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<header>
  <h1><span class="dot"></span>Particle Forge</h1>
  <div class="hbtns">
    <button class="iconbtn" id="btnRotate" title="Auto-rotate camera">↻</button>
    <button class="iconbtn" id="btnReset" title="Reset camera">⌖</button>
    <button class="iconbtn" id="btnPanel" title="Toggle controls">⚙</button>
  </div>
</header>

<div id="stats"></div>
<div id="welcomeHint">Drag to orbit · Scroll/pinch to zoom</div>

<div id="presetbar"></div>

<div id="panel">
  <h2>Presets</h2>
  <div class="btnrow">
    <button class="mini" id="btnSavePreset">💾 Save As...</button>
    <button class="mini" id="btnExportJson">⬇ Export</button>
    <button class="mini" id="btnImportJson">⬆ Import</button>
  </div>
  <div id="customList"></div>

  <hr>
  <h2>Emitters (<span id="emCount">0</span>)</h2>
  <div class="chips" id="emChips"></div>
  <div class="btnrow"><button class="mini" id="btnAddEm">+ Add Emitter</button><button class="mini" id="btnDelEm">Remove Selected</button></div>
  <div id="emEditor"></div>

  <hr>
  <h2>Forces</h2>
  <div id="forceEditor"></div>

  <hr>
  <h2>Render</h2>
  <div class="chk"><input type="checkbox" id="chkAdditive"><label for="chkAdditive">Additive glow blend</label></div>

  <hr>
  <h2>Export</h2>
  <div class="btnrow">
    <button class="mini" id="btnSnap">📷 PNG Snapshot</button>
    <button class="mini rec" id="btnRec">⏺ Record WebM</button>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="fileInput" accept="application/json">

<script>
(function(){
"use strict";

// ---------- WebGL setup ----------
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', {preserveDrawingBuffer:true, antialias:true, alpha:false});
if (!gl) { document.body.innerHTML = '<div style="padding:40px;color:#fff;font-family:sans-serif">WebGL is not supported on this device.</div>'; return; }

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}
const vsSrc = `
  attribute vec3 aPosition;
  attribute vec4 aColor;
  attribute float aSize;
  uniform mat4 uProjection;
  uniform mat4 uView;
  varying vec4 vColor;
  void main(){
    vec4 viewPos = uView * vec4(aPosition, 1.0);
    float dist = max(-viewPos.z, 0.5);
    gl_PointSize = clamp(aSize * (260.0 / dist), 1.0, 220.0);
    gl_Position = uProjection * viewPos;
    vColor = aColor;
  }
`;
const fsSrc = `
  precision mediump float;
  varying vec4 vColor;
  void main(){
    vec2 d = gl_PointCoord - vec2(0.5);
    float r = length(d) * 2.0;
    float alpha = smoothstep(1.0, 0.15, r) * vColor.a;
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(vColor.rgb, alpha);
  }
`;
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsSrc));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const aPosition = gl.getAttribLocation(prog, 'aPosition');
const aColor = gl.getAttribLocation(prog, 'aColor');
const aSize = gl.getAttribLocation(prog, 'aSize');
const uProjection = gl.getUniformLocation(prog, 'uProjection');
const uView = gl.getUniformLocation(prog, 'uView');

const bufPos = gl.createBuffer();
const bufColor = gl.createBuffer();
const bufSize = gl.createBuffer();

gl.enable(gl.BLEND);
gl.disable(gl.DEPTH_TEST);

// ---------- Matrix / vector math ----------
function perspective(fovy, aspect, near, far){
  const f = 1.0 / Math.tan(fovy/2);
  const nf = 1/(near-far);
  return new Float32Array([
    f/aspect,0,0,0,
    0,f,0,0,
    0,0,(far+near)*nf,-1,
    0,0,2*far*near*nf,0
  ]);
}
function normalize3(v){ const l = Math.hypot(v[0],v[1],v[2])||1; return [v[0]/l,v[1]/l,v[2]/l]; }
function sub3(a,b){ return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]; }
function cross3(a,b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dot3(a,b){ return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function lookAt(eye, center, up){
  const z = normalize3(sub3(eye, center));
  const x = normalize3(cross3(up, z));
  const y = cross3(z, x);
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -dot3(x,eye), -dot3(y,eye), -dot3(z,eye), 1
  ]);
}

// ---------- Camera ----------
const cam = { yaw: 0.7, pitch: 0.45, dist: 9, target: [0,1.2,0], autoRotate: true };
function camEye(){
  const p = Math.max(-1.45, Math.min(1.45, cam.pitch));
  return [
    cam.target[0] + cam.dist*Math.cos(p)*Math.sin(cam.yaw),
    cam.target[1] + cam.dist*Math.sin(p),
    cam.target[2] + cam.dist*Math.cos(p)*Math.cos(cam.yaw)
  ];
}

// ---------- Particle pool (SoA) ----------
const MAX = 6000;
const px=new Float32Array(MAX), py=new Float32Array(MAX), pz=new Float32Array(MAX);
const vx=new Float32Array(MAX), vy=new Float32Array(MAX), vz=new Float32Array(MAX);
const life=new Float32Array(MAX), maxLife=new Float32Array(MAX);
const size0=new Float32Array(MAX), size1=new Float32Array(MAX);
const cr0=new Float32Array(MAX), cg0=new Float32Array(MAX), cb0=new Float32Array(MAX);
const cr1=new Float32Array(MAX), cg1=new Float32Array(MAX), cb1=new Float32Array(MAX);
let activeCount = 0;

const drawPos = new Float32Array(MAX*3);
const drawColor = new Float32Array(MAX*4);
const drawSize = new Float32Array(MAX);

function hexToRgb(hex){
  const n = parseInt(hex.slice(1), 16);
  return [((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255];
}
function rand(a,b){ return a + Math.random()*(b-a); }

function spawn(em){
  if (activeCount >= MAX) return;
  const i = activeCount++;
  const c0 = hexToRgb(em.color0), c1 = hexToRgb(em.color1);
  let dx=0,dy=1,dz=0, ox=em.x, oy=em.y, oz=em.z;
  if (em.shape === 'cone'){
    const ang = rand(0, em.spread*Math.PI/180);
    const rot = rand(0, Math.PI*2);
    dx = Math.sin(ang)*Math.cos(rot); dz = Math.sin(ang)*Math.sin(rot); dy = Math.cos(ang);
  } else if (em.shape === 'ring'){
    const a = rand(0, Math.PI*2);
    ox = em.x + Math.cos(a)*em.radius; oz = em.z + Math.sin(a)*em.radius;
    dx = Math.cos(a)*0.4; dz = Math.sin(a)*0.4; dy = 0.9;
  } else if (em.shape === 'box'){
    ox = em.x + rand(-em.radius, em.radius); oz = em.z + rand(-em.radius, em.radius); oy = em.y + rand(-0.3,0.3);
    dx = rand(-0.3,0.3); dz = rand(-0.3,0.3); dy = -1;
  } else if (em.shape === 'burst'){
    const theta = rand(0, Math.PI*2), phi = Math.acos(rand(-1,1));
    dx = Math.sin(phi)*Math.cos(theta); dz = Math.sin(phi)*Math.sin(theta); dy = Math.cos(phi)*0.7 + 0.3;
  } else { // point
    const a = rand(0, Math.PI*2);
    dx = Math.cos(a)*0.5; dz = Math.sin(a)*0.5; dy = 1;
  }
  px[i]=ox; py[i]=oy; pz[i]=oz;
  const spd = em.speed * rand(0.7, 1.15);
  vx[i]=dx*spd; vy[i]=dy*spd; vz[i]=dz*spd;
  const l = em.life * rand(0.8, 1.15);
  life[i]=l; maxLife[i]=l;
  size0[i]=em.size0; size1[i]=em.size1;
  cr0[i]=c0[0]; cg0[i]=c0[1]; cb0[i]=c0[2];
  cr1[i]=c1[0]; cg1[i]=c1[1]; cb1[i]=c1[2];
}

function killSwap(i){
  const last = activeCount - 1;
  if (i !== last){
    px[i]=px[last]; py[i]=py[last]; pz[i]=pz[last];
    vx[i]=vx[last]; vy[i]=vy[last]; vz[i]=vz[last];
    life[i]=life[last]; maxLife[i]=maxLife[last];
    size0[i]=size0[last]; size1[i]=size1[last];
    cr0[i]=cr0[last]; cg0[i]=cg0[last]; cb0[i]=cb0[last];
    cr1[i]=cr1[last]; cg1[i]=cg1[last]; cb1[i]=cb1[last];
  }
  activeCount--;
}

// ---------- Emitters & forces state ----------
let emitters = [];
let emIdSeq = 1;
let selectedEm = null;
const forces = {
  gravity: { on:true, strength: 1.4 },
  wind: { on:false, x: 0.6, z: 0 },
  vortex: { on:false, strength: 1.6, x: 0, z: 0 },
  turbulence: { on:false, strength: 0.6, scale: 0.6 }
};
let additiveBlend = true;
let clock = 0;

function newEmitter(overrides){
  return Object.assign({
    id: emIdSeq++, shape:'point', x:0, y:1, z:0, radius:1.2,
    rate:60, life:2.5, speed:2.2, spread:20,
    size0:14, size1:2, color0:'#ff9d4d', color1:'#ff3d1f',
    _acc:0, _timer:0, interval:1.4, burstCount:140
  }, overrides || {});
}

// ---------- Presets ----------
const PRESETS = {
  Fire: {
    blend:true, cam:{yaw:0.5,pitch:0.35,dist:8},
    forces:{ gravity:{on:true,strength:-1.1}, wind:{on:true,x:0.3,z:0.1}, vortex:{on:false,strength:1,x:0,z:0}, turbulence:{on:true,strength:0.9,scale:0.9} },
    emitters:[ newEmitter({shape:'cone', x:0,y:0,z:0, rate:110, life:1.1, speed:2.6, spread:16, size0:20, size1:2, color0:'#ffd24d', color1:'#ff2d1f'}) ]
  },
  Snow: {
    blend:false, cam:{yaw:0.9,pitch:0.25,dist:10},
    forces:{ gravity:{on:true,strength:0.5}, wind:{on:true,x:0.5,z:0.2}, vortex:{on:false,strength:1,x:0,z:0}, turbulence:{on:true,strength:0.4,scale:0.4} },
    emitters:[ newEmitter({shape:'box', x:0,y:4,z:0, radius:4, rate:90, life:5, speed:0.6, size0:6, size1:5, color0:'#ffffff', color1:'#bcd9ff'}) ]
  },
  Fireworks: {
    blend:true, cam:{yaw:0.3,pitch:0.3,dist:11},
    forces:{ gravity:{on:true,strength:1.6}, wind:{on:false,x:0,z:0}, vortex:{on:false,strength:1,x:0,z:0}, turbulence:{on:false,strength:0.5,scale:0.5} },
    emitters:[ newEmitter({shape:'burst', x:0,y:2.5,z:0, interval:1.3, burstCount:160, speed:4.2, life:1.6, size0:10, size1:1, color0:'#ff5df0', color1:'#5df0ff'}) ]
  },
  Galaxy: {
    blend:true, cam:{yaw:1.2,pitch:0.9,dist:9},
    forces:{ gravity:{on:false,strength:0}, wind:{on:false,x:0,z:0}, vortex:{on:true,strength:2.4,x:0,z:0}, turbulence:{on:true,strength:0.25,scale:0.3} },
    emitters:[ newEmitter({shape:'ring', x:0,y:0,z:0, radius:3.2, rate:130, life:4, speed:0.9, size0:9, size1:2, color0:'#7c3aed', color1:'#22d3ee'}) ]
  },
  Smoke: {
    blend:false, cam:{yaw:0.6,pitch:0.3,dist:8},
    forces:{ gravity:{on:true,strength:-0.4}, wind:{on:true,x:0.4,z:0.1}, vortex:{on:false,strength:1,x:0,z:0}, turbulence:{on:true,strength:1.1,scale:0.5} },
    emitters:[ newEmitter({shape:'point', x:0,y:0,z:0, rate:50, life:3.2, speed:1.1, size0:26, size1:40, color0:'#cfcfcf', color1:'#555560'}) ]
  }
};
let activePresetName = null;

function applyConfig(cfg){
  additiveBlend = cfg.blend;
  document.getElementById('chkAdditive').checked = additiveBlend;
  forces.gravity = Object.assign({}, cfg.forces.gravity);
  forces.wind = Object.assign({}, cfg.forces.wind);
  forces.vortex = Object.assign({}, cfg.forces.vortex);
  forces.turbulence = Object.assign({}, cfg.forces.turbulence);
  emitters = cfg.emitters.map(e => newEmitter(Object.assign({}, e, {id:undefined})));
  activeCount = 0;
  selectedEm = emitters[0] || null;
  if (cfg.cam){ cam.yaw=cfg.cam.yaw; cam.pitch=cfg.cam.pitch; cam.dist=cfg.cam.dist; }
  renderForceEditor();
  renderEmChips();
  renderEmEditor();
}

function loadPreset(name){
  activePresetName = name;
  applyConfig(PRESETS[name]);
  renderPresetBar();
  saveLastConfig();
}

// ---------- Simulation update ----------
function simulate(dt){
  clock += dt;
  for (const em of emitters){
    if (em.shape === 'burst'){
      em._timer -= dt;
      if (em._timer <= 0){
        for (let n=0;n<em.burstCount;n++) spawn(em);
        em._timer = em.interval * rand(0.85, 1.2);
      }
    } else {
      em._acc += em.rate * dt;
      while (em._acc >= 1 && activeCount < MAX){ spawn(em); em._acc -= 1; }
    }
  }

  const g = forces.gravity.on ? forces.gravity.strength : 0;
  const windX = forces.wind.on ? forces.wind.x * (1 + 0.3*Math.sin(clock*0.6)) : 0;
  const windZ = forces.wind.on ? forces.wind.z * (1 + 0.3*Math.cos(clock*0.5)) : 0;
  const vortexOn = forces.vortex.on, vStrength = forces.vortex.strength, vx0 = forces.vortex.x, vz0 = forces.vortex.z;
  const turbOn = forces.turbulence.on, tStrength = forces.turbulence.strength, tScale = forces.turbulence.scale;

  for (let i=0;i<activeCount;i++){
    let fx=windX, fy=-g, fz=windZ;
    if (vortexOn){
      const dx = px[i]-vx0, dz = pz[i]-vz0;
      const d = Math.hypot(dx,dz) + 0.35;
      fx += (-dz/d) * vStrength / (d*0.4+1);
      fz += (dx/d) * vStrength / (d*0.4+1);
      fx += (-dx/d) * vStrength * 0.15;
      fz += (-dz/d) * vStrength * 0.15;
    }
    if (turbOn){
      const t = clock;
      const nx = Math.sin(py[i]*tScale + t) * Math.cos(pz[i]*tScale - t*0.7);
      const ny = Math.sin(pz[i]*tScale + t*0.8) * Math.cos(px[i]*tScale - t);
      const nz = Math.sin(px[i]*tScale + t*1.2) * Math.cos(py[i]*tScale - t*0.6);
      fx += nx * tStrength; fy += ny * tStrength; fz += nz * tStrength;
    }
    vx[i] += fx*dt; vy[i] += fy*dt; vz[i] += fz*dt;
    px[i] += vx[i]*dt; py[i] += vy[i]*dt; pz[i] += vz[i]*dt;
    life[i] -= dt;
    if (life[i] <= 0){ killSwap(i); i--; }
  }
}

function buildDrawBuffers(){
  for (let i=0;i<activeCount;i++){
    const age = 1 - life[i]/maxLife[i];
    const fadeIn = Math.min(1, age*6);
    const fadeOut = Math.min(1, life[i]/maxLife[i]*4);
    const alpha = Math.min(fadeIn, fadeOut);
    drawPos[i*3] = px[i]; drawPos[i*3+1] = py[i]; drawPos[i*3+2] = pz[i];
    drawColor[i*4] = cr0[i] + (cr1[i]-cr0[i])*age;
    drawColor[i*4+1] = cg0[i] + (cg1[i]-cg0[i])*age;
    drawColor[i*4+2] = cb0[i] + (cb1[i]-cb0[i])*age;
    drawColor[i*4+3] = alpha;
    drawSize[i] = size0[i] + (size1[i]-size0[i])*age;
  }
}

// ---------- Render ----------
function resize(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.round(innerWidth*dpr);
  canvas.height = Math.round(innerHeight*dpr);
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize', resize);
resize();

let lastT = performance.now();
let fpsAcc=0, fpsN=0, fpsShown=60;

function frame(now){
  const dt = Math.min(0.033, (now-lastT)/1000);
  lastT = now;

  if (cam.autoRotate) cam.yaw += dt*0.18;

  simulate(dt);
  buildDrawBuffers();

  gl.clearColor(0.02,0.02,0.04,1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  const aspect = innerWidth/innerHeight;
  const proj = perspective(Math.PI/4, aspect, 0.1, 100);
  const view = lookAt(camEye(), cam.target, [0,1,0]);
  gl.uniformMatrix4fv(uProjection, false, proj);
  gl.uniformMatrix4fv(uView, false, view);

  if (additiveBlend) gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  else gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  gl.bindBuffer(gl.ARRAY_BUFFER, bufPos);
  gl.bufferData(gl.ARRAY_BUFFER, drawPos.subarray(0, activeCount*3), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aPosition);
  gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, bufColor);
  gl.bufferData(gl.ARRAY_BUFFER, drawColor.subarray(0, activeCount*4), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aColor);
  gl.vertexAttribPointer(aColor, 4, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, bufSize);
  gl.bufferData(gl.ARRAY_BUFFER, drawSize.subarray(0, activeCount), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aSize);
  gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);

  gl.drawArrays(gl.POINTS, 0, activeCount);

  fpsAcc += dt; fpsN++;
  if (fpsAcc >= 0.5){ fpsShown = Math.round(fpsN/fpsAcc); fpsAcc=0; fpsN=0; }
  document.getElementById('stats').textContent = `${activeCount} particles · ${fpsShown} fps`;

  requestAnimationFrame(frame);
}

// ---------- Pointer / camera controls ----------
const pointers = new Map();
let pinchStart = null;
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (pointers.size === 2){
    const pts = [...pointers.values()];
    pinchStart = { dist: Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y), camDist: cam.dist };
  }
});
canvas.addEventListener('pointermove', e=>{
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (pointers.size === 1){
    cam.yaw -= dx*0.006;
    cam.pitch += dy*0.006;
    cam.autoRotate = false;
    updateRotateBtn();
  } else if (pointers.size === 2 && pinchStart){
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    const scale = pinchStart.dist / Math.max(1,d);
    cam.dist = Math.min(30, Math.max(2.5, pinchStart.camDist * scale));
  }
});
function endPointer(e){
  pointers.delete(e.pointerId);
  if (pointers.size < 2) pinchStart = null;
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  cam.dist = Math.min(30, Math.max(2.5, cam.dist + e.deltaY*0.01));
}, {passive:false});

function updateRotateBtn(){
  document.getElementById('btnRotate').classList.toggle('on', cam.autoRotate);
}
document.getElementById('btnRotate').addEventListener('click', ()=>{
  cam.autoRotate = !cam.autoRotate;
  updateRotateBtn();
});
document.getElementById('btnReset').addEventListener('click', ()=>{
  const cfg = PRESETS[activePresetName];
  if (cfg && cfg.cam){ cam.yaw=cfg.cam.yaw; cam.pitch=cfg.cam.pitch; cam.dist=cfg.cam.dist; }
  else { cam.yaw=0.7; cam.pitch=0.45; cam.dist=9; }
});
document.getElementById('btnPanel').addEventListener('click', ()=>{
  document.getElementById('panel').classList.toggle('hidden');
});

document.addEventListener('keydown', e=>{
  if (e.code === 'Space'){ e.preventDefault(); cam.autoRotate = !cam.autoRotate; updateRotateBtn(); }
  if (e.key === 'r' || e.key === 'R'){ document.getElementById('btnReset').click(); }
});

// ---------- UI: preset bar ----------
function renderPresetBar(){
  const bar = document.getElementById('presetbar');
  bar.innerHTML = '';
  const icons = {Fire:'🔥', Snow:'❄️', Fireworks:'🎆', Galaxy:'🌌', Smoke:'💨'};
  for (const name of Object.keys(PRESETS)){
    const b = document.createElement('button');
    b.textContent = `${icons[name]} ${name}`;
    if (name === activePresetName) b.classList.add('active');
    b.addEventListener('click', ()=> loadPreset(name));
    bar.appendChild(b);
  }
}

// ---------- UI: force editor ----------
function slider(labelText, value, min, max, step, onInput){
  const row = document.createElement('div'); row.className='row';
  const label = document.createElement('label'); label.textContent = labelText;
  const input = document.createElement('input'); input.type='range';
  input.min=min; input.max=max; input.step=step; input.value=value;
  const val = document.createElement('span'); val.className='val'; val.textContent = (+value).toFixed(2);
  input.addEventListener('input', ()=>{ val.textContent = (+input.value).toFixed(2); onInput(+input.value); });
  row.appendChild(label); row.appendChild(input); row.appendChild(val);
  return row;
}
function toggleRow(labelText, checked, onChange){
  const row = document.createElement('div'); row.className='chk';
  const input = document.createElement('input'); input.type='checkbox'; input.checked=checked;
  const id = 'chk_'+Math.random().toString(36).slice(2);
  input.id = id;
  const label = document.createElement('label'); label.htmlFor=id; label.textContent = labelText;
  input.addEventListener('change', ()=> onChange(input.checked));
  row.appendChild(input); row.appendChild(label);
  return row;
}
function renderForceEditor(){
  const el = document.getElementById('forceEditor');
  el.innerHTML = '';
  el.appendChild(toggleRow('Gravity', forces.gravity.on, v=>forces.gravity.on=v));
  el.appendChild(slider('strength', forces.gravity.strength, -3, 3, 0.1, v=>forces.gravity.strength=v));
  el.appendChild(toggleRow('Wind', forces.wind.on, v=>forces.wind.on=v));
  el.appendChild(slider('X', forces.wind.x, -3, 3, 0.1, v=>forces.wind.x=v));
  el.appendChild(slider('Z', forces.wind.z, -3, 3, 0.1, v=>forces.wind.z=v));
  el.appendChild(toggleRow('Vortex', forces.vortex.on, v=>forces.vortex.on=v));
  el.appendChild(slider('strength', forces.vortex.strength, 0, 5, 0.1, v=>forces.vortex.strength=v));
  el.appendChild(slider('X pos', forces.vortex.x, -4, 4, 0.1, v=>forces.vortex.x=v));
  el.appendChild(slider('Z pos', forces.vortex.z, -4, 4, 0.1, v=>forces.vortex.z=v));
  el.appendChild(toggleRow('Turbulence', forces.turbulence.on, v=>forces.turbulence.on=v));
  el.appendChild(slider('strength', forces.turbulence.strength, 0, 3, 0.05, v=>forces.turbulence.strength=v));
  el.appendChild(slider('scale', forces.turbulence.scale, 0.1, 2, 0.05, v=>forces.turbulence.scale=v));
}

// ---------- UI: emitter chips + editor ----------
function renderEmChips(){
  document.getElementById('emCount').textContent = emitters.length;
  const el = document.getElementById('emChips');
  el.innerHTML = '';
  emitters.forEach((em, idx)=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (em === selectedEm ? ' sel' : '');
    const dot = document.createElement('span'); dot.className='cdot'; dot.style.background = em.color0;
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(em.shape + ' ' + (idx+1)));
    chip.addEventListener('click', ()=>{ selectedEm = em; renderEmChips(); renderEmEditor(); });
    el.appendChild(chip);
  });
}
function renderEmEditor(){
  const el = document.getElementById('emEditor');
  el.innerHTML = '';
  const em = selectedEm;
  if (!em){ el.textContent = 'No emitter selected.'; el.style.color='var(--muted)'; return; }
  el.style.color='';
  const shapeRow = document.createElement('div'); shapeRow.className='row';
  const shapeLabel = document.createElement('label'); shapeLabel.textContent='Shape';
  const sel = document.createElement('select');
  ['point','cone','ring','box','burst'].forEach(s=>{
    const o = document.createElement('option'); o.value=s; o.textContent=s;
    if (s===em.shape) o.selected=true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', ()=>{ em.shape = sel.value; renderEmChips(); });
  shapeRow.appendChild(shapeLabel); shapeRow.appendChild(sel);
  el.appendChild(shapeRow);

  const colorRow = document.createElement('div'); colorRow.className='row';
  const cl = document.createElement('label'); cl.textContent='Colors';
  const c0 = document.createElement('input'); c0.type='color'; c0.value=em.color0;
  c0.addEventListener('input', ()=>{ em.color0=c0.value; renderEmChips(); });
  const c1 = document.createElement('input'); c1.type='color'; c1.value=em.color1;
  c1.addEventListener('input', ()=>{ em.color1=c1.value; });
  colorRow.appendChild(cl); colorRow.appendChild(c0); colorRow.appendChild(c1);
  el.appendChild(colorRow);

  el.appendChild(slider('X', em.x, -4, 4, 0.1, v=>em.x=v));
  el.appendChild(slider('Y', em.y, 0, 6, 0.1, v=>em.y=v));
  el.appendChild(slider('Z', em.z, -4, 4, 0.1, v=>em.z=v));
  el.appendChild(slider('Radius', em.radius, 0.2, 5, 0.1, v=>em.radius=v));
  if (em.shape === 'burst'){
    el.appendChild(slider('Interval', em.interval, 0.3, 4, 0.1, v=>em.interval=v));
    el.appendChild(slider('Count', em.burstCount, 20, 400, 10, v=>em.burstCount=v));
  } else {
    el.appendChild(slider('Rate', em.rate, 1, 300, 1, v=>em.rate=v));
  }
  el.appendChild(slider('Life', em.life, 0.3, 8, 0.1, v=>em.life=v));
  el.appendChild(slider('Speed', em.speed, 0.1, 6, 0.1, v=>em.speed=v));
  el.appendChild(slider('Spread°', em.spread, 0, 90, 1, v=>em.spread=v));
  el.appendChild(slider('Size start', em.size0, 1, 50, 1, v=>em.size0=v));
  el.appendChild(slider('Size end', em.size1, 0, 50, 1, v=>em.size1=v));
}

document.getElementById('btnAddEm').addEventListener('click', ()=>{
  if (emitters.length >= 6){ toast('Max 6 emitters'); return; }
  const em = newEmitter({ x: rand(-1.5,1.5), y: rand(0.5,2.5), z: rand(-1.5,1.5) });
  emitters.push(em); selectedEm = em;
  renderEmChips(); renderEmEditor();
});
document.getElementById('btnDelEm').addEventListener('click', ()=>{
  if (!selectedEm) return;
  emitters = emitters.filter(e => e !== selectedEm);
  selectedEm = emitters[0] || null;
  renderEmChips(); renderEmEditor();
});
document.getElementById('chkAdditive').addEventListener('change', e=>{ additiveBlend = e.target.checked; });

// ---------- Toast ----------
let toastTimer = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove('show'), 1800);
}

// ---------- Custom presets (localStorage) ----------
const LS_CUSTOM = 'particleforge_v1_customPresets';
const LS_LAST = 'particleforge_v1_lastConfig';
function currentConfig(){
  return {
    blend: additiveBlend,
    cam: { yaw: cam.yaw, pitch: cam.pitch, dist: cam.dist },
    forces: JSON.parse(JSON.stringify(forces)),
    emitters: emitters.map(e => ({
      shape:e.shape, x:e.x, y:e.y, z:e.z, radius:e.radius, rate:e.rate, life:e.life, speed:e.speed,
      spread:e.spread, size0:e.size0, size1:e.size1, color0:e.color0, color1:e.color1,
      interval:e.interval, burstCount:e.burstCount
    }))
  };
}
function loadCustomPresets(){
  try { return JSON.parse(localStorage.getItem(LS_CUSTOM) || '{}'); } catch(e){ return {}; }
}
function saveLastConfig(){
  try { localStorage.setItem(LS_LAST, JSON.stringify({name:activePresetName, cfg:currentConfig()})); } catch(e){}
}
function renderCustomList(){
  const el = document.getElementById('customList');
  el.innerHTML = '';
  const store = loadCustomPresets();
  Object.keys(store).forEach(name=>{
    const row = document.createElement('div'); row.className='cprow';
    const load = document.createElement('button'); load.className='mini load'; load.textContent = '★ ' + name;
    load.addEventListener('click', ()=>{ activePresetName = null; applyConfig(store[name]); renderPresetBar(); saveLastConfig(); });
    const del = document.createElement('button'); del.className='mini del'; del.textContent = '×';
    del.addEventListener('click', ()=>{ const s = loadCustomPresets(); delete s[name]; localStorage.setItem(LS_CUSTOM, JSON.stringify(s)); renderCustomList(); });
    row.appendChild(load); row.appendChild(del);
    el.appendChild(row);
  });
}
document.getElementById('btnSavePreset').addEventListener('click', ()=>{
  const name = prompt('Name this preset:');
  if (!name) return;
  const store = loadCustomPresets();
  store[name] = currentConfig();
  localStorage.setItem(LS_CUSTOM, JSON.stringify(store));
  renderCustomList();
  toast('Saved "' + name + '"');
});
document.getElementById('btnExportJson').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(currentConfig(), null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'particle-forge-preset.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
});
document.getElementById('btnImportJson').addEventListener('click', ()=> document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try {
      const cfg = JSON.parse(reader.result);
      activePresetName = null;
      applyConfig(cfg);
      renderPresetBar();
      toast('Preset imported');
    } catch(err){ toast('Invalid preset file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ---------- Export: snapshot + recording ----------
document.getElementById('btnSnap').addEventListener('click', ()=>{
  canvas.toBlob(blob=>{
    if (!blob) { toast('Snapshot failed'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'particle-forge.png';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    toast('Snapshot saved');
  }, 'image/png');
});

let mediaRecorder = null, recordedChunks = [], isRecording = false;
const recBtn = document.getElementById('btnRec');
const canRecord = !!(window.MediaRecorder && canvas.captureStream);
if (!canRecord){ recBtn.disabled = true; recBtn.title = 'Recording not supported on this browser'; }
recBtn.addEventListener('click', ()=>{
  if (!canRecord) return;
  if (!isRecording){
    const stream = canvas.captureStream(30);
    const candidates = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    const mime = candidates.find(m => window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m)) || '';
    recordedChunks = [];
    mediaRecorder = mime ? new MediaRecorder(stream, {mimeType:mime}) : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e=>{ if (e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      const blob = new Blob(recordedChunks, {type: mime || 'video/webm'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'particle-forge.webm';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 4000);
      toast('Recording saved');
    };
    mediaRecorder.start();
    isRecording = true;
    recBtn.textContent = '⏹ Stop Recording';
    recBtn.classList.add('recording');
  } else {
    mediaRecorder.stop();
    isRecording = false;
    recBtn.textContent = '⏺ Record WebM';
    recBtn.classList.remove('recording');
  }
});

// ---------- Boot ----------
renderPresetBar();
renderCustomList();
let restored = false;
try {
  const last = JSON.parse(localStorage.getItem(LS_LAST) || 'null');
  if (last && last.cfg && last.cfg.emitters && last.cfg.emitters.length){
    activePresetName = last.name || null;
    applyConfig(last.cfg);
    renderPresetBar();
    restored = true;
  }
} catch(e){}
if (!restored) loadPreset('Fire');
updateRotateBtn();
window.addEventListener('beforeunload', saveLastConfig);
setInterval(saveLastConfig, 8000);

requestAnimationFrame(frame);
})();
</script>
