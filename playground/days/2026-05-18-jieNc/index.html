<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PolyWave — Polyphonic Synthesizer</title>
<style>
:root {
  --bg: #07071a;
  --panel: #10102a;
  --border: #252545;
  --purple: #7c3aed;
  --cyan: #06b6d4;
  --pink: #f472b6;
  --amber: #fbbf24;
  --text: #e2e8f0;
  --muted: #6b7280;
  --wk: #e8e0f8;
  --bk: #1a0a30;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'SF Mono','Fira Code',ui-monospace,monospace;
  font-size:11px;
  display:flex;
  flex-direction:column;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
}
/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-bottom:1px solid var(--border);
  background:var(--panel);flex-shrink:0;
}
header h1{
  font-size:15px;font-weight:800;letter-spacing:.12em;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hdr-right{display:flex;gap:8px;align-items:center}
#ctxHint{color:var(--muted);font-size:9px}
.recdot{width:7px;height:7px;border-radius:50%;background:#333;transition:background .3s}
.recdot.on{background:#ef4444;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Layout */
.main{
  display:grid;
  grid-template-columns:250px 1fr;
  flex:1;
  overflow:hidden;
}
@media(max-width:700px){
  .main{grid-template-columns:1fr;overflow-y:auto}
  .right{max-height:none}
}

/* Left controls */
.left{
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:10px;
  display:flex;flex-direction:column;gap:10px;
}
.pnl{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:7px;
  padding:9px;
}
.ptitle{
  font-size:9px;font-weight:700;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;margin-bottom:7px;
}

/* Wave buttons */
.wbtns{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:7px}
.wbtn{
  background:var(--border);border:1px solid transparent;
  border-radius:4px;padding:5px 2px;cursor:pointer;
  text-align:center;font-size:9px;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:all .12s;font-family:inherit;
}
.wbtn svg{width:22px;height:12px}
.wbtn.on{background:rgba(124,58,237,.3);border-color:var(--purple);color:var(--cyan)}
.wbtn:hover:not(.on){background:#1c1c38}

/* Sliders */
.srow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.slbl{width:24px;color:var(--muted);font-size:9px;flex-shrink:0}
.srow input[type=range]{
  flex:1;appearance:none;-webkit-appearance:none;
  height:3px;border-radius:2px;background:var(--border);
  outline:none;cursor:pointer;
}
.srow input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--purple);cursor:pointer;
}
.srow input[type=range]::-moz-range-thumb{
  width:11px;height:11px;border-radius:50%;
  background:var(--purple);cursor:pointer;border:none;
}
.sval{width:34px;text-align:right;color:var(--cyan);font-size:9px}

/* Presets */
.pbtns{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.pbtn{
  background:var(--border);border:1px solid transparent;
  border-radius:4px;padding:5px 2px;cursor:pointer;
  font-size:9px;color:var(--text);text-align:center;
  transition:all .12s;font-family:inherit;
}
.pbtn:hover{border-color:var(--purple);color:var(--cyan)}
.pbtn.on{background:rgba(124,58,237,.3);border-color:var(--purple);color:var(--cyan)}

/* Buttons */
.btn{
  background:var(--border);border:1px solid var(--border);
  border-radius:4px;padding:5px 10px;cursor:pointer;
  font-size:10px;color:var(--text);
  transition:all .12s;font-family:inherit;white-space:nowrap;
}
.btn:hover{border-color:var(--purple);color:var(--cyan)}
.btn.pri{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.pri:hover{background:#6d28d9}
.btn.red{border-color:#ef4444;color:#ef4444}
.btn.red.on{background:#ef4444;color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.brow{display:flex;gap:5px;flex-wrap:wrap}

/* Right: keyboard + seq */
.right{
  display:flex;flex-direction:column;overflow:hidden;
}

/* Keyboard */
.kbwrap{
  flex-shrink:0;padding:10px 12px 8px;
  background:#04040f;border-bottom:1px solid var(--border);
}
.kbtip{font-size:9px;color:var(--muted);margin-bottom:6px}
.kb{position:relative;height:90px;display:flex;border-radius:4px;overflow:hidden}
.wkey{
  flex:1;background:var(--wk);border:1px solid #a080c0;
  border-top:none;border-radius:0 0 4px 4px;
  cursor:pointer;display:flex;align-items:flex-end;
  justify-content:center;padding-bottom:4px;
  transition:background .05s;
}
.wkey.on{background:#a855f7}
.wkey:hover:not(.on){background:#d8c0f8}
.wkey span{font-size:7px;color:#7050a0;pointer-events:none}
.wkey.on span{color:#fff}
.bkey{
  position:absolute;background:var(--bk);
  border-radius:0 0 3px 3px;
  cursor:pointer;z-index:2;height:56px;
  transition:background .05s;
}
.bkey.on{background:var(--purple)}
.bkey:hover:not(.on){background:#2d1060}

/* Sequencer */
.seqwrap{flex:1;overflow-y:auto;padding:10px 12px}
.seqhdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.sgrid{display:grid;grid-template-rows:repeat(8,1fr);gap:3px}
.srow2{display:grid;grid-template-columns:26px repeat(16,1fr);gap:2px;align-items:center}
.snlbl{font-size:8px;color:var(--muted);text-align:right;padding-right:3px}
.scell{
  height:22px;background:var(--border);border-radius:3px;
  cursor:pointer;border:1px solid transparent;
  transition:all .08s;
}
.scell:hover{border-color:var(--purple)}
.scell.on{background:var(--purple)}
.scell.cur{outline:2px solid var(--cyan);outline-offset:-1px}
#bpmVal{color:var(--cyan)}
</style>
</head>
<body>

<header>
  <h1>POLYWAVE</h1>
  <div class="hdr-right">
    <span id="ctxHint">▸ Click anywhere to start audio</span>
    <div class="recdot" id="recdot"></div>
  </div>
</header>

<div class="main">

  <!-- ── Left Controls ──────────────────────────────────── -->
  <div class="left">

    <div class="pnl">
      <div class="ptitle">Oscillator</div>
      <div class="wbtns" id="wbtns">
        <button class="wbtn on" data-w="sine">
          <svg viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 6 Q6 0 11 6 Q16 12 21 6"/>
          </svg>Sine
        </button>
        <button class="wbtn" data-w="sawtooth">
          <svg viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="1,11 11,1 11,11 21,1"/>
          </svg>Saw
        </button>
        <button class="wbtn" data-w="square">
          <svg viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="1,11 1,1 11,1 11,11 21,11 21,1"/>
          </svg>Sqr
        </button>
        <button class="wbtn" data-w="triangle">
          <svg viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="1,11 6,1 16,11 21,1"/>
          </svg>Tri
        </button>
      </div>
      <div class="srow">
        <span class="slbl">Det</span>
        <input type="range" id="detune" min="0" max="50" value="6" step="1">
        <span class="sval" id="detuneV">6</span>
      </div>
    </div>

    <div class="pnl">
      <div class="ptitle">Envelope</div>
      <div class="srow"><span class="slbl">A</span><input type="range" id="attack"  min="0.001" max="2"   value="0.01"  step="0.001"><span class="sval" id="attackV">0.01</span></div>
      <div class="srow"><span class="slbl">D</span><input type="range" id="decay"   min="0.001" max="2"   value="0.1"   step="0.001"><span class="sval" id="decayV">0.10</span></div>
      <div class="srow"><span class="slbl">S</span><input type="range" id="sustain" min="0"     max="1"   value="0.7"   step="0.01"> <span class="sval" id="sustainV">0.70</span></div>
      <div class="srow"><span class="slbl">R</span><input type="range" id="release" min="0.01"  max="4"   value="0.3"   step="0.01"> <span class="sval" id="releaseV">0.30</span></div>
    </div>

    <div class="pnl">
      <div class="ptitle">Effects</div>
      <div class="srow"><span class="slbl">Flt</span><input type="range" id="filtF" min="80"  max="20000" value="8000"  step="50"> <span class="sval" id="filtFV">8.0k</span></div>
      <div class="srow"><span class="slbl">Res</span><input type="range" id="filtQ" min="0.1" max="20"    value="1"     step="0.1"><span class="sval" id="filtQV">1.0</span></div>
      <div class="srow"><span class="slbl">Rvb</span><input type="range" id="rvb"   min="0"   max="1"     value="0.2"   step="0.01"><span class="sval" id="rvbV">0.20</span></div>
      <div class="srow"><span class="slbl">Dly</span><input type="range" id="dlyT"  min="0"   max="0.8"   value="0.12"  step="0.01"><span class="sval" id="dlyTV">0.12</span></div>
      <div class="srow"><span class="slbl">Fb</span> <input type="range" id="dlyF"  min="0"   max="0.85"  value="0.3"   step="0.01"><span class="sval" id="dlyFV">0.30</span></div>
      <div class="srow"><span class="slbl">Vol</span><input type="range" id="vol"   min="0"   max="1"     value="0.7"   step="0.01"><span class="sval" id="volV">0.70</span></div>
    </div>

    <div class="pnl">
      <div class="ptitle">Presets</div>
      <div class="pbtns">
        <button class="pbtn" data-p="lead">Lead</button>
        <button class="pbtn" data-p="pad">Pad</button>
        <button class="pbtn" data-p="bass">Bass</button>
        <button class="pbtn" data-p="pluck">Pluck</button>
        <button class="pbtn" data-p="keys">Keys</button>
      </div>
    </div>

    <div class="pnl">
      <div class="ptitle">Recording</div>
      <div class="brow">
        <button class="btn red" id="recBtn">⏺ Record</button>
        <button class="btn" id="dlBtn" disabled>⬇ WAV</button>
      </div>
      <div style="color:var(--muted);font-size:9px;margin-top:5px" id="recInfo">Ready — play something then hit Record</div>
    </div>

  </div>

  <!-- ── Right: Keyboard + Sequencer ───────────────────── -->
  <div class="right">

    <div class="kbwrap">
      <div class="kbtip">Click / touch keys · QWERTY: A–J = C3–B3 · Z–M = C4–B4 · W E T Y U = sharps</div>
      <div class="kb" id="kb"></div>
    </div>

    <div class="seqwrap">
      <div class="seqhdr">
        <button class="btn pri" id="playBtn">▶ Play</button>
        <button class="btn" id="stopBtn">■ Stop</button>
        <button class="btn" id="clrBtn">✕ Clear</button>
        <button class="btn" id="rndBtn">⚄ Random</button>
        <span style="color:var(--muted)">BPM</span>
        <span id="bpmVal">120</span>
        <input type="range" id="bpm" min="60" max="200" value="120" style="width:70px">
      </div>
      <div class="sgrid" id="sgrid"></div>
    </div>

  </div>
</div>

<script>
// ── Constants ───────────────────────────────────────────────────────────────
const NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK = new Set([1,3,6,8,10]);
function mf(m){ return 440*Math.pow(2,(m-69)/12); }

// C3=48 … B4=71 (24 keys, 2 octaves)
const KEYS = [];
for(let o=3;o<=4;o++) for(let i=0;i<12;i++){
  const m=48+(o-3)*12+i;
  KEYS.push({id:NAMES[i]+o, note:NAMES[i], black:BLACK.has(i), midi:m, freq:mf(m), oct:o});
}

// Sequencer notes: E5 D5 C5 A4 G4 E4 D4 C4 (top=high)
const SNOTES=[76,74,72,69,67,64,62,60].map(m=>({midi:m,freq:mf(m),lbl:NAMES[m%12]+(Math.floor(m/12)-1)}));
const STEPS=16, ROWS=8;

const QMAP={a:'C3',w:'C#3',s:'D3',e:'D#3',d:'E3',f:'F3',t:'F#3',g:'G3',y:'G#3',h:'A3',u:'A#3',j:'B3',z:'C4',x:'D4',c:'E4',v:'F4',b:'G4',n:'A4',m:'B4'};

const PRESETS={
  lead: {wave:'sawtooth',det:8, A:.01,D:.1, S:.8,R:.3, fF:4000,fQ:2, rv:.1, dT:.2,dF:.3,vol:.7},
  pad:  {wave:'sine',    det:20,A:.5, D:.5, S:.9,R:1.5,fF:2000,fQ:1, rv:.6, dT:.4,dF:.5,vol:.7},
  bass: {wave:'sawtooth',det:3, A:.005,D:.2,S:.5,R:.1, fF:500, fQ:4, rv:.05,dT:.1,dF:.2,vol:.8},
  pluck:{wave:'triangle',det:5, A:.001,D:.4,S:0, R:.2, fF:6000,fQ:1, rv:.3, dT:.25,dF:.4,vol:.7},
  keys: {wave:'square',  det:2, A:.01,D:.01,S:1, R:.05,fF:8000,fQ:1, rv:.2, dT:.3,dF:.3,vol:.65},
};

// ── State ───────────────────────────────────────────────────────────────────
let ctx=null, masterGain,filter,compressor,convolver,dryGain,rvbGain,dlyNode,dlyFb,finalGain;
let wave='sine';
let active={};
let pattern=Array.from({length:ROWS},()=>new Array(STEPS).fill(false));
let seqStep=-1, seqPlaying=false, seqTimer=null;
let recActive=false, recSamples=[], sproc=null;

// ── Audio init ───────────────────────────────────────────────────────────────
function initAudio(){
  if(ctx) return;
  ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();

  // Reverb IR
  convolver=ctx.createConvolver();
  convolver.buffer=makeIR(ctx,2.5,3);

  filter=ctx.createBiquadFilter();
  filter.type='lowpass';
  filter.frequency.value=8000;
  filter.Q.value=1;

  compressor=ctx.createDynamicsCompressor();
  compressor.threshold.value=-24;compressor.ratio.value=4;

  dryGain=ctx.createGain();dryGain.gain.value=.85;
  rvbGain=ctx.createGain();rvbGain.gain.value=.2;

  dlyNode=ctx.createDelay(1.0);dlyNode.delayTime.value=.12;
  dlyFb=ctx.createGain();dlyFb.gain.value=.3;

  masterGain=ctx.createGain();masterGain.gain.value=.7;
  finalGain=ctx.createGain();finalGain.gain.value=1;

  // Graph: voices→filter→comp→[dry,convolver→rvb]→master→[direct,delay-send]→finalGain→dest
  filter.connect(compressor);
  compressor.connect(dryGain);
  compressor.connect(convolver);
  dryGain.connect(masterGain);
  convolver.connect(rvbGain);
  rvbGain.connect(masterGain);
  // Delay in parallel
  masterGain.connect(finalGain);
  masterGain.connect(dlyNode);
  dlyNode.connect(dlyFb);
  dlyFb.connect(dlyNode);
  dlyNode.connect(finalGain);
  finalGain.connect(ctx.destination);

  document.getElementById('ctxHint').style.opacity='0';
}

function makeIR(ctx,dur,decay){
  const sr=ctx.sampleRate,len=sr*dur,buf=ctx.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}

// ── Note on/off ──────────────────────────────────────────────────────────────
function noteOn(id,freq){
  if(!ctx||(ctx.state==='suspended'&&ctx.resume())||active[id]) return;
  const p=gp(), now=ctx.currentTime;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(1,now+p.A);
  g.gain.linearRampToValueAtTime(p.S,now+p.A+p.D);
  const o1=ctx.createOscillator(), o2=ctx.createOscillator();
  o1.type=o2.type=wave;
  o1.frequency.value=freq; o2.frequency.value=freq;
  o1.detune.value=-p.det; o2.detune.value=+p.det;
  o1.connect(g); o2.connect(g); g.connect(filter);
  o1.start(now); o2.start(now);
  active[id]={o1,o2,g};
}
function noteOff(id){
  if(!ctx||!active[id]) return;
  const {o1,o2,g}=active[id], now=ctx.currentTime, rel=gp().R;
  g.gain.cancelScheduledValues(now);
  g.gain.setValueAtTime(g.gain.value,now);
  g.gain.linearRampToValueAtTime(0,now+rel);
  o1.stop(now+rel+.05); o2.stop(now+rel+.05);
  delete active[id];
}
function gp(){
  return{
    A:+document.getElementById('attack').value,
    D:+document.getElementById('decay').value,
    S:+document.getElementById('sustain').value,
    R:+document.getElementById('release').value,
    det:+document.getElementById('detune').value,
    fF:+document.getElementById('filtF').value,
    fQ:+document.getElementById('filtQ').value,
    rv:+document.getElementById('rvb').value,
    dT:+document.getElementById('dlyT').value,
    dF:+document.getElementById('dlyF').value,
    vol:+document.getElementById('vol').value,
  };
}

// ── Keyboard UI ──────────────────────────────────────────────────────────────
function buildKB(){
  const kb=document.getElementById('kb');
  kb.innerHTML='';
  const whites=KEYS.filter(k=>!k.black);
  const ww=100/whites.length;
  whites.forEach(k=>{
    const el=document.createElement('div');
    el.className='wkey';el.dataset.id=k.id;
    el.innerHTML=`<span>${k.note==='C'?k.id:''}</span>`;
    attachKey(el,k); kb.appendChild(el);
  });
  let wi=0;
  KEYS.forEach(k=>{
    if(!k.black){wi++;return;}
    const el=document.createElement('div');
    el.className='bkey';el.dataset.id=k.id;
    el.style.left=(wi-.32)*ww+'%';
    el.style.width=ww*.6+'%';
    attachKey(el,k); kb.appendChild(el);
  });
}
function attachKey(el,k){
  function on(e){e.preventDefault();initAudio();noteOn(k.id,k.freq);el.classList.add('on');}
  function off(e){e.preventDefault();noteOff(k.id);el.classList.remove('on');}
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
}

// ── Sequencer ────────────────────────────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('sgrid');g.innerHTML='';
  SNOTES.forEach((note,row)=>{
    const r=document.createElement('div');r.className='srow2';
    const lbl=document.createElement('div');lbl.className='snlbl';lbl.textContent=note.lbl;
    r.appendChild(lbl);
    for(let col=0;col<STEPS;col++){
      const c=document.createElement('div');c.className='scell';
      c.dataset.r=row;c.dataset.c=col;
      if(pattern[row][col]) c.classList.add('on');
      c.addEventListener('click',()=>{pattern[row][col]=!pattern[row][col];c.classList.toggle('on');save();});
      r.appendChild(c);
    }
    g.appendChild(r);
  });
}
function seqPlay(){
  if(!ctx) initAudio();
  if(ctx.state==='suspended') ctx.resume();
  seqPlaying=true;seqStep=-1;
  const bpm=+document.getElementById('bpm').value;
  seqTimer=setInterval(tick,60000/bpm/4);
  document.getElementById('playBtn').textContent='▶ Playing';
}
function seqStop(){
  seqPlaying=false;clearInterval(seqTimer);seqTimer=null;seqStep=-1;
  document.getElementById('playBtn').textContent='▶ Play';
  document.querySelectorAll('.scell.cur').forEach(c=>c.classList.remove('cur'));
}
function tick(){
  seqStep=(seqStep+1)%STEPS;
  document.querySelectorAll('.scell.cur').forEach(c=>c.classList.remove('cur'));
  const bpm=+document.getElementById('bpm').value;
  const noteDur=Math.min(220,60000/bpm/4*.75);
  for(let row=0;row<ROWS;row++){
    const c=document.querySelector(`.scell[data-r="${row}"][data-c="${seqStep}"]`);
    if(c) c.classList.add('cur');
    if(pattern[row][seqStep]){
      const id='seq'+row;
      noteOff(id);
      noteOn(id,SNOTES[row].freq);
      setTimeout(()=>noteOff(id),noteDur);
    }
  }
}

// ── Apply effects ────────────────────────────────────────────────────────────
function applyFX(){
  if(!ctx) return;
  const p=gp();
  filter.frequency.value=p.fF;
  filter.Q.value=p.fQ;
  rvbGain.gain.value=p.rv;
  dryGain.gain.value=1-p.rv*.5;
  dlyNode.delayTime.value=p.dT;
  dlyFb.gain.value=p.dF;
  masterGain.gain.value=p.vol;
}

// ── Recording (ScriptProcessorNode → WAV) ────────────────────────────────────
function toggleRec(){
  initAudio();
  if(!recActive){
    if(ctx.state==='suspended') ctx.resume();
    recSamples=[];
    sproc=ctx.createScriptProcessor(4096,1,1);
    finalGain.connect(sproc);
    sproc.onaudioprocess=e=>{
      if(!recActive) return;
      const buf=e.inputBuffer.getChannelData(0);
      for(let i=0;i<buf.length;i++) recSamples.push(buf[i]);
    };
    recActive=true;
    document.getElementById('recBtn').classList.add('on');
    document.getElementById('recBtn').textContent='⏹ Stop';
    document.getElementById('recdot').classList.add('on');
    document.getElementById('recInfo').textContent='Recording…';
    document.getElementById('dlBtn').disabled=true;
  } else {
    recActive=false;
    sproc.disconnect();
    finalGain.disconnect(sproc);
    sproc=null;
    document.getElementById('recBtn').classList.remove('on');
    document.getElementById('recBtn').textContent='⏺ Record';
    document.getElementById('recdot').classList.remove('on');
    const secs=(recSamples.length/ctx.sampleRate).toFixed(1);
    document.getElementById('recInfo').textContent=`Captured ${secs}s — click ⬇ WAV to download`;
    document.getElementById('dlBtn').disabled=false;
  }
}
function downloadWAV(){
  if(!recSamples.length) return;
  const sr=ctx.sampleRate;
  const s=new Float32Array(recSamples);
  const buf=encodeWAV(s,sr);
  const blob=new Blob([buf],{type:'audio/wav'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='polywave-'+Date.now()+'.wav';
  a.click();
}
function encodeWAV(s,sr){
  const n=s.length, ab=new ArrayBuffer(44+n*2), v=new DataView(ab);
  const ws=(o,t)=>{for(let i=0;i<t.length;i++)v.setUint8(o+i,t.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+n*2,true);ws(8,'WAVE');
  ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,n*2,true);
  for(let i=0;i<n;i++){const x=Math.max(-1,Math.min(1,s[i]));v.setInt16(44+i*2,x<0?x*32768:x*32767,true);}
  return ab;
}

// ── Controls wiring ──────────────────────────────────────────────────────────
const SLIDERCFG=[
  ['detune','detuneV',v=>Math.round(v)],
  ['attack','attackV',v=>(+v).toFixed(3)],
  ['decay','decayV',  v=>(+v).toFixed(3)],
  ['sustain','sustainV',v=>(+v).toFixed(2)],
  ['release','releaseV',v=>(+v).toFixed(2)],
  ['filtF','filtFV',  v=>v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)],
  ['filtQ','filtQV',  v=>(+v).toFixed(1)],
  ['rvb','rvbV',      v=>(+v).toFixed(2)],
  ['dlyT','dlyTV',    v=>(+v).toFixed(2)],
  ['dlyF','dlyFV',    v=>(+v).toFixed(2)],
  ['vol','volV',      v=>(+v).toFixed(2)],
];

function wireUI(){
  // Wave buttons
  document.getElementById('wbtns').addEventListener('click',e=>{
    const btn=e.target.closest('.wbtn');if(!btn) return;
    wave=btn.dataset.w;
    document.querySelectorAll('.wbtn').forEach(b=>b.classList.toggle('on',b===btn));
    save();
  });

  // Sliders
  SLIDERCFG.forEach(([id,vid,fmt])=>{
    const sl=document.getElementById(id),vl=document.getElementById(vid);
    sl.addEventListener('input',()=>{vl.textContent=fmt(sl.value);applyFX();save();});
  });

  // BPM
  document.getElementById('bpm').addEventListener('input',e=>{
    document.getElementById('bpmVal').textContent=e.target.value;
    if(seqPlaying){seqStop();seqPlay();}save();
  });

  // Sequencer
  document.getElementById('playBtn').addEventListener('click',()=>{if(!seqPlaying) seqPlay();});
  document.getElementById('stopBtn').addEventListener('click',seqStop);
  document.getElementById('clrBtn').addEventListener('click',()=>{
    pattern=Array.from({length:ROWS},()=>new Array(STEPS).fill(false));
    buildGrid();save();
  });
  document.getElementById('rndBtn').addEventListener('click',()=>{
    pattern=Array.from({length:ROWS},()=>Array.from({length:STEPS},()=>Math.random()<.18));
    buildGrid();save();
  });

  // Presets
  document.querySelectorAll('.pbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const p=PRESETS[btn.dataset.p];if(!p) return;
      wave=p.wave;
      document.querySelectorAll('.wbtn').forEach(b=>b.classList.toggle('on',b.dataset.w===p.wave));
      const sets={detune:p.det,attack:p.A,decay:p.D,sustain:p.S,release:p.R,filtF:p.fF,filtQ:p.fQ,rvb:p.rv,dlyT:p.dT,dlyF:p.dF,vol:p.vol};
      for(const [k,v] of Object.entries(sets)) document.getElementById(k).value=v;
      SLIDERCFG.forEach(([id,vid,fmt])=>{document.getElementById(vid).textContent=fmt(document.getElementById(id).value);});
      applyFX();
      document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('on',b===btn));
      save();
    });
  });

  // Record
  document.getElementById('recBtn').addEventListener('click',toggleRec);
  document.getElementById('dlBtn').addEventListener('click',downloadWAV);

  // QWERTY
  const held=new Set();
  document.addEventListener('keydown',e=>{
    if(e.repeat||['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    const nn=QMAP[e.key.toLowerCase()];
    if(!nn||held.has(e.key)) return;
    held.add(e.key);initAudio();
    const k=KEYS.find(k=>k.id===nn);
    if(k){noteOn(nn,k.freq);document.querySelector(`[data-id="${nn}"]`)?.classList.add('on');}
  });
  document.addEventListener('keyup',e=>{
    held.delete(e.key);
    const nn=QMAP[e.key.toLowerCase()];if(!nn) return;
    noteOff(nn);document.querySelector(`[data-id="${nn}"]`)?.classList.remove('on');
  });

  // Init audio on first interaction
  document.body.addEventListener('mousedown',initAudio,{once:true});
  document.body.addEventListener('touchstart',initAudio,{once:true,passive:true});
}

// ── LocalStorage ─────────────────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('polywave_v1',JSON.stringify({
      wave,pattern,
      sliders:Object.fromEntries(SLIDERCFG.map(([id])=>[id,document.getElementById(id).value])),
      bpm:document.getElementById('bpm').value
    }));
  }catch(e){}
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem('polywave_v1')||'null');if(!s) return;
    if(s.wave){wave=s.wave;document.querySelectorAll('.wbtn').forEach(b=>b.classList.toggle('on',b.dataset.w===s.wave));}
    if(s.sliders){for(const[k,v] of Object.entries(s.sliders)){const el=document.getElementById(k);if(el) el.value=v;}}
    if(s.bpm){document.getElementById('bpm').value=s.bpm;document.getElementById('bpmVal').textContent=s.bpm;}
    if(s.pattern) pattern=s.pattern;
    SLIDERCFG.forEach(([id,vid,fmt])=>{const el=document.getElementById(id),vl=document.getElementById(vid);if(el&&vl) vl.textContent=fmt(el.value);});
  }catch(e){}
}

// ── Boot ─────────────────────────────────────────────────────────────────────
buildKB();
load();
buildGrid();
wireUI();
</script>
