<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Flow Field Painter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a10;font-family:system-ui,-apple-system,sans-serif}
#c{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}

#panel{
  position:fixed;right:12px;top:12px;
  width:214px;
  background:rgba(6,6,16,0.88);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:14px;
  padding:12px;
  color:#c0c0e0;
  font-size:12px;
  z-index:100;
  user-select:none;
  max-height:calc(100vh - 24px);
  overflow-y:auto;
  scrollbar-width:none;
  transition:opacity .3s;
}
#panel::-webkit-scrollbar{display:none}
#panel.collapsed #panel-body{display:none}

.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px}
.ph h2{font-size:13px;font-weight:700;color:#e0e0ff;letter-spacing:.3px;flex:1}
.ph-btns{display:flex;gap:4px}
.icon-btn{background:none;border:none;color:#666;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px;transition:color .15s}
.icon-btn:hover{color:#ccc}

.sec{margin-bottom:10px}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#5050a0;margin-bottom:5px;font-weight:700}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.chip{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:7px;
  color:#9090c0;
  font-size:10.5px;
  padding:5px 6px;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
}
.chip:hover{background:rgba(255,255,255,0.09);color:#dde}
.chip.on{background:rgba(100,70,230,0.22);border-color:rgba(100,70,230,0.45);color:#b8a0ff}

.pal-row{display:flex;gap:5px;flex-wrap:wrap}
.swatch{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;
  transition:transform .15s,border-color .15s;
}
.swatch:hover{transform:scale(1.2)}
.swatch.on{border-color:#fff;transform:scale(1.15)}

.row4{display:flex;gap:3px}
.btn{
  flex:1;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:7px;
  color:#b0b0d0;
  font-size:10px;
  padding:5px 3px;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
  white-space:nowrap;
}
.btn:hover{background:rgba(255,255,255,0.13);color:#fff}
.btn.on{background:rgba(50,120,255,0.2);border-color:rgba(50,120,255,0.4);color:#80aaff}
.btn.del{color:#ff9090}
.btn.del:hover{background:rgba(255,60,60,0.18);border-color:rgba(255,60,60,0.35);color:#ffbbbb}
.btn.ok{background:rgba(40,200,100,0.2);border-color:rgba(40,200,100,0.4);color:#80ffb0}

.sl-row{margin-bottom:7px}
.sl-row label{display:flex;justify-content:space-between;margin-bottom:3px;color:#7878b0;font-size:11px}
.sl-row label em{font-style:normal;color:#d0d0f0;font-weight:600}
input[type=range]{
  width:100%;-webkit-appearance:none;height:3px;
  background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:#7050e8;box-shadow:0 0 5px rgba(112,80,232,.6);cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:13px;height:13px;border-radius:50%;background:#7050e8;border:none;
  box-shadow:0 0 5px rgba(112,80,232,.6);
}

#fps{position:fixed;left:10px;bottom:10px;font:10px/1 monospace;color:rgba(255,255,255,.2);z-index:100;pointer-events:none}
#hint{position:fixed;left:10px;top:10px;font:10px/1.6 system-ui;color:rgba(255,255,255,.18);z-index:100;pointer-events:none}
#toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  background:rgba(40,200,100,0.9);color:#fff;font-size:12px;font-weight:600;
  padding:8px 18px;border-radius:99px;z-index:200;opacity:0;
  transition:opacity .3s;pointer-events:none;
}
#toast.show{opacity:1}

@media(max-width:580px){
  #panel{width:100%;right:0;top:auto;bottom:0;border-radius:14px 14px 0 0;max-height:52vh}
  #hint{display:none}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Space: clear · S: PNG · F: field · R: seed · 1–5: algo</div>
<div id="fps">60 fps</div>
<div id="toast">Copied!</div>

<div id="panel">
  <div class="ph">
    <h2>⊹ Flow Field Painter</h2>
    <div class="ph-btns">
      <button class="icon-btn" id="btn-collapse" title="Collapse">−</button>
    </div>
  </div>

  <div id="panel-body">

    <div class="sec">
      <div class="sec-lbl">Algorithm</div>
      <div class="grid2">
        <button class="chip on" data-algo="perlin">Perlin FBM</button>
        <button class="chip" data-algo="curl">Curl Noise</button>
        <button class="chip" data-algo="sine">Sine Wave</button>
        <button class="chip" data-algo="radial">Radial</button>
        <button class="chip" data-algo="turb">Turbulence</button>
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Palette</div>
      <div class="pal-row" id="pal-row"></div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Brush Mode</div>
      <div class="row4">
        <button class="btn on" data-mode="flow">Flow</button>
        <button class="btn" data-mode="attract">Pull</button>
        <button class="btn" data-mode="repel">Push</button>
        <button class="btn" data-mode="erase">Erase</button>
      </div>
    </div>

    <div class="sec">
      <div class="sl-row">
        <label>Particles <em id="v-count">800</em></label>
        <input type="range" id="s-count" min="50" max="3000" value="800" step="50">
      </div>
      <div class="sl-row">
        <label>Speed <em id="v-speed">2.0</em></label>
        <input type="range" id="s-speed" min="0.5" max="5" value="2" step="0.1">
      </div>
      <div class="sl-row">
        <label>Trail <em id="v-trail">80</em></label>
        <input type="range" id="s-trail" min="10" max="200" value="80" step="5">
      </div>
      <div class="sl-row">
        <label>Noise Scale <em id="v-scale">1.0</em></label>
        <input type="range" id="s-scale" min="0.2" max="4" value="1" step="0.1">
      </div>
      <div class="sl-row">
        <label>Line Width <em id="v-lw">1.0</em></label>
        <input type="range" id="s-lw" min="0.5" max="4" value="1" step="0.1">
      </div>
    </div>

    <div class="sec">
      <div class="sec-lbl">Actions</div>
      <div class="row4" style="margin-bottom:4px">
        <button class="btn" id="btn-png">↓ PNG</button>
        <button class="btn" id="btn-share">⎘ Share</button>
        <button class="btn" id="btn-field">⊹ Field</button>
        <button class="btn" id="btn-seed">↺ Seed</button>
      </div>
      <div class="row4">
        <button class="btn del" id="btn-clear">⊘ Clear</button>
        <button class="btn on" id="btn-fade">◐ Fade</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── PERLIN NOISE ────────────────────────────────────────────────────────────
function buildPerm(seed) {
  const p = Array.from({length:256}, (_,i) => i);
  let s = ((seed ^ 0xdeadbeef) >>> 0) | 1;
  for (let i = 255; i > 0; i--) {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    const j = s % (i + 1);
    [p[i], p[j]] = [p[j], p[i]];
  }
  return new Uint8Array([...p, ...p]);
}

const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
const lerp = (a, b, t) => a + t * (b - a);

function grad2(h, x, y) { return (h & 1 ? -x : x) + (h & 2 ? -y : y); }

function noise2(perm, x, y) {
  const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = fade(xf), v = fade(yf);
  const aa = perm[perm[xi] + yi],   ab = perm[perm[xi] + yi + 1];
  const ba = perm[perm[xi+1] + yi], bb = perm[perm[xi+1] + yi + 1];
  return lerp(
    lerp(grad2(aa, xf, yf),   grad2(ba, xf-1, yf),   u),
    lerp(grad2(ab, xf, yf-1), grad2(bb, xf-1, yf-1), u),
    v
  );
}

function fbm(perm, x, y, oct) {
  let v = 0, a = 0.5, f = 1, m = 0;
  for (let i = 0; i < oct; i++) { v += noise2(perm, x*f, y*f)*a; m += a; f *= 2; a *= 0.5; }
  return v / m;
}

// ── PALETTES ────────────────────────────────────────────────────────────────
const PALS = {
  neon:   ['#ff00cc','#aa00ff','#00eeff','#00ff80','#ff6600','#ffff00'],
  sunset: ['#ff4400','#ff7700','#ffaa00','#ff0066','#cc0044','#ff3388'],
  ocean:  ['#003a7c','#0066bb','#0099dd','#33bbee','#88ddff','#aaeeff'],
  fire:   ['#ff1100','#ff5500','#ff9900','#ffcc00','#ff3366','#ff66aa'],
  aurora: ['#00ff99','#00ccff','#3300ff','#aa00ff','#ff00aa','#ffff00'],
  forest: ['#0d2e12','#1a5c24','#2e9940','#66cc55','#99dd77','#ccee99'],
  mono:   ['#ffffff','#dddddd','#aaaaaa','#777777','#444444','#cccccc'],
  pastel: ['#ffb3d9','#ffd9b3','#ffffb3','#b3ffb3','#b3d9ff','#d9b3ff'],
};
const PAL_KEYS = Object.keys(PALS);
const PAL_THUMB = {
  neon:'#ff00cc',sunset:'#ff7700',ocean:'#0099dd',fire:'#ff5500',
  aurora:'#00ff99',forest:'#2e9940',mono:'#aaaaaa',pastel:'#ffb3d9'
};

// ── STATE ────────────────────────────────────────────────────────────────────
const LS = 'ffp_v3';
const DEF = {
  algo:'perlin', palette:'neon', mode:'flow',
  count:800, speed:2, trail:80, scale:1, lw:1,
  showField:false, fade:true,
  seed: (Math.random() * 99999 | 0)
};
let S = {...DEF};
try {
  const hash = location.hash.slice(1);
  if (hash) { Object.assign(S, JSON.parse(atob(hash))); }
  else { const ls = JSON.parse(localStorage.getItem(LS)||'{}'); Object.assign(S, ls); S.seed = DEF.seed; }
} catch(e) {}

// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  clearCanvas();
  computeField();
}
window.addEventListener('resize', resize);

// ── FLOW FIELD ───────────────────────────────────────────────────────────────
const GC = 80, GR = 60;
const field = new Float32Array(GC * GR * 2);
let perm = buildPerm(S.seed);
let fieldT = 0;
let fieldDirty = true;

const ALGOS = {
  perlin(x, y) {
    const sc = S.scale * 0.003;
    const n = fbm(perm, x*sc, y*sc, 4);
    const a = n * Math.PI * 4;
    return [Math.cos(a), Math.sin(a)];
  },
  curl(x, y) {
    const sc = S.scale * 0.003;
    const e = 0.008;
    const nx = x*sc, ny = y*sc;
    const dndy = (fbm(perm,nx,ny+e,3) - fbm(perm,nx,ny-e,3)) / (2*e);
    const dndx = (fbm(perm,nx+e,ny,3) - fbm(perm,nx-e,ny,3)) / (2*e);
    return [dndy, -dndx];
  },
  sine(x, y) {
    const sc = S.scale * 0.005;
    const t = fieldT;
    const a = Math.sin(x*sc + t*0.6)*Math.PI + Math.cos(y*sc + t*0.4)*Math.PI;
    return [Math.cos(a), Math.sin(a)];
  },
  radial(x, y) {
    const cx = W*0.5, cy = H*0.5;
    const n = fbm(perm, x*S.scale*0.002, y*S.scale*0.002, 3);
    const base = Math.atan2(y-cy, x-cx) + fieldT*0.4;
    const a = base + n * 2;
    return [Math.cos(a), Math.sin(a)];
  },
  turb(x, y) {
    const sc = S.scale * 0.003;
    const t = fieldT * 0.04;
    const vx = fbm(perm, x*sc + t,       y*sc + 100, 3);
    const vy = fbm(perm, x*sc + 200 + t, y*sc + 300, 3);
    return [vx, vy];
  }
};

function computeField() {
  if (!W) return;
  const fn = ALGOS[S.algo] || ALGOS.perlin;
  const cw = W/GC, ch = H/GR;
  for (let r = 0; r < GR; r++) {
    for (let c = 0; c < GC; c++) {
      const x = (c+0.5)*cw, y = (r+0.5)*ch;
      const [vx,vy] = fn(x,y);
      const i = (r*GC+c)*2;
      field[i] = vx; field[i+1] = vy;
    }
  }
  fieldDirty = false;
}

function sampleField(x, y) {
  const col = Math.max(0, Math.min(GC-1, x/W*GC | 0));
  const row = Math.max(0, Math.min(GR-1, y/H*GR | 0));
  const i = (row*GC+col)*2;
  return [field[i], field[i+1]];
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
const particles = [];

function mkP(x0, y0) {
  const pal = PALS[S.palette];
  return {
    x: x0 ?? Math.random()*W,
    y: y0 ?? Math.random()*H,
    px:0, py:0,
    age: Math.random() * (S.trail * 0.5) | 0,
    maxAge: S.trail + (Math.random()-0.5)*40 | 0,
    ci: Math.random()*pal.length | 0,
    sm: 0.5 + Math.random()*0.9
  };
}

function syncCount() {
  while (particles.length > S.count) particles.pop();
  while (particles.length < S.count) particles.push(mkP());
}

// ── BRUSH STATE ───────────────────────────────────────────────────────────────
let mx = -1, my = -1, isDown = false;

// ── RENDER ────────────────────────────────────────────────────────────────────
function clearCanvas() {
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0a0a10';
  ctx.fillRect(0,0,W,H);
}

function drawFieldOverlay() {
  const cw = W/GC, ch = H/GR;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < GR; r+=2) {
    for (let c = 0; c < GC; c+=2) {
      const x = (c+0.5)*cw, y = (r+0.5)*ch;
      const i = (r*GC+c)*2;
      const vx = field[i], vy = field[i+1];
      const m = Math.sqrt(vx*vx+vy*vy) || 1;
      const nx = vx/m, ny = vy/m;
      const len = Math.min(cw,ch)*0.45;
      ctx.beginPath();
      ctx.moveTo(x - nx*len*0.25, y - ny*len*0.25);
      ctx.lineTo(x + nx*len,      y + ny*len);
      ctx.stroke();
    }
  }
  ctx.restore();
}

let frameN = 0, fps = 60, fpsFrames = 0, fpsLast = performance.now();
const fpsEl = document.getElementById('fps');

function tick(now) {
  requestAnimationFrame(tick);
  frameN++;
  fpsFrames++;
  if (now - fpsLast >= 1000) {
    fps = (fpsFrames / (now - fpsLast) * 1000) | 0;
    fpsEl.textContent = fps + ' fps';
    fpsFrames = 0; fpsLast = now;
  }

  // Animated field update for time-dependent algos
  const animated = S.algo === 'sine' || S.algo === 'radial' || S.algo === 'turb';
  if (animated && frameN % 4 === 0) {
    fieldT += 0.064;
    computeField();
  }

  // Trail fade
  if (S.fade) {
    const alpha = Math.max(0.012, Math.min(0.18, 3 / S.trail));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#0a0a10';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  if (S.showField) drawFieldOverlay();

  const pal = PALS[S.palette];
  const spd = S.speed;
  const bsq = (S.lw * 120) * (S.lw * 120); // brush radius² in pixels

  ctx.lineWidth = S.lw;

  for (const p of particles) {
    p.px = p.x; p.py = p.y;

    let [vx, vy] = sampleField(p.x, p.y);

    if (isDown && mx >= 0) {
      const dx = mx - p.x, dy = my - p.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < bsq) {
        const f = (1 - Math.sqrt(d2/bsq)) * 3;
        if      (S.mode === 'attract') { vx += dx*f*0.08; vy += dy*f*0.08; }
        else if (S.mode === 'repel')   { vx -= dx*f*0.08; vy -= dy*f*0.08; }
        else if (S.mode === 'erase')   { p.age = p.maxAge; continue; }
      }
    }

    const mag = Math.sqrt(vx*vx + vy*vy) || 1;
    p.x += vx/mag * spd * p.sm;
    p.y += vy/mag * spd * p.sm;
    p.age++;

    if (p.age >= p.maxAge || p.x < -20 || p.x > W+20 || p.y < -20 || p.y > H+20) {
      p.x = p.px = Math.random()*W;
      p.y = p.py = Math.random()*H;
      p.age = 0;
      p.maxAge = (S.trail + (Math.random()-0.5)*40) | 0;
      p.ci = Math.random()*pal.length | 0;
      p.sm = 0.5 + Math.random()*0.9;
      continue;
    }

    const ddx = p.x - p.px, ddy = p.y - p.py;
    if (ddx*ddx + ddy*ddy < 0.04) continue;

    ctx.beginPath();
    ctx.moveTo(p.px, p.py);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = pal[p.ci];
    ctx.stroke();
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportPNG() {
  const a = document.createElement('a');
  a.download = 'flow-field-' + Date.now() + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function shareURL() {
  const enc = {
    algo:S.algo, palette:S.palette, mode:S.mode,
    count:S.count, speed:S.speed, trail:S.trail,
    scale:S.scale, lw:S.lw, seed:S.seed
  };
  location.hash = btoa(JSON.stringify(enc));
  try { navigator.clipboard.writeText(location.href); } catch(e) {}
  showToast('URL copied!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function saveState() {
  try { localStorage.setItem(LS, JSON.stringify(S)); } catch(e) {}
}

// ── UI SETUP ─────────────────────────────────────────────────────────────────
// Palettes
const palRow = document.getElementById('pal-row');
for (const k of PAL_KEYS) {
  const d = document.createElement('div');
  d.className = 'swatch' + (k === S.palette ? ' on' : '');
  d.style.background = PAL_THUMB[k];
  d.title = k;
  d.dataset.pal = k;
  d.addEventListener('click', () => {
    S.palette = k;
    palRow.querySelectorAll('.swatch').forEach(s => s.classList.toggle('on', s.dataset.pal === k));
    syncCount();
    saveState();
  });
  palRow.appendChild(d);
}

// Algorithms
document.querySelectorAll('[data-algo]').forEach(b => {
  b.classList.toggle('on', b.dataset.algo === S.algo);
  b.addEventListener('click', () => {
    S.algo = b.dataset.algo;
    document.querySelectorAll('[data-algo]').forEach(x => x.classList.toggle('on', x === b));
    computeField();
    saveState();
  });
});

// Modes
document.querySelectorAll('[data-mode]').forEach(b => {
  b.classList.toggle('on', b.dataset.mode === S.mode);
  b.addEventListener('click', () => {
    S.mode = b.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(x => x.classList.toggle('on', x === b));
    saveState();
  });
});

// Sliders
function bindSlider(id, vid, key, fmt) {
  const sl = document.getElementById(id), vl = document.getElementById(vid);
  sl.value = S[key];
  vl.textContent = fmt ? fmt(S[key]) : S[key];
  sl.addEventListener('input', () => {
    S[key] = +sl.value;
    vl.textContent = fmt ? fmt(S[key]) : S[key];
    if (key === 'count')  syncCount();
    if (key === 'scale')  { fieldDirty = true; computeField(); }
    if (key === 'trail')  particles.forEach(p => p.maxAge = (S.trail + (Math.random()-0.5)*40)|0);
    saveState();
  });
}
bindSlider('s-count','v-count','count');
bindSlider('s-speed','v-speed','speed',  v => v.toFixed(1));
bindSlider('s-trail','v-trail','trail');
bindSlider('s-scale','v-scale','scale',  v => v.toFixed(1));
bindSlider('s-lw',   'v-lw',  'lw',     v => v.toFixed(1));

// Buttons
document.getElementById('btn-png').addEventListener('click', exportPNG);
document.getElementById('btn-share').addEventListener('click', shareURL);

document.getElementById('btn-field').addEventListener('click', () => {
  S.showField = !S.showField;
  document.getElementById('btn-field').classList.toggle('on', S.showField);
  saveState();
});
if (S.showField) document.getElementById('btn-field').classList.add('on');

document.getElementById('btn-seed').addEventListener('click', () => {
  S.seed = Math.random()*99999 | 0;
  perm = buildPerm(S.seed);
  computeField();
  clearCanvas();
  saveState();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  clearCanvas();
  particles.forEach(p => { p.x = p.px = Math.random()*W; p.y = p.py = Math.random()*H; p.age = 0; });
});

document.getElementById('btn-fade').addEventListener('click', () => {
  S.fade = !S.fade;
  document.getElementById('btn-fade').classList.toggle('on', S.fade);
  if (!S.fade) clearCanvas();
  saveState();
});
if (!S.fade) document.getElementById('btn-fade').classList.remove('on');

document.getElementById('btn-collapse').addEventListener('click', () => {
  const panel = document.getElementById('panel');
  panel.classList.toggle('collapsed');
  document.getElementById('btn-collapse').textContent = panel.classList.contains('collapsed') ? '+' : '−';
});

// ── POINTER ───────────────────────────────────────────────────────────────────
function getXY(e) {
  const r = canvas.getBoundingClientRect();
  return [(e.clientX-r.left)*(W/r.width), (e.clientY-r.top)*(H/r.height)];
}

canvas.addEventListener('pointerdown', e => {
  isDown = true;
  canvas.setPointerCapture(e.pointerId);
  [mx, my] = getXY(e);
  if (S.mode === 'flow') injectParticles(mx, my, 25);
});

canvas.addEventListener('pointermove', e => {
  [mx, my] = getXY(e);
  if (isDown && S.mode === 'flow') injectParticles(mx, my, 5);
});

canvas.addEventListener('pointerup',    () => { isDown = false; mx = -1; my = -1; });
canvas.addEventListener('pointerleave', () => { mx = -1; my = -1; });

function injectParticles(x, y, n) {
  const pal = PALS[S.palette];
  const added = [];
  for (let i = 0; i < n; i++) {
    if (particles.length >= Math.min(S.count * 1.3, 3000)) break;
    const ang = Math.random()*Math.PI*2;
    const r = Math.random()*S.lw*20;
    added.push({
      x: x + Math.cos(ang)*r, y: y + Math.sin(ang)*r,
      px: x, py: y, age: 0,
      maxAge: (S.trail + (Math.random()-0.5)*40) | 0,
      ci: Math.random()*pal.length | 0,
      sm: 0.5 + Math.random()*0.9
    });
  }
  particles.push(...added);
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
const ALGO_KEYS = ['perlin','curl','sine','radial','turb'];
document.addEventListener('keydown', e => {
  if (e.target !== document.body) return;
  if (e.code === 'Space')  { e.preventDefault(); document.getElementById('btn-clear').click(); }
  if (e.code === 'KeyS')   exportPNG();
  if (e.code === 'KeyF')   document.getElementById('btn-field').click();
  if (e.code === 'KeyR')   document.getElementById('btn-seed').click();
  if (e.key >= '1' && e.key <= '5') {
    const k = ALGO_KEYS[+e.key - 1];
    if (k) {
      S.algo = k;
      document.querySelectorAll('[data-algo]').forEach(b => b.classList.toggle('on', b.dataset.algo === k));
      computeField();
    }
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
resize();
syncCount();
requestAnimationFrame(tick);
</script>
</body>
