<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Art Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d14;--surf:#1a1a2e;--surf2:#252540;--bdr:#3a3a5c;--txt:#e0e0f0;--acc:#7c3aed;--acc2:#06b6d4}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;touch-action:none}
#app{width:100%;height:100dvh;display:grid;grid-template-rows:44px 1fr 72px;grid-template-areas:"topbar""workspace""frames"}
#topbar{grid-area:topbar;display:flex;align-items:center;gap:6px;padding:0 10px;background:var(--surf);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
.tbg{display:flex;align-items:center;gap:3px;flex-shrink:0;padding:0 8px;border-right:1px solid var(--bdr)}
.tbg:last-child{border-right:none;margin-left:auto}
.tbl{font-size:9px;color:#7878a0;text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.tb{background:var(--surf2);border:1px solid var(--bdr);color:var(--txt);padding:3px 7px;border-radius:4px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tb:hover{background:var(--bdr)}
.tb.on{background:var(--acc);border-color:var(--acc);color:#fff}
.tb.act{background:transparent;border-color:var(--acc2);color:var(--acc2)}
.tb.act:hover{background:var(--acc2);color:#fff}
#coords{font-size:10px;color:#5a5a80;font-variant-numeric:tabular-nums;min-width:56px;text-align:center}
#workspace{grid-area:workspace;display:flex;overflow:hidden}
#side{width:54px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;background:var(--surf);border-right:1px solid var(--bdr);overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
#side::-webkit-scrollbar{display:none}
.tbtn{width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;background:var(--surf2);border:1px solid var(--bdr);transition:all .15s;flex-shrink:0;user-select:none}
.tbtn:hover{background:var(--bdr)}
.tbtn.on{background:var(--acc);border-color:var(--acc)}
.sep{width:30px;height:1px;background:var(--bdr);flex-shrink:0;margin:2px 0}
#clr-wrap{position:relative;width:38px;height:38px;flex-shrink:0;margin:3px 0}
#clr-sec{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:4px;border:2px solid var(--bg);cursor:pointer}
#clr-pri{position:absolute;top:0;left:0;width:24px;height:24px;border-radius:4px;border:2px solid #fff;cursor:pointer;z-index:1}
#clr-inp{display:none}
.sw{width:15px;height:15px;border-radius:3px;cursor:pointer;transition:transform .1s;border:1px solid rgba(255,255,255,.1)}
.sw:hover{transform:scale(1.3)}
#pal{display:grid;grid-template-columns:repeat(2,15px);gap:3px;padding:3px 0}
#cvarea{flex:1;display:flex;align-items:center;justify-content:center;background:#090912;position:relative;overflow:hidden}
#cvwrap{position:relative}
#mc{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair;touch-action:none}
#oc{position:absolute;top:0;left:0;pointer-events:none}
#frames{grid-area:frames;display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--surf);border-top:1px solid var(--bdr);overflow-x:auto;scrollbar-width:thin}
.fthumb{position:relative;flex-shrink:0;width:50px;height:50px;border-radius:6px;cursor:pointer;border:2px solid var(--bdr);transition:border-color .15s;overflow:hidden;background:repeating-conic-gradient(#2a2a3e 0% 25%,#1e1e30 0% 50%) 0 0/8px 8px}
.fthumb.on{border-color:var(--acc)}
.fthumb canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;display:block}
.fnum{position:absolute;bottom:1px;right:3px;font-size:9px;color:rgba(255,255,255,.6);font-weight:700}
.fdel{position:absolute;top:1px;left:2px;font-size:9px;cursor:pointer;color:#ff4466;opacity:0;transition:opacity .1s;background:rgba(0,0,0,.6);border-radius:2px;padding:0 2px;line-height:1.4}
.fthumb:hover .fdel,.fthumb.on .fdel{opacity:.7}
#addfr{width:50px;height:50px;flex-shrink:0;border-radius:6px;border:2px dashed var(--bdr);background:transparent;color:var(--bdr);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
#addfr:hover{border-color:var(--acc);color:var(--acc)}
#notif{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:5px 14px;border-radius:18px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
@media(max-width:620px){
  #app{grid-template-rows:40px 1fr 60px 68px}
  #workspace{flex-direction:column}
  #side{width:100%;height:auto;flex-direction:row;border-right:none;border-bottom:1px solid var(--bdr);padding:5px 8px;overflow-x:auto;overflow-y:hidden;flex-shrink:0}
  .sep{width:1px;height:28px;margin:0 3px}
  #pal{grid-template-columns:repeat(8,15px)}
  .tbtn{width:34px;height:34px;font-size:15px}
  #clr-wrap{width:34px;height:34px}
  #frames{height:76px}
}
</style>
</head>
<body>
<div id="app">
<div id="topbar">
  <div class="tbg">
    <span class="tbl">Grid</span>
    <button class="tb" data-sz="16" onclick="setSz(16)">16</button>
    <button class="tb on" data-sz="32" onclick="setSz(32)">32</button>
    <button class="tb" data-sz="64" onclick="setSz(64)">64</button>
  </div>
  <div class="tbg">
    <span class="tbl">Mirror</span>
    <button class="tb on" data-sym="none" onclick="setSym('none')">✕</button>
    <button class="tb" data-sym="h" onclick="setSym('h')">↔</button>
    <button class="tb" data-sym="v" onclick="setSym('v')">↕</button>
    <button class="tb" data-sym="both" onclick="setSym('both')">⊕</button>
  </div>
  <div class="tbg">
    <span class="tbl">FPS</span>
    <button class="tb" data-fps="4" onclick="setFps(4)">4</button>
    <button class="tb on" data-fps="8" onclick="setFps(8)">8</button>
    <button class="tb" data-fps="12" onclick="setFps(12)">12</button>
    <button class="tb" data-fps="24" onclick="setFps(24)">24</button>
  </div>
  <div class="tbg">
    <button class="tb act" id="playbtn" onclick="togglePlay()">▶ Play</button>
    <button class="tb act" onclick="doExport()">↓ PNG</button>
  </div>
  <div class="tbg"><span id="coords">—</span></div>
</div>

<div id="workspace">
  <div id="side">
    <button class="tbtn on" data-tool="pencil" onclick="setTool('pencil')" title="Pencil [P]">✏</button>
    <button class="tbtn" data-tool="eraser" onclick="setTool('eraser')" title="Eraser [E]">◻</button>
    <button class="tbtn" data-tool="fill" onclick="setTool('fill')" title="Fill [F]">⬛</button>
    <button class="tbtn" data-tool="line" onclick="setTool('line')" title="Line [L]">╱</button>
    <button class="tbtn" data-tool="rect" onclick="setTool('rect')" title="Rect [R]">▭</button>
    <button class="tbtn" data-tool="ellipse" onclick="setTool('ellipse')" title="Ellipse [O]">○</button>
    <button class="tbtn" data-tool="eye" onclick="setTool('eye')" title="Eyedropper [I]">💧</button>
    <div class="sep"></div>
    <div id="clr-wrap">
      <div id="clr-sec" onclick="swapClr()" title="Swap [X]"></div>
      <div id="clr-pri" onclick="openPick()"></div>
    </div>
    <input type="color" id="clr-inp" onchange="pickChanged()">
    <div class="sep"></div>
    <div id="pal"></div>
    <div class="sep"></div>
    <button class="tbtn" onclick="undo()" title="Undo Ctrl+Z" style="font-size:13px">↩</button>
    <button class="tbtn" onclick="redo()" title="Redo Ctrl+Y" style="font-size:13px">↪</button>
  </div>
  <div id="cvarea">
    <div id="cvwrap">
      <canvas id="mc"></canvas>
      <canvas id="oc"></canvas>
    </div>
  </div>
</div>

<div id="frames">
  <div id="flist"></div>
  <button id="addfr" onclick="addFrame()" title="Add frame">+</button>
</div>
</div>
<div id="notif"></div>

<script>
const PAL=['#000000','#1D2B53','#7E2553','#AB5236','#5F574F','#4a4e69','#C2C3C7','#ffffff',
'#FF004D','#ef4444','#f97316','#FFA300','#FFEC27','#22c55e','#00E436','#06b6d4',
'#29ADFF','#3b82f6','#8b5cf6','#a855f7','#FF77A8','#ec4899','#FFCCAA','#FFF1E8',
'#1a1a2e','#16213e','#0f3460','#533483','#e94560','#f5a623','#7c3aed','#34d399'];

let sz=32,frames=[mk(32)],cf=0,tool='pencil',pri='#FF004D',sec='#1D2B53',sym='none';
let fps=8,playing=false,playTmr=null,undo_=[],redo_=[];
let mdown=false,useSec=false,lc=-1,lr=-1,ds=null,base=null;

const mc=document.getElementById('mc');
const mctx=mc.getContext('2d');
const oc=document.getElementById('oc');
const octx=oc.getContext('2d');
const cva=document.getElementById('cvarea');
const cvw=document.getElementById('cvwrap');

function mk(s){return new Array(s*s).fill('')}
function gp(fr,r,c){return fr[r*sz+c]||''}
function sp(fr,r,c,col){if(r>=0&&r<sz&&c>=0&&c<sz)fr[r*sz+c]=col}
function cl(fr){return fr.slice()}

function resize(){
  const a=cva.getBoundingClientRect();
  const d=Math.floor(Math.min(a.width-8,a.height-8));
  mc.width=sz;mc.height=sz;
  mc.style.width=d+'px';mc.style.height=d+'px';
  oc.width=d;oc.height=d;
  oc.style.width=d+'px';oc.style.height=d+'px';
  cvw.style.width=d+'px';cvw.style.height=d+'px';
  draw();drawGrid();
}
window.addEventListener('resize',resize);

function draw(fi){
  if(fi===undefined)fi=cf;
  const fr=frames[fi];
  mctx.clearRect(0,0,sz,sz);
  for(let r=0;r<sz;r++){
    for(let c=0;c<sz;c++){
      const col=gp(fr,r,c);
      mctx.fillStyle=col||(((r+c)%2===0)?'#252540':'#1e1e2e');
      mctx.fillRect(c,r,1,1);
    }
  }
}

function drawGrid(){
  const w=oc.width,h=oc.height,cw=w/sz;
  octx.clearRect(0,0,w,h);
  octx.strokeStyle='rgba(255,255,255,0.06)';
  octx.lineWidth=.5;
  for(let i=0;i<=sz;i++){
    const x=Math.round(i*cw)+.5,y=Math.round(i*cw)+.5;
    octx.beginPath();octx.moveTo(x,0);octx.lineTo(x,h);octx.stroke();
    octx.beginPath();octx.moveTo(0,y);octx.lineTo(w,y);octx.stroke();
  }
}

function thumbs(){
  const fl=document.getElementById('flist');
  fl.innerHTML='';
  frames.forEach((fr,i)=>{
    const div=document.createElement('div');
    div.className='fthumb'+(i===cf?' on':'');
    div.onclick=()=>selFr(i);
    const c=document.createElement('canvas');
    c.width=sz;c.height=sz;
    const cx=c.getContext('2d');
    for(let r=0;r<sz;r++)for(let col=0;col<sz;col++){
      const clr=gp(fr,r,col);
      if(clr){cx.fillStyle=clr;cx.fillRect(col,r,1,1);}
    }
    const num=document.createElement('span');num.className='fnum';num.textContent=i+1;
    const del=document.createElement('span');del.className='fdel';del.textContent='×';
    del.onclick=e=>{e.stopPropagation();delFr(i)};
    div.appendChild(c);div.appendChild(num);div.appendChild(del);
    fl.appendChild(div);
  });
}

function selFr(i){if(playing)return;cf=i;draw();thumbs()}
function addFrame(){
  if(frames.length>=8){notif('Max 8 frames');return}
  frames.push(mk(sz));cf=frames.length-1;draw();thumbs();save();
}
function delFr(i){
  if(frames.length<=1){notif('Need at least 1 frame');return}
  frames.splice(i,1);cf=Math.min(cf,frames.length-1);draw();thumbs();save();
}

function togglePlay(){
  playing=!playing;
  const b=document.getElementById('playbtn');
  if(playing){
    b.textContent='■ Stop';b.classList.add('on');
    let fi=cf;
    playTmr=setInterval(()=>{fi=(fi+1)%frames.length;draw(fi);},1000/fps);
  }else{
    b.textContent='▶ Play';b.classList.remove('on');
    clearInterval(playTmr);draw();
  }
}

function setFps(f){fps=f;qa('[data-fps]',b=>b.classList.toggle('on',+b.dataset.fps===f));if(playing){togglePlay();togglePlay()}}
function setTool(t){tool=t;qa('[data-tool]',b=>b.classList.toggle('on',b.dataset.tool===t))}
function setSym(s){sym=s;qa('[data-sym]',b=>b.classList.toggle('on',b.dataset.sym===s))}
function setSz(s){
  if(s===sz)return;
  const old=sz;sz=s;
  frames=frames.map(f=>{const nf=mk(s);const m=Math.min(old,s);
    for(let r=0;r<m;r++)for(let c=0;c<m;c++)nf[r*s+c]=f[r*old+c];return nf});
  undo_=[];redo_=[];
  qa('[data-sz]',b=>b.classList.toggle('on',+b.dataset.sz===s));
  resize();thumbs();save();
}

function symPts(r,c){
  const p=[[r,c]];
  if(sym==='h'||sym==='both')p.push([r,sz-1-c]);
  if(sym==='v'||sym==='both')p.push([sz-1-r,c]);
  if(sym==='both')p.push([sz-1-r,sz-1-c]);
  return p;
}
function apx(fr,r,c,col){symPts(r,c).forEach(([rr,cc])=>sp(fr,rr,cc,col))}

function flood(fr,r,c,fill){
  const tgt=gp(fr,r,c);if(tgt===fill)return;
  const vis=new Uint8Array(sz*sz),q=[[r,c]];
  while(q.length){
    const[rr,cc]=q.shift();
    if(rr<0||rr>=sz||cc<0||cc>=sz)continue;
    const idx=rr*sz+cc;if(vis[idx]||fr[idx]!==tgt)continue;
    vis[idx]=1;fr[idx]=fill;
    q.push([rr-1,cc],[rr+1,cc],[rr,cc-1],[rr,cc+1]);
  }
}

function bline(fr,r0,c0,r1,c1,col){
  let dx=Math.abs(c1-c0),dy=Math.abs(r1-r0),sx=c0<c1?1:-1,sy=r0<r1?1:-1,err=dx-dy;
  while(true){apx(fr,r0,c0,col);if(r0===r1&&c0===c1)break;
    const e2=2*err;if(e2>-dy){err-=dy;c0+=sx}if(e2<dx){err+=dx;r0+=sy}}
}

function brect(fr,r0,c0,r1,c1,col){
  const rn=Math.min(r0,r1),rx=Math.max(r0,r1),cn=Math.min(c0,c1),cx=Math.max(c0,c1);
  for(let c=cn;c<=cx;c++){apx(fr,rn,c,col);apx(fr,rx,c,col)}
  for(let r=rn+1;r<rx;r++){apx(fr,r,cn,col);apx(fr,r,cx,col)}
}

function bellipse(fr,r0,c0,r1,c1,col){
  const ecx=(c0+c1)/2,ecy=(r0+r1)/2,rx=Math.abs(c1-c0)/2,ry=Math.abs(r1-r0)/2;
  if(rx<.5||ry<.5){apx(fr,Math.round(ecy),Math.round(ecx),col);return}
  let x=0,y=Math.round(ry),p=Math.round(ry*ry-rx*rx*ry+.25*rx*rx);
  const pl=(px,py)=>{[[ecy+py,ecx+px],[ecy+py,ecx-px],[ecy-py,ecx+px],[ecy-py,ecx-px]]
    .forEach(([rr,cc])=>apx(fr,Math.round(rr),Math.round(cc),col))};
  while(2*ry*ry*x<2*rx*rx*y){pl(x,y);x++;if(p<0)p+=2*ry*ry*x+ry*ry;else{y--;p+=2*ry*ry*x-2*rx*rx*y+ry*ry}}
  let p2=Math.round(ry*ry*(x+.5)*(x+.5)+rx*rx*(y-1)*(y-1)-rx*rx*ry*ry);
  while(y>=0){pl(x,y);y--;if(p2>0)p2-=2*rx*rx*y+rx*rx;else{x++;p2+=2*ry*ry*x-2*rx*rx*y+rx*rx}}
}

function p2g(e){
  const r=mc.getBoundingClientRect();
  return{col:Math.max(0,Math.min(sz-1,Math.floor((e.clientX-r.left)/r.width*sz))),
         row:Math.max(0,Math.min(sz-1,Math.floor((e.clientY-r.top)/r.height*sz)))};
}

oc.addEventListener('contextmenu',e=>e.preventDefault());
oc.addEventListener('pointerdown',e=>{
  if(playing)return;e.preventDefault();
  mdown=true;useSec=e.button===2;oc.setPointerCapture(e.pointerId);
  const{col,row}=p2g(e);const col_=useSec?sec:pri;
  pushU();
  if(tool==='eye'){const c=gp(frames[cf],row,col);if(c){if(useSec)sec=c;else pri=c;updClr()}mdown=false;return}
  if(tool==='fill'){flood(frames[cf],row,col,col_);draw();thumbs();save();mdown=false;return}
  if(tool==='line'||tool==='rect'||tool==='ellipse'){ds={col,row};base=cl(frames[cf]);return}
  apx(frames[cf],row,col,tool==='eraser'?'':col_);lc=col;lr=row;draw();thumbs();
});
oc.addEventListener('pointermove',e=>{
  if(playing)return;
  const{col,row}=p2g(e);
  document.getElementById('coords').textContent=`${col+1},${row+1}`;
  if(!mdown)return;e.preventDefault();
  const col_=useSec?sec:pri;
  if(ds){
    if(tool==='line'){frames[cf]=cl(base);bline(frames[cf],ds.row,ds.col,row,col,col_)}
    else if(tool==='rect'){frames[cf]=cl(base);brect(frames[cf],ds.row,ds.col,row,col,col_)}
    else if(tool==='ellipse'){frames[cf]=cl(base);bellipse(frames[cf],ds.row,ds.col,row,col,col_)}
    draw();return;
  }
  if(tool==='pencil'||tool==='eraser'){
    if(col===lc&&row===lr)return;
    const dc=tool==='eraser'?'':col_;
    if(lc>=0)bline(frames[cf],lr,lc,row,col,dc);else apx(frames[cf],row,col,dc);
    lc=col;lr=row;draw();
  }
});
oc.addEventListener('pointerup',e=>{
  if(!mdown)return;mdown=false;
  if(ds){ds=null;base=null;thumbs();save()}
  lc=-1;lr=-1;thumbs();save();
});
oc.addEventListener('pointerleave',()=>document.getElementById('coords').textContent='—');

function pushU(){undo_.push(frames.map(f=>f.slice()));if(undo_.length>40)undo_.shift();redo_=[]}
function undo(){if(!undo_.length)return;redo_.push(frames.map(f=>f.slice()));frames=undo_.pop();draw();thumbs();save()}
function redo(){if(!redo_.length)return;undo_.push(frames.map(f=>f.slice()));frames=redo_.pop();draw();thumbs();save()}

function updClr(){
  document.getElementById('clr-pri').style.background=pri;
  document.getElementById('clr-sec').style.background=sec;
  document.getElementById('clr-inp').value=pri;
}
function openPick(){const i=document.getElementById('clr-inp');i.value=pri;i.click()}
function pickChanged(){pri=document.getElementById('clr-inp').value;updClr()}
function swapClr(){[pri,sec]=[sec,pri];updClr()}

function buildPal(){
  const g=document.getElementById('pal');g.innerHTML='';
  PAL.forEach(col=>{
    const s=document.createElement('div');s.className='sw';s.style.background=col;s.title=col;
    s.addEventListener('click',e=>{if(e.shiftKey)sec=col;else pri=col;updClr()});
    s.addEventListener('contextmenu',e=>{e.preventDefault();sec=col;updClr()});
    g.appendChild(s);
  });
}

function doExport(){
  const sc=Math.max(1,Math.floor(512/sz));
  const c=document.createElement('canvas');c.width=sz*sc;c.height=sz*sc;
  const cx=c.getContext('2d');
  const fr=frames[cf];
  for(let r=0;r<sz;r++)for(let col=0;col<sz;col++){
    const clr=gp(fr,r,col);
    if(clr){cx.fillStyle=clr;cx.fillRect(col*sc,r*sc,sc,sc)}
  }
  const a=document.createElement('a');a.download='pixel-art.png';a.href=c.toDataURL('image/png');a.click();
  notif('PNG exported!');
}

const LS='pxl-art-v1';
function save(){try{localStorage.setItem(LS,JSON.stringify({sz,frames,cf,pri,sec,fps,sym}))}catch(e){}}
function load(){
  try{const d=JSON.parse(localStorage.getItem(LS)||'null');if(!d)return false;
    sz=d.sz||32;frames=d.frames||[mk(sz)];cf=d.cf||0;pri=d.pri||'#FF004D';sec=d.sec||'#1D2B53';fps=d.fps||8;sym=d.sym||'none';return true}
  catch(e){return false}
}

let ntmr=null;
function notif(msg){const e=document.getElementById('notif');e.textContent=msg;e.style.opacity='1';clearTimeout(ntmr);ntmr=setTimeout(()=>e.style.opacity='0',2000)}

function qa(sel,fn){document.querySelectorAll(sel).forEach(fn)}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.ctrlKey||e.metaKey){
    if(e.key==='z'){e.preventDefault();undo()}
    if(e.key==='y'){e.preventDefault();redo()}
    if(e.key==='s'){e.preventDefault();doExport()}
    return;
  }
  ({p:()=>setTool('pencil'),e:()=>setTool('eraser'),f:()=>setTool('fill'),
    l:()=>setTool('line'),r:()=>setTool('rect'),o:()=>setTool('ellipse'),
    i:()=>setTool('eye'),x:()=>swapClr(),' ':()=>{e.preventDefault();togglePlay()},
    '[':()=>selFr(Math.max(0,cf-1)),']':()=>selFr(Math.min(frames.length-1,cf+1))
  })[e.key.toLowerCase()]?.();
});

(function init(){
  const loaded=load();
  qa('[data-sz]',b=>b.classList.toggle('on',+b.dataset.sz===sz));
  qa('[data-fps]',b=>b.classList.toggle('on',+b.dataset.fps===fps));
  qa('[data-sym]',b=>b.classList.toggle('on',b.dataset.sym===sym));
  buildPal();updClr();resize();thumbs();
  if(!loaded)notif('Welcome! Draw something ✏');
})();
</script>
</body>
