<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Glyph Foundry — Bitmap Font Builder</title>
<style>
  :root{
    --ink:#0f0b08;
    --paper:#f4e9d8;
    --amber:#e8a33d;
    --rust:#c1502e;
    --moss:#7c9070;
    --panel:#1a140f;
    --panel2:#221a13;
    --line:#3a2d20;
    --text:#f0e4d0;
    --text-dim:#b8a888;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(232,163,61,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(193,80,46,0.09), transparent 55%),
      var(--ink);
    color:var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2,h3{margin:0;}
  button, input, select{
    font-family: inherit;
  }
  ::selection{ background: var(--amber); color:#1a1108; }

  .app{
    display:grid;
    grid-template-columns: 280px 1fr 340px;
    gap:16px;
    padding:16px;
    max-width:1500px;
    margin:0 auto;
    min-height:100vh;
  }

  header.topbar{
    grid-column: 1 / -1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:10px 16px;
    background: linear-gradient(180deg, rgba(232,163,61,0.08), transparent);
    border:1px solid var(--line);
    border-radius:14px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand .glyph-mark{
    width:34px;height:34px;
    border-radius:8px;
    background: linear-gradient(135deg, var(--amber), var(--rust));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    color:#1a1108;
    font-size:18px;
    box-shadow: 0 0 18px rgba(232,163,61,0.4);
  }
  .brand h1{
    font-size:17px;
    letter-spacing:0.02em;
    font-weight:700;
  }
  .brand .sub{
    font-size:11px;
    color: var(--text-dim);
    margin-top:1px;
  }
  .topbar-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .panel{
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-width:0;
  }

  .panel-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color: var(--amber);
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  /* Buttons */
  .btn{
    background: var(--panel2);
    border:1px solid var(--line);
    color: var(--text);
    padding:8px 12px;
    border-radius:9px;
    cursor:pointer;
    font-size:12.5px;
    font-weight:600;
    transition: all 0.15s ease;
    white-space:nowrap;
  }
  .btn:hover{
    border-color: var(--amber);
    background: rgba(232,163,61,0.10);
    transform: translateY(-1px);
  }
  .btn:active{ transform: translateY(0); }
  .btn.primary{
    background: linear-gradient(135deg, var(--amber), var(--rust));
    border-color: transparent;
    color:#1a1108;
    box-shadow: 0 2px 12px rgba(232,163,61,0.25);
  }
  .btn.primary:hover{
    box-shadow: 0 4px 18px rgba(232,163,61,0.4);
    filter:brightness(1.06);
  }
  .btn.small{ padding:5px 9px; font-size:11px; }
  .btn.danger:hover{ border-color: var(--rust); background: rgba(193,80,46,0.15); }
  .btn.full{ width:100%; }
  .btn-row{ display:flex; gap:6px; flex-wrap:wrap; }

  /* Character palette */
  .char-palette{
    display:grid;
    grid-template-columns: repeat(8, 1fr);
    gap:5px;
    max-height:260px;
    overflow-y:auto;
    padding-right:2px;
  }
  .char-btn{
    aspect-ratio:1;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:6px;
    color: var(--text-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    position:relative;
    transition: all 0.12s ease;
  }
  .char-btn:hover{ border-color: var(--amber); color:var(--text); }
  .char-btn.defined::after{
    content:"";
    position:absolute;
    bottom:2px; right:2px;
    width:4px;height:4px;
    border-radius:50%;
    background: var(--moss);
  }
  .char-btn.active{
    background: linear-gradient(135deg, var(--amber), var(--rust));
    color:#1a1108;
    border-color:transparent;
    box-shadow: 0 0 0 2px rgba(232,163,61,0.25);
  }
  .char-btn.active::after{ background:#1a1108; }

  /* Editor */
  .editor-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .editor-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
  }
  .current-char-badge{
    font-size:28px;
    font-weight:800;
    width:46px;height:46px;
    display:flex;align-items:center;justify-content:center;
    background: var(--panel2);
    border:1px solid var(--amber);
    border-radius:10px;
    color: var(--amber);
  }
  #gridCanvas{
    touch-action: none;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    cursor: crosshair;
    max-width:100%;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3);
  }
  .editor-tools{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .brush-toggle{
    display:flex;
    gap:4px;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:3px;
  }
  .brush-toggle button{
    background:transparent;
    border:none;
    color: var(--text-dim);
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:11.5px;
    font-weight:700;
  }
  .brush-toggle button.active{
    background: var(--amber);
    color:#1a1108;
  }

  /* Preview */
  #previewCanvas{
    width:100%;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:10px;
    display:block;
  }
  .preview-input-row{
    display:flex;
    gap:8px;
  }
  #previewText{
    flex:1;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:8px;
    color: var(--text);
    padding:9px 11px;
    font-size:14px;
    min-width:0;
  }
  #previewText:focus{ outline:none; border-color: var(--amber); }

  .field{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .field label{
    font-size:11px;
    color: var(--text-dim);
    display:flex;
    justify-content:space-between;
  }
  input[type=range]{
    -webkit-appearance:none;
    width:100%;
    height:5px;
    border-radius:3px;
    background: var(--line);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:15px;height:15px;
    border-radius:50%;
    background: var(--amber);
    cursor:pointer;
    box-shadow: 0 0 8px rgba(232,163,61,0.5);
  }
  input[type=range]::-moz-range-thumb{
    width:15px;height:15px;
    border-radius:50%;
    background: var(--amber);
    border:none;
    cursor:pointer;
  }

  .swatches{
    display:flex;
    gap:6px;
    align-items:center;
  }
  .swatch{
    width:22px;height:22px;
    border-radius:50%;
    border:2px solid var(--line);
    cursor:pointer;
    transition: transform 0.12s ease;
  }
  .swatch:hover{ transform: scale(1.15); }
  .swatch.active{ border-color: var(--text); box-shadow: 0 0 0 2px var(--amber); }
  input[type=color]{
    width:26px;height:26px;
    border:none;
    background:none;
    padding:0;
    cursor:pointer;
    border-radius:50%;
    overflow:hidden;
  }

  /* Library */
  .lib-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:180px;
    overflow-y:auto;
  }
  .lib-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:7px 9px;
  }
  .lib-item.current{ border-color: var(--amber); }
  .lib-item-name{
    font-size:12.5px;
    font-weight:600;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    cursor:pointer;
    flex:1;
  }
  .lib-item-actions{
    display:flex;
    gap:3px;
  }
  .icon-btn{
    background:transparent;
    border:1px solid var(--line);
    color: var(--text-dim);
    width:24px;height:24px;
    border-radius:6px;
    cursor:pointer;
    font-size:11px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{ border-color: var(--rust); color: var(--text); }

  .name-row{
    display:flex;
    gap:6px;
  }
  #fontNameInput{
    flex:1;
    background: var(--panel2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    padding:8px 10px;
    font-size:12.5px;
    min-width:0;
  }
  #fontNameInput:focus{ outline:none; border-color: var(--amber); }

  .hint{
    font-size:10.5px;
    color: var(--text-dim);
    line-height:1.5;
  }
  .toast{
    position:fixed;
    bottom:18px;
    left:50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(135deg, var(--amber), var(--rust));
    color:#1a1108;
    padding:10px 18px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    opacity:0;
    pointer-events:none;
    transition: all 0.25s ease;
    z-index:100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  #importFile{ display:none; }

  .kbd{
    display:inline-block;
    background: var(--panel2);
    border:1px solid var(--line);
    border-bottom-width:2px;
    border-radius:4px;
    padding:1px 5px;
    font-size:10px;
    font-family: ui-monospace, monospace;
    color: var(--text-dim);
  }

  @media (max-width: 1050px){
    .app{ grid-template-columns: 1fr 1fr; }
    .panel.editor-panel{ grid-column: 1 / -1; order:-1; }
  }
  @media (max-width: 600px){
    .app{ grid-template-columns: 1fr; padding:10px; gap:10px; }
    header.topbar{ padding:9px 12px; }
    .brand h1{ font-size:15px; }
    .topbar-actions .btn span.long{ display:none; }
    .char-palette{ max-height:200px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="glyph-mark">G</div>
      <div>
        <h1>Glyph Foundry</h1>
        <div class="sub">bitmap font builder</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn" id="genFontBtn" title="Procedurally seed all glyphs from a system font">✨ <span class="long">Generate starter font</span></button>
      <button class="btn" id="exportPngBtn"><span class="long">Export</span> PNG</button>
      <button class="btn" id="exportJsonBtn"><span class="long">Export</span> JSON</button>
      <button class="btn" id="importJsonBtn"><span class="long">Import</span> JSON</button>
      <input type="file" id="importFile" accept="application/json">
    </div>
  </header>

  <!-- LEFT: character palette -->
  <section class="panel">
    <div class="panel-title">Character Palette</div>
    <div class="char-palette" id="charPalette"></div>
    <div class="hint">Dot = glyph has pixels drawn. Click a character to edit it. Use <span class="kbd">←</span><span class="kbd">→</span> to move between characters.</div>
  </section>

  <!-- CENTER: editor -->
  <section class="panel editor-panel">
    <div class="editor-wrap">
      <div class="editor-head">
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="current-char-badge" id="currentCharBadge">A</div>
          <div>
            <div class="panel-title" style="margin-bottom:2px;">Glyph Editor</div>
            <div class="hint">10 × 14 pixel grid</div>
          </div>
        </div>
        <div class="brush-toggle">
          <button id="brush1" class="active" data-size="1">1px</button>
          <button id="brush2" data-size="2">2px</button>
        </div>
      </div>

      <canvas id="gridCanvas" width="300" height="420"></canvas>

      <div class="editor-tools">
        <button class="btn small" id="clearBtn">Clear <span class="kbd">c</span></button>
        <button class="btn small" id="invertBtn">Invert <span class="kbd">i</span></button>
        <button class="btn small" id="mirrorBtn">Mirror H</button>
        <button class="btn small" id="undoBtn">Undo <span class="kbd">u</span></button>
        <button class="btn small" id="resetGlyphBtn">Reset from system font</button>
      </div>
    </div>

    <div style="border-top:1px solid var(--line); padding-top:12px;">
      <div class="panel-title" style="margin-bottom:8px;">Font Library</div>
      <div class="name-row">
        <input type="text" id="fontNameInput" placeholder="Untitled Font" value="Untitled Font">
        <button class="btn primary small" id="saveFontBtn">Save</button>
      </div>
      <div class="lib-list" id="libList" style="margin-top:8px;"></div>
    </div>
  </section>

  <!-- RIGHT: live preview -->
  <section class="panel">
    <div class="panel-title">Live Preview</div>
    <div class="preview-input-row">
      <input type="text" id="previewText" value="Hello Foundry! 123" maxlength="80" spellcheck="false">
    </div>
    <canvas id="previewCanvas" width="640" height="220"></canvas>

    <div class="field">
      <label><span>Scale</span><span id="scaleVal">6px</span></label>
      <input type="range" id="scaleSlider" min="2" max="14" value="6" step="1">
    </div>
    <div class="field">
      <label><span>Letter spacing</span><span id="spacingVal">2px</span></label>
      <input type="range" id="spacingSlider" min="0" max="10" value="2" step="1">
    </div>
    <div class="field">
      <label>Ink color</label>
      <div class="swatches">
        <div class="swatch active" style="background:#e8a33d" data-color="#e8a33d"></div>
        <div class="swatch" style="background:#c1502e" data-color="#c1502e"></div>
        <div class="swatch" style="background:#7c9070" data-color="#7c9070"></div>
        <div class="swatch" style="background:#f4e9d8" data-color="#f4e9d8"></div>
        <input type="color" id="colorPicker" value="#e8a33d" title="Custom color">
      </div>
    </div>

    <div class="hint" style="border-top:1px solid var(--line); padding-top:10px;">
      Shortcuts: <span class="kbd">←</span><span class="kbd">→</span> switch glyph · <span class="kbd">c</span> clear · <span class="kbd">i</span> invert · <span class="kbd">u</span> undo
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- Config ----------
  var GRID_W = 10, GRID_H = 14;
  var CELL = 30; // editor canvas cell size in px (300/10, 420/14)
  var CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,!?'-".split("");
  var LS_LIBRARY_KEY = "glyphFoundry.library.v1";
  var LS_AUTOSAVE_KEY = "glyphFoundry.autosave.v1";

  // ---------- State ----------
  // glyphs: map char -> bitstring of length GRID_W*GRID_H ('0'/'1')
  var state = {
    name: "Untitled Font",
    glyphs: {}
  };
  var currentChar = "A";
  var brushSize = 1;
  var undoStack = {}; // char -> previous bitstring (single-level)
  var previewColor = "#e8a33d";
  var previewScale = 6;
  var previewSpacing = 2;

  function blankBits(){
    return new Array(GRID_W * GRID_H).fill("0").join("");
  }
  function getBits(ch){
    return state.glyphs[ch] || blankBits();
  }
  function setBits(ch, bits){
    state.glyphs[ch] = bits;
  }
  function idx(x,y){ return y*GRID_W + x; }

  // ---------- DOM refs ----------
  var charPalette = document.getElementById("charPalette");
  var gridCanvas = document.getElementById("gridCanvas");
  var gctx = gridCanvas.getContext("2d");
  var previewCanvas = document.getElementById("previewCanvas");
  var pctx = previewCanvas.getContext("2d");
  var previewText = document.getElementById("previewText");
  var currentCharBadge = document.getElementById("currentCharBadge");
  var scaleSlider = document.getElementById("scaleSlider");
  var spacingSlider = document.getElementById("spacingSlider");
  var scaleVal = document.getElementById("scaleVal");
  var spacingVal = document.getElementById("spacingVal");
  var colorPicker = document.getElementById("colorPicker");
  var fontNameInput = document.getElementById("fontNameInput");
  var libList = document.getElementById("libList");
  var toastEl = document.getElementById("toast");

  function label(ch){
    if (ch === " ") return "␣";
    return ch;
  }

  // ---------- Character Palette ----------
  function buildPalette(){
    charPalette.innerHTML = "";
    CHARS.forEach(function(ch){
      var btn = document.createElement("div");
      btn.className = "char-btn";
      btn.dataset.char = ch;
      btn.textContent = label(ch);
      btn.title = ch === " " ? "space" : ch;
      btn.addEventListener("click", function(){ selectChar(ch); });
      charPalette.appendChild(btn);
    });
    refreshPaletteState();
  }

  function refreshPaletteState(){
    var nodes = charPalette.children;
    for (var i=0;i<nodes.length;i++){
      var el = nodes[i];
      var ch = el.dataset.char;
      el.classList.toggle("active", ch === currentChar);
      var bits = state.glyphs[ch];
      var defined = !!bits && bits.indexOf("1") !== -1;
      el.classList.toggle("defined", defined);
    }
  }

  function selectChar(ch){
    currentChar = ch;
    currentCharBadge.textContent = label(ch);
    refreshPaletteState();
    drawGrid();
  }

  // ---------- Editor grid ----------
  function drawGrid(){
    var bits = getBits(currentChar);
    gctx.clearRect(0,0,gridCanvas.width, gridCanvas.height);
    gctx.fillStyle = "#1a140f";
    gctx.fillRect(0,0,gridCanvas.width, gridCanvas.height);

    for (var y=0;y<GRID_H;y++){
      for (var x=0;x<GRID_W;x++){
        var on = bits.charAt(idx(x,y)) === "1";
        gctx.fillStyle = on ? "#e8a33d" : "rgba(255,255,255,0.035)";
        gctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
      }
    }
    // grid lines
    gctx.strokeStyle = "rgba(255,255,255,0.06)";
    gctx.lineWidth = 1;
    for (var gx=0; gx<=GRID_W; gx++){
      gctx.beginPath();
      gctx.moveTo(gx*CELL+0.5, 0);
      gctx.lineTo(gx*CELL+0.5, GRID_H*CELL);
      gctx.stroke();
    }
    for (var gy=0; gy<=GRID_H; gy++){
      gctx.beginPath();
      gctx.moveTo(0, gy*CELL+0.5);
      gctx.lineTo(GRID_W*CELL, gy*CELL+0.5);
      gctx.stroke();
    }
  }

  function pushUndo(ch){
    undoStack[ch] = getBits(ch);
  }

  function setPixel(x, y, on){
    if (x<0||x>=GRID_W||y<0||y>=GRID_H) return;
    var bits = getBits(currentChar).split("");
    var cells = [[x,y]];
    if (brushSize === 2){
      cells.push([x+1,y],[x,y+1],[x+1,y+1]);
    }
    var changed = false;
    cells.forEach(function(c){
      var cx=c[0], cy=c[1];
      if (cx<0||cx>=GRID_W||cy<0||cy>=GRID_H) return;
      var i = idx(cx,cy);
      var val = on ? "1" : "0";
      if (bits[i] !== val){ bits[i] = val; changed = true; }
    });
    if (changed){
      setBits(currentChar, bits.join(""));
      drawGrid();
      refreshPaletteState();
      renderPreview();
      autosave();
    }
  }

  var pointerDown = false;
  var drawMode = true; // true = paint on, false = erase (determined by first cell state)

  function canvasPosToCell(clientX, clientY){
    var rect = gridCanvas.getBoundingClientRect();
    var scaleX = gridCanvas.width / rect.width;
    var scaleY = gridCanvas.height / rect.height;
    var px = (clientX - rect.left) * scaleX;
    var py = (clientY - rect.top) * scaleY;
    return { x: Math.floor(px / CELL), y: Math.floor(py / CELL) };
  }

  function handlePointerStart(e){
    pointerDown = true;
    pushUndo(currentChar);
    var cell = canvasPosToCell(e.clientX, e.clientY);
    var bits = getBits(currentChar);
    var i = idx(cell.x, cell.y);
    if (cell.x>=0 && cell.x<GRID_W && cell.y>=0 && cell.y<GRID_H){
      drawMode = bits.charAt(i) !== "1"; // if currently off, we're painting on
      setPixel(cell.x, cell.y, drawMode);
    }
    if (gridCanvas.setPointerCapture && e.pointerId != null){
      try{ gridCanvas.setPointerCapture(e.pointerId); }catch(err){}
    }
    e.preventDefault();
  }
  function handlePointerMove(e){
    if (!pointerDown) return;
    var cell = canvasPosToCell(e.clientX, e.clientY);
    setPixel(cell.x, cell.y, drawMode);
    e.preventDefault();
  }
  function handlePointerEnd(e){
    pointerDown = false;
  }

  gridCanvas.addEventListener("pointerdown", handlePointerStart);
  gridCanvas.addEventListener("pointermove", handlePointerMove);
  window.addEventListener("pointerup", handlePointerEnd);
  window.addEventListener("pointercancel", handlePointerEnd);

  // brush size toggle
  document.getElementById("brush1").addEventListener("click", function(){ setBrush(1); });
  document.getElementById("brush2").addEventListener("click", function(){ setBrush(2); });
  function setBrush(n){
    brushSize = n;
    document.getElementById("brush1").classList.toggle("active", n===1);
    document.getElementById("brush2").classList.toggle("active", n===2);
  }

  // glyph tools
  document.getElementById("clearBtn").addEventListener("click", function(){
    pushUndo(currentChar);
    setBits(currentChar, blankBits());
    drawGrid(); refreshPaletteState(); renderPreview(); autosave();
    showToast("Glyph cleared");
  });
  document.getElementById("invertBtn").addEventListener("click", function(){
    pushUndo(currentChar);
    var bits = getBits(currentChar).split("").map(function(b){ return b==="1"?"0":"1"; }).join("");
    setBits(currentChar, bits);
    drawGrid(); refreshPaletteState(); renderPreview(); autosave();
    showToast("Glyph inverted");
  });
  document.getElementById("mirrorBtn").addEventListener("click", function(){
    pushUndo(currentChar);
    var bits = getBits(currentChar);
    var out = new Array(GRID_W*GRID_H);
    for (var y=0;y<GRID_H;y++){
      for (var x=0;x<GRID_W;x++){
        out[idx(x,y)] = bits.charAt(idx(GRID_W-1-x, y));
      }
    }
    setBits(currentChar, out.join(""));
    drawGrid(); refreshPaletteState(); renderPreview(); autosave();
    showToast("Glyph mirrored");
  });
  document.getElementById("undoBtn").addEventListener("click", function(){ doUndo(); });
  function doUndo(){
    if (undoStack[currentChar] != null){
      setBits(currentChar, undoStack[currentChar]);
      delete undoStack[currentChar];
      drawGrid(); refreshPaletteState(); renderPreview(); autosave();
      showToast("Undone");
    }
  }

  // ---------- Seed from system font ----------
  function renderCharToBits(ch){
    var off = document.createElement("canvas");
    // render at higher resolution then downsample by averaging into GRID_W x GRID_H
    var supersample = 4;
    off.width = GRID_W * supersample;
    off.height = GRID_H * supersample;
    var octx = off.getContext("2d");
    octx.clearRect(0,0,off.width, off.height);
    octx.fillStyle = "#000";
    octx.fillRect(0,0,off.width, off.height);
    octx.fillStyle = "#fff";
    octx.textAlign = "center";
    octx.textBaseline = "alphabetic";
    var fontPx = Math.floor(off.height * 0.78);
    octx.font = "bold " + fontPx + "px system-ui, sans-serif";
    if (ch !== " "){
      // baseline positioned so glyph sits nicely in the cell, roughly at 80% height
      octx.fillText(ch, off.width/2, off.height*0.82);
    }
    var data;
    try{
      data = octx.getImageData(0,0,off.width, off.height).data;
    }catch(err){
      return blankBits();
    }
    var bits = new Array(GRID_W*GRID_H).fill("0");
    var threshold = 60; // average alpha/brightness threshold
    for (var gy=0; gy<GRID_H; gy++){
      for (var gx=0; gx<GRID_W; gx++){
        var sum = 0, count=0;
        for (var sy=0; sy<supersample; sy++){
          for (var sx=0; sx<supersample; sx++){
            var px = gx*supersample+sx;
            var py = gy*supersample+sy;
            var pi = (py*off.width+px)*4;
            // use red channel as brightness (fill is white on black)
            sum += data[pi];
            count++;
          }
        }
        var avg = sum / count;
        bits[idx(gx,gy)] = avg > threshold ? "1" : "0";
      }
    }
    return bits.join("");
  }

  document.getElementById("genFontBtn").addEventListener("click", function(){
    CHARS.forEach(function(ch){
      setBits(ch, renderCharToBits(ch));
    });
    drawGrid();
    refreshPaletteState();
    renderPreview();
    autosave();
    showToast("Starter font generated");
  });

  document.getElementById("resetGlyphBtn").addEventListener("click", function(){
    pushUndo(currentChar);
    setBits(currentChar, renderCharToBits(currentChar));
    drawGrid();
    refreshPaletteState();
    renderPreview();
    autosave();
    showToast("Reset " + label(currentChar) + " from system font");
  });

  // ---------- Live Preview ----------
  function renderPreview(){
    var text = previewText.value || "";
    var scale = previewScale;
    var spacing = previewSpacing;
    var glyphWpx = GRID_W * scale;
    var glyphHpx = GRID_H * scale;
    var totalW = text.length > 0 ? text.length * (glyphWpx + spacing) - spacing : 0;
    totalW = Math.max(totalW, 10);
    var pad = 20;

    // resize canvas to fit content (bounded), keep min size
    var cw = Math.max(previewCanvas.parentElement ? previewCanvas.clientWidth : 640, 300);
    previewCanvas.width = Math.max(cw, 300);
    previewCanvas.height = Math.max(glyphHpx + pad*2, 120);

    pctx.clearRect(0,0,previewCanvas.width, previewCanvas.height);
    pctx.fillStyle = "#1a140f";
    pctx.fillRect(0,0,previewCanvas.width, previewCanvas.height);

    var startX = pad;
    var startY = (previewCanvas.height - glyphHpx) / 2;

    // if content wider than canvas, just draw from left (allow overflow, canvas won't scroll but that's ok visually clipped)
    pctx.fillStyle = previewColor;
    for (var ci=0; ci<text.length; ci++){
      var ch = text[ci];
      var chUpper = state.glyphs.hasOwnProperty(ch) ? ch : (state.glyphs.hasOwnProperty(ch.toUpperCase()) ? ch.toUpperCase() : ch);
      var bits = state.glyphs[chUpper];
      var ox = startX + ci*(glyphWpx+spacing);
      if (bits){
        for (var y=0;y<GRID_H;y++){
          for (var x=0;x<GRID_W;x++){
            if (bits.charAt(idx(x,y)) === "1"){
              pctx.fillRect(ox + x*scale, startY + y*scale, scale, scale);
            }
          }
        }
      } else if (ch !== " ") {
        // placeholder box for undefined char
        pctx.save();
        pctx.strokeStyle = "rgba(255,255,255,0.25)";
        pctx.lineWidth = 1;
        pctx.strokeRect(ox+1, startY+1, glyphWpx-2, glyphHpx-2);
        pctx.restore();
      }
    }
  }

  previewText.addEventListener("input", renderPreview);
  window.addEventListener("resize", renderPreview);

  scaleSlider.addEventListener("input", function(){
    previewScale = parseInt(scaleSlider.value, 10);
    scaleVal.textContent = previewScale + "px";
    renderPreview();
  });
  spacingSlider.addEventListener("input", function(){
    previewSpacing = parseInt(spacingSlider.value, 10);
    spacingVal.textContent = previewSpacing + "px";
    renderPreview();
  });

  var swatches = document.querySelectorAll(".swatch");
  swatches.forEach(function(sw){
    sw.addEventListener("click", function(){
      previewColor = sw.dataset.color;
      swatches.forEach(function(s){ s.classList.remove("active"); });
      sw.classList.add("active");
      colorPicker.value = previewColor;
      renderPreview();
    });
  });
  colorPicker.addEventListener("input", function(){
    previewColor = colorPicker.value;
    swatches.forEach(function(s){ s.classList.remove("active"); });
    renderPreview();
  });

  // ---------- Export PNG spritesheet ----------
  function buildSpritesheetCanvas(){
    var definedChars = CHARS.filter(function(ch){
      var b = state.glyphs[ch];
      return b && b.indexOf("1") !== -1;
    });
    if (definedChars.length === 0) definedChars = CHARS.slice(0, 4); // avoid a totally empty sheet

    var cols = 10;
    var rows = Math.ceil(definedChars.length / cols);
    var cellScale = 8;
    var glyphW = GRID_W*cellScale, glyphH = GRID_H*cellScale;
    var labelH = 16;
    var cellPad = 8;
    var cellW = glyphW + cellPad*2;
    var cellH = glyphH + labelH + cellPad*2;

    var sheet = document.createElement("canvas");
    sheet.width = cols * cellW;
    sheet.height = rows * cellH;
    var sctx = sheet.getContext("2d");
    sctx.fillStyle = "#1a140f";
    sctx.fillRect(0,0,sheet.width, sheet.height);

    definedChars.forEach(function(ch, i){
      var col = i % cols, row = Math.floor(i/cols);
      var ox = col*cellW + cellPad;
      var oy = row*cellH + cellPad;
      var bits = getBits(ch);
      sctx.fillStyle = "#e8a33d";
      for (var y=0;y<GRID_H;y++){
        for (var x=0;x<GRID_W;x++){
          if (bits.charAt(idx(x,y))==="1"){
            sctx.fillRect(ox + x*cellScale, oy + y*cellScale, cellScale, cellScale);
          }
        }
      }
      sctx.strokeStyle = "rgba(255,255,255,0.15)";
      sctx.strokeRect(ox-1, oy-1, glyphW+2, glyphH+2);
      sctx.fillStyle = "#f4e9d8";
      sctx.font = "12px system-ui, sans-serif";
      sctx.textAlign = "center";
      sctx.fillText(label(ch), ox + glyphW/2, oy + glyphH + labelH - 2);
    });

    return sheet;
  }

  function downloadDataUrl(dataUrl, filename){
    var a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  document.getElementById("exportPngBtn").addEventListener("click", function(){
    var sheet = buildSpritesheetCanvas();
    sheet.toBlob(function(blob){
      if (!blob || blob.size < 50){
        showToast("Export failed — try drawing some glyphs first");
        return;
      }
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = (state.name || "font").replace(/[^a-z0-9\-_]+/gi,"_") + "-spritesheet.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
      showToast("PNG spritesheet exported");
    }, "image/png");
  });

  // ---------- Export / Import JSON ----------
  function exportJsonPayload(){
    return {
      name: state.name || "Untitled Font",
      gridW: GRID_W,
      gridH: GRID_H,
      glyphs: state.glyphs
    };
  }

  document.getElementById("exportJsonBtn").addEventListener("click", function(){
    var payload = exportJsonPayload();
    var json = JSON.stringify(payload, null, 2);
    var blob = new Blob([json], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (state.name || "font").replace(/[^a-z0-9\-_]+/gi,"_") + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    showToast("JSON exported");
  });

  document.getElementById("importJsonBtn").addEventListener("click", function(){
    document.getElementById("importFile").click();
  });
  document.getElementById("importFile").addEventListener("change", function(e){
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        if (!data || typeof data.glyphs !== "object"){
          throw new Error("Invalid font file");
        }
        state.name = data.name || "Imported Font";
        state.glyphs = data.glyphs || {};
        fontNameInput.value = state.name;
        selectChar(currentChar);
        renderPreview();
        autosave();
        showToast("Font imported: " + state.name);
      }catch(err){
        showToast("Import failed: invalid JSON");
      }
      document.getElementById("importFile").value = "";
    };
    reader.readAsText(file);
  });

  // ---------- Library (localStorage) ----------
  function loadLibrary(){
    try{
      var raw = localStorage.getItem(LS_LIBRARY_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(err){ return []; }
  }
  function saveLibrary(list){
    try{
      localStorage.setItem(LS_LIBRARY_KEY, JSON.stringify(list));
    }catch(err){}
  }

  var activeLibId = null;

  function renderLibList(){
    var list = loadLibrary();
    libList.innerHTML = "";
    if (list.length === 0){
      var empty = document.createElement("div");
      empty.className = "hint";
      empty.textContent = "No saved fonts yet. Save your current work below.";
      libList.appendChild(empty);
      return;
    }
    list.forEach(function(item){
      var row = document.createElement("div");
      row.className = "lib-item" + (item.id === activeLibId ? " current" : "");

      var nameEl = document.createElement("div");
      nameEl.className = "lib-item-name";
      nameEl.textContent = item.name;
      nameEl.title = "Click to load";
      nameEl.addEventListener("click", function(){ loadFromLibrary(item.id); });

      var actions = document.createElement("div");
      actions.className = "lib-item-actions";

      var dupBtn = document.createElement("button");
      dupBtn.className = "icon-btn";
      dupBtn.textContent = "⧉";
      dupBtn.title = "Duplicate";
      dupBtn.addEventListener("click", function(ev){ ev.stopPropagation(); duplicateInLibrary(item.id); });

      var renameBtn = document.createElement("button");
      renameBtn.className = "icon-btn";
      renameBtn.textContent = "✎";
      renameBtn.title = "Rename";
      renameBtn.addEventListener("click", function(ev){ ev.stopPropagation(); renameInLibrary(item.id); });

      var delBtn = document.createElement("button");
      delBtn.className = "icon-btn";
      delBtn.textContent = "✕";
      delBtn.title = "Delete";
      delBtn.addEventListener("click", function(ev){ ev.stopPropagation(); deleteFromLibrary(item.id); });

      actions.appendChild(dupBtn);
      actions.appendChild(renameBtn);
      actions.appendChild(delBtn);
      row.appendChild(nameEl);
      row.appendChild(actions);
      libList.appendChild(row);
    });
  }

  function genId(){
    return "f" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }

  document.getElementById("saveFontBtn").addEventListener("click", function(){
    state.name = fontNameInput.value.trim() || "Untitled Font";
    var list = loadLibrary();
    var id = activeLibId;
    var existing = id ? list.find(function(i){ return i.id === id; }) : null;
    if (existing){
      existing.name = state.name;
      existing.glyphs = state.glyphs;
      existing.updatedAt = Date.now();
    } else {
      id = genId();
      list.push({ id: id, name: state.name, glyphs: JSON.parse(JSON.stringify(state.glyphs)), updatedAt: Date.now() });
      activeLibId = id;
    }
    saveLibrary(list);
    renderLibList();
    autosave();
    showToast("Saved \"" + state.name + "\"");
  });

  function loadFromLibrary(id){
    var list = loadLibrary();
    var item = list.find(function(i){ return i.id === id; });
    if (!item) return;
    state.name = item.name;
    state.glyphs = JSON.parse(JSON.stringify(item.glyphs));
    activeLibId = id;
    fontNameInput.value = state.name;
    selectChar(currentChar);
    renderPreview();
    renderLibList();
    autosave();
    showToast("Loaded \"" + item.name + "\"");
  }

  function duplicateInLibrary(id){
    var list = loadLibrary();
    var item = list.find(function(i){ return i.id === id; });
    if (!item) return;
    var copy = { id: genId(), name: item.name + " copy", glyphs: JSON.parse(JSON.stringify(item.glyphs)), updatedAt: Date.now() };
    list.push(copy);
    saveLibrary(list);
    renderLibList();
    showToast("Duplicated \"" + item.name + "\"");
  }

  function renameInLibrary(id){
    var list = loadLibrary();
    var item = list.find(function(i){ return i.id === id; });
    if (!item) return;
    var newName = window.prompt("Rename font:", item.name);
    if (newName == null) return;
    newName = newName.trim();
    if (!newName) return;
    item.name = newName;
    saveLibrary(list);
    if (activeLibId === id){
      state.name = newName;
      fontNameInput.value = newName;
    }
    renderLibList();
  }

  function deleteFromLibrary(id){
    var list = loadLibrary();
    var item = list.find(function(i){ return i.id === id; });
    if (!item) return;
    if (!window.confirm("Delete \"" + item.name + "\"? This cannot be undone.")) return;
    list = list.filter(function(i){ return i.id !== id; });
    saveLibrary(list);
    if (activeLibId === id) activeLibId = null;
    renderLibList();
    showToast("Deleted");
  }

  // ---------- Autosave ----------
  var autosaveTimer = null;
  function autosave(){
    if (autosaveTimer) clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(function(){
      try{
        localStorage.setItem(LS_AUTOSAVE_KEY, JSON.stringify({
          name: state.name,
          glyphs: state.glyphs,
          currentChar: currentChar,
          activeLibId: activeLibId
        }));
      }catch(err){}
    }, 200);
  }

  function loadAutosave(){
    try{
      var raw = localStorage.getItem(LS_AUTOSAVE_KEY);
      if (!raw) return false;
      var data = JSON.parse(raw);
      if (!data || typeof data.glyphs !== "object") return false;
      state.name = data.name || "Untitled Font";
      state.glyphs = data.glyphs || {};
      currentChar = data.currentChar && CHARS.indexOf(data.currentChar) !== -1 ? data.currentChar : "A";
      activeLibId = data.activeLibId || null;
      return true;
    }catch(err){ return false; }
  }

  // ---------- Toast ----------
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1800);
  }

  // ---------- Keyboard shortcuts ----------
  window.addEventListener("keydown", function(e){
    // don't hijack when typing in inputs
    var tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA") return;

    if (e.key === "ArrowRight"){
      var i1 = CHARS.indexOf(currentChar);
      selectChar(CHARS[(i1+1) % CHARS.length]);
      e.preventDefault();
    } else if (e.key === "ArrowLeft"){
      var i2 = CHARS.indexOf(currentChar);
      selectChar(CHARS[(i2-1+CHARS.length) % CHARS.length]);
      e.preventDefault();
    } else if (e.key === "c" || e.key === "C"){
      document.getElementById("clearBtn").click();
    } else if (e.key === "i" || e.key === "I"){
      document.getElementById("invertBtn").click();
    } else if (e.key === "u" || e.key === "U"){
      doUndo();
    }
  });

  // ---------- Init ----------
  function init(){
    buildPalette();
    var hadAutosave = loadAutosave();
    fontNameInput.value = state.name;
    selectChar(currentChar);
    drawGrid();
    renderPreview();
    renderLibList();
    if (!hadAutosave){
      showToast("Welcome — click cells to draw, or generate a starter font");
    }
  }

  init();
})();
</script>
</body>
</html>
