<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kinetic Type Studio · Playground Day 16</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--panel:#0d0d12;
  --border:#1a1a24;--border2:#242430;
  --text:#e8e8f4;--dim:#666;--dim2:#444;
  --accent:#ec4899;--accent2:#be185d;
  --r:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif}
#app{display:flex;flex-direction:column;height:100%}

/* ── Top controls bar ── */
#topbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;
}
#topbar::-webkit-scrollbar{display:none}

#text-input{
  flex:1;min-width:120px;max-width:280px;
  background:#0a0a10;border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-size:13px;padding:6px 10px;
  font-family:inherit;outline:none;transition:border .2s;
}
#text-input:focus{border-color:var(--accent)}

.sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}

.mode-btn{
  flex-shrink:0;padding:5px 11px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--dim);font-size:11px;font-weight:600;
  letter-spacing:.06em;cursor:pointer;font-family:inherit;transition:all .2s;
}
.mode-btn.active,.mode-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.pal-dot{
  width:20px;height:20px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;flex-shrink:0;transition:all .2s;
}
.pal-dot.active{border-color:#fff;transform:scale(1.2)}
.pal-dot:hover{transform:scale(1.1)}

/* ── Canvas ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000}
canvas{display:block;cursor:pointer}
canvas:active{cursor:grabbing}

/* ── Bottom bar ── */
#bottombar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;justify-content:space-between;
  padding:6px 12px;background:var(--surface);border-top:1px solid var(--border);
}
.ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl{display:flex;align-items:center;gap:6px}
.ctrl label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.ctrl span{font-size:11px;color:var(--text);min-width:30px}
input[type=range]{
  width:80px;-webkit-appearance:none;appearance:none;
  height:3px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}

.act-btn{
  padding:5px 12px;border-radius:var(--r);border:1px solid var(--border2);
  background:var(--border2);color:var(--text);font-size:11px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:5px;
}
.act-btn:hover{background:var(--border);border-color:#333}
.act-btn.primary{background:var(--accent);border-color:var(--accent)}
.act-btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}

/* ── Toast ── */
#toast{
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border2);border-radius:8px;
  padding:7px 16px;font-size:12px;color:var(--text);
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99;
}
#toast.show{opacity:1}

/* ── Mobile ── */
@media(max-width:600px){
  #bottombar{flex-direction:column;align-items:stretch;gap:6px}
  .ctrl-row{justify-content:center}
  #text-input{max-width:100%}
}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar: text input, modes, palettes -->
  <div id="topbar">
    <input id="text-input" type="text" value="KINETIC TYPE" maxlength="32" placeholder="Type something…" autocomplete="off" spellcheck="false">
    <div class="sep"></div>
    <button class="mode-btn active" data-mode="wave">WAVE</button>
    <button class="mode-btn" data-mode="scatter">SCATTER</button>
    <button class="mode-btn" data-mode="orbit">ORBIT</button>
    <button class="mode-btn" data-mode="rain">RAIN</button>
    <button class="mode-btn" data-mode="pulse">PULSE</button>
    <div class="sep"></div>
    <div id="palettes"></div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <!-- Bottom bar: font controls, actions -->
  <div id="bottombar">
    <div class="ctrl-row">
      <div class="ctrl">
        <label>Size</label>
        <input type="range" id="sl-size" min="20" max="120" value="64">
        <span id="v-size">64</span>
      </div>
      <div class="ctrl">
        <label>Weight</label>
        <input type="range" id="sl-weight" min="100" max="900" step="100" value="700">
        <span id="v-weight">700</span>
      </div>
      <div class="ctrl">
        <label>Spacing</label>
        <input type="range" id="sl-spacing" min="0" max="60" value="8">
        <span id="v-spacing">8</span>
      </div>
      <div class="ctrl">
        <label>Speed</label>
        <input type="range" id="sl-speed" min="1" max="10" value="5">
        <span id="v-speed">5</span>
      </div>
    </div>
    <div class="ctrl-row">
      <button class="act-btn" onclick="triggerEffect()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Trigger
      </button>
      <button class="act-btn" onclick="exportPNG()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PNG
      </button>
      <button class="act-btn" onclick="shareURL()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Palettes ──────────────────────────────────────────────────────────────────
const PALETTES = [
  { name:'Rose',    bg:'#0a0005', txt:['#f472b6','#ec4899','#db2777','#fbcfe8'] },
  { name:'Neon',    bg:'#02000d', txt:['#a78bfa','#8b5cf6','#7c3aed','#c4b5fd'] },
  { name:'Acid',    bg:'#020a00', txt:['#4ade80','#22c55e','#16a34a','#a7f3d0'] },
  { name:'Ice',     bg:'#000a12', txt:['#38bdf8','#0ea5e9','#0284c7','#bae6fd'] },
  { name:'Fire',    bg:'#0c0200', txt:['#f97316','#ef4444','#fbbf24','#fed7aa'] },
  { name:'Bone',    bg:'#f0eeea', txt:['#1c1c1e','#3a3a3e','#5a5a60','#9a9aa4'] },
];

// ─── State ────────────────────────────────────────────────────────────────────
let text = 'KINETIC TYPE';
let mode = 'wave';
let palIdx = 0;
let fontSize = 64, fontWeight = 700, letterSpacing = 8, speed = 5;
let letters = [];
let t = 0;
let triggered = false;
let triggerTime = 0;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── Letter class ──────────────────────────────────────────────────────────────
class Letter {
  constructor(char, tx, ty, idx, total) {
    this.char = char;
    this.tx = tx; this.ty = ty; // target
    this.idx = idx; this.total = total;
    this.x = tx; this.y = ty;
    this.vx = 0; this.vy = 0;
    this.angle = 0; this.va = 0;
    this.scale = 1; this.alpha = 1;
    this.phase = (idx / Math.max(total - 1, 1)) * Math.PI * 2;
    this.reset();
  }

  reset() {
    // Scatter to random off-screen position
    const R = Math.max(canvas.width, canvas.height) * 0.8;
    const ang = Math.random() * Math.PI * 2;
    this.x = canvas.width / 2 + Math.cos(ang) * R;
    this.y = canvas.height / 2 + Math.sin(ang) * R;
    this.angle = (Math.random() - 0.5) * Math.PI * 2;
    this.scale = 0.1;
    this.alpha = 0;
    this.vx = (this.tx - this.x) * 0.04;
    this.vy = (this.ty - this.y) * 0.04;
  }

  assemble(dt) {
    // Spring toward target
    const k = 0.12 * dt, damp = 0.88;
    this.vx += (this.tx - this.x) * k;
    this.vy += (this.ty - this.y) * k;
    this.vx *= damp; this.vy *= damp;
    this.x += this.vx; this.y += this.vy;
    this.angle *= 0.88;
    this.scale = Math.min(1, this.scale + 0.06 * dt);
    this.alpha = Math.min(1, this.alpha + 0.06 * dt);
  }

  updateWave(time) {
    const s = speed / 5;
    this.x = this.tx + Math.sin(time * 2.5 * s + this.phase) * (18 + fontSize * 0.15);
    this.y = this.ty + Math.cos(time * 1.8 * s + this.phase * 1.3) * (10 + fontSize * 0.08);
    this.angle = Math.sin(time * 2 * s + this.phase) * 0.12;
    this.scale = 1 + Math.sin(time * 3 * s + this.phase) * 0.06;
    this.alpha = 1;
  }

  updateScatter(time, triggerT) {
    if (!triggered) { this.updateWave(time * 0.3); return; }
    const elapsed = (time - triggerT) * (speed / 5);
    const BURST = 0.5, SETTLE = 2.5;
    if (elapsed < BURST) {
      // Explode outward
      const prog = elapsed / BURST;
      const ang = this.phase + Math.PI;
      const dist = (fontSize * 3 + Math.random() * fontSize * 4) * prog;
      this.x = this.tx + Math.cos(ang) * dist;
      this.y = this.ty + Math.sin(ang) * dist;
      this.angle = prog * Math.PI * (this.idx % 2 ? 1 : -1);
      this.scale = 1 - prog * 0.5;
      this.alpha = 1 - prog * 0.8;
    } else if (elapsed < SETTLE) {
      // Reassemble
      const prog = (elapsed - BURST) / (SETTLE - BURST);
      const eased = 1 - Math.pow(1 - prog, 3);
      const ang = this.phase + Math.PI;
      const dist = (fontSize * 3 + fontSize * 4) * (1 - eased);
      this.x = this.tx + Math.cos(ang) * dist;
      this.y = this.ty + Math.sin(ang) * dist;
      this.angle = (1 - eased) * Math.PI * (this.idx % 2 ? 1 : -1);
      this.scale = 0.5 + eased * 0.5;
      this.alpha = 0.2 + eased * 0.8;
    } else {
      this.x = this.tx; this.y = this.ty;
      this.angle = 0; this.scale = 1; this.alpha = 1;
    }
  }

  updateOrbit(time) {
    const s = speed / 5;
    const r = fontSize * 0.3;
    const spd = (1 + this.idx * 0.15) * s;
    this.x = this.tx + Math.cos(time * spd + this.phase) * r;
    this.y = this.ty + Math.sin(time * spd * 0.7 + this.phase) * r * 0.6;
    this.angle = Math.sin(time * spd * 1.5 + this.phase) * 0.15;
    this.scale = 1 + Math.cos(time * spd * 2 + this.phase) * 0.08;
    this.alpha = 1;
  }

  updateRain(time) {
    const s = speed / 5;
    // Slow vertical bob
    const offset = this.idx * 0.4;
    const cycleLen = 4 / s;
    const phase = ((time / cycleLen + offset / (this.total + 1)) % 1 + 1) % 1;
    const FALL = 0.55, SETTLE = 0.75, REST = 1;
    if (phase < FALL) {
      const p = phase / FALL;
      this.y = -fontSize + (this.ty + fontSize) * p * p;
      this.x = this.tx;
      this.alpha = p;
      this.scale = 0.6 + p * 0.4;
      this.angle = (1 - p) * (this.idx % 2 ? 0.3 : -0.3);
    } else if (phase < SETTLE) {
      const p = (phase - FALL) / (SETTLE - FALL);
      this.y = this.ty + Math.sin(p * Math.PI) * fontSize * 0.12;
      this.x = this.tx;
      this.alpha = 1;
      this.scale = 1 + Math.sin(p * Math.PI) * 0.1;
      this.angle = 0;
    } else {
      this.x = this.tx; this.y = this.ty;
      this.alpha = 1; this.scale = 1; this.angle = 0;
    }
  }

  updatePulse(time) {
    const s = speed / 5;
    const delay = this.idx * 0.08;
    const cyc = ((time * 1.2 * s - delay) % 2 + 2) % 2; // 0..2
    const p = cyc < 1 ? cyc : 2 - cyc; // 0..1..0 triangle wave
    const eased = Math.sin(p * Math.PI / 2);
    this.x = this.tx;
    this.y = this.ty - eased * fontSize * 0.4;
    this.scale = 1 + eased * 0.35;
    this.angle = eased * 0.12 * (this.idx % 2 ? 1 : -1);
    this.alpha = 0.5 + eased * 0.5;
  }

  draw(fontStr, colorFn) {
    if (this.alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.scale(this.scale, this.scale);
    ctx.font = fontStr;
    ctx.fillStyle = colorFn(this.idx, this.total);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// ─── Layout ───────────────────────────────────────────────────────────────────
function buildLetters(str) {
  const W = canvas.width, H = canvas.height;
  ctx.font = makeFontStr();
  const chars = str.split('').filter(c => c !== '\n');
  const spacing = letterSpacing;

  // Measure total width
  let totalWidth = 0;
  const widths = chars.map(ch => {
    const w = ctx.measureText(ch).width + spacing;
    totalWidth += w; return w;
  });
  totalWidth -= spacing; // don't add trailing spacing

  let cx = W / 2 - totalWidth / 2;
  const cy = H / 2;

  letters = chars.map((ch, i) => {
    const tx = cx + widths[i] / 2;
    const l = new Letter(ch, tx, cy, i, chars.length);
    cx += widths[i];
    return l;
  });
}

function makeFontStr() {
  return `${fontWeight} ${fontSize}px system-ui,-apple-system,sans-serif`;
}

function colorFn(idx, total) {
  const pal = PALETTES[palIdx];
  return pal.txt[idx % pal.txt.length];
}

// ─── Render loop ──────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  t += 0.016 * (speed / 5);

  const W = canvas.width, H = canvas.height;
  const pal = PALETTES[palIdx];

  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);

  const fontStr = makeFontStr();

  for (const l of letters) {
    if (mode === 'wave')    l.updateWave(t);
    else if (mode === 'scatter') l.updateScatter(t, triggerTime);
    else if (mode === 'orbit')  l.updateOrbit(t);
    else if (mode === 'rain')   l.updateRain(t);
    else if (mode === 'pulse')  l.updatePulse(t);
    l.draw(fontStr, colorFn);
  }
}

// ─── Trigger ──────────────────────────────────────────────────────────────────
function triggerEffect() {
  if (mode === 'scatter') {
    triggered = true; triggerTime = t;
  } else {
    // For other modes, rebuild letters with scatter-in animation
    buildLetters(text);
    letters.forEach(l => l.reset());
  }
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  buildLetters(text);
}

// ─── Export ───────────────────────────────────────────────────────────────────
function exportPNG() {
  const link = document.createElement('a');
  link.download = `kinetic-type-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('PNG exported!');
}

function shareURL() {
  const s = { t: text, m: mode, p: palIdx, sz: fontSize, w: fontWeight, sp: letterSpacing, spd: speed };
  const hash = btoa(JSON.stringify(s));
  const url = location.href.split('#')[0] + '#' + hash;
  navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => prompt('Copy link:', url));
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function saveState() {
  try { localStorage.setItem('kintype_v1', JSON.stringify({t:text,m:mode,p:palIdx,sz:fontSize,w:fontWeight,sp:letterSpacing,spd:speed})); } catch(e) {}
}

function loadState() {
  if (location.hash) {
    try {
      const s = JSON.parse(atob(location.hash.slice(1)));
      if (s.t) text = s.t.slice(0,32);
      if (s.m) mode = s.m;
      if (typeof s.p === 'number') palIdx = s.p;
      if (s.sz) fontSize = s.sz;
      if (s.w) fontWeight = s.w;
      if (s.sp !== undefined) letterSpacing = s.sp;
      if (s.spd) speed = s.spd;
      return;
    } catch(e) {}
  }
  try {
    const s = JSON.parse(localStorage.getItem('kintype_v1') || '{}');
    if (s.t) text = s.t;
    if (s.m) mode = s.m;
    if (typeof s.p === 'number') palIdx = s.p;
    if (s.sz) fontSize = s.sz;
    if (s.w) fontWeight = s.w;
    if (s.sp !== undefined) letterSpacing = s.sp;
    if (s.spd) speed = s.spd;
  } catch(e) {}
}

// ─── UI wiring ────────────────────────────────────────────────────────────────
// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    triggered = false;
    buildLetters(text);
    saveState();
  });
});

// Text input
document.getElementById('text-input').addEventListener('input', function() {
  text = this.value.toUpperCase() || 'TYPE';
  buildLetters(text);
  saveState();
});

// Sliders
function bindSlider(id, vid, getter, setter) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(vid);
  sl.value = getter();
  vl.textContent = getter();
  sl.addEventListener('input', () => {
    setter(+sl.value);
    vl.textContent = sl.value;
    buildLetters(text);
    saveState();
  });
}
bindSlider('sl-size',    'v-size',    () => fontSize,       v => { fontSize = v; });
bindSlider('sl-weight',  'v-weight',  () => fontWeight,     v => { fontWeight = v; });
bindSlider('sl-spacing', 'v-spacing', () => letterSpacing,  v => { letterSpacing = v; });
bindSlider('sl-speed',   'v-speed',   () => speed,          v => { speed = v; });

// Click canvas to trigger
canvas.addEventListener('click', () => triggerEffect());
canvas.addEventListener('touchend', e => { e.preventDefault(); triggerEffect(); });

// Palette dots
const palGrid = document.getElementById('palettes');
PALETTES.forEach((p, i) => {
  const dot = document.createElement('div');
  dot.className = 'pal-dot' + (i === palIdx ? ' active' : '');
  dot.title = p.name;
  dot.style.background = `linear-gradient(135deg,${p.txt[0]},${p.txt[2]||p.txt[1]})`;
  dot.addEventListener('click', () => {
    document.querySelectorAll('.pal-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    palIdx = i; saveState();
  });
  palGrid.appendChild(dot);
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadState();

// Sync UI to loaded state
document.getElementById('text-input').value = text;
document.querySelectorAll('.mode-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.mode === mode);
});
document.querySelectorAll('.pal-dot').forEach((d,i) => d.classList.toggle('active', i === palIdx));

const ro = new ResizeObserver(resize);
ro.observe(document.getElementById('canvas-wrap'));
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
