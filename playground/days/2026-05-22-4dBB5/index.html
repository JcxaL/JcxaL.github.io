<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Cloth Physics Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#07070e;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;touch-action:none}
#app{display:flex;flex-direction:column;height:100dvh}
#toolbar{display:flex;align-items:center;gap:5px;padding:7px 10px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.09);flex-shrink:0;flex-wrap:wrap;z-index:5}
.logo{font-size:13px;font-weight:700;background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:4px;white-space:nowrap}
.sep{width:1px;height:20px;background:rgba(255,255,255,0.12);margin:0 2px;flex-shrink:0}
.tbtn{display:inline-flex;align-items:center;gap:3px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#94a3b8;padding:4px 9px;border-radius:6px;cursor:pointer;font-size:11px;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;user-select:none;line-height:1.4}
.tbtn:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.tbtn.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
.tbtn.danger{background:rgba(220,38,38,0.2);border-color:rgba(220,38,38,0.4);color:#fca5a5}
.tbtn.action{background:rgba(6,182,212,0.15);border-color:rgba(6,182,212,0.35);color:#67e8f9}
#main{display:flex;flex:1;min-height:0}
#sidebar{width:190px;background:rgba(255,255,255,0.02);border-right:1px solid rgba(255,255,255,0.07);padding:10px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;flex-shrink:0}
.slbl{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:#475569;font-weight:700;margin-bottom:1px}
.srow{display:flex;flex-direction:column;gap:2px}
.srow .ll{display:flex;justify-content:space-between;font-size:11px;color:#64748b}
.srow .ll span{color:#a78bfa;font-weight:600;min-width:30px;text-align:right}
input[type=range]{width:100%;accent-color:#7c3aed;cursor:pointer}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pbtn{border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);color:#64748b;padding:6px 3px;border-radius:7px;cursor:pointer;font-size:10px;text-align:center;transition:all .15s;user-select:none}
.pbtn:hover{background:rgba(255,255,255,0.08);color:#cbd5e1}
.pbtn.active{border-color:#06b6d4;color:#22d3ee;background:rgba(6,182,212,0.1)}
.mbtns{display:flex;flex-direction:column;gap:4px}
.abtn{border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);color:#64748b;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:11px;transition:all .15s;width:100%;text-align:center}
.abtn:hover{background:rgba(255,255,255,0.09);color:#e2e8f0}
.abtn.pri{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.5);color:#c084fc}
.abtn.pri:hover{background:#7c3aed;color:#fff}
#cw{flex:1;position:relative;min-width:0;overflow:hidden}
canvas{display:block;width:100%;height:100%;cursor:crosshair}
#hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:#334155;pointer-events:none;transition:opacity .3s}
@media(max-width:560px){#sidebar{display:none}}
</style>
</head>
<body>
<div id="app">
<div id="toolbar">
  <span class="logo">🧵 Cloth Studio</span>
  <div class="sep"></div>
  <button class="tbtn active" id="t-pin" title="Click point to pin/unpin">📌 Pin</button>
  <button class="tbtn" id="t-cut" title="Drag to cut cloth">✂️ Cut</button>
  <button class="tbtn" id="t-grab" title="Drag to move cloth">✋ Grab</button>
  <div class="sep"></div>
  <button class="tbtn action" id="t-gust" title="Wind burst">💨 Gust</button>
  <button class="tbtn action" id="t-shake" title="Shake cloth">🌊 Shake</button>
  <div class="sep"></div>
  <button class="tbtn" id="t-shaded">Shaded</button>
  <button class="tbtn" id="t-wire">Wire</button>
  <div class="sep"></div>
  <button class="tbtn action" id="t-export" title="Export PNG">📷 PNG</button>
  <button class="tbtn" id="t-reset" title="Reset cloth">↺ Reset</button>
</div>
<div id="main">
<aside id="sidebar">
  <div>
    <div class="slbl">Preset</div>
    <div class="pgrid">
      <button class="pbtn active" id="p-flag">🚩 Flag</button>
      <button class="pbtn" id="p-curtain">🪟 Curtain</button>
      <button class="pbtn" id="p-hammock">🛌 Hammock</button>
      <button class="pbtn" id="p-table">📋 Cloth</button>
    </div>
  </div>
  <div>
    <div class="slbl">Physics</div>
    <div class="srow"><div class="ll">Gravity<span id="vg">0.50</span></div>
      <input type="range" id="sg" min="0" max="1.5" step="0.05" value="0.5"></div>
    <div class="srow"><div class="ll">Wind<span id="vw">0.80</span></div>
      <input type="range" id="sw" min="-2" max="2" step="0.1" value="0.8"></div>
    <div class="srow"><div class="ll">Turbulence<span id="vt">0.30</span></div>
      <input type="range" id="st" min="0" max="1" step="0.05" value="0.3"></div>
    <div class="srow"><div class="ll">Stiffness<span id="vs">12</span></div>
      <input type="range" id="ss" min="3" max="30" step="1" value="12"></div>
    <div class="srow"><div class="ll">Damping<span id="vd">0.982</span></div>
      <input type="range" id="sd" min="0.92" max="0.999" step="0.001" value="0.982"></div>
  </div>
  <div>
    <div class="slbl">Render</div>
    <div class="mbtns">
      <button class="abtn" id="m-shaded">Shaded (strain map)</button>
      <button class="abtn" id="m-wire">Wireframe</button>
      <button class="abtn" id="m-debug">Debug (points)</button>
    </div>
  </div>
  <div>
    <div class="slbl">Save</div>
    <button class="abtn pri" id="a-export">📷 Export PNG</button>
    <br><br>
    <button class="abtn" id="a-save">💾 Save Pins</button>
    <br><br>
    <button class="abtn" id="a-load">📂 Load Pins</button>
  </div>
</aside>
<div id="cw"><canvas id="c"></canvas><div id="hint">📌 Click a point to pin it · ✂️ Drag to cut · ✋ Drag to grab</div></div>
</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('cw');

// --- Simulation state ---
const COLS = 28, ROWS = 20;
let W = 0, H = 0, restLen = 0;
let points = [], allSticks = [];
let hGrid = [], vGrid = []; // hGrid[r][c], vGrid[r][c]
let currentPreset = 'flag';
let renderMode = 'shaded';
let currentTool = 'pin';
let phys = { g: 0.5, wind: 0.8, turb: 0.3, stiff: 12, damp: 0.982 };
let gustTimer = 0, shakeTimer = 0, time = 0;
let animId = null;

// Interaction
let isDown = false, mouseX = -1, mouseY = -1;
let grabbed = null;
let cutTrail = [];
let nearHint = null;

// --- Classes ---
class Pt {
  constructor(x, y, pinned, idx) {
    this.x = x; this.y = y;
    this.ox = x; this.oy = y;
    this.pinned = pinned;
    this.idx = idx;
  }
}

class Stick {
  constructor(a, b) {
    this.a = a; this.b = b;
    this.rest = Math.hypot(b.x - a.x, b.y - a.y);
    this.on = true;
  }
  get strain() {
    if (!this.on) return 0;
    return Math.abs(Math.hypot(this.b.x - this.a.x, this.b.y - this.a.y) / this.rest - 1);
  }
}

// --- Canvas sizing ---
function resize() {
  const r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(W * dpr);
  canvas.height = Math.floor(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// --- Cloth init ---
function pt(c, r) { return points[r * COLS + c]; }

function initCloth(preset) {
  currentPreset = preset;
  points = []; allSticks = [];
  hGrid = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
  vGrid = Array.from({length: ROWS}, () => new Array(COLS).fill(null));

  const maxCW = W * 0.82, maxCH = H * 0.80;
  restLen = Math.min(maxCW / (COLS - 1), maxCH / (ROWS - 1));

  const clothW = restLen * (COLS - 1), clothH = restLen * (ROWS - 1);
  let ox = 0, oy = 0;
  switch (preset) {
    case 'flag':    ox = W * 0.10; oy = H * 0.08; break;
    case 'curtain': ox = (W - clothW) / 2; oy = H * 0.04; break;
    case 'hammock': ox = W * 0.08; oy = H * 0.12; break;
    case 'table':   ox = (W - clothW) / 2; oy = H * 0.06; break;
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let x = ox + c * restLen, y = oy + r * restLen, pinned = false;
      switch (preset) {
        case 'flag':    pinned = (c === 0); break;
        case 'curtain': pinned = (r === 0); break;
        case 'hammock': pinned = (r === 0 && (c === 0 || c === COLS - 1)); break;
        case 'table':
          pinned = (r === 0 && (c === 0 || c === COLS - 1 ||
                   c === Math.round(COLS * 0.33) || c === Math.round(COLS * 0.66)));
          break;
      }
      // Small jitter for flag to break symmetry
      if (preset === 'flag' && !pinned) { y += (Math.random() - 0.5) * 1.5; }
      points.push(new Pt(x, y, pinned, points.length));
    }
  }

  // Horizontal sticks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const s = new Stick(pt(c, r), pt(c + 1, r));
      hGrid[r][c] = s; allSticks.push(s);
    }
  }
  // Vertical sticks
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS; c++) {
      const s = new Stick(pt(c, r), pt(c, r + 1));
      vGrid[r][c] = s; allSticks.push(s);
    }
  }
  // Shear sticks (diagonals) for stability
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      allSticks.push(new Stick(pt(c, r), pt(c + 1, r + 1)));
      allSticks.push(new Stick(pt(c + 1, r), pt(c, r + 1)));
    }
  }

  // Restore saved pins if any
  try {
    const saved = localStorage.getItem('cloth_pins_' + preset);
    if (saved) {
      const arr = JSON.parse(saved);
      arr.forEach((v, i) => { if (i < points.length) points[i].pinned = v; });
    }
  } catch(e) {}
}

// --- Physics update ---
function update() {
  time++;
  if (gustTimer > 0) gustTimer--;
  if (shakeTimer > 0) shakeTimer--;

  const t = time * 0.015;
  const damp = phys.damp;
  const g = phys.g;

  for (const p of points) {
    if (p.pinned) continue;
    if (p === grabbed) {
      // Move toward mouse
      p.ox = p.x - (mouseX - p.x) * 0.3;
      p.oy = p.y - (mouseY - p.y) * 0.3;
      p.x = mouseX;
      p.y = mouseY;
      continue;
    }

    // Turbulent wind using layered sin
    const nx = Math.sin(p.y * 0.04 + t * 1.9 + p.idx * 0.001) *
               Math.cos(p.x * 0.035 + t * 1.3);
    const ny = Math.cos(p.y * 0.05 + t * 1.6) *
               Math.sin(p.x * 0.04 + t * 2.1 + p.idx * 0.0005);
    const wx = phys.wind + nx * phys.turb * 2.0;
    const wy = ny * phys.turb * 0.6;

    const gustX = gustTimer > 0 ? 14 * Math.sign(phys.wind || 1) * (gustTimer / 60) : 0;
    const shX = shakeTimer > 0 ? (Math.random() - 0.5) * 12 : 0;
    const shY = shakeTimer > 0 ? (Math.random() - 0.5) * 10 : 0;

    const vx = (p.x - p.ox) * damp;
    const vy = (p.y - p.oy) * damp;
    p.ox = p.x; p.oy = p.y;
    p.x += vx + (wx + gustX + shX) * 0.45;
    p.y += vy + (g + wy + shY) * 0.45;
  }

  // Boundary constraint
  for (const p of points) {
    if (p.pinned || p === grabbed) continue;
    if (p.x < 0) { p.ox = p.x = 0; }
    if (p.x > W) { p.ox = p.x = W; }
    if (p.y < 0) { p.oy = p.y = 0; }
    if (p.y > H) { p.oy = p.oy - (p.y - H) * 0.5; p.y = H; }
  }

  // Constraint solving
  const iters = phys.stiff;
  for (let i = 0; i < iters; i++) {
    for (const s of allSticks) {
      if (!s.on) continue;
      const a = s.a, b = s.b;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      if (d < 1e-8) continue;
      const f = (d - s.rest) / d * 0.5;
      const mx = dx * f, my = dy * f;
      if (!a.pinned && a !== grabbed) { a.x += mx; a.y += my; }
      if (!b.pinned && b !== grabbed) { b.x -= mx; b.y -= my; }
    }
  }
}

// --- Rendering ---
function strainColor(strain, area) {
  const t = Math.min(1, strain * 6);
  const h = 220 - t * 220;
  const s = 55 + t * 35;
  const refA = restLen * restLen;
  const bright = Math.min(1, Math.max(0.35, area / refA));
  const l = (30 + t * 25) * (0.4 + bright * 0.6);
  return `hsl(${h|0},${s|0}%,${Math.min(62, l)|0}%)`;
}

function quadArea(p00, p10, p11, p01) {
  const d1x = p11.x - p00.x, d1y = p11.y - p00.y;
  const d2x = p01.x - p10.x, d2y = p01.y - p10.y;
  return 0.5 * Math.abs(d1x * d2y - d1y * d2x);
}

function render() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#07070e');
  bg.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  if (renderMode === 'shaded') {
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS - 1; c++) {
        const ht = hGrid[r][c], hb = hGrid[r + 1][c];
        const vl = vGrid[r][c], vr = vGrid[r][c + 1];
        if (!ht?.on || !hb?.on || !vl?.on || !vr?.on) continue;

        const p00 = pt(c, r), p10 = pt(c + 1, r);
        const p01 = pt(c, r + 1), p11 = pt(c + 1, r + 1);

        // Strain from edges
        const d0 = Math.hypot(p10.x - p00.x, p10.y - p00.y) / restLen - 1;
        const d1 = Math.hypot(p11.x - p10.x, p11.y - p10.y) / restLen - 1;
        const d2 = Math.hypot(p01.x - p11.x, p01.y - p11.y) / restLen - 1;
        const d3 = Math.hypot(p00.x - p01.x, p00.y - p01.y) / restLen - 1;
        const strain = Math.max(Math.abs(d0), Math.abs(d1), Math.abs(d2), Math.abs(d3));
        const area = quadArea(p00, p10, p11, p01);

        ctx.fillStyle = strainColor(strain, area);
        ctx.beginPath();
        ctx.moveTo(p00.x, p00.y);
        ctx.lineTo(p10.x, p10.y);
        ctx.lineTo(p11.x, p11.y);
        ctx.lineTo(p01.x, p01.y);
        ctx.closePath();
        ctx.fill();
      }
    }
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 0.3;
    for (let r = 0; r < ROWS - 1; r++) {
      for (let c = 0; c < COLS - 1; c++) {
        const ht = hGrid[r][c], hb = hGrid[r + 1][c];
        const vl = vGrid[r][c], vr = vGrid[r][c + 1];
        if (!ht?.on || !hb?.on || !vl?.on || !vr?.on) continue;
        const p00 = pt(c, r), p10 = pt(c + 1, r), p01 = pt(c, r + 1), p11 = pt(c + 1, r + 1);
        ctx.beginPath();
        ctx.moveTo(p00.x, p00.y); ctx.lineTo(p10.x, p10.y);
        ctx.lineTo(p11.x, p11.y); ctx.lineTo(p01.x, p01.y);
        ctx.closePath(); ctx.stroke();
      }
    }
  } else if (renderMode === 'wire') {
    ctx.lineWidth = 1;
    for (const s of allSticks) {
      if (!s.on) continue;
      const st = Math.min(1, s.strain * 8);
      const h = 200 - st * 200;
      ctx.strokeStyle = `hsla(${h|0},70%,55%,${0.3 + st * 0.7})`;
      ctx.beginPath();
      ctx.moveTo(s.a.x, s.a.y);
      ctx.lineTo(s.b.x, s.b.y);
      ctx.stroke();
    }
  } else {
    // Debug
    ctx.lineWidth = 0.6;
    ctx.strokeStyle = 'rgba(148,163,184,0.25)';
    for (const s of allSticks) {
      if (!s.on) continue;
      ctx.beginPath();
      ctx.moveTo(s.a.x, s.a.y); ctx.lineTo(s.b.x, s.b.y); ctx.stroke();
    }
    for (const p of points) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.pinned ? 4 : 2, 0, Math.PI * 2);
      ctx.fillStyle = p.pinned ? '#fbbf24' : 'rgba(148,163,184,0.5)';
      ctx.fill();
    }
  }

  // Pinned points (always shown)
  if (renderMode !== 'debug') {
    for (const p of points) {
      if (!p.pinned) continue;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fbbf24';
      ctx.fill();
      ctx.strokeStyle = '#92400e';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Hover highlight
  if (nearHint && (currentTool === 'pin' || currentTool === 'grab')) {
    const col = currentTool === 'pin' ? (nearHint.pinned ? '#22d3ee' : '#a78bfa') : '#34d399';
    ctx.beginPath();
    ctx.arc(nearHint.x, nearHint.y, 8, 0, Math.PI * 2);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = col + '33';
    ctx.fill();
  }

  // Cut trail
  if (currentTool === 'cut' && cutTrail.length > 1) {
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    cutTrail.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Gust indicator
  if (gustTimer > 0) {
    const alpha = gustTimer / 90;
    ctx.fillStyle = `rgba(103,232,249,${alpha * 0.15})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = `rgba(103,232,249,${alpha * 0.7})`;
    ctx.font = 'bold 14px system-ui';
    ctx.fillText('💨 GUST', W - 80, 20);
  }
}

// --- Main loop ---
function loop() {
  update();
  render();
  animId = requestAnimationFrame(loop);
}

// --- Interaction helpers ---
function findNearest(mx, my, maxD) {
  let best = null, bestD = maxD * maxD;
  for (const p of points) {
    const d2 = (p.x - mx) ** 2 + (p.y - my) ** 2;
    if (d2 < bestD) { bestD = d2; best = p; }
  }
  return best;
}

function segsIntersect(ax, ay, bx, by, cx, cy, dx, dy) {
  const det = (bx - ax) * (dy - cy) - (by - ay) * (dx - cx);
  if (Math.abs(det) < 1e-10) return false;
  const t = ((cx - ax) * (dy - cy) - (cy - ay) * (dx - cx)) / det;
  const u = ((cx - ax) * (by - ay) - (cy - ay) * (bx - ax)) / det;
  return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function handleDown(mx, my) {
  isDown = true;
  mouseX = mx; mouseY = my;
  cutTrail = [{x: mx, y: my}];

  if (currentTool === 'pin') {
    const p = findNearest(mx, my, 25);
    if (p) p.pinned = !p.pinned;
  } else if (currentTool === 'grab') {
    grabbed = findNearest(mx, my, 35);
  }
}

function handleMove(mx, my) {
  const oldX = mouseX, oldY = mouseY;
  mouseX = mx; mouseY = my;

  if (currentTool === 'pin' || currentTool === 'grab') {
    nearHint = findNearest(mx, my, 30);
  } else {
    nearHint = null;
  }

  if (!isDown) return;

  if (currentTool === 'cut') {
    for (const s of allSticks) {
      if (!s.on) continue;
      if (segsIntersect(oldX, oldY, mx, my, s.a.x, s.a.y, s.b.x, s.b.y)) {
        s.on = false;
      }
    }
    cutTrail.push({x: mx, y: my});
    if (cutTrail.length > 40) cutTrail.shift();
  }
}

function handleUp() {
  isDown = false;
  grabbed = null;
  cutTrail = [];
}

// Pointer events
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  const r = canvas.getBoundingClientRect();
  handleDown(e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  handleMove(e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

canvas.addEventListener('pointerup', e => { e.preventDefault(); handleUp(); }, { passive: false });
canvas.addEventListener('pointercancel', handleUp);

// Prevent context menu on long press
canvas.addEventListener('contextmenu', e => e.preventDefault());

// --- UI bindings ---
function setTool(t) {
  currentTool = t;
  ['pin','cut','grab'].forEach(id => {
    const el = document.getElementById('t-' + id);
    el && el.classList.toggle('active', id === t);
  });
  const hints = {
    pin: '📌 Click a point to pin or unpin it',
    cut: '✂️ Drag across cloth to sever connections',
    grab: '✋ Click and drag to move cloth'
  };
  document.getElementById('hint').textContent = hints[t] || '';
}

function setMode(m) {
  renderMode = m;
  ['shaded','wire','debug'].forEach(id => {
    const el = document.getElementById('t-' + id);
    el && el.classList.toggle('active', id === m);
  });
}

['pin','cut','grab'].forEach(t => {
  document.getElementById('t-' + t).addEventListener('click', () => setTool(t));
});
document.getElementById('t-shaded').addEventListener('click', () => setMode('shaded'));
document.getElementById('t-wire').addEventListener('click', () => setMode('wire'));
document.getElementById('m-shaded').addEventListener('click', () => setMode('shaded'));
document.getElementById('m-wire').addEventListener('click', () => setMode('wire'));
document.getElementById('m-debug').addEventListener('click', () => setMode('debug'));

['flag','curtain','hammock','table'].forEach(id => {
  document.getElementById('p-' + id).addEventListener('click', () => {
    document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    initCloth(id);
  });
});

document.getElementById('t-gust').addEventListener('click', () => { gustTimer = 90; });
document.getElementById('t-shake').addEventListener('click', () => {
  for (const p of points) {
    if (!p.pinned) {
      p.ox = p.x + (Math.random() - 0.5) * 18;
      p.oy = p.y + (Math.random() - 0.5) * 14;
    }
  }
  shakeTimer = 20;
});

function doExport() {
  const dpr = window.devicePixelRatio || 1;
  const link = document.createElement('a');
  link.download = `cloth-studio-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
document.getElementById('t-export').addEventListener('click', doExport);
document.getElementById('a-export').addEventListener('click', doExport);

document.getElementById('t-reset').addEventListener('click', () => initCloth(currentPreset));

document.getElementById('a-save').addEventListener('click', () => {
  const data = points.map(p => p.pinned);
  try { localStorage.setItem('cloth_pins_' + currentPreset, JSON.stringify(data)); } catch(e){}
  const btn = document.getElementById('a-save');
  btn.textContent = '✅ Saved!';
  setTimeout(() => btn.textContent = '💾 Save Pins', 1500);
});

document.getElementById('a-load').addEventListener('click', () => {
  try {
    const raw = localStorage.getItem('cloth_pins_' + currentPreset);
    if (raw) {
      const arr = JSON.parse(raw);
      arr.forEach((v, i) => { if (i < points.length) points[i].pinned = v; });
    }
  } catch(e) {}
});

// Sliders
function bindSlider(slId, valId, key, fmt) {
  const sl = document.getElementById(slId), vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    phys[key] = +sl.value;
    vl.textContent = fmt(+sl.value);
  });
}
bindSlider('sg','vg','g', v => v.toFixed(2));
bindSlider('sw','vw','wind', v => v.toFixed(2));
bindSlider('st','vt','turb', v => v.toFixed(2));
bindSlider('ss','vs','stiff', v => v|0);
bindSlider('sd','vd','damp', v => v.toFixed(3));

// --- Start ---
function start() {
  resize();
  initCloth('flag');
  setMode('shaded');
  setTool('pin');
  loop();
}

window.addEventListener('resize', () => {
  cancelAnimationFrame(animId);
  resize();
  initCloth(currentPreset);
  loop();
});

start();
</script>
</body>
</html>
