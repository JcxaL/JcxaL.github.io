<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Loopcraft — Live Loop Mixer</title>
<style>
  :root{
    --bg:#0b0812; --bg2:#130f1e; --panel:#181425; --panel2:#1f1a2e;
    --line:#2c2540; --text:#f3eefc; --dim:#9a90b8;
    --kick:#ff6b6b; --snare:#4ecdc4; --hat:#ffd166; --pluck:#a78bfa;
    --accent:#a78bfa;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    overscroll-behavior:none; width:100%;}
  body{padding:14px 14px 40px; min-height:100vh;
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(167,139,250,.16), transparent 60%),
      radial-gradient(700px 500px at 100% 0%, rgba(78,205,196,.10), transparent 55%),
      var(--bg);
  }
  .wrap{max-width:920px; margin:0 auto;}
  header{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px;}
  h1{font-size:20px; margin:0; font-weight:800; letter-spacing:.2px;
    background:linear-gradient(90deg,#fff,#c9b8ff); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .sub{font-size:12px; color:var(--dim); margin-top:2px;}
  .titleblock{display:flex; flex-direction:column;}

  .card{background:linear-gradient(180deg, var(--panel), var(--panel2)); border:1px solid var(--line);
    border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 10px 30px rgba(0,0,0,.35);}

  /* Transport */
  .transport{display:flex; flex-wrap:wrap; align-items:center; gap:14px;}
  .playBtn{width:52px; height:52px; border-radius:50%; border:none; cursor:pointer; flex:0 0 auto;
    background:radial-gradient(circle at 30% 30%, #c9b8ff, var(--accent) 70%); color:#1b1330;
    font-size:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(167,139,250,.35);
    transition:transform .12s ease;}
  .playBtn:active{transform:scale(.92);}
  .field{display:flex; flex-direction:column; gap:4px; min-width:110px;}
  .field label{font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim);}
  .field .val{font-size:11px; color:var(--text); font-variant-numeric:tabular-nums;}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:4px;
    background:var(--line); outline:none; cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--accent); border:2px solid #fff2; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.4);}
  input[type=range]::-moz-range-thumb{width:16px; height:16px; border-radius:50%; background:var(--accent); border:2px solid #fff2; cursor:pointer;}

  .slots{display:flex; gap:6px; margin-left:auto;}
  .slotBtn{width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--bg2);
    color:var(--text); font-weight:700; font-size:13px; cursor:pointer;}
  .slotBtn.active{background:var(--accent); color:#1b1330; border-color:var(--accent);}
  .slotBtn.hasPattern::after{content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--dim); margin:3px auto 0;}
  .slotBtn.active.hasPattern::after{background:#1b1330;}

  .btnRow{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .btn{background:var(--bg2); border:1px solid var(--line); color:var(--text); padding:8px 12px; border-radius:10px;
    font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px;}
  .btn.primary{background:linear-gradient(90deg,#8b7cf6,#a78bfa); color:#17102b; border:none; font-weight:700;}
  .btn:active{transform:translateY(1px);}
  .toggle{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--dim); cursor:pointer; user-select:none;}
  .toggle input{width:34px; height:20px; -webkit-appearance:none; appearance:none; background:var(--line); border-radius:20px; position:relative; outline:none; cursor:pointer;}
  .toggle input::before{content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--dim); transition:.15s;}
  .toggle input:checked{background:#5d4bb0;}
  .toggle input:checked::before{transform:translateX(14px); background:#fff;}

  /* Tracks */
  .track{border:1px solid var(--line); border-radius:14px; padding:10px; margin-bottom:10px; background:#120e1c;}
  .trackHead{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px;}
  .swatch{width:10px; height:10px; border-radius:3px; flex:0 0 auto;}
  .trackName{font-weight:700; font-size:13px; flex:0 0 auto;}
  .miniBtn{width:26px; height:26px; border-radius:7px; border:1px solid var(--line); background:var(--bg2); color:var(--dim);
    font-size:10px; font-weight:800; cursor:pointer;}
  .miniBtn.on{color:#fff;}
  .miniBtn.mute.on{background:#ef4444; border-color:#ef4444;}
  .miniBtn.solo.on{background:#fbbf24; border-color:#fbbf24; color:#1b1330;}
  .trackKnobs{display:flex; gap:12px; margin-left:auto; flex-wrap:wrap;}
  .knob{display:flex; flex-direction:column; gap:2px; width:74px;}
  .knob label{font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em;}

  .steps{display:grid; grid-template-columns:repeat(16, minmax(0,1fr)); gap:4px;}
  .step{aspect-ratio:1/1; min-height:26px; border-radius:6px; border:1px solid var(--line); background:#0e0a17; cursor:pointer;}
  .step.beat{border-color:#3a2f5c;}
  .step.on{box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);}
  .step.playing{outline:2px solid #fff8; outline-offset:1px;}

  .masterGrid{display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:14px;}

  footer{text-align:center; color:var(--dim); font-size:11px; margin-top:18px; line-height:1.6;}
  footer a{color:var(--accent);}
  .toast{position:fixed; left:50%; bottom:22px; transform:translate(-50%,20px); background:#1f1a2e; border:1px solid var(--line);
    padding:10px 16px; border-radius:10px; font-size:12px; opacity:0; pointer-events:none; transition:.25s ease; z-index:50;}
  .toast.show{opacity:1; transform:translate(-50%,0);}

  @media (max-width:640px){
    .steps{grid-template-columns:repeat(16, minmax(20px,1fr)); overflow-x:auto;}
    .trackKnobs{width:100%; margin-left:0;}
    .knob{width:64px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titleblock">
      <h1>Loopcraft</h1>
      <div class="sub">A tiny live loop mixer — sequence, mix, and render your own beat.</div>
    </div>
    <div class="slots" id="slots"></div>
  </header>

  <div class="card">
    <div class="transport">
      <button class="playBtn" id="playBtn" aria-label="Play">▶</button>
      <div class="field">
        <label for="bpm">Tempo</label>
        <input type="range" id="bpm" min="60" max="200" value="120">
        <div class="val" id="bpmVal">120 BPM</div>
      </div>
      <div class="field">
        <label for="swing">Swing</label>
        <input type="range" id="swing" min="0" max="100" value="0">
        <div class="val" id="swingVal">0%</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="songMode">
        Song mode
      </label>
    </div>
    <div class="btnRow">
      <button class="btn" id="addToSong">＋ add slot to song</button>
      <span class="val" id="songSeq" style="align-self:center; color:var(--dim);"></span>
      <button class="btn" id="randomizeAll" style="margin-left:auto;">🎲 Randomize</button>
      <button class="btn" id="clearAll">✕ Clear pattern</button>
      <button class="btn primary" id="exportBtn">⬇ Export WAV</button>
      <button class="btn" id="shareBtn">🔗 Copy share link</button>
    </div>
  </div>

  <div id="tracks"></div>

  <div class="card">
    <div style="font-weight:700; font-size:13px; margin-bottom:10px;">Master bus</div>
    <div class="masterGrid">
      <div class="knob">
        <label for="mFilter">Filter</label>
        <input type="range" id="mFilter" min="0" max="100" value="100">
      </div>
      <div class="knob">
        <label for="mDelay">Delay</label>
        <input type="range" id="mDelay" min="0" max="100" value="20">
      </div>
      <div class="knob">
        <label for="mReverb">Reverb</label>
        <input type="range" id="mReverb" min="0" max="100" value="25">
      </div>
      <div class="knob">
        <label for="mVol">Volume</label>
        <input type="range" id="mVol" min="0" max="100" value="85">
      </div>
    </div>
  </div>

  <footer>
    4 pattern slots · per-track mix &amp; tone · master filter/delay/reverb · WAV export · shareable links<br>
    Space = play/stop · click any step to toggle it
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var NUM_TRACKS = 4;
  var NUM_STEPS = 16;
  var SLOT_NAMES = ['A','B','C','D'];

  var trackDefs = [
    { name:'Kick',  type:'kick',  color:'var(--kick)',  flavorLabel:'Punch' },
    { name:'Snare', type:'snare', color:'var(--snare)', flavorLabel:'Snap'  },
    { name:'Hat',   type:'hat',   color:'var(--hat)',   flavorLabel:'Sizzle'},
    { name:'Pluck', type:'pluck', color:'var(--pluck)', flavorLabel:'Pitch' }
  ];

  function emptyPattern(){
    var p = [];
    for(var t=0;t<NUM_TRACKS;t++){ p.push(new Array(NUM_STEPS).fill(false)); }
    return p;
  }

  function defaultState(){
    return {
      bpm:120,
      swing:0,
      currentSlot:'A',
      songMode:false,
      song:['A'],
      patterns:{ A:emptyPattern(), B:emptyPattern(), C:emptyPattern(), D:emptyPattern() },
      tracks:[
        { vol:0.85, pan:0,    flavor:0.5, mute:false, solo:false },
        { vol:0.75, pan:-0.1, flavor:0.5, mute:false, solo:false },
        { vol:0.55, pan:0.15, flavor:0.4, mute:false, solo:false },
        { vol:0.7,  pan:0,    flavor:0.5, mute:false, solo:false }
      ],
      master:{ filter:1, delayMix:0.2, reverbMix:0.25, volume:0.85 }
    };
  }

  var STORAGE_KEY = 'loopcraft_session_v1';
  var state = loadState() || defaultState();

  // seed a starter beat if nothing saved and slot A is empty
  if(!localStorage.getItem(STORAGE_KEY)){
    state.patterns.A[0][0]=true; state.patterns.A[0][4]=true; state.patterns.A[0][8]=true; state.patterns.A[0][12]=true;
    state.patterns.A[1][4]=true; state.patterns.A[1][12]=true;
    state.patterns.A[2][2]=true; state.patterns.A[2][6]=true; state.patterns.A[2][10]=true; state.patterns.A[2][14]=true;
  }

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      var parsed = JSON.parse(raw);
      if(!parsed.patterns || !parsed.tracks) return null;
      return parsed;
    }catch(e){ return null; }
  }

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function loadFromHash(){
    if(!location.hash || location.hash.length<2) return false;
    try{
      var json = decodeURIComponent(escape(atob(location.hash.slice(1))));
      var data = JSON.parse(json);
      if(data && data.patterns && data.tracks){
        state = data;
        return true;
      }
    }catch(e){}
    return false;
  }
  loadFromHash();

  // ---------- Audio engine ----------
  var audioCtx = null;
  var chain = null;
  var noiseBufferCache = new WeakMap();

  function getNoiseBuffer(ctx){
    if(noiseBufferCache.has(ctx)) return noiseBufferCache.get(ctx);
    var len = Math.floor(ctx.sampleRate * 1);
    var buf = ctx.createBuffer(1, len, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for(var i=0;i<len;i++){ data[i] = Math.random()*2-1; }
    noiseBufferCache.set(ctx, buf);
    return buf;
  }

  function impulseResponse(ctx, duration, decay){
    duration = duration || 2.2; decay = decay || 3.2;
    var rate = ctx.sampleRate;
    var length = Math.floor(rate*duration);
    var imp = ctx.createBuffer(2, length, rate);
    for(var ch=0; ch<2; ch++){
      var data = imp.getChannelData(ch);
      for(var i=0;i<length;i++){
        data[i] = (Math.random()*2-1) * Math.pow(1-i/length, decay);
      }
    }
    return imp;
  }

  function buildChain(ctx){
    var master = ctx.createGain(); master.gain.value = state.master.volume;
    var filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = mapFilter(state.master.filter);

    var delay = ctx.createDelay(1.0); delay.delayTime.value = 0.28;
    var feedback = ctx.createGain(); feedback.gain.value = 0.32;
    var delayMixGain = ctx.createGain(); delayMixGain.gain.value = state.master.delayMix;

    var convolver = ctx.createConvolver();
    convolver.buffer = impulseResponse(ctx);
    var reverbMixGain = ctx.createGain(); reverbMixGain.gain.value = state.master.reverbMix;

    delay.connect(feedback); feedback.connect(delay);
    delay.connect(delayMixGain); delayMixGain.connect(filter);
    convolver.connect(reverbMixGain); reverbMixGain.connect(filter);
    filter.connect(master); master.connect(ctx.destination);

    var trackGains = [], trackPans = [];
    for(var i=0;i<NUM_TRACKS;i++){
      var g = ctx.createGain(); g.gain.value = state.tracks[i].vol;
      var p = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
      if(p){ p.pan.value = state.tracks[i].pan; g.connect(p); p.connect(filter); p.connect(delay); p.connect(convolver); }
      else { g.connect(filter); g.connect(delay); g.connect(convolver); }
      trackGains.push(g); trackPans.push(p);
    }

    return { master:master, filter:filter, delay:delay, delayMixGain:delayMixGain,
      convolver:convolver, reverbMixGain:reverbMixGain, trackGains:trackGains, trackPans:trackPans };
  }

  function mapFilter(v){ // 0..1 -> 200..14000 Hz (log-ish)
    return 200 * Math.pow(70, v);
  }

  function ensureAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    chain = buildChain(audioCtx);
  }

  // ---- synths ----
  function synthKick(ctx, dest, time, flavor){
    var osc = ctx.createOscillator(); osc.type='sine';
    var gain = ctx.createGain();
    var startFreq = 130 + flavor*70;
    osc.frequency.setValueAtTime(startFreq, time);
    osc.frequency.exponentialRampToValueAtTime(38, time+0.11);
    gain.gain.setValueAtTime(0.001, time);
    gain.gain.exponentialRampToValueAtTime(1, time+0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, time+0.32+flavor*0.18);
    osc.connect(gain); gain.connect(dest);
    osc.start(time); osc.stop(time+0.6);
  }

  function synthSnare(ctx, dest, time, flavor){
    var noise = ctx.createBufferSource(); noise.buffer = getNoiseBuffer(ctx);
    var nf = ctx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value = 900+flavor*2200;
    var ng = ctx.createGain();
    ng.gain.setValueAtTime(0.9, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time+0.16);
    noise.connect(nf); nf.connect(ng); ng.connect(dest);
    noise.start(time); noise.stop(time+0.2);

    var osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value = 170+flavor*90;
    var og = ctx.createGain();
    og.gain.setValueAtTime(0.001, time);
    og.gain.exponentialRampToValueAtTime(0.5, time+0.004);
    og.gain.exponentialRampToValueAtTime(0.001, time+0.12);
    osc.connect(og); og.connect(dest);
    osc.start(time); osc.stop(time+0.15);
  }

  function synthHat(ctx, dest, time, flavor){
    var noise = ctx.createBufferSource(); noise.buffer = getNoiseBuffer(ctx);
    var hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 6000+flavor*6000;
    var g = ctx.createGain();
    var dur = 0.025 + (1-flavor)*0.11;
    g.gain.setValueAtTime(0.001, time);
    g.gain.exponentialRampToValueAtTime(0.45, time+0.003);
    g.gain.exponentialRampToValueAtTime(0.001, time+dur);
    noise.connect(hp); hp.connect(g); g.connect(dest);
    noise.start(time); noise.stop(time+dur+0.02);
  }

  function synthPluck(ctx, dest, time, flavor){
    var freq = 110 + flavor*220;
    var osc1 = ctx.createOscillator(); osc1.type='sawtooth'; osc1.frequency.value=freq;
    var osc2 = ctx.createOscillator(); osc2.type='sine'; osc2.frequency.value=freq*2;
    var filter = ctx.createBiquadFilter(); filter.type='lowpass';
    filter.frequency.setValueAtTime(2200, time);
    filter.frequency.exponentialRampToValueAtTime(320, time+0.3);
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.001, time);
    g.gain.exponentialRampToValueAtTime(0.55, time+0.004);
    g.gain.exponentialRampToValueAtTime(0.001, time+0.36);
    osc1.connect(filter); osc2.connect(filter); filter.connect(g); g.connect(dest);
    osc1.start(time); osc1.stop(time+0.4);
    osc2.start(time); osc2.stop(time+0.4);
  }

  var SYNTHS = { kick:synthKick, snare:synthSnare, hat:synthHat, pluck:synthPluck };

  function anySolo(){
    return state.tracks.some(function(t){ return t.solo; });
  }

  function triggerTrack(ctx, dest, trackIndex, time){
    var ts = state.tracks[trackIndex];
    if(ts.mute) return;
    if(anySolo() && !ts.solo) return;
    var def = trackDefs[trackIndex];
    SYNTHS[def.type](ctx, dest, time, ts.flavor);
  }

  // ---------- Sequencer / transport ----------
  var isPlaying = false;
  var currentStep = 0;
  var nextStepTime = 0;
  var schedulerTimer = null;
  var songIndex = 0;
  var playingSlot = null;
  var LOOKAHEAD = 25; // ms
  var SCHEDULE_AHEAD = 0.12; // s
  var scheduledUI = [];

  function stepDuration(){ return 60/state.bpm/4; }

  function scheduler(){
    while(nextStepTime < audioCtx.currentTime + SCHEDULE_AHEAD){
      scheduleStep(currentStep, nextStepTime);
      var swingOffset = (currentStep%2===1) ? stepDuration()*(state.swing/100)*0.5 : 0;
      nextStepTime += stepDuration() + swingOffset;
      currentStep++;
      if(currentStep>=NUM_STEPS){
        currentStep = 0;
        if(state.songMode && state.song.length){
          songIndex = (songIndex+1)%state.song.length;
        }
      }
    }
  }

  function scheduleStep(step, time){
    var slot = state.songMode && state.song.length ? state.song[songIndex] : state.currentSlot;
    playingSlot = slot;
    var pattern = state.patterns[slot];
    for(var t=0;t<NUM_TRACKS;t++){
      if(pattern[t][step]) triggerTrack(audioCtx, chain.trackGains[t], t, time);
    }
    var delayMs = Math.max(0, (time - audioCtx.currentTime)*1000);
    var handle = setTimeout(function(){ renderStepUI(step, slot); }, delayMs);
    scheduledUI.push(handle);
  }

  function renderStepUI(step, slot){
    if(slot !== state.currentSlot) return; // only highlight the slot being edited
    var els = document.querySelectorAll('.step');
    els.forEach(function(el){
      el.classList.toggle('playing', parseInt(el.dataset.step,10)===step);
    });
  }

  function clearStepUI(){
    document.querySelectorAll('.step.playing').forEach(function(el){ el.classList.remove('playing'); });
  }

  function play(){
    ensureAudio();
    if(audioCtx.state==='suspended') audioCtx.resume();
    isPlaying = true;
    currentStep = 0;
    songIndex = 0;
    nextStepTime = audioCtx.currentTime + 0.05;
    document.getElementById('playBtn').textContent = '■';
    schedulerTimer = setInterval(scheduler, LOOKAHEAD);
  }

  function stop(){
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    if(schedulerTimer){ clearInterval(schedulerTimer); schedulerTimer=null; }
    scheduledUI.forEach(clearTimeout); scheduledUI=[];
    clearStepUI();
  }

  function togglePlay(){ isPlaying ? stop() : play(); }

  // ---------- WAV export ----------
  function audioBufferToWav(buffer){
    var numCh = buffer.numberOfChannels;
    var len = buffer.length * numCh * 2 + 44;
    var abuf = new ArrayBuffer(len);
    var view = new DataView(abuf);
    var sampleRate = buffer.sampleRate;

    function writeStr(offset, str){ for(var i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i)); }

    writeStr(0,'RIFF'); view.setUint32(4, 36 + buffer.length*numCh*2, true);
    writeStr(8,'WAVE'); writeStr(12,'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, numCh, true); view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate*numCh*2, true); view.setUint16(32, numCh*2, true);
    view.setUint16(34, 16, true);
    writeStr(36,'data'); view.setUint32(40, buffer.length*numCh*2, true);

    var offset = 44;
    var channels = [];
    for(var c=0;c<numCh;c++) channels.push(buffer.getChannelData(c));
    for(var i=0;i<buffer.length;i++){
      for(var ch=0; ch<numCh; ch++){
        var sample = Math.max(-1, Math.min(1, channels[ch][i]));
        sample = sample<0 ? sample*0x8000 : sample*0x7FFF;
        view.setInt16(offset, sample, true);
        offset += 2;
      }
    }
    return new Blob([abuf], { type:'audio/wav' });
  }

  function downloadBlob(blob, filename){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  }

  function exportWav(){
    var loops = 4;
    var sr = 44100;
    var dur = stepDuration()*NUM_STEPS*loops + 1.2;
    var OfflineCtor = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    var offlineCtx = new OfflineCtor(2, Math.ceil(dur*sr), sr);
    var offlineChain = buildChain(offlineCtx);
    var pattern = state.patterns[state.currentSlot];

    for(var loop=0; loop<loops; loop++){
      for(var step=0; step<NUM_STEPS; step++){
        var t = (loop*NUM_STEPS+step)*stepDuration();
        for(var tr=0; tr<NUM_TRACKS; tr++){
          if(pattern[tr][step]) triggerTrack(offlineCtx, offlineChain.trackGains[tr], tr, t);
        }
      }
    }

    showToast('Rendering WAV…');
    offlineCtx.startRendering().then(function(buffer){
      var blob = audioBufferToWav(buffer);
      downloadBlob(blob, 'loopcraft-' + state.currentSlot + '.wav');
      showToast('WAV downloaded ✓');
    }).catch(function(){
      showToast('Export failed — try again');
    });
  }

  // ---------- Share link ----------
  function shareLink(){
    var json = JSON.stringify(state);
    var b64 = btoa(unescape(encodeURIComponent(json)));
    var url = location.origin + location.pathname + '#' + b64;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){ showToast('Share link copied ✓'); })
        .catch(function(){ promptFallback(url); });
    } else {
      promptFallback(url);
    }
    history.replaceState(null, '', '#'+b64);
  }
  function promptFallback(url){
    window.prompt('Copy this link:', url);
  }

  var toastTimer = null;
  function showToast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 1800);
  }

  // ---------- UI rendering ----------
  var tracksEl = document.getElementById('tracks');
  var slotsEl = document.getElementById('slots');

  function renderSlots(){
    slotsEl.innerHTML = '';
    SLOT_NAMES.forEach(function(name){
      var btn = document.createElement('button');
      btn.className = 'slotBtn' + (name===state.currentSlot?' active':'') +
        (state.patterns[name].some(function(row){ return row.some(Boolean); }) ? ' hasPattern':'');
      btn.textContent = name;
      btn.addEventListener('click', function(){
        state.currentSlot = name;
        renderSlots(); renderTracks(); saveState();
      });
      slotsEl.appendChild(btn);
    });
  }

  function renderSongSeq(){
    document.getElementById('songSeq').textContent = state.song.join(' → ') || '(empty)';
  }

  function renderTracks(){
    tracksEl.innerHTML = '';
    var pattern = state.patterns[state.currentSlot];
    trackDefs.forEach(function(def, idx){
      var ts = state.tracks[idx];
      var track = document.createElement('div');
      track.className = 'track';

      var head = document.createElement('div');
      head.className = 'trackHead';
      head.innerHTML =
        '<span class="swatch" style="background:'+def.color+'"></span>' +
        '<span class="trackName">'+def.name+'</span>' +
        '<button class="miniBtn mute'+(ts.mute?' on':'')+'" data-idx="'+idx+'" data-act="mute" title="Mute">M</button>' +
        '<button class="miniBtn solo'+(ts.solo?' on':'')+'" data-idx="'+idx+'" data-act="solo" title="Solo">S</button>' +
        '<div class="trackKnobs">' +
          knobHtml('vol', idx, 'Vol', 0, 100, Math.round(ts.vol*100)) +
          knobHtml('pan', idx, 'Pan', -100, 100, Math.round(ts.pan*100)) +
          knobHtml('flavor', idx, def.flavorLabel, 0, 100, Math.round(ts.flavor*100)) +
        '</div>';
      track.appendChild(head);

      var steps = document.createElement('div');
      steps.className = 'steps';
      for(var s=0; s<NUM_STEPS; s++){
        var cell = document.createElement('div');
        cell.className = 'step' + (pattern[idx][s] ? ' on':'') + (s%4===0?' beat':'');
        cell.dataset.step = s;
        cell.dataset.track = idx;
        if(pattern[idx][s]) cell.style.background = def.color;
        cell.addEventListener('click', (function(idx, s, cell){
          return function(){
            var val = !state.patterns[state.currentSlot][idx][s];
            state.patterns[state.currentSlot][idx][s] = val;
            cell.classList.toggle('on', val);
            cell.style.background = val ? trackDefs[idx].color : '';
            renderSlots();
            saveState();
          };
        })(idx, s, cell));
        steps.appendChild(cell);
      }
      track.appendChild(steps);
      tracksEl.appendChild(track);
    });

    tracksEl.querySelectorAll('.miniBtn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = parseInt(btn.dataset.idx,10);
        var act = btn.dataset.act;
        state.tracks[idx][act] = !state.tracks[idx][act];
        renderTracks(); saveState();
      });
    });

    tracksEl.querySelectorAll('input[type=range][data-param]').forEach(function(input){
      input.addEventListener('input', function(){
        var idx = parseInt(input.dataset.idx,10);
        var param = input.dataset.param;
        var v = parseFloat(input.value);
        if(param==='vol'){ state.tracks[idx].vol = v/100; if(chain) chain.trackGains[idx].gain.value = v/100; }
        if(param==='pan'){ state.tracks[idx].pan = v/100; if(chain && chain.trackPans[idx]) chain.trackPans[idx].pan.value = v/100; }
        if(param==='flavor'){ state.tracks[idx].flavor = v/100; }
        saveState();
      });
    });
  }

  function knobHtml(param, idx, label, min, max, val){
    return '<div class="knob"><label>'+label+'</label>' +
      '<input type="range" data-param="'+param+'" data-idx="'+idx+'" min="'+min+'" max="'+max+'" value="'+val+'"></div>';
  }

  function renderMaster(){
    document.getElementById('mFilter').value = Math.round(state.master.filter*100);
    document.getElementById('mDelay').value = Math.round(state.master.delayMix*100);
    document.getElementById('mReverb').value = Math.round(state.master.reverbMix*100);
    document.getElementById('mVol').value = Math.round(state.master.volume*100);
  }

  function bindMaster(){
    document.getElementById('mFilter').addEventListener('input', function(e){
      state.master.filter = e.target.value/100;
      if(chain) chain.filter.frequency.value = mapFilter(state.master.filter);
      saveState();
    });
    document.getElementById('mDelay').addEventListener('input', function(e){
      state.master.delayMix = e.target.value/100;
      if(chain) chain.delayMixGain.gain.value = state.master.delayMix;
      saveState();
    });
    document.getElementById('mReverb').addEventListener('input', function(e){
      state.master.reverbMix = e.target.value/100;
      if(chain) chain.reverbMixGain.gain.value = state.master.reverbMix;
      saveState();
    });
    document.getElementById('mVol').addEventListener('input', function(e){
      state.master.volume = e.target.value/100;
      if(chain) chain.master.gain.value = state.master.volume;
      saveState();
    });
  }

  function bindTransport(){
    document.getElementById('playBtn').addEventListener('click', togglePlay);
    document.getElementById('bpm').value = state.bpm;
    document.getElementById('bpmVal').textContent = state.bpm + ' BPM';
    document.getElementById('bpm').addEventListener('input', function(e){
      state.bpm = parseInt(e.target.value,10);
      document.getElementById('bpmVal').textContent = state.bpm + ' BPM';
      saveState();
    });
    document.getElementById('swing').value = state.swing;
    document.getElementById('swingVal').textContent = state.swing + '%';
    document.getElementById('swing').addEventListener('input', function(e){
      state.swing = parseInt(e.target.value,10);
      document.getElementById('swingVal').textContent = state.swing + '%';
      saveState();
    });
    var songToggle = document.getElementById('songMode');
    songToggle.checked = state.songMode;
    songToggle.addEventListener('change', function(){
      state.songMode = songToggle.checked;
      saveState();
    });
    document.getElementById('addToSong').addEventListener('click', function(){
      state.song.push(state.currentSlot);
      renderSongSeq(); saveState();
    });
    document.getElementById('randomizeAll').addEventListener('click', function(){
      var pattern = state.patterns[state.currentSlot];
      var density = [0.32, 0.22, 0.4, 0.18];
      for(var t=0;t<NUM_TRACKS;t++){
        for(var s=0;s<NUM_STEPS;s++){
          pattern[t][s] = Math.random() < density[t];
        }
      }
      renderTracks(); renderSlots(); saveState();
    });
    document.getElementById('clearAll').addEventListener('click', function(){
      state.patterns[state.currentSlot] = emptyPattern();
      renderTracks(); renderSlots(); saveState();
    });
    document.getElementById('exportBtn').addEventListener('click', function(){
      ensureAudio();
      exportWav();
    });
    document.getElementById('shareBtn').addEventListener('click', shareLink);

    document.addEventListener('keydown', function(e){
      if(e.code==='Space' && e.target.tagName!=='INPUT'){
        e.preventDefault();
        togglePlay();
      }
    });
  }

  renderSlots();
  renderTracks();
  renderMaster();
  renderSongSeq();
  bindMaster();
  bindTransport();
  saveState();
})();
</script>
</body>
</html>
