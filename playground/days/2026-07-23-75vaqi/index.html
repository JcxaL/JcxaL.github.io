<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Siege Engine Range</title>
<style>
  :root{
    --sky-top:#1b2438;
    --sky-mid:#3a3550;
    --sky-low:#7c5b52;
    --ground:#3d2f22;
    --ground-dark:#241a12;
    --parchment:#e9d9b6;
    --parchment-dark:#c9b48a;
    --stone:#5a5347;
    --stone-dark:#3a352c;
    --accent:#c97b3d;
    --accent2:#e0a458;
    --text:#2b2016;
    --panel-bg:rgba(233,217,182,0.94);
    --panel-border:#8a6f4a;
    --danger:#8b2d2d;
    --good:#3f7d3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--sky-top);
    color:var(--text);
    touch-action:manipulation;
  }
  #app{
    position:relative;
    width:100vw;height:100vh;
    display:flex;flex-direction:column;
  }
  #rangeWrap{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    width:100%;
  }
  #canvas{
    display:block;
    width:100%;height:100%;
    touch-action:none;
  }
  /* Top bar */
  #topBar{
    position:absolute;top:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 10px;
    gap:8px;
    z-index:20;
    pointer-events:none;
  }
  #topBar > *{pointer-events:auto;}
  .titleBlock{
    background:linear-gradient(180deg,rgba(30,20,10,0.72),rgba(20,14,8,0.6));
    border:1px solid rgba(255,220,170,0.25);
    border-radius:12px;
    padding:6px 12px;
    color:var(--parchment);
    font-weight:700;
    font-size:14px;
    letter-spacing:0.03em;
    backdrop-filter:blur(4px);
    white-space:nowrap;
  }
  #statsPill{
    background:linear-gradient(180deg,rgba(30,20,10,0.72),rgba(20,14,8,0.6));
    border:1px solid rgba(255,220,170,0.25);
    border-radius:12px;
    padding:6px 12px;
    color:var(--accent2);
    font-size:12px;
    font-weight:600;
    text-align:right;
    backdrop-filter:blur(4px);
    line-height:1.4;
  }
  /* Hint overlay */
  #hint{
    position:absolute;
    left:50%;top:14px;
    transform:translateX(-50%);
    background:rgba(20,14,8,0.65);
    color:var(--parchment);
    font-size:12px;
    padding:5px 12px;
    border-radius:20px;
    border:1px solid rgba(255,220,170,0.25);
    pointer-events:none;
    z-index:19;
    transition:opacity 0.6s ease;
    opacity:0.95;
  }
  #hint.hidden{opacity:0;}

  /* Engine selector chips */
  #engineBar{
    position:absolute;
    left:50%;
    bottom:calc(var(--panelH, 0px) + 8px);
    transform:translateX(-50%);
    display:flex;gap:6px;
    z-index:20;
  }
  .engineChip{
    padding:8px 14px;
    min-height:40px;
    border-radius:20px;
    border:1.5px solid var(--panel-border);
    background:linear-gradient(180deg,#8a6a3f,#6b4f2a);
    color:var(--parchment);
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 3px 6px rgba(0,0,0,0.4);
    display:flex;align-items:center;gap:6px;
  }
  .engineChip.active{
    background:linear-gradient(180deg,var(--accent2),var(--accent));
    color:#2a1a08;
    box-shadow:0 0 0 2px rgba(255,220,150,0.6),0 4px 10px rgba(0,0,0,0.4);
  }

  /* Bottom control panel */
  #panel{
    position:relative;
    z-index:15;
    background:linear-gradient(180deg,var(--parchment) 0%, var(--parchment-dark) 100%);
    border-top:3px solid var(--panel-border);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));
    box-shadow:0 -6px 16px rgba(0,0,0,0.35);
    max-height:46vh;
    overflow-y:auto;
  }
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .row label{
    flex:0 0 108px;
    font-size:12px;
    font-weight:700;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .row input[type=range]{
    flex:1 1 auto;
    height:34px;
    accent-color:var(--accent);
  }
  .row .val{
    flex:0 0 52px;
    text-align:right;
    font-size:12px;
    font-weight:700;
    color:var(--stone-dark);
  }
  #projRow{
    display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;
  }
  .projBtn{
    flex:1 1 auto;
    min-width:80px;
    padding:9px 6px;
    border-radius:8px;
    border:1.5px solid var(--panel-border);
    background:var(--stone);
    color:var(--parchment);
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .projBtn.active{
    background:var(--accent);
    color:#2a1a08;
    border-color:#3a2610;
  }
  #actionRow{
    display:flex;gap:8px;
    margin-top:6px;
    flex-wrap:wrap;
  }
  .btn{
    flex:1 1 auto;
    min-width:90px;
    padding:12px 10px;
    border-radius:10px;
    border:none;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(0,0,0,0.25);
  }
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.25);}
  #fireBtn{
    background:linear-gradient(180deg,#d84a3a,#a12a1e);
    color:#fff;
    flex:1 1 140px;
    font-size:16px;
  }
  #shareBtn{background:linear-gradient(180deg,#4a7fd8,#2c56a1);color:#fff;}
  #snapBtn{background:linear-gradient(180deg,#6fb35a,#3f7d3a);color:#fff;}
  #resetBtn{background:linear-gradient(180deg,#8a8a8a,#5a5a5a);color:#fff;}

  #toast{
    position:absolute;
    left:50%;bottom:80px;
    transform:translateX(-50%) translateY(10px);
    background:rgba(20,14,8,0.88);
    color:var(--parchment);
    padding:8px 16px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    z-index:30;
    opacity:0;
    transition:opacity 0.25s ease, transform 0.25s ease;
    pointer-events:none;
    white-space:nowrap;
    max-width:90vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (min-width:720px){
    .row label{flex-basis:150px;}
    #panel{max-height:40vh;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="rangeWrap">
    <canvas id="canvas"></canvas>
    <div id="topBar">
      <div class="titleBlock">🏰 Siege Engine Range</div>
      <div id="statsPill">Best: 0m<br>Streak: 0</div>
    </div>
    <div id="hint">Drag sliders below, then tap FIRE!</div>
    <div id="engineBar">
      <button class="engineChip" id="chipCatapult" data-engine="catapult">Catapult</button>
      <button class="engineChip" id="chipTrebuchet" data-engine="trebuchet">Trebuchet</button>
      <button class="engineChip" id="chipBallista" data-engine="ballista">Ballista</button>
    </div>
  </div>

  <div id="panel">
    <div id="paramRows"></div>

    <div class="row" id="windRow">
      <label for="windSlider">Wind</label>
      <input type="range" id="windSlider" min="-1" max="1" step="0.05" value="0">
      <div class="val" id="windVal">0.0</div>
    </div>

    <div id="projRow">
      <button class="projBtn" id="projBoulder" data-proj="boulder">🪨 Boulder</button>
      <button class="projBtn" id="projFirepot" data-proj="firepot">🔥 Firepot</button>
      <button class="projBtn" id="projJavelin" data-proj="javelin">🗡️ Javelin</button>
    </div>

    <div id="actionRow">
      <button class="btn" id="fireBtn">FIRE!</button>
      <button class="btn" id="shareBtn">Copy Share Link</button>
      <button class="btn" id="snapBtn">Save Snapshot</button>
      <button class="btn" id="resetBtn">Reset Range</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
(function(){
  'use strict';

  // ---------- Constants ----------
  var GRAVITY = 16; // m/s^2 (tuned game-feel gravity, not literal 9.8 - keeps arcs snappy)
  var STORAGE_KEY = 'siegeRangeState_v1';
  var BEST_KEY = 'siegeRangeBest_v1';

  var ENGINES = {
    catapult: {
      label: 'Catapult',
      params: [
        { key:'armLength', label:'Arm Length', min:1.5, max:4.5, step:0.1, def:3, unit:'m' },
        { key:'tension', label:'Torsion Tension', min:10, max:100, step:1, def:60, unit:'%' },
        { key:'angle', label:'Release Angle', min:20, max:75, step:1, def:45, unit:'°' }
      ]
    },
    trebuchet: {
      label: 'Trebuchet',
      params: [
        { key:'counterweight', label:'Counterweight', min:50, max:400, step:5, def:200, unit:'kg' },
        { key:'armRatio', label:'Arm Ratio (S:L)', min:1, max:5, step:0.1, def:3, unit:'x' },
        { key:'angle', label:'Release Angle', min:20, max:75, step:1, def:50, unit:'°' }
      ]
    },
    ballista: {
      label: 'Ballista',
      params: [
        { key:'drawTension', label:'Draw Tension', min:10, max:100, step:1, def:70, unit:'%' },
        { key:'boltMass', label:'Bolt Mass', min:1, max:10, step:0.5, def:3, unit:'kg' },
        { key:'angle', label:'Release Angle', min:5, max:60, step:1, def:20, unit:'°' }
      ]
    }
  };

  var PROJECTILES = {
    boulder:  { label:'Boulder',  massMod:1.4, dragMod:1.2, color:'#8d8d8d', trailColor:'rgba(200,200,200,0.55)', radius:7 },
    firepot:  { label:'Firepot',  massMod:0.8, dragMod:1.6, color:'#ff8a3d', trailColor:'rgba(255,140,50,0.65)', radius:6 },
    javelin:  { label:'Javelin',  massMod:0.5, dragMod:0.5, color:'#d8c48a', trailColor:'rgba(220,200,150,0.5)', radius:4 }
  };

  // ---------- State ----------
  var state = {
    engine: 'catapult',
    projectile: 'boulder',
    wind: 0,
    params: {} // engine -> {key: val}
  };

  // init default params for each engine
  Object.keys(ENGINES).forEach(function(eng){
    state.params[eng] = {};
    ENGINES[eng].params.forEach(function(p){
      state.params[eng][p.key] = p.def;
    });
  });

  var best = {}; // engine -> {distance, streak}
  Object.keys(ENGINES).forEach(function(eng){
    best[eng] = { distance:0, streak:0, bestStreak:0 };
  });

  // ---------- DOM refs ----------
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var paramRowsEl = document.getElementById('paramRows');
  var windSlider = document.getElementById('windSlider');
  var windVal = document.getElementById('windVal');
  var statsPill = document.getElementById('statsPill');
  var hintEl = document.getElementById('hint');
  var fireBtn = document.getElementById('fireBtn');
  var shareBtn = document.getElementById('shareBtn');
  var snapBtn = document.getElementById('snapBtn');
  var resetBtn = document.getElementById('resetBtn');
  var toastEl = document.getElementById('toast');

  var chips = {
    catapult: document.getElementById('chipCatapult'),
    trebuchet: document.getElementById('chipTrebuchet'),
    ballista: document.getElementById('chipBallista')
  };
  var projBtns = {
    boulder: document.getElementById('projBoulder'),
    firepot: document.getElementById('projFirepot'),
    javelin: document.getElementById('projJavelin')
  };

  if(!ctx){
    console.log('Canvas 2D context unavailable.');
  }

  // ---------- Canvas sizing ----------
  var W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  var groundY = 0; // css px, y of ground line

  function resizeCanvas(){
    var wrap = document.getElementById('rangeWrap');
    var rect = wrap.getBoundingClientRect();
    W = Math.max(280, rect.width);
    H = Math.max(200, rect.height);
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    groundY = H * 0.78;
    layoutTargets();
    drawStaticScene();
  }

  // World scale: meters -> pixels. We'll fit ~260m across width at scale.
  var WORLD_METERS = 260;
  function metersToPx(m){ return (m / WORLD_METERS) * W; }
  function pxToMeters(px){ return (px / W) * WORLD_METERS; }

  // ---------- Targets ----------
  var targets = []; // {distM, x, y, w, h, hit, kind}
  var targetDistances = [40, 85, 130, 175, 220]; // meters, roughly varying

  function layoutTargets(){
    targets = targetDistances.map(function(d, i){
      var x = metersToPx(d);
      var kind = (i % 2 === 0) ? 'ring' : 'gate';
      var w = kind === 'ring' ? 26 : 46;
      var h = kind === 'ring' ? 46 : 60;
      return { distM:d, x:x, y:groundY, w:w, h:h, hit:false, kind:kind };
    });
  }

  // ---------- Sky / ground background ----------
  function drawSky(){
    var grad = ctx.createLinearGradient(0,0,0,groundY);
    grad.addColorStop(0, '#1b2438');
    grad.addColorStop(0.5, '#3a3550');
    grad.addColorStop(1, '#7c5b52');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,groundY+2);

    // sun/moon glow
    ctx.save();
    ctx.globalAlpha = 0.5;
    var sunGrad = ctx.createRadialGradient(W*0.82, groundY*0.22, 4, W*0.82, groundY*0.22, 70);
    sunGrad.addColorStop(0, 'rgba(255,210,140,0.9)');
    sunGrad.addColorStop(1, 'rgba(255,210,140,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(W*0.82, groundY*0.22, 70, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // distant hills
    ctx.fillStyle = 'rgba(20,16,26,0.35)';
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.quadraticCurveTo(W*0.2, groundY-40, W*0.45, groundY-10);
    ctx.quadraticCurveTo(W*0.7, groundY-50, W, groundY-15);
    ctx.lineTo(W, groundY);
    ctx.closePath();
    ctx.fill();
  }

  function drawGround(){
    var grad = ctx.createLinearGradient(0, groundY, 0, H);
    grad.addColorStop(0, '#4a3a26');
    grad.addColorStop(1, '#241a12');
    ctx.fillStyle = grad;
    ctx.fillRect(0, groundY, W, H - groundY);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();

    // distance ticks every 20m
    ctx.fillStyle = 'rgba(233,217,182,0.5)';
    ctx.font = '10px system-ui';
    for(var d=20; d<WORLD_METERS; d+=20){
      var x = metersToPx(d);
      ctx.fillRect(x, groundY, 1, 6);
      if(d % 40 === 0){
        ctx.fillText(d+'m', x-10, groundY+18);
      }
    }
  }

  function drawTargets(){
    targets.forEach(function(t){
      ctx.save();
      ctx.translate(t.x, t.y);
      if(t.kind === 'ring'){
        // wooden ring target on a post
        ctx.fillStyle = '#3a2a18';
        ctx.fillRect(-3, -t.h, 6, t.h);
        var cx=0, cy=-t.h-4;
        var rings = [ ['#8a6a3f',16], ['#e9d9b6',12], ['#c94f4f',8], ['#e9d9b6',4] ];
        rings.forEach(function(r){
          ctx.beginPath();
          ctx.fillStyle = t.hit ? 'rgba(120,120,120,0.5)' : r[0];
          ctx.arc(cx, cy, r[1], 0, Math.PI*2);
          ctx.fill();
        });
        if(t.hit){
          ctx.strokeStyle='#d84a3a';
          ctx.lineWidth=3;
          ctx.beginPath();
          ctx.moveTo(cx-14,cy-14); ctx.lineTo(cx+14,cy+14);
          ctx.moveTo(cx+14,cy-14); ctx.lineTo(cx-14,cy+14);
          ctx.stroke();
        }
      } else {
        // castle gate silhouette
        ctx.fillStyle = t.hit ? '#6b5a4a' : '#4a4038';
        ctx.fillRect(-t.w/2, -t.h, t.w*0.28, t.h);
        ctx.fillRect(t.w/2 - t.w*0.28, -t.h, t.w*0.28, t.h);
        ctx.fillRect(-t.w/2, -t.h, t.w, t.h*0.22);
        // crenellations
        for(var i=0;i<4;i++){
          ctx.fillRect(-t.w/2 + i*(t.w/4), -t.h - 8, t.w/4 - 3, 8);
        }
        if(t.hit){
          ctx.fillStyle='rgba(255,120,60,0.5)';
          ctx.beginPath();
          ctx.arc(0,-t.h*0.5, 14, 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.restore();
    });
  }

  // ---------- Engine rig drawing (simple silhouette at x=0) ----------
  var launchX = 26; // px from left, fixed launch position
  var launchGroundOffset = 0;

  function drawEngine(armAngleDeg){
    ctx.save();
    ctx.translate(launchX, groundY);
    var eng = state.engine;
    if(eng === 'catapult'){
      ctx.fillStyle = '#5a4632';
      ctx.fillRect(-14, -6, 28, 6);
      ctx.fillRect(-10, -34, 6, 30);
      ctx.fillRect(6, -34, 6, 30);
      ctx.strokeStyle = '#caa15a';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(0,-30);
      var a = (armAngleDeg!==undefined?armAngleDeg:state.params.catapult.angle) * Math.PI/180;
      ctx.lineTo(-Math.cos(a)*36, -30-Math.sin(a)*36);
      ctx.stroke();
    } else if(eng === 'trebuchet'){
      ctx.strokeStyle = '#5a4632';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-16,-6); ctx.lineTo(0,-48); ctx.lineTo(16,-6);
      ctx.stroke();
      ctx.fillStyle='#caa15a';
      var a2 = (armAngleDeg!==undefined?armAngleDeg:state.params.trebuchet.angle) * Math.PI/180;
      ctx.strokeStyle = '#caa15a';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0,-48);
      ctx.lineTo(-Math.cos(a2)*40, -48-Math.sin(a2)*40);
      ctx.stroke();
      // counterweight ball on short side
      ctx.beginPath();
      ctx.fillStyle='#333';
      ctx.arc(Math.cos(a2)*14, -48+Math.sin(a2)*14, 8, 0, Math.PI*2);
      ctx.fill();
    } else { // ballista
      ctx.fillStyle = '#5a4632';
      ctx.fillRect(-16,-10,32,10);
      ctx.strokeStyle = '#caa15a';
      ctx.lineWidth = 4;
      var a3 = (armAngleDeg!==undefined?armAngleDeg:state.params.ballista.angle) * Math.PI/180;
      ctx.beginPath();
      ctx.moveTo(-Math.cos(a3)*20, -12-Math.sin(a3)*20);
      ctx.lineTo(Math.cos(a3)*20, -12+Math.sin(a3)*20*0.2);
      ctx.stroke();
      ctx.beginPath();
      ctx.strokeStyle='#e9d9b6';
      ctx.lineWidth=2;
      ctx.moveTo(0,-12);
      ctx.lineTo(Math.cos(a3)*26, -12-Math.sin(a3)*26);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawStaticScene(trailPoints, projPos, hasFired){
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawGround();
    drawTargets();
    drawEngine();
    if(trailPoints && trailPoints.length){
      drawTrail(trailPoints);
    }
    if(projPos){
      drawProjectile(projPos);
    }
  }

  function drawTrail(points){
    var pj = PROJECTILES[state.projectile];
    for(var i=0;i<points.length;i++){
      var p = points[i];
      var alpha = (i+1)/points.length;
      ctx.beginPath();
      ctx.fillStyle = pj.trailColor.replace(/[\d.]+\)$/, (alpha*0.7).toFixed(2)+')');
      ctx.arc(p.x, p.y, Math.max(1.5, pj.radius*0.4*alpha), 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawProjectile(p){
    var pj = PROJECTILES[state.projectile];
    ctx.beginPath();
    ctx.fillStyle = pj.color;
    ctx.arc(p.x, p.y, pj.radius, 0, Math.PI*2);
    ctx.fill();
    if(state.projectile === 'firepot'){
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,200,80,0.6)';
      ctx.arc(p.x, p.y, pj.radius+4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ---------- Physics ----------
  // Compute initial velocity (m/s) and launch angle (deg) per engine, from params.
  function computeLaunch(){
    var eng = state.engine;
    var p = state.params[eng];
    var pj = PROJECTILES[state.projectile];
    var v0, angleDeg;

    if(eng === 'catapult'){
      // Torsion arm: stored torsion energy scales with tension and arm length.
      // Mid power/mid arm gives a solid mid-range arc; heavier projectiles fly slower.
      var tensionFrac = p.tension/100;                 // 0.1 - 1.0
      var armFrac = (p.armLength - 1.5) / (4.5 - 1.5);  // 0 - 1
      var base = 18 + tensionFrac*28 + armFrac*10;      // ~19 - 56
      v0 = base / Math.sqrt(pj.massMod);
      angleDeg = p.angle;
    } else if(eng === 'trebuchet'){
      // Counterweight falling drives a long sling arm - trades a slow wind-up for
      // a much higher release speed and higher arc than a catapult at similar "effort".
      var cwFrac = p.counterweight/400;                 // 0.125 - 1.0
      var ratioFrac = (p.armRatio - 1) / 4;              // 0 - 1
      var base2 = 20 + cwFrac*35 + ratioFrac*15;          // ~24 - 70
      v0 = (base2 / Math.sqrt(pj.massMod)) * 1.15;        // sling-release efficiency bonus
      angleDeg = p.angle;
    } else { // ballista
      // Tension-driven bolt-thrower: very efficient, flat & fast, penalized by bolt mass.
      var tensionFrac2 = p.drawTension/100;               // 0.1 - 1.0
      var base3 = 20 + tensionFrac2*50;                   // 25 - 70
      v0 = (base3 * Math.sqrt(3/p.boltMass)) / Math.sqrt(pj.massMod);
      angleDeg = p.angle;
    }
    return { v0: Math.max(2, v0), angle: angleDeg };
  }

  // ---------- Simulation / animation ----------
  var rafId = null;
  var sim = null; // active simulation state

  function startShot(){
    if(sim && sim.active) return; // one shot at a time
    var launch = computeLaunch();
    var pj = PROJECTILES[state.projectile];
    var angleRad = launch.angle * Math.PI/180;
    var vx0 = Math.cos(angleRad) * launch.v0;
    var vy0 = Math.sin(angleRad) * launch.v0;

    sim = {
      active: true,
      t: 0,
      xM: 0, // meters
      yM: 0, // meters above ground (positive up)
      vx: vx0,
      vy: vy0,
      dragMod: pj.dragMod,
      trail: [],
      lastTime: null,
      landed: false
    };
    hideHint();
    if(rafId === null){
      rafId = requestAnimationFrame(stepSim);
    }
  }

  function metersXYtoPx(xM, yM){
    return { x: launchX + metersToPx(xM), y: groundY - metersToPx(yM) };
  }

  function stepSim(now){
    if(!sim || !sim.active){ rafId = null; return; }
    if(sim.lastTime === null) sim.lastTime = now;
    var dt = Math.min(0.032, (now - sim.lastTime)/1000);
    sim.lastTime = now;

    // physics integration
    var dragCoef = 0.02 * sim.dragMod;
    var windAccel = state.wind * 2.2; // m/s^2 horizontal drift influence

    sim.vx += (windAccel - dragCoef*sim.vx*Math.abs(sim.vx)*0.05) * dt;
    sim.vy += (-GRAVITY - dragCoef*sim.vy*Math.abs(sim.vy)*0.02) * dt;
    sim.xM += sim.vx * dt;
    sim.yM += sim.vy * dt;
    sim.t += dt;

    var px = metersXYtoPx(sim.xM, sim.yM);
    sim.trail.push({x:px.x, y:px.y});
    if(sim.trail.length > 60) sim.trail.shift();

    // check landing (yM <= 0 after some time)
    var landed = sim.yM <= 0 && sim.t > 0.05;
    // check out of canvas horizontally
    var outOfBounds = px.x > W + 40 || px.x < -40;

    // redraw
    drawStaticScene(sim.trail, px, true);

    if(landed || outOfBounds){
      sim.active = false;
      sim.yM = Math.max(0, sim.yM);
      resolveShot(sim.xM);
      rafId = null;
      return;
    }
    rafId = requestAnimationFrame(stepSim);
  }

  function resolveShot(distM){
    var eng = state.engine;
    var hitTarget = null;
    var tolerance = 6; // meters
    targets.forEach(function(t){
      if(!hitTarget && Math.abs(distM - t.distM) <= tolerance){
        hitTarget = t;
      }
    });

    var b = best[eng];
    if(distM > b.distance) b.distance = distM;

    if(hitTarget){
      hitTarget.hit = true;
      b.streak += 1;
      if(b.streak > b.bestStreak) b.bestStreak = b.streak;
      showToast('Direct hit! ' + Math.round(distM) + 'm — streak x' + b.streak);
    } else {
      b.streak = 0;
      showToast('Miss — landed at ' + Math.round(distM) + 'm');
    }

    saveBest();
    saveParams();
    updateStatsPill();
    drawStaticScene(sim ? sim.trail : null, null, true);
  }

  // ---------- UI: param rows ----------
  function renderParamRows(){
    paramRowsEl.innerHTML = '';
    var eng = state.engine;
    ENGINES[eng].params.forEach(function(p){
      var row = document.createElement('div');
      row.className = 'row';

      var label = document.createElement('label');
      label.setAttribute('for', 'p_'+p.key);
      label.textContent = p.label;

      var input = document.createElement('input');
      input.type = 'range';
      input.id = 'p_'+p.key;
      input.min = p.min;
      input.max = p.max;
      input.step = p.step;
      input.value = state.params[eng][p.key];

      var val = document.createElement('div');
      val.className = 'val';
      val.id = 'v_'+p.key;
      val.textContent = formatVal(state.params[eng][p.key], p.unit);

      input.addEventListener('input', function(){
        var num = parseFloat(input.value);
        state.params[eng][p.key] = num;
        val.textContent = formatVal(num, p.unit);
        drawEnginePreview();
        saveParams();
      });

      row.appendChild(label);
      row.appendChild(input);
      row.appendChild(val);
      paramRowsEl.appendChild(row);
    });
  }

  function formatVal(n, unit){
    var s = (Math.round(n*10)/10);
    return s + (unit||'');
  }

  function drawEnginePreview(){
    if(sim && sim.active) return;
    drawStaticScene(null, null, false);
  }

  // ---------- Engine / projectile selection ----------
  function selectEngine(eng){
    state.engine = eng;
    Object.keys(chips).forEach(function(k){
      chips[k].classList.toggle('active', k === eng);
    });
    renderParamRows();
    drawEnginePreview();
    updateStatsPill();
    saveParams();
  }

  function selectProjectile(proj){
    state.projectile = proj;
    Object.keys(projBtns).forEach(function(k){
      projBtns[k].classList.toggle('active', k === proj);
    });
    drawEnginePreview();
    saveParams();
  }

  // ---------- Stats pill ----------
  function updateStatsPill(){
    var b = best[state.engine];
    statsPill.innerHTML = 'Best: ' + Math.round(b.distance) + 'm<br>Streak: ' + b.streak + ' (max ' + b.bestStreak + ')';
  }

  // ---------- Toast ----------
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){
      toastEl.classList.remove('show');
    }, 2600);
  }

  function hideHint(){
    hintEl.classList.add('hidden');
  }

  // ---------- Persistence ----------
  function saveParams(){
    try{
      var payload = {
        engine: state.engine,
        projectile: state.projectile,
        wind: state.wind,
        params: state.params
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }catch(e){ /* storage unavailable, ignore */ }
  }

  function loadParams(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return false;
      var payload = JSON.parse(raw);
      if(payload && payload.engine && ENGINES[payload.engine]){
        state.engine = payload.engine;
      }
      if(payload && payload.projectile && PROJECTILES[payload.projectile]){
        state.projectile = payload.projectile;
      }
      if(payload && typeof payload.wind === 'number'){
        state.wind = payload.wind;
      }
      if(payload && payload.params){
        Object.keys(ENGINES).forEach(function(eng){
          if(payload.params[eng]){
            Object.keys(state.params[eng]).forEach(function(k){
              if(typeof payload.params[eng][k] === 'number'){
                state.params[eng][k] = payload.params[eng][k];
              }
            });
          }
        });
      }
      return true;
    }catch(e){
      return false;
    }
  }

  function saveBest(){
    try{
      localStorage.setItem(BEST_KEY, JSON.stringify(best));
    }catch(e){ /* ignore */ }
  }

  function loadBest(){
    try{
      var raw = localStorage.getItem(BEST_KEY);
      if(!raw) return;
      var parsed = JSON.parse(raw);
      Object.keys(best).forEach(function(eng){
        if(parsed && parsed[eng]){
          best[eng].distance = parsed[eng].distance || 0;
          best[eng].streak = parsed[eng].streak || 0;
          best[eng].bestStreak = parsed[eng].bestStreak || 0;
        }
      });
    }catch(e){ /* ignore */ }
  }

  // ---------- URL hash share ----------
  function encodeShare(){
    var payload = {
      engine: state.engine,
      projectile: state.projectile,
      wind: state.wind,
      params: state.params[state.engine]
    };
    try{
      return btoa(encodeURIComponent(JSON.stringify(payload)));
    }catch(e){
      return '';
    }
  }

  function decodeShareFromHash(){
    var hash = window.location.hash;
    if(!hash || hash.length < 2) return false;
    try{
      var raw = hash.substring(1);
      var json = decodeURIComponent(atob(raw));
      var payload = JSON.parse(json);
      if(payload && payload.engine && ENGINES[payload.engine]){
        state.engine = payload.engine;
      }
      if(payload && payload.projectile && PROJECTILES[payload.projectile]){
        state.projectile = payload.projectile;
      }
      if(payload && typeof payload.wind === 'number'){
        state.wind = payload.wind;
      }
      if(payload && payload.params){
        Object.keys(state.params[state.engine]).forEach(function(k){
          if(typeof payload.params[k] === 'number'){
            state.params[state.engine][k] = payload.params[k];
          }
        });
      }
      return true;
    }catch(e){
      return false;
    }
  }

  function copyShareLink(){
    var code = encodeShare();
    if(!code){
      showToast('Could not build share link.');
      return;
    }
    var url = window.location.origin + window.location.pathname + '#' + code;
    var done = function(){ showToast('Share link copied!'); };
    var fail = function(){
      // fallback: show in toast so user can see it, and try a temp textarea copy
      try{
        var ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position='fixed';
        ta.style.opacity='0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Share link copied!');
      }catch(e2){
        showToast('Copy failed — link ready in address bar.');
        window.location.hash = code;
      }
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(done).catch(fail);
    } else {
      fail();
    }
  }

  // ---------- PNG snapshot export ----------
  function saveSnapshot(){
    try{
      canvas.toBlob(function(blob){
        if(!blob || blob.size === 0){
          showToast('Snapshot failed — try firing a shot first.');
          return;
        }
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'siege-shot-' + Date.now() + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
        showToast('Snapshot saved!');
      }, 'image/png');
    }catch(e){
      showToast('Snapshot export not supported here.');
    }
  }

  // ---------- Reset ----------
  function resetRange(){
    targets.forEach(function(t){ t.hit = false; });
    if(sim){ sim.active = false; }
    drawEnginePreview();
    showToast('Range reset.');
  }

  // ---------- Wind ----------
  function updateWindDisplay(){
    windSlider.value = state.wind;
    windVal.textContent = state.wind.toFixed(2);
  }

  // ---------- Event wiring ----------
  Object.keys(chips).forEach(function(eng){
    chips[eng].addEventListener('click', function(){ selectEngine(eng); });
  });
  Object.keys(projBtns).forEach(function(proj){
    projBtns[proj].addEventListener('click', function(){ selectProjectile(proj); });
  });
  windSlider.addEventListener('input', function(){
    state.wind = parseFloat(windSlider.value);
    windVal.textContent = state.wind.toFixed(2);
    saveParams();
  });
  fireBtn.addEventListener('click', startShot);
  shareBtn.addEventListener('click', copyShareLink);
  snapBtn.addEventListener('click', saveSnapshot);
  resetBtn.addEventListener('click', resetRange);

  window.addEventListener('resize', function(){
    resizeCanvas();
    drawEnginePreview();
  });

  // ---------- Init ----------
  function init(){
    loadBest();
    loadParams(); // persisted defaults first
    var hadHash = decodeShareFromHash(); // share link overrides if present

    // reflect state into UI
    selectEngineSilent(state.engine);
    selectProjectileSilent(state.projectile);
    updateWindDisplay();
    updateStatsPill();

    resizeCanvas();
    renderParamRows();
    drawEnginePreview();

    if(hadHash){
      showToast('Loaded shared setup!');
    }

    // auto-hide hint after a few seconds even without interaction
    setTimeout(hideHint, 5000);
  }

  function selectEngineSilent(eng){
    state.engine = eng;
    Object.keys(chips).forEach(function(k){
      chips[k].classList.toggle('active', k === eng);
    });
  }
  function selectProjectileSilent(proj){
    state.projectile = proj;
    Object.keys(projBtns).forEach(function(k){
      projBtns[k].classList.toggle('active', k === proj);
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
