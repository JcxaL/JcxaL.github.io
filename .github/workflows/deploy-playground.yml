name: Deploy Daily Playground

on:
  push:
    branches: ["daily-playground"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static bundle
        run: |
          mkdir -p _bundle
          cp -r playground/. _bundle/
          cp CNAME _bundle/CNAME
          touch _bundle/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_bundle'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
