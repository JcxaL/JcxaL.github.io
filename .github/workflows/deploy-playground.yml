name: Deploy Daily Playground

on:
  push:
    branches: ["daily-playground"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Separate concurrency group from the Next.js workflow so neither can
# block or cancel the other when both branches are active.
concurrency:
  group: "playground-pages"
  cancel-in-progress: false

jobs:
  # ── 1. Validate ────────────────────────────────────────────────────────────
  # Catches broken manifests or missing day files before anything deploys.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest and active day
        run: |
          python3 - <<'EOF'
          import json, sys, os

          manifest_path = "playground/days/manifest.json"
          if not os.path.exists(manifest_path):
              print("ERROR: playground/days/manifest.json not found")
              sys.exit(1)

          with open(manifest_path) as f:
              try:
                  m = json.load(f)
              except json.JSONDecodeError as e:
                  print(f"ERROR: manifest.json is not valid JSON — {e}")
                  sys.exit(1)

          days = m.get("days", [])
          if not days:
              print("ERROR: manifest.json has no days entries")
              sys.exit(1)

          active = [d for d in days if d.get("status") == "active"]
          if len(active) != 1:
              print(f"ERROR: Expected exactly 1 active day, found {len(active)}")
              sys.exit(1)

          day = active[0]
          # 'folder' overrides 'date' for the directory name (supports YYYY-MM-DD-{id} naming)
          folder = day.get("folder", day["date"])
          html = f"playground/days/{folder}/index.html"
          if not os.path.exists(html):
              print(f"ERROR: Active day HTML missing — {html}")
              sys.exit(1)

          # Also validate spotlight manifest if it exists
          spot_path = "playground/spotlight/manifest.json"
          if os.path.exists(spot_path):
              with open(spot_path) as f:
                  try:
                      sm = json.load(f)
                  except json.JSONDecodeError as e:
                      print(f"ERROR: spotlight/manifest.json is not valid JSON — {e}")
                      sys.exit(1)
              spot_active = [d for d in sm.get("days", []) if d.get("status") == "active"]
              if len(spot_active) > 1:
                  print(f"ERROR: spotlight manifest has {len(spot_active)} active entries (max 1)")
                  sys.exit(1)
              if spot_active:
                  sf = spot_active[0].get("folder", spot_active[0]["date"])
                  shtml = f"playground/spotlight/days/{sf}/index.html"
                  if not os.path.exists(shtml):
                      print(f"ERROR: Active spotlight HTML missing — {shtml}")
                      sys.exit(1)
                  print(f"OK  spotlight: Drop {spot_active[0]['day_number']} — {spot_active[0]['title']}")

          archived = [d for d in days if d.get("status") == "archived"]
          print(f"OK  active  : Day {day['day_number']} — {day['title']} ({day['date']}) [folder: {folder}]")
          print(f"OK  archive : {len(archived)} past day(s) preserved")
          print(f"OK  total   : {len(days)} day(s) in manifest")
          EOF

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static bundle
        run: |
          rm -rf _bundle
          mkdir _bundle
          cp -r playground/. _bundle/
          cp CNAME _bundle/CNAME
          touch _bundle/.nojekyll
          echo "Bundle contents:"
          find _bundle -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_bundle'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
