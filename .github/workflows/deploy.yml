# Builds the Next.js site and the daily playground from a single branch,
# then deploys them together: playground/ lands at /playground/ inside the
# Next.js static export so neither deploy replaces the other.
name: Deploy site + playground to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Validate playground manifests ────────────────────────────────────
  validate-playground:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest and active day
        run: |
          python3 - <<'EOF'
          import json, sys, os

          manifest_path = "playground/days/manifest.json"
          if not os.path.exists(manifest_path):
              print("ERROR: playground/days/manifest.json not found")
              sys.exit(1)

          with open(manifest_path) as f:
              try:
                  m = json.load(f)
              except json.JSONDecodeError as e:
                  print(f"ERROR: manifest.json is not valid JSON — {e}")
                  sys.exit(1)

          days = m.get("days", [])
          if not days:
              print("ERROR: manifest.json has no days entries")
              sys.exit(1)

          active = [d for d in days if d.get("status") == "active"]
          if len(active) != 1:
              print(f"ERROR: Expected exactly 1 active day, found {len(active)}")
              sys.exit(1)

          day = active[0]
          # 'folder' overrides 'date' for the directory name (supports YYYY-MM-DD-{id} naming)
          folder = day.get("folder", day["date"])
          html = f"playground/days/{folder}/index.html"
          if not os.path.exists(html):
              print(f"ERROR: Active day HTML missing — {html}")
              sys.exit(1)

          # Also validate spotlight manifest if it exists
          spot_path = "playground/spotlight/manifest.json"
          if os.path.exists(spot_path):
              with open(spot_path) as f:
                  try:
                      sm = json.load(f)
                  except json.JSONDecodeError as e:
                      print(f"ERROR: spotlight/manifest.json is not valid JSON — {e}")
                      sys.exit(1)
              spot_active = [d for d in sm.get("days", []) if d.get("status") == "active"]
              if len(spot_active) > 1:
                  print(f"ERROR: spotlight manifest has {len(spot_active)} active entries (max 1)")
                  sys.exit(1)
              if spot_active:
                  sd = spot_active[0]
                  sf = sd.get("folder", sd["date"])
                  shtml = f"playground/spotlight/days/{sf}/index.html"
                  if not os.path.exists(shtml):
                      print(f"ERROR: Active spotlight gallery HTML missing — {shtml}")
                      sys.exit(1)
                  # v2 spotlight format: drops_count >= 1 with N sub-folders 1..N/index.html
                  drops_count = sd.get("drops_count", 1)
                  if drops_count > 1:
                      for i in range(1, drops_count + 1):
                          drop_html = f"playground/spotlight/days/{sf}/{i}/index.html"
                          if not os.path.exists(drop_html):
                              print(f"ERROR: Spotlight drop missing — {drop_html}")
                              sys.exit(1)
                      # Also verify meta.json drops array matches
                      meta_path = f"playground/spotlight/days/{sf}/meta.json"
                      if os.path.exists(meta_path):
                          with open(meta_path) as mf:
                              meta = json.load(mf)
                          actual_drops = len(meta.get("drops", []))
                          if actual_drops != drops_count:
                              print(f"ERROR: meta.json has {actual_drops} drops, manifest says {drops_count}")
                              sys.exit(1)
                  print(f"OK  spotlight: Day {sd['day_number']} — {sd['title']} ({drops_count} drop{'s' if drops_count != 1 else ''})")

          archived = [d for d in days if d.get("status") == "archived"]
          print(f"OK  active  : Day {day['day_number']} — {day['title']} ({day['date']}) [folder: {folder}]")
          print(f"OK  archive : {len(archived)} past day(s) preserved")
          print(f"OK  total   : {len(days)} day(s) in manifest")
          EOF

  # ── 2. Build Next.js and overlay the playground ─────────────────────────
  build:
    needs: validate-playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Next.js
        run: pnpm build

      - name: Overlay playground at /playground/
        run: |
          cp -r playground ./out/playground
          cp CNAME ./out/CNAME
          echo "out/ contents:"
          find ./out -maxdepth 2 | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
