<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The JccL Line — Travel</title>
<meta name="description" content="Travel field notes, photo essays and transit interfaces — a personal museum of places on The JccL Line." />
<style>
  :root{
    --bg:#0b1020; --panel:#111a33; --ink:#f8fafc; --dim:#94a3b8;
    --accent:#38bdf8; --amber:#fbbf24; --green:#34d399; --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1000px 500px at 85% -10%, rgba(56,189,248,.14), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(251,191,36,.08), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100dvh; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  .wrap{max-width:1100px;margin:0 auto;padding:clamp(1.5rem,5vw,4rem) 1.25rem 4rem}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:3rem}
  .pill{
    display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;
    padding:.5rem .95rem;border-radius:999px;font-size:.85rem;
    background:rgba(255,255,255,.06);border:1px solid var(--line);
    backdrop-filter:blur(8px);transition:background .2s;
  }
  .pill:hover{background:rgba(255,255,255,.12)}
  header.hero{margin-bottom:2.5rem}
  .kicker{display:inline-flex;align-items:center;gap:.55rem;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  h1{margin:0 0 .75rem;font-size:clamp(2.4rem,8vw,4.5rem);line-height:1;letter-spacing:-.03em}
  .sub{margin:0;max-width:52ch;color:var(--dim);font-size:1.1rem;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-top:3rem}
  .card{
    position:relative;display:flex;flex-direction:column;gap:.85rem;
    padding:1.4rem;border-radius:18px;text-decoration:none;
    background:linear-gradient(180deg,var(--panel),#0d1428);
    border:1px solid var(--line);
    box-shadow:0 24px 48px -32px rgba(0,0,0,.7);
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--accent)}
  .card:hover{transform:translateY(-4px);border-color:rgba(56,189,248,.4);box-shadow:0 30px 60px -30px rgba(56,189,248,.25)}
  .card .no{font-variant-numeric:tabular-nums;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
  .card h2{margin:0;font-size:1.25rem;letter-spacing:-.01em}
  .card p{margin:0;color:var(--dim);font-size:.92rem;line-height:1.55}
  .card .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
  .tags{display:flex;gap:.4rem;flex-wrap:wrap}
  .tag{font-size:.68rem;color:var(--dim);border:1px solid var(--line);padding:.2rem .5rem;border-radius:999px}
  .go{font-size:.85rem;color:var(--accent);font-weight:600}
  .badge-active{position:absolute;top:1rem;right:1rem;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--green);border:1px solid rgba(52,211,153,.35);padding:.15rem .5rem;border-radius:999px}
  .empty{margin-top:3rem;padding:3rem 1.5rem;text-align:center;border:1px dashed var(--line);border-radius:18px;color:var(--dim)}
  footer{max-width:1100px;margin:0 auto;padding:2rem 1.25rem 3rem;color:var(--dim);font-size:.8rem;text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <nav class="topbar">
      <a class="pill" href="/">← Home</a>
      <a class="pill" href="/playground/">Daily Playground →</a>
    </nav>

    <header class="hero">
      <div class="kicker"><span class="dot"></span> The JccL Line · Travel</div>
      <h1>Places, by rail.</h1>
      <p class="sub">Field notes, photo essays and interactive transit interfaces —
        a personal museum of places, boarding one stop at a time while the full
        site is under construction.</p>
    </header>

    <main id="stops" class="grid" aria-live="polite"></main>
  </div>

  <footer>The JccL Line · jccl.me/travel · shipped incrementally</footer>

  <script>
    const LINE_COLORS = {
      intro:"#38bdf8", journal:"#34d399", photo:"#fbbf24",
      interface:"#a78bfa", note:"#f87171"
    };

    async function load(){
      const host = document.getElementById('stops');
      let stops = [];
      try{
        const res = await fetch('./manifest.json', {cache:'no-store'});
        const data = await res.json();
        stops = Array.isArray(data.stops) ? data.stops : [];
      }catch(e){
        // manifest missing or unreadable — fall through to empty state
      }

      if(!stops.length){
        host.classList.remove('grid');
        host.innerHTML =
          '<div class="empty">The line is being built. First destinations board soon.</div>';
        return;
      }

      // newest stop first
      stops.sort((a,b)=>(b.stop_number||0)-(a.stop_number||0));

      host.innerHTML = stops.map(s=>{
        const folder = s.folder || s.date;
        const color = Object.prototype.hasOwnProperty.call(LINE_COLORS, s.line)
          ? LINE_COLORS[s.line] : 'var(--accent)';
        const no = String(s.stop_number||'').padStart(2,'0');
        const tags = (s.tags||[]).slice(0,3)
          .map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('');
        const active = s.status === 'active'
          ? '<span class="badge-active">Latest</span>' : '';
        return `<a class="card" href="stops/${encodeURIComponent(folder)}/" style="--accent:${color}">
            ${active}
            <span class="no">Stop ${no}${s.line?' · '+escapeHtml(s.line):''}</span>
            <h2>${escapeHtml(s.title||'Untitled stop')}</h2>
            <p>${escapeHtml(s.description||'')}</p>
            <div class="foot"><div class="tags">${tags}</div><span class="go">Open →</span></div>
          </a>`;
      }).join('');
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    load();
  </script>
</body>
</html>
